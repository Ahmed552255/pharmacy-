<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>سكون | لوحة الإدارة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* نفس تنسيقات اللون السماوي السابقة مع تحسينات بسيطة */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);
            min-height: 100vh;
            padding: 16px;
            position: relative;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 36px;
            box-shadow: 0 12px 32px rgba(0, 56, 107, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
        .container { max-width: 1300px; margin: 0 auto; }
        .mini-header {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(10px);
            border-radius: 60px; padding: 8px 20px 8px 24px; margin-bottom: 22px;
            border: 1px solid rgba(56, 189, 248, 0.2); flex-wrap: wrap; gap: 12px;
        }
        .logo-area h2 {
            font-size: 1.7rem; font-weight: 700;
            background: linear-gradient(135deg, #0369a1, #0284c7);
            -webkit-background-clip: text; background-clip: text;
            color: transparent; letter-spacing: -0.5px;
        }
        .logo-area h2 i { color: #0284c7; margin-left: 6px; }
        .controls-mini { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .search-glass {
            background: rgba(255, 255, 255, 0.8); border-radius: 60px;
            padding: 8px 18px; display: flex; align-items: center; gap: 8px;
            border: 1px solid rgba(56, 189, 248, 0.3);
        }
        .search-glass i { color: #0284c7; }
        .search-glass input {
            background: transparent; border: none; padding: 6px 0;
            font-family: 'Cairo', sans-serif; font-size: 0.9rem; width: 160px; outline: none;
        }
        .btn-glass {
            background: rgba(2, 132, 199, 0.9); backdrop-filter: blur(4px);
            border: none; padding: 8px 20px; border-radius: 60px; color: white;
            font-weight: 600; font-family: 'Cairo', sans-serif; cursor: pointer;
            transition: 0.2s; display: inline-flex; align-items: center; gap: 8px;
            font-size: 0.9rem;
        }
        .btn-glass:hover { background: #0369a1; transform: scale(0.97); box-shadow: 0 4px 12px rgba(2,132,199,0.3); }
        .users-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px; margin-top: 6px;
        }
        .user-card {
            background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px);
            border-radius: 32px; padding: 18px 16px 20px; transition: all 0.2s ease;
            border: 1px solid rgba(56, 189, 248, 0.25); cursor: pointer;
            box-shadow: 0 5px 12px rgba(0,0,0,0.02);
        }
        .user-card:hover { transform: translateY(-4px); background: rgba(255,255,255,0.85); border-color: #7dd3fc; }
        .card-avatar { display: flex; justify-content: center; margin-bottom: 12px; }
        .avatar-placeholder {
            width: 80px; height: 80px; background: linear-gradient(145deg, #7dd3fc, #38bdf8);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 2.4rem; color: white;
        }
        .user-name { font-size: 1.25rem; font-weight: 700; color: #0c4a6e; text-align: center; margin-bottom: 6px; }
        .role-badge {
            display: inline-block; padding: 4px 12px; border-radius: 50px;
            font-size: 0.75rem; font-weight: 600; margin: 6px auto; text-align: center;
        }
        .role-doctor { background: #dbeafe; color: #1e40af; }
        .role-nurse { background: #fef3c7; color: #b45309; }
        .role-pharmacist { background: #dcfce7; color: #166534; }
        .quick-blurb {
            background: rgba(224, 242, 254, 0.5); border-radius: 20px; padding: 10px 12px;
            margin: 12px 0; font-size: 0.8rem; color: #164a63; border-right: 3px solid #38bdf8;
            max-height: 60px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .quick-blurb i { margin-left: 5px; font-size: 0.7rem; color: #0284c7; }
        .status-badge-sm {
            display: inline-block; padding: 4px 12px; border-radius: 50px; font-size: 0.7rem;
            font-weight: 600; background: rgba(186, 230, 253, 0.8); color: #0369a1;
        }
        .status-blocked-sm { background: rgba(254, 202, 202, 0.9); color: #b91c1c; }
        .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; }
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(8px);
            align-items: center; justify-content: center; z-index: 1100;
        }
        .modal-card {
            background: rgba(255, 255, 255, 0.96); backdrop-filter: blur(16px);
            border-radius: 40px; width: 90%; max-width: 600px; max-height: 85vh;
            overflow-y: auto; padding: 0; box-shadow: 0 30px 50px rgba(0,0,0,0.15);
        }
        .modal-header {
            padding: 20px 25px; background: linear-gradient(110deg, #e0f2fe, #ffffff);
            border-radius: 40px 40px 0 0; border-bottom: 1px solid #bae6fd;
        }
        .modal-body { padding: 20px 25px; }
        .form-group { margin-bottom: 18px; }
        input, select, textarea {
            width: 100%; padding: 12px 16px; border-radius: 50px;
            border: 1px solid #bae6fd; background: #ffffff;
            font-family: 'Cairo', sans-serif; transition: 0.2s;
        }
        textarea { border-radius: 28px; resize: vertical; }
        input:focus, select:focus, textarea:focus {
            outline: none; border-color: #38bdf8;
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
        }
        .btn-secondary { background: #94a3b8; border: none; padding: 8px 16px; border-radius: 40px; color: white; font-weight: 500; cursor: pointer; }
        .row-buttons { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
        .btn-success { background: #0284c7; }
        .assigned-doctor-info {
            background: #f0f9ff; padding: 6px 12px; border-radius: 30px;
            font-size: 0.8rem; margin-top: 8px; color: #0369a1;
        }
        .toast {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            background: #0f172a; color: white; padding: 12px 20px;
            border-radius: 60px; text-align: center; z-index: 1200;
            font-weight: 500; backdrop-filter: blur(8px);
        }
        .empty-state { text-align: center; padding: 50px; color: #475569; }
        hr { margin: 12px 0; }
    </style>
</head>
<body>
<div class="container">
    <div class="mini-header glass-panel">
        <div class="logo-area">
            <h2><i class="fas fa-cloud-sun"></i> سكون | الإدارة</h2>
        </div>
        <div class="controls-mini">
            <div class="search-glass">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="بحث بالاسم أو البريد">
            </div>
            <button class="btn-glass" id="addUserBtn"><i class="fas fa-user-plus"></i> مستخدم جديد</button>
            <button class="btn-glass" id="refreshBtn"><i class="fas fa-sync-alt"></i></button>
            <button class="btn-glass" id="logoutBtn" style="background:#64748b;"><i class="fas fa-sign-out-alt"></i> خروج</button>
        </div>
    </div>

    <div id="usersGrid" class="users-grid">
        <div class="empty-state"><i class="fas fa-spinner fa-pulse"></i> جاري التحميل...</div>
    </div>
</div>

<!-- مودال تفاصيل المستخدم -->
<div id="detailModal" class="modal">
    <div class="modal-card">
        <div class="modal-header">
            <h3><i class="fas fa-user-circle"></i> <span id="detailNameTitle">تفاصيل المستخدم</span></h3>
        </div>
        <div class="modal-body">
            <div style="display: flex; gap: 16px; flex-wrap: wrap; align-items: center; margin-bottom: 20px;">
                <div id="detailAvatarArea">
                    <div style="width:70px; height:70px; background:#7dd3fc; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:2rem;"><i class="fas fa-user"></i></div>
                </div>
                <div><strong id="detailName">الاسم</strong><br><span id="detailRoleSpan"></span></div>
            </div>
            <div><i class="fas fa-envelope"></i> <span id="detailEmail"></span></div>
            <div><i class="fas fa-phone"></i> <span id="detailPhone"></span></div>
            <div><i class="fas fa-id-card"></i> <span id="detailUid"></span> <small>(UID)</small></div>
            <div><i class="fas fa-toggle-on"></i> الحالة: <span id="detailStatusSpan"></span></div>
            <div id="assignedDoctorSection" style="display:none;"><i class="fas fa-user-md"></i> دكتور مسؤول: <span id="detailAssignedDoctor"></span></div>
            <hr>
            <div><strong><i class="fas fa-pen-fancy"></i> لمحة سريعة</strong></div>
            <div id="quickBlurbDisplay" class="quick-blurb" style="white-space: normal;"></div>
            
            <div class="row-buttons">
                <button id="blockModalBtn" class="btn-glass" style="background:#ef4444;">🔒 حظر</button>
                <button id="unblockModalBtn" class="btn-glass" style="background:#10b981;">🔓 إلغاء حظر</button>
                <button id="editModalBtn" class="btn-glass" style="background:#f59e0b;">✏️ تعديل</button>
                <button id="deleteModalBtn" class="btn-glass" style="background:#64748b;">🗑️ حذف</button>
                <button id="closeDetailBtn" class="btn-secondary">إغلاق</button>
            </div>
        </div>
    </div>
</div>

<!-- مودال إضافة / تعديل مستخدم -->
<div id="formModal" class="modal">
    <div class="modal-card">
        <div class="modal-header">
            <h3 id="formModalTitle"><i class="fas fa-plus"></i> مستخدم جديد</h3>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <input type="text" id="userName" placeholder="الاسم الكامل *" required>
            </div>
            <div class="form-group">
                <input type="email" id="userEmail" placeholder="البريد الإلكتروني *" required>
            </div>
            <div class="form-group">
                <input type="text" id="userPhone" placeholder="رقم الهاتف">
            </div>
            <div class="form-group">
                <select id="userRole" required>
                    <option value="">-- اختر الدور --</option>
                    <option value="doctor">👨‍⚕️ طبيب</option>
                    <option value="nurse">👩‍⚕️ ممرض/ة</option>
                    <option value="pharmacist">💊 صيدلي</option>
                </select>
            </div>
            <div class="form-group" id="assignDoctorGroup" style="display:none;">
                <label>الدكتور المسؤول <span style="color:#ef4444;">*</span></label>
                <select id="assignedDoctorSelect">
                    <option value="">-- اختر الدكتور --</option>
                </select>
            </div>
            <div class="form-group">
                <input type="text" id="userSpecialty" placeholder="التخصص (للطبيب فقط)">
            </div>
            <div class="form-group">
                <textarea id="quickBlurb" rows="2" placeholder="لمحة سريعة (خبرة، ملاحظات...)"></textarea>
            </div>
            <div class="form-group">
                <input type="password" id="userPassword" placeholder="كلمة المرور *" required>
            </div>
            <div class="form-group">
                <select id="userStatus">
                    <option value="active">نشط</option>
                    <option value="blocked">محظور</option>
                </select>
            </div>
            <div class="row-buttons">
                <button id="saveFormBtn" class="btn-glass btn-success">💾 حفظ</button>
                <button id="closeFormBtn" class="btn-secondary">إلغاء</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    // ==================== استيراد الإعدادات من ملف خارجي ====================
    import { firebaseConfig } from './firebase-config.js';
    
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getDatabase, ref, onValue, set, update, remove } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";
    import { getAuth, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);
    const auth = getAuth(app);
    
    const usersRef = ref(database, 'users');
    let allUsers = [];
    let doctorsList = [];
    let currentEditId = null;
    let currentViewId = null;

    // ==================== IndexedDB للتخزين المحلي ====================
    class UserCache {
        constructor() { this.db = null; }
        async init() {
            if (this.db) return;
            return new Promise((resolve, reject) => {
                const req = indexedDB.open('SakoonAdminCache', 1);
                req.onerror = () => reject(req.error);
                req.onsuccess = () => { this.db = req.result; resolve(); };
                req.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('users')) {
                        db.createObjectStore('users', { keyPath: 'id' });
                    }
                };
            });
        }
        async saveUsers(users) {
            await this.init();
            return new Promise((resolve, reject) => {
                const tx = this.db.transaction('users', 'readwrite');
                const store = tx.objectStore('users');
                store.clear();
                users.forEach(u => store.put(u));
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        }
        async loadUsers() {
            await this.init();
            return new Promise((resolve, reject) => {
                const tx = this.db.transaction('users', 'readonly');
                const store = tx.objectStore('users');
                const req = store.getAll();
                req.onsuccess = () => resolve(req.result || []);
                req.onerror = () => reject(req.error);
            });
        }
    }
    const userCache = new UserCache();

    function showToast(msg, isErr = false) {
        const t = document.createElement('div');
        t.className = 'toast';
        t.style.background = isErr ? '#b91c1c' : '#0284c7';
        t.innerHTML = `<i class="fas ${isErr ? 'fa-exclamation-triangle' : 'fa-check'}"></i> ${msg}`;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    function loadUsers() {
        onValue(usersRef, async (snap) => {
            const arr = [];
            const doctorsArr = [];
            snap.forEach(child => {
                const user = { id: child.key, ...child.val() };
                arr.push(user);
                if (user.role === 'doctor') doctorsArr.push(user);
            });
            allUsers = arr;
            doctorsList = doctorsArr;
            await userCache.saveUsers(arr);
            renderGrid();
            populateDoctorSelect();
        }, err => showToast('خطأ في تحميل البيانات', true));
    }

    async function loadCachedUsersFirst() {
        const cached = await userCache.loadUsers();
        if (cached.length) {
            allUsers = cached;
            doctorsList = cached.filter(u => u.role === 'doctor');
            renderGrid();
            populateDoctorSelect();
        }
    }

    function populateDoctorSelect() {
        const select = document.getElementById('assignedDoctorSelect');
        if (!select) return;
        select.innerHTML = '<option value="">-- اختر الدكتور --</option>';
        doctorsList.forEach(doc => {
            const option = document.createElement('option');
            option.value = doc.id;
            option.textContent = `${doc.name || 'بدون اسم'} (${doc.email || ''})`;
            select.appendChild(option);
        });
    }

    function renderGrid() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        let filtered = allUsers.filter(u => 
            (u.name?.toLowerCase().includes(term) || u.email?.toLowerCase().includes(term) || u.role?.toLowerCase().includes(term))
        );
        const grid = document.getElementById('usersGrid');
        if(filtered.length === 0) {
            grid.innerHTML = '<div class="empty-state"><i class="fas fa-users-slash"></i> لا يوجد مستخدمون</div>';
            return;
        }
        grid.innerHTML = filtered.map(user => {
            const roleClass = `role-${user.role}`;
            const roleText = { doctor: 'طبيب', nurse: 'ممرض', pharmacist: 'صيدلي' }[user.role] || user.role;
            const assignedInfo = user.role === 'nurse' && user.assignedDoctorName ? 
                `<div class="assigned-doctor-info"><i class="fas fa-user-md"></i> د. ${escapeHtml(user.assignedDoctorName)}</div>` : '';
            
            return `
            <div class="user-card" data-id="${user.id}">
                <div class="card-avatar">
                    <div class="avatar-placeholder"><i class="fas fa-user-md"></i></div>
                </div>
                <div class="user-name">${escapeHtml(user.name || 'بدون اسم')}</div>
                <div style="text-align:center"><span class="role-badge ${roleClass}"><i class="fas fa-tag"></i> ${roleText}</span></div>
                ${assignedInfo}
                <div class="quick-blurb"><i class="fas fa-quote-right"></i> ${escapeHtml(user.quickBlurb ? user.quickBlurb.substring(0, 55) : 'لا توجد لمحة')}</div>
                <div class="card-footer">
                    <span class="status-badge-sm ${user.status === 'blocked' ? 'status-blocked-sm' : ''}">${user.status === 'active' ? 'نشط' : 'محظور'}</span>
                    <small><i class="far fa-envelope"></i> ${escapeHtml(user.email)}</small>
                </div>
            </div>
            `;
        }).join('');
        
        document.querySelectorAll('.user-card').forEach(card => {
            card.addEventListener('click', () => openDetailModal(card.getAttribute('data-id')));
        });
    }

    function escapeHtml(str) { 
        if(!str) return ''; 
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m] || m); 
    }

    function openDetailModal(id) {
        const user = allUsers.find(u => u.id === id);
        if(!user) return;
        currentViewId = id;
        document.getElementById('detailNameTitle').innerText = user.name || 'تفاصيل';
        document.getElementById('detailName').innerText = user.name || '-';
        document.getElementById('detailEmail').innerText = user.email || '-';
        document.getElementById('detailPhone').innerText = user.phone || '-';
        const roleText = { doctor: 'طبيب', nurse: 'ممرض', pharmacist: 'صيدلي' }[user.role] || user.role;
        document.getElementById('detailRoleSpan').innerHTML = `<span class="role-badge role-${user.role}">${roleText}</span>`;
        document.getElementById('detailUid').innerText = user.id || '-';
        const statusSpan = document.getElementById('detailStatusSpan');
        statusSpan.innerHTML = user.status === 'active' ? '<span style="color:#0284c7;">✅ نشط</span>' : '<span style="color:#b91c1c;">⛔ محظور</span>';
        document.getElementById('quickBlurbDisplay').innerHTML = user.quickBlurb ? escapeHtml(user.quickBlurb) : 'لا توجد لمحة';
        
        const assignedSection = document.getElementById('assignedDoctorSection');
        if (user.role === 'nurse' && user.assignedDoctorName) {
            assignedSection.style.display = 'block';
            document.getElementById('detailAssignedDoctor').innerText = user.assignedDoctorName;
        } else {
            assignedSection.style.display = 'none';
        }
        
        document.getElementById('detailModal').style.display = 'flex';
    }

    document.getElementById('userRole').addEventListener('change', (e) => {
        const role = e.target.value;
        const group = document.getElementById('assignDoctorGroup');
        const specialtyInput = document.getElementById('userSpecialty');
        if (role === 'nurse') {
            group.style.display = 'block';
            specialtyInput.placeholder = 'التخصص (غير مطلوب للممرض)';
        } else {
            group.style.display = 'none';
            if (role === 'doctor') {
                specialtyInput.placeholder = 'التخصص (مثال: أمراض نفسية)';
            } else {
                specialtyInput.placeholder = 'التخصص';
            }
        }
    });

    function openAddModal() {
        currentEditId = null;
        document.getElementById('formModalTitle').innerHTML = '<i class="fas fa-user-plus"></i> مستخدم جديد';
        document.getElementById('userName').value = '';
        document.getElementById('userEmail').value = '';
        document.getElementById('userPhone').value = '';
        document.getElementById('userRole').value = '';
        document.getElementById('userSpecialty').value = '';
        document.getElementById('quickBlurb').value = '';
        document.getElementById('userPassword').value = '';
        document.getElementById('userStatus').value = 'active';
        document.getElementById('assignDoctorGroup').style.display = 'none';
        document.getElementById('formModal').style.display = 'flex';
        populateDoctorSelect();
    }

    function openEditModal(user) {
        currentEditId = user.id;
        document.getElementById('formModalTitle').innerHTML = '<i class="fas fa-edit"></i> تعديل المستخدم';
        document.getElementById('userName').value = user.name || '';
        document.getElementById('userEmail').value = user.email || '';
        document.getElementById('userPhone').value = user.phone || '';
        document.getElementById('userRole').value = user.role || '';
        document.getElementById('userSpecialty').value = user.specialty || '';
        document.getElementById('quickBlurb').value = user.quickBlurb || '';
        document.getElementById('userPassword').value = '';
        document.getElementById('userStatus').value = user.status || 'active';
        
        const role = user.role;
        const group = document.getElementById('assignDoctorGroup');
        if (role === 'nurse') {
            group.style.display = 'block';
            setTimeout(() => {
                const select = document.getElementById('assignedDoctorSelect');
                if (select) select.value = user.assignedDoctorId;
            }, 200);
        } else {
            group.style.display = 'none';
        }
        document.getElementById('formModal').style.display = 'flex';
        populateDoctorSelect();
    }

    function closeFormModal() { 
        document.getElementById('formModal').style.display = 'none'; 
        currentEditId = null;
    }
    function closeDetailModal() { 
        document.getElementById('detailModal').style.display = 'none'; 
        currentViewId = null;
    }

    async function saveUser() {
        const name = document.getElementById('userName').value.trim();
        const email = document.getElementById('userEmail').value.trim();
        const phone = document.getElementById('userPhone').value.trim();
        const role = document.getElementById('userRole').value;
        const specialty = document.getElementById('userSpecialty').value.trim();
        const quickBlurb = document.getElementById('quickBlurb').value.trim();
        const password = document.getElementById('userPassword').value;
        const status = document.getElementById('userStatus').value;
        
        if (!name || !email || !role) {
            showToast('الاسم والبريد والدور مطلوبة', true);
            return;
        }
        
        let assignedDoctorId = null;
        let assignedDoctorName = null;
        if (role === 'nurse') {
            assignedDoctorId = document.getElementById('assignedDoctorSelect').value;
            if (!assignedDoctorId) {
                showToast('يجب اختيار الدكتور المسؤول للممرض', true);
                return;
            }
            const selectedDoc = doctorsList.find(d => d.id === assignedDoctorId);
            assignedDoctorName = selectedDoc ? selectedDoc.name : '';
        }

        const userData = {
            name, email, phone, role,
            specialty: role === 'doctor' ? specialty : '',
            quickBlurb,
            status,
            lastModified: new Date().toISOString()
        };
        
        if (role === 'nurse') {
            userData.assignedDoctorId = assignedDoctorId;
            userData.assignedDoctorName = assignedDoctorName;
        }

        try {
            if (currentEditId) {
                await update(ref(database, `users/${currentEditId}`), userData);
                showToast('تم التعديل بنجاح');
                closeFormModal();
            } else {
                if (!password) {
                    showToast('كلمة المرور مطلوبة لحساب جديد', true);
                    return;
                }
                const userCred = await createUserWithEmailAndPassword(auth, email, password);
                const uid = userCred.user.uid;
                userData.createdAt = new Date().toISOString();
                await set(ref(database, `users/${uid}`), userData);
                showToast('🎉 تم إضافة المستخدم بنجاح');
                closeFormModal();
            }
        } catch (err) {
            console.error(err);
            if (err.code === 'auth/email-already-in-use') showToast('البريد الإلكتروني مستخدم بالفعل', true);
            else if (err.code === 'auth/weak-password') showToast('كلمة المرور ضعيفة (6 حروف على الأقل)', true);
            else showToast(err.message, true);
        }
    }

    async function toggleBlockUser(id, newStatus) {
        await update(ref(database, `users/${id}`), { status: newStatus });
        showToast(newStatus === 'blocked' ? 'تم الحظر' : 'تم إلغاء الحظر');
        closeDetailModal();
    }

    async function deleteUser(id) {
        if (!confirm('هل أنت متأكد من حذف هذا المستخدم؟ لا يمكن التراجع.')) return;
        try {
            await remove(ref(database, `users/${id}`));
            showToast('تم الحذف');
            closeDetailModal();
        } catch (error) {
            showToast('فشل الحذف: ' + error.message, true);
        }
    }

    async function logout() {
        await signOut(auth);
        sessionStorage.clear();
        window.location.href = 'index.html';
    }

    function setupEvents() {
        document.getElementById('searchInput').addEventListener('input', renderGrid);
        document.getElementById('addUserBtn').onclick = openAddModal;
        document.getElementById('refreshBtn').onclick = () => { loadUsers(); showToast('تم التحديث'); };
        document.getElementById('logoutBtn').onclick = logout;
        document.getElementById('saveFormBtn').onclick = saveUser;
        document.getElementById('closeFormBtn').onclick = closeFormModal;
        document.getElementById('closeDetailBtn').onclick = closeDetailModal;
        document.getElementById('blockModalBtn').onclick = () => { if(currentViewId) toggleBlockUser(currentViewId, 'blocked'); };
        document.getElementById('unblockModalBtn').onclick = () => { if(currentViewId) toggleBlockUser(currentViewId, 'active'); };
        document.getElementById('deleteModalBtn').onclick = () => { if(currentViewId) deleteUser(currentViewId); };
        document.getElementById('editModalBtn').onclick = () => {
            const user = allUsers.find(u => u.id === currentViewId);
            if(user) { closeDetailModal(); openEditModal(user); }
        };
        window.onclick = (e) => {
            if(e.target === document.getElementById('detailModal')) closeDetailModal();
            if(e.target === document.getElementById('formModal')) closeFormModal();
        };
    }

    // بدء التطبيق: تحميل الكاش أولاً ثم المزامنة الحية
    loadCachedUsersFirst();
    loadUsers();
    setupEvents();
</script>
</body>
</html>
