<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>سكون · لوحة الإدارة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ===== تصميم جديد: ألوان محايدة مع لمسات زرقاء هادئة ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: #f4f7fb;
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }
        /* خلفية ديناميكية ناعمة */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 10% 20%, rgba(59, 130, 246, 0.08), transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(6, 182, 212, 0.06), transparent 50%);
            pointer-events: none;
            z-index: -1;
        }
        .container { max-width: 1300px; margin: 0 auto; }

        /* ===== رأس الصفحة ===== */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 60px;
            padding: 10px 20px;
            margin-bottom: 28px;
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo h2 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(145deg, #1e3a8a, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .search-box {
            background: white;
            border-radius: 60px;
            padding: 8px 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #e2e8f0;
        }
        .search-box i { color: #64748b; }
        .search-box input {
            border: none;
            padding: 8px 0;
            font-family: 'Cairo', sans-serif;
            font-size: 0.95rem;
            width: 200px;
            outline: none;
            background: transparent;
        }
        .btn {
            padding: 10px 22px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            transition: all 0.2s;
            background: white;
            color: #1e293b;
            border: 1px solid #e2e8f0;
        }
        .btn-primary {
            background: #2563eb;
            color: white;
            border: none;
            box-shadow: 0 4px 10px rgba(37,99,235,0.2);
        }
        .btn-primary:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
        }
        .btn-outline:hover {
            background: #f8fafc;
            border-color: #cbd5e1;
        }
        .btn-danger {
            background: #ef4444;
            color: white;
            border: none;
        }
        .btn-danger:hover { background: #dc2626; }

        /* ===== شبكة المستخدمين ===== */
        .users-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 22px;
            margin-top: 10px;
        }
        .user-card {
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 30px;
            padding: 22px 18px;
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow: 0 8px 20px -6px rgba(0,0,0,0.05);
            transition: all 0.2s;
            cursor: pointer;
        }
        .user-card:hover {
            transform: translateY(-6px);
            background: white;
            box-shadow: 0 20px 30px -10px rgba(0,0,0,0.1);
            border-color: #bae6fd;
        }
        .card-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 16px;
        }
        .avatar {
            width: 65px;
            height: 65px;
            background: linear-gradient(145deg, #38bdf8, #2563eb);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.8rem;
            box-shadow: 0 6px 12px rgba(37,99,235,0.2);
        }
        .user-info h3 {
            font-size: 1.2rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 4px;
        }
        .role-tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 700;
        }
        .role-doctor { background: #dbeafe; color: #1e40af; }
        .role-nurse { background: #fef3c7; color: #b45309; }
        .role-pharmacist { background: #dcfce7; color: #166534; }
        .role-admin { background: #f1f5f9; color: #334155; }
        .user-bio {
            background: #f8fafc;
            padding: 12px;
            border-radius: 18px;
            font-size: 0.85rem;
            color: #334155;
            margin: 15px 0;
            border-right: 3px solid #3b82f6;
        }
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }
        .status-badge {
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            background: #e2e8f0;
            color: #475569;
        }
        .status-active { background: #bbf7d0; color: #166534; }
        .status-blocked { background: #fecaca; color: #991b1b; }
        .email-small {
            font-size: 0.8rem;
            color: #64748b;
        }

        /* ===== المودالات ===== */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15,23,42,0.4);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
            z-index: 1100;
            padding: 16px;
        }
        .modal-card {
            background: white;
            border-radius: 36px;
            width: 100%;
            max-width: 580px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 30px 50px rgba(0,0,0,0.2);
        }
        .modal-header {
            padding: 22px 28px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            border-radius: 36px 36px 0 0;
        }
        .modal-body { padding: 24px 28px; }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #334155;
        }
        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 20px;
            font-family: 'Cairo', sans-serif;
            font-size: 0.95rem;
            transition: 0.2s;
            background: white;
        }
        .form-control:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
        }
        .row-buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            flex-wrap: wrap;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 24px;
            right: 24px;
            background: #1e293b;
            color: white;
            padding: 14px 24px;
            border-radius: 60px;
            text-align: center;
            z-index: 1300;
            font-weight: 500;
            backdrop-filter: blur(8px);
            max-width: 500px;
            margin: 0 auto;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: #64748b;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .app-header { flex-direction: column; align-items: stretch; }
            .search-box input { width: 100%; }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- رأس الصفحة -->
    <header class="app-header">
        <div class="logo">
            <h2><i class="fas fa-shield-alt" style="color:#2563eb; margin-left:6px;"></i>سكون · الإدارة</h2>
        </div>
        <div class="header-actions">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="بحث عن مستخدم...">
            </div>
            <button class="btn btn-primary" id="addUserBtn"><i class="fas fa-plus-circle"></i> مستخدم جديد</button>
            <button class="btn btn-outline" id="refreshBtn"><i class="fas fa-sync-alt"></i></button>
            <button class="btn btn-outline" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> خروج</button>
        </div>
    </header>

    <!-- شبكة المستخدمين -->
    <div id="usersGrid" class="users-grid">
        <div class="empty-state"><i class="fas fa-spinner fa-pulse"></i> جاري التحميل...</div>
    </div>
</div>

<!-- مودال تفاصيل المستخدم -->
<div id="detailModal" class="modal">
    <div class="modal-card">
        <div class="modal-header">
            <h3><i class="fas fa-id-card"></i> تفاصيل المستخدم</h3>
        </div>
        <div class="modal-body">
            <div style="display:flex; gap:16px; align-items:center; margin-bottom:20px;">
                <div class="avatar" id="detailAvatar"><i class="fas fa-user"></i></div>
                <div>
                    <h3 id="detailName" style="font-size:1.4rem;">-</h3>
                    <span id="detailRoleBadge" class="role-tag">-</span>
                </div>
            </div>
            <div class="form-group"><i class="fas fa-envelope"></i> <strong>البريد:</strong> <span id="detailEmail"></span></div>
            <div class="form-group"><i class="fas fa-phone"></i> <strong>الهاتف:</strong> <span id="detailPhone"></span></div>
            <div class="form-group"><i class="fas fa-fingerprint"></i> <strong>المعرف:</strong> <span id="detailUid"></span></div>
            <div class="form-group"><i class="fas fa-circle"></i> <strong>الحالة:</strong> <span id="detailStatus"></span></div>
            <div class="form-group" id="assignedDoctorRow" style="display:none;">
                <i class="fas fa-user-md"></i> <strong>دكتور مسؤول:</strong> <span id="detailAssignedDoctor"></span>
            </div>
            <hr style="margin:16px 0;">
            <div class="form-group">
                <strong><i class="fas fa-pen"></i> لمحة:</strong>
                <p id="detailBio" style="margin-top:8px; background:#f1f5f9; padding:12px; border-radius:16px;"></p>
            </div>
            <div class="row-buttons">
                <button class="btn" id="blockModalBtn" style="background:#fee2e2; color:#b91c1c;"><i class="fas fa-ban"></i> حظر</button>
                <button class="btn" id="unblockModalBtn" style="background:#dcfce7; color:#166534;"><i class="fas fa-check-circle"></i> إلغاء الحظر</button>
                <button class="btn btn-primary" id="editModalBtn"><i class="fas fa-edit"></i> تعديل</button>
                <button class="btn btn-danger" id="deleteModalBtn"><i class="fas fa-trash"></i> حذف</button>
                <button class="btn btn-outline" id="closeDetailBtn">إغلاق</button>
            </div>
        </div>
    </div>
</div>

<!-- مودال إضافة / تعديل مستخدم -->
<div id="formModal" class="modal">
    <div class="modal-card">
        <div class="modal-header">
            <h3 id="formModalTitle"><i class="fas fa-user-plus"></i> مستخدم جديد</h3>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label>الاسم الكامل *</label>
                <input type="text" id="userName" class="form-control" placeholder="مثال: د. أحمد العلوي">
            </div>
            <div class="form-group">
                <label>البريد الإلكتروني *</label>
                <input type="email" id="userEmail" class="form-control" placeholder="doctor@example.com">
            </div>
            <div class="form-group">
                <label>رقم الهاتف</label>
                <input type="text" id="userPhone" class="form-control" placeholder="05xxxxxxxx">
            </div>
            <div class="form-group">
                <label>الدور *</label>
                <select id="userRole" class="form-control">
                    <option value="">-- اختر --</option>
                    <option value="doctor">👨‍⚕️ طبيب</option>
                    <option value="nurse">👩‍⚕️ ممرض/ة</option>
                    <option value="pharmacist">💊 صيدلي</option>
                </select>
            </div>
            <div class="form-group" id="assignDoctorGroup" style="display:none;">
                <label>الدكتور المسؤول *</label>
                <select id="assignedDoctorSelect" class="form-control"></select>
            </div>
            <div class="form-group">
                <label>التخصص (للطبيب)</label>
                <input type="text" id="userSpecialty" class="form-control" placeholder="مثال: طب نفسي">
            </div>
            <div class="form-group">
                <label>لمحة سريعة</label>
                <textarea id="quickBlurb" class="form-control" rows="2" placeholder="خبرة، ملاحظات..."></textarea>
            </div>
            <div class="form-group">
                <label>كلمة المرور *</label>
                <input type="password" id="userPassword" class="form-control" placeholder="••••••••">
            </div>
            <div class="form-group">
                <label>الحالة</label>
                <select id="userStatus" class="form-control">
                    <option value="active">نشط</option>
                    <option value="blocked">محظور</option>
                </select>
            </div>
            <div class="row-buttons">
                <button class="btn btn-primary" id="saveFormBtn"><i class="fas fa-save"></i> حفظ</button>
                <button class="btn btn-outline" id="closeFormBtn">إلغاء</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { firebaseConfig } from './firebase-config.js';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getDatabase, ref, onValue, set, update, remove } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";
    import { getAuth, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);
    const auth = getAuth(app);
    
    const usersRef = ref(database, 'users');
    let allUsers = [];
    let doctorsList = [];
    let currentEditId = null;
    let currentViewId = null;

    // ----- Toast -----
    function showToast(msg, isErr = false) {
        const t = document.createElement('div');
        t.className = 'toast';
        t.style.background = isErr ? '#b91c1c' : '#1e293b';
        t.innerHTML = `<i class="fas ${isErr ? 'fa-exclamation-triangle' : 'fa-check'}"></i> ${msg}`;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    // ----- تحميل المستخدمين مع مستمع حي -----
    function loadUsers() {
        onValue(usersRef, (snap) => {
            const arr = [];
            const docs = [];
            snap.forEach(child => {
                const user = { id: child.key, ...child.val() };
                arr.push(user);
                if (user.role === 'doctor') docs.push(user);
            });
            allUsers = arr;
            doctorsList = docs;
            renderGrid();
            populateDoctorSelect();
        }, err => showToast('خطأ في تحميل البيانات', true));
    }

    function populateDoctorSelect() {
        const select = document.getElementById('assignedDoctorSelect');
        if (!select) return;
        select.innerHTML = '<option value="">-- اختر الدكتور --</option>';
        doctorsList.forEach(doc => {
            const opt = document.createElement('option');
            opt.value = doc.id;
            opt.textContent = `${doc.name || 'بدون اسم'} (${doc.email || ''})`;
            select.appendChild(opt);
        });
    }

    function renderGrid() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        let filtered = allUsers.filter(u => 
            (u.name?.toLowerCase().includes(term) || u.email?.toLowerCase().includes(term) || u.role?.includes(term))
        );
        const grid = document.getElementById('usersGrid');
        if (filtered.length === 0) {
            grid.innerHTML = '<div class="empty-state"><i class="fas fa-users-slash"></i> لا يوجد مستخدمون</div>';
            return;
        }
        grid.innerHTML = filtered.map(user => {
            const roleClass = `role-${user.role}`;
            const roleText = { doctor:'طبيب', nurse:'ممرض', pharmacist:'صيدلي' }[user.role] || user.role;
            const assignedInfo = (user.role === 'nurse' && user.assignedDoctorName) 
                ? `<div style="font-size:0.8rem; margin-top:6px;"><i class="fas fa-user-md"></i> د. ${escapeHtml(user.assignedDoctorName)}</div>` : '';
            return `
            <div class="user-card" data-id="${user.id}">
                <div class="card-header">
                    <div class="avatar"><i class="fas fa-user-md"></i></div>
                    <div class="user-info">
                        <h3>${escapeHtml(user.name || 'بدون اسم')}</h3>
                        <span class="role-tag ${roleClass}">${roleText}</span>
                    </div>
                </div>
                ${assignedInfo}
                <div class="user-bio"><i class="fas fa-quote-left" style="opacity:0.5;"></i> ${escapeHtml(user.quickBlurb || 'لا توجد لمحة')}</div>
                <div class="card-footer">
                    <span class="status-badge ${user.status === 'active' ? 'status-active' : 'status-blocked'}">${user.status === 'active' ? 'نشط' : 'محظور'}</span>
                    <span class="email-small"><i class="far fa-envelope"></i> ${escapeHtml(user.email)}</span>
                </div>
            </div>`;
        }).join('');
        document.querySelectorAll('.user-card').forEach(c => c.addEventListener('click', e => {
            if (!e.target.closest('button')) openDetailModal(c.dataset.id);
        }));
    }

    function escapeHtml(s) {
        if (!s) return '';
        return s.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]);
    }

    function openDetailModal(id) {
        const user = allUsers.find(u => u.id === id);
        if (!user) return;
        currentViewId = id;
        document.getElementById('detailName').innerText = user.name || '-';
        document.getElementById('detailEmail').innerText = user.email || '-';
        document.getElementById('detailPhone').innerText = user.phone || '-';
        document.getElementById('detailUid').innerText = user.id;
        document.getElementById('detailStatus').innerHTML = user.status === 'active' ? '✅ نشط' : '⛔ محظور';
        document.getElementById('detailBio').innerText = user.quickBlurb || 'لا توجد لمحة';
        const roleText = { doctor:'طبيب', nurse:'ممرض', pharmacist:'صيدلي' }[user.role] || user.role;
        document.getElementById('detailRoleBadge').innerHTML = roleText;
        document.getElementById('detailRoleBadge').className = `role-tag role-${user.role}`;
        const avatarDiv = document.getElementById('detailAvatar');
        avatarDiv.innerHTML = '<i class="fas fa-user-md"></i>';
        
        const assignedRow = document.getElementById('assignedDoctorRow');
        if (user.role === 'nurse' && user.assignedDoctorName) {
            assignedRow.style.display = 'block';
            document.getElementById('detailAssignedDoctor').innerText = user.assignedDoctorName;
        } else {
            assignedRow.style.display = 'none';
        }
        document.getElementById('detailModal').style.display = 'flex';
    }

    // ---- أحداث الدور ----
    document.getElementById('userRole').addEventListener('change', e => {
        const role = e.target.value;
        document.getElementById('assignDoctorGroup').style.display = role === 'nurse' ? 'block' : 'none';
    });

    function openAddModal() {
        currentEditId = null;
        document.getElementById('formModalTitle').innerHTML = '<i class="fas fa-user-plus"></i> مستخدم جديد';
        document.getElementById('userName').value = '';
        document.getElementById('userEmail').value = '';
        document.getElementById('userPhone').value = '';
        document.getElementById('userRole').value = '';
        document.getElementById('userSpecialty').value = '';
        document.getElementById('quickBlurb').value = '';
        document.getElementById('userPassword').value = '';
        document.getElementById('userStatus').value = 'active';
        document.getElementById('assignDoctorGroup').style.display = 'none';
        document.getElementById('formModal').style.display = 'flex';
        populateDoctorSelect();
    }

    function openEditModal(user) {
        currentEditId = user.id;
        document.getElementById('formModalTitle').innerHTML = '<i class="fas fa-edit"></i> تعديل المستخدم';
        document.getElementById('userName').value = user.name || '';
        document.getElementById('userEmail').value = user.email || '';
        document.getElementById('userPhone').value = user.phone || '';
        document.getElementById('userRole').value = user.role || '';
        document.getElementById('userSpecialty').value = user.specialty || '';
        document.getElementById('quickBlurb').value = user.quickBlurb || '';
        document.getElementById('userPassword').value = '';
        document.getElementById('userStatus').value = user.status || 'active';
        const group = document.getElementById('assignDoctorGroup');
        if (user.role === 'nurse') {
            group.style.display = 'block';
            setTimeout(() => {
                const sel = document.getElementById('assignedDoctorSelect');
                if (sel) sel.value = user.assignedDoctorId;
            }, 100);
        } else {
            group.style.display = 'none';
        }
        document.getElementById('formModal').style.display = 'flex';
        populateDoctorSelect();
    }

    function closeFormModal() { document.getElementById('formModal').style.display = 'none'; currentEditId = null; }
    function closeDetailModal() { document.getElementById('detailModal').style.display = 'none'; currentViewId = null; }

    async function saveUser() {
        const name = document.getElementById('userName').value.trim();
        const email = document.getElementById('userEmail').value.trim();
        const phone = document.getElementById('userPhone').value.trim();
        const role = document.getElementById('userRole').value;
        const specialty = document.getElementById('userSpecialty').value.trim();
        const quickBlurb = document.getElementById('quickBlurb').value.trim();
        const password = document.getElementById('userPassword').value;
        const status = document.getElementById('userStatus').value;

        if (!name || !email || !role) { showToast('الاسم والبريد والدور مطلوبة', true); return; }

        let assignedDoctorId = null, assignedDoctorName = null;
        if (role === 'nurse') {
            assignedDoctorId = document.getElementById('assignedDoctorSelect').value;
            if (!assignedDoctorId) { showToast('يجب اختيار الدكتور المسؤول', true); return; }
            const doc = doctorsList.find(d => d.id === assignedDoctorId);
            assignedDoctorName = doc ? doc.name : '';
        }

        const userData = {
            name, email, phone, role,
            specialty: role === 'doctor' ? specialty : '',
            quickBlurb, status,
            lastModified: new Date().toISOString()
        };
        if (role === 'nurse') { userData.assignedDoctorId = assignedDoctorId; userData.assignedDoctorName = assignedDoctorName; }

        try {
            if (currentEditId) {
                await update(ref(database, `users/${currentEditId}`), userData);
                showToast('تم التعديل');
                closeFormModal();
            } else {
                if (!password) { showToast('كلمة المرور مطلوبة', true); return; }
                const userCred = await createUserWithEmailAndPassword(auth, email, password);
                const uid = userCred.user.uid;
                userData.createdAt = new Date().toISOString();
                await set(ref(database, `users/${uid}`), userData);
                showToast('🎉 تم إضافة المستخدم');
                closeFormModal();
            }
        } catch (err) {
            console.error(err);
            if (err.code === 'auth/email-already-in-use') showToast('البريد مستخدم', true);
            else if (err.code === 'auth/weak-password') showToast('كلمة مرور ضعيفة', true);
            else showToast(err.message, true);
        }
    }

    async function toggleBlock(id, newStatus) {
        await update(ref(database, `users/${id}`), { status: newStatus });
        showToast(newStatus === 'blocked' ? 'تم الحظر' : 'تم إلغاء الحظر');
        closeDetailModal();
    }

    async function deleteUser(id) {
        if (!confirm('حذف المستخدم نهائياً؟')) return;
        await remove(ref(database, `users/${id}`));
        showToast('تم الحذف');
        closeDetailModal();
    }

    async function logout() {
        await signOut(auth);
        window.location.href = 'index.html';
    }

    function setupEvents() {
        document.getElementById('searchInput').addEventListener('input', renderGrid);
        document.getElementById('addUserBtn').onclick = openAddModal;
        document.getElementById('refreshBtn').onclick = () => { loadUsers(); showToast('تم التحديث'); };
        document.getElementById('logoutBtn').onclick = logout;
        document.getElementById('saveFormBtn').onclick = saveUser;
        document.getElementById('closeFormBtn').onclick = closeFormModal;
        document.getElementById('closeDetailBtn').onclick = closeDetailModal;
        document.getElementById('blockModalBtn').onclick = () => currentViewId && toggleBlock(currentViewId, 'blocked');
        document.getElementById('unblockModalBtn').onclick = () => currentViewId && toggleBlock(currentViewId, 'active');
        document.getElementById('deleteModalBtn').onclick = () => currentViewId && deleteUser(currentViewId);
        document.getElementById('editModalBtn').onclick = () => {
            const u = allUsers.find(u => u.id === currentViewId);
            if (u) { closeDetailModal(); openEditModal(u); }
        };
        window.onclick = (e) => {
            if (e.target.classList.contains('modal')) {
                e.target.style.display = 'none';
            }
        };
    }

    loadUsers();
    setupEvents();
</script>
</body>
</html>
