<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#00AEEF">
    <title>شفاء | لوحة الإدارة</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap&subset=arabic" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'">
    
    <style>
        :root {
            --primary: #00AEEF;
            --primary-light: #E0F7FA;
            --primary-dark: #008080;
            --bg: #FAFAFA;
            --white: #FFFFFF;
            --ink: #1A3C4A;
            --text-sec: #5A7D8A;
            --danger: #E57373;
            --success: #26A69A;
            --border: #E0E0E0;
            --shadow-sm: 0 4px 12px rgba(0,0,0,0.05);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.08);
            --radius-sm: 14px;
            --radius-md: 20px;
            --radius-lg: 28px;
            --radius-xl: 50px;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html {
            font-size: 15px;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -webkit-text-size-adjust: 100%;
        }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            min-height: 100dvh;
            padding: 14px;
            overflow-x: hidden;
        }
        
        .container { max-width: 1300px; margin: 0 auto; }
        
        #authCheckLoader {
            position: fixed;
            inset: 0;
            background: rgba(250, 250, 250, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            flex-direction: column;
            gap: 16px;
        }
        
        .loader-icon {
            width: 44px;
            height: 44px;
            border: 3px solid #E0E0E0;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .loader-text { font-size: 1rem; font-weight: 600; color: var(--primary-dark); }
        
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 12px 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            flex-wrap: wrap;
            gap: 12px;
            position: sticky;
            top: 8px;
            z-index: 100;
        }
        
        .logo h2 { font-size: 1.4rem; font-weight: 800; color: var(--primary-dark); white-space: nowrap; }
        .logo i { color: var(--primary); }
        
        .header-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        
        .search-wrapper {
            background: #F5FAFC;
            border-radius: var(--radius-xl);
            padding: 6px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1.5px solid var(--border);
            min-width: 180px;
        }
        
        .search-wrapper:focus-within { border-color: var(--primary); }
        .search-wrapper i { color: var(--primary); font-size: 0.9rem; }
        
        .search-wrapper input {
            background: transparent;
            border: none;
            padding: 8px 0;
            font-family: 'Cairo', sans-serif;
            font-size: 0.88rem;
            width: 140px;
            outline: none;
            color: var(--ink);
        }
        
        .search-wrapper input::placeholder { color: #B0C8D0; }
        
        .btn {
            padding: 10px 18px;
            border-radius: var(--radius-xl);
            border: none;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            white-space: nowrap;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
            transition: opacity 0.15s;
        }
        
        .btn:active { opacity: 0.8; }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 3px 10px rgba(0, 174, 239, 0.2); }
        .btn-outline { background: var(--white); color: var(--ink); border: 1.5px solid var(--border); }
        .btn-icon { width: 42px; height: 42px; padding: 0; justify-content: center; border-radius: 50%; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-success { background: var(--success); color: white; }
        
        .stats-bar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        
        .stat-card {
            background: var(--white);
            border-radius: var(--radius-md);
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            flex: 1;
            min-width: 130px;
        }
        
        .stat-icon {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        
        .stat-info h4 { font-size: 1.5rem; font-weight: 800; line-height: 1; }
        .stat-info span { font-size: 0.75rem; color: var(--text-sec); font-weight: 500; }
        
        .users-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
        }
        
        .user-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 20px 16px 18px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            position: relative;
            transition: box-shadow 0.15s;
        }
        
        .user-card:active { box-shadow: var(--shadow-md); }
        
        .card-status-dot {
            position: absolute;
            top: 14px;
            left: 14px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 2px solid white;
        }
        
        .card-status-dot.active { background: var(--success); }
        .card-status-dot.blocked { background: var(--danger); }
        
        .card-avatar { display: flex; justify-content: center; margin-bottom: 14px; }
        
        .avatar-circle {
            width: 70px;
            height: 70px;
            background: #E0F7FA;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: #004D40;
            border: 3px solid white;
            box-shadow: 0 3px 10px rgba(0,0,0,0.06);
        }
        
        .user-name {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--ink);
            text-align: center;
            margin-bottom: 6px;
            line-height: 1.3;
        }
        
        .role-tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: var(--radius-xl);
            font-size: 0.75rem;
            font-weight: 700;
            margin: 0 auto 10px;
            text-align: center;
            width: fit-content;
        }
        
        .role-doctor { background: #E3F2FD; color: #1565C0; }
        .role-nurse { background: #FCE4EC; color: #C62828; }
        .role-pharmacist { background: #E8F5E9; color: #2E7D32; }
        .role-admin { background: #FFF3E0; color: #E65100; }
        
        .user-bio {
            background: #F5FAFC;
            border-radius: var(--radius-sm);
            padding: 10px 12px;
            margin: 10px 0;
            font-size: 0.8rem;
            color: var(--ink);
            border-right: 3px solid var(--primary);
            max-height: 40px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .assigned-doctors {
            background: #E0F7FA;
            border-radius: var(--radius-xl);
            padding: 5px 10px;
            font-size: 0.73rem;
            margin-top: 8px;
            color: #004D40;
            display: inline-block;
        }
        
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            font-size: 0.78rem;
        }
        
        .card-footer small {
            color: var(--text-sec);
            max-width: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 50px 20px;
            color: var(--text-sec);
        }
        
        .empty-state i { font-size: 2.5rem; color: #B0C8D0; margin-bottom: 14px; }
        .empty-state h3 { font-size: 1.1rem; margin-bottom: 6px; }
        
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.3);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 16px;
        }
        
        .modal-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 520px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            border: 1px solid var(--border);
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
        }
        
        .modal-header {
            padding: 16px 20px;
            background: #F5FAFC;
            border-bottom: 1px solid var(--border);
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        
        .modal-header h3 { font-size: 1.1rem; font-weight: 700; }
        
        .close-btn {
            background: none;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 22px;
            color: var(--text-sec);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .close-btn:active { background: rgba(0,0,0,0.05); }
        
        .modal-body { padding: 20px; padding-bottom: 45vh; }
        
        .form-group { margin-bottom: 16px; }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--ink);
        }
        
        input, select, textarea {
            width: 100%;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--border);
            background: #F5FAFC;
            font-family: 'Cairo', sans-serif;
            font-size: 0.88rem;
            color: var(--ink);
            -webkit-appearance: none;
            appearance: none;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
        }
        
        textarea { resize: vertical; min-height: 60px; }
        
        .multi-select {
            background: #F5FAFC;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 6px;
            max-height: 180px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        .multi-select label {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            margin: 0;
            font-weight: 500;
            cursor: pointer;
            border-radius: 10px;
            font-size: 0.85rem;
        }
        
        .multi-select label:active { background: var(--primary-light); }
        .multi-select label.selected { background: #E0F7FA; border-right: 3px solid var(--primary); }
        
        .multi-select input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
            cursor: pointer;
        }
        
        .checkmark-icon { color: var(--primary); font-size: 0.85rem; margin-right: auto; }
        .field-hint { font-size: 0.75rem; color: var(--text-sec); margin-top: 5px; padding-right: 4px; }
        
        .password-section { position: relative; }
        
        .password-toggle {
            position: absolute;
            left: 12px;
            top: 40px;
            cursor: pointer;
            color: var(--text-sec);
            background: none;
            border: none;
            font-size: 1.1rem;
            padding: 6px;
            touch-action: manipulation;
        }
        
        .row-buttons { display: flex; gap: 8px; margin-top: 20px; flex-wrap: wrap; }
        .action-btns { display: flex; gap: 8px; flex-wrap: wrap; }
        
        .detail-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 3px 0;
            font-size: 0.88rem;
        }
        
        .detail-row i { width: 22px; color: var(--primary); text-align: center; }
        
        .password-display {
            background: #F5FAFC;
            padding: 6px 10px;
            border-radius: 10px;
            font-family: monospace;
            letter-spacing: 2px;
            cursor: pointer;
            border: 1px solid var(--border);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
        }
        
        .keyboard-scroll-spacer { height: 1px; width: 100%; pointer-events: none; opacity: 0; }
        
        .toast-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3000;
            display: flex;
            flex-direction: column;
            gap: 6px;
            pointer-events: none;
        }
        
        .toast {
            background: #1A3C4A;
            color: white;
            padding: 12px 20px;
            border-radius: var(--radius-xl);
            font-weight: 600;
            font-size: 0.85rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            animation: toastIn 0.3s ease forwards;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .toast.error { background: #C62828; }
        .toast.removing { animation: toastOut 0.3s ease forwards; }
        
        @keyframes toastIn {
            from { transform: translateY(15px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        @keyframes toastOut {
            from { transform: translateY(0); opacity: 1; }
            to { transform: translateY(-15px); opacity: 0; }
        }
        
        .sync-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-left: 6px;
        }
        
        .sync-indicator.synced { background: var(--success); }
        .sync-indicator.syncing { background: #FFB74D; animation: pulse 1s infinite; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .tenant-info {
            background: var(--primary-light);
            padding: 4px 12px;
            border-radius: var(--radius-xl);
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--primary-dark);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        @media (max-width: 768px) {
            body { padding: 8px; }
            .app-header { padding: 10px 14px; border-radius: var(--radius-md); top: 4px; }
            .logo h2 { font-size: 1.2rem; }
            .search-wrapper { min-width: 150px; }
            .search-wrapper input { width: 100px; }
            .users-grid { grid-template-columns: 1fr; gap: 10px; }
            .stats-bar { gap: 8px; }
            .stat-card { min-width: 100px; padding: 10px 12px; }
            .stat-info h4 { font-size: 1.3rem; }
            .modal-card { max-width: 100%; border-radius: var(--radius-md); }
            .btn { padding: 8px 14px; font-size: 0.8rem; }
            .modal-body { padding-bottom: 55vh; }
        }
        
        @media (max-width: 360px) {
            .app-header { padding: 8px 10px; gap: 8px; }
            .stats-bar { flex-wrap: wrap; }
            .stat-card { flex: 1 1 45%; min-width: 0; }
            .modal-body { padding-bottom: 65vh; }
        }
        
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.001ms !important;
                transition-duration: 0.001ms !important;
            }
        }
        
        .modal-card::-webkit-scrollbar { width: 5px; }
        .modal-card::-webkit-scrollbar-thumb { background: #D0D0D0; border-radius: 10px; }
        .multi-select::-webkit-scrollbar { width: 4px; }
        .multi-select::-webkit-scrollbar-thumb { background: #D0D0D0; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="authCheckLoader">
        <div class="loader-icon"></div>
        <span class="loader-text">جارٍ التحقق من الصلاحية...</span>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <div class="container" id="mainContainer" style="display: none;">
        <header class="app-header">
            <div class="logo">
                <h2>
                    <i class="fas fa-heartbeat"></i> شفاء · الإدارة 
                    <span class="sync-indicator synced" id="syncIndicator" title="حالة المزامنة"></span>
                </h2>
            </div>
            <div class="header-actions">
                <div class="tenant-info" id="tenantInfo">
                    <i class="fas fa-hospital"></i>
                    <span id="tenantIdDisplay">مجمع طبي</span>
                </div>
                <div class="search-wrapper">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="ابحث عن مستخدم...">
                </div>
                <button class="btn btn-primary" id="addUserBtn">
                    <i class="fas fa-user-plus"></i> إضافة
                </button>
                <button class="btn btn-outline btn-icon" id="refreshBtn" title="تحديث">
                    <i class="fas fa-sync-alt"></i>
                </button>
                <button class="btn btn-outline" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i> خروج
                </button>
            </div>
        </header>

        <div class="stats-bar" id="statsBar">
            <div class="stat-card">
                <div class="stat-icon" style="background:#E3F2FD;">
                    <i class="fas fa-users" style="color:#1565C0;"></i>
                </div>
                <div class="stat-info">
                    <h4 id="statTotal">0</h4>
                    <span>إجمالي المستخدمين</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background:#E8F5E9;">
                    <i class="fas fa-user-md" style="color:#2E7D32;"></i>
                </div>
                <div class="stat-info">
                    <h4 id="statDoctors">0</h4>
                    <span>طبيب</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background:#FCE4EC;">
                    <i class="fas fa-user-nurse" style="color:#C62828;"></i>
                </div>
                <div class="stat-info">
                    <h4 id="statNurses">0</h4>
                    <span>ممرض/ة</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background:#FFF3E0;">
                    <i class="fas fa-prescription" style="color:#E65100;"></i>
                </div>
                <div class="stat-info">
                    <h4 id="statPharmacists">0</h4>
                    <span>صيدلي</span>
                </div>
            </div>
        </div>

        <div id="usersGrid" class="users-grid">
            <div class="empty-state">
                <i class="fas fa-spinner fa-spin"></i>
                <h3>جاري التحميل...</h3>
            </div>
        </div>
    </div>

    <!-- مودال تفاصيل المستخدم -->
    <div id="detailModal" class="modal">
        <div class="modal-card">
            <div class="modal-header">
                <h3><i class="fas fa-user-circle"></i> <span id="detailNameTitle">تفاصيل المستخدم</span></h3>
                <button class="close-btn" id="closeDetailBtn">&times;</button>
            </div>
            <div class="modal-body">
                <div style="display: flex; gap: 14px; align-items: center; margin-bottom: 18px;">
                    <div id="detailAvatar">
                        <div style="width:56px; height:56px; background:#E0F7FA; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.6rem; color:#004D40;">
                            <i id="detailAvatarIcon" class="fas fa-user"></i>
                        </div>
                    </div>
                    <div>
                        <h2 id="detailName" style="margin:0; font-size:1.1rem;">الاسم</h2>
                        <span id="detailRoleSpan"></span>
                    </div>
                </div>
                
                <div style="display:grid; gap:10px; margin-bottom:18px;">
                    <div class="detail-row"><i class="fas fa-envelope"></i> <span id="detailEmail"></span></div>
                    <div class="detail-row"><i class="fas fa-phone"></i> <span id="detailPhone"></span></div>
                    <div id="detailSpecialtyRow" style="display:none;" class="detail-row">
                        <i class="fas fa-stethoscope"></i> <span id="detailSpecialty"></span>
                    </div>
                    <div class="detail-row"><i class="fas fa-id-card"></i> <span id="detailUid"></span></div>
                    <div class="detail-row"><i class="fas fa-circle"></i> الحالة: <span id="detailStatusSpan"></span></div>
                    <div class="detail-row" id="detailPasswordRow">
                        <i class="fas fa-key"></i> 
                        <span>كلمة المرور:</span>
                        <span class="password-display" id="detailPassword" title="اضغط للنسخ">
                            <span id="passwordText">••••••••</span>
                            <i class="fas fa-copy" style="font-size:0.75rem;"></i>
                        </span>
                    </div>
                </div>
                
                <div id="detailAssignedDoctorsSection" style="display:none; background:#F5FAFC; padding:12px; border-radius:var(--radius-sm); margin-bottom:14px;">
                    <i class="fas fa-user-md" style="color:var(--primary);"></i> الأطباء المسؤولون: <span id="detailAssignedDoctors"></span>
                </div>
                
                <div style="margin-bottom:14px;">
                    <strong style="display:block; margin-bottom:6px;">لمحة سريعة</strong>
                    <div id="quickBlurbDisplay" style="background:#F5FAFC; padding:12px; border-radius:var(--radius-sm);"></div>
                </div>

                <div class="action-btns">
                    <button id="deleteModalBtn" class="btn btn-danger"><i class="fas fa-trash"></i> حذف</button>
                    <button id="blockModalBtn" class="btn btn-danger"><i class="fas fa-lock"></i> حظر</button>
                    <button id="unblockModalBtn" class="btn btn-success"><i class="fas fa-unlock"></i> إلغاء حظر</button>
                    <button id="editModalBtn" class="btn btn-primary"><i class="fas fa-edit"></i> تعديل</button>
                </div>
                
                <div class="keyboard-scroll-spacer"></div>
            </div>
        </div>
    </div>

    <!-- مودال إضافة / تعديل -->
    <div id="formModal" class="modal">
        <div class="modal-card">
            <div class="modal-header">
                <h3 id="formModalTitle"><i class="fas fa-user-plus"></i> مستخدم جديد</h3>
                <button class="close-btn" id="closeFormBtn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>الاسم الكامل *</label>
                    <input type="text" id="userName" placeholder="أدخل الاسم الكامل" required>
                </div>
                <div class="form-group">
                    <label>البريد الإلكتروني *</label>
                    <input type="email" id="userEmail" placeholder="example@domain.com" required dir="ltr">
                </div>
                <div class="form-group">
                    <label>رقم الهاتف</label>
                    <input type="text" id="userPhone" placeholder="05xxxxxxxx" dir="ltr">
                </div>
                <div class="form-group">
                    <label>الدور *</label>
                    <select id="userRole" required>
                        <option value="">-- اختر الدور --</option>
                        <option value="doctor">👨‍⚕️ طبيب</option>
                        <option value="nurse">👩‍⚕️ ممرض/ة</option>
                        <option value="pharmacist">💊 صيدلي</option>
                    </select>
                </div>
                <div class="form-group" id="assignDoctorsGroup" style="display:none;">
                    <label>الأطباء المسؤولون (يمكن اختيار أكثر من طبيب)</label>
                    <div class="multi-select" id="assignedDoctorsCheckboxGroup"></div>
                    <div class="field-hint">✅ العلامة الخضراء تعني أن الطبيب محدد</div>
                </div>
                <div class="form-group" id="specialtyGroup" style="display:none;">
                    <label>التخصص</label>
                    <input type="text" id="userSpecialty" placeholder="مثال: قلبية، أطفال...">
                </div>
                <div class="form-group">
                    <label>لمحة سريعة</label>
                    <textarea id="quickBlurb" rows="2" placeholder="خبرة، ملاحظات إضافية..."></textarea>
                </div>
                <div class="form-group password-section" id="passwordFieldGroup">
                    <label>كلمة المرور *</label>
                    <input type="password" id="userPassword" placeholder="••••••••" required>
                    <button type="button" class="password-toggle" id="togglePassword" title="إظهار/إخفاء">
                        <i class="far fa-eye"></i>
                    </button>
                    <div class="field-hint" id="passwordHint">أدخل كلمة مرور قوية (6 أحرف على الأقل)</div>
                </div>
                <div class="form-group">
                    <label>الحالة</label>
                    <select id="userStatus">
                        <option value="active">✅ نشط</option>
                        <option value="blocked">⛔ محظور</option>
                    </select>
                </div>
                <div class="row-buttons">
                    <button id="saveFormBtn" class="btn btn-primary"><i class="fas fa-save"></i> حفظ</button>
                </div>
                
                <div class="keyboard-scroll-spacer"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { firebaseConfig } from './firebase-config.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue, set, update, get, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // ============ تهيئة Firebase ============
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const API_KEY = firebaseConfig.apiKey;
        const SIGN_UP_URL = `https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=${API_KEY}`;
        const DELETE_URL = `https://identitytoolkit.googleapis.com/v1/accounts:delete?key=${API_KEY}`;

        // ============ متغير المجمع الطبي (Tenant ID) ============
        let currentAdminId = null;
        let currentTenantId = null;
        
        // ============ مراجع Firebase مع ربط بالمجمع ============
        let tenantUsersRef = null;
        let tenantLinksRef = null;

        // ============ ثوابت التخزين المحلي ============
        const STORAGE_PREFIX = 'shifa_tenant_';
        
        // ✅ مفاتيح تسجيل الدخول فقط (اللي هتمسح عند الخروج)
        const LOGIN_STORAGE_KEYS = [
            'shifa_session',           // الجلسة القديمة
            'shifa_remember',          // تذكرني
            'shifa_last_login',        // آخر تسجيل دخول
            'shifa_secure_session'     // الجلسة المشفرة الجديدة
        ];

        // ============ المتغيرات العامة ============
        let allUsers = [];
        let doctorsList = [];
        let linksMap = {};
        let currentEditId = null;
        let currentViewId = null;
        let currentUserPassword = null;
        let unsubscribeUsers = null;
        let unsubscribeLinks = null;
        let searchTimer = null;
        let isOnline = navigator.onLine;

        // ============ دوال مساعدة ============
        const $ = (sel) => document.querySelector(sel);
        const $$ = (sel) => document.querySelectorAll(sel);

        const escapeHtml = (str) => {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        };

        const showToast = (msg, isError = false) => {
            const container = $('#toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${isError ? 'error' : ''}`;
            toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i> ${msg}`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('removing');
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        };

        // ============ دوال التخزين المحلي لكل مجمع ============
        
        const getTenantStorageKey = (baseKey) => {
            return currentTenantId ? `${STORAGE_PREFIX}${currentTenantId}_${baseKey}` : baseKey;
        };

        const setSyncStatus = (status) => {
            const indicator = $('#syncIndicator');
            if (indicator) {
                indicator.className = `sync-indicator ${status}`;
                indicator.title = status === 'synced' ? 'متزامن مع السحابة' : 'جاري المزامنة...';
            }
        };

        const saveToLocalDB = () => {
            if (!currentTenantId) return;
            try {
                const usersData = {};
                allUsers.forEach(u => {
                    usersData[u.id] = { ...u };
                    delete usersData[u.id]._linkedDoctorIds;
                });
                localStorage.setItem(getTenantStorageKey('users'), JSON.stringify(usersData));
                localStorage.setItem(getTenantStorageKey('links'), JSON.stringify(linksMap));
            } catch (e) {
                console.warn('تعذر الحفظ في التخزين المحلي:', e.message);
            }
        };

        const loadFromLocalDB = () => {
            if (!currentTenantId) return false;
            try {
                const usersData = localStorage.getItem(getTenantStorageKey('users'));
                const linksData = localStorage.getItem(getTenantStorageKey('links'));
                
                if (usersData) {
                    const parsed = JSON.parse(usersData);
                    allUsers = Object.keys(parsed).map(id => ({
                        id,
                        ...parsed[id]
                    }));
                }
                
                if (linksData) {
                    linksMap = JSON.parse(linksData);
                }
                
                return allUsers.length > 0;
            } catch (e) {
                console.warn('تعذر تحميل التخزين المحلي:', e.message);
                return false;
            }
        };

        const savePasswordLocally = (uid, password) => {
            if (!currentTenantId) return;
            try {
                const storageKey = getTenantStorageKey('passwords');
                const passwords = JSON.parse(localStorage.getItem(storageKey) || '{}');
                passwords[uid] = password;
                localStorage.setItem(storageKey, JSON.stringify(passwords));
            } catch (e) {
                console.warn('تعذر حفظ كلمة المرور محلياً:', e.message);
            }
        };

        const getPasswordLocally = (uid) => {
            if (!currentTenantId) return null;
            try {
                const storageKey = getTenantStorageKey('passwords');
                const passwords = JSON.parse(localStorage.getItem(storageKey) || '{}');
                return passwords[uid] || null;
            } catch (e) {
                return null;
            }
        };

        const removePasswordLocally = (uid) => {
            if (!currentTenantId) return;
            try {
                const storageKey = getTenantStorageKey('passwords');
                const passwords = JSON.parse(localStorage.getItem(storageKey) || '{}');
                delete passwords[uid];
                localStorage.setItem(storageKey, JSON.stringify(passwords));
            } catch (e) {
                // تجاهل
            }
        };

        // ============ مزامنة البيانات ============
        
        const updateStats = () => {
            const total = allUsers.length;
            const doctors = allUsers.filter(u => u.role === 'doctor').length;
            const nurses = allUsers.filter(u => u.role === 'nurse').length;
            const pharmacists = allUsers.filter(u => u.role === 'pharmacist').length;
            
            const el = (id) => document.getElementById(id);
            if (el('statTotal')) el('statTotal').textContent = total;
            if (el('statDoctors')) el('statDoctors').textContent = doctors;
            if (el('statNurses')) el('statNurses').textContent = nurses;
            if (el('statPharmacists')) el('statPharmacists').textContent = pharmacists;
        };

        const combineAndRender = () => {
            const arr = [];
            doctorsList = [];
            
            allUsers.forEach(user => {
                const u = { ...user };
                if (u.role === 'nurse') {
                    u._linkedDoctorIds = Object.keys(linksMap[u.id] || {});
                }
                arr.push(u);
                if (u.role === 'doctor') doctorsList.push(u);
            });
            
            allUsers = arr;
            updateStats();
            renderGrid();
            populateDoctorsCheckboxes();
            
            // حفظ في التخزين المحلي
            saveToLocalDB();
        };

        const startListeners = () => {
            if (!tenantUsersRef || !tenantLinksRef) return;
            
            if (unsubscribeUsers) unsubscribeUsers();
            if (unsubscribeLinks) unsubscribeLinks();

            // مستمع Firebase للبيانات - مربوط بالمجمع الحالي
            unsubscribeUsers = onValue(tenantUsersRef, (snap) => {
                const usersArray = [];
                snap.forEach(child => {
                    usersArray.push({ id: child.key, ...child.val() });
                });
                allUsers = usersArray;
                combineAndRender();
                setSyncStatus('synced');
            }, (error) => {
                console.warn('خطأ في الاتصال بـ Firebase، استخدام البيانات المحلية:', error.message);
                setSyncStatus('syncing');
                if (allUsers.length === 0) {
                    loadFromLocalDB();
                    combineAndRender();
                }
            });

            // مستمع الروابط - مربوط بالمجمع الحالي
            unsubscribeLinks = onValue(tenantLinksRef, (snap) => {
                linksMap = snap.val() || {};
                if (allUsers.length) combineAndRender();
            }, (error) => {
                console.warn('خطأ في تحميل الروابط:', error.message);
            });
        };

        // ============ القوائم المنسدلة للأطباء ============
        
        const populateDoctorsCheckboxes = () => {
            const container = $('#assignedDoctorsCheckboxGroup');
            if (!container) return;
            container.innerHTML = '';
            
            if (doctorsList.length === 0) {
                container.innerHTML = '<div style="padding:10px; color:var(--text-sec);">لا يوجد أطباء مسجلين بعد</div>';
                return;
            }
            
            doctorsList.forEach(doc => {
                const label = document.createElement('label');
                label.dataset.doctorId = doc.id;
                label.innerHTML = `
                    <input type="checkbox" value="${doc.id}"> 
                    ${escapeHtml(doc.name || 'بدون اسم')} 
                    <small style="color:var(--text-sec);">(${escapeHtml(doc.email || '')})</small>
                    <i class="fas fa-check-circle checkmark-icon" style="display:none;"></i>
                `;
                
                const checkbox = label.querySelector('input[type="checkbox"]');
                const checkmark = label.querySelector('.checkmark-icon');
                
                checkbox.addEventListener('change', () => {
                    if (checkbox.checked) {
                        label.classList.add('selected');
                        checkmark.style.display = 'inline';
                    } else {
                        label.classList.remove('selected');
                        checkmark.style.display = 'none';
                    }
                });
                
                container.appendChild(label);
            });
        };

        // ============ عرض الشبكة ============
        
        const renderGrid = () => {
            const term = $('#searchInput')?.value.toLowerCase() || '';
            const filtered = allUsers.filter(u =>
                (u.name?.toLowerCase().includes(term)) ||
                (u.email?.toLowerCase().includes(term)) ||
                (u.role?.includes(term))
            );
            
            const grid = $('#usersGrid');
            if (!grid) return;
            
            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-user-slash"></i>
                        <h3>لا يوجد مستخدمون مطابقون</h3>
                        <p>جرب مصطلح بحث مختلف</p>
                    </div>`;
                return;
            }
            
            grid.innerHTML = filtered.map(user => {
                const roleText = { doctor: 'طبيب', nurse: 'ممرض', pharmacist: 'صيدلي', admin: 'مدير' }[user.role] || user.role;
                const roleClass = `role-${user.role}`;
                const statusDot = user.status === 'blocked' ? 'blocked' : 'active';
                
                let avatarIcon = 'fa-user';
                if (user.role === 'doctor') avatarIcon = 'fa-user-md';
                else if (user.role === 'nurse') avatarIcon = 'fa-user-nurse';
                else if (user.role === 'pharmacist') avatarIcon = 'fa-prescription';
                else if (user.role === 'admin') avatarIcon = 'fa-user-shield';
                
                let assignedInfo = '';
                if (user.role === 'nurse') {
                    const linkedIds = user._linkedDoctorIds || [];
                    const names = linkedIds
                        .map(id => {
                            const doc = doctorsList.find(d => d.id === id);
                            return doc ? doc.name : '';
                        })
                        .filter(Boolean)
                        .join('، ');
                    assignedInfo = names
                        ? `<div class="assigned-doctors"><i class="fas fa-user-md"></i> ${escapeHtml(names)}</div>`
                        : `<div class="assigned-doctors" style="color:#c62828;"><i class="fas fa-exclamation-triangle"></i> غير محدد</div>`;
                }
                
                return `
                <div class="user-card" data-id="${user.id}">
                    <div class="card-status-dot ${statusDot}"></div>
                    <div class="card-avatar">
                        <div class="avatar-circle"><i class="fas ${avatarIcon}"></i></div>
                    </div>
                    <div class="user-name">${escapeHtml(user.name || 'بدون اسم')}</div>
                    <div style="text-align:center">
                        <span class="role-tag ${roleClass}">${roleText}</span>
                    </div>
                    ${assignedInfo}
                    <div class="user-bio">
                        <i class="fas fa-pen"></i> ${escapeHtml((user.quickBlurb || '').substring(0, 50) || 'لا توجد لمحة')}
                    </div>
                    <div class="card-footer">
                        <span>${user.status === 'active' ? '✅' : '⛔'} ${user.status === 'active' ? 'نشط' : 'محظور'}</span>
                        <small><i class="far fa-envelope"></i> ${escapeHtml(user.email)}</small>
                    </div>
                </div>`;
            }).join('');
        };

        // ============ المودالات ============
        
        const openDetailModal = (id) => {
            const user = allUsers.find(u => u.id === id);
            if (!user) return;
            currentViewId = id;
            
            const savedPassword = getPasswordLocally(id);
            currentUserPassword = savedPassword || 'غير معروفة';
            
            $('#detailNameTitle').textContent = user.name || 'تفاصيل';
            $('#detailName').textContent = user.name || '-';
            $('#detailEmail').textContent = user.email || '-';
            $('#detailPhone').textContent = user.phone || 'غير محدد';
            
            const roleText = { doctor: 'طبيب', nurse: 'ممرض', pharmacist: 'صيدلي', admin: 'مدير' }[user.role] || user.role;
            $('#detailRoleSpan').innerHTML = `<span class="role-tag role-${user.role}">${roleText}</span>`;
            
            $('#detailUid').textContent = user.id || '-';
            $('#detailStatusSpan').innerHTML = user.status === 'active'
                ? '<span style="color:#2E7D32;">✅ نشط</span>'
                : '<span style="color:#C62828;">⛔ محظور</span>';
            
            $('#quickBlurbDisplay').textContent = user.quickBlurb || 'لا توجد لمحة';
            $('#passwordText').textContent = currentUserPassword;
            
            let avatarIcon = 'fa-user';
            if (user.role === 'doctor') avatarIcon = 'fa-user-md';
            else if (user.role === 'nurse') avatarIcon = 'fa-user-nurse';
            else if (user.role === 'pharmacist') avatarIcon = 'fa-prescription';
            else if (user.role === 'admin') avatarIcon = 'fa-user-shield';
            $('#detailAvatarIcon').className = 'fas ' + avatarIcon;
            
            const specialtyRow = $('#detailSpecialtyRow');
            if (user.role === 'doctor' && user.specialty) {
                $('#detailSpecialty').textContent = user.specialty;
                specialtyRow.style.display = 'flex';
            } else {
                specialtyRow.style.display = 'none';
            }
            
            const assignedSection = $('#detailAssignedDoctorsSection');
            if (user.role === 'nurse') {
                const linkedIds = user._linkedDoctorIds || [];
                const names = linkedIds
                    .map(docId => {
                        const doc = doctorsList.find(d => d.id === docId);
                        return doc ? doc.name : '';
                    })
                    .filter(Boolean)
                    .join('، ');
                $('#detailAssignedDoctors').textContent = names || 'غير محدد';
                assignedSection.style.display = 'block';
            } else {
                assignedSection.style.display = 'none';
            }
            
            $('#detailModal').style.display = 'flex';
        };

        const closeDetailModal = () => {
            $('#detailModal').style.display = 'none';
            currentViewId = null;
            currentUserPassword = null;
        };

        const openAddModal = () => {
            currentEditId = null;
            currentUserPassword = null;
            $('#formModalTitle').innerHTML = '<i class="fas fa-user-plus"></i> إضافة مستخدم';
            $('#userName').value = '';
            $('#userEmail').value = '';
            $('#userPhone').value = '';
            $('#userRole').value = '';
            $('#userSpecialty').value = '';
            $('#quickBlurb').value = '';
            $('#userPassword').value = '';
            $('#userPassword').required = true;
            $('#userStatus').value = 'active';
            
            $('#passwordFieldGroup').style.display = 'block';
            $('#passwordHint').textContent = 'أدخل كلمة مرور قوية (6 أحرف على الأقل)';
            
            $('#assignDoctorsGroup').style.display = 'none';
            $('#specialtyGroup').style.display = 'none';
            
            $$('#assignedDoctorsCheckboxGroup input[type=checkbox]').forEach(cb => {
                cb.checked = false;
                const label = cb.closest('label');
                if (label) {
                    label.classList.remove('selected');
                    const checkmark = label.querySelector('.checkmark-icon');
                    if (checkmark) checkmark.style.display = 'none';
                }
            });
            $('#formModal').style.display = 'flex';
        };

        const openEditModal = (user) => {
            currentEditId = user.id;
            $('#formModalTitle').innerHTML = '<i class="fas fa-edit"></i> تعديل المستخدم';
            $('#userName').value = user.name || '';
            $('#userEmail').value = user.email || '';
            $('#userPhone').value = user.phone || '';
            $('#userRole').value = user.role || '';
            $('#userSpecialty').value = user.specialty || '';
            $('#quickBlurb').value = user.quickBlurb || '';
            $('#userStatus').value = user.status || 'active';
            
            $('#passwordFieldGroup').style.display = 'none';
            $('#userPassword').required = false;
            $('#userPassword').value = '';
            
            const role = user.role;
            $('#assignDoctorsGroup').style.display = role === 'nurse' ? 'block' : 'none';
            $('#specialtyGroup').style.display = role === 'doctor' ? 'block' : 'none';
            
            if (role === 'nurse') {
                const checkboxes = $$('#assignedDoctorsCheckboxGroup input[type=checkbox]');
                const linkedIds = user._linkedDoctorIds || [];
                checkboxes.forEach(cb => {
                    cb.checked = linkedIds.includes(cb.value);
                    const label = cb.closest('label');
                    if (label) {
                        const checkmark = label.querySelector('.checkmark-icon');
                        if (cb.checked) {
                            label.classList.add('selected');
                            if (checkmark) checkmark.style.display = 'inline';
                        } else {
                            label.classList.remove('selected');
                            if (checkmark) checkmark.style.display = 'none';
                        }
                    }
                });
            }
            $('#formModal').style.display = 'flex';
        };

        const closeFormModal = () => {
            $('#formModal').style.display = 'none';
            currentEditId = null;
        };

        // ============ الأحداث ============
        
        $('#userRole').addEventListener('change', (e) => {
            const role = e.target.value;
            $('#assignDoctorsGroup').style.display = role === 'nurse' ? 'block' : 'none';
            $('#specialtyGroup').style.display = role === 'doctor' ? 'block' : 'none';
        });

        $('#togglePassword').addEventListener('click', function() {
            const pwdField = $('#userPassword');
            const icon = this.querySelector('i');
            if (pwdField.type === 'password') {
                pwdField.type = 'text';
                icon.className = 'far fa-eye-slash';
            } else {
                pwdField.type = 'password';
                icon.className = 'far fa-eye';
            }
        });

        $('#detailPassword').addEventListener('click', () => {
            if (currentUserPassword && currentUserPassword !== 'غير معروفة') {
                navigator.clipboard.writeText(currentUserPassword).then(() => {
                    showToast('📋 تم نسخ كلمة المرور');
                }).catch(() => {
                    showToast('فشل النسخ', true);
                });
            }
        });

        // ============ عمليات الحفظ ============
        
        const saveUser = async () => {
            const name = $('#userName').value.trim();
            const email = $('#userEmail').value.trim();
            const phone = $('#userPhone').value.trim();
            const role = $('#userRole').value;
            const specialty = $('#userSpecialty').value.trim();
            const quickBlurb = $('#quickBlurb').value.trim();
            const status = $('#userStatus').value;
            const password = $('#userPassword').value;

            if (!name || !email || !role) {
                showToast('الاسم والبريد والدور مطلوبة', true);
                return;
            }

            // إضافة معرف المجمع الطبي للبيانات
            const userData = {
                name,
                email,
                phone,
                role,
                specialty: role === 'doctor' ? specialty : '',
                quickBlurb,
                status,
                tenantId: currentTenantId,
                createdBy: currentAdminId
            };

            let selectedDoctorIds = [];
            if (role === 'nurse') {
                const checkboxes = $$('#assignedDoctorsCheckboxGroup input[type=checkbox]:checked');
                selectedDoctorIds = Array.from(checkboxes).map(cb => cb.value);
                if (selectedDoctorIds.length === 0) {
                    showToast('يجب اختيار طبيب واحد على الأقل للممرضة', true);
                    return;
                }
            }

            try {
                if (currentEditId) {
                    // تعديل مستخدم موجود (بدون تغيير كلمة المرور)
                    await update(ref(db, `tenants/${currentTenantId}/users/${currentEditId}`), userData);
                    
                    if (role === 'nurse') {
                        await saveNurseDoctorLinks(currentEditId, selectedDoctorIds);
                    }
                    
                    showToast('✅ تم التعديل بنجاح');
                    closeFormModal();
                } else {
                    // إضافة مستخدم جديد
                    if (!password) {
                        showToast('كلمة المرور مطلوبة', true);
                        return;
                    }
                    if (password.length < 6) {
                        showToast('كلمة المرور يجب أن تكون 6 أحرف على الأقل', true);
                        return;
                    }

                    setSyncStatus('syncing');
                    
                    const signUpRes = await fetch(SIGN_UP_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password, returnSecureToken: false })
                    });
                    
                    const signUpData = await signUpRes.json();
                    if (!signUpRes.ok) {
                        if (signUpData.error?.message === 'EMAIL_EXISTS') {
                            throw new Error('البريد الإلكتروني مستخدم بالفعل');
                        }
                        throw new Error(signUpData.error?.message || 'فشل إنشاء الحساب');
                    }
                    
                    const uid = signUpData.localId;
                    userData.created_at = new Date().toISOString();
                    
                    // حفظ المستخدم في مسار المجمع الخاص
                    await set(ref(db, `tenants/${currentTenantId}/users/${uid}`), userData);
                    
                    // حفظ كلمة المرور في التخزين المحلي
                    savePasswordLocally(uid, password);
                    
                    if (role === 'nurse') {
                        await saveNurseDoctorLinks(uid, selectedDoctorIds);
                    }
                    
                    setSyncStatus('synced');
                    showToast('🎉 تم إضافة المستخدم بنجاح');
                    closeFormModal();
                }
            } catch (err) {
                setSyncStatus('synced');
                showToast(err.message, true);
            }
        };

        const saveNurseDoctorLinks = async (nurseId, doctorIds) => {
            const linkRef = ref(db, `tenants/${currentTenantId}/links/${nurseId}`);
            await set(linkRef, null);
            if (doctorIds.length === 0) return;
            const updates = {};
            doctorIds.forEach(docId => { updates[docId] = true; });
            await set(linkRef, updates);
        };

        const toggleBlockUser = async (id, newStatus) => {
            await update(ref(db, `tenants/${currentTenantId}/users/${id}`), { status: newStatus });
            showToast(newStatus === 'blocked' ? '🔒 تم الحظر' : '🔓 تم إلغاء الحظر');
            closeDetailModal();
        };

        const deleteUserAccount = async (id) => {
            const user = allUsers.find(u => u.id === id);
            if (!user) {
                showToast('المستخدم غير موجود', true);
                return;
            }

            const confirmed = confirm(
                `⚠️ هل أنت متأكد من حذف المستخدم "${user.name || 'بدون اسم'}"؟\n\n` +
                `البريد: ${user.email}\n` +
                `الدور: ${user.role}\n\n` +
                `سيتم حذف الحساب نهائياً من Authentication وقاعدة البيانات!`
            );

            if (!confirmed) return;

            try {
                if (user.role === 'nurse') {
                    await remove(ref(db, `tenants/${currentTenantId}/links/${id}`));
                }

                await remove(ref(db, `tenants/${currentTenantId}/users/${id}`));

                // حذف كلمة المرور المخزنة محلياً
                removePasswordLocally(id);

                try {
                    const currentUser = auth.currentUser;
                    if (currentUser) {
                        const idToken = await currentUser.getIdToken();
                        await fetch(DELETE_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ 
                                idToken: idToken,
                                localId: id 
                            })
                        });
                    }
                } catch (authError) {
                    console.warn('لم يتم حذف حساب Authentication:', authError);
                }

                showToast('🗑️ تم حذف المستخدم بنجاح');
                closeDetailModal();
            } catch (err) {
                console.error('خطأ في حذف المستخدم:', err);
                showToast('❌ فشل حذف المستخدم: ' + err.message, true);
            }
        };

        // ============ ✅ تسجيل الخروج - يمسح بيانات الجلسة فقط ويحتفظ ببيانات المجمع ============
        
        /**
         * مسح مفاتيح تسجيل الدخول فقط (الجلسة المشفرة)
         * مع الحفاظ على بيانات المجمع المحلية (المستخدمين، الروابط، كلمات المرور)
         */
        const clearLoginSessionOnly = () => {
            try {
                // 1️⃣ مسح مفاتيح تسجيل الدخول المعروفة
                LOGIN_STORAGE_KEYS.forEach(key => {
                    localStorage.removeItem(key);
                });
                
                // 2️⃣ مسح أي مفاتيح تبدأ بـ shifa_session أو shifa_secure (الجلسات فقط)
                // لكن نحتفظ بـ shifa_tenant_ (بيانات المجمع)
                const sessionKeysToRemove = [];
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (key && (key.startsWith('shifa_session') || key.startsWith('shifa_secure'))) {
                        sessionKeysToRemove.push(key);
                    }
                }
                sessionKeysToRemove.forEach(key => localStorage.removeItem(key));
                
                // 3️⃣ مسح sessionStorage بالكامل (بيانات الجلسة المؤقتة)
                sessionStorage.clear();
                
                console.log(`✅ تم مسح ${LOGIN_STORAGE_KEYS.length + sessionKeysToRemove.length} مفتاح جلسة`);
                console.log('💾 تم الإبقاء على بيانات المجمع المحلية (المستخدمين، الروابط، كلمات المرور)');
            } catch (e) {
                console.warn('تعذر مسح بيانات الجلسة:', e.message);
            }
        };

        /**
         * تسجيل الخروج الآمن - يمسح الجلسة فقط ويحتفظ ببيانات المجمع
         */
        const logout = async () => {
            try {
                showToast('👋 جاري تسجيل الخروج...');
                
                // 1. إلغاء مستمعي Firebase
                if (unsubscribeUsers) {
                    unsubscribeUsers();
                    unsubscribeUsers = null;
                }
                if (unsubscribeLinks) {
                    unsubscribeLinks();
                    unsubscribeLinks = null;
                }
                
                // 2. ✅ مسح بيانات الجلسة فقط (وليس بيانات المجمع)
                clearLoginSessionOnly();
                
                // 3. مسح المتغيرات العامة في الذاكرة فقط
                allUsers = [];
                doctorsList = [];
                linksMap = {};
                currentAdminId = null;
                currentTenantId = null;
                
                // 4. تسجيل الخروج من Firebase Auth
                await signOut(auth);
                
                // 5. إعادة التوجيه لصفحة تسجيل الدخول
                window.location.href = 'index.html';
                
            } catch (error) {
                console.error('خطأ أثناء تسجيل الخروج:', error);
                
                // حتى في حالة الخطأ، نمسح الجلسة فقط ونتوجه لصفحة الدخول
                clearLoginSessionOnly();
                window.location.href = 'index.html';
            }
        };

        // ============ التحقق من الصلاحية ============
        
        const checkAdminAuth = () => {
            onAuthStateChanged(auth, async (user) => {
                if (!user) {
                    // مسح بيانات الجلسة فقط
                    clearLoginSessionOnly();
                    window.location.href = 'index.html';
                    return;
                }
                
                try {
                    // البحث عن بيانات الأدمن في مسار المجمع
                    const adminRef = ref(db, `tenants/${user.uid}/users/${user.uid}`);
                    const adminSnap = await get(adminRef);
                    
                    let adminData = null;
                    if (adminSnap.exists()) {
                        adminData = adminSnap.val();
                    } else {
                        // توافق مع المسار القديم
                        const oldRef = ref(db, `users/${user.uid}`);
                        const oldSnap = await get(oldRef);
                        if (oldSnap.exists()) {
                            adminData = oldSnap.val();
                        }
                    }
                    
                    if (!adminData || adminData.role !== 'admin') {
                        showToast('غير مصرح لك بالدخول', true);
                        clearLoginSessionOnly();
                        await signOut(auth);
                        window.location.href = 'index.html';
                        return;
                    }
                    
                    // تعيين معرفات المجمع الحالي
                    currentAdminId = user.uid;
                    currentTenantId = user.uid;
                    
                    // إعداد مراجع Firebase للمجمع الحالي
                    tenantUsersRef = ref(db, `tenants/${currentTenantId}/users`);
                    tenantLinksRef = ref(db, `tenants/${currentTenantId}/links`);
                    
                    // عرض معرف المجمع
                    const tenantDisplay = adminData.tenantName || adminData.name || 'المجمع الطبي';
                    $('#tenantIdDisplay').textContent = tenantDisplay;
                    
                    // تحميل البيانات المحلية فوراً للعرض السريع
                    loadFromLocalDB();
                    if (allUsers.length > 0) {
                        combineAndRender();
                    }
                    
                    $('#authCheckLoader').style.display = 'none';
                    $('#mainContainer').style.display = 'block';
                    startListeners();
                    
                } catch (err) {
                    console.error('خطأ في التحقق من الصلاحية:', err);
                    
                    // استخدام البيانات المحلية في حالة فشل الاتصال
                    const localSession = localStorage.getItem('shifa_secure_session') || 
                                        localStorage.getItem('shifa_session');
                    if (localSession) {
                        try {
                            const session = JSON.parse(localSession);
                            if (session.role === 'admin' && session.uid === user.uid) {
                                currentAdminId = user.uid;
                                currentTenantId = user.uid;
                                tenantUsersRef = ref(db, `tenants/${currentTenantId}/users`);
                                tenantLinksRef = ref(db, `tenants/${currentTenantId}/links`);
                                
                                $('#tenantIdDisplay').textContent = session.name || 'المجمع الطبي';
                                $('#authCheckLoader').style.display = 'none';
                                $('#mainContainer').style.display = 'block';
                                
                                loadFromLocalDB();
                                combineAndRender();
                                if (!unsubscribeUsers) startListeners();
                                return;
                            }
                        } catch (parseError) {
                            // تجاهل
                        }
                    }
                    
                    // فشل تام
                    clearLoginSessionOnly();
                    window.location.href = 'index.html';
                }
            });
        };

        // ============ تهيئة الأحداث ============
        
        const initEvents = () => {
            $('#searchInput')?.addEventListener('input', () => {
                clearTimeout(searchTimer);
                searchTimer = setTimeout(renderGrid, 200);
            });

            $('#usersGrid').addEventListener('click', (e) => {
                const card = e.target.closest('.user-card');
                if (card) openDetailModal(card.dataset.id);
            });

            $('#addUserBtn').onclick = openAddModal;
            $('#refreshBtn').onclick = () => {
                setSyncStatus('syncing');
                showToast('🔄 جاري تحديث البيانات...');
                setTimeout(() => setSyncStatus('synced'), 1500);
            };
            $('#logoutBtn').onclick = logout;

            $('#saveFormBtn').onclick = saveUser;
            $('#closeFormBtn').onclick = closeFormModal;
            $('#closeDetailBtn').onclick = closeDetailModal;
            $('#deleteModalBtn').onclick = () => currentViewId && deleteUserAccount(currentViewId);
            $('#blockModalBtn').onclick = () => currentViewId && toggleBlockUser(currentViewId, 'blocked');
            $('#unblockModalBtn').onclick = () => currentViewId && toggleBlockUser(currentViewId, 'active');
            $('#editModalBtn').onclick = () => {
                const user = allUsers.find(u => u.id === currentViewId);
                if (user) {
                    closeDetailModal();
                    openEditModal(user);
                }
            };

            window.onclick = (e) => {
                if (e.target === $('#detailModal')) closeDetailModal();
                if (e.target === $('#formModal')) closeFormModal();
            };

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    if ($('#detailModal').style.display === 'flex') closeDetailModal();
                    if ($('#formModal').style.display === 'flex') closeFormModal();
                }
            });
            
            window.addEventListener('online', () => {
                isOnline = true;
                setSyncStatus('syncing');
                showToast('📡 تم استعادة الاتصال - جاري المزامنة');
                if (unsubscribeUsers) {
                    unsubscribeUsers();
                    unsubscribeUsers = null;
                }
                if (unsubscribeLinks) {
                    unsubscribeLinks();
                    unsubscribeLinks = null;
                }
                startListeners();
            });
            
            window.addEventListener('offline', () => {
                isOnline = false;
                setSyncStatus('syncing');
                showToast('⚠️ انقطع الاتصال - استخدام البيانات المحلية', true);
            });
            
            window.addEventListener('beforeunload', () => {
                if (unsubscribeUsers) unsubscribeUsers();
                if (unsubscribeLinks) unsubscribeLinks();
            });
        };

        // ============ بدء التشغيل ============
        initEvents();
        checkAdminAuth();
        
        console.log('🚀 لوحة إدارة شفاء - نظام المجمعات الطبية المتعددة');
        console.log('💾 وضع الحفظ: يمسح جلسة الدخول فقط - يحتفظ ببيانات المجمع');
    </script>
</body>
</html>
