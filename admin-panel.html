<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>سكون | لوحة الإدارة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* الألوان والتنسيقات كما هي - لم تتغير */
        :root {
            --primary: #7AC5C5;
            --primary-dark: #5BA3A3;
            --accent: #5BA3A3;
            --accent-dark: #3F8585;
            --bg: #ECF9F9;
            --white: #FFFFFF;
            --ink: #2C4A4A;
            --text-sec: #6B8E8E;
            --danger: #E57373;
            --success: #5FA88D;
            --warning: #F4B886;
            --border-light: #C5E0E0;
            --shadow-sm: 0 4px 6px -2px rgba(58, 128, 128, 0.08);
            --shadow-md: 0 10px 25px -5px rgba(58, 128, 128, 0.12);
            --radius-card: 24px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 0% 0%, rgba(122,197,197,0.08), transparent 50%),
                        radial-gradient(circle at 100% 100%, rgba(91,163,163,0.08), transparent 50%);
            pointer-events: none;
            z-index: -1;
        }
        .container { max-width: 1300px; margin: 0 auto; }
        .mini-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(16px);
            border-radius: 60px;
            padding: 12px 24px;
            margin-bottom: 24px;
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: var(--shadow-md);
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo-area h2 {
            font-size: 1.7rem;
            font-weight: 700;
            background: linear-gradient(145deg, var(--accent-dark), var(--primary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo-area h2 i { color: var(--primary); margin-left: 6px; }
        .controls-mini {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .search-glass {
            background: rgba(255,255,250,0.7);
            border-radius: 60px;
            padding: 8px 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid var(--border-light);
        }
        .search-glass i { color: var(--primary); }
        .search-glass input {
            background: transparent;
            border: none;
            padding: 6px 0;
            font-family: 'Cairo', sans-serif;
            font-size: 0.9rem;
            width: 160px;
            outline: none;
        }
        .btn-glass {
            background: var(--primary);
            backdrop-filter: blur(4px);
            border: none;
            padding: 8px 20px;
            border-radius: 60px;
            color: white;
            font-weight: 600;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }
        .btn-glass:hover {
            background: var(--primary-dark);
            transform: scale(0.97);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .doctors-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 6px;
        }
        .doctor-card {
            background: rgba(255, 255, 245, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 18px 16px 20px;
            transition: all 0.2s ease;
            border: 1px solid var(--border-light);
            cursor: pointer;
            box-shadow: var(--shadow-sm);
        }
        .doctor-card:hover {
            transform: translateY(-4px);
            background: rgba(255, 255, 250, 0.85);
            border-color: var(--primary);
        }
        .card-avatar {
            display: flex;
            justify-content: center;
            margin-bottom: 12px;
        }
        .avatar-placeholder {
            width: 80px;
            height: 80px;
            background: linear-gradient(145deg, #9bc89b, #6f9e6f);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.4rem;
            color: white;
        }
        .doctor-name {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent-dark);
            text-align: center;
            margin-bottom: 6px;
        }
        .role-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            margin: 6px auto;
            text-align: center;
        }
        .role-doctor { background: #D6F0F0; color: #1A5C5C; }
        .role-nurse { background: #FDE2E2; color: #B23B3B; }
        .role-pharmacist { background: #DCF5E8; color: #1E6F4C; }
        .quick-note {
            background: rgba(240,248,235,0.7);
            border-radius: 20px;
            padding: 10px 12px;
            margin: 12px 0;
            font-size: 0.8rem;
            color: var(--ink);
            border-right: 3px solid var(--primary);
            max-height: 60px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .status-badge-sm {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 600;
            background: rgba(200,230,200,0.8);
            color: var(--accent-dark);
        }
        .status-blocked-sm {
            background: rgba(255,210,210,0.9);
            color: #B23B3B;
        }
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
        }
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(30,50,50,0.3);
            backdrop-filter: blur(6px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 16px;
        }
        .modal-card {
            background: white;
            border-radius: 32px;
            width: 90%;
            max-width: 650px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 30px 60px rgba(0,40,40,0.15);
        }
        .modal-header {
            padding: 22px 28px;
            background: #F0F7F7;
            border-bottom: 1px solid var(--border-light);
            border-radius: 32px 32px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-body { padding: 24px 28px; }
        .close-btn {
            background: none;
            border: none;
            font-size: 28px;
            color: var(--text-sec);
            cursor: pointer;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            border-radius: 16px;
            border: 1.5px solid var(--border-light);
            background: white;
            font-family: 'Cairo', sans-serif;
            font-size: 0.95rem;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(122,197,197,0.15);
        }
        .btn-secondary {
            background: #9e9e9e;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            color: white;
            font-weight: 500;
            cursor: pointer;
        }
        .row-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .btn-success { background: var(--success); }
        .tabs-container {
            margin-top: 20px;
            border-top: 1px solid var(--border-light);
        }
        .tabs-buttons {
            display: flex;
            gap: 5px;
            margin-top: 15px;
            border-bottom: 1px solid var(--border-light);
        }
        .tab-btn {
            background: transparent;
            border: none;
            padding: 10px 18px;
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
            color: var(--text-sec);
            cursor: pointer;
            border-radius: 30px 30px 0 0;
            transition: 0.2s;
        }
        .tab-btn.active {
            background: #F0F7F7;
            color: var(--accent-dark);
            border-bottom: 3px solid var(--primary);
        }
        .tab-pane {
            display: none;
            padding: 15px 0;
        }
        .tab-pane.active { display: block; }
        .notes-list {
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 12px;
        }
        .note-item {
            background: #F0F7F7;
            padding: 10px;
            border-radius: 24px;
            margin-bottom: 10px;
            font-size: 0.85rem;
        }
        .toast {
            position: fixed;
            bottom: 24px;
            left: 24px;
            right: 24px;
            background: var(--ink);
            color: white;
            padding: 14px 24px;
            border-radius: 60px;
            text-align: center;
            z-index: 1300;
            font-weight: 500;
            max-width: 500px;
            margin: 0 auto;
        }
        .empty-state {
            text-align: center;
            padding: 50px;
            color: var(--text-sec);
        }
        .assigned-doctor-info {
            background: #F0F7F7;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            margin-top: 8px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="mini-header">
        <div class="logo-area">
            <h2><i class="fas fa-spa"></i> سكون | الإدارة</h2>
        </div>
        <div class="controls-mini">
            <div class="search-glass">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="بحث بالاسم أو البريد">
            </div>
            <button class="btn-glass" id="addUserBtn"><i class="fas fa-user-plus"></i> مستخدم جديد</button>
            <button class="btn-glass" id="refreshBtn"><i class="fas fa-sync-alt"></i></button>
            <button class="btn-glass" id="logoutBtn" style="background:#6c757d;"><i class="fas fa-sign-out-alt"></i> خروج</button>
        </div>
    </div>
    <div id="usersGrid" class="doctors-grid">
        <div class="empty-state"><i class="fas fa-leaf"></i> جاري التحميل...</div>
    </div>
</div>

<!-- مودال تفاصيل المستخدم -->
<div id="detailModal" class="modal">
    <div class="modal-card">
        <div class="modal-header">
            <h3><i class="fas fa-user-md"></i> <span id="detailNameTitle">تفاصيل المستخدم</span></h3>
            <button class="close-btn" id="closeDetailBtn">&times;</button>
        </div>
        <div class="modal-body">
            <div style="display: flex; gap: 16px; flex-wrap: wrap; align-items: center; margin-bottom: 20px;">
                <div id="detailAvatarArea">
                    <div style="width:70px; height:70px; background:#bcd9aa; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:2rem;"><i class="fas fa-user"></i></div>
                </div>
                <div><strong id="detailName">الاسم</strong><br><span id="detailRoleSpan"></span></div>
            </div>
            <div><i class="fas fa-envelope"></i> <span id="detailEmail"></span></div>
            <div><i class="fas fa-phone"></i> <span id="detailPhone"></span></div>
            <div><i class="fas fa-id-card"></i> <span id="detailUid"></span> <small>(UID)</small></div>
            <div><i class="fas fa-toggle-on"></i> الحالة: <span id="detailStatusSpan"></span></div>
            <div id="assignedDoctorSection" style="display:none;"><i class="fas fa-user-md"></i> دكتور مسؤول: <span id="detailAssignedDoctor"></span></div>
            <hr>
            <div><strong><i class="fas fa-pen-fancy"></i> لمحة سريعة</strong></div>
            <div id="quickBlurbDisplay" class="quick-note" style="white-space: normal; background: #eef5e8;"></div>
            
            <div class="tabs-container">
                <div class="tabs-buttons">
                    <button class="tab-btn active" data-tab="infoTab">📋 المعلومات</button>
                    <button class="tab-btn" data-tab="notesTab">📝 الملاحظات</button>
                </div>
                <div id="infoTab" class="tab-pane active">
                    <div style="padding: 8px 0; color:var(--ink);">جميع البيانات موضحة أعلاه</div>
                </div>
                <div id="notesTab" class="tab-pane">
                    <div id="notesListModal" class="notes-list"></div>
                    <textarea id="newNoteText" rows="2" placeholder="أضف ملاحظة جديدة..."></textarea>
                    <button id="addNoteModalBtn" class="btn-glass" style="margin-top: 8px; width:100%;">➕ إضافة ملاحظة</button>
                </div>
            </div>

            <div class="row-buttons">
                <button id="blockModalBtn" class="btn-glass" style="background:#b85c5c;">🔒 حظر</button>
                <button id="unblockModalBtn" class="btn-glass" style="background:#4c8b4c;">🔓 إلغاء حظر</button>
                <button id="editModalBtn" class="btn-glass" style="background:#e68a2e;">✏️ تعديل</button>
                <button id="deleteModalBtn" class="btn-glass" style="background:#6c757d;">🗑️ حذف</button>
            </div>
        </div>
    </div>
</div>

<!-- مودال إضافة / تعديل مستخدم -->
<div id="formModal" class="modal">
    <div class="modal-card">
        <div class="modal-header">
            <h3 id="formModalTitle"><i class="fas fa-plus"></i> مستخدم جديد</h3>
            <button class="close-btn" id="closeFormBtn">&times;</button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <input type="text" id="userName" placeholder="الاسم الكامل *" required>
            </div>
            <div class="form-group">
                <input type="email" id="userEmail" placeholder="البريد الإلكتروني *" required>
            </div>
            <div class="form-group">
                <input type="text" id="userPhone" placeholder="رقم الهاتف">
            </div>
            <div class="form-group">
                <select id="userRole" required>
                    <option value="">-- اختر الدور --</option>
                    <option value="doctor">👨‍⚕️ طبيب</option>
                    <option value="nurse">👩‍⚕️ ممرض/ة</option>
                    <option value="pharmacist">💊 صيدلي</option>
                </select>
            </div>
            <div class="form-group" id="assignDoctorGroup" style="display:none;">
                <label>الدكتور المسؤول <span style="color:red;">*</span></label>
                <select id="assignedDoctorSelect">
                    <option value="">-- اختر الدكتور --</option>
                </select>
            </div>
            <div class="form-group">
                <input type="text" id="userSpecialty" placeholder="التخصص (للطبيب فقط)">
            </div>
            <div class="form-group">
                <textarea id="quickBlurb" rows="2" placeholder="لمحة سريعة (خبرة، ملاحظات...)"></textarea>
            </div>
            <div class="form-group">
                <input type="password" id="userPassword" placeholder="كلمة المرور *" required>
            </div>
            <div class="form-group">
                <select id="userStatus">
                    <option value="active">نشط</option>
                    <option value="blocked">محظور</option>
                </select>
            </div>
            <div class="row-buttons">
                <button id="saveFormBtn" class="btn-glass btn-success">💾 حفظ</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { firebaseConfig } from './firebase-config.js';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { 
        getFirestore, 
        collection, 
        query, 
        where, 
        onSnapshot, 
        doc, 
        setDoc, 
        updateDoc, 
        deleteDoc, 
        getDoc, 
        getDocs,
        serverTimestamp,
        addDoc,
        orderBy,
        limit
    } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
    import { getAuth, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    
    // مراجع Firestore
    const usersCol = collection(db, "users");
    
    let allUsers = [];
    let doctorsList = [];
    let currentEditId = null;
    let currentViewId = null;
    let unsubscribeUsers = null;

    // ========== دوال مساعدة ==========
    function showToast(msg, isErr = false) {
        const t = document.createElement('div');
        t.className = 'toast';
        t.style.background = isErr ? '#B23B3B' : '#2C4A4A';
        t.innerHTML = `<i class="fas ${isErr ? 'fa-exclamation-triangle' : 'fa-check'}"></i> ${msg}`;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2800);
    }

    function escapeHtml(str) { 
        if(!str) return ''; 
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m] || m); 
    }

    // ========== تحميل المستخدمين (Firestore) ==========
    function loadUsers() {
        if (unsubscribeUsers) unsubscribeUsers();
        
        const q = query(usersCol);
        unsubscribeUsers = onSnapshot(q, (snapshot) => {
            const arr = [];
            const docs = [];
            snapshot.forEach(docSnap => {
                const user = { id: docSnap.id, ...docSnap.data() };
                arr.push(user);
                if (user.role === 'doctor') {
                    docs.push(user);
                }
            });
            allUsers = arr;
            doctorsList = docs;
            renderGrid();
            populateDoctorSelect();
        }, (error) => {
            console.error("خطأ في تحميل المستخدمين:", error);
            showToast("فشل تحميل البيانات، تأكد من قواعد الأمان", true);
        });
    }

    function populateDoctorSelect() {
        const select = document.getElementById('assignedDoctorSelect');
        select.innerHTML = '<option value="">-- اختر الدكتور --</option>';
        doctorsList.forEach(doc => {
            const option = document.createElement('option');
            option.value = doc.id;
            option.textContent = `${doc.name || 'بدون اسم'} (${doc.email || ''})`;
            select.appendChild(option);
        });
    }

    function renderGrid() {
        const term = document.getElementById('searchInput')?.value.toLowerCase() || '';
        let filtered = allUsers.filter(u => 
            (u.name?.toLowerCase().includes(term) || u.email?.toLowerCase().includes(term) || u.role?.toLowerCase().includes(term))
        );
        const grid = document.getElementById('usersGrid');
        if (!grid) return;
        
        if(filtered.length === 0) {
            grid.innerHTML = '<div class="empty-state"><i class="fas fa-seedling"></i> لا يوجد مستخدمون</div>';
            return;
        }
        grid.innerHTML = filtered.map(user => {
            const roleClass = `role-${user.role}`;
            const roleText = { doctor: 'طبيب', nurse: 'ممرض', pharmacist: 'صيدلي' }[user.role] || user.role;
            const assignedInfo = user.role === 'nurse' && user.assignedDoctorName ? 
                `<div class="assigned-doctor-info"><i class="fas fa-user-md"></i> د. ${escapeHtml(user.assignedDoctorName)}</div>` : '';
            
            return `
            <div class="doctor-card" data-id="${user.id}">
                <div class="card-avatar">
                    <div class="avatar-placeholder"><i class="fas fa-user-md"></i></div>
                </div>
                <div class="doctor-name">${escapeHtml(user.name || 'بدون اسم')}</div>
                <div style="text-align:center"><span class="role-badge ${roleClass}"><i class="fas fa-tag"></i> ${roleText}</span></div>
                ${assignedInfo}
                <div class="quick-note"><i class="fas fa-quote-right"></i> ${escapeHtml(user.quickBlurb ? user.quickBlurb.substring(0, 55) : 'لا توجد لمحة')}</div>
                <div class="card-footer">
                    <span class="status-badge-sm ${user.status === 'blocked' ? 'status-blocked-sm' : ''}">${user.status === 'active' ? 'نشط' : 'محظور'}</span>
                    <small><i class="far fa-envelope"></i> ${escapeHtml(user.email)}</small>
                </div>
            </div>
            `;
        }).join('');
        
        document.querySelectorAll('.doctor-card').forEach(card => {
            card.addEventListener('click', (e) => {
                const id = card.getAttribute('data-id');
                openDetailModal(id);
            });
        });
    }

    // ========== تفاصيل المستخدم ==========
    async function openDetailModal(id) {
        const user = allUsers.find(u => u.id === id);
        if(!user) return;
        currentViewId = id;
        document.getElementById('detailNameTitle').innerText = user.name || 'تفاصيل';
        document.getElementById('detailName').innerText = user.name || '-';
        document.getElementById('detailEmail').innerText = user.email || '-';
        document.getElementById('detailPhone').innerText = user.phone || '-';
        const roleText = { doctor: 'طبيب', nurse: 'ممرض', pharmacist: 'صيدلي' }[user.role] || user.role;
        document.getElementById('detailRoleSpan').innerHTML = `<span class="role-badge role-${user.role}">${roleText}</span>`;
        document.getElementById('detailUid').innerText = user.id || '-';
        const statusSpan = document.getElementById('detailStatusSpan');
        statusSpan.innerHTML = user.status === 'active' ? '<span style="color:#2e7d32;">✅ نشط</span>' : '<span style="color:#c62828;">⛔ محظور</span>';
        document.getElementById('quickBlurbDisplay').innerHTML = user.quickBlurb ? escapeHtml(user.quickBlurb) : 'لا توجد لمحة';
        
        const assignedSection = document.getElementById('assignedDoctorSection');
        if (user.role === 'nurse' && user.assignedDoctorName) {
            assignedSection.style.display = 'block';
            document.getElementById('detailAssignedDoctor').innerText = user.assignedDoctorName;
        } else {
            assignedSection.style.display = 'none';
        }
        
        await loadNotesForModal(id);
        document.getElementById('detailModal').style.display = 'flex';
        setupTabs();
    }

    function setupTabs() {
        const btns = document.querySelectorAll('.tab-btn');
        btns.forEach(btn => {
            btn.removeEventListener('click', tabHandler);
            btn.addEventListener('click', tabHandler);
        });
        function tabHandler(e) {
            const tabId = e.currentTarget.getAttribute('data-tab');
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            e.currentTarget.classList.add('active');
            document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
        }
    }

    async function loadNotesForModal(userId) {
        const notesCol = collection(db, "users", userId, "notes");
        const q = query(notesCol, orderBy("date", "desc"));
        const snap = await getDocs(q);
        let notesHtml = '';
        if (snap.empty) {
            notesHtml = '<div style="padding:12px; text-align:center;">📭 لا توجد ملاحظات</div>';
        } else {
            snap.forEach(doc => {
                const n = doc.data();
                notesHtml += `<div class="note-item"><i class="far fa-calendar-alt"></i> ${n.date ? new Date(n.date.toDate()).toLocaleString('ar') : ''}<br>${escapeHtml(n.text)}</div>`;
            });
        }
        document.getElementById('notesListModal').innerHTML = notesHtml;
    }

    async function addNewNote(userId, text) {
        if(!text.trim()) { showToast('اكتب نص الملاحظة', true); return; }
        const notesCol = collection(db, "users", userId, "notes");
        await addDoc(notesCol, {
            text,
            date: serverTimestamp(),
            addedBy: 'admin'
        });
        showToast('📌 أُضيفت ملاحظة');
        await loadNotesForModal(userId);
    }

    // ========== فتح / إغلاق المودالات ==========
    function openAddModal() {
        currentEditId = null;
        document.getElementById('formModalTitle').innerHTML = '<i class="fas fa-user-plus"></i> مستخدم جديد';
        document.getElementById('userName').value = '';
        document.getElementById('userEmail').value = '';
        document.getElementById('userPhone').value = '';
        document.getElementById('userRole').value = '';
        document.getElementById('userSpecialty').value = '';
        document.getElementById('quickBlurb').value = '';
        document.getElementById('userPassword').value = '';
        document.getElementById('userStatus').value = 'active';
        document.getElementById('assignDoctorGroup').style.display = 'none';
        document.getElementById('formModal').style.display = 'flex';
        populateDoctorSelect();
    }

    function openEditModal(user) {
        currentEditId = user.id;
        document.getElementById('formModalTitle').innerHTML = '<i class="fas fa-edit"></i> تعديل المستخدم';
        document.getElementById('userName').value = user.name || '';
        document.getElementById('userEmail').value = user.email || '';
        document.getElementById('userPhone').value = user.phone || '';
        document.getElementById('userRole').value = user.role || '';
        document.getElementById('userSpecialty').value = user.specialty || '';
        document.getElementById('quickBlurb').value = user.quickBlurb || '';
        document.getElementById('userPassword').value = ''; // لا نعرض كلمة المرور
        document.getElementById('userStatus').value = user.status || 'active';
        
        const role = user.role;
        const group = document.getElementById('assignDoctorGroup');
        if (role === 'nurse') {
            group.style.display = 'block';
            if (user.assignedDoctorId) {
                setTimeout(() => {
                    const select = document.getElementById('assignedDoctorSelect');
                    if (select) select.value = user.assignedDoctorId;
                }, 200);
            }
        } else {
            group.style.display = 'none';
        }
        document.getElementById('formModal').style.display = 'flex';
        populateDoctorSelect();
    }

    function closeFormModal() { 
        document.getElementById('formModal').style.display = 'none'; 
        currentEditId = null;
    }
    function closeDetailModal() { 
        document.getElementById('detailModal').style.display = 'none'; 
        currentViewId = null;
    }

    // ========== حفظ المستخدم (Firestore + Auth) ==========
    document.getElementById('userRole').addEventListener('change', (e) => {
        const role = e.target.value;
        const group = document.getElementById('assignDoctorGroup');
        if (role === 'nurse') {
            group.style.display = 'block';
        } else {
            group.style.display = 'none';
        }
    });

    async function saveUser() {
        const name = document.getElementById('userName').value.trim();
        const email = document.getElementById('userEmail').value.trim();
        const phone = document.getElementById('userPhone').value.trim();
        const role = document.getElementById('userRole').value;
        const specialty = document.getElementById('userSpecialty').value.trim();
        const quickBlurb = document.getElementById('quickBlurb').value.trim();
        const password = document.getElementById('userPassword').value;
        const status = document.getElementById('userStatus').value;
        
        if (!name || !email || !role) {
            showToast('الاسم والبريد والدور مطلوبة', true);
            return;
        }
        
        let assignedDoctorId = null;
        let assignedDoctorName = null;
        if (role === 'nurse') {
            assignedDoctorId = document.getElementById('assignedDoctorSelect').value;
            if (!assignedDoctorId) {
                showToast('يجب اختيار الدكتور المسؤول للممرض', true);
                return;
            }
            const selectedDoc = doctorsList.find(d => d.id === assignedDoctorId);
            assignedDoctorName = selectedDoc ? selectedDoc.name : '';
        }

        const userData = {
            name, email, phone, role,
            specialty: role === 'doctor' ? specialty : '',
            quickBlurb,
            status,
            lastModified: serverTimestamp()
        };
        
        if (role === 'nurse') {
            userData.assignedDoctorId = assignedDoctorId;
            userData.assignedDoctorName = assignedDoctorName;
        }

        try {
            if (currentEditId) {
                // تعديل مستخدم موجود (بدون تغيير كلمة المرور)
                await updateDoc(doc(db, "users", currentEditId), userData);
                showToast('تم التعديل بنجاح');
                closeFormModal();
            } else {
                // مستخدم جديد
                if (!password) {
                    showToast('كلمة المرور مطلوبة لحساب جديد', true);
                    return;
                }
                // 1. إنشاء حساب في Auth
                const userCred = await createUserWithEmailAndPassword(auth, email, password);
                const uid = userCred.user.uid;
                
                // 2. إضافة بيانات إضافية
                userData.createdAt = serverTimestamp();
                
                // 3. حفظ في Firestore
                await setDoc(doc(db, "users", uid), userData);
                
                showToast('🎉 تم إضافة المستخدم بنجاح');
                closeFormModal();
            }
        } catch (err) {
            console.error(err);
            if (err.code === 'auth/email-already-in-use') showToast('البريد الإلكتروني مستخدم بالفعل', true);
            else if (err.code === 'auth/weak-password') showToast('كلمة المرور ضعيفة (6 حروف على الأقل)', true);
            else showToast(err.message, true);
        }
    }

    // ========== حظر / حذف ==========
    async function toggleBlockUser(id, newStatus) {
        await updateDoc(doc(db, "users", id), { status: newStatus });
        showToast(newStatus === 'blocked' ? 'تم الحظر' : 'تم إلغاء الحظر');
        closeDetailModal();
    }

    async function deleteUser(id) {
        if (!confirm('هل أنت متأكد من حذف هذا المستخدم؟ لا يمكن التراجع.')) return;
        try {
            // حذف من Firestore (يمكن أيضًا حذف من Auth لكن هذا يتطلب Cloud Function أو Admin SDK)
            await deleteDoc(doc(db, "users", id));
            showToast('تم حذف المستخدم من قاعدة البيانات');
            closeDetailModal();
        } catch (err) {
            showToast('فشل الحذف: ' + err.message, true);
        }
    }

    // ========== تسجيل الخروج ==========
    async function logout() {
        if (unsubscribeUsers) unsubscribeUsers();
        await signOut(auth);
        window.location.href = 'index.html';
    }

    // ========== ربط الأحداث ==========
    function setupEvents() {
        document.getElementById('searchInput').addEventListener('input', renderGrid);
        document.getElementById('addUserBtn').onclick = openAddModal;
        document.getElementById('refreshBtn').onclick = () => { loadUsers(); showToast('تم التحديث'); };
        document.getElementById('logoutBtn').onclick = logout;
        document.getElementById('saveFormBtn').onclick = saveUser;
        document.getElementById('closeFormBtn').onclick = closeFormModal;
        document.getElementById('closeDetailBtn').onclick = closeDetailModal;
        document.getElementById('blockModalBtn').onclick = () => { if(currentViewId) toggleBlockUser(currentViewId, 'blocked'); };
        document.getElementById('unblockModalBtn').onclick = () => { if(currentViewId) toggleBlockUser(currentViewId, 'active'); };
        document.getElementById('deleteModalBtn').onclick = () => { if(currentViewId) deleteUser(currentViewId); };
        document.getElementById('editModalBtn').onclick = () => {
            const user = allUsers.find(u => u.id === currentViewId);
            if(user) { closeDetailModal(); openEditModal(user); }
        };
        document.getElementById('addNoteModalBtn').onclick = async () => {
            const txt = document.getElementById('newNoteText').value;
            if(currentViewId && txt) {
                await addNewNote(currentViewId, txt);
                document.getElementById('newNoteText').value = '';
            } else showToast('اكتب نص الملاحظة', true);
        };
        window.onclick = (e) => {
            if(e.target === document.getElementById('detailModal')) closeDetailModal();
            if(e.target === document.getElementById('formModal')) closeFormModal();
        };
    }

    // ========== بدء التشغيل ==========
    setupEvents();
    loadUsers();
</script>
</body>
</html>
