<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>سُكُون | لوحة الإدارة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ----- ألوان برتقالية هادئة (مشمش / كراميل) ----- */
        :root {
            --primary: #F8C471;
            --primary-light: #FDEBD0;
            --primary-dark: #E59866;
            --accent: #E67E22;
            --accent-soft: #FAD7A1;
            --bg: #FFF8F0;
            --white: #FFFFFF;
            --ink: #4A3B2C;
            --text-sec: #8B7A66;
            --danger: #E57373;
            --success: #5FA88D;
            --warning: #F4B886;
            --border-light: #F0E0D0;
            --shadow-sm: 0 6px 12px -4px rgba(230, 126, 34, 0.08);
            --shadow-md: 0 12px 28px -6px rgba(230, 126, 34, 0.12);
            --radius-card: 28px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            padding: 24px;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 0% 0%, rgba(248, 196, 113, 0.08), transparent 50%),
                        radial-gradient(circle at 100% 100%, rgba(230, 126, 34, 0.06), transparent 50%);
            pointer-events: none;
            z-index: -1;
        }
        .container { max-width: 1400px; margin: 0 auto; }

        /* الهيدر */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: 60px;
            padding: 12px 24px;
            margin-bottom: 28px;
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow: var(--shadow-md);
            flex-wrap: wrap;
            gap: 16px;
        }
        .logo h2 {
            font-size: 1.9rem;
            font-weight: 800;
            background: linear-gradient(145deg, #D35400, #E67E22);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .search-wrapper {
            background: rgba(255,255,255,0.8);
            border-radius: 60px;
            padding: 6px 8px 6px 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid var(--border-light);
        }
        .search-wrapper i { color: var(--accent); }
        .search-wrapper input {
            background: transparent;
            border: none;
            padding: 8px 0;
            font-family: 'Cairo', sans-serif;
            font-size: 0.95rem;
            width: 180px;
            outline: none;
        }
        .btn {
            padding: 10px 22px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            transition: all 0.2s;
            background: white;
            color: var(--ink);
            border: 1px solid var(--border-light);
        }
        .btn-primary {
            background: var(--primary);
            color: #4A3B2C;
            border: none;
            box-shadow: 0 6px 14px rgba(230, 126, 34, 0.2);
            font-weight: 700;
        }
        .btn-primary:hover {
            background: var(--primary-dark);
            color: white;
            transform: translateY(-2px);
        }
        .btn-outline:hover { background: var(--primary-light); border-color: var(--primary); }
        .btn-icon {
            width: 44px;
            height: 44px;
            padding: 0;
            justify-content: center;
            border-radius: 50%;
        }

        /* شبكة المستخدمين */
        .users-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
            margin-top: 8px;
        }
        .user-card {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(12px);
            border-radius: var(--radius-card);
            padding: 20px 18px 22px;
            transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.7);
            box-shadow: var(--shadow-sm);
            cursor: pointer;
        }
        .user-card:hover {
            transform: translateY(-6px);
            background: rgba(255, 255, 255, 0.85);
            border-color: var(--primary);
            box-shadow: 0 20px 30px -8px rgba(230, 126, 34, 0.15);
        }
        .card-avatar {
            display: flex;
            justify-content: center;
            margin-bottom: 16px;
        }
        .avatar-circle {
            width: 88px;
            height: 88px;
            background: linear-gradient(145deg, #FAD7A1, #F8C471);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.6rem;
            color: #6E3C1C;
            border: 3px solid white;
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
        }
        .user-name {
            font-size: 1.35rem;
            font-weight: 700;
            color: #4A2C1A;
            text-align: center;
            margin-bottom: 8px;
        }
        .role-tag {
            display: inline-block;
            padding: 5px 16px;
            border-radius: 60px;
            font-size: 0.8rem;
            font-weight: 700;
            margin: 0 auto 12px;
            text-align: center;
            width: fit-content;
        }
        .role-doctor { background: #FDEBD0; color: #9C5A1A; }
        .role-nurse { background: #FAD7A1; color: #A04000; }
        .role-pharmacist { background: #FCF3E0; color: #7D6608; }
        .user-bio {
            background: rgba(250, 215, 161, 0.2);
            border-radius: 20px;
            padding: 10px 14px;
            margin: 12px 0;
            font-size: 0.85rem;
            color: #5D4030;
            border-right: 3px solid var(--primary);
            max-height: 50px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .assigned-doctors {
            background: #FEF5EC;
            border-radius: 30px;
            padding: 6px 12px;
            font-size: 0.75rem;
            margin-top: 10px;
            color: #7B4A1E;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 700;
            background: rgba(200,230,200,0.8);
            color: #2C6A2C;
        }
        .status-blocked { background: #FAD1D1; color: #A12B2B; }
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 14px;
        }

        /* المودالات */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(60, 40, 20, 0.25);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 16px;
        }
        .modal-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(16px);
            border-radius: 40px;
            width: 90%;
            max-width: 600px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 30px 50px rgba(160, 100, 40, 0.2);
            border: 1px solid rgba(255,255,255,0.6);
        }
        .modal-header {
            padding: 24px 28px;
            background: #FEF5EC;
            border-bottom: 1px solid var(--border-light);
            border-radius: 40px 40px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-body { padding: 24px 28px; }
        .close-btn {
            background: none;
            border: none;
            font-size: 30px;
            color: var(--text-sec);
            cursor: pointer;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            border-radius: 20px;
            border: 1.5px solid var(--border-light);
            background: white;
            font-family: 'Cairo', sans-serif;
            font-size: 0.95rem;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(248, 196, 113, 0.2);
        }
        .multi-select {
            background: white;
            border: 1.5px solid var(--border-light);
            border-radius: 20px;
            padding: 8px;
            max-height: 150px;
            overflow-y: auto;
        }
        .multi-select label {
            display: block;
            padding: 8px 12px;
            margin: 0;
            font-weight: normal;
            cursor: pointer;
        }
        .multi-select label:hover { background: #FEF5EC; }
        .row-buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            flex-wrap: wrap;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 30px;
            right: 30px;
            background: #4A3B2C;
            color: white;
            padding: 14px 28px;
            border-radius: 60px;
            text-align: center;
            z-index: 1300;
            font-weight: 500;
            max-width: 500px;
            margin: 0 auto;
            box-shadow: 0 12px 28px rgba(0,0,0,0.2);
        }
        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--text-sec);
            font-size: 1.2rem;
        }
        .highlight { color: var(--accent); }
    </style>
</head>
<body>
<div class="container">
    <header class="app-header">
        <div class="logo">
            <h2><i class="fas fa-spa" style="color:var(--primary); margin-left:8px;"></i>سُكُون · الإدارة</h2>
        </div>
        <div class="header-actions">
            <div class="search-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="ابحث باسم أو بريد...">
            </div>
            <button class="btn btn-primary" id="addUserBtn"><i class="fas fa-user-plus"></i> إضافة مستخدم</button>
            <button class="btn btn-outline btn-icon" id="refreshBtn" title="تحديث"><i class="fas fa-sync-alt"></i></button>
            <button class="btn btn-outline" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> خروج</button>
        </div>
    </header>

    <div id="usersGrid" class="users-grid">
        <div class="empty-state"><i class="fas fa-spinner fa-spin"></i> جاري التحميل...</div>
    </div>
</div>

<!-- مودال تفاصيل المستخدم (بدون ملاحظات) -->
<div id="detailModal" class="modal">
    <div class="modal-card">
        <div class="modal-header">
            <h3><i class="fas fa-user-circle"></i> <span id="detailNameTitle">تفاصيل المستخدم</span></h3>
            <button class="close-btn" id="closeDetailBtn">&times;</button>
        </div>
        <div class="modal-body">
            <div style="display: flex; gap: 16px; align-items: center; margin-bottom: 24px;">
                <div id="detailAvatarArea">
                    <div style="width:70px; height:70px; background: var(--primary-light); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:2rem; color: var(--accent);"><i class="fas fa-user"></i></div>
                </div>
                <div><h2 id="detailName">الاسم</h2><span id="detailRoleSpan"></span></div>
            </div>
            <div style="margin-bottom: 20px;"><i class="fas fa-envelope"></i> <span id="detailEmail"></span></div>
            <div><i class="fas fa-phone"></i> <span id="detailPhone"></span></div>
            <div style="margin: 20px 0;"><i class="fas fa-id-card"></i> UID: <span id="detailUid"></span></div>
            <div><i class="fas fa-circle"></i> الحالة: <span id="detailStatusSpan"></span></div>
            <div id="detailAssignedDoctorsSection" style="display:none; margin-top: 20px; background: #FEF5EC; padding: 14px; border-radius: 24px;">
                <i class="fas fa-user-md"></i> الأطباء المسؤولون: <span id="detailAssignedDoctors"></span>
            </div>
            <hr style="margin: 24px 0; border-color: var(--border-light);">
            <div><strong>لمحة سريعة</strong></div>
            <div id="quickBlurbDisplay" style="background: #FDF5EC; padding: 14px; border-radius: 20px; margin-top: 10px;"></div>

            <div class="row-buttons">
                <button id="blockModalBtn" class="btn" style="background:#E57373; color:white;">🔒 حظر</button>
                <button id="unblockModalBtn" class="btn" style="background:#5FA88D; color:white;">🔓 إلغاء حظر</button>
                <button id="editModalBtn" class="btn btn-primary">✏️ تعديل</button>
                <button id="deleteModalBtn" class="btn" style="background:#6c757d; color:white;">🗑️ حذف</button>
            </div>
        </div>
    </div>
</div>

<!-- مودال إضافة / تعديل -->
<div id="formModal" class="modal">
    <div class="modal-card">
        <div class="modal-header">
            <h3 id="formModalTitle"><i class="fas fa-user-plus"></i> مستخدم جديد</h3>
            <button class="close-btn" id="closeFormBtn">&times;</button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <input type="text" id="userName" placeholder="الاسم الكامل *" required>
            </div>
            <div class="form-group">
                <input type="email" id="userEmail" placeholder="البريد الإلكتروني *" required>
            </div>
            <div class="form-group">
                <input type="text" id="userPhone" placeholder="رقم الهاتف">
            </div>
            <div class="form-group">
                <select id="userRole" required>
                    <option value="">-- اختر الدور --</option>
                    <option value="doctor">👨‍⚕️ طبيب</option>
                    <option value="nurse">👩‍⚕️ ممرض/ة</option>
                    <option value="pharmacist">💊 صيدلي</option>
                </select>
            </div>
            <!-- مجموعة اختيار الأطباء (تظهر للممرضة فقط) -->
            <div class="form-group" id="assignDoctorsGroup" style="display:none;">
                <label>الأطباء المسؤولون (يمكن اختيار أكثر من طبيب)</label>
                <div class="multi-select" id="assignedDoctorsCheckboxGroup"></div>
            </div>
            <div class="form-group">
                <input type="text" id="userSpecialty" placeholder="التخصص (للطبيب فقط)">
            </div>
            <div class="form-group">
                <textarea id="quickBlurb" rows="2" placeholder="لمحة سريعة (خبرة، ملاحظات...)"></textarea>
            </div>
            <div class="form-group">
                <input type="password" id="userPassword" placeholder="كلمة المرور *" required>
            </div>
            <div class="form-group">
                <select id="userStatus">
                    <option value="active">نشط</option>
                    <option value="blocked">محظور</option>
                </select>
            </div>
            <div class="row-buttons">
                <button id="saveFormBtn" class="btn btn-primary">💾 حفظ</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { firebaseConfig } from './firebase-config.js';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getDatabase, ref, onValue, set, update, remove, get } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";
    import { getAuth, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    const usersRef = ref(db, 'users');

    let allUsers = [];
    let doctorsList = [];
    let currentEditId = null;
    let currentViewId = null;
    let unsubscribeUsers = null;

    function showToast(msg, isErr = false) {
        const t = document.createElement('div');
        t.className = 'toast';
        t.style.background = isErr ? '#B23B3B' : '#4A3B2C';
        t.innerHTML = `<i class="fas ${isErr ? 'fa-exclamation-triangle' : 'fa-check'}"></i> ${msg}`;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2800);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m] || m);
    }

    // تحميل المستخدمين
    function loadUsers() {
        if (unsubscribeUsers) unsubscribeUsers();
        unsubscribeUsers = onValue(usersRef, (snap) => {
            const arr = [];
            const docs = [];
            snap.forEach(child => {
                const user = { id: child.key, ...child.val() };
                arr.push(user);
                if (user.role === 'doctor') docs.push(user);
            });
            allUsers = arr;
            doctorsList = docs;
            renderGrid();
            populateDoctorsCheckboxes();
        });
    }

    function populateDoctorsCheckboxes() {
        const container = document.getElementById('assignedDoctorsCheckboxGroup');
        container.innerHTML = '';
        doctorsList.forEach(doc => {
            const label = document.createElement('label');
            label.innerHTML = `<input type="checkbox" value="${doc.id}"> ${doc.name || 'بدون اسم'} (${doc.email || ''})`;
            container.appendChild(label);
        });
    }

    function renderGrid() {
        const term = document.getElementById('searchInput')?.value.toLowerCase() || '';
        const filtered = allUsers.filter(u => 
            (u.name?.toLowerCase().includes(term) || u.email?.toLowerCase().includes(term) || u.role?.includes(term))
        );
        const grid = document.getElementById('usersGrid');
        if (!grid) return;
        if (filtered.length === 0) {
            grid.innerHTML = '<div class="empty-state"><i class="fas fa-user-slash"></i> لا يوجد مستخدمون مطابقون</div>';
            return;
        }
        grid.innerHTML = filtered.map(user => {
            const roleClass = `role-${user.role}`;
            const roleText = { doctor: 'طبيب', nurse: 'ممرض', pharmacist: 'صيدلي' }[user.role] || user.role;
            let assignedInfo = '';
            if (user.role === 'nurse' && user.assignedDoctors) {
                const doctorNames = Object.values(user.assignedDoctors).map(id => {
                    const doc = doctorsList.find(d => d.id === id);
                    return doc ? doc.name : '';
                }).filter(Boolean).join('، ');
                if (doctorNames) assignedInfo = `<div class="assigned-doctors"><i class="fas fa-user-md"></i> ${doctorNames}</div>`;
            }
            return `
            <div class="user-card" data-id="${user.id}">
                <div class="card-avatar">
                    <div class="avatar-circle"><i class="fas fa-user-md"></i></div>
                </div>
                <div class="user-name">${escapeHtml(user.name || 'بدون اسم')}</div>
                <div style="text-align:center"><span class="role-tag ${roleClass}">${roleText}</span></div>
                ${assignedInfo}
                <div class="user-bio"><i class="fas fa-pen"></i> ${escapeHtml(user.quickBlurb ? user.quickBlurb.substring(0, 55) : 'لا توجد لمحة')}</div>
                <div class="card-footer">
                    <span class="status-badge ${user.status === 'blocked' ? 'status-blocked' : ''}">${user.status === 'active' ? 'نشط' : 'محظور'}</span>
                    <small><i class="far fa-envelope"></i> ${escapeHtml(user.email)}</small>
                </div>
            </div>`;
        }).join('');
        document.querySelectorAll('.user-card').forEach(card => {
            card.addEventListener('click', () => openDetailModal(card.dataset.id));
        });
    }

    async function openDetailModal(id) {
        const user = allUsers.find(u => u.id === id);
        if (!user) return;
        currentViewId = id;
        document.getElementById('detailNameTitle').innerText = user.name || 'تفاصيل';
        document.getElementById('detailName').innerText = user.name || '-';
        document.getElementById('detailEmail').innerText = user.email || '-';
        document.getElementById('detailPhone').innerText = user.phone || '-';
        const roleText = { doctor: 'طبيب', nurse: 'ممرض', pharmacist: 'صيدلي' }[user.role] || user.role;
        document.getElementById('detailRoleSpan').innerHTML = `<span class="role-tag role-${user.role}">${roleText}</span>`;
        document.getElementById('detailUid').innerText = user.id || '-';
        document.getElementById('detailStatusSpan').innerHTML = user.status === 'active' ? '<span style="color:#2e7d32;">✅ نشط</span>' : '<span style="color:#c62828;">⛔ محظور</span>';
        document.getElementById('quickBlurbDisplay').innerHTML = user.quickBlurb ? escapeHtml(user.quickBlurb) : 'لا توجد لمحة';
        
        const assignedSection = document.getElementById('detailAssignedDoctorsSection');
        if (user.role === 'nurse' && user.assignedDoctors) {
            const names = Object.values(user.assignedDoctors).map(id => {
                const doc = doctorsList.find(d => d.id === id);
                return doc ? doc.name : '';
            }).filter(Boolean).join('، ');
            document.getElementById('detailAssignedDoctors').innerText = names || 'غير محدد';
            assignedSection.style.display = 'block';
        } else {
            assignedSection.style.display = 'none';
        }
        
        document.getElementById('detailModal').style.display = 'flex';
    }

    function openAddModal() {
        currentEditId = null;
        document.getElementById('formModalTitle').innerHTML = '<i class="fas fa-user-plus"></i> إضافة مستخدم';
        document.getElementById('userName').value = '';
        document.getElementById('userEmail').value = '';
        document.getElementById('userPhone').value = '';
        document.getElementById('userRole').value = '';
        document.getElementById('userSpecialty').value = '';
        document.getElementById('quickBlurb').value = '';
        document.getElementById('userPassword').value = '';
        document.getElementById('userStatus').value = 'active';
        document.getElementById('assignDoctorsGroup').style.display = 'none';
        // uncheck all
        document.querySelectorAll('#assignedDoctorsCheckboxGroup input[type=checkbox]').forEach(cb => cb.checked = false);
        document.getElementById('formModal').style.display = 'flex';
    }

    function openEditModal(user) {
        currentEditId = user.id;
        document.getElementById('formModalTitle').innerHTML = '<i class="fas fa-edit"></i> تعديل المستخدم';
        document.getElementById('userName').value = user.name || '';
        document.getElementById('userEmail').value = user.email || '';
        document.getElementById('userPhone').value = user.phone || '';
        document.getElementById('userRole').value = user.role || '';
        document.getElementById('userSpecialty').value = user.specialty || '';
        document.getElementById('quickBlurb').value = user.quickBlurb || '';
        document.getElementById('userPassword').value = ''; // لا نعيد تعبئة كلمة المرور
        document.getElementById('userStatus').value = user.status || 'active';
        
        const group = document.getElementById('assignDoctorsGroup');
        if (user.role === 'nurse') {
            group.style.display = 'block';
            const checkboxes = document.querySelectorAll('#assignedDoctorsCheckboxGroup input[type=checkbox]');
            checkboxes.forEach(cb => cb.checked = false);
            if (user.assignedDoctors) {
                Object.values(user.assignedDoctors).forEach(docId => {
                    checkboxes.forEach(cb => { if (cb.value === docId) cb.checked = true; });
                });
            }
        } else {
            group.style.display = 'none';
        }
        document.getElementById('formModal').style.display = 'flex';
    }

    function closeFormModal() { document.getElementById('formModal').style.display = 'none'; currentEditId = null; }
    function closeDetailModal() { document.getElementById('detailModal').style.display = 'none'; currentViewId = null; }

    document.getElementById('userRole').addEventListener('change', (e) => {
        document.getElementById('assignDoctorsGroup').style.display = e.target.value === 'nurse' ? 'block' : 'none';
    });

    async function saveUser() {
        const name = document.getElementById('userName').value.trim();
        const email = document.getElementById('userEmail').value.trim();
        const phone = document.getElementById('userPhone').value.trim();
        const role = document.getElementById('userRole').value;
        const specialty = document.getElementById('userSpecialty').value.trim();
        const quickBlurb = document.getElementById('quickBlurb').value.trim();
        const password = document.getElementById('userPassword').value;
        const status = document.getElementById('userStatus').value;

        if (!name || !email || !role) { showToast('الاسم والبريد والدور مطلوبة', true); return; }

        const userData = {
            name, email, phone, role,
            specialty: role === 'doctor' ? specialty : '',
            quickBlurb, status,
            lastModified: new Date().toISOString()
        };

        if (role === 'nurse') {
            const checkboxes = document.querySelectorAll('#assignedDoctorsCheckboxGroup input[type=checkbox]:checked');
            const assignedDoctors = {};
            checkboxes.forEach(cb => { assignedDoctors[cb.value] = true; });
            if (Object.keys(assignedDoctors).length === 0) {
                showToast('يجب اختيار طبيب واحد على الأقل للممرضة', true);
                return;
            }
            userData.assignedDoctors = assignedDoctors;
        }

        try {
            if (currentEditId) {
                await update(ref(db, `users/${currentEditId}`), userData);
                showToast('تم التعديل بنجاح');
                closeFormModal();
            } else {
                if (!password) { showToast('كلمة المرور مطلوبة', true); return; }
                const cred = await createUserWithEmailAndPassword(auth, email, password);
                userData.createdAt = new Date().toISOString();
                await set(ref(db, `users/${cred.user.uid}`), userData);
                showToast('🎉 تم إضافة المستخدم');
                closeFormModal();
            }
        } catch (err) {
            if (err.code === 'auth/email-already-in-use') showToast('البريد مستخدم بالفعل', true);
            else showToast(err.message, true);
        }
    }

    async function toggleBlockUser(id, newStatus) {
        await update(ref(db, `users/${id}`), { status: newStatus });
        showToast(newStatus === 'blocked' ? 'تم الحظر' : 'تم إلغاء الحظر');
        closeDetailModal();
    }

    async function deleteUser(id) {
        if (!confirm('حذف نهائي؟')) return;
        await remove(ref(db, `users/${id}`));
        showToast('تم الحذف');
        closeDetailModal();
    }

    async function logout() {
        if (unsubscribeUsers) unsubscribeUsers();
        await signOut(auth);
        window.location.href = 'index.html';
    }

    // ربط الأحداث
    document.getElementById('searchInput').addEventListener('input', renderGrid);
    document.getElementById('addUserBtn').onclick = openAddModal;
    document.getElementById('refreshBtn').onclick = () => { loadUsers(); showToast('تم التحديث'); };
    document.getElementById('logoutBtn').onclick = logout;
    document.getElementById('saveFormBtn').onclick = saveUser;
    document.getElementById('closeFormBtn').onclick = closeFormModal;
    document.getElementById('closeDetailBtn').onclick = closeDetailModal;
    document.getElementById('blockModalBtn').onclick = () => currentViewId && toggleBlockUser(currentViewId, 'blocked');
    document.getElementById('unblockModalBtn').onclick = () => currentViewId && toggleBlockUser(currentViewId, 'active');
    document.getElementById('deleteModalBtn').onclick = () => currentViewId && deleteUser(currentViewId);
    document.getElementById('editModalBtn').onclick = () => {
        const user = allUsers.find(u => u.id === currentViewId);
        if (user) { closeDetailModal(); openEditModal(user); }
    };
    window.onclick = (e) => {
        if (e.target === document.getElementById('detailModal')) closeDetailModal();
        if (e.target === document.getElementById('formModal')) closeFormModal();
    };

    loadUsers();
</script>
</body>
</html>
