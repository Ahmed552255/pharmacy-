<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>سُكُون · لوحة الطبيب</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ----- ألوان برتقالية دافئة (مشمش / كراميل) ----- */
        :root {
            --primary: #F8C471;
            --primary-light: #FDEBD0;
            --primary-dark: #E59866;
            --accent: #E67E22;
            --accent-soft: #FAD7A1;
            --bg: #FFF8F0;
            --white: #FFFFFF;
            --ink: #4A3B2C;
            --text-sec: #8B7A66;
            --danger: #E57373;
            --success: #5FA88D;
            --warning: #F4B886;
            --border-light: #F0E0D0;
            --shadow-sm: 0 6px 12px -4px rgba(230, 126, 34, 0.08);
            --shadow-md: 0 12px 28px -6px rgba(230, 126, 34, 0.12);
            --radius-card: 28px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            padding: 16px;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 0% 0%, rgba(248, 196, 113, 0.08), transparent 50%),
                        radial-gradient(circle at 100% 100%, rgba(230, 126, 34, 0.06), transparent 50%);
            pointer-events: none;
            z-index: -1;
        }
        .container { max-width: 1400px; margin: 0 auto; }

        /* الهيدر */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(18px);
            border-radius: 60px;
            padding: 12px 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow: var(--shadow-md);
            flex-wrap: wrap;
            gap: 12px;
        }
        .logo h2 {
            font-size: clamp(1.4rem, 5vw, 1.9rem);
            font-weight: 800;
            background: linear-gradient(145deg, #D35400, #E67E22);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            white-space: nowrap;
        }
        .header-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .btn {
            padding: 10px 18px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            transition: all 0.2s;
            background: white;
            color: var(--ink);
            border: 1px solid var(--border-light);
            white-space: nowrap;
        }
        .btn-primary {
            background: var(--primary);
            color: #4A3B2C;
            border: none;
            box-shadow: 0 6px 14px rgba(230, 126, 34, 0.2);
            font-weight: 700;
        }
        .btn-primary:hover { background: var(--primary-dark); color: white; transform: translateY(-2px); }
        .btn-outline:hover { background: var(--primary-light); border-color: var(--primary); }
        .btn-icon {
            width: 44px; height: 44px; padding: 0; justify-content: center; border-radius: 50%;
        }

        /* زر إظهار قائمة الانتظار */
        .queue-toggle-btn {
            background: var(--white);
            border: 1px solid var(--border-light);
            border-radius: 60px;
            padding: 10px 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            margin-bottom: 16px;
        }
        .queue-count-badge {
            background: var(--primary);
            color: #4A3B2C;
            border-radius: 30px;
            padding: 2px 12px;
            font-size: 0.8rem;
        }

        /* لوحة الانتظار (جانبية - مخفية افتراضياً) */
        .queue-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            border-radius: var(--radius-card);
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-md);
            padding: 16px;
            margin-bottom: 20px;
            display: none;
        }
        .queue-panel.show { display: block; }
        .queue-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-light);
        }
        .queue-list {
            display: grid;
            gap: 10px;
            max-height: 300px;
            overflow-y: auto;
        }
        .queue-item {
            background: white;
            border-radius: 20px;
            padding: 14px 18px;
            cursor: pointer;
            border: 1px solid var(--border-light);
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .queue-item:hover {
            background: var(--primary-light);
            border-color: var(--primary);
        }
        .queue-item.active {
            background: var(--primary);
            color: #4A3B2C;
            border-color: var(--primary-dark);
        }
        .queue-item .patient-info h4 { font-size: 1.1rem; }
        .queue-item .patient-info small { opacity: 0.8; }

        /* بطاقة المريض الحالي (في رأس الوصفة) */
        .current-patient-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 14px 24px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-sm);
        }
        .patient-name-clickable {
            font-weight: 800;
            font-size: 1.3rem;
            color: var(--ink);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .patient-name-clickable i { color: var(--accent); font-size: 1rem; }
        .patient-age-badge {
            background: var(--primary-light);
            padding: 4px 14px;
            border-radius: 60px;
            font-size: 0.9rem;
        }

        /* منطقة الوصفة */
        .prescription-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border-radius: var(--radius-card);
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow: var(--shadow-md);
        }
        .rx-items-container {
            min-height: 150px;
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 24px;
        }
        .rx-item {
            background: white;
            border-radius: 20px;
            padding: 14px 18px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid var(--border-light);
        }
        .rx-drug-name {
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .rx-dose-text {
            color: var(--text-sec);
            background: var(--primary-light);
            padding: 6px 16px;
            border-radius: 60px;
            font-size: 0.9rem;
        }
        .rx-actions { display: flex; gap: 8px; }
        .icon-btn-sm {
            width: 34px; height: 34px; border-radius: 12px; border: 1px solid var(--border-light);
            background: white; color: var(--text-sec); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .icon-btn-sm:hover { background: var(--danger); color: white; border-color: var(--danger); }

        /* شريط إضافة دواء */
        .drug-add-section {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .drug-search-wrapper {
            flex: 1;
            position: relative;
        }
        .drug-search-wrapper input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 60px;
            border: 1.5px solid var(--border-light);
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
        }
        .dose-input-area {
            display: flex;
            gap: 10px;
            width: 100%;
            margin-top: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .selected-drug-tag {
            background: var(--primary-light);
            padding: 10px 20px;
            border-radius: 60px;
            font-weight: 600;
        }
        .dose-input-field {
            flex: 1;
            padding: 12px 16px;
            border-radius: 60px;
            border: 1.5px solid var(--border-light);
            font-family: 'Cairo', sans-serif;
        }
        .suggestions-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border-radius: 20px;
            box-shadow: var(--shadow-md);
            margin-top: 8px;
            z-index: 100;
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }
        .suggestion-item {
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid var(--border-light);
        }
        .suggestion-item:hover { background: var(--primary-light); }

        .toast {
            position: fixed;
            bottom: 20px; left: 20px; right: 20px;
            background: #4A3B2C; color: white; padding: 12px 24px;
            border-radius: 60px; text-align: center; z-index: 1300;
            max-width: 500px; margin: 0 auto;
        }
        .empty-state { text-align: center; padding: 40px; color: var(--text-sec); }

        @media (max-width: 640px) {
            body { padding: 10px; }
            .btn { padding: 8px 14px; }
            .current-patient-card { padding: 12px 16px; }
            .patient-name-clickable { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <header class="app-header">
        <div class="logo">
            <h2><i class="fas fa-stethoscope" style="color:var(--primary); margin-left:8px;"></i>سُكُون · الطبيب</h2>
        </div>
        <div class="header-actions">
            <span id="welcomeMessage" style="font-weight:600;"></span>
            <button class="btn btn-outline btn-icon" id="templatesBtn" title="الروشتات"><i class="fas fa-folder-open"></i></button>
            <button class="btn btn-outline" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> خروج</button>
        </div>
    </header>

    <!-- زر إظهار قائمة الانتظار -->
    <div class="queue-toggle-btn" id="queueToggleBtn">
        <i class="fas fa-users"></i> قائمة الانتظار
        <span class="queue-count-badge" id="queueToggleCount">0</span>
        <i class="fas fa-chevron-down" id="queueToggleIcon" style="margin-right: auto;"></i>
    </div>

    <!-- لوحة الانتظار المخفية -->
    <div id="queuePanel" class="queue-panel">
        <div class="queue-header">
            <h3><i class="fas fa-user-clock"></i> مرضى اليوم</h3>
            <button class="btn btn-outline btn-icon" id="refreshQueueBtn"><i class="fas fa-sync-alt"></i></button>
        </div>
        <div class="queue-list" id="queueList">
            <div class="empty-state">جاري التحميل...</div>
        </div>
    </div>

    <!-- بطاقة المريض الحالي -->
    <div id="currentPatientCard" class="current-patient-card" style="display: none;">
        <div class="patient-name-clickable" id="patientNameClickable">
            <span id="currentPatientNameDisplay">---</span>
            <i class="fas fa-external-link-alt"></i>
        </div>
        <span class="patient-age-badge" id="currentPatientAgeDisplay">-- سنة</span>
    </div>

    <!-- لوحة الوصفة -->
    <div class="prescription-panel">
        <div id="emptyPrescriptionMsg" class="empty-state">
            <i class="fas fa-prescription-bottle" style="font-size: 48px; opacity: 0.5;"></i>
            <p>اختر مريضاً من قائمة الانتظار لبدء الكشف</p>
        </div>
        <div id="prescriptionContent" style="display: none;">
            <div class="rx-items-container" id="rxItemsContainer"></div>
            <!-- منطقة إضافة دواء ذكية -->
            <div class="drug-add-section">
                <div class="drug-search-wrapper">
                    <input type="text" id="drugSearchInput" placeholder="ابحث عن دواء أو اكتب اسم جديد..." autocomplete="off">
                    <div id="drugSuggestions" class="suggestions-dropdown"></div>
                </div>
                <button class="btn btn-primary" id="addDrugActionBtn"><i class="fas fa-plus"></i> إضافة</button>
            </div>
            <!-- قسم الجرعة (يظهر بعد اختيار الدواء) -->
            <div id="doseSection" style="display: none; margin-top: 16px;">
                <div class="selected-drug-tag" id="selectedDrugName">الدواء</div>
                <div class="dose-input-area">
                    <input type="text" id="doseInput" class="dose-input-field" placeholder="الاستخدام (مثال: 3 مرات يومياً)" autocomplete="off">
                    <button class="btn btn-success" id="confirmDoseBtn"><i class="fas fa-check"></i> تأكيد</button>
                </div>
                <div id="doseSuggestions" class="suggestions-dropdown" style="position: relative; margin-top: 8px;"></div>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 24px;">
                <button class="btn btn-primary" id="finishBtn" style="flex:1;"><i class="fas fa-check-circle"></i> إنهاء الكشف</button>
                <button class="btn btn-outline" id="saveTemplateBtn"><i class="fas fa-save"></i> حفظ كقالب</button>
            </div>
        </div>
    </div>
</div>

<!-- مودالات القوالب -->
<div class="modal-overlay" id="templatesModal" style="display: none; position: fixed; inset:0; background: rgba(0,0,0,0.2); backdrop-filter: blur(6px); align-items: center; justify-content: center; z-index:2000;">
    <div class="modal-card" style="background: white; border-radius:32px; width:90%; max-width:500px; padding:24px;">
        <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
            <h3>الروشتات المحفوظة</h3>
            <button class="btn-icon" onclick="UI.templatesModal.style.display='none'">&times;</button>
        </div>
        <div id="templatesList" style="max-height: 300px; overflow-y: auto;"></div>
    </div>
</div>
<div class="modal-overlay" id="saveTemplateModal" style="display: none; position: fixed; inset:0; background: rgba(0,0,0,0.2); backdrop-filter: blur(6px); align-items: center; justify-content: center; z-index:2000;">
    <div class="modal-card" style="background: white; border-radius:32px; width:90%; max-width:500px; padding:24px;">
        <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
            <h3>حفظ الروشتة كقالب</h3>
            <button class="btn-icon" onclick="UI.saveTemplateModal.style.display='none'">&times;</button>
        </div>
        <input type="text" id="templateNameInput" placeholder="اسم القالب" style="width:100%; padding:12px; border-radius:40px; border:1px solid var(--border-light); margin-bottom:20px;">
        <button class="btn btn-primary" onclick="saveAsTemplate()" style="width:100%;">حفظ</button>
    </div>
</div>

<script type="module">
    import { firebaseConfig } from './firebase-config.js';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
    import { getDatabase, ref, onValue, set, push, update, get, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // State
    let currentUser = null;
    let doctorInfo = null;
    let todayAppointments = [];
    let currentAppointment = null;
    let currentPrescription = [];
    let drugList = [];
    let selectedDrugForDose = null;

    // DOM
    const UI = {
        welcomeMessage: document.getElementById('welcomeMessage'),
        queueToggleBtn: document.getElementById('queueToggleBtn'),
        queueToggleCount: document.getElementById('queueToggleCount'),
        queueToggleIcon: document.getElementById('queueToggleIcon'),
        queuePanel: document.getElementById('queuePanel'),
        queueList: document.getElementById('queueList'),
        refreshQueueBtn: document.getElementById('refreshQueueBtn'),
        currentPatientCard: document.getElementById('currentPatientCard'),
        currentPatientNameDisplay: document.getElementById('currentPatientNameDisplay'),
        currentPatientAgeDisplay: document.getElementById('currentPatientAgeDisplay'),
        patientNameClickable: document.getElementById('patientNameClickable'),
        emptyPrescriptionMsg: document.getElementById('emptyPrescriptionMsg'),
        prescriptionContent: document.getElementById('prescriptionContent'),
        rxItemsContainer: document.getElementById('rxItemsContainer'),
        drugSearchInput: document.getElementById('drugSearchInput'),
        drugSuggestions: document.getElementById('drugSuggestions'),
        addDrugActionBtn: document.getElementById('addDrugActionBtn'),
        doseSection: document.getElementById('doseSection'),
        selectedDrugName: document.getElementById('selectedDrugName'),
        doseInput: document.getElementById('doseInput'),
        doseSuggestions: document.getElementById('doseSuggestions'),
        confirmDoseBtn: document.getElementById('confirmDoseBtn'),
        finishBtn: document.getElementById('finishBtn'),
        saveTemplateBtn: document.getElementById('saveTemplateBtn'),
        templatesBtn: document.getElementById('templatesBtn'),
        templatesModal: document.getElementById('templatesModal'),
        saveTemplateModal: document.getElementById('saveTemplateModal'),
        templatesList: document.getElementById('templatesList'),
        logoutBtn: document.getElementById('logoutBtn')
    };

    const today = new Date().toISOString().split('T')[0];

    function showToast(msg, isErr = false) {
        const t = document.createElement('div');
        t.className = 'toast';
        t.style.background = isErr ? '#B23B3B' : '#4A3B2C';
        t.innerHTML = `<i class="fas ${isErr ? 'fa-exclamation-triangle' : 'fa-check'}"></i> ${msg}`;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    // Load doctor info
    async function loadDoctorData(user) {
        const snap = await get(ref(db, `users/${user.uid}`));
        if (snap.exists()) {
            doctorInfo = snap.val();
            UI.welcomeMessage.textContent = `د. ${doctorInfo.name || ''}`;
        }
    }

    // Load drugs
    async function loadDrugs() {
        const snap = await get(ref(db, 'drugs'));
        if (snap.exists()) drugList = Object.values(snap.val());
    }

    // Load today's appointments
    function loadAppointments() {
        const q = query(ref(db, 'appointments'), orderByChild('doctorId'), equalTo(currentUser.uid));
        onValue(q, (snap) => {
            const all = [];
            snap.forEach(child => {
                const apt = { id: child.key, ...child.val() };
                if (apt.date === today && apt.status !== 'منتهي' && apt.status !== 'ملغي') all.push(apt);
            });
            all.sort((a,b) => (a.time||'').localeCompare(b.time||''));
            todayAppointments = all;
            renderQueue();
        });
    }

    function renderQueue() {
        const count = todayAppointments.length;
        UI.queueToggleCount.textContent = count;
        if (count === 0) {
            UI.queueList.innerHTML = '<div class="empty-state">لا يوجد مرضى اليوم</div>';
            return;
        }
        UI.queueList.innerHTML = todayAppointments.map(apt => {
            const isActive = currentAppointment && currentAppointment.id === apt.id;
            return `
                <div class="queue-item ${isActive ? 'active' : ''}" data-id="${apt.id}">
                    <div class="patient-info">
                        <h4>${apt.patientName}</h4>
                        <small><i class="far fa-clock"></i> ${apt.time} - ${apt.age ? apt.age+' سنة' : ''}</small>
                    </div>
                    <i class="fas fa-chevron-left"></i>
                </div>
            `;
        }).join('');
        document.querySelectorAll('.queue-item').forEach(el => {
            el.addEventListener('click', () => selectPatient(el.dataset.id));
        });
    }

    async function selectPatient(appointmentId) {
        const apt = todayAppointments.find(a => a.id === appointmentId);
        if (!apt) return;
        if (apt.status === 'انتظار') {
            await update(ref(db, `appointments/${appointmentId}`), { status: 'قيد الكشف' });
        }
        currentAppointment = apt;
        currentPrescription = [];
        updateCurrentPatientUI();
        UI.emptyPrescriptionMsg.style.display = 'none';
        UI.prescriptionContent.style.display = 'block';
        renderPrescriptionItems();
        UI.queuePanel.classList.remove('show');
        UI.queueToggleIcon.classList.remove('fa-chevron-up');
        UI.queueToggleIcon.classList.add('fa-chevron-down');
        renderQueue();
    }

    function updateCurrentPatientUI() {
        if (!currentAppointment) return;
        UI.currentPatientCard.style.display = 'flex';
        UI.currentPatientNameDisplay.textContent = currentAppointment.patientName;
        UI.currentPatientAgeDisplay.textContent = `${currentAppointment.age || '--'} سنة`;
    }

    UI.patientNameClickable.addEventListener('click', async () => {
        if (!currentAppointment || !currentAppointment.patientId) {
            showToast('لا يوجد سجل للمريض', true);
            return;
        }
        const snap = await get(query(ref(db, 'prescriptions'), orderByChild('patientId'), equalTo(currentAppointment.patientId)));
        let history = '';
        if (snap.exists()) {
            snap.forEach(c => {
                const p = c.val();
                history += `${p.createdAt?.split('T')[0]} : ${p.items?.length || 0} أدوية\n`;
            });
        }
        alert(`سجل المريض:\n${history || 'لا توجد روشتات سابقة'}`);
    });

    function renderPrescriptionItems() {
        if (currentPrescription.length === 0) {
            UI.rxItemsContainer.innerHTML = '<div class="empty-state">لم تضف أدوية بعد</div>';
            return;
        }
        UI.rxItemsContainer.innerHTML = currentPrescription.map((item, idx) => `
            <div class="rx-item">
                <span class="rx-drug-name"><i class="fas fa-capsules"></i> ${item.drug}</span>
                <span class="rx-dose-text">${item.dose}</span>
                <div class="rx-actions">
                    <button class="icon-btn-sm" data-action="remove" data-index="${idx}"><i class="fas fa-trash"></i></button>
                </div>
            </div>
        `).join('');
        document.querySelectorAll('[data-action="remove"]').forEach(btn => {
            btn.addEventListener('click', () => {
                const idx = btn.dataset.index;
                currentPrescription.splice(idx, 1);
                renderPrescriptionItems();
            });
        });
    }

    // Smart drug search
    UI.drugSearchInput.addEventListener('input', () => {
        const term = UI.drugSearchInput.value.trim();
        if (term.length < 1) {
            UI.drugSuggestions.style.display = 'none';
            return;
        }
        const matches = drugList.filter(d => d.name && d.name.includes(term)).slice(0, 5);
        if (matches.length === 0) {
            UI.drugSuggestions.innerHTML = '<div class="suggestion-item">اضغط Enter لإضافة دواء جديد</div>';
        } else {
            UI.drugSuggestions.innerHTML = matches.map(d => `<div class="suggestion-item" data-drug="${d.name}">${d.name}</div>`).join('');
        }
        UI.drugSuggestions.style.display = 'block';
    });

    UI.drugSuggestions.addEventListener('click', (e) => {
        const item = e.target.closest('[data-drug]');
        if (item) {
            const drug = item.dataset.drug;
            selectedDrugForDose = drug;
            UI.selectedDrugName.textContent = drug;
            UI.doseSection.style.display = 'block';
            UI.drugSearchInput.value = '';
            UI.drugSuggestions.style.display = 'none';
            UI.doseInput.focus();
        }
    });

    UI.addDrugActionBtn.addEventListener('click', () => {
        const custom = UI.drugSearchInput.value.trim();
        if (custom) {
            selectedDrugForDose = custom;
            UI.selectedDrugName.textContent = custom;
            UI.doseSection.style.display = 'block';
            UI.drugSearchInput.value = '';
            UI.drugSuggestions.style.display = 'none';
            UI.doseInput.focus();
        }
    });

    // Smart dose suggestions
    UI.doseInput.addEventListener('input', () => {
        const val = UI.doseInput.value.trim();
        if (!val) { UI.doseSuggestions.style.display = 'none'; return; }
        const num = parseInt(val);
        if (!isNaN(num)) {
            const suggestions = [
                `${num} مرة يومياً`,
                `${num} مرة قبل الأكل`,
                `${num} مرة بعد الأكل`,
                `${num} مرة عند اللزوم`,
                `${num} مرة صباحاً ومساءً`
            ];
            UI.doseSuggestions.innerHTML = suggestions.map(s => `<div class="suggestion-item" data-dose="${s}">${s}</div>`).join('');
            UI.doseSuggestions.style.display = 'block';
        } else {
            UI.doseSuggestions.style.display = 'none';
        }
    });

    UI.doseSuggestions.addEventListener('click', (e) => {
        const item = e.target.closest('[data-dose]');
        if (item) {
            UI.doseInput.value = item.dataset.dose;
            UI.doseSuggestions.style.display = 'none';
        }
    });

    UI.confirmDoseBtn.addEventListener('click', () => {
        const dose = UI.doseInput.value.trim();
        if (!selectedDrugForDose || !dose) return;
        currentPrescription.push({ drug: selectedDrugForDose, dose });
        renderPrescriptionItems();
        // reset
        selectedDrugForDose = null;
        UI.doseSection.style.display = 'none';
        UI.doseInput.value = '';
    });

    // Finish
    UI.finishBtn.addEventListener('click', async () => {
        if (!currentAppointment) return;
        try {
            const prescriptionRef = ref(db, `prescriptions/${currentAppointment.id}`);
            await set(prescriptionRef, {
                patientName: currentAppointment.patientName,
                patientId: currentAppointment.patientId || null,
                doctorId: currentUser.uid,
                doctorName: doctorInfo.name,
                items: currentPrescription,
                createdAt: new Date().toISOString()
            });
            await update(ref(db, `appointments/${currentAppointment.id}`), { status: 'منتهي' });
            showToast('✅ تم إنهاء الكشف وحفظ الروشتة');
            // reset
            currentAppointment = null;
            currentPrescription = [];
            UI.currentPatientCard.style.display = 'none';
            UI.emptyPrescriptionMsg.style.display = 'block';
            UI.prescriptionContent.style.display = 'none';
            renderQueue();
        } catch (e) { showToast('فشل الحفظ', true); }
    });

    // Templates
    async function loadTemplates() {
        const snap = await get(ref(db, `templates/${currentUser.uid}`));
        UI.templatesList.innerHTML = '';
        if (snap.exists()) {
            Object.entries(snap.val()).forEach(([id, t]) => {
                const div = document.createElement('div');
                div.style.padding = '12px'; div.style.borderBottom = '1px solid var(--border-light)'; div.style.cursor = 'pointer';
                div.innerHTML = `<b>${t.name}</b><br><small>${t.items.length} أصناف</small>`;
                div.onclick = () => {
                    currentPrescription = t.items;
                    renderPrescriptionItems();
                    UI.templatesModal.style.display = 'none';
                };
                UI.templatesList.appendChild(div);
            });
        } else {
            UI.templatesList.innerHTML = '<div class="empty-state">لا توجد قوالب</div>';
        }
    }
    UI.templatesBtn.addEventListener('click', () => { loadTemplates(); UI.templatesModal.style.display = 'flex'; });
    UI.saveTemplateBtn.addEventListener('click', () => {
        if (currentPrescription.length === 0) { showToast('الروشتة فارغة', true); return; }
        UI.saveTemplateModal.style.display = 'flex';
    });
    window.saveAsTemplate = async function() {
        const name = document.getElementById('templateNameInput').value.trim();
        if (!name) return;
        const refTemp = ref(db, `templates/${currentUser.uid}`);
        await push(refTemp, { name, items: currentPrescription, createdAt: new Date().toISOString() });
        showToast('تم حفظ القالب');
        UI.saveTemplateModal.style.display = 'none';
        document.getElementById('templateNameInput').value = '';
    };

    // Queue toggle
    UI.queueToggleBtn.addEventListener('click', () => {
        UI.queuePanel.classList.toggle('show');
        if (UI.queuePanel.classList.contains('show')) {
            UI.queueToggleIcon.classList.remove('fa-chevron-down');
            UI.queueToggleIcon.classList.add('fa-chevron-up');
        } else {
            UI.queueToggleIcon.classList.remove('fa-chevron-up');
            UI.queueToggleIcon.classList.add('fa-chevron-down');
        }
    });

    UI.refreshQueueBtn.addEventListener('click', () => loadAppointments());
    UI.logoutBtn.addEventListener('click', async () => { await signOut(auth); window.location.href = 'index.html'; });

    // Init
    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = 'index.html'; return; }
        currentUser = user;
        await loadDoctorData(user);
        await loadDrugs();
        loadAppointments();
    });

    window.onclick = (e) => {
        if (e.target === UI.templatesModal) UI.templatesModal.style.display = 'none';
        if (e.target === UI.saveTemplateModal) UI.saveTemplateModal.style.display = 'none';
    };
</script>
</body>
</html>
