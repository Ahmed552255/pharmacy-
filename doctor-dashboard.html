<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>سُكُون · لوحة الطبيب</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #7AC5C5;
            --primary-dark: #5BA3A3;
            --accent: #5BA3A3;
            --accent-dark: #3F8585;
            --bg: #ECF9F9;
            --white: #FFFFFF;
            --ink: #2C4A4A;
            --text-sec: #6B8E8E;
            --danger: #E57373;
            --success: #5FA88D;
            --warning: #F4B886;
            --border-light: #C5E0E0;
            --shadow-sm: 0 4px 6px -2px rgba(58, 128, 128, 0.08);
            --shadow-md: 0 10px 25px -5px rgba(58, 128, 128, 0.12);
            --radius-card: 24px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 0% 0%, rgba(122,197,197,0.08), transparent 50%),
                        radial-gradient(circle at 100% 100%, rgba(91,163,163,0.08), transparent 50%);
            pointer-events: none;
            z-index: -1;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(16px);
            border-radius: 60px;
            padding: 12px 24px;
            margin-bottom: 24px;
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: var(--shadow-md);
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo h2 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(145deg, var(--accent-dark), var(--primary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .btn {
            padding: 10px 22px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            transition: all 0.2s;
            background: white;
            color: var(--ink);
            border: 1px solid var(--border-light);
        }
        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            box-shadow: 0 4px 10px rgba(91,163,163,0.25);
        }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); }
        .btn-outline:hover { background: #f8fafc; }
        .btn-icon {
            width: 44px;
            height: 44px;
            padding: 0;
            justify-content: center;
            border-radius: 50%;
        }
        .main-grid {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 20px;
            height: calc(100vh - 140px);
            min-height: 600px;
        }
        .queue-panel {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(12px);
            border-radius: var(--radius-card);
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: var(--shadow-md);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .queue-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .queue-header h3 { font-size: 1.2rem; }
        .queue-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }
        .queue-item {
            background: white;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 10px;
            cursor: pointer;
            border: 1px solid var(--border-light);
            transition: all 0.2s;
        }
        .queue-item:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .queue-item.active {
            background: var(--primary-dark);
            color: white;
            border-color: var(--primary-dark);
        }
        .queue-item .patient-name {
            font-weight: 700;
            font-size: 1.1rem;
        }
        .queue-item .patient-time {
            font-size: 0.8rem;
            opacity: 0.8;
        }
        .workspace {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(12px);
            border-radius: var(--radius-card);
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: var(--shadow-md);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .patient-info-card {
            padding: 20px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .prescription-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }
        .prescription-items {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .rx-item {
            background: white;
            border-radius: 16px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border-light);
        }
        .rx-drug {
            font-weight: 700;
        }
        .rx-dose {
            color: var(--text-sec);
        }
        .rx-remove {
            color: var(--danger);
            cursor: pointer;
        }
        .footer-controls {
            padding: 20px;
            border-top: 1px solid var(--border-light);
            background: rgba(255,255,255,0.3);
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .search-box input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 40px;
            border: 1px solid var(--border-light);
            font-family: 'Cairo', sans-serif;
        }
        .dose-input-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .toast {
            position: fixed;
            bottom: 24px;
            left: 24px;
            right: 24px;
            background: var(--ink);
            color: white;
            padding: 14px 24px;
            border-radius: 60px;
            text-align: center;
            z-index: 1300;
            font-weight: 500;
            max-width: 500px;
            margin: 0 auto;
        }
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(6px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .modal-card {
            background: white;
            border-radius: 32px;
            width: 90%;
            max-width: 500px;
            padding: 24px;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-sec);
        }
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            background: #FEF9E7;
        }
    </style>
</head>
<body>
<div class="container">
    <header class="app-header">
        <div class="logo">
            <h2><i class="fas fa-stethoscope" style="color:var(--primary); margin-left:8px;"></i>سُكُون · الطبيب</h2>
        </div>
        <div class="header-actions">
            <span id="welcomeMessage" style="font-weight:600;">د. ---</span>
            <button class="btn btn-outline btn-icon" id="templatesBtn" title="الروشتات المحفوظة"><i class="fas fa-folder-open"></i></button>
            <button class="btn btn-outline btn-icon" id="refreshQueueBtn" title="تحديث القائمة"><i class="fas fa-sync-alt"></i></button>
            <button class="btn btn-outline" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> خروج</button>
        </div>
    </header>

    <div class="main-grid">
        <!-- قائمة الانتظار -->
        <div class="queue-panel">
            <div class="queue-header">
                <h3><i class="fas fa-users"></i> قائمة الانتظار</h3>
                <span id="queueCount" class="status-badge">0</span>
            </div>
            <div class="queue-list" id="queueList">
                <div class="empty-state">جاري التحميل...</div>
            </div>
        </div>

        <!-- مساحة العمل -->
        <div class="workspace" id="workspace">
            <div class="patient-info-card" id="patientInfoCard" style="display: none;">
                <div>
                    <h2 id="currentPatientName">---</h2>
                    <span id="currentPatientDetails">---</span>
                </div>
                <button class="btn btn-outline btn-icon" id="viewHistoryBtn" title="سجل المريض"><i class="fas fa-history"></i></button>
            </div>
            <div class="prescription-area" id="prescriptionArea">
                <div id="emptyPrescriptionMsg" class="empty-state">
                    <i class="fas fa-prescription-bottle" style="font-size: 48px; opacity: 0.5;"></i>
                    <p>اختر مريضاً من القائمة لبدء الكشف</p>
                </div>
                <div class="prescription-items" id="prescriptionItems" style="display: none;"></div>
            </div>
            <div class="footer-controls" id="controlsSection" style="display: none;">
                <div class="search-box">
                    <input type="text" id="drugSearchInput" placeholder="ابحث عن دواء..." autocomplete="off">
                    <button class="btn btn-primary" id="addDrugBtn"><i class="fas fa-plus"></i></button>
                </div>
                <div id="doseInputArea" style="display: none;" class="dose-input-group">
                    <input type="text" id="doseInput" placeholder="الجرعة والاستخدام" style="flex:1;">
                    <button class="btn btn-success" id="confirmDoseBtn">إضافة</button>
                </div>
                <div style="display: flex; gap: 10px; margin-top: 15px;">
                    <button class="btn btn-primary" id="finishBtn" style="flex:1;"><i class="fas fa-check-circle"></i> إنهاء الكشف</button>
                    <button class="btn btn-outline" id="saveTemplateBtn"><i class="fas fa-save"></i> حفظ كقالب</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- مودال القوالب -->
<div class="modal-overlay" id="templatesModal">
    <div class="modal-card">
        <div class="modal-header" style="display: flex; justify-content: space-between; margin-bottom: 20px;">
            <h3>الروشتات المحفوظة</h3>
            <button class="btn-icon" onclick="UI.templatesModal.style.display='none'">&times;</button>
        </div>
        <div id="templatesList" style="max-height: 300px; overflow-y: auto;"></div>
    </div>
</div>

<!-- مودال حفظ القالب -->
<div class="modal-overlay" id="saveTemplateModal">
    <div class="modal-card">
        <div class="modal-header" style="display: flex; justify-content: space-between; margin-bottom: 20px;">
            <h3>حفظ الروشتة كقالب</h3>
            <button class="btn-icon" onclick="UI.saveTemplateModal.style.display='none'">&times;</button>
        </div>
        <input type="text" id="templateNameInput" placeholder="اسم القالب" style="width:100%; padding:12px; border-radius:40px; border:1px solid var(--border-light); margin-bottom:20px;">
        <button class="btn btn-primary" onclick="saveAsTemplate()" style="width:100%;">حفظ</button>
    </div>
</div>

<script type="module">
    import { firebaseConfig } from './firebase-config.js';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
    import { getDatabase, ref, onValue, set, push, update, get, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // ---------- state ----------
    let currentUser = null;
    let doctorInfo = null;
    let todayAppointments = [];
    let currentAppointment = null; // { id, patientName, ... }
    let currentPrescription = []; // [{ drug, dose }]
    let drugDatabase = []; // من drugs في Realtime DB

    // ---------- DOM ----------
    const UI = {
        welcomeMessage: document.getElementById('welcomeMessage'),
        queueList: document.getElementById('queueList'),
        queueCount: document.getElementById('queueCount'),
        patientInfoCard: document.getElementById('patientInfoCard'),
        currentPatientName: document.getElementById('currentPatientName'),
        currentPatientDetails: document.getElementById('currentPatientDetails'),
        emptyPrescriptionMsg: document.getElementById('emptyPrescriptionMsg'),
        prescriptionItems: document.getElementById('prescriptionItems'),
        controlsSection: document.getElementById('controlsSection'),
        drugSearchInput: document.getElementById('drugSearchInput'),
        doseInputArea: document.getElementById('doseInputArea'),
        doseInput: document.getElementById('doseInput'),
        addDrugBtn: document.getElementById('addDrugBtn'),
        confirmDoseBtn: document.getElementById('confirmDoseBtn'),
        finishBtn: document.getElementById('finishBtn'),
        saveTemplateBtn: document.getElementById('saveTemplateBtn'),
        templatesBtn: document.getElementById('templatesBtn'),
        templatesModal: document.getElementById('templatesModal'),
        saveTemplateModal: document.getElementById('saveTemplateModal'),
        templatesList: document.getElementById('templatesList'),
        viewHistoryBtn: document.getElementById('viewHistoryBtn'),
        refreshQueueBtn: document.getElementById('refreshQueueBtn'),
        logoutBtn: document.getElementById('logoutBtn')
    };

    // ---------- helpers ----------
    function showToast(msg, isErr = false) {
        const t = document.createElement('div');
        t.className = 'toast';
        t.style.background = isErr ? '#B23B3B' : '#2C4A4A';
        t.innerHTML = `<i class="fas ${isErr ? 'fa-exclamation-triangle' : 'fa-check'}"></i> ${msg}`;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    // ---------- load doctor data ----------
    async function loadDoctorData(user) {
        const snap = await get(ref(db, `users/${user.uid}`));
        if (!snap.exists()) throw new Error("بيانات الطبيب غير موجودة");
        doctorInfo = snap.val();
        UI.welcomeMessage.textContent = `د. ${doctorInfo.name || 'الطبيب'}`;
    }

    // ---------- load today's appointments ----------
    function loadAppointments() {
        const today = new Date().toISOString().split('T')[0];
        const q = query(ref(db, 'appointments'), orderByChild('doctorId'), equalTo(currentUser.uid));
        
        onValue(q, (snap) => {
            const all = [];
            snap.forEach(child => {
                const apt = { id: child.key, ...child.val() };
                if (apt.date === today) all.push(apt);
            });
            // sort by time
            all.sort((a,b) => (a.time || '').localeCompare(b.time || ''));
            todayAppointments = all.filter(a => a.status !== 'منتهي' && a.status !== 'ملغي');
            renderQueue();
        });
    }

    function renderQueue() {
        UI.queueCount.textContent = todayAppointments.length;
        if (todayAppointments.length === 0) {
            UI.queueList.innerHTML = '<div class="empty-state">لا يوجد مرضى في الانتظار</div>';
            return;
        }
        UI.queueList.innerHTML = todayAppointments.map(apt => {
            const isActive = currentAppointment && currentAppointment.id === apt.id;
            return `
                <div class="queue-item ${isActive ? 'active' : ''}" data-id="${apt.id}">
                    <div class="patient-name">${apt.patientName}</div>
                    <div class="patient-time"><i class="far fa-clock"></i> ${apt.time || '--:--'}</div>
                    <small>${apt.age ? apt.age + ' سنة' : ''}</small>
                </div>
            `;
        }).join('');
        document.querySelectorAll('.queue-item').forEach(el => {
            el.addEventListener('click', () => selectPatient(el.dataset.id));
        });
    }

    async function selectPatient(appointmentId) {
        const apt = todayAppointments.find(a => a.id === appointmentId);
        if (!apt) return;
        
        // تحديث الحالة إلى "قيد الكشف" إذا كانت "انتظار"
        if (apt.status === 'انتظار') {
            await update(ref(db, `appointments/${appointmentId}`), { status: 'قيد الكشف' });
        }
        
        currentAppointment = apt;
        currentPrescription = []; // مسح الروشتة السابقة
        
        // عرض معلومات المريض
        UI.patientInfoCard.style.display = 'flex';
        UI.currentPatientName.textContent = apt.patientName;
        UI.currentPatientDetails.textContent = `${apt.age || '--'} سنة - ${apt.phone || 'بدون هاتف'}`;
        
        // تحميل أي روشتة سابقة محفوظة (اختياري)
        
        UI.emptyPrescriptionMsg.style.display = 'none';
        UI.prescriptionItems.style.display = 'block';
        UI.controlsSection.style.display = 'block';
        renderPrescription();
        renderQueue(); // تحديث الـ active
    }

    function renderPrescription() {
        if (currentPrescription.length === 0) {
            UI.prescriptionItems.innerHTML = '<div class="empty-state">لا توجد أدوية مضافة</div>';
            return;
        }
        UI.prescriptionItems.innerHTML = currentPrescription.map((item, idx) => `
            <div class="rx-item">
                <span class="rx-drug">${item.drug}</span>
                <span class="rx-dose">${item.dose}</span>
                <span class="rx-remove" data-index="${idx}"><i class="fas fa-trash"></i></span>
            </div>
        `).join('');
        document.querySelectorAll('.rx-remove').forEach(el => {
            el.addEventListener('click', (e) => {
                const idx = e.currentTarget.dataset.index;
                currentPrescription.splice(idx, 1);
                renderPrescription();
            });
        });
    }

    // ---------- drug search ----------
    async function loadDrugDatabase() {
        const snap = await get(ref(db, 'drugs'));
        if (snap.exists()) {
            drugDatabase = Object.values(snap.val());
        }
    }

    UI.addDrugBtn.addEventListener('click', () => {
        const term = UI.drugSearchInput.value.trim();
        if (!term) return;
        // simple match
        const matches = drugDatabase.filter(d => d.name && d.name.includes(term));
        if (matches.length === 1) {
            // اختيار تلقائي لأول تطابق
            selectDrug(matches[0].name);
        } else if (matches.length > 1) {
            // عرض اختيار (نبسطها: نأخذ الأول)
            selectDrug(matches[0].name);
        } else {
            // إضافة كدواء مخصص
            selectDrug(term);
        }
    });

    function selectDrug(drugName) {
        UI.drugSearchInput.value = drugName;
        UI.doseInputArea.style.display = 'flex';
        UI.doseInput.focus();
    }

    UI.confirmDoseBtn.addEventListener('click', () => {
        const drug = UI.drugSearchInput.value.trim();
        const dose = UI.doseInput.value.trim();
        if (!drug || !dose) return;
        currentPrescription.push({ drug, dose });
        renderPrescription();
        // reset
        UI.drugSearchInput.value = '';
        UI.doseInput.value = '';
        UI.doseInputArea.style.display = 'none';
    });

    // ---------- finish ----------
    UI.finishBtn.addEventListener('click', async () => {
        if (!currentAppointment) return;
        if (currentPrescription.length === 0) {
            if (!confirm('لا توجد أدوية مضافة. هل تريد إنهاء الكشف بدون روشتة؟')) return;
        }
        try {
            // حفظ الروشتة
            const prescriptionRef = ref(db, `prescriptions/${currentAppointment.id}`);
            await set(prescriptionRef, {
                patientName: currentAppointment.patientName,
                patientId: currentAppointment.patientId || null,
                doctorId: currentUser.uid,
                doctorName: doctorInfo.name,
                items: currentPrescription,
                createdAt: new Date().toISOString()
            });
            // تحديث الحجز إلى منتهي
            await update(ref(db, `appointments/${currentAppointment.id}`), { status: 'منتهي' });
            showToast('✅ تم إنهاء الكشف وحفظ الروشتة');
            // reset
            currentAppointment = null;
            currentPrescription = [];
            UI.patientInfoCard.style.display = 'none';
            UI.emptyPrescriptionMsg.style.display = 'block';
            UI.prescriptionItems.style.display = 'none';
            UI.controlsSection.style.display = 'none';
            renderQueue();
        } catch (e) {
            showToast('فشل الحفظ', true);
        }
    });

    // ---------- templates ----------
    async function loadTemplates() {
        const snap = await get(ref(db, `templates/${currentUser.uid}`));
        UI.templatesList.innerHTML = '';
        if (snap.exists()) {
            const temps = snap.val();
            Object.entries(temps).forEach(([id, t]) => {
                const div = document.createElement('div');
                div.style.padding = '12px';
                div.style.borderBottom = '1px solid var(--border-light)';
                div.style.cursor = 'pointer';
                div.innerHTML = `<b>${t.name}</b><br><small>${t.items.length} أصناف</small>`;
                div.onclick = () => {
                    currentPrescription = t.items;
                    renderPrescription();
                    UI.templatesModal.style.display = 'none';
                };
                UI.templatesList.appendChild(div);
            });
        } else {
            UI.templatesList.innerHTML = '<div class="empty-state">لا توجد قوالب محفوظة</div>';
        }
    }

    UI.templatesBtn.addEventListener('click', () => {
        loadTemplates();
        UI.templatesModal.style.display = 'flex';
    });

    UI.saveTemplateBtn.addEventListener('click', () => {
        if (currentPrescription.length === 0) {
            showToast('الروشتة فارغة', true);
            return;
        }
        UI.saveTemplateModal.style.display = 'flex';
    });

    window.saveAsTemplate = async function() {
        const name = document.getElementById('templateNameInput').value.trim();
        if (!name) return;
        const templateRef = ref(db, `templates/${currentUser.uid}`);
        const newRef = push(templateRef);
        await set(newRef, {
            name,
            items: currentPrescription,
            createdAt: new Date().toISOString()
        });
        showToast('تم حفظ القالب');
        UI.saveTemplateModal.style.display = 'none';
        document.getElementById('templateNameInput').value = '';
    };

    // ---------- history ----------
    UI.viewHistoryBtn.addEventListener('click', async () => {
        if (!currentAppointment) return;
        const patientId = currentAppointment.patientId;
        if (!patientId) {
            showToast('لا يوجد معرف للمريض', true);
            return;
        }
        // جلب آخر روشتات للمريض
        const q = query(ref(db, 'prescriptions'), orderByChild('patientId'), equalTo(patientId));
        const snap = await get(q);
        if (snap.exists()) {
            let msg = '';
            snap.forEach(c => {
                const p = c.val();
                msg += `${p.createdAt?.split('T')[0]} : ${p.items.length} أدوية\n`;
            });
            alert('آخر روشتات:\n' + (msg || 'لا توجد'));
        } else {
            alert('لا يوجد سجل سابق');
        }
    });

    // ---------- logout ----------
    UI.logoutBtn.addEventListener('click', async () => {
        await signOut(auth);
        window.location.href = 'index.html';
    });

    UI.refreshQueueBtn.addEventListener('click', () => {
        loadAppointments();
    });

    // ---------- init ----------
    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = 'index.html'; return; }
        currentUser = user;
        await loadDoctorData(user);
        await loadDrugDatabase();
        loadAppointments();
    });

    // إغلاق المودالات
    window.onclick = (e) => {
        if (e.target === UI.templatesModal) UI.templatesModal.style.display = 'none';
        if (e.target === UI.saveTemplateModal) UI.saveTemplateModal.style.display = 'none';
    };
</script>
</body>
</html>
