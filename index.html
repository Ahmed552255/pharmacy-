<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#00AEEF">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>شفاء — بوابة الدخول</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap&subset=arabic" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00AEEF;
            --primary-dark: #008080;
            --primary-light: #E0F7FA;
            --bg: #FAFAFA;
            --white: #FFFFFF;
            --ink: #1A3C4A;
            --text-sec: #5A7D8A;
            --danger: #E57373;
            --success: #26A69A;
            --warning: #FFA726;
            --shadow: 0 10px 30px rgba(0, 174, 239, 0.08);
            --border-light: rgba(0, 174, 239, 0.2);
            --transition-speed: 0.2s;
        }
        
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        html { 
            font-size: 16px; 
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -webkit-text-size-adjust: 100%;
        }
        
        body {
            font-family: 'Cairo', sans-serif;
            color: var(--ink);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.25rem;
            background: var(--bg);
            position: relative;
            overflow-x: hidden;
        }
        
        .bg-pattern {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
        }
        
        .bg-pattern::before {
            content: '';
            position: absolute;
            top: -30%;
            right: -20%;
            width: 60vw;
            height: 60vw;
            max-width: 500px;
            max-height: 500px;
            background: radial-gradient(circle, rgba(0, 174, 239, 0.06) 0%, transparent 70%);
            border-radius: 50%;
        }
        
        .bg-pattern::after {
            content: '';
            position: absolute;
            bottom: -25%;
            left: -15%;
            width: 50vw;
            height: 50vw;
            max-width: 400px;
            max-height: 400px;
            background: radial-gradient(circle, rgba(0, 128, 128, 0.04) 0%, transparent 70%);
            border-radius: 50%;
        }
        
        .glass-card {
            background: var(--white);
            border: 1px solid var(--border-light);
            border-radius: 28px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 440px;
            padding: 2rem 1.8rem;
            text-align: center;
            z-index: 1;
            animation: cardIn 0.4s ease-out forwards;
        }
        
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .logo-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 18px;
            margin: 0 auto 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(0, 174, 239, 0.2);
        }
        
        .logo-icon svg {
            width: 32px;
            height: 32px;
            color: white;
        }
        
        .card-header h1 {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary-dark);
            letter-spacing: -0.3px;
            margin-bottom: 0.3rem;
        }
        
        .card-header p {
            font-size: 0.95rem;
            color: var(--text-sec);
            font-weight: 500;
            margin-bottom: 0.5rem;
        }
        
        /* التبويبات */
        .tabs-container {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            background: #F0F7FA;
            border-radius: 14px;
            padding: 0.35rem;
            position: relative;
        }
        
        .tab-btn {
            flex: 1;
            padding: 0.7rem 0.5rem;
            border: none;
            border-radius: 11px;
            background: transparent;
            color: var(--text-sec);
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all var(--transition-speed);
            position: relative;
            z-index: 1;
            white-space: nowrap;
        }
        
        .tab-btn.active {
            background: var(--white);
            color: var(--primary-dark);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .secure-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(38, 166, 154, 0.08);
            color: var(--success);
            font-size: 0.78rem;
            padding: 5px 14px;
            border-radius: 30px;
            font-weight: 600;
            margin-bottom: 1.6rem;
            border: 1px solid rgba(38, 166, 154, 0.15);
        }
        
        .secure-badge svg {
            width: 14px;
            height: 14px;
        }
        
        .input-wrapper {
            margin-bottom: 1.1rem;
            text-align: right;
        }
        
        .input-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--ink);
            margin-bottom: 0.4rem;
            padding-right: 0.3rem;
        }
        
        .input-group {
            position: relative;
        }
        
        .input-group .input-icon {
            position: absolute;
            top: 50%;
            right: 1rem;
            transform: translateY(-50%);
            color: var(--primary);
            width: 20px;
            height: 20px;
            pointer-events: none;
            transition: color var(--transition-speed);
        }
        
        .input-group input {
            width: 100%;
            padding: 0.85rem 2.8rem;
            background: #F5FAFC;
            border: 1.5px solid rgba(0, 174, 239, 0.15);
            border-radius: 16px;
            outline: none;
            font-size: 0.95rem;
            font-family: 'Cairo', sans-serif;
            color: var(--ink);
            transition: border-color var(--transition-speed), box-shadow var(--transition-speed);
            -webkit-appearance: none;
            appearance: none;
        }
        
        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 174, 239, 0.1);
            background: #ffffff;
        }
        
        .input-group input::placeholder {
            color: #B0C8D0;
            font-weight: 400;
        }
        
        .password-toggle {
            position: absolute;
            top: 50%;
            left: 0.8rem;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--primary);
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            min-width: 44px;
            min-height: 44px;
        }
        
        .password-toggle:active {
            background: rgba(0, 174, 239, 0.15);
        }
        
        .error-message {
            color: var(--danger);
            font-weight: 600;
            font-size: 0.85rem;
            padding: 0.6rem 1rem;
            background: rgba(229, 115, 115, 0.05);
            border-radius: 14px;
            opacity: 0;
            transition: all var(--transition-speed);
            border: 1px solid rgba(229, 115, 115, 0.1);
            margin-bottom: 0.8rem;
            max-height: 0;
            overflow: hidden;
        }
        
        .error-message.show {
            opacity: 1;
            max-height: 100px;
            padding: 0.6rem 1rem;
        }
        
        .success-message {
            color: var(--success);
            font-weight: 600;
            font-size: 0.85rem;
            padding: 0.6rem 1rem;
            background: rgba(38, 166, 154, 0.05);
            border-radius: 14px;
            opacity: 0;
            transition: all var(--transition-speed);
            border: 1px solid rgba(38, 166, 154, 0.15);
            margin-bottom: 0.8rem;
            max-height: 0;
            overflow: hidden;
        }
        
        .success-message.show {
            opacity: 1;
            max-height: 100px;
            padding: 0.6rem 1rem;
        }
        
        .btn-primary {
            width: 100%;
            padding: 0.95rem;
            border: none;
            border-radius: 18px;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.15s;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            box-shadow: 0 6px 18px rgba(0, 174, 239, 0.2);
            position: relative;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        
        .btn-primary:active:not(:disabled) {
            transform: scale(0.98);
        }
        
        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        .btn-create-admin {
            background: linear-gradient(135deg, #FFA726, #F57C00);
            box-shadow: 0 6px 18px rgba(255, 167, 38, 0.25);
        }
        
        .btn-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            pointer-events: none;
        }
        
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.5s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.2rem 0;
            color: var(--text-sec);
            font-size: 0.8rem;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(0, 174, 239, 0.15);
        }
        
        .admin-notice {
            background: rgba(255, 167, 38, 0.08);
            border: 1px solid rgba(255, 167, 38, 0.2);
            border-radius: 14px;
            padding: 0.8rem 1rem;
            margin-bottom: 1.2rem;
            text-align: right;
            font-size: 0.82rem;
            color: #E65100;
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
        }
        
        .admin-notice svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            margin-top: 2px;
        }
        
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 700;
            z-index: 9999;
            font-family: 'Cairo', sans-serif;
            font-size: 0.9rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            transition: transform 0.25s ease-out;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        
        .toast.success { background: var(--success); }
        .toast.error { background: var(--danger); }
        .toast.warning { background: var(--warning); }
        
        .loading-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--primary-dark));
            width: 0%;
            z-index: 10000;
            transition: width 1.2s ease-out;
        }
        
        .loading-bar.active { width: 85%; }
        .loading-bar.done {
            width: 100%;
            transition: width 0.25s ease;
            opacity: 0;
        }
        
        @media (max-width: 480px) {
            .glass-card {
                padding: 1.5rem 1.2rem;
                border-radius: 24px;
            }
            
            .card-header h1 {
                font-size: 1.7rem;
            }
            
            .input-group input {
                padding: 0.75rem 2.5rem;
                font-size: 0.9rem;
            }
            
            .tab-btn {
                font-size: 0.8rem;
                padding: 0.6rem 0.4rem;
            }
        }
        
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.001ms !important;
                transition-duration: 0.001ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="bg-pattern" aria-hidden="true"></div>
    <div class="loading-bar" id="loadingBar" aria-hidden="true"></div>
    <div class="toast" id="toast" aria-live="polite"></div>
    
    <main class="glass-card">
        <div class="logo-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/>
                <path d="M12 8v4l3 3"/>
            </svg>
        </div>
        
        <header class="card-header">
            <h1>شفاء</h1>
            <p>منصة إدارة العيادات والصيدليات</p>
        </header>
        
        <div class="secure-badge" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            اتصال آمن ومشفر
        </div>
        
        <!-- التبويبات -->
        <div class="tabs-container" role="tablist">
            <button class="tab-btn active" id="tabLogin" role="tab" aria-selected="true" onclick="switchTab('login')">
                🔑 تسجيل الدخول
            </button>
            <button class="tab-btn" id="tabRegister" role="tab" aria-selected="false" onclick="switchTab('register')">
                👤 مدير جديد
            </button>
        </div>
        
        <!-- تبويب تسجيل الدخول -->
        <div class="tab-content active" id="loginTab">
            <form id="loginForm" novalidate autocomplete="on">
                <div class="input-wrapper">
                    <label class="input-label" for="loginEmail">البريد الإلكتروني</label>
                    <div class="input-group">
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <rect x="2" y="4" width="20" height="16" rx="2"/>
                            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
                        </svg>
                        <input 
                            type="email" 
                            id="loginEmail" 
                            placeholder="example@domain.com" 
                            required 
                            autocomplete="email"
                            inputmode="email"
                            dir="ltr"
                        >
                    </div>
                </div>
                
                <div class="input-wrapper">
                    <label class="input-label" for="loginPassword">كلمة المرور</label>
                    <div class="input-group">
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <input 
                            type="password" 
                            id="loginPassword" 
                            placeholder="••••••••" 
                            required 
                            autocomplete="current-password"
                        >
                        <button type="button" class="password-toggle" onclick="togglePassword('loginPassword', this)" aria-label="إظهار/إخفاء كلمة المرور" tabindex="-1">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>
                
                <div class="error-message" id="loginError" role="alert"></div>
                
                <button type="submit" class="btn-primary" id="loginButton">
                    <span class="btn-content" id="loginBtnContent">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                            <polyline points="10 17 15 12 10 7"/>
                            <line x1="15" y1="12" x2="3" y2="12"/>
                        </svg>
                        تسجيل الدخول
                    </span>
                </button>
            </form>
        </div>
        
        <!-- تبويب إنشاء مدير جديد -->
        <div class="tab-content" id="registerTab">
            <div class="admin-notice">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="8" x2="12" y2="12"/>
                    <line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                <span>تنبيه هام: هذا القسم مخصص لإنشاء حساب المسؤول الرئيسي فقط. يرجى استخدامه بحذر.</span>
            </div>
            
            <form id="registerForm" novalidate autocomplete="off">
                <div class="input-wrapper">
                    <label class="input-label" for="regName">اسم المسؤول الكامل</label>
                    <div class="input-group">
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <input 
                            type="text" 
                            id="regName" 
                            placeholder="أدخل اسم المسؤول الكامل" 
                            required 
                            autocomplete="off"
                        >
                    </div>
                </div>
                
                <div class="input-wrapper">
                    <label class="input-label" for="regEmail">البريد الإلكتروني</label>
                    <div class="input-group">
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="4" width="20" height="16" rx="2"/>
                            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
                        </svg>
                        <input 
                            type="email" 
                            id="regEmail" 
                            placeholder="admin@example.com" 
                            required 
                            autocomplete="off"
                            inputmode="email"
                            dir="ltr"
                        >
                    </div>
                </div>
                
                <div class="input-wrapper">
                    <label class="input-label" for="regPhone">رقم الهاتف (اختياري)</label>
                    <div class="input-group">
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
                        </svg>
                        <input 
                            type="tel" 
                            id="regPhone" 
                            placeholder="05xxxxxxxx" 
                            autocomplete="off"
                            inputmode="tel"
                            dir="ltr"
                        >
                    </div>
                </div>
                
                <div class="input-wrapper">
                    <label class="input-label" for="regPassword">كلمة المرور</label>
                    <div class="input-group">
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <input 
                            type="password" 
                            id="regPassword" 
                            placeholder="أدخل كلمة مرور قوية" 
                            required 
                            autocomplete="new-password"
                            minlength="8"
                        >
                        <button type="button" class="password-toggle" onclick="togglePassword('regPassword', this)" aria-label="إظهار/إخفاء كلمة المرور" tabindex="-1">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>
                
                <div class="input-wrapper">
                    <label class="input-label" for="regConfirmPassword">تأكيد كلمة المرور</label>
                    <div class="input-group">
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <input 
                            type="password" 
                            id="regConfirmPassword" 
                            placeholder="أعد كتابة كلمة المرور" 
                            required 
                            autocomplete="new-password"
                            minlength="8"
                        >
                        <button type="button" class="password-toggle" onclick="togglePassword('regConfirmPassword', this)" aria-label="إظهار/إخفاء كلمة المرور" tabindex="-1">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>
                
                <div class="error-message" id="registerError" role="alert"></div>
                <div class="success-message" id="registerSuccess" role="status"></div>
                
                <button type="submit" class="btn-primary btn-create-admin" id="registerButton">
                    <span class="btn-content" id="registerBtnContent">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                            <circle cx="8.5" cy="7" r="4"/>
                            <line x1="20" y1="8" x2="20" y2="14"/>
                            <line x1="23" y1="11" x2="17" y2="11"/>
                        </svg>
                        إنشاء حساب المسؤول
                    </span>
                </button>
            </form>
        </div>
    </main>

    <script type="module">
        // ============ استيراد Firebase ============
        import { firebaseConfig } from './firebase-config.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { 
            getAuth, 
            signInWithEmailAndPassword, 
            createUserWithEmailAndPassword,
            onAuthStateChanged,
            signOut
        } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // ============ نظام التشفير ============
        const ENCRYPTION_KEY = 'ShifaSecure2024!@#Key';
        
        const encryptData = (data) => {
            try {
                const jsonString = JSON.stringify(data);
                let encrypted = '';
                for (let i = 0; i < jsonString.length; i++) {
                    const charCode = jsonString.charCodeAt(i) ^ ENCRYPTION_KEY.charCodeAt(i % ENCRYPTION_KEY.length);
                    encrypted += String.fromCharCode(charCode);
                }
                return btoa(unescape(encodeURIComponent(encrypted)));
            } catch (error) {
                console.error('خطأ في التشفير:', error);
                return null;
            }
        };
        
        const decryptData = (encryptedData) => {
            try {
                const encrypted = decodeURIComponent(escape(atob(encryptedData)));
                let decrypted = '';
                for (let i = 0; i < encrypted.length; i++) {
                    const charCode = encrypted.charCodeAt(i) ^ ENCRYPTION_KEY.charCodeAt(i % ENCRYPTION_KEY.length);
                    decrypted += String.fromCharCode(charCode);
                }
                return JSON.parse(decrypted);
            } catch (error) {
                console.error('خطأ في فك التشفير:', error);
                return null;
            }
        };

        const STORAGE_KEY = 'shifa_secure_session';

        // ============ تهيئة Firebase ============
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // ============ عناصر DOM ============
        const dom = {
            // التبويبات
            tabLogin: document.getElementById('tabLogin'),
            tabRegister: document.getElementById('tabRegister'),
            loginTab: document.getElementById('loginTab'),
            registerTab: document.getElementById('registerTab'),
            
            // نموذج تسجيل الدخول
            loginForm: document.getElementById('loginForm'),
            loginEmail: document.getElementById('loginEmail'),
            loginPassword: document.getElementById('loginPassword'),
            loginButton: document.getElementById('loginButton'),
            loginBtnContent: document.getElementById('loginBtnContent'),
            loginError: document.getElementById('loginError'),
            
            // نموذج إنشاء المدير
            registerForm: document.getElementById('registerForm'),
            regName: document.getElementById('regName'),
            regEmail: document.getElementById('regEmail'),
            regPhone: document.getElementById('regPhone'),
            regPassword: document.getElementById('regPassword'),
            regConfirmPassword: document.getElementById('regConfirmPassword'),
            registerButton: document.getElementById('registerButton'),
            registerBtnContent: document.getElementById('registerBtnContent'),
            registerError: document.getElementById('registerError'),
            registerSuccess: document.getElementById('registerSuccess'),
            
            // عام
            toast: document.getElementById('toast'),
            loadingBar: document.getElementById('loadingBar'),
        };

        const loginDefaultContent = dom.loginBtnContent.innerHTML;
        const registerDefaultContent = dom.registerBtnContent.innerHTML;

        // ============ تبديل التبويبات ============
        window.switchTab = (tab) => {
            if (tab === 'login') {
                dom.tabLogin.classList.add('active');
                dom.tabRegister.classList.remove('active');
                dom.loginTab.classList.add('active');
                dom.registerTab.classList.remove('active');
                dom.tabLogin.setAttribute('aria-selected', 'true');
                dom.tabRegister.setAttribute('aria-selected', 'false');
                hideError('login');
                hideError('register');
                hideSuccess();
            } else {
                dom.tabRegister.classList.add('active');
                dom.tabLogin.classList.remove('active');
                dom.registerTab.classList.add('active');
                dom.loginTab.classList.remove('active');
                dom.tabRegister.setAttribute('aria-selected', 'true');
                dom.tabLogin.setAttribute('aria-selected', 'false');
                hideError('login');
                hideError('register');
                hideSuccess();
            }
        };

        // ============ تبديل كلمة المرور ============
        window.togglePassword = (inputId, button) => {
            const input = document.getElementById(inputId);
            const isPassword = input.type === 'password';
            input.type = isPassword ? 'text' : 'password';
            
            const svg = button.querySelector('svg');
            if (isPassword) {
                svg.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
            } else {
                svg.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
            }
        };

        // ============ دوال مساعدة ============
        const showError = (type, msg) => {
            const errorEl = type === 'login' ? dom.loginError : dom.registerError;
            if (!msg) {
                errorEl.classList.remove('show');
                errorEl.textContent = '';
                return;
            }
            errorEl.textContent = msg;
            errorEl.classList.add('show');
        };
        
        const hideError = (type) => {
            const errorEl = type === 'login' ? dom.loginError : dom.registerError;
            errorEl.classList.remove('show');
            errorEl.textContent = '';
        };
        
        const showSuccess = (msg) => {
            dom.registerSuccess.textContent = msg;
            dom.registerSuccess.classList.add('show');
        };
        
        const hideSuccess = () => {
            dom.registerSuccess.classList.remove('show');
            dom.registerSuccess.textContent = '';
        };

        const showToast = (msg, type = 'success') => {
            dom.toast.textContent = msg;
            dom.toast.className = `toast ${type} show`;
            clearTimeout(window._toastTimeout);
            window._toastTimeout = setTimeout(() => {
                dom.toast.classList.remove('show');
            }, 3000);
        };

        const showLoadingBar = () => dom.loadingBar.classList.add('active');
        
        const hideLoadingBar = () => {
            dom.loadingBar.classList.add('done');
            setTimeout(() => {
                dom.loadingBar.classList.remove('active', 'done');
                dom.loadingBar.style.width = '0%';
            }, 300);
        };

        const setLoginLoading = (loading) => {
            dom.loginButton.disabled = loading;
            dom.loginBtnContent.innerHTML = loading 
                ? '<span class="spinner"></span> جاري التحقق...' 
                : loginDefaultContent;
            if (loading) showLoadingBar();
            else hideLoadingBar();
        };
        
        const setRegisterLoading = (loading) => {
            dom.registerButton.disabled = loading;
            dom.registerBtnContent.innerHTML = loading 
                ? '<span class="spinner"></span> جاري إنشاء الحساب...' 
                : registerDefaultContent;
            if (loading) showLoadingBar();
            else hideLoadingBar();
        };

        // ============ جلب بيانات المستخدم ============
        const fetchUserData = async (uid) => {
            try {
                const tenantsSnap = await get(ref(db, 'tenants'));
                
                if (tenantsSnap.exists()) {
                    const tenants = tenantsSnap.val();
                    
                    for (const tenantId of Object.keys(tenants)) {
                        const tenantUserSnap = await get(ref(db, `tenants/${tenantId}/users/${uid}`));
                        
                        if (tenantUserSnap.exists()) {
                            const userData = tenantUserSnap.val();
                            if (!userData.tenantId) userData.tenantId = tenantId;
                            
                            const tenantName = tenants[tenantId]?.name || tenants[tenantId]?.tenantName || 'المجمع الطبي';
                            userData.tenantName = userData.tenantName || tenantName;
                            
                            return userData;
                        }
                    }
                }
                
                const publicSnap = await get(ref(db, `users/${uid}`));
                if (publicSnap.exists()) {
                    const userData = publicSnap.val();
                    if (!userData.tenantId) userData.tenantId = uid;
                    return userData;
                }
                
                return null;
            } catch (error) {
                console.error("خطأ في جلب بيانات المستخدم:", error);
                return null;
            }
        };

        // ============ إدارة الجلسة ============
        const saveEncryptedSession = (userData) => {
            try {
                const sessionData = {
                    uid: userData.uid,
                    email: userData.email,
                    role: userData.role,
                    name: userData.name,
                    tenantId: userData.tenantId || null,
                    timestamp: Date.now()
                };
                
                const encrypted = encryptData(sessionData);
                if (encrypted) {
                    localStorage.setItem(STORAGE_KEY, encrypted);
                    return true;
                }
                return false;
            } catch (error) {
                console.error('خطأ في حفظ الجلسة:', error);
                return false;
            }
        };

        const getEncryptedSession = () => {
            try {
                const encrypted = localStorage.getItem(STORAGE_KEY);
                if (!encrypted) return null;
                
                const session = decryptData(encrypted);
                if (!session || !session.uid || !session.role) {
                    localStorage.removeItem(STORAGE_KEY);
                    return null;
                }
                
                const MAX_SESSION_AGE = 24 * 60 * 60 * 1000;
                if (Date.now() - session.timestamp > MAX_SESSION_AGE) {
                    localStorage.removeItem(STORAGE_KEY);
                    return null;
                }
                
                return session;
            } catch (error) {
                localStorage.removeItem(STORAGE_KEY);
                return null;
            }
        };

        // ============ توجيه المستخدم ============
        const redirectUser = (role, name, tenantId = null) => {
            const pages = {
                admin: 'admin-panel.html',
                doctor: 'doctor-dashboard.html',
                nurse: 'nurse-dashboard.html',
                pharmacist: 'pharmacy-dashboard.html',
            };
            
            let redirectUrl = pages[role] || 'dashboard.html';
            
            if (tenantId) {
                const separator = redirectUrl.includes('?') ? '&' : '?';
                redirectUrl += `${separator}tenant=${encodeURIComponent(tenantId)}`;
            }
            
            showToast(`👋 مرحباً ${name}!`, 'success');
            
            setTimeout(() => {
                window.location.href = redirectUrl;
            }, 800);
        };

        // ============ معالجة تسجيل الدخول ============
        dom.loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = dom.loginEmail.value.trim().toLowerCase();
            const password = dom.loginPassword.value;

            if (!email) {
                showError('login', '⚠️ الرجاء إدخال البريد الإلكتروني');
                return;
            }
            
            if (!password) {
                showError('login', '⚠️ الرجاء إدخال كلمة المرور');
                return;
            }
            
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showError('login', '⚠️ صيغة البريد الإلكتروني غير صحيحة');
                return;
            }

            if (password.length < 6) {
                showError('login', '⚠️ كلمة المرور يجب أن تكون 6 أحرف على الأقل');
                return;
            }

            hideError('login');
            setLoginLoading(true);

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                const userData = await fetchUserData(user.uid);

                if (!userData || !userData.role) {
                    showError('login', '❌ هذا الحساب غير مفعل أو لا يملك صلاحيات. تواصل مع المسؤول.');
                    setLoginLoading(false);
                    return;
                }

                if (userData.status === 'blocked') {
                    showError('login', '🚫 هذا الحساب محظور. تواصل مع المسؤول.');
                    setLoginLoading(false);
                    return;
                }

                const displayName = userData.name || email.split('@')[0];
                const tenantId = userData.tenantId || null;

                saveEncryptedSession({
                    uid: user.uid,
                    email: email,
                    role: userData.role,
                    name: displayName,
                    tenantId: tenantId
                });

                redirectUser(userData.role, displayName, tenantId);

            } catch (error) {
                console.error("خطأ تسجيل الدخول:", error);
                
                const errorMessages = {
                    'auth/invalid-credential': '❌ البريد الإلكتروني أو كلمة المرور غير صحيحة',
                    'auth/user-not-found': '❌ لا يوجد حساب بهذا البريد الإلكتروني',
                    'auth/wrong-password': '❌ كلمة المرور غير صحيحة',
                    'auth/invalid-email': '❌ صيغة البريد الإلكتروني غير صحيحة',
                    'auth/user-disabled': '🚫 هذا الحساب معطل',
                    'auth/too-many-requests': '⏳ محاولات كثيرة. حاول لاحقاً.',
                    'auth/network-request-failed': '📡 خطأ في الاتصال بالإنترنت',
                };
                
                showError('login', errorMessages[error.code] || '⚠️ حدث خطأ غير متوقع');
                setLoginLoading(false);
            }
        });

        // ============ ✅ إنشاء حساب مدير جديد ============
        dom.registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = dom.regName.value.trim();
            const email = dom.regEmail.value.trim().toLowerCase();
            const phone = dom.regPhone.value.trim();
            const password = dom.regPassword.value;
            const confirmPassword = dom.regConfirmPassword.value;

            // التحقق من صحة الاسم
            if (!name || name.length < 3) {
                showError('register', '⚠️ الرجاء إدخال اسم المسؤول الكامل (3 أحرف على الأقل)');
                dom.regName.focus();
                return;
            }
            
            // التحقق من صحة البريد الإلكتروني
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!email || !emailRegex.test(email)) {
                showError('register', '⚠️ صيغة البريد الإلكتروني غير صحيحة');
                dom.regEmail.focus();
                return;
            }

            // التحقق من صحة كلمة المرور
            if (password.length < 8) {
                showError('register', '⚠️ كلمة المرور يجب أن تكون 8 أحرف على الأقل');
                dom.regPassword.focus();
                return;
            }
            
            // التحقق من قوة كلمة المرور
            const hasUpperCase = /[A-Z]/.test(password);
            const hasLowerCase = /[a-z]/.test(password);
            const hasNumber = /[0-9]/.test(password);
            const hasSpecial = /[!@#$%^&*(),.?":{}|<>]/.test(password);
            
            if (!hasUpperCase || !hasLowerCase || !hasNumber) {
                showError('register', '⚠️ كلمة المرور يجب أن تحتوي على حرف كبير، حرف صغير، ورقم على الأقل');
                dom.regPassword.focus();
                return;
            }

            // التحقق من تطابق كلمة المرور
            if (password !== confirmPassword) {
                showError('register', '⚠️ كلمة المرور غير متطابقة');
                dom.regConfirmPassword.focus();
                return;
            }

            hideError('register');
            hideSuccess();
            setRegisterLoading(true);

            try {
                // 1️⃣ إنشاء المستخدم في Firebase Authentication
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                console.log('✅ تم إنشاء المستخدم في Authentication:', user.uid);

                // 2️⃣ تجهيز بيانات المسؤول
                const adminData = {
                    uid: user.uid,
                    name: name,
                    email: email,
                    phone: phone || '',
                    role: 'admin',
                    status: 'active',
                    createdAt: new Date().toISOString(),
                    createdBy: 'system',
                    tenantId: user.uid, // المدير هو المجمع الخاص به
                    tenantName: `مجمع ${name}`,
                    permissions: {
                        manageUsers: true,
                        manageDoctors: true,
                        managePharmacy: true,
                        manageSettings: true,
                        viewReports: true,
                        fullAccess: true
                    }
                };

                // 3️⃣ حفظ بيانات المسؤول في مسار المجمعات
                await set(ref(db, `tenants/${user.uid}`), {
                    name: `مجمع ${name}`,
                    tenantName: `مجمع ${name}`,
                    adminUid: user.uid,
                    adminEmail: email,
                    adminPhone: phone || '',
                    createdAt: new Date().toISOString(),
                    status: 'active',
                    settings: {
                        clinicName: `مجمع ${name}`,
                        address: '',
                        phone: phone || '',
                        email: email,
                        workingHours: '08:00 - 22:00',
                        logo: ''
                    }
                });

                // 4️⃣ حفظ بيانات المسؤول في مسار المستخدمين داخل المجمع
                await set(ref(db, `tenants/${user.uid}/users/${user.uid}`), adminData);
                
                // 5️⃣ حفظ نسخة احتياطية في المسار العام
                await set(ref(db, `users/${user.uid}`), adminData);

                console.log('✅ تم حفظ جميع بيانات المسؤول بنجاح');

                // 6️⃣ عرض رسالة النجاح
                showSuccess('✅ تم إنشاء حساب المسؤول بنجاح! يمكنك الآن تسجيل الدخول.');
                showToast('🎉 تم إنشاء حساب المدير بنجاح!', 'success');
                
                // 7️⃣ تفريغ النموذج
                dom.registerForm.reset();
                
                // 8️⃣ تسجيل الخروج من الحساب الجديد (إذا كان هناك مستخدم سابق)
                try {
                    await signOut(auth);
                } catch (e) {
                    // تجاهل
                }
                
                setRegisterLoading(false);
                
                // 9️⃣ التحويل إلى تبويب تسجيل الدخول بعد ثانيتين
                setTimeout(() => {
                    switchTab('login');
                    dom.loginEmail.value = email;
                    dom.loginPassword.focus();
                }, 2000);

            } catch (error) {
                console.error("❌ خطأ في إنشاء حساب المدير:", error);
                
                const errorMessages = {
                    'auth/email-already-in-use': '❌ هذا البريد الإلكتروني مستخدم بالفعل',
                    'auth/invalid-email': '❌ صيغة البريد الإلكتروني غير صحيحة',
                    'auth/operation-not-allowed': '⚠️ إنشاء الحسابات غير مفعل حالياً',
                    'auth/weak-password': '⚠️ كلمة المرور ضعيفة جداً',
                    'auth/network-request-failed': '📡 خطأ في الاتصال بالإنترنت',
                };
                
                showError('register', errorMessages[error.code] || `⚠️ حدث خطأ: ${error.message}`);
                setRegisterLoading(false);
            }
        });

        // ============ إخفاء الأخطاء عند الكتابة ============
        dom.loginEmail.addEventListener('input', () => hideError('login'));
        dom.loginPassword.addEventListener('input', () => hideError('login'));
        dom.regName.addEventListener('input', () => { hideError('register'); hideSuccess(); });
        dom.regEmail.addEventListener('input', () => { hideError('register'); hideSuccess(); });
        dom.regPhone.addEventListener('input', () => { hideError('register'); hideSuccess(); });
        dom.regPassword.addEventListener('input', () => { hideError('register'); hideSuccess(); });
        dom.regConfirmPassword.addEventListener('input', () => { hideError('register'); hideSuccess(); });

        // ============ التحقق من الجلسة ============
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const localSession = getEncryptedSession();
                
                if (localSession && localSession.uid === user.uid) {
                    console.log('✅ جلسة صالحة، جاري التوجيه...');
                    redirectUser(localSession.role, localSession.name, localSession.tenantId);
                }
            }
        });

        console.log('🚀 نظام شفاء — جاهز للعمل');
    </script>
</body>
</html>
