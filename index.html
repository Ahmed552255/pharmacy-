<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>سُكُون — بوابة الدخول</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #7AC5C5;
            --accent: #5BA3A3;
            --accent-dark: #3F8585;
            --bg: #ECF9F9;
            --white: #FFFFFF;
            --ink: #2C4A4A;
            --text-sec: #6B8E8E;
            --danger: #E57373;
            --success: #5FA88D;
            --shadow: 0 12px 28px rgba(58, 128, 128, 0.12);
            --border-light: rgba(122, 197, 197, 0.2);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 16px; }
        body {
            font-family: 'Cairo', sans-serif;
            color: var(--ink);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.25rem;
            background: var(--bg);
            position: relative;
        }
        .bg-orbs { position: fixed; inset: 0; z-index: -1; overflow: hidden; }
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
            animation: float 35s infinite alternate ease-in-out;
            opacity: 0.5;
        }
        .orb1 {
            width: 55vw;
            height: 55vw;
            background: radial-gradient(circle, rgba(122, 197, 197, 0.25) 0%, transparent 70%);
            top: -20%;
            right: -15%;
        }
        .orb2 {
            width: 45vw;
            height: 45vw;
            background: radial-gradient(circle, rgba(91, 163, 163, 0.15) 0%, transparent 70%);
            bottom: -15%;
            left: -10%;
        }
        @keyframes float { to { transform: translate(30px, 30px); } }
        .glass-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-light);
            border-radius: 32px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 440px;
            padding: 2.5rem 2rem;
            text-align: center;
            z-index: 1;
            animation: popIn 0.7s cubic-bezier(0.2, 0.9, 0.3, 1) forwards;
            transform: scale(0.92);
            opacity: 0;
        }
        @keyframes popIn { to { transform: scale(1); opacity: 1; } }
        .card-header { margin-bottom: 2rem; }
        .card-header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--accent-dark);
            letter-spacing: -0.5px;
            margin-bottom: 0.4rem;
        }
        .card-header p { font-size: 1rem; color: var(--text-sec); font-weight: 500; }
        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
        }
        .input-group .icon {
            position: absolute;
            top: 50%;
            right: 1.25rem;
            transform: translateY(-50%);
            color: var(--accent);
            width: 20px;
            height: 20px;
            pointer-events: none;
        }
        .input-group input {
            width: 100%;
            padding: 1rem 3.5rem 1rem 3.5rem;
            background: var(--white);
            border: 1.5px solid rgba(122, 197, 197, 0.25);
            border-radius: 20px;
            outline: none;
            font-size: 1rem;
            font-family: 'Cairo', sans-serif;
            color: var(--ink);
            transition: all 0.25s ease;
        }
        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(122, 197, 197, 0.2);
            background: #ffffff;
        }
        .input-group input::placeholder { color: #A3C4C4; font-weight: 400; }
        .password-toggle {
            position: absolute;
            top: 50%;
            left: 1.25rem;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--accent);
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 20px;
            font-size: 1.2rem;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            transition: all 0.25s ease;
            background: linear-gradient(145deg, var(--primary), var(--accent));
            color: white;
            box-shadow: 0 8px 18px rgba(91, 163, 163, 0.25);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(91, 163, 163, 0.35);
        }
        .btn:disabled {
            opacity: 0.65;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .error-message {
            color: var(--danger);
            font-weight: 600;
            font-size: 0.9rem;
            margin-top: 1rem;
            padding: 0.6rem 1rem;
            background: rgba(229, 115, 115, 0.08);
            border-radius: 16px;
            opacity: 0;
            transition: opacity 0.25s;
            border: 1px solid rgba(229, 115, 115, 0.15);
            margin-bottom: 1rem;
        }
        .error-message.show { opacity: 1; }
        .toast-notification {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: bold;
            z-index: 9999;
            font-family: 'Cairo', sans-serif;
            box-shadow: 0 6px 16px rgba(0,0,0,0.1);
            animation: slideDown 0.3s ease;
            background: var(--success);
        }
        @keyframes slideDown {
            from { top: -40px; opacity: 0; }
            to { top: 24px; opacity: 1; }
        }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.7s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .badge-soft {
            background: rgba(122, 197, 197, 0.15);
            color: var(--accent-dark);
            font-size: 0.8rem;
            padding: 4px 14px;
            border-radius: 40px;
            display: inline-block;
            margin-bottom: 1rem;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="bg-orbs"><div class="orb orb1"></div><div class="orb orb2"></div></div>
    <main class="glass-card">
        <div class="badge-soft">🔐 دخول آمن</div>
        <header class="card-header">
            <h1>سُكُون</h1>
            <p>منصة إدارة العيادات والصيدليات</p>
        </header>
        <form id="loginForm">
            <div class="input-group">
                <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                    <polyline points="22,6 12,13 2,6"></polyline>
                </svg>
                <input type="email" id="username" placeholder="البريد الإلكتروني" required autocomplete="email">
            </div>
            <div class="input-group">
                <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
                <input type="password" id="password" placeholder="كلمة المرور" required autocomplete="current-password">
                <button type="button" class="password-toggle" id="togglePasswordBtn" title="إظهار/إخفاء كلمة المرور">
                    <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </button>
            </div>
            <div class="error-message" id="errorMessage"></div>
            <button type="submit" class="btn" id="loginButton">تسجيل الدخول</button>
        </form>
    </main>

    <script type="module">
        import { firebaseConfig } from './firebase-config.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // عناصر DOM
        const elements = {
            errorMessage: document.getElementById('errorMessage'),
            usernameInput: document.getElementById('username'),
            passwordInput: document.getElementById('password'),
            loginButton: document.getElementById('loginButton'),
            loginForm: document.getElementById('loginForm'),
            togglePasswordBtn: document.getElementById('togglePasswordBtn'),
            eyeIcon: document.getElementById('eyeIcon')
        };

        // ---------- دوال مساعدة ----------
        const showError = (msg) => {
            if (!msg) {
                elements.errorMessage.classList.remove('show');
                return;
            }
            elements.errorMessage.textContent = msg;
            elements.errorMessage.classList.add('show');
            setTimeout(() => elements.errorMessage.classList.remove('show'), 5000);
        };

        const showToast = (msg, ok = true) => {
            const toast = document.createElement('div');
            toast.className = 'toast-notification';
            toast.style.backgroundColor = ok ? '#5FA88D' : '#E57373';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        };

        const setLoading = (loading) => {
            elements.loginButton.disabled = loading;
            elements.loginButton.innerHTML = loading ? '<span class="spinner"></span> جاري التحقق...' : 'تسجيل الدخول';
        };

        // ---------- أيقونة العين ----------
        const eyeOpenSVG = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>`;
        const eyeOffSVG = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>`;

        elements.togglePasswordBtn.addEventListener('click', () => {
            const input = elements.passwordInput;
            const icon = elements.eyeIcon;
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerHTML = eyeOffSVG;
            } else {
                input.type = 'password';
                icon.innerHTML = eyeOpenSVG;
            }
        });

        // ---------- جلب بيانات المستخدم ----------
        const fetchUserData = async (uid) => {
            try {
                const snap = await get(ref(db, `users/${uid}`));
                if (snap.exists()) {
                    return snap.val();
                }
                return null;
            } catch (error) {
                console.error("Error fetching user data:", error);
                return null;
            }
        };

        // ---------- التوجيه بناءً على الصلاحية ----------
        const redirectUser = (role, name) => {
            showToast(`مرحباً ${name}!`, true);
            const pages = {
                admin: 'admin-panel.html',
                doctor: 'doctor-dashboard.html',
                nurse: 'nurse-dashboard.html',
                pharmacist: 'pharmacy-dashboard.html'
            };
            const redirect = pages[role] || 'dashboard.html';
            
            setTimeout(() => {
                window.location.href = redirect;
            }, 1500);
        };

        // ---------- معالجة تسجيل الدخول ----------
        const handleLogin = async (e) => {
            e.preventDefault();
            const email = elements.usernameInput.value.trim().toLowerCase();
            const pwd = elements.passwordInput.value;

            if (!email || !pwd) {
                showError('الرجاء إدخال البريد الإلكتروني وكلمة المرور');
                return;
            }

            setLoading(true);
            showError('');

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, pwd);
                const user = userCredential.user;
                
                const userData = await fetchUserData(user.uid);
                
                if (!userData || !userData.role) {
                    showError('❌ المستخدم غير موجود في قاعدة البيانات أو لا يملك صلاحيات.');
                    setLoading(false);
                    return;
                }

                const displayName = userData.name || user.email.split('@')[0];
                
                // حفظ البيانات في الجلسة (اختياري، لأن Firebase يحفظ الجلسة تلقائياً)
                sessionStorage.setItem('userRole', userData.role);
                sessionStorage.setItem('userName', displayName);

                redirectUser(userData.role, displayName);

            } catch (err) {
                console.error("Login error:", err);
                let msg = 'بيانات الدخول غير صحيحة';
                if (err.code === 'auth/user-not-found' || err.code === 'auth/invalid-credential') msg = '❌ البريد الإلكتروني أو كلمة المرور غير صحيحة';
                else if (err.code === 'auth/too-many-requests') msg = '⚠️ تم تعطيل الحساب مؤقتاً، حاول لاحقاً';
                else if (err.code === 'auth/network-request-failed') msg = '⚠️ مشكلة في الاتصال بالإنترنت';
                showError(msg);
                setLoading(false);
            }
        };

        // تم حذف onAuthStateChanged تماماً لمنع التوجيه التلقائي
        // المستخدم يجب أن يسجل دخوله كل مرة

        // ---------- ربط الأحداث ----------
        elements.loginForm.addEventListener('submit', handleLogin);
    </script>
</body>
</html>
