<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>سُكُون | دخول هادئ</title>
    <!-- Google Fonts: Cairo -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: radial-gradient(circle at 20% 30%, #0b1a2a 0%, #0a1120 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        /* ----- خلفية هادئة: نقاط مبعثرة وحركة بطيئة جداً ----- */
        .bg-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 30% 40%, rgba(180, 220, 255, 0.03) 1px, transparent 1px),
                radial-gradient(circle at 70% 80%, rgba(200, 230, 255, 0.02) 1px, transparent 1px);
            background-size: 80px 80px;
            animation: slowDrift 40s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes slowDrift {
            0% { background-position: 0 0; }
            100% { background-position: 80px 80px; }
        }

        /* كرات ضوئية ناعمة جداً تعكس السكون */
        .glow {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.25;
            z-index: 0;
            pointer-events: none;
        }

        .glow1 {
            width: 45vw;
            height: 45vw;
            background: #4a7c9b;
            top: -15vh;
            left: -10vw;
            animation: breathe 14s ease-in-out infinite alternate;
        }

        .glow2 {
            width: 40vw;
            height: 40vw;
            background: #3e6b8c;
            bottom: -10vh;
            right: -8vw;
            animation: breathe 12s ease-in-out infinite alternate-reverse;
        }

        @keyframes breathe {
            0% { opacity: 0.2; transform: scale(1); }
            100% { opacity: 0.4; transform: scale(1.1); }
        }

        /* ----- بطاقة زجاجية هادئة ----- */
        .glass-card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            background: rgba(20, 40, 55, 0.25);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 48px;
            padding: 2.8rem 2.2rem;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.03) inset;
            border: 1px solid rgba(220, 240, 255, 0.08);
            animation: gentleRise 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transform-origin: center;
        }

        @keyframes gentleRise {
            0% { opacity: 0; transform: translateY(30px) scale(0.96); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* شارة دخول آمن */
        .secure-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.05);
            padding: 0.4rem 1.5rem;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 400;
            color: #d4e6f5;
            margin-bottom: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
            letter-spacing: 0.3px;
        }

        /* أيقونة التطبيق - تعبر عن الهدوء */
        .app-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
            background: linear-gradient(145deg, #3a6073, #16222e);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 25px -8px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(200, 225, 240, 0.1) inset;
        }

        .app-icon svg {
            width: 44px;
            height: 44px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
            opacity: 0.9;
        }

        h1 {
            color: #f0f7fc;
            font-size: 2.8rem;
            font-weight: 300;
            text-align: center;
            letter-spacing: 2px;
            margin-bottom: 2.2rem;
            text-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
            word-spacing: 6px;
        }

        /* حقول الإدخال بتصميم ناعم */
        .input-group {
            margin-bottom: 1.8rem;
            position: relative;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            right: 18px;
            color: rgba(200, 220, 240, 0.7);
            font-size: 1.1rem;
            pointer-events: none;
        }

        .toggle-password {
            position: absolute;
            left: 18px;
            background: none;
            border: none;
            color: rgba(200, 220, 240, 0.6);
            font-size: 1.1rem;
            cursor: pointer;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
            z-index: 5;
        }

        .toggle-password:hover {
            color: #eef4ff;
        }

        input {
            width: 100%;
            background: rgba(10, 25, 35, 0.4);
            border: 1.5px solid rgba(180, 210, 230, 0.15);
            border-radius: 24px;
            padding: 1rem 3rem 1rem 1.2rem;
            font-size: 1rem;
            font-family: 'Cairo', sans-serif;
            font-weight: 400;
            color: #ecf3f9;
            outline: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        input::placeholder {
            color: rgba(190, 215, 235, 0.45);
            font-weight: 300;
        }

        input:focus {
            border-color: #a0c8e0;
            box-shadow: 0 0 0 4px rgba(150, 200, 230, 0.08);
            background: rgba(15, 35, 48, 0.5);
        }

        /* زر تسجيل الدخول - هادئ وأنيق */
        .login-btn {
            width: 100%;
            background: #e2edf5;
            color: #0f1e28;
            border: none;
            border-radius: 24px;
            padding: 1rem;
            font-size: 1.2rem;
            font-weight: 500;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            box-shadow: 0 8px 20px -5px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            margin-top: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            letter-spacing: 0.5px;
        }

        .login-btn:hover {
            background: #f5faff;
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -8px rgba(0, 0, 0, 0.4);
        }

        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(15, 30, 40, 0.2);
            border-radius: 50%;
            border-top-color: #1e3a4d;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* صندوق الخطأ */
        .error-box {
            margin-top: 1.5rem;
            padding: 1rem;
            background: rgba(150, 40, 40, 0.15);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(200, 80, 80, 0.25);
            border-radius: 20px;
            color: #fcd4d4;
            font-size: 0.95rem;
            text-align: center;
            display: none;
        }

        .error-box.show {
            display: block;
            animation: softShake 0.4s ease;
        }

        @keyframes softShake {
            0%,100% { transform: translateX(0); }
            20% { transform: translateX(-4px); }
            40% { transform: translateX(4px); }
            60% { transform: translateX(-2px); }
            80% { transform: translateX(2px); }
        }

        /* تذييل بسيط */
        .footer-note {
            margin-top: 2rem;
            text-align: center;
            color: rgba(190, 215, 235, 0.35);
            font-size: 0.8rem;
            font-weight: 300;
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            top: 24px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            pointer-events: none;
            z-index: 9999;
        }

        .toast {
            background: rgba(12, 28, 38, 0.9);
            backdrop-filter: blur(16px);
            color: #e3f0fa;
            padding: 1rem 2rem;
            border-radius: 60px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid rgba(180, 215, 240, 0.15);
            font-weight: 400;
            pointer-events: none;
            animation: toastIn 0.3s ease;
            max-width: 90%;
        }

        .toast.success { border-right: 6px solid #5fa8b3; }
        .toast.error { border-right: 6px solid #b55a5a; }

        @keyframes toastIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* تجاوب */
        @media (max-width: 480px) {
            .glass-card { padding: 2.2rem 1.6rem; }
            h1 { font-size: 2.4rem; }
        }
    </style>
</head>
<body>
    <!-- خلفية هادئة -->
    <div class="bg-pattern"></div>
    <div class="glow glow1"></div>
    <div class="glow glow2"></div>

    <!-- Toast container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- البطاقة الرئيسية -->
    <div class="glass-card">
        <div style="text-align: center;">
            <span class="secure-badge">
                <span style="font-size:1.1rem;">🌙</span> مساحة هادئة وآمنة
            </span>
        </div>

        <div class="app-icon">
            <!-- أيقونة تعبر عن السكون (ورقة شجر أو قطرة) -->
            <svg viewBox="0 0 24 24" fill="none" stroke="#d6e9f5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2v20M12 2C8 6 4 10 4 14c0 4 3 6 8 6s8-2 8-6c0-4-4-8-8-12z"/>
                <path d="M12 2c4 4 8 8 8 12 0 4-3 6-8 6"/>
            </svg>
        </div>

        <h1>سُكُون</h1>

        <form id="loginForm" onsubmit="return false;">
            <!-- حقل البريد الإلكتروني -->
            <div class="input-group">
                <div class="input-wrapper">
                    <span class="input-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                            <polyline points="22,6 12,13 2,6"/>
                        </svg>
                    </span>
                    <input type="email" id="email" placeholder="البريد الإلكتروني" dir="ltr" required autocomplete="email">
                </div>
            </div>

            <!-- حقل كلمة المرور -->
            <div class="input-group">
                <div class="input-wrapper">
                    <span class="input-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                    </span>
                    <input type="password" id="password" placeholder="كلمة المرور" dir="ltr" required autocomplete="current-password">
                    <button type="button" class="toggle-password" id="togglePassword" aria-label="إظهار كلمة المرور">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- رسالة الخطأ -->
            <div class="error-box" id="errorBox"></div>

            <!-- زر تسجيل الدخول -->
            <button type="submit" class="login-btn" id="loginBtn">
                <span id="btnText">دخول هادئ</span>
                <span id="btnSpinner" class="spinner" style="display:none;"></span>
            </button>

            <!-- تذييل هادئ بدل رابط نسيت كلمة المرور -->
            <div class="footer-note">
                <span>⚘ سكينة وراحة بال ⚘</span>
            </div>
        </form>
    </div>

    <!-- Firebase SDKs و Script التطبيق (بدون تخزين محلي) -->
    <script type="module">
        // ==================== استيراد التكوين ====================
        import { firebaseConfig } from './firebase-config.js';
        
        // استيراد دوال Firebase
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js';
        import { 
            getAuth, 
            signInWithEmailAndPassword
        } from 'https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js';
        import { 
            getFirestore, 
            doc, 
            getDoc 
        } from 'https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js';

        // تهيئة Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ==================== دوال مساعدة (بدون IndexedDB) ====================
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        function showError(message) {
            const errorBox = document.getElementById('errorBox');
            errorBox.textContent = message;
            errorBox.classList.add('show');
        }

        function hideError() {
            document.getElementById('errorBox').classList.remove('show');
        }

        function setLoading(isLoading) {
            const btn = document.getElementById('loginBtn');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('btnSpinner');
            btn.disabled = isLoading;
            btnText.style.display = isLoading ? 'none' : 'inline';
            spinner.style.display = isLoading ? 'inline-block' : 'none';
            if (isLoading) hideError();
        }

        // توجيه حسب الدور (بدون تخزين محلي)
        function redirectBasedOnRole(role, name = '') {
            const routes = {
                'admin': 'admin-panel.html',
                'doctor': 'doctor-dashboard.html',
                'nurse': 'attendant.html',
                'pharmacist': 'pharmacy-dashboard.html'
            };
            const target = routes[role] || 'index.html';
            if (name) showToast(`أهلاً ${name} ، نتمنى لك وقتاً هادئاً 🌿`, 'success');
            setTimeout(() => window.location.href = target, 1000);
        }

        // جلب الدور من Firestore مع إعادة المحاولة (بدون تخزين)
        async function fetchUserRole(uid, retries = 3) {
            for (let i = 0; i < retries; i++) {
                try {
                    const userDocRef = doc(db, 'users', uid);
                    const userSnap = await getDoc(userDocRef);
                    
                    if (userSnap.exists()) {
                        const data = userSnap.data();
                        let role = data.role;
                        if (!role && data.linkedDoctor) role = 'nurse';
                        if (!role) role = 'doctor';
                        
                        return { role, name: data.name || data.displayName || '' };
                    }
                    if (i < retries - 1) {
                        await new Promise(r => setTimeout(r, 800));
                    }
                } catch (e) {
                    console.warn(`محاولة ${i+1} فشلت:`, e);
                    if (i === retries - 1) throw e;
                    await new Promise(r => setTimeout(r, 800));
                }
            }
            return { role: 'doctor', name: '' };
        }

        // معالجة تسجيل الدخول (بدون حفظ جلسة)
        async function handleLogin(email, password) {
            hideError();
            
            // 1. المدير الثابت (لا تخزين)
            if (email === 'admin@sokoon.com' && password === 'Admin@2024Secure') {
                showToast('مرحباً بالمدير ، أجواء هادئة 👑', 'success');
                redirectBasedOnRole('admin', 'المدير العام');
                return;
            }

            // 2. مستخدم Firebase
            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                const { role, name } = await fetchUserRole(user.uid);
                
                // لا نقوم بتخزين أي شيء، فقط توجيه مباشر
                redirectBasedOnRole(role, name || user.displayName || '');
                
            } catch (error) {
                console.error('خطأ تسجيل الدخول:', error);
                let errorMsg = 'حدث خطأ أثناء تسجيل الدخول';
                
                switch (error.code) {
                    case 'auth/invalid-email':
                        errorMsg = 'صيغة البريد الإلكتروني غير صحيحة';
                        break;
                    case 'auth/user-disabled':
                        errorMsg = 'هذا الحساب معطل، يرجى التواصل مع الإدارة';
                        break;
                    case 'auth/user-not-found':
                        errorMsg = 'البريد الإلكتروني غير مسجل';
                        break;
                    case 'auth/wrong-password':
                        errorMsg = 'كلمة المرور غير صحيحة';
                        break;
                    case 'auth/too-many-requests':
                        errorMsg = 'محاولات كثيرة جداً، حاول لاحقاً';
                        break;
                    case 'auth/network-request-failed':
                        errorMsg = 'انقطع الاتصال بالإنترنت، تحقق من الشبكة';
                        break;
                    default:
                        errorMsg = `خطأ: ${error.message}`;
                }
                
                showError(errorMsg);
                showToast(errorMsg, 'error');
                throw error;
            }
        }

        // ==================== تهيئة الصفحة (بدون توجيه تلقائي) ====================
        document.addEventListener('DOMContentLoaded', () => {
            // إظهار/إخفاء كلمة المرور
            const toggleBtn = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('password');
            toggleBtn.addEventListener('click', () => {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                toggleBtn.innerHTML = type === 'password' 
                    ? `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`
                    : `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
            });

            // معالجة تقديم النموذج
            const form = document.getElementById('loginForm');
            const emailInput = document.getElementById('email');
            
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = emailInput.value.trim();
                const pwd = passwordInput.value;
                
                if (!email || !pwd) {
                    showError('يرجى إدخال البريد وكلمة المرور');
                    return;
                }
                
                setLoading(true);
                try {
                    await handleLogin(email, pwd);
                } catch (err) {
                    // الخطأ معروض بالفعل
                } finally {
                    setLoading(false);
                }
            });

            // إخفاء الخطأ عند الكتابة
            emailInput.addEventListener('input', hideError);
            passwordInput.addEventListener('input', hideError);
        });

        export {};
    </script>
    <!-- ملاحظة: يجب أن يكون ملف firebase-config.js موجوداً في نفس المجلد ويصدر firebaseConfig -->
</body>
</html>
