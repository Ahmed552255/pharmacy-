<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>سُكُون — بوابة الدخول</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/feather-icons"></script>

    <style>
        /* نفس التنسيقات السابقة - دون تغيير */
        :root {
            --primary: #7AC5C5; --accent: #5BA3A3; --accent-dark: #3F8585;
            --bg: #ECF9F9; --white: #FFFFFF; --ink: #2C4A4A; --text-sec: #6B8E8E;
            --danger: #E57373; --success: #5FA88D; --shadow: 0 12px 28px rgba(58, 128, 128, 0.12);
            --border-light: rgba(122, 197, 197, 0.2);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 16px; }
        body {
            font-family: 'Cairo', sans-serif; color: var(--ink);
            min-height: 100vh; display: flex; justify-content: center; align-items: center;
            padding: 1.25rem; background: var(--bg); position: relative;
        }
        .bg-orbs { position: fixed; inset: 0; z-index: -1; overflow: hidden; }
        .orb {
            position: absolute; border-radius: 50%; filter: blur(100px);
            pointer-events: none; animation: float 35s infinite alternate ease-in-out; opacity: 0.5;
        }
        .orb1 {
            width: 55vw; height: 55vw; background: radial-gradient(circle, rgba(122,197,197,0.25) 0%, transparent 70%);
            top: -20%; right: -15%;
        }
        .orb2 {
            width: 45vw; height: 45vw; background: radial-gradient(circle, rgba(91,163,163,0.15) 0%, transparent 70%);
            bottom: -15%; left: -10%;
        }
        @keyframes float { to { transform: translate(30px, 30px); } }
        .glass-card {
            background: rgba(255,255,255,0.75); backdrop-filter: blur(16px);
            border: 1px solid var(--border-light); border-radius: 32px;
            box-shadow: var(--shadow); width: 100%; max-width: 440px; padding: 2.5rem 2rem;
            text-align: center; z-index: 1; animation: popIn 0.7s cubic-bezier(0.2,0.9,0.3,1) forwards;
            transform: scale(0.92); opacity: 0;
        }
        @keyframes popIn { to { transform: scale(1); opacity: 1; } }
        .card-header { margin-bottom: 2rem; }
        .card-header h1 { font-size: 2.2rem; font-weight: 800; color: var(--accent-dark); }
        .card-header p { font-size: 1rem; color: var(--text-sec); font-weight: 500; }
        .input-group { position: relative; margin-bottom: 1.5rem; }
        .input-group .icon {
            position: absolute; top: 50%; right: 1.25rem; transform: translateY(-50%);
            color: var(--accent); width: 20px; height: 20px;
        }
        .input-group input {
            width: 100%; padding: 1rem 3.5rem 1rem 1.5rem; background: var(--white);
            border: 1.5px solid rgba(122,197,197,0.25); border-radius: 20px;
            outline: none; font-size: 1rem; font-family: 'Cairo', sans-serif; color: var(--ink);
            transition: all 0.25s ease;
        }
        .input-group input:focus {
            border-color: var(--primary); box-shadow: 0 0 0 4px rgba(122,197,197,0.2);
        }
        .btn {
            width: 100%; padding: 1rem; border: none; border-radius: 20px;
            font-size: 1.2rem; font-weight: 700; font-family: 'Cairo', sans-serif;
            cursor: pointer; transition: all 0.25s ease;
            background: linear-gradient(145deg, var(--primary), var(--accent));
            color: white; box-shadow: 0 8px 18px rgba(91,163,163,0.25);
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 12px 24px rgba(91,163,163,0.35); }
        .btn:disabled { opacity: 0.65; cursor: not-allowed; transform: none; }
        .error-message {
            color: var(--danger); font-weight: 600; font-size: 0.9rem; margin-top: 1rem;
            padding: 0.6rem 1rem; background: rgba(229,115,115,0.08);
            border-radius: 16px; opacity: 0; transition: opacity 0.25s;
            border: 1px solid rgba(229,115,115,0.15);
        }
        .error-message.show { opacity: 1; }
        .toast-notification {
            position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
            color: white; padding: 12px 28px; border-radius: 40px; font-weight: bold;
            z-index: 9999; box-shadow: 0 6px 16px rgba(0,0,0,0.1);
            animation: slideDown 0.3s ease; background: var(--success);
        }
        @keyframes slideDown { from { top: -40px; opacity: 0; } to { top: 24px; opacity: 1; } }
        .spinner {
            display: inline-block; width: 20px; height: 20px;
            border: 2px solid rgba(255,255,255,0.3); border-radius: 50%;
            border-top-color: white; animation: spin 0.7s linear infinite;
            margin-left: 8px; vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .badge-soft {
            background: rgba(122,197,197,0.15); color: var(--accent-dark);
            font-size: 0.8rem; padding: 4px 14px; border-radius: 40px;
            display: inline-block; margin-bottom: 1rem; font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="bg-orbs">
        <div class="orb orb1"></div>
        <div class="orb orb2"></div>
    </div>

    <main class="glass-card">
        <div class="badge-soft">🔐 دخول آمن</div>
        <header class="card-header">
            <h1>سُكُون</h1>
            <p>منصة إدارة العيادات والصيدليات</p>
        </header>
        
        <form id="loginForm">
            <div class="input-group">
                <input type="text" id="username" placeholder="البريد الإلكتروني" required autocomplete="off">
                <i class="icon" data-feather="mail"></i>
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="كلمة المرور" required autocomplete="off">
                <i class="icon" data-feather="lock"></i>
            </div>

            <div class="error-message" id="errorMessage"></div>

            <button type="submit" class="btn" id="loginButton">تسجيل الدخول</button>
        </form>
    </main>

    <script type="module">
        feather.replace();
        
        // ==================== استيراد الإعدادات من ملف خارجي ====================
        import { firebaseConfig } from './firebase-config.js';
        
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ==================== IndexedDB للجلسة ====================
        class SessionCache {
            constructor() { this.db = null; }
            async init() {
                if (this.db) return;
                return new Promise((resolve, reject) => {
                    const req = indexedDB.open('SakoonSession', 1);
                    req.onerror = () => reject(req.error);
                    req.onsuccess = () => { this.db = req.result; resolve(); };
                    req.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains('session')) {
                            db.createObjectStore('session', { keyPath: 'key' });
                        }
                    };
                });
            }
            async saveSession(data) {
                await this.init();
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction('session', 'readwrite');
                    const store = tx.objectStore('session');
                    store.put({ key: 'current', ...data });
                    tx.oncomplete = () => resolve();
                    tx.onerror = () => reject(tx.error);
                });
            }
            async getSession() {
                await this.init();
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction('session', 'readonly');
                    const store = tx.objectStore('session');
                    const req = store.get('current');
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = () => reject(req.error);
                });
            }
            async clearSession() {
                await this.init();
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction('session', 'readwrite');
                    const store = tx.objectStore('session');
                    store.delete('current');
                    tx.oncomplete = () => resolve();
                    tx.onerror = () => reject(tx.error);
                });
            }
        }
        const sessionCache = new SessionCache();

        // بيانات المدير التجريبية (ثابتة)
        const ADMIN_CREDENTIALS = {
            email: "admin@sokoon.com",
            password: "Admin@2024Secure"
        };

        const elements = {
            errorMessage: document.getElementById('errorMessage'),
            usernameInput: document.getElementById('username'),
            passwordInput: document.getElementById('password'),
            loginButton: document.getElementById('loginButton'),
            loginForm: document.getElementById('loginForm')
        };

        function showError(msg) {
            elements.errorMessage.textContent = msg;
            elements.errorMessage.classList.add('show');
            setTimeout(() => elements.errorMessage.classList.remove('show'), 5000);
        }

        function showToast(msg, isSuccess = true) {
            const toast = document.createElement('div');
            toast.className = 'toast-notification';
            toast.style.backgroundColor = isSuccess ? '#5FA88D' : '#E57373';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        function setLoading(isLoading) {
            elements.loginButton.disabled = isLoading;
            elements.loginButton.innerHTML = isLoading 
                ? '<span class="spinner"></span> جاري التحقق...' 
                : 'تسجيل الدخول';
        }

        async function fetchUserRole(uid, retries = 3) {
            for (let i = 0; i < retries; i++) {
                try {
                    const userDocRef = doc(db, "users", uid);
                    const userSnap = await getDoc(userDocRef);
                    if (userSnap.exists()) {
                        const data = userSnap.data();
                        if (data.role) return data.role;
                        if (data.linkedDoctor) return 'nurse';
                        return 'doctor';
                    }
                    if (i < retries - 1) {
                        await new Promise(resolve => setTimeout(resolve, 800));
                    }
                } catch (error) {
                    console.warn(`محاولة ${i+1} فشلت:`, error);
                    if (i === retries - 1) throw error;
                    await new Promise(resolve => setTimeout(resolve, 800));
                }
            }
            return 'nurse';
        }

        async function handleLogin(e) {
            e.preventDefault();
            const email = elements.usernameInput.value.trim().toLowerCase();
            const password = elements.passwordInput.value;
            
            if (!email || !password) {
                showError('الرجاء إدخال البريد الإلكتروني وكلمة المرور');
                return;
            }
            
            setLoading(true);
            showError('');
            
            // 1. التحقق من المدير الثابت
            if (email === ADMIN_CREDENTIALS.email && password === ADMIN_CREDENTIALS.password) {
                const sessionData = { role: 'admin', email, name: 'مدير النظام' };
                await sessionCache.saveSession(sessionData);
                showToast('مرحباً مدير النظام!', true);
                setTimeout(() => window.location.href = 'admin-panel.html', 1500);
                return;
            }
            
            // 2. المستخدمون العاديون عبر Firebase
            try {
                const userCred = await signInWithEmailAndPassword(auth, email, password);
                const user = userCred.user;
                
                let role;
                try {
                    role = await fetchUserRole(user.uid);
                } catch (roleError) {
                    console.error("فشل جلب الدور:", roleError);
                    role = 'nurse';
                    showToast('تم الدخول، ولكن تعذر تحديد الصلاحيات بدقة. قد تحتاج لمراجعة المدير.', false);
                }
                
                const sessionData = {
                    role,
                    email: user.email,
                    name: user.email.split('@')[0],
                    uid: user.uid
                };
                await sessionCache.saveSession(sessionData);
                
                showToast(`مرحباً ${sessionData.name}!`, true);
                
                let redirectPage;
                switch (role) {
                    case 'admin': redirectPage = 'admin-panel.html'; break;
                    case 'doctor': redirectPage = 'doctor-dashboard.html'; break;
                    case 'nurse': redirectPage = 'attendant.html'; break;
                    case 'pharmacist': redirectPage = 'pharmacy-dashboard.html'; break;
                    default: redirectPage = 'attendant.html';
                }
                
                setTimeout(() => window.location.href = redirectPage, 1500);
                
            } catch (error) {
                console.error("Login error:", error);
                let msg = 'بيانات الدخول غير صحيحة';
                if (error.code === 'auth/user-not-found') msg = '❌ البريد غير مسجل';
                else if (error.code === 'auth/wrong-password') msg = '❌ كلمة مرور خاطئة';
                else if (error.code === 'auth/too-many-requests') msg = '⚠️ الحساب معلق مؤقتاً';
                showError(msg);
                setLoading(false);
            }
        }

        async function checkExistingSession() {
            const session = await sessionCache.getSession();
            if (session && session.role && session.name) {
                let redirect;
                switch (session.role) {
                    case 'admin': redirect = 'admin-panel.html'; break;
                    case 'doctor': redirect = 'doctor-dashboard.html'; break;
                    case 'nurse': redirect = 'attendant.html'; break;
                    case 'pharmacist': redirect = 'pharmacy-dashboard.html'; break;
                    default: redirect = 'attendant.html';
                }
                showToast(`أهلاً بعودتك ${session.name}!`, true);
                setTimeout(() => window.location.href = redirect, 1200);
            }
        }

        elements.loginForm.addEventListener('submit', handleLogin);
        checkExistingSession();
    </script>
</body>
</html>
