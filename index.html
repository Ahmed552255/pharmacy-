<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#00AEEF">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="شفاء">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <link rel="manifest" href="/manifest.json">
    <title>شفاء — تسجيل الدخول</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap&subset=arabic" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00AEEF;
            --primary-dark: #008080;
            --primary-light: #E0F7FA;
            --bg: #FAFAFA;
            --white: #FFFFFF;
            --ink: #1A3C4A;
            --text-sec: #5A7D8A;
            --danger: #E57373;
            --success: #26A69A;
            --warning: #FFA726;
            --shadow: 0 10px 30px rgba(0, 174, 239, 0.08);
            --border-light: rgba(0, 174, 239, 0.2);
            --transition-speed: 0.2s;
            --safe-bottom: env(safe-area-inset-bottom, 16px);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html { 
            font-size: 16px; 
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -webkit-text-size-adjust: 100%;
        }
        
        body {
            font-family: 'Cairo', sans-serif;
            color: var(--ink);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.25rem;
            padding-bottom: calc(1.25rem + var(--safe-bottom));
            background: var(--bg);
            position: relative;
            overflow-x: hidden;
        }
        
        /* ============ شاشة التحميل Splash Screen ============ */
        .splash-screen {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #f0fafd 0%, #e8f6f9 30%, #f5f9fb 60%, #edf7fa 100%);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease, visibility 0.5s ease;
            opacity: 1;
            visibility: visible;
        }
        
        .splash-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        
        .splash-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            animation: splashPulse 2s ease-in-out infinite;
        }
        
        @keyframes splashPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        
        .splash-logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 12px 30px rgba(0, 174, 239, 0.3);
            animation: logoFloat 3s ease-in-out infinite;
        }
        
        @keyframes logoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        
        .splash-logo svg {
            width: 44px;
            height: 44px;
            color: white;
            animation: heartBeat 1.5s ease-in-out infinite;
        }
        
        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            15% { transform: scale(1.15); }
            30% { transform: scale(1); }
            45% { transform: scale(1.1); }
            60% { transform: scale(1); }
        }
        
        .splash-title {
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        
        .splash-subtitle {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-sec);
            text-align: center;
            opacity: 0.8;
        }
        
        .splash-loader-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.8rem;
            margin-top: 0.5rem;
        }
        
        .splash-progress-bar {
            width: 200px;
            height: 4px;
            background: rgba(0, 174, 239, 0.1);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }
        
        .splash-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--primary-dark), var(--primary));
            border-radius: 10px;
            width: 0%;
            transition: width 0.6s ease;
            animation: progressShine 2s linear infinite;
            background-size: 200% 100%;
        }
        
        @keyframes progressShine {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        .splash-status {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--primary-dark);
            min-height: 24px;
            text-align: center;
            transition: all 0.3s ease;
        }
        
        .splash-dots {
            display: flex;
            gap: 6px;
            margin-top: 0.3rem;
        }
        
        .splash-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--primary);
            opacity: 0.3;
            animation: dotBounce 1.4s ease-in-out infinite;
        }
        
        .splash-dot:nth-child(1) { animation-delay: 0s; }
        .splash-dot:nth-child(2) { animation-delay: 0.2s; }
        .splash-dot:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes dotBounce {
            0%, 80%, 100% { opacity: 0.3; transform: translateY(0); }
            40% { opacity: 1; transform: translateY(-6px); }
        }
        
        /* ============ PWA Install Prompt ============ */
        .install-prompt-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            padding: 1rem;
        }
        
        .install-prompt-overlay.show {
            opacity: 1;
            visibility: visible;
        }
        
        .install-prompt-card {
            background: white;
            border-radius: 24px;
            padding: 2rem 1.5rem;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            animation: slideUp 0.4s ease-out;
            position: relative;
        }
        
        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .install-prompt-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.2rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 12px 30px rgba(0, 174, 239, 0.3);
        }
        
        .install-prompt-icon svg {
            width: 44px;
            height: 44px;
            color: white;
        }
        
        .install-prompt-card h2 {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary-dark);
            margin-bottom: 0.5rem;
        }
        
        .install-prompt-card p {
            font-size: 0.95rem;
            color: var(--text-sec);
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }
        
        .install-benefits {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            text-align: right;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .install-benefit-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: var(--ink);
            background: rgba(0, 174, 239, 0.05);
            padding: 0.5rem 0.8rem;
            border-radius: 12px;
            font-weight: 600;
        }
        
        .install-benefit-item svg {
            width: 18px;
            height: 18px;
            color: var(--success);
            flex-shrink: 0;
        }
        
        .install-actions {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }
        
        .btn-install {
            flex: 1;
            min-width: 140px;
            padding: 0.85rem 1.2rem;
            border: none;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            box-shadow: 0 6px 18px rgba(0, 174, 239, 0.25);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-install:active {
            transform: scale(0.97);
        }
        
        .btn-install-secondary {
            flex: 1;
            min-width: 140px;
            padding: 0.85rem 1.2rem;
            border: 2px solid rgba(0, 174, 239, 0.3);
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            background: white;
            color: var(--primary-dark);
            transition: all 0.2s;
        }
        
        .btn-install-secondary:active {
            background: rgba(0, 174, 239, 0.05);
        }
        
        .install-platform-specific {
            background: rgba(0, 128, 128, 0.05);
            border-radius: 16px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            text-align: right;
        }
        
        .install-platform-specific h4 {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .install-steps {
            list-style: none;
            padding: 0;
        }
        
        .install-steps li {
            font-size: 0.82rem;
            color: var(--ink);
            padding: 0.4rem 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 500;
        }
        
        .install-steps li::before {
            content: '•';
            color: var(--primary);
            font-weight: bold;
            font-size: 1.2rem;
        }
        
        /* ============ خلفية الصفحة ============ */
        .bg-pattern {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
        }
        
        .bg-pattern::before {
            content: '';
            position: absolute;
            top: -30%;
            right: -20%;
            width: 60vw;
            height: 60vw;
            max-width: 500px;
            max-height: 500px;
            background: radial-gradient(circle, rgba(0, 174, 239, 0.06) 0%, transparent 70%);
            border-radius: 50%;
        }
        
        .bg-pattern::after {
            content: '';
            position: absolute;
            bottom: -25%;
            left: -15%;
            width: 50vw;
            height: 50vw;
            max-width: 400px;
            max-height: 400px;
            background: radial-gradient(circle, rgba(0, 128, 128, 0.04) 0%, transparent 70%);
            border-radius: 50%;
        }
        
        /* ============ بطاقة تسجيل الدخول ============ */
        .glass-card {
            background: var(--white);
            border: 1px solid var(--border-light);
            border-radius: 28px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 440px;
            padding: 2rem 1.8rem;
            text-align: center;
            z-index: 1;
            animation: cardIn 0.4s ease-out forwards;
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        
        .glass-card.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        .logo-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 18px;
            margin: 0 auto 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(0, 174, 239, 0.2);
        }
        
        .logo-icon svg {
            width: 32px;
            height: 32px;
            color: white;
        }
        
        .card-header h1 {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary-dark);
            letter-spacing: -0.3px;
            margin-bottom: 0.3rem;
        }
        
        .card-header p {
            font-size: 0.95rem;
            color: var(--text-sec);
            font-weight: 500;
            margin-bottom: 0.5rem;
        }
        
        .secure-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(38, 166, 154, 0.08);
            color: var(--success);
            font-size: 0.78rem;
            padding: 5px 14px;
            border-radius: 30px;
            font-weight: 600;
            margin-bottom: 1.6rem;
            border: 1px solid rgba(38, 166, 154, 0.15);
        }
        
        .secure-badge svg {
            width: 14px;
            height: 14px;
        }
        
        .input-wrapper {
            margin-bottom: 1.1rem;
            text-align: right;
        }
        
        .input-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--ink);
            margin-bottom: 0.4rem;
            padding-right: 0.3rem;
        }
        
        .input-group {
            position: relative;
        }
        
        .input-group .input-icon {
            position: absolute;
            top: 50%;
            right: 1rem;
            transform: translateY(-50%);
            color: var(--primary);
            width: 20px;
            height: 20px;
            pointer-events: none;
        }
        
        .input-group input {
            width: 100%;
            padding: 0.85rem 2.8rem;
            background: #F5FAFC;
            border: 1.5px solid rgba(0, 174, 239, 0.15);
            border-radius: 16px;
            outline: none;
            font-size: 0.95rem;
            font-family: 'Cairo', sans-serif;
            color: var(--ink);
            -webkit-appearance: none;
            appearance: none;
            min-height: 48px;
        }
        
        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 174, 239, 0.1);
            background: #ffffff;
        }
        
        .input-group input::placeholder {
            color: #B0C8D0;
            font-weight: 400;
        }
        
        .password-toggle {
            position: absolute;
            top: 50%;
            left: 0.8rem;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--primary);
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            min-width: 44px;
            min-height: 44px;
            touch-action: manipulation;
        }
        
        .password-toggle:active {
            background: rgba(0, 174, 239, 0.15);
        }
        
        .error-message {
            color: var(--danger);
            font-weight: 600;
            font-size: 0.85rem;
            padding: 0.6rem 1rem;
            background: rgba(229, 115, 115, 0.05);
            border-radius: 14px;
            opacity: 0;
            transition: all var(--transition-speed);
            border: 1px solid rgba(229, 115, 115, 0.1);
            margin-bottom: 0.8rem;
            max-height: 0;
            overflow: hidden;
        }
        
        .error-message.show {
            opacity: 1;
            max-height: 100px;
            padding: 0.6rem 1rem;
        }
        
        .btn-primary {
            width: 100%;
            padding: 0.95rem;
            border: none;
            border-radius: 18px;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            box-shadow: 0 6px 18px rgba(0, 174, 239, 0.2);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            min-height: 52px;
            touch-action: manipulation;
        }
        
        .btn-primary:active:not(:disabled) {
            transform: scale(0.98);
        }
        
        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        .btn-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            pointer-events: none;
        }
        
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.5s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 700;
            z-index: 11000;
            font-family: 'Cairo', sans-serif;
            font-size: 0.9rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            transition: transform 0.25s ease-out;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 8px;
            max-width: 90vw;
        }
        
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.success { background: var(--success); }
        .toast.error { background: var(--danger); }
        .toast.warning { background: var(--warning); }
        
        .loading-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--primary-dark));
            width: 0%;
            z-index: 11000;
            transition: width 1.2s ease-out;
        }
        
        .loading-bar.active { width: 85%; }
        .loading-bar.done {
            width: 100%;
            transition: width 0.25s ease;
            opacity: 0;
        }
        
        /* ============ RESPONSIVE ============ */
        @media (max-width: 480px) {
            html { font-size: 15px; }
            body { padding: 0.75rem; padding-bottom: calc(0.75rem + var(--safe-bottom)); }
            .splash-logo { width: 65px; height: 65px; border-radius: 18px; }
            .splash-logo svg { width: 36px; height: 36px; }
            .splash-title { font-size: 2rem; }
            .splash-subtitle { font-size: 0.9rem; }
            .splash-progress-bar { width: 160px; }
            .glass-card { padding: 1.5rem 1.2rem; border-radius: 24px; }
            .card-header h1 { font-size: 1.7rem; }
            .input-group input { padding: 0.8rem 2.5rem; font-size: 0.9rem; min-height: 48px; border-radius: 14px; }
            .btn-primary { min-height: 50px; font-size: 1rem; border-radius: 16px; }
            .logo-icon { width: 48px; height: 48px; border-radius: 14px; }
            .logo-icon svg { width: 28px; height: 28px; }
            .toast { padding: 10px 18px; font-size: 0.85rem; border-radius: 24px; }
            .install-prompt-card { padding: 1.5rem 1rem; }
            .install-prompt-icon { width: 60px; height: 60px; border-radius: 16px; }
            .install-prompt-icon svg { width: 32px; height: 32px; }
        }

        @media (max-width: 360px) {
            html { font-size: 14px; }
            .splash-logo { width: 55px; height: 55px; border-radius: 15px; }
            .splash-logo svg { width: 30px; height: 30px; }
            .splash-title { font-size: 1.7rem; }
            .glass-card { padding: 1.2rem 1rem; border-radius: 20px; }
            .card-header h1 { font-size: 1.5rem; }
            .input-group input { padding: 0.75rem 2.2rem; font-size: 0.85rem; }
        }
        
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.001ms !important;
                transition-duration: 0.001ms !important;
            }
        }
    </style>
</head>
<body>
    <!-- شاشة التحميل -->
    <div class="splash-screen" id="splashScreen">
        <div class="splash-content">
            <div class="splash-logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/>
                    <path d="M12 8v4l3 3"/>
                </svg>
            </div>
            <div class="splash-title">شفاء</div>
            <div class="splash-subtitle">منصة إدارة العيادات والصيدليات</div>
            <div class="splash-loader-container">
                <div class="splash-progress-bar">
                    <div class="splash-progress-fill" id="splashProgressFill"></div>
                </div>
                <div class="splash-status" id="splashStatus">جاري التحقق من الاتصال...</div>
                <div class="splash-dots">
                    <div class="splash-dot"></div>
                    <div class="splash-dot"></div>
                    <div class="splash-dot"></div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- PWA Install Prompt -->
    <div class="install-prompt-overlay" id="installPromptOverlay">
        <div class="install-prompt-card">
            <div class="install-prompt-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/>
                    <path d="M12 8v4l3 3"/>
                </svg>
            </div>
            <h2>تثبيت تطبيق شفاء</h2>
            <p>ثبّت التطبيق على جهازك للوصول السريع وتجربة أفضل</p>
            
            <div class="install-benefits">
                <div class="install-benefit-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"/>
                    </svg>
                    وصول سريع بنقرة واحدة
                </div>
                <div class="install-benefit-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"/>
                    </svg>
                    تجربة شاشة كاملة
                </div>
                <div class="install-benefit-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"/>
                    </svg>
                    إشعارات فورية
                </div>
            </div>
            
            <div class="install-platform-specific" id="platformInstructions">
                <!-- سيتم ملؤه ديناميكياً حسب المنصة -->
            </div>
            
            <div class="install-actions">
                <button class="btn-install" id="btnInstallApp">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    تثبيت التطبيق
                </button>
                <button class="btn-install-secondary" id="btnDismissInstall">
                    ربما لاحقاً
                </button>
            </div>
        </div>
    </div>
    
    <div class="bg-pattern" aria-hidden="true"></div>
    <div class="loading-bar" id="loadingBar" aria-hidden="true"></div>
    <div class="toast" id="toast" aria-live="polite"></div>
    
    <main class="glass-card" id="glassCard">
        <div class="logo-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/>
                <path d="M12 8v4l3 3"/>
            </svg>
        </div>
        
        <header class="card-header">
            <h1>شفاء</h1>
            <p>تسجيل الدخول إلى لوحة التحكم</p>
        </header>
        
        <div class="secure-badge" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            اتصال آمن ومشفر
        </div>
        
        <form id="loginForm" novalidate autocomplete="on">
            <div class="input-wrapper">
                <label class="input-label" for="loginEmail">البريد الإلكتروني</label>
                <div class="input-group">
                    <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <rect x="2" y="4" width="20" height="16" rx="2"/>
                        <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
                    </svg>
                    <input 
                        type="email" 
                        id="loginEmail" 
                        placeholder="example@domain.com" 
                        required 
                        autocomplete="email"
                        inputmode="email"
                        dir="ltr"
                    >
                </div>
            </div>
            
            <div class="input-wrapper">
                <label class="input-label" for="loginPassword">كلمة المرور</label>
                <div class="input-group">
                    <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    <input 
                        type="password" 
                        id="loginPassword" 
                        placeholder="••••••••" 
                        required 
                        autocomplete="current-password"
                    >
                    <button type="button" class="password-toggle" onclick="togglePassword('loginPassword', this)" aria-label="إظهار/إخفاء كلمة المرور" tabindex="-1">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
            </div>
            
            <div class="error-message" id="loginError" role="alert"></div>
            
            <button type="submit" class="btn-primary" id="loginButton">
                <span class="btn-content" id="loginBtnContent">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                        <polyline points="10 17 15 12 10 7"/>
                        <line x1="15" y1="12" x2="3" y2="12"/>
                    </svg>
                    تسجيل الدخول
                </span>
            </button>
        </form>
    </main>

    <script type="module">
        import { firebaseConfig } from './firebase-config.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const ENCRYPTION_KEY = 'ShifaSecure2024!@#Key';
        const STORAGE_KEY = 'shifa_secure_session';
        const INSTALL_DISMISSED_KEY = 'shifa_install_dismissed';
        
        const encryptData = (data) => {
            try {
                const jsonString = JSON.stringify(data);
                let encrypted = '';
                for (let i = 0; i < jsonString.length; i++) {
                    encrypted += String.fromCharCode(jsonString.charCodeAt(i) ^ ENCRYPTION_KEY.charCodeAt(i % ENCRYPTION_KEY.length));
                }
                return btoa(unescape(encodeURIComponent(encrypted)));
            } catch (e) { return null; }
        };
        
        const decryptData = (data) => {
            try {
                const encrypted = decodeURIComponent(escape(atob(data)));
                let decrypted = '';
                for (let i = 0; i < encrypted.length; i++) {
                    decrypted += String.fromCharCode(encrypted.charCodeAt(i) ^ ENCRYPTION_KEY.charCodeAt(i % ENCRYPTION_KEY.length));
                }
                return JSON.parse(decrypted);
            } catch (e) { return null; }
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const $ = (s) => document.getElementById(s);

        const toastEl = $('toast');
        const loadingBar = $('loadingBar');
        const splashScreen = $('splashScreen');
        const splashProgressFill = $('splashProgressFill');
        const splashStatus = $('splashStatus');
        const glassCard = $('glassCard');
        const loginError = $('loginError');
        const loginButton = $('loginButton');
        const loginBtnContent = $('loginBtnContent');
        const installPromptOverlay = $('installPromptOverlay');
        const platformInstructions = $('platformInstructions');
        const defaultBtnContent = loginBtnContent.innerHTML;
        
        // ============ PWA Install Logic ============
        let deferredPrompt = null;
        let installPromptShown = false;
        
        // Detect platform
        const detectPlatform = () => {
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            
            // iOS detection
            if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) {
                if (/CriOS/.test(ua)) return 'ios-chrome';
                if (/FxiOS/.test(ua)) return 'ios-firefox';
                return 'ios-safari';
            }
            
            // Android detection
            if (/android/i.test(ua)) {
                if (/Chrome/i.test(ua)) return 'android-chrome';
                if (/Firefox/i.test(ua)) return 'android-firefox';
                return 'android-other';
            }
            
            // Desktop detection
            if (/Macintosh/i.test(ua)) return 'macos';
            if (/Windows/i.test(ua)) return 'windows';
            if (/Linux/i.test(ua) && !/android/i.test(ua)) return 'linux';
            
            return 'other';
        };
        
        // Check if already installed as PWA
        const isPWAInstalled = () => {
            return window.matchMedia('(display-mode: standalone)').matches ||
                   window.matchMedia('(display-mode: fullscreen)').matches ||
                   window.matchMedia('(display-mode: minimal-ui)').matches ||
                   window.navigator.standalone === true;
        };
        
        // Check if install was recently dismissed
        const wasInstallDismissed = () => {
            const dismissed = localStorage.getItem(INSTALL_DISMISSED_KEY);
            if (!dismissed) return false;
            const dismissedTime = parseInt(dismissed);
            const now = Date.now();
            // Show again after 7 days
            return (now - dismissedTime) < (7 * 24 * 60 * 60 * 1000);
        };
        
        // Get platform-specific instructions
        const getPlatformInstructions = (platform) => {
            const instructions = {
                'ios-safari': {
                    title: '📱 تثبيت على iPhone/iPad',
                    steps: [
                        'انقر على زر <strong>مشاركة</strong> (أيقونة المربع مع سهم للأعلى) في شريط Safari السفلي',
                        'اختر <strong>إضافة إلى الشاشة الرئيسية</strong>',
                        'انقر على <strong>إضافة</strong> في الزاوية العلوية'
                    ]
                },
                'ios-chrome': {
                    title: '📱 تثبيت على iPhone/iPad',
                    steps: [
                        'افتح هذا الرابط في متصفح <strong>Safari</strong>',
                        'انقر على زر <strong>مشاركة</strong>',
                        'اختر <strong>إضافة إلى الشاشة الرئيسية</strong>'
                    ]
                },
                'android-chrome': {
                    title: '📱 تثبيت على Android',
                    steps: [
                        'انقر على زر <strong>تثبيت التطبيق</strong> أدناه',
                        'أو انقر على <strong>⋮ القائمة</strong> في Chrome ثم <strong>تثبيت التطبيق</strong>'
                    ]
                },
                'windows': {
                    title: '💻 تثبيت على Windows',
                    steps: [
                        'انقر على أيقونة <strong>الكمبيوتر مع سهم للأسفل</strong> في شريط عنوان المتصفح',
                        'أو انقر على زر <strong>تثبيت التطبيق</strong> أدناه'
                    ]
                },
                'macos': {
                    title: '💻 تثبيت على Mac',
                    steps: [
                        'انقر على أيقونة <strong>التثبيت</strong> في شريط عنوان المتصفح',
                        'أو استخدم زر <strong>تثبيت التطبيق</strong> أدناه'
                    ]
                },
                'default': {
                    title: '📲 تثبيت التطبيق',
                    steps: [
                        'ابحث عن أيقونة التثبيت في شريط عنوان المتصفح',
                        'انقر على <strong>تثبيت</strong> أو <strong>إضافة إلى الشاشة الرئيسية</strong>'
                    ]
                }
            };
            
            return instructions[platform] || instructions['default'];
        };
        
        // Show install prompt
        const showInstallPrompt = () => {
            if (installPromptShown) return;
            if (isPWAInstalled()) return;
            
            const platform = detectPlatform();
            
            // Don't show on unsupported browsers unless we have the beforeinstallprompt event
            if (!deferredPrompt && platform.includes('firefox')) {
                console.log('🔸 Firefox لا يدعم التثبيت التلقائي');
                return;
            }
            
            const instructions = getPlatformInstructions(platform);
            
            platformInstructions.innerHTML = `
                <h4>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="16" x2="12" y2="12"/>
                        <line x1="12" y1="8" x2="12.01" y2="8"/>
                    </svg>
                    ${instructions.title}
                </h4>
                <ol class="install-steps">
                    ${instructions.steps.map(step => `<li>${step}</li>`).join('')}
                </ol>
            `;
            
            // Hide install button if not available
            const btnInstall = $('btnInstallApp');
            if (!deferredPrompt && (platform.includes('ios') || platform.includes('firefox'))) {
                btnInstall.style.display = 'none';
            } else {
                btnInstall.style.display = 'flex';
            }
            
            installPromptOverlay.classList.add('show');
            installPromptShown = true;
        };
        
        // Handle install button click
        $('btnInstallApp').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                console.log(`🔹 تثبيت التطبيق: ${outcome}`);
                deferredPrompt = null;
                
                if (outcome === 'accepted') {
                    showToast('✅ تم تثبيت التطبيق بنجاح!', 'success');
                }
            } else {
                // Fallback for browsers that don't support beforeinstallprompt
                showToast('ℹ️ استخدم إعدادات المتصفح لتثبيت التطبيق', 'warning');
            }
            
            installPromptOverlay.classList.remove('show');
            localStorage.setItem(INSTALL_DISMISSED_KEY, Date.now().toString());
        });
        
        // Handle dismiss
        $('btnDismissInstall').addEventListener('click', () => {
            installPromptOverlay.classList.remove('show');
            localStorage.setItem(INSTALL_DISMISSED_KEY, Date.now().toString());
        });
        
        // Listen for beforeinstallprompt event
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            console.log('🔸 beforeinstallprompt captured - يمكن تثبيت التطبيق');
            
            // Show prompt after splash screen
            if (!isPWAInstalled() && !wasInstallDismissed()) {
                setTimeout(() => {
                    if (!installPromptShown && !splashScreen.classList.contains('hidden')) {
                        // Wait for splash to hide first
                        const observer = new MutationObserver(() => {
                            if (splashScreen.classList.contains('hidden')) {
                                observer.disconnect();
                                setTimeout(showInstallPrompt, 500);
                            }
                        });
                        observer.observe(splashScreen, { attributes: true, attributeFilter: ['class'] });
                    } else if (!installPromptShown && splashScreen.classList.contains('hidden')) {
                        setTimeout(showInstallPrompt, 500);
                    }
                }, 2000);
            }
        });
        
        // Check if app was successfully installed
        window.addEventListener('appinstalled', () => {
            console.log('✅ تم تثبيت تطبيق شفاء بنجاح');
            deferredPrompt = null;
            installPromptOverlay.classList.remove('show');
            showToast('🎉 تم تثبيت شفاء على جهازك!', 'success');
        });
        
        // إدارة شاشة التحميل
        const updateSplash = (progress, text) => {
            if (splashProgressFill) splashProgressFill.style.width = `${progress}%`;
            if (splashStatus) splashStatus.textContent = text;
        };

        const hideSplash = () => {
            splashScreen.classList.add('hidden');
            setTimeout(() => glassCard.classList.add('visible'), 300);
            
            // Show install prompt after splash if applicable
            if (!isPWAInstalled() && !wasInstallDismissed() && deferredPrompt) {
                setTimeout(showInstallPrompt, 800);
            }
        };

        // تبديل كلمة المرور
        window.togglePassword = (inputId, btn) => {
            const input = $(inputId);
            const isPass = input.type === 'password';
            input.type = isPass ? 'text' : 'password';
            const svg = btn.querySelector('svg');
            svg.innerHTML = isPass 
                ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
                : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
        };

        // رسائل الخطأ
        const showError = (msg) => {
            if (!msg) { loginError.classList.remove('show'); loginError.textContent = ''; return; }
            loginError.textContent = msg;
            loginError.classList.add('show');
        };

        // Toast
        const showToast = (msg, type = 'success') => {
            toastEl.textContent = msg;
            toastEl.className = `toast ${type} show`;
            clearTimeout(window._t);
            window._t = setTimeout(() => toastEl.classList.remove('show'), 3000);
        };

        // Loading bar
        const setLoading = (loading) => {
            loginButton.disabled = loading;
            loginBtnContent.innerHTML = loading ? '<span class="spinner"></span> جاري التحقق...' : defaultBtnContent;
            if (loading) loadingBar.classList.add('active');
            else { loadingBar.classList.add('done'); setTimeout(() => loadingBar.classList.remove('active', 'done'), 300); }
        };

        // التحقق من الحظر
        const checkBlocked = async (uid) => {
            try {
                const tenantsSnap = await get(ref(db, 'tenants'));
                if (tenantsSnap.exists()) {
                    for (const tid of Object.keys(tenantsSnap.val())) {
                        const uSnap = await get(ref(db, `tenants/${tid}/users/${uid}`));
                        if (uSnap.exists()) return { exists: true, blocked: uSnap.val().status === 'blocked', data: uSnap.val() };
                    }
                }
                const pubSnap = await get(ref(db, `users/${uid}`));
                if (pubSnap.exists()) return { exists: true, blocked: pubSnap.val().status === 'blocked', data: pubSnap.val() };
                return { exists: false, blocked: false, data: null };
            } catch (e) { return { exists: false, blocked: false, data: null, error: e.message }; }
        };

        // جلب بيانات المستخدم
        const fetchUser = async (uid) => {
            try {
                const tenantsSnap = await get(ref(db, 'tenants'));
                if (tenantsSnap.exists()) {
                    for (const tid of Object.keys(tenantsSnap.val())) {
                        const uSnap = await get(ref(db, `tenants/${tid}/users/${uid}`));
                        if (uSnap.exists()) {
                            const d = uSnap.val();
                            if (!d.tenantId) d.tenantId = tid;
                            d.tenantName = d.tenantName || tenantsSnap.val()[tid]?.name || 'المجمع الطبي';
                            return d;
                        }
                    }
                }
                const pubSnap = await get(ref(db, `users/${uid}`));
                if (pubSnap.exists()) { const d = pubSnap.val(); if (!d.tenantId) d.tenantId = uid; return d; }
                return null;
            } catch (e) { return null; }
        };

        // حفظ الجلسة
        const saveSession = (data) => {
            const session = { uid: data.uid, email: data.email, role: data.role, name: data.name, tenantId: data.tenantId || null, timestamp: Date.now() };
            const enc = encryptData(session);
            if (enc) localStorage.setItem(STORAGE_KEY, enc);
        };

        // توجيه
        const redirect = (role, name, tenantId) => {
            const pages = { admin: 'admin-panel.html', doctor: 'doctor-dashboard.html', nurse: 'nurse-dashboard.html', pharmacist: 'pharmacy-dashboard.html' };
            let url = pages[role] || 'dashboard.html';
            if (tenantId) url += `${url.includes('?') ? '&' : '?'}tenant=${encodeURIComponent(tenantId)}`;
            updateSplash(100, `✅ مرحباً ${name}!`);
            setTimeout(() => window.location.href = url, 600);
        };

        // ============ تسجيل الدخول ============
        $('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = $('loginEmail').value.trim().toLowerCase();
            const password = $('loginPassword').value;

            if (!email) return showError('⚠️ الرجاء إدخال البريد الإلكتروني');
            if (!password) return showError('⚠️ الرجاء إدخال كلمة المرور');
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return showError('⚠️ صيغة البريد الإلكتروني غير صحيحة');
            if (password.length < 6) return showError('⚠️ كلمة المرور 6 أحرف على الأقل');

            showError('');
            setLoading(true);

            try {
                const cred = await signInWithEmailAndPassword(auth, email, password);
                const block = await checkBlocked(cred.user.uid);
                
                if (block.error) { showError('⚠️ تعذر التحقق من الحساب'); setLoading(false); await signOut(auth); return; }
                
                if (block.blocked) {
                    const role = block.data?.role === 'admin' ? 'المدير' : block.data?.role === 'doctor' ? 'الطبيب' : block.data?.role === 'nurse' ? 'الممرض' : block.data?.role === 'pharmacist' ? 'الصيدلي' : 'المستخدم';
                    showError(`🚫 هذا الحساب (${role}) محظور`);
                    setLoading(false);
                    await signOut(auth);
                    return;
                }

                const userData = block.data || await fetchUser(cred.user.uid);
                if (!userData?.role) { showError('❌ هذا الحساب غير مفعل'); setLoading(false); await signOut(auth); return; }

                saveSession({ uid: cred.user.uid, email, role: userData.role, name: userData.name || email.split('@')[0], tenantId: userData.tenantId });
                redirect(userData.role, userData.name || email.split('@')[0], userData.tenantId);

            } catch (err) {
                const msgs = { 'auth/invalid-credential': '❌ بريد أو كلمة مرور خاطئة', 'auth/too-many-requests': '⏳ محاولات كثيرة', 'auth/network-request-failed': '📡 خطأ في الاتصال' };
                showError(msgs[err.code] || '⚠️ حدث خطأ غير متوقع');
                setLoading(false);
            }
        });

        // ============ التحقق من الجلسة ============
        const init = () => {
            updateSplash(10, 'جاري تهيئة النظام...');
            
            // Check PWA status early
            if (isPWAInstalled()) {
                console.log('📱 التطبيق مثبت كـ PWA - تجربة محسنة');
            }
            
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    updateSplash(30, 'التحقق من الجلسة...');
                    const saved = localStorage.getItem(STORAGE_KEY);
                    const session = saved ? decryptData(saved) : null;
                    
                    if (session && session.uid === user.uid) {
                        updateSplash(50, 'التحقق من صلاحية الحساب...');
                        const block = await checkBlocked(user.uid);
                        
                        if (block.blocked) {
                            updateSplash(80, '🚫 الحساب محظور...');
                            localStorage.removeItem(STORAGE_KEY);
                            await signOut(auth);
                            setTimeout(() => { updateSplash(100, 'تم تسجيل الخروج'); hideSplash(); showToast('🚫 هذا الحساب محظور', 'error'); }, 800);
                            return;
                        }
                        
                        updateSplash(80, `✅ أهلاً ${session.name}!`);
                        const pages = { admin: 'admin-panel.html', doctor: 'doctor-dashboard.html', nurse: 'nurse-dashboard.html', pharmacist: 'pharmacy-dashboard.html' };
                        let url = pages[session.role] || 'dashboard.html';
                        if (session.tenantId) url += `${url.includes('?') ? '&' : '?'}tenant=${encodeURIComponent(session.tenantId)}`;
                        updateSplash(100, 'جاري التوجيه...');
                        setTimeout(() => window.location.href = url, 500);
                    } else {
                        updateSplash(100, 'الرجاء تسجيل الدخول');
                        hideSplash();
                    }
                } else {
                    updateSplash(100, 'مرحباً بك في شفاء');
                    hideSplash();
                }
            });
            
            // Fallback: show install prompt after timeout if not shown
            setTimeout(() => {
                if (!installPromptShown && !isPWAInstalled() && !wasInstallDismissed() && deferredPrompt && splashScreen.classList.contains('hidden')) {
                    showInstallPrompt();
                }
            }, 5000);
        };

        init();
        console.log('🚀 شفاء - تسجيل الدخول | 🛡️ نظام الحظر مفعل | 📲 PWA Install Support');
    </script>
</body>
</html>
