<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>سُكُون | دخول آمن</title>
    <!-- Google Fonts: Cairo -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        /* ----- الخلفية المتحركة: الشبكة والكرات الضوئية ----- */
        .bg-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(56, 189, 248, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(56, 189, 248, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: shiftGrid 20s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes shiftGrid {
            0% { background-position: 0 0; }
            100% { background-position: 50px 50px; }
        }

        .glow {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            z-index: 0;
            pointer-events: none;
        }

        .glow1 {
            width: 40vw;
            height: 40vw;
            background: #3b82f6;
            top: -10vh;
            left: -10vw;
            animation: pulseGlow 8s ease-in-out infinite alternate;
        }

        .glow2 {
            width: 35vw;
            height: 35vw;
            background: #06b6d4;
            bottom: -5vh;
            right: -5vw;
            animation: pulseGlow 6s ease-in-out infinite alternate-reverse;
        }

        @keyframes pulseGlow {
            0% { opacity: 0.3; transform: scale(1); }
            100% { opacity: 0.7; transform: scale(1.2); }
        }

        /* ----- البطاقة الزجاجية الرئيسية ----- */
        .glass-card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 460px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 2.5rem 2rem;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.05) inset;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: cardFloat 0.8s cubic-bezier(0.23, 1, 0.32, 1) forwards;
            transform-origin: center;
        }

        @keyframes cardFloat {
            0% { opacity: 0; transform: scale(0.92) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* الشارة العلوية */
        .secure-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.1);
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #e2e8f0;
            margin-bottom: 1.8rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
        }

        .secure-badge i {
            font-size: 1rem;
            color: #34d399;
        }

        /* أيقونة التطبيق */
        .app-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.2rem;
            background: linear-gradient(135deg, #0ea5e9, #3b82f6);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 25px -5px rgba(2, 132, 199, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .app-icon svg {
            width: 48px;
            height: 48px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
        }

        h1 {
            color: white;
            font-size: 2.5rem;
            font-weight: 700;
            text-align: center;
            letter-spacing: -0.5px;
            margin-bottom: 2rem;
            text-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* حقول الإدخال */
        .input-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            right: 18px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.2rem;
            pointer-events: none;
        }

        .toggle-password {
            position: absolute;
            left: 18px;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
            z-index: 5;
        }

        .toggle-password:hover {
            color: white;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: 1.5px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 1rem 3rem 1rem 1rem;
            font-size: 1rem;
            font-family: 'Cairo', sans-serif;
            color: white;
            outline: none;
            transition: all 0.25s ease;
            backdrop-filter: blur(5px);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.5);
            font-weight: 400;
        }

        input:focus {
            border-color: white;
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.15);
        }

        /* زر تسجيل الدخول */
        .login-btn {
            width: 100%;
            background: white;
            color: #0f172a;
            border: none;
            border-radius: 20px;
            padding: 1rem;
            font-size: 1.2rem;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            transition: all 0.25s ease;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 30px -5px rgba(0, 0, 0, 0.4);
            background: #f8fafc;
        }

        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(15, 23, 42, 0.3);
            border-radius: 50%;
            border-top-color: #0f172a;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* صندوق الخطأ */
        .error-box {
            margin-top: 1.5rem;
            padding: 1rem;
            background: rgba(239, 68, 68, 0.15);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 16px;
            color: #fecaca;
            font-size: 0.95rem;
            text-align: center;
            display: none;
        }

        .error-box.show {
            display: block;
            animation: shake 0.3s ease;
        }

        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* روابط إضافية (نسيت كلمة المرور - إضافة ذكية) */
        .extra-links {
            margin-top: 1.8rem;
            text-align: center;
        }

        .extra-links a {
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .extra-links a:hover {
            color: white;
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            top: 24px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            pointer-events: none;
            z-index: 9999;
        }

        .toast {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(16px);
            color: white;
            padding: 1rem 2rem;
            border-radius: 60px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.2);
            font-weight: 500;
            pointer-events: none;
            animation: toastIn 0.3s ease;
            max-width: 90%;
        }

        .toast.success { border-right: 6px solid #10b981; }
        .toast.error { border-right: 6px solid #ef4444; }

        @keyframes toastIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* تجاوب */
        @media (max-width: 480px) {
            .glass-card { padding: 2rem 1.5rem; }
            h1 { font-size: 2rem; }
        }

        /* أيقونات بسيطة (بدون مكتبة خارجية) */
        .icon-svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
            stroke: none;
        }
    </style>
</head>
<body>
    <!-- خلفية متحركة -->
    <div class="bg-pattern"></div>
    <div class="glow glow1"></div>
    <div class="glow glow2"></div>

    <!-- Toast container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- البطاقة الرئيسية -->
    <div class="glass-card">
        <div style="text-align: center;">
            <span class="secure-badge">
                <span style="font-size:1.2rem;">🛡️</span> دخول آمن ومشفر
            </span>
        </div>

        <div class="app-icon">
            <!-- أيقونة درع/جوهرة مخصصة -->
            <svg viewBox="0 0 24 24" fill="white" width="48" height="48">
                <path d="M12 2L3 7v7c0 5.5 9 8 9 8s9-2.5 9-8V7l-9-5z"/>
                <circle cx="12" cy="12" r="3" fill="#0f172a"/>
            </svg>
        </div>

        <h1>سُكُون</h1>

        <form id="loginForm" onsubmit="return false;">
            <!-- حقل البريد الإلكتروني -->
            <div class="input-group">
                <div class="input-wrapper">
                    <span class="input-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                            <polyline points="22,6 12,13 2,6"/>
                        </svg>
                    </span>
                    <input type="email" id="email" placeholder="البريد الإلكتروني" dir="ltr" required autocomplete="email">
                </div>
            </div>

            <!-- حقل كلمة المرور -->
            <div class="input-group">
                <div class="input-wrapper">
                    <span class="input-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                    </span>
                    <input type="password" id="password" placeholder="كلمة المرور" dir="ltr" required autocomplete="current-password">
                    <button type="button" class="toggle-password" id="togglePassword" aria-label="إظهار كلمة المرور">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- رسالة الخطأ -->
            <div class="error-box" id="errorBox"></div>

            <!-- زر تسجيل الدخول -->
            <button type="submit" class="login-btn" id="loginBtn">
                <span id="btnText">تسجيل الدخول</span>
                <span id="btnSpinner" class="spinner" style="display:none;"></span>
            </button>

            <!-- روابط إضافية (إضافة ذكية) -->
            <div class="extra-links">
                <a href="#" id="forgotPasswordLink">نسيت كلمة المرور؟</a>
            </div>
        </form>
    </div>

    <!-- Firebase SDKs و Script التطبيق -->
    <!-- نستورد firebase-config.js الذي يصدر firebaseConfig -->
    <script type="module">
        // ==================== استيراد التكوين ====================
        import { firebaseConfig } from './firebase-config.js';
        
        // استيراد دوال Firebase
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js';
        import { 
            getAuth, 
            signInWithEmailAndPassword, 
            sendPasswordResetEmail,
            onAuthStateChanged 
        } from 'https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js';
        import { 
            getFirestore, 
            doc, 
            getDoc 
        } from 'https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js';

        // تهيئة Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ==================== IndexedDB إدارة الجلسة ====================
        class SessionCache {
            constructor() {
                this.dbName = 'SakoonSession';
                this.storeName = 'session';
                this.db = null;
            }

            async openDB() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(this.dbName, 1);
                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => {
                        this.db = request.result;
                        resolve(this.db);
                    };
                    request.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains(this.storeName)) {
                            db.createObjectStore(this.storeName, { keyPath: 'key' });
                        }
                    };
                });
            }

            async saveSession(sessionData) {
                if (!this.db) await this.openDB();
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(this.storeName, 'readwrite');
                    const store = tx.objectStore(this.storeName);
                    const data = { key: 'current', ...sessionData, timestamp: Date.now() };
                    const request = store.put(data);
                    request.onsuccess = () => resolve(true);
                    request.onerror = () => reject(request.error);
                });
            }

            async getSession() {
                if (!this.db) await this.openDB();
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(this.storeName, 'readonly');
                    const store = tx.objectStore(this.storeName);
                    const request = store.get('current');
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            async clearSession() {
                if (!this.db) await this.openDB();
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(this.storeName, 'readwrite');
                    const store = tx.objectStore(this.storeName);
                    const request = store.delete('current');
                    request.onsuccess = () => resolve(true);
                    request.onerror = () => reject(request.error);
                });
            }
        }

        const sessionCache = new SessionCache();

        // ==================== دوال مساعدة ====================
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        function showError(message) {
            const errorBox = document.getElementById('errorBox');
            errorBox.textContent = message;
            errorBox.classList.add('show');
        }

        function hideError() {
            document.getElementById('errorBox').classList.remove('show');
        }

        function setLoading(isLoading) {
            const btn = document.getElementById('loginBtn');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('btnSpinner');
            btn.disabled = isLoading;
            btnText.style.display = isLoading ? 'none' : 'inline';
            spinner.style.display = isLoading ? 'inline-block' : 'none';
            if (isLoading) hideError();
        }

        // توجيه حسب الدور
        function redirectBasedOnRole(role, name = '') {
            const routes = {
                'admin': 'admin-panel.html',
                'doctor': 'doctor-dashboard.html',
                'nurse': 'attendant.html',
                'pharmacist': 'pharmacy-dashboard.html'
            };
            const target = routes[role] || 'index.html';
            if (name) showToast(`مرحباً ${name} 👋`, 'success');
            setTimeout(() => window.location.href = target, 800);
        }

        // جلب الدور من Firestore مع إعادة المحاولة
        async function fetchUserRole(uid, retries = 3) {
            for (let i = 0; i < retries; i++) {
                try {
                    const userDocRef = doc(db, 'users', uid);
                    const userSnap = await getDoc(userDocRef);
                    
                    if (userSnap.exists()) {
                        const data = userSnap.data();
                        let role = data.role;
                        // إذا كان هناك linkedDoctor فهو ممرض
                        if (!role && data.linkedDoctor) role = 'nurse';
                        // الدور الافتراضي (للأمان) طبيب إذا لم يحدد
                        if (!role) role = 'doctor';
                        
                        return { role, name: data.name || data.displayName || '' };
                    }
                    // إذا لم توجد وثيقة بعد، انتظر قليلاً وأعد المحاولة
                    if (i < retries - 1) {
                        await new Promise(r => setTimeout(r, 800));
                    }
                } catch (e) {
                    console.warn(`محاولة ${i+1} فشلت:`, e);
                    if (i === retries - 1) throw e;
                    await new Promise(r => setTimeout(r, 800));
                }
            }
            // بعد المحاولات، نفترض دور افتراضي طبيب (يمكن تغييره)
            return { role: 'doctor', name: '' };
        }

        // معالجة تسجيل الدخول
        async function handleLogin(email, password) {
            hideError();
            
            // 1. التحقق من المدير الثابت
            if (email === 'admin@sokoon.com' && password === 'Admin@2024Secure') {
                const session = {
                    email,
                    name: 'المدير العام',
                    role: 'admin',
                    uid: 'hardcoded-admin'
                };
                await sessionCache.saveSession(session);
                showToast('مرحباً بالمدير 👑', 'success');
                redirectBasedOnRole('admin', 'المدير العام');
                return;
            }

            // 2. مستخدم Firebase
            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                // جلب الدور والاسم
                const { role, name } = await fetchUserRole(user.uid);
                
                // حفظ الجلسة
                await sessionCache.saveSession({
                    email: user.email,
                    name: name || user.displayName || 'مستخدم',
                    role,
                    uid: user.uid
                });
                
                redirectBasedOnRole(role, name || user.displayName);
                
            } catch (error) {
                console.error('خطأ تسجيل الدخول:', error);
                let errorMsg = 'حدث خطأ أثناء تسجيل الدخول';
                
                // ترجمة أخطاء Firebase الشائعة
                switch (error.code) {
                    case 'auth/invalid-email':
                        errorMsg = 'صيغة البريد الإلكتروني غير صحيحة';
                        break;
                    case 'auth/user-disabled':
                        errorMsg = 'هذا الحساب معطل، يرجى التواصل مع الإدارة';
                        break;
                    case 'auth/user-not-found':
                        errorMsg = 'البريد الإلكتروني غير مسجل';
                        break;
                    case 'auth/wrong-password':
                        errorMsg = 'كلمة المرور غير صحيحة';
                        break;
                    case 'auth/too-many-requests':
                        errorMsg = 'محاولات كثيرة جداً، حاول لاحقاً';
                        break;
                    case 'auth/network-request-failed':
                        errorMsg = 'انقطع الاتصال بالإنترنت، تحقق من الشبكة';
                        break;
                    default:
                        errorMsg = `خطأ: ${error.message}`;
                }
                
                showError(errorMsg);
                showToast(errorMsg, 'error');
                throw error; // إعادة الرمي للتعامل في الـ catch الخارجي
            }
        }

        // ==================== التحقق من جلسة سابقة ====================
        async function checkExistingSession() {
            try {
                const session = await sessionCache.getSession();
                if (session && session.role) {
                    // التحقق من أن الجلسة ليست قديمة جداً (اختياري)
                    redirectBasedOnRole(session.role, session.name);
                    return true;
                }
            } catch (e) {
                console.warn('فشل قراءة الجلسة:', e);
            }
            return false;
        }

        // ==================== تهيئة الصفحة ====================
        document.addEventListener('DOMContentLoaded', async () => {
            // إظهار/إخفاء كلمة المرور
            const toggleBtn = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('password');
            toggleBtn.addEventListener('click', () => {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                // تغيير الأيقونة (بسيط)
                toggleBtn.innerHTML = type === 'password' 
                    ? `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`
                    : `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
            });

            // التحقق من الجلسة أولاً
            const hasSession = await checkExistingSession();
            if (hasSession) return;

            // إذا لم توجد جلسة، نستمع لإرسال النموذج
            const form = document.getElementById('loginForm');
            const emailInput = document.getElementById('email');
            
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = emailInput.value.trim();
                const pwd = passwordInput.value;
                
                if (!email || !pwd) {
                    showError('يرجى إدخال البريد وكلمة المرور');
                    return;
                }
                
                setLoading(true);
                try {
                    await handleLogin(email, pwd);
                } catch (err) {
                    // الخطأ معروض بالفعل
                } finally {
                    setLoading(false);
                }
            });

            // رابط نسيت كلمة المرور (إرسال بريد إعادة تعيين)
            document.getElementById('forgotPasswordLink').addEventListener('click', async (e) => {
                e.preventDefault();
                const email = emailInput.value.trim();
                if (!email) {
                    showToast('الرجاء إدخال بريدك الإلكتروني أولاً', 'error');
                    return;
                }
                try {
                    await sendPasswordResetEmail(auth, email);
                    showToast('تم إرسال رابط إعادة تعيين كلمة المرور إلى بريدك الإلكتروني', 'success');
                } catch (error) {
                    let msg = 'فشل إرسال رابط إعادة التعيين';
                    if (error.code === 'auth/user-not-found') msg = 'البريد غير مسجل';
                    else if (error.code === 'auth/invalid-email') msg = 'بريد غير صالح';
                    showToast(msg, 'error');
                }
            });

            // إخفاء الخطأ عند الكتابة
            emailInput.addEventListener('input', hideError);
            passwordInput.addEventListener('input', hideError);
        });

        // تصدير فارغ (لأنه module)
        export {};
    </script>
    <!-- ملاحظة: يجب أن يكون ملف firebase-config.js موجوداً في نفس المجلد ويصدر firebaseConfig -->
</body>
</html>
