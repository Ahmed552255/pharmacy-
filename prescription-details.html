<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#00AEEF">
    <title>شفاء · تفاصيل الروشتة</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap&subset=arabic" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'">
    
    <style>
        :root {
            --primary: #00AEEF;
            --primary-light: #E0F7FA;
            --primary-dark: #008080;
            --bg: #FAFAFA;
            --white: #FFFFFF;
            --ink: #1A3C4A;
            --text-sec: #5A7D8A;
            --danger: #E57373;
            --success: #26A69A;
            --warning: #FFB74D;
            --border: #E0E0E0;
            --shadow-xs: 0 1px 4px rgba(0,0,0,0.03);
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
            --radius-xs: 8px;
            --radius-sm: 14px;
            --radius-md: 20px;
            --radius-lg: 26px;
            --radius-xl: 50px;
            --safe-bottom: env(safe-area-inset-bottom, 16px);
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -webkit-text-size-adjust: 100%;
            text-rendering: optimizeSpeed;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            min-height: 100dvh;
            padding: 16px;
            padding-bottom: calc(16px + var(--safe-bottom));
            overflow-x: hidden;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
        }

        .container { max-width: 800px; margin: 0 auto; }

        #pageLoader {
            position: fixed;
            inset: 0;
            background: rgba(250,250,250,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            flex-direction: column;
            gap: 16px;
        }
        
        .loader-circle {
            width: 44px;
            height: 44px;
            border: 3px solid #E0E0E0;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ============ HEADER ============ */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 12px 20px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            flex-wrap: wrap;
            gap: 12px;
            position: sticky;
            top: 8px;
            z-index: 100;
        }
        
        .logo h2 { font-size: 1.3rem; font-weight: 800; color: var(--primary-dark); white-space: nowrap; }
        .logo i { color: var(--primary); }
        .header-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

        .btn {
            padding: 12px 18px;
            border-radius: var(--radius-xl);
            border: none;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 0.88rem;
            white-space: nowrap;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
            transition: all 0.15s ease;
            min-height: 44px;
            text-decoration: none;
        }
        
        .btn:active { transform: scale(0.96); opacity: 0.85; }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 3px 10px rgba(0,174,239,0.2); }
        .btn-outline { background: var(--white); color: var(--ink); border: 2px solid var(--border); }
        .btn-success { background: var(--success); color: white; box-shadow: 0 3px 10px rgba(38,166,154,0.2); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-sm { padding: 8px 14px; font-size: 0.82rem; min-height: 40px; }
        .btn-info { background: #E3F2FD; color: #1565C0; border: 2px solid #90CAF9; }

        /* ============ CARDS ============ */
        .card {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 20px 22px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            margin-bottom: 16px;
        }
        
        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--border);
        }
        .card-header h3 { font-size: 1.05rem; font-weight: 800; }
        
        .icon-circle {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            flex-shrink: 0;
        }
        .icon-cyan { background: var(--primary-light); color: var(--primary-dark); }
        .icon-green { background: #E8F5E9; color: #00695C; }
        .icon-blue { background: #E3F2FD; color: #1565C0; }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 12px;
        }
        
        .info-item { display: flex; align-items: flex-start; gap: 10px; font-size: 0.88rem; }
        .info-item i { color: var(--primary); width: 20px; margin-top: 3px; text-align: center; flex-shrink: 0; }
        .info-item strong { display: block; font-size: 0.75rem; color: var(--text-sec); margin-bottom: 2px; }
        .info-item .clickable { 
            color: var(--primary); cursor: pointer; font-weight: 700; 
            text-decoration: underline; text-underline-offset: 4px; 
            transition: color 0.2s;
        }
        .info-item .clickable:hover { color: var(--primary-dark); }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.85rem;
        }
        .status-pending { background: #FFF3E0; color: #E65100; }
        .status-dispensed { background: #E8F5E9; color: #00695C; }

        .tenant-badge {
            background: var(--primary-light);
            padding: 5px 12px;
            border-radius: var(--radius-xl);
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--primary-dark);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .sync-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-left: 6px;
            vertical-align: middle;
        }
        .sync-dot.on { background: var(--success); }
        .sync-dot.off { background: #FFB74D; }

        /* ============ TABLE ============ */
        .rx-table-wrap {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin: 0 -22px;
            padding: 0 22px;
            overscroll-behavior-x: contain;
        }
        
        .rx-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.88rem;
            min-width: 350px;
        }
        
        .rx-table th {
            background: #F5FAFC;
            padding: 12px 10px;
            font-weight: 800;
            font-size: 0.78rem;
            color: var(--ink);
            border-bottom: 2px solid var(--primary-light);
            white-space: nowrap;
            text-align: center;
        }
        
        .rx-table td { 
            padding: 12px 10px; 
            border-bottom: 1px solid var(--border); 
            vertical-align: middle; 
            text-align: center; 
        }
        .rx-table tbody tr:last-child td { border-bottom: none; }
        
        .drug-form-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 700;
            background: var(--primary-light);
            color: var(--primary-dark);
            white-space: nowrap;
        }
        
        .dose-highlight {
            font-weight: 700;
            color: var(--primary-dark);
            background: rgba(0,174,239,0.06);
            padding: 4px 12px;
            border-radius: 20px;
            white-space: nowrap;
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            border: 2px solid var(--border);
            font-family: 'Cairo', sans-serif;
            font-size: 0.88rem;
            background: #F5FAFC;
            resize: vertical;
            min-height: 70px;
        }
        
        .form-control:focus { outline: none; border-color: var(--primary); background: white; }

        .dispense-card { border: 2px dashed var(--success); background: rgba(38,166,154,0.03); }
        
        .dispensed-info {
            background: #E8F5E9;
            border-radius: var(--radius-sm);
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            color: #00695C;
            font-size: 0.85rem;
            flex-wrap: wrap;
        }
        
        .pharmacist-notes-display {
            background: #FFF8E1;
            border-radius: var(--radius-sm);
            padding: 14px 18px;
            border-right: 3px solid var(--warning);
            font-size: 0.85rem;
            color: #5D4037;
            margin-top: 12px;
        }

        .action-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }

        /* ============ MODAL ============ */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 1500;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-y: auto;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }
        
        .modal-overlay.active { display: flex; }
        
        .modal-container {
            background: var(--white);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 700px;
            margin: 20px 0;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            max-height: 85vh;
            max-height: 85dvh;
        }
        
        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: var(--white);
            z-index: 10;
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
        }
        
        .modal-header h3 {
            font-size: 1.1rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .modal-close {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: none;
            background: #F5F5F5;
            cursor: pointer;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            touch-action: manipulation;
        }
        
        .modal-close:active { background: #E0E0E0; }
        .modal-close:hover { background: #E0E0E0; }
        
        .modal-body {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
        }

        /* ============ PATIENT HISTORY ============ */
        .prescription-history-item {
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 14px 16px;
            margin-bottom: 12px;
            transition: box-shadow 0.2s, border-color 0.2s;
            background: #FAFBFC;
        }
        
        .prescription-history-item:hover { 
            box-shadow: var(--shadow-sm); 
            border-color: var(--primary-light);
        }
        
        .prescription-history-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 10px;
        }
        
        .prescription-history-drugs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        
        .drug-mini-tag {
            background: #F5FAFC;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            border: 1px solid var(--border);
        }
        
        .tag-dose {
            color: var(--primary-dark);
            font-size: 0.72rem;
            background: rgba(0,174,239,0.06);
            padding: 2px 6px;
            border-radius: 10px;
        }
        
        .prescription-status-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        .status-pending-rx { background: #FFF3E0; color: #E65100; }
        .status-dispensed-rx { background: #E8F5E9; color: #00695C; }
        .status-partial-rx { background: #E3F2FD; color: #1565C0; }

        .toast-container {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3000;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
            max-width: 90vw;
            padding-bottom: var(--safe-bottom);
        }
        
        .toast {
            background: #1A3C4A;
            color: white;
            padding: 14px 24px;
            border-radius: var(--radius-xl);
            font-weight: 700;
            font-size: 0.88rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .toast.err { background: #C62828; }
        .toast.removing { opacity: 0; transform: translateY(-12px); transition: all 0.3s ease; }
        
        .empty-state { text-align: center; padding: 50px 20px; color: var(--text-sec); }
        .empty-state i { font-size: 3rem; opacity: 0.2; margin-bottom: 12px; display: block; }

        /* ============ RESPONSIVE - TABLET ============ */
        @media (max-width: 1024px) {
            .app-header {
                padding: 10px 16px;
            }
            
            .btn {
                padding: 10px 14px;
                font-size: 0.85rem;
                min-height: 42px;
            }
            
            .card {
                padding: 16px 18px;
            }
        }

        /* ============ RESPONSIVE - MOBILE ============ */
        @media (max-width: 768px) {
            html {
                font-size: 15px;
            }
            
            body { 
                padding: 8px; 
                padding-bottom: calc(8px + var(--safe-bottom));
            }
            
            .app-header { 
                padding: 10px 14px 14px; 
                top: 4px; 
                border-radius: var(--radius-md);
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }
            
            .logo {
                display: flex;
                justify-content: space-between;
                align-items: center;
                width: 100%;
            }
            
            .logo h2 { 
                font-size: 1.15rem; 
            }
            
            .header-actions {
                width: 100%;
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }
            
            .btn { 
                padding: 10px 14px; 
                font-size: 0.82rem; 
                min-height: 46px;
                border-radius: 24px;
            }
            
            .btn-sm { 
                padding: 8px 12px; 
                font-size: 0.78rem; 
                min-height: 40px;
            }
            
            .card { 
                padding: 14px 16px; 
                border-radius: var(--radius-md); 
            }
            
            .info-grid { 
                grid-template-columns: 1fr; 
                gap: 10px;
            }
            
            .rx-table { 
                font-size: 0.82rem; 
            }
            
            .rx-table th, .rx-table td { 
                padding: 10px 8px; 
            }
            
            .rx-table-wrap { 
                margin: 0 -16px; 
                padding: 0 16px; 
            }
            
            .action-row { 
                flex-direction: column; 
                gap: 8px;
            }
            
            .action-row .btn { 
                width: 100%; 
                justify-content: center; 
            }
            
            /* Modal - Bottom Sheet */
            .modal-overlay { 
                padding: 0;
                align-items: flex-end;
            }
            
            .modal-container { 
                margin: 0;
                max-height: 90vh;
                max-height: 90dvh;
                border-radius: 24px 24px 0 0;
            }
            
            .modal-header { 
                padding: 14px 18px;
                border-radius: 24px 24px 0 0;
            }
            
            .modal-body { 
                padding: 16px; 
            }
            
            /* Form Controls */
            .form-control {
                padding: 12px 14px;
                font-size: 0.85rem;
                min-height: 60px;
                border-radius: 12px;
            }
            
            /* Patient History Items */
            .prescription-history-item {
                padding: 12px 14px;
                border-radius: 12px;
            }
            
            .prescription-history-header {
                flex-direction: column;
                gap: 8px;
            }
            
            /* Status Badge */
            .status-badge {
                font-size: 0.8rem;
                padding: 5px 12px;
            }
            
            .tenant-badge {
                font-size: 0.72rem;
                padding: 4px 10px;
            }
            
            .info-item {
                font-size: 0.85rem;
            }
            
            .info-item strong {
                font-size: 0.72rem;
            }
            
            /* Toast */
            .toast {
                padding: 12px 20px;
                font-size: 0.85rem;
                border-radius: 24px;
            }
        }

        /* ============ RESPONSIVE - SMALL PHONES ============ */
        @media (max-width: 400px) {
            html { 
                font-size: 14px; 
            }
            
            body {
                padding: 6px;
                padding-bottom: calc(6px + var(--safe-bottom));
            }
            
            .app-header {
                padding: 8px 10px 12px;
                top: 3px;
                border-radius: 20px;
            }
            
            .logo h2 {
                font-size: 1.05rem;
            }
            
            .btn { 
                padding: 10px 10px; 
                font-size: 0.78rem; 
                min-height: 44px;
                border-radius: 22px;
            }
            
            .card { 
                padding: 12px 14px; 
                border-radius: 18px;
            }
            
            .rx-table { 
                font-size: 0.78rem; 
            }
            
            .rx-table th, .rx-table td { 
                padding: 8px 5px; 
            }
            
            .rx-table-wrap { 
                margin: 0 -14px; 
                padding: 0 14px; 
            }
            
            .modal-container {
                border-radius: 20px 20px 0 0;
            }
            
            .modal-header {
                padding: 12px 14px;
                border-radius: 20px 20px 0 0;
            }
            
            .modal-body {
                padding: 14px;
            }
            
            .toast {
                padding: 10px 16px;
                font-size: 0.8rem;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.001ms !important;
                transition-duration: 0.001ms !important;
            }
        }
    </style>
</head>
<body>

    <div id="pageLoader">
        <div class="loader-circle"></div>
        <span style="font-weight:700;color:var(--primary-dark);">جارٍ تحميل الروشتة...</span>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <!-- ============ مودال سجل المريض ============ -->
    <div class="modal-overlay" id="patientFileModal">
        <div class="modal-container">
            <div class="modal-header">
                <h3><i class="fas fa-folder-open" style="color:var(--primary);"></i> سجل المريض</h3>
                <button class="modal-close" id="closePatientFileBtn">&times;</button>
            </div>
            <div class="modal-body" id="patientFileContent">
                <div style="text-align:center;padding:30px;">
                    <div class="loader-circle"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="container" id="mainContent" style="display:none;">
        <header class="app-header">
            <div class="logo">
                <h2><i class="fas fa-heartbeat"></i> شفاء <span class="sync-dot on" id="syncDot" title="حالة المزامنة"></span></h2>
            </div>
            <div class="header-actions">
                <span class="tenant-badge" id="tenantBadge" style="display:none;">
                    <i class="fas fa-hospital"></i> <span id="tenantName">المجمع الطبي</span>
                </span>
                <button class="btn btn-outline btn-sm" id="printBtn">
                    <i class="fas fa-print"></i> طباعة
                </button>
                <button class="btn btn-outline btn-sm" id="backBtn">
                    <i class="fas fa-arrow-right"></i> العودة
                </button>
                <button class="btn btn-outline btn-sm" id="logoutBtn" style="display:none;">
                    <i class="fas fa-sign-out-alt"></i> خروج
                </button>
            </div>
        </header>

        <div id="dynamicContent"></div>
    </div>

    <script type="module">
        import { firebaseConfig } from './firebase-config.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, get, update, set, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // ============ ثوابت التخزين المحلي ============
        const LOGIN_STORAGE_KEYS = ['shifa_session', 'shifa_remember', 'shifa_last_login', 'shifa_secure_session'];

        const urlParams = new URLSearchParams(window.location.search);
        const prescriptionId = urlParams.get('id');
        const currentTenantId = urlParams.get('tenant');
        const patientIdFromUrl = urlParams.get('patientId');
        const patientNameFromUrl = urlParams.get('patientName');
        const doctorIdFromUrl = urlParams.get('doctorId');

        let currentUser = null;
        let pharmacistData = null;
        let isPharmacist = false;
        // تخزين بيانات المريض الحالي لاستخدامها في السجل
        let currentPatientData = { id: null, name: null };

        const $ = (sel) => document.querySelector(sel);
        const esc = (s) => { if (!s) return ''; const div = document.createElement('div'); div.textContent = String(s); return div.innerHTML; };
        
        const toast = (msg, err=false) => {
            const container = $('#toastContainer');
            const t = document.createElement('div');
            t.className = `toast ${err?'err':''}`;
            t.innerHTML = `<i class="fas ${err?'fa-exclamation-circle':'fa-check-circle'}"></i> ${msg}`;
            container.appendChild(t);
            setTimeout(() => { t.classList.add('removing'); setTimeout(() => t.remove(), 300); }, 2500);
        };

        const clearLoginSessionOnly = () => {
            try {
                LOGIN_STORAGE_KEYS.forEach(key => localStorage.removeItem(key));
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (key && (key.startsWith('shifa_session') || key.startsWith('shifa_secure'))) localStorage.removeItem(key);
                }
                sessionStorage.clear();
            } catch (e) { console.warn('تعذر مسح بيانات الجلسة:', e.message); }
        };

        const setSyncStatus = (online) => {
            const dot = $('#syncDot');
            if (dot) { dot.className = `sync-dot ${online?'on':'off'}`; dot.title = online ? 'متصل بالسحابة' : 'غير متصل'; }
        };

        const getDataPath = (path) => currentTenantId ? `tenants/${currentTenantId}/${path}` : path;

        // ============ ✅ دوال ملاحظات الصيدلي ============
        async function loadPharmacistNotes(prescriptionId) {
            if (!currentTenantId || !currentUser) return '';
            try {
                const noteRef = ref(db, `tenants/${currentTenantId}/pharmacist_notes/${currentUser.uid}/${prescriptionId}`);
                const snap = await get(noteRef);
                return snap.exists() ? snap.val().note || '' : '';
            } catch (e) { return ''; }
        }

        async function savePharmacistNotes(prescriptionId, note) {
            if (!currentTenantId || !currentUser) return;
            try {
                await set(ref(db, `tenants/${currentTenantId}/pharmacist_notes/${currentUser.uid}/${prescriptionId}`), {
                    note, prescriptionId, updatedAt: new Date().toISOString()
                });
            } catch (e) { console.warn('تعذر حفظ الملاحظات:', e.message); }
        }

        async function deletePharmacistNotes(prescriptionId) {
            if (!currentTenantId || !currentUser) return;
            try {
                await remove(ref(db, `tenants/${currentTenantId}/pharmacist_notes/${currentUser.uid}/${prescriptionId}`));
            } catch (e) { console.warn('تعذر حذف الملاحظات:', e.message); }
        }

        // ============ ✅ دالة فتح سجل المريض داخل المودال - للمجمع الحالي فقط ============
        async function openPatientFile(patientId, patientName) {
            if (!patientId) {
                toast('لا يوجد معرف للمريض', true);
                return;
            }
            
            const modal = $('#patientFileModal');
            const content = $('#patientFileContent');
            
            // فتح المودال
            modal.classList.add('active');
            content.innerHTML = '<div style="text-align:center;padding:30px;"><div class="loader-circle"></div><p style="margin-top:10px;color:var(--text-sec);">جارٍ تحميل سجل المريض...</p></div>';
            
            try {
                // ✅ جلب بيانات المريض الأساسية من المجمع الحالي فقط
                let patientInfo = { name: patientName || 'غير معروف' };
                try {
                    const patientSnap = await get(ref(db, getDataPath(`patients/${patientId}`)));
                    if (patientSnap.exists()) {
                        patientInfo = { ...patientInfo, ...patientSnap.val() };
                    }
                } catch(e) { /* استخدام الاسم المتاح */ }
                
                const displayName = patientInfo.name || patientName || 'غير معروف';
                
                // ✅ تجميع الوصفات من المجمع الحالي فقط
                const allPrescriptions = [];
                const doctorsCache = {};
                
                try {
                    const prescriptionsSnap = await get(ref(db, getDataPath('prescriptions')));
                    if (prescriptionsSnap.exists()) {
                        const rxPromises = [];
                        
                        prescriptionsSnap.forEach(child => {
                            const rx = child.val();
                            if (String(rx.patient_id) === String(patientId)) {
                                rxPromises.push((async () => {
                                    // جلب الأدوية
                                    const itemsSnap = await get(ref(db, getDataPath(`prescription_items/${child.key}`)));
                                    let items = [];
                                    if (itemsSnap.exists()) {
                                        items = Object.values(itemsSnap.val()).map(it => ({
                                            drug: it.drug_name || it.drug_id || it.drug || '—',
                                            form: it.form || 'tablet',
                                            dose: it.dose || '—'
                                        }));
                                    }
                                    
                                    // تحديد اسم الدكتور
                                    let doctorDisplayName = rx.doctor_name || 'طبيب';
                                    
                                    if (rx.doctor_id && (!rx.doctor_name || rx.doctor_name === 'طبيب')) {
                                        if (!doctorsCache[rx.doctor_id]) {
                                            try {
                                                const docSnap = await get(ref(db, getDataPath(`users/${rx.doctor_id}`)));
                                                doctorsCache[rx.doctor_id] = docSnap.exists() ? (docSnap.val().name || 'طبيب') : 'طبيب';
                                            } catch(e) { doctorsCache[rx.doctor_id] = 'طبيب'; }
                                        }
                                        doctorDisplayName = doctorsCache[rx.doctor_id];
                                    }
                                    
                                    allPrescriptions.push({
                                        id: child.key,
                                        data: rx,
                                        items,
                                        doctorDisplayName
                                    });
                                })());
                            }
                        });
                        
                        await Promise.all(rxPromises);
                    }
                } catch(e) {
                    console.warn('تعذر قراءة وصفات المجمع:', e.message);
                }
                
                // ترتيب الوصفات من الأحدث للأقدم
                allPrescriptions.sort((a, b) => (b.data.created_at || '').localeCompare(a.data.created_at || ''));
                
                // بناء HTML العرض
                const totalRx = allPrescriptions.length;
                const tenantName = $('#tenantName')?.textContent || 'المجمع الطبي';
                
                let html = `
                    <div style="margin-bottom:20px;">
                        <h4 style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
                            <i class="fas fa-user-circle" style="color:var(--primary);font-size:1.3rem;"></i>
                            ${esc(displayName)}
                            <span style="font-size:0.75rem;color:var(--text-sec);font-weight:400;">
                                · ${totalRx} وصفة
                            </span>
                        </h4>
                        <div style="font-size:0.75rem;color:var(--text-sec);margin-top:6px;">
                            🏥 ${esc(tenantName)} | 📋 السجل من هذا المجمع فقط
                        </div>
                    </div>`;
                
                if (totalRx === 0) {
                    html += '<div class="empty-state"><i class="fas fa-file-medical-alt"></i><p>لا توجد وصفات مسجلة لهذا المريض في هذا المجمع</p></div>';
                } else {
                    const formLabels = {
                        'tablet': 'أقراص', 'capsule': 'كبسولات', 'syrup': 'شراب',
                        'injection': 'حقن', 'suppository': 'لبوس', 'drops': 'نقط',
                        'spray': 'بخاخ', 'cream': 'كريم'
                    };
                    const formEmojis = {
                        'tablet': '💊', 'capsule': '💊', 'syrup': '🥄',
                        'injection': '💉', 'suppository': '🧴', 'drops': '💧',
                        'spray': '🧪', 'cream': '🧴'
                    };
                    
                    for (const r of allPrescriptions) {
                        const rx = r.data;
                        const dateStr = rx.created_at 
                            ? new Date(rx.created_at).toLocaleDateString('ar-EG', { 
                                year: 'numeric', month: 'long', day: 'numeric',
                                hour: '2-digit', minute: '2-digit'
                              }) 
                            : '—';
                        
                        let statusBadge = '';
                        if (rx.status === 'تم الصرف') {
                            statusBadge = '<span class="prescription-status-badge status-dispensed-rx">✅ تم الصرف</span>';
                        } else if (rx.status === 'صرفت جزئياً') {
                            statusBadge = '<span class="prescription-status-badge status-partial-rx">📦 جزئي</span>';
                        } else {
                            statusBadge = '<span class="prescription-status-badge status-pending-rx">⏳ لم تصرف</span>';
                        }
                        
                        const doctorInfo = r.doctorDisplayName
                            ? `<span style="color:var(--primary-dark);font-weight:600;">👨‍⚕️ د. ${esc(r.doctorDisplayName)}</span>`
                            : `<span style="color:var(--text-sec);">👨‍⚕️ طبيب</span>`;
                        
                        let drugsHtml = '';
                        if (r.items && r.items.length > 0) {
                            drugsHtml = '<div class="prescription-history-drugs">' + 
                                r.items.map(item => {
                                    const emoji = formEmojis[item.form] || '💊';
                                    return `<span class="drug-mini-tag">${emoji} ${esc(item.drug)} <span class="tag-dose">${esc(item.dose)}</span></span>`;
                                }).join('') + 
                                '</div>';
                        }
                        
                        const diagnosisPreview = rx.diagnosis 
                            ? esc(rx.diagnosis).substring(0, 80) + (rx.diagnosis.length > 80 ? '...' : '') 
                            : 'بدون تشخيص';
                        
                        html += `
                            <div class="prescription-history-item">
                                <div class="prescription-history-header">
                                    <div style="flex:1;min-width:200px;">
                                        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
                                            ${statusBadge}
                                            ${doctorInfo}
                                        </div>
                                        <div style="margin-top:6px;">
                                            <b>📅 ${dateStr}</b>
                                        </div>
                                        <div style="color:var(--text-sec);font-size:0.8rem;margin-top:4px;">
                                            ${diagnosisPreview}
                                        </div>
                                    </div>
                                    <button class="btn btn-info btn-sm view-rx-btn" data-rx-id="${r.id}" style="white-space:nowrap;">
                                        <i class="fas fa-external-link-alt"></i> عرض
                                    </button>
                                </div>
                                ${drugsHtml}
                            </div>
                        `;
                    }
                }
                
                content.innerHTML = html;
                
                // ربط أزرار "عرض" لفتح الوصفة في نفس الصفحة
                content.querySelectorAll('.view-rx-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const rxId = btn.dataset.rxId;
                        // بناء رابط جديد بنفس الصفحة مع معرف الوصفة والمجمع
                        const url = new URL(window.location.href);
                        url.searchParams.set('id', rxId);
                        url.searchParams.set('tenant', currentTenantId);
                        window.location.href = url.toString();
                    });
                });
                
            } catch (err) {
                console.error('خطأ في تحميل سجل المريض:', err);
                content.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle" style="color:var(--danger);"></i>
                        <p style="color:var(--danger);">❌ خطأ في تحميل الملف الطبي</p>
                        <p style="font-size:0.8rem;">${esc(err.message)}</p>
                    </div>`;
            }
        }

        async function loadPrescription() {
            if (!prescriptionId) {
                showErrorState('معرف الروشتة غير موجود');
                return;
            }

            try {
                let presSnap = null;
                if (currentTenantId) {
                    presSnap = await get(ref(db, getDataPath(`prescriptions/${prescriptionId}`)));
                    if (!presSnap.exists()) presSnap = await get(ref(db, `prescriptions/${prescriptionId}`));
                } else {
                    presSnap = await get(ref(db, `prescriptions/${prescriptionId}`));
                }
                
                if (!presSnap.exists()) { showErrorState('الروشتة غير موجودة'); return; }
                
                const rx = { id: prescriptionId, ...presSnap.val() };

                let itemsSnap = null;
                if (currentTenantId) {
                    itemsSnap = await get(ref(db, getDataPath(`prescription_items/${prescriptionId}`)));
                    if (!itemsSnap.exists()) itemsSnap = await get(ref(db, `prescription_items/${prescriptionId}`));
                } else {
                    itemsSnap = await get(ref(db, `prescription_items/${prescriptionId}`));
                }
                
                let items = [];
                if (itemsSnap.exists()) {
                    const itemsData = itemsSnap.val();
                    items = Object.entries(itemsData).map(([key, value]) => ({
                        key,
                        drug_name: value.drug_name || value.drug || value.name || '—',
                        form: value.form || 'tablet',
                        dose: value.dose || '—'
                    }));
                }

                const doctorId = rx.doctor_id || doctorIdFromUrl;
                let doctorName = '';
                let doctorSpecialty = '';
                
                if (doctorId) {
                    try {
                        let doctorSnap = null;
                        if (currentTenantId) {
                            doctorSnap = await get(ref(db, getDataPath(`users/${doctorId}`)));
                            if (!doctorSnap.exists()) doctorSnap = await get(ref(db, `users/${doctorId}`));
                        } else {
                            doctorSnap = await get(ref(db, `users/${doctorId}`));
                        }
                        if (doctorSnap.exists()) {
                            const doctorData = doctorSnap.val();
                            doctorName = doctorData.name || '';
                            doctorSpecialty = doctorData.specialty || '';
                        }
                    } catch(e) { console.warn('تعذر جلب بيانات الطبيب:', e); }
                }

                const patientId = rx.patient_id || patientIdFromUrl;
                let patientName = patientNameFromUrl || rx.patient_name || 'غير معروف';
                let patientPhone = rx.patient_phone || '';
                
                if (patientId && (!patientName || patientName === 'غير معروف')) {
                    try {
                        let patientSnap = null;
                        if (currentTenantId) {
                            patientSnap = await get(ref(db, getDataPath(`patients/${patientId}`)));
                            if (!patientSnap.exists()) patientSnap = await get(ref(db, `patients/${patientId}`));
                        } else {
                            patientSnap = await get(ref(db, `patients/${patientId}`));
                        }
                        if (patientSnap.exists()) {
                            const patientData = patientSnap.val();
                            patientName = patientData.name || patientName;
                            patientPhone = patientData.phone || patientPhone;
                        }
                    } catch(e) { console.warn('تعذر جلب بيانات المريض:', e); }
                }

                // ✅ تخزين بيانات المريض لاستخدامها في زر السجل
                currentPatientData = { id: patientId, name: patientName };

                const dateStr = rx.created_at ? new Date(rx.created_at).toLocaleDateString('ar-EG', { year: 'numeric', month: 'long', day: 'numeric' }) : '—';
                const timeStr = rx.created_at ? new Date(rx.created_at).toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' }) : '';

                const savedNotes = await loadPharmacistNotes(prescriptionId);

                const data = {
                    ...rx,
                    _items: items,
                    _patientName: patientName,
                    _patientPhone: patientPhone,
                    _patientId: patientId,
                    _doctorName: doctorName,
                    _doctorSpecialty: doctorSpecialty,
                    _doctorId: doctorId,
                    _itemCount: items.length,
                    _dateStr: dateStr,
                    _timeStr: timeStr,
                    _savedNotes: savedNotes
                };

                renderPrescription(data);
                
            } catch (err) {
                console.error('❌ خطأ في تحميل الروشتة:', err);
                showErrorState('حدث خطأ في تحميل البيانات: ' + err.message);
            }
        }

        function showErrorState(msg) {
            $('#dynamicContent').innerHTML = `
                <div class="card">
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle" style="color:var(--danger);"></i>
                        <p style="font-size:1rem;font-weight:600;">${msg}</p>
                    </div>
                </div>`;
            $('#pageLoader').style.display = 'none';
            $('#mainContent').style.display = 'block';
        }

        function renderPrescription(data) {
            const isDispensed = data.status === 'تم الصرف';
            const statusLabel = isDispensed ? 'تم الصرف' : 'لم تصرف بعد';
            const statusClass = isDispensed ? 'status-dispensed' : 'status-pending';
            
            const formLabels = {
                'tablet': 'أقراص', 'capsule': 'كبسولات', 'syrup': 'شراب',
                'injection': 'حقن', 'suppository': 'لبوس', 'drops': 'نقط',
                'spray': 'بخاخ', 'cream': 'كريم'
            };
            
            let itemsHtml = data._items && data._items.length > 0 
                ? data._items.map(item => `
                    <tr>
                        <td><strong>${esc(item.drug_name)}</strong></td>
                        <td><span class="drug-form-badge">${formLabels[item.form] || item.form}</span></td>
                        <td><span class="dose-highlight">${esc(item.dose)}</span></td>
                    </tr>`).join('')
                : '<tr><td colspan="3" style="text-align:center;padding:20px;color:var(--text-sec);">لا توجد أدوية مسجلة</td></tr>';

            let dispenseSection = '';
            if (isDispensed) {
                let notesHtml = data._savedNotes ? `
                    <div class="pharmacist-notes-display">
                        <i class="fas fa-pen" style="margin-left:6px;"></i>
                        <strong>ملاحظات الصيدلي:</strong> ${esc(data._savedNotes)}
                    </div>` : '';
                
                dispenseSection = `
                <div class="card">
                    <div class="dispensed-info">
                        <i class="fas fa-check-circle" style="font-size:1.5rem;"></i>
                        <div>
                            <strong>تم صرف الروشتة</strong>
                            <div style="font-size:0.82rem;margin-top:4px;">
                                الصيدلي: ${esc(data.pharmacist_name||'')} · 
                                ${data.dispensed_at ? new Date(data.dispensed_at).toLocaleString('ar-EG', {dateStyle:'medium',timeStyle:'short'}) : ''}
                            </div>
                        </div>
                    </div>
                    ${notesHtml}
                    ${isPharmacist ? `
                    <div style="margin-top:12px;">
                        <button class="btn btn-outline btn-sm" id="undoDispenseBtn" style="color:var(--danger);border-color:var(--danger);">
                            <i class="fas fa-undo"></i> إلغاء الصرف
                        </button>
                    </div>` : ''}
                </div>`;
            } else if (isPharmacist) {
                dispenseSection = `
                <div class="card dispense-card">
                    <div class="card-header">
                        <div class="icon-circle icon-green"><i class="fas fa-capsules"></i></div>
                        <h3>تأكيد الصرف</h3>
                    </div>
                    
                    <div style="margin-bottom:12px;">
                        <label style="display:block;font-weight:700;margin-bottom:6px;font-size:0.85rem;">
                            <i class="fas fa-pen" style="color:var(--warning);margin-left:4px;"></i>
                            ملاحظات الصيدلي <small style="font-weight:400;color:var(--text-sec);">(اختياري - تخزين سحابي)</small>
                        </label>
                        <textarea id="pharmacistNotes" class="form-control" 
                            placeholder="مثال: تحذيرات، تعليمات إضافية للمريض، بدائل الأدوية..."
                            style="min-height:60px;">${esc(data._savedNotes || '')}</textarea>
                        <div style="font-size:0.7rem;color:var(--text-sec);margin-top:4px;">
                            هذه الملاحظات ستحفظ في السحابة وتظهر مع الروشتة
                        </div>
                    </div>
                    
                    <p style="color:var(--text-sec);margin-bottom:12px;font-size:0.83rem;">
                        بالضغط على الزر أدناه، أنت تؤكد صرف جميع الأدوية المذكورة أعلاه للمريض.
                    </p>
                    <button class="btn btn-success" id="dispenseBtn">
                        <i class="fas fa-check-circle"></i> تأكيد صرف الروشتة
                    </button>
                </div>`;
            }

            const html = `
            <div class="card">
                <div class="card-header">
                    <div class="icon-circle icon-cyan"><i class="fas fa-clipboard-list"></i></div>
                    <h3>معلومات الروشتة</h3>
                </div>
                <div class="info-grid">
                    <div class="info-item">
                        <i class="fas fa-user"></i>
                        <div>
                            <strong>المريض</strong>
                            <span class="clickable" id="patientNameLink">
                                ${esc(data._patientName)}
                            </span>
                        </div>
                    </div>
                    <div class="info-item">
                        <i class="fas fa-user-md"></i>
                        <div>
                            <strong>الطبيب</strong>
                            <span>د. ${esc(data._doctorName || 'غير معروف')}${data._doctorSpecialty ? ` (${esc(data._doctorSpecialty)})` : ''}</span>
                        </div>
                    </div>
                    <div class="info-item">
                        <i class="fas fa-calendar-alt"></i>
                        <div><strong>تاريخ الكشف</strong><span>${data._dateStr} · ${data._timeStr}</span></div>
                    </div>
                    <div class="info-item">
                        <i class="fas fa-cubes"></i>
                        <div><strong>عدد الأصناف</strong> ${data._itemCount} صنف</div>
                    </div>
                    <div class="info-item" style="grid-column:1/-1;">
                        <i class="fas fa-notes-medical"></i>
                        <div><strong>التشخيص</strong> <span>${esc(data.diagnosis || 'غير محدد')}</span></div>
                    </div>
                </div>
                <div style="margin-top:12px;">
                    <span class="status-badge ${statusClass}">
                        <i class="fas fa-circle" style="font-size:0.5rem;"></i> ${statusLabel}
                    </span>
                </div>
                <div class="action-row">
                    <button class="btn btn-outline btn-sm" id="patientFileBtn">
                        <i class="fas fa-folder-open"></i> ملف المريض
                    </button>
                    ${data._patientPhone ? `<a href="tel:${esc(data._patientPhone)}" class="btn btn-outline btn-sm" style="text-decoration:none;"><i class="fas fa-phone"></i> ${esc(data._patientPhone)}</a>` : ''}
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <div class="icon-circle icon-blue"><i class="fas fa-pills"></i></div>

            $('#printBtn')?.addEventListener('click', () => window.print());

                    window.history.back();
                } else {
                    window.location.href = 'pharmacy-dashboard.html';
                }

            if (patientFileBtn && data._patientId) {
                patientFileBtn.addEventListener('click', () => {
                    openPatientFile(data._patientId, data._patientName);

            // ✅ زر الصرف

            if (dispenseBtn) {
                dispenseBtn.addEventListener('click', async () => {
                    if (!confirm('هل أنت متأكد من صرف جميع الأدوية في هذه الروشتة؟')) return;
                    
                    dispenseBtn.disabled = true;
                    dispenseBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الصرف...';
                    
                    try {
                        const notes = $('#pharmacistNotes')?.value?.trim() || '';
                        
                        if (notes) {
                            await savePharmacistNotes(prescriptionId, notes);
                        } else {
                            await deletePharmacistNotes(prescriptionId);
                        }
                        
                        const updateData = {
                            status: 'تم الصرف',
                            pharmacist_id: currentUser.uid,
                            pharmacist_name: pharmacistData?.name || currentUser.displayName || 'صيدلي',
                            pharmacist_notes: notes || null,
                            dispensed_at: new Date().toISOString()
                        };
                        
                        const updatePath = currentTenantId 
                            ? `tenants/${currentTenantId}/prescriptions/${prescriptionId}`
                            : `prescriptions/${prescriptionId}`;
                        
                        await update(ref(db, updatePath), updateData);
                        
                        toast('✅ تم صرف الروشتة بنجاح');
                        setTimeout(() => window.location.reload(), 1200);
                    } catch (err) {
                        console.error('❌ خطأ في الصرف:', err);
                        toast('❌ فشل الصرف: ' + err.message, true);
                        dispenseBtn.disabled = false;
                        dispenseBtn.innerHTML = '<i class="fas fa-check-circle"></i> تأكيد صرف الروشتة';
                    }
                });
            }

            // ✅ زر إلغاء الصرف
            const undoDispenseBtn = $('#undoDispenseBtn');
            if (undoDispenseBtn) {
                undoDispenseBtn.addEventListener('click', async () => {
                    if (!confirm('هل أنت متأكد من إلغاء صرف هذه الروشتة؟')) return;
                    
                    undoDispenseBtn.disabled = true;
                    undoDispenseBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الإلغاء...';
                    
                    try {
                        await deletePharmacistNotes(prescriptionId);
                        
                        const updateData = {
                            status: 'لم تصرف بعد',
                            pharmacist_id: null,
                            pharmacist_name: null,
                            pharmacist_notes: null,
                            dispensed_at: null
                        };
                        
                        const updatePath = currentTenantId 
                            ? `tenants/${currentTenantId}/prescriptions/${prescriptionId}`
                            : `prescriptions/${prescriptionId}`;
                        
                        await update(ref(db, updatePath), updateData);
                        
                        toast('✅ تم إلغاء صرف الروشتة');
                        setTimeout(() => window.location.reload(), 1200);
                    } catch (err) {
                        console.error('❌ خطأ في إلغاء الصرف:', err);
                        toast('❌ فشل إلغاء الصرف: ' + err.message, true);
                        undoDispenseBtn.disabled = false;
                        undoDispenseBtn.innerHTML = '<i class="fas fa-undo"></i> إلغاء الصرف';
                    }
                });
            }

            $('#pageLoader').style.display = 'none';
            $('#mainContent').style.display = 'block';
        }

        // ============ إعدادات المودال ============
        function setupModalListeners() {
            // إغلاق المودال
            $('#closePatientFileBtn')?.addEventListener('click', () => {
                $('#patientFileModal').classList.remove('active');
            });
            
            // إغلاق بالنقر خارج المودال
            $('#patientFileModal')?.addEventListener('click', (e) => {
                if (e.target === $('#patientFileModal')) {
                    $('#patientFileModal').classList.remove('active');
                }
            });
            
            // إغلاق بمفتاح Escape
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    $('#patientFileModal').classList.remove('active');
                }
            });
        }

        const setupLogout = () => {
            const logoutBtn = $('#logoutBtn');
            if (logoutBtn) {
                logoutBtn.style.display = 'inline-flex';
                logoutBtn.addEventListener('click', async () => {
                    try {
                        toast('👋 جاري تسجيل الخروج...');
                        clearLoginSessionOnly();
                        await signOut(auth);
                        window.location.href = 'index.html';
                    } catch (error) {
                        clearLoginSessionOnly();
                        window.location.href = 'index.html';
                    }
                });
            }
        };

        window.addEventListener('online', () => setSyncStatus(true));
        window.addEventListener('offline', () => setSyncStatus(false));

        onAuthStateChanged(auth, async (user) => {
            if (!user) { clearLoginSessionOnly(); window.location.href = 'index.html'; return; }
            
            currentUser = user;
            
            try {
                let userSnap = null;
                if (currentTenantId) {
                    userSnap = await get(ref(db, `tenants/${currentTenantId}/users/${user.uid}`));
                    if (!userSnap.exists()) userSnap = await get(ref(db, `users/${user.uid}`));
                } else {
                    userSnap = await get(ref(db, `users/${user.uid}`));
                }
                
                if (userSnap.exists()) {
                    const userData = userSnap.val();
                    if (userData.tenantName && $('#tenantName')) {
                        $('#tenantName').textContent = userData.tenantName;
                        $('#tenantBadge').style.display = 'flex';
                    }
                    if (userData.role === 'pharmacist') {
                        isPharmacist = true;
                        pharmacistData = { id: user.uid, ...userData };
                        setupLogout();
                    }
                }
            } catch(e) { console.warn('تعذر التحقق من بيانات المستخدم:', e); }
            
            setupModalListeners();
            await loadPrescription();
        });

        console.log('🚀 صفحة تفاصيل الروشتة - سجل مريض للمجمع الحالي فقط');
        console.log('📂 سجل المريض يُعرض داخل مودال بنفس الصفحة');
        console.log('🏥 السجل يعرض فقط وصفات المجمع الحالي وليس كل المجمعات');
    </script>
</body>
</html>
