<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#00AEEF">
    <title>شفاء · تفاصيل الروشتة</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap&subset=arabic" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'">
    
    <style>
        :root {
            --primary: #00AEEF;
            --primary-light: #E0F7FA;
            --primary-dark: #008080;
            --bg: #FAFAFA;
            --white: #FFFFFF;
            --ink: #1A3C4A;
            --text-sec: #5A7D8A;
            --danger: #E57373;
            --success: #26A69A;
            --warning: #FFB74D;
            --border: #E0E0E0;
            --shadow-xs: 0 1px 4px rgba(0,0,0,0.03);
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
            --radius-xs: 8px;
            --radius-sm: 14px;
            --radius-md: 20px;
            --radius-lg: 26px;
            --radius-xl: 50px;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            font-size: 15px;
            -webkit-font-smoothing: antialiased;
            -webkit-text-size-adjust: 100%;
            text-rendering: optimizeSpeed;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            min-height: 100dvh;
            padding: 12px;
            overflow-x: hidden;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
        }

        .container { max-width: 800px; margin: 0 auto; }

        #pageLoader {
            position: fixed;
            inset: 0;
            background: rgba(250,250,250,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            flex-direction: column;
            gap: 16px;
        }
        
        .loader-circle {
            width: 40px;
            height: 40px;
            border: 3px solid #E0E0E0;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }

        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 10px 18px;
            margin-bottom: 14px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            flex-wrap: wrap;
            gap: 10px;
            position: sticky;
            top: 6px;
            z-index: 100;
        }
        
        .logo h2 { font-size: 1.3rem; font-weight: 800; color: var(--primary-dark); white-space: nowrap; }
        .logo i { color: var(--primary); }
        .header-actions { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }

        .btn {
            padding: 8px 14px;
            border-radius: var(--radius-xl);
            border: none;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 0.83rem;
            white-space: nowrap;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
            transition: opacity 0.15s;
            min-height: 36px;
            text-decoration: none;
        }
        
        .btn:active { opacity: 0.8; }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 3px 10px rgba(0,174,239,0.2); }
        .btn-outline { background: var(--white); color: var(--ink); border: 1.5px solid var(--border); }
        .btn-success { background: var(--success); color: white; box-shadow: 0 3px 10px rgba(38,166,154,0.2); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-sm { padding: 6px 12px; font-size: 0.78rem; min-height: 32px; }

        .card {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 16px 18px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            margin-bottom: 12px;
        }
        
        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }
        .card-header h3 { font-size: 1rem; font-weight: 800; }
        
        .icon-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }
        .icon-cyan { background: var(--primary-light); color: var(--primary-dark); }
        .icon-green { background: #E8F5E9; color: #00695C; }
        .icon-blue { background: #E3F2FD; color: #1565C0; }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
        }
        
        .info-item { display: flex; align-items: flex-start; gap: 8px; font-size: 0.85rem; }
        .info-item i { color: var(--primary); width: 18px; margin-top: 3px; text-align: center; flex-shrink: 0; }
        .info-item strong { display: block; font-size: 0.73rem; color: var(--text-sec); margin-bottom: 2px; }
        .info-item .clickable { color: var(--primary); cursor: pointer; font-weight: 700; text-decoration: underline; text-underline-offset: 3px; }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.8rem;
        }
        .status-pending { background: #FFF3E0; color: #E65100; }
        .status-dispensed { background: #E8F5E9; color: #00695C; }

        .tenant-badge {
            background: var(--primary-light);
            padding: 4px 10px;
            border-radius: var(--radius-xl);
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--primary-dark);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .sync-dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            margin-left: 5px;
            vertical-align: middle;
        }
        .sync-dot.on { background: var(--success); }
        .sync-dot.off { background: #FFB74D; }

        .rx-table-wrap {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin: 0 -18px;
            padding: 0 18px;
        }
        
        .rx-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            min-width: 350px;
        }
        
        .rx-table th {
            background: #F5FAFC;
            padding: 10px 8px;
            font-weight: 700;
            font-size: 0.75rem;
            color: var(--ink);
            border-bottom: 2px solid var(--primary-light);
            white-space: nowrap;
            text-align: center;
        }
        
        .rx-table td { padding: 10px 8px; border-bottom: 1px solid var(--border); vertical-align: middle; text-align: center; }
        .rx-table tbody tr:last-child td { border-bottom: none; }
        
        .drug-form-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 600;
            background: var(--primary-light);
            color: var(--primary-dark);
            white-space: nowrap;
        }
        
        .dose-highlight {
            font-weight: 700;
            color: var(--primary-dark);
            background: rgba(0,174,239,0.06);
            padding: 3px 10px;
            border-radius: 20px;
            white-space: nowrap;
        }

        .form-control {
            width: 100%;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--border);
            font-family: 'Cairo', sans-serif;
            font-size: 0.85rem;
            background: #F5FAFC;
            resize: vertical;
            min-height: 60px;
        }
        
        .form-control:focus { outline: none; border-color: var(--primary); background: white; }

        .dispense-card { border: 2px dashed var(--success); background: rgba(38,166,154,0.03); }
        
        .dispensed-info {
            background: #E8F5E9;
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            color: #00695C;
            font-size: 0.82rem;
            flex-wrap: wrap;
        }
        
        .pharmacist-notes-display {
            background: #FFF8E1;
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            border-right: 3px solid var(--warning);
            font-size: 0.82rem;
            color: #5D4037;
            margin-top: 10px;
        }

        .action-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }

        .toast-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3000;
            display: flex;
            flex-direction: column;
            gap: 6px;
            pointer-events: none;
        }
        
        .toast {
            background: #1A3C4A;
            color: white;
            padding: 10px 18px;
            border-radius: var(--radius-xl);
            font-weight: 600;
            font-size: 0.82rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.18);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 7px;
        }
        .toast.err { background: #C62828; }
        .toast.removing { opacity: 0; transform: translateY(-10px); transition: all 0.3s ease; }
        
        .empty-state { text-align: center; padding: 40px 15px; color: var(--text-sec); }
        .empty-state i { font-size: 2.5rem; opacity: 0.2; margin-bottom: 10px; display: block; }

        @media (max-width: 600px) {
            body { padding: 8px; }
            .app-header { padding: 8px 12px; top: 4px; border-radius: var(--radius-md); }
            .logo h2 { font-size: 1.15rem; }
            .card { padding: 12px 14px; border-radius: var(--radius-md); }
            .info-grid { grid-template-columns: 1fr; }
            .btn { padding: 6px 10px; font-size: 0.75rem; gap: 4px; min-height: 30px; }
            .rx-table { font-size: 0.78rem; }
            .rx-table th, .rx-table td { padding: 8px 5px; }
            .rx-table-wrap { margin: 0 -14px; padding: 0 14px; }
            .action-row { flex-direction: column; }
            .action-row .btn { width: 100%; justify-content: center; }
        }

        @media (max-width: 360px) {
            html { font-size: 13px; }
            .btn { padding: 5px 8px; font-size: 0.7rem; min-height: 28px; }
            .card { padding: 10px 12px; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.001ms !important;
                transition-duration: 0.001ms !important;
            }
        }
    </style>
</head>
<body>

    <div id="pageLoader">
        <div class="loader-circle"></div>
        <span style="font-weight:700;color:var(--primary-dark);">جارٍ تحميل الروشتة...</span>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <div class="container" id="mainContent" style="display:none;">
        <header class="app-header">
            <div class="logo">
                <h2><i class="fas fa-heartbeat"></i> شفاء <span class="sync-dot on" id="syncDot" title="حالة المزامنة"></span></h2>
            </div>
            <div class="header-actions">
                <span class="tenant-badge" id="tenantBadge" style="display:none;">
                    <i class="fas fa-hospital"></i> <span id="tenantName">المجمع الطبي</span>
                </span>
                <button class="btn btn-outline btn-sm" id="printBtn">
                    <i class="fas fa-print"></i> طباعة
                </button>
                <button class="btn btn-outline btn-sm" id="backBtn">
                    <i class="fas fa-arrow-right"></i> العودة
                </button>
                <button class="btn btn-outline btn-sm" id="logoutBtn" style="display:none;">
                    <i class="fas fa-sign-out-alt"></i> خروج
                </button>
            </div>
        </header>

        <div id="dynamicContent"></div>
    </div>

    <script type="module">
        import { firebaseConfig } from './firebase-config.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        
        import { 
            getFirestore, 
            doc, 
            setDoc, 
            updateDoc, 
            deleteDoc, 
            getDoc
        } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // ============ تهيئة Firebase ============
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ============ ✅ استخراج المجمع (نفس آلية الطبيب والممرض والصيدلي) ============
        const LOGIN_STORAGE_KEYS = ['shifa_session', 'shifa_remember', 'shifa_last_login', 'shifa_secure_session'];

        const urlParams = new URLSearchParams(window.location.search);
        let currentTenantId = urlParams.get('tenant');
        
        if (!currentTenantId) {
            try {
                const encrypted = localStorage.getItem('shifa_secure_session');
                if (encrypted) {
                    const decoded = atob(encrypted);
                    const match = decoded.match(/"tenantId":"([^"]+)"/);
                    if (match) {
                        currentTenantId = match[1];
                        console.log(`📦 تم استخراج معرف المجمع من الجلسة المشفرة: ${currentTenantId}`);
                    }
                }
            } catch (e) {
                console.warn('تعذر فك تشفير الجلسة:', e.message);
            }
        }
        
        if (!currentTenantId) {
            const oldSession = localStorage.getItem('shifa_session');
            if (oldSession) {
                try {
                    const parsed = JSON.parse(oldSession);
                    currentTenantId = parsed.tenantId;
                    if (currentTenantId) {
                        console.log(`📦 تم استخراج معرف المجمع من الجلسة القديمة: ${currentTenantId}`);
                    }
                } catch (e) {}
            }
        }

        const prescriptionId = urlParams.get('id');
        const patientIdFromUrl = urlParams.get('patientId');
        const patientNameFromUrl = urlParams.get('patientName');
        const doctorIdFromUrl = urlParams.get('doctorId');

        let currentUser = null;
        let pharmacistData = null;
        let isPharmacist = false;

        // ============ دوال مساعدة ============
        const $ = (sel) => document.querySelector(sel);
        const esc = (s) => { 
            if (!s) return ''; 
            const div = document.createElement('div'); 
            div.textContent = String(s); 
            return div.innerHTML; 
        };
        
        const toast = (msg, err = false) => {
            const container = $('#toastContainer');
            const t = document.createElement('div');
            t.className = `toast ${err ? 'err' : ''}`;
            t.innerHTML = `<i class="fas ${err ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i> ${msg}`;
            container.appendChild(t);
            setTimeout(() => { 
                t.classList.add('removing'); 
                setTimeout(() => t.remove(), 300); 
            }, 2500);
        };

        const clearLoginSessionOnly = () => {
            try {
                LOGIN_STORAGE_KEYS.forEach(key => localStorage.removeItem(key));
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (key && (key.startsWith('shifa_session') || key.startsWith('shifa_secure'))) {
                        localStorage.removeItem(key);
                    }
                }
                sessionStorage.clear();
                console.log('✅ تم مسح بيانات الجلسة');
            } catch (e) { 
                console.warn('تعذر مسح بيانات الجلسة:', e.message); 
            }
        };

        const setSyncStatus = (online) => {
            const dot = $('#syncDot');
            if (dot) { 
                dot.className = `sync-dot ${online ? 'on' : 'off'}`; 
                dot.title = online ? 'متصل بالسحابة' : 'غير متصل'; 
            }
        };

        // ============ ✅ دوال Firestore (مسار موحد - المجمع فقط) ============
        
        // ✅ تحميل ملاحظات الصيدلي
        async function loadPharmacistNotes(prescriptionId) {
            if (!currentTenantId || !currentUser) return '';
            try {
                const noteDocRef = doc(db, 'tenants', currentTenantId, 'pharmacist_notes', currentUser.uid, 'notes', prescriptionId);
                const snap = await getDoc(noteDocRef);
                return snap.exists() ? (snap.data().note || '') : '';
            } catch (e) {
                console.warn('تعذر تحميل الملاحظات:', e.message);
                return '';
            }
        }

        // ✅ حفظ ملاحظات الصيدلي
        async function savePharmacistNotes(prescriptionId, note) {
            if (!currentTenantId || !currentUser) return;
            try {
                const noteDocRef = doc(db, 'tenants', currentTenantId, 'pharmacist_notes', currentUser.uid, 'notes', prescriptionId);
                await setDoc(noteDocRef, {
                    note,
                    prescriptionId,
                    updatedAt: new Date().toISOString()
                });
            } catch (e) {
                console.warn('تعذر حفظ الملاحظات:', e.message);
            }
        }

        // ✅ حذف ملاحظات الصيدلي
        async function deletePharmacistNotes(prescriptionId) {
            if (!currentTenantId || !currentUser) return;
            try {
                const noteDocRef = doc(db, 'tenants', currentTenantId, 'pharmacist_notes', currentUser.uid, 'notes', prescriptionId);
                await deleteDoc(noteDocRef);
            } catch (e) {
                console.warn('تعذر حذف الملاحظات:', e.message);
            }
        }

        // ============ ✅ تحميل الروشتة (مسار موحد - المجمع فقط) ============
        async function loadPrescription() {
            if (!prescriptionId) {
                showErrorState('معرف الروشتة غير موجود');
                return;
            }

            if (!currentTenantId) {
                showErrorState('معرف المجمع غير موجود - تأكد من فتح الرابط بشكل صحيح');
                return;
            }

            try {
                // ✅ جلب الروشتة من المجمع فقط
                const rxDocRef = doc(db, 'tenants', currentTenantId, 'prescriptions', prescriptionId);
                const presSnap = await getDoc(rxDocRef);
                
                if (!presSnap.exists()) { 
                    showErrorState('الروشتة غير موجودة في هذا المجمع'); 
                    return; 
                }
                
                const rx = { id: prescriptionId, ...presSnap.data() };

                // ✅ جلب عناصر الروشتة من المجمع فقط
                const itemsDocRef = doc(db, 'tenants', currentTenantId, 'prescription_items', prescriptionId);
                const itemsSnap = await getDoc(itemsDocRef);
                
                let items = [];
                if (itemsSnap.exists()) {
                    const itemsData = itemsSnap.data();
                    items = Object.entries(itemsData).map(([key, value]) => ({
                        key,
                        drug_name: value.drug_name || value.drug || value.name || '—',
                        form: value.form || 'tablet',
                        dose: value.dose || '—'
                    }));
                }

                // ✅ جلب بيانات الطبيب من المجمع فقط
                const doctorId = rx.doctor_id || doctorIdFromUrl;
                let doctorName = '';
                let doctorSpecialty = '';
                
                if (doctorId) {
                    try {
                        const doctorDocRef = doc(db, 'tenants', currentTenantId, 'users', doctorId);
                        const doctorSnap = await getDoc(doctorDocRef);
                        if (doctorSnap.exists()) {
                            const doctorData = doctorSnap.data();
                            doctorName = doctorData.name || '';
                            doctorSpecialty = doctorData.specialty || '';
                        }
                    } catch(e) { 
                        console.warn('تعذر جلب بيانات الطبيب:', e.message); 
                    }
                }

                // ✅ جلب بيانات المريض من المجمع فقط
                const patientId = rx.patient_id || patientIdFromUrl;
                let patientName = patientNameFromUrl || rx.patient_name || 'غير معروف';
                let patientPhone = rx.patient_phone || '';
                
                if (patientId && (!patientName || patientName === 'غير معروف')) {
                    try {
                        const patientDocRef = doc(db, 'tenants', currentTenantId, 'patients', patientId);
                        const patientSnap = await getDoc(patientDocRef);
                        if (patientSnap.exists()) {
                            const patientData = patientSnap.data();
                            patientName = patientData.name || patientName;
                            patientPhone = patientData.phone || patientPhone;
                        }
                    } catch(e) { 
                        console.warn('تعذر جلب بيانات المريض:', e.message); 
                    }
                }

                const dateStr = rx.created_at 
                    ? new Date(rx.created_at).toLocaleDateString('ar-EG', { 
                        year: 'numeric', month: 'long', day: 'numeric' 
                      }) 
                    : '—';
                const timeStr = rx.created_at 
                    ? new Date(rx.created_at).toLocaleTimeString('ar-EG', { 
                        hour: '2-digit', minute: '2-digit' 
                      }) 
                    : '';

                // ✅ تحميل ملاحظات الصيدلي من المجمع
                const savedNotes = await loadPharmacistNotes(prescriptionId);

                const data = {
                    ...rx,
                    _items: items,
                    _patientName: patientName,
                    _patientPhone: patientPhone,
                    _patientId: patientId,
                    _doctorName: doctorName,
                    _doctorSpecialty: doctorSpecialty,
                    _doctorId: doctorId,
                    _itemCount: items.length,
                    _dateStr: dateStr,
                    _timeStr: timeStr,
                    _savedNotes: savedNotes
                };

                renderPrescription(data);
                
            } catch (err) {
                console.error('❌ خطأ في تحميل الروشتة:', err);
                showErrorState('حدث خطأ في تحميل البيانات: ' + err.message);
            }
        }

        function showErrorState(msg) {
            $('#dynamicContent').innerHTML = `
                <div class="card">
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle" style="color:var(--danger);"></i>
                        <p style="font-size:1rem;font-weight:600;">${msg}</p>
                    </div>
                </div>`;
            $('#pageLoader').style.display = 'none';
            $('#mainContent').style.display = 'block';
        }

        function renderPrescription(data) {
            const isDispensed = data.status === 'تم الصرف';
            const statusLabel = isDispensed ? 'تم الصرف' : 'لم تصرف بعد';
            const statusClass = isDispensed ? 'status-dispensed' : 'status-pending';
            
            const formLabels = {
                'tablet': 'أقراص', 'capsule': 'كبسولات', 'syrup': 'شراب',
                'injection': 'حقن', 'suppository': 'لبوس', 'drops': 'نقط',
                'spray': 'بخاخ', 'cream': 'كريم'
            };
            
            let itemsHtml = data._items && data._items.length > 0 
                ? data._items.map(item => `
                    <tr>
                        <td><strong>${esc(item.drug_name)}</strong></td>
                        <td><span class="drug-form-badge">${formLabels[item.form] || item.form}</span></td>
                        <td><span class="dose-highlight">${esc(item.dose)}</span></td>
                    </tr>`).join('')
                : '<tr><td colspan="3" style="text-align:center;padding:20px;color:var(--text-sec);">لا توجد أدوية مسجلة</td></tr>';

            let dispenseSection = '';
            if (isDispensed) {
                let notesHtml = data._savedNotes ? `
                    <div class="pharmacist-notes-display">
                        <i class="fas fa-pen" style="margin-left:6px;"></i>
                        <strong>ملاحظات الصيدلي:</strong> ${esc(data._savedNotes)}
                    </div>` : '';
                
                dispenseSection = `
                <div class="card">
                    <div class="dispensed-info">
                        <i class="fas fa-check-circle" style="font-size:1.5rem;"></i>
                        <div>
                            <strong>تم صرف الروشتة</strong>
                            <div style="font-size:0.82rem;margin-top:4px;">
                                الصيدلي: ${esc(data.pharmacist_name || '')} · 
                                ${data.dispensed_at ? new Date(data.dispensed_at).toLocaleString('ar-EG', {dateStyle:'medium',timeStyle:'short'}) : ''}
                            </div>
                        </div>
                    </div>
                    ${notesHtml}
                    ${isPharmacist ? `
                    <div style="margin-top:12px;">
                        <button class="btn btn-outline btn-sm" id="undoDispenseBtn" style="color:var(--danger);border-color:var(--danger);">
                            <i class="fas fa-undo"></i> إلغاء الصرف
                        </button>
                    </div>` : ''}
                </div>`;
            } else if (isPharmacist) {
                dispenseSection = `
                <div class="card dispense-card">
                    <div class="card-header">
                        <div class="icon-circle icon-green"><i class="fas fa-capsules"></i></div>
                        <h3>تأكيد الصرف</h3>
                    </div>
                    
                    <div style="margin-bottom:12px;">
                        <label style="display:block;font-weight:700;margin-bottom:6px;font-size:0.85rem;">
                            <i class="fas fa-pen" style="color:var(--warning);margin-left:4px;"></i>
                            ملاحظات الصيدلي <small style="font-weight:400;color:var(--text-sec);">(اختياري)</small>
                        </label>
                        <textarea id="pharmacistNotes" class="form-control" 
                            placeholder="مثال: تحذيرات، تعليمات إضافية للمريض، بدائل الأدوية..."
                            style="min-height:60px;">${esc(data._savedNotes || '')}</textarea>
                    </div>
                    
                    <p style="color:var(--text-sec);margin-bottom:12px;font-size:0.83rem;">
                        بالضغط على الزر أدناه، أنت تؤكد صرف جميع الأدوية المذكورة أعلاه للمريض.
                    </p>
                    <button class="btn btn-success" id="dispenseBtn">
                        <i class="fas fa-check-circle"></i> تأكيد صرف الروشتة
                    </button>
                </div>`;
            }

            const html = `
            <div class="card">
                <div class="card-header">
                    <div class="icon-circle icon-cyan"><i class="fas fa-clipboard-list"></i></div>
                    <h3>معلومات الروشتة</h3>
                </div>
                <div class="info-grid">
                    <div class="info-item">
                        <i class="fas fa-user"></i>
                        <div>
                            <strong>المريض</strong>
                            <span class="clickable" id="patientNameLink" data-patient-id="${esc(data._patientId || '')}" data-patient-name="${esc(data._patientName)}">
                                ${esc(data._patientName)}
                            </span>
                        </div>
                    </div>
                    <div class="info-item">
                        <i class="fas fa-user-md"></i>
                        <div>
                            <strong>الطبيب</strong>
                            <span>د. ${esc(data._doctorName || 'غير معروف')}${data._doctorSpecialty ? ` (${esc(data._doctorSpecialty)})` : ''}</span>
                        </div>
                    </div>
                    <div class="info-item">
                        <i class="fas fa-calendar-alt"></i>
                        <div><strong>تاريخ الكشف</strong><span>${data._dateStr} · ${data._timeStr}</span></div>
                    </div>
                    <div class="info-item">
                        <i class="fas fa-cubes"></i>
                        <div><strong>عدد الأصناف</strong> ${data._itemCount} صنف</div>
                    </div>
                    <div class="info-item" style="grid-column:1/-1;">
                        <i class="fas fa-notes-medical"></i>
                        <div><strong>التشخيص</strong> <span>${esc(data.diagnosis || 'غير محدد')}</span></div>
                    </div>
                </div>
                <div style="margin-top:12px;">
                    <span class="status-badge ${statusClass}">
                        <i class="fas fa-circle" style="font-size:0.5rem;"></i> ${statusLabel}
                    </span>
                </div>
                <div class="action-row">
                    ${data._patientId ? `<button class="btn btn-outline btn-sm" id="patientFileBtn"><i class="fas fa-folder-open"></i> ملف المريض</button>` : ''}
                    ${data._patientPhone ? `<a href="tel:${esc(data._patientPhone)}" class="btn btn-outline btn-sm" style="text-decoration:none;"><i class="fas fa-phone"></i> ${esc(data._patientPhone)}</a>` : ''}
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <div class="icon-circle icon-blue"><i class="fas fa-pills"></i></div>
                    <h3>الأدوية الموصوفة (${data._itemCount})</h3>
                </div>
                <div class="rx-table-wrap">
                    <table class="rx-table">
                        <thead>
                            <tr><th>اسم الدواء</th><th>الشكل الصيدلي</th><th>الجرعة</th></tr>
                        </thead>
                        <tbody>${itemsHtml}</tbody>
                    </table>
                </div>
            </div>

            ${dispenseSection}
            `;

            $('#dynamicContent').innerHTML = html;

            // زر الطباعة
            $('#printBtn')?.addEventListener('click', () => window.print());
            
            // زر العودة
            $('#backBtn')?.addEventListener('click', () => {
                if (document.referrer && document.referrer.includes(window.location.host)) {
                    window.history.back();
                } else {
                    window.location.href = 'pharmacy-dashboard.html';
                }
            });

            // زر ملف المريض
            $('#patientFileBtn')?.addEventListener('click', () => {
                const pid = data._patientId;
                if (pid) {
                    window.open(`patient-file.html?patientId=${pid}&patientName=${encodeURIComponent(data._patientName)}&tenant=${currentTenantId}`, '_blank');
                }
            });

            // رابط اسم المريض
            const patientNameLink = document.getElementById('patientNameLink');
            if (patientNameLink) {
                patientNameLink.addEventListener('click', () => {
                    const pid = patientNameLink.dataset.patientId;
                    if (pid) {
                        window.open(`patient-file.html?patientId=${pid}&patientName=${encodeURIComponent(data._patientName)}&tenant=${currentTenantId}`, '_blank');
                    }
                });
            }

            // ✅ زر الصرف (مسار موحد - المجمع فقط)
            const dispenseBtn = $('#dispenseBtn');
            if (dispenseBtn) {
                dispenseBtn.addEventListener('click', async () => {
                    if (!confirm('هل أنت متأكد من صرف جميع الأدوية في هذه الروشتة؟')) return;
                    
                    dispenseBtn.disabled = true;
                    dispenseBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الصرف...';
                    
                    try {
                        const notes = $('#pharmacistNotes')?.value?.trim() || '';
                        
                        // حفظ الملاحظات في المجمع
                        if (notes) {
                            await savePharmacistNotes(prescriptionId, notes);
                        } else {
                            await deletePharmacistNotes(prescriptionId);
                        }
                        
                        const updateData = {
                            status: 'تم الصرف',
                            pharmacist_id: currentUser.uid,
                            pharmacist_name: pharmacistData?.name || currentUser.displayName || 'صيدلي',
                            pharmacist_notes: notes || null,
                            dispensed_at: new Date().toISOString()
                        };
                        
                        // ✅ تحديث الروشتة في المجمع فقط
                        const rxDocRef = doc(db, 'tenants', currentTenantId, 'prescriptions', prescriptionId);
                        await updateDoc(rxDocRef, updateData);
                        
                        toast('✅ تم صرف الروشتة بنجاح');
                        setTimeout(() => window.location.reload(), 1200);
                    } catch (err) {
                        console.error('❌ خطأ في الصرف:', err);
                        toast('❌ فشل الصرف: ' + err.message, true);
                        dispenseBtn.disabled = false;
                        dispenseBtn.innerHTML = '<i class="fas fa-check-circle"></i> تأكيد صرف الروشتة';
                    }
                });
            }

            // ✅ زر إلغاء الصرف (مسار موحد - المجمع فقط)
            const undoDispenseBtn = $('#undoDispenseBtn');
            if (undoDispenseBtn) {
                undoDispenseBtn.addEventListener('click', async () => {
                    if (!confirm('هل أنت متأكد من إلغاء صرف هذه الروشتة؟')) return;
                    
                    undoDispenseBtn.disabled = true;
                    undoDispenseBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الإلغاء...';
                    
                    try {
                        // حذف الملاحظات من المجمع
                        await deletePharmacistNotes(prescriptionId);
                        
                        const updateData = {
                            status: 'لم تصرف بعد',
                            pharmacist_id: null,
                            pharmacist_name: null,
                            pharmacist_notes: null,
                            dispensed_at: null
                        };
                        
                        // ✅ تحديث الروشتة في المجمع فقط
                        const rxDocRef = doc(db, 'tenants', currentTenantId, 'prescriptions', prescriptionId);
                        await updateDoc(rxDocRef, updateData);
                        
                        toast('✅ تم إلغاء صرف الروشتة');
                        setTimeout(() => window.location.reload(), 1200);
                    } catch (err) {
                        console.error('❌ خطأ في إلغاء الصرف:', err);
                        toast('❌ فشل إلغاء الصرف: ' + err.message, true);
                        undoDispenseBtn.disabled = false;
                        undoDispenseBtn.innerHTML = '<i class="fas fa-undo"></i> إلغاء الصرف';
                    }
                });
            }

            $('#pageLoader').style.display = 'none';
            $('#mainContent').style.display = 'block';
        }

        // ============ إعداد تسجيل الخروج ============
        const setupLogout = () => {
            const logoutBtn = $('#logoutBtn');
            if (logoutBtn) {
                logoutBtn.style.display = 'inline-flex';
                logoutBtn.addEventListener('click', async () => {
                    try {
                        toast('👋 جاري تسجيل الخروج...');
                        clearLoginSessionOnly();
                        await signOut(auth);
                        window.location.href = 'index.html';
                    } catch (error) {
                        clearLoginSessionOnly();
                        window.location.href = 'index.html';
                    }
                });
            }
        };

        // ============ مستمعي الاتصال ============
        window.addEventListener('online', () => setSyncStatus(true));
        window.addEventListener('offline', () => setSyncStatus(false));

        // ============ ✅ بدء التشغيل ============
        onAuthStateChanged(auth, async (user) => {
            if (!user) { 
                clearLoginSessionOnly(); 
                window.location.href = 'index.html'; 
                return; 
            }
            
            currentUser = user;
            
            // ✅ التحقق من بيانات المستخدم في المجمع
            if (currentTenantId) {
                try {
                    const userDocRef = doc(db, 'tenants', currentTenantId, 'users', user.uid);
                    const userSnap = await getDoc(userDocRef);
                    
                    if (userSnap.exists()) {
                        const userData = userSnap.data();
                        
                        if (userData.tenantName && $('#tenantName')) {
                            $('#tenantName').textContent = userData.tenantName;
                            $('#tenantBadge').style.display = 'flex';
                        }
                        
                        if (userData.role === 'pharmacist') {
                            isPharmacist = true;
                            pharmacistData = { id: user.uid, ...userData };
                            setupLogout();
                        }
                    }
                } catch(e) { 
                    console.warn('تعذر التحقق من بيانات المستخدم:', e.message); 
                }
            }
            
            await loadPrescription();
        });

        console.log('🚀 صفحة تفاصيل الروشتة - مسارات موحدة');
        console.log('✅ المجمع: من URL → مشفر → قديم');
        console.log('✅ الروشتة: /tenants/{tenantId}/prescriptions/{rxId}');
        console.log('✅ عناصر الروشتة: /tenants/{tenantId}/prescription_items/{rxId}');
        console.log('✅ المريض: /tenants/{tenantId}/patients/{patientId}');
        console.log('✅ الطبيب: /tenants/{tenantId}/users/{doctorId}');
        console.log('✅ ملاحظات الصيدلي: /tenants/{tenantId}/pharmacist_notes/{uid}/notes/{rxId}');
        console.log('☁️ جميع البيانات من المجمع فقط - بدون مسارات عامة');
    </script>
</body>
</html>
