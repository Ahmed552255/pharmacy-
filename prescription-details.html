<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>سُكُون · تفاصيل الروشتة</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #F8C471;
            --primary-light: #FDEBD0;
            --primary-dark: #E59866;
            --accent: #E67E22;
            --accent-soft: #FAD7A1;
            --bg: #FFF8F0;
            --white: #FFFFFF;
            --ink: #4A3B2C;
            --text-sec: #8B7A66;
            --danger: #E57373;
            --success: #5FA88D;
            --warning: #F4B886;
            --border-light: #F0E0D0;
            --shadow-sm: 0 4px 10px rgba(0,0,0,0.04);
            --radius-card: 20px;
            --radius-sm: 14px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            padding: 12px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 0% 0%, rgba(248, 196, 113, 0.1), transparent 60%);
            pointer-events: none;
            z-index: -1;
        }
        .container {
            width: 100%;
            max-width: 700px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin: 0 auto;
        }
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            padding: 12px 20px;
            border: 1px solid rgba(255,255,255,0.7);
            box-shadow: var(--shadow-sm);
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 10px 18px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            transition: all 0.2s;
            background: white;
            color: var(--ink);
            border: 1px solid var(--border-light);
            white-space: nowrap;
            text-decoration: none;
        }
        .btn:hover { background: var(--primary-light); }
        .btn-primary {
            background: var(--primary);
            color: #4A3B2C;
            border: none;
            box-shadow: 0 4px 12px rgba(230, 126, 34, 0.15);
        }
        .btn-success {
            background: var(--success);
            color: white;
            border: none;
        }
        .btn-outline { background: transparent; }
        .btn-sm { padding: 6px 14px; font-size: 0.8rem; border-radius: 30px; }

        .card {
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(8px);
            border-radius: var(--radius-card);
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow: var(--shadow-sm);
        }
        .card h2 {
            font-size: 1.2rem;
            margin-bottom: 14px;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .info-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            font-size: 0.95rem;
            flex-wrap: wrap;
        }
        .info-row i {
            width: 20px;
            color: var(--accent);
            font-size: 1rem;
            text-align: center;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.8rem;
        }
        .status-pending { background: #FFF3E0; color: #E65100; }
        .status-dispensed { background: #E8F5E9; color: #2E7D32; }

        .drug-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 8px;
            font-size: 0.9rem;
        }
        .drug-table th, .drug-table td {
            padding: 12px 8px;
            border-bottom: 1px solid var(--border-light);
            text-align: right;
            vertical-align: middle;
        }
        .drug-table th { background: var(--primary-light); color: var(--ink); font-weight: 700; font-size: 0.85rem; }
        .actions-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 16px;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #4A3B2C;
            color: white;
            padding: 14px 20px;
            border-radius: 60px;
            text-align: center;
            z-index: 3000;
            max-width: 450px;
            margin: 0 auto;
            font-size: 0.9rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            animation: fadeInUp 0.3s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.1rem;
            color: var(--text-sec);
        }

        @media (max-width: 500px) {
            body { padding: 8px; }
            .container { gap: 12px; }
            .card { padding: 16px; border-radius: var(--radius-sm); }
            .top-bar { padding: 10px 16px; border-radius: 40px; }
            .btn { font-size: 0.8rem; padding: 8px 14px; }
            .drug-table { font-size: 0.8rem; }
            .drug-table th, .drug-table td { padding: 8px 4px; }
            .info-row { font-size: 0.85rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="top-bar">
        <h2 style="font-size:1.2rem; font-weight:700;"><i class="fas fa-prescription"></i> تفاصيل الروشتة</h2>
        <button class="btn btn-outline btn-sm" onclick="window.location.href='pharmacy-dashboard.html'">
            <i class="fas fa-arrow-right"></i> العودة للوحة الصيدلي
        </button>
    </div>
    <div id="contentArea">
        <div class="loading"><i class="fas fa-spinner fa-pulse"></i> جاري تحميل البيانات...</div>
    </div>
</div>

<script type="module">
    import { firebaseConfig } from './firebase-config.js';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
    import { getDatabase, ref, get, update } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let currentUser = null;
    let pharmacistInfo = null;
    let prescriptionData = null;
    const urlParams = new URLSearchParams(window.location.search);
    const prescriptionId = urlParams.get('id');

    if (!prescriptionId) {
        document.getElementById('contentArea').innerHTML = '<div class="card"><p>معرف الروشتة غير موجود.</p></div>';
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m] || m);
    }

    function showToast(msg, isErr = false) {
        const old = document.querySelector('.toast');
        if (old) old.remove();
        const t = document.createElement('div');
        t.className = 'toast';
        t.style.background = isErr ? '#B23B3B' : '#4A3B2C';
        t.innerHTML = `<i class="fas ${isErr ? 'fa-exclamation-triangle' : 'fa-check'}"></i> ${msg}`;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2500);
    }

    async function loadPharmacistData(uid) {
        const snap = await get(ref(db, `users/${uid}`));
        if (snap.exists()) {
            const data = snap.val();
            if (data.role === 'pharmacist') {
                pharmacistInfo = data;
                return true;
            }
        }
        return false;
    }

    async function loadPrescription() {
        const presSnap = await get(ref(db, `prescriptions/${prescriptionId}`));
        if (!presSnap.exists()) {
            document.getElementById('contentArea').innerHTML = '<div class="card"><p>الروشتة غير موجودة.</p></div>';
            return;
        }
        prescriptionData = { id: prescriptionId, ...presSnap.val() };

        // 1. جلب عناصر الوصفة (إما من prescription_items أو من template_items)
        let itemsSnap = await get(ref(db, `prescription_items/${prescriptionId}`));
        let items = [];
        if (itemsSnap.exists()) {
            items = Object.values(itemsSnap.val());
        }

        // لو مفيش عناصر مباشرة ولكن الروشتة مرتبطة بقالب → نجيب عناصر القالب
        if (items.length === 0 && prescriptionData.template_id) {
            const templateItemsSnap = await get(ref(db, `template_items/${prescriptionData.template_id}`));
            if (templateItemsSnap.exists()) {
                items = Object.values(templateItemsSnap.val());
            }
        }

        // 2. بيانات الطبيب والمريض
        const [doctorSnap, patientSnap] = await Promise.all([
            get(ref(db, `users/${prescriptionData.doctor_id}`)),
            prescriptionData.patient_id ? get(ref(db, `patients/${prescriptionData.patient_id}`)) : Promise.resolve(null)
        ]);

        const doctorData = doctorSnap.exists() ? doctorSnap.val() : {};
        prescriptionData._doctorName = doctorData.name || '';
        prescriptionData._doctorSpecialty = doctorData.specialty || '';

        let patientName = prescriptionData.patient_name || '';
        if (!patientName && patientSnap && patientSnap.exists()) {
            patientName = patientSnap.val().name || '';
        }
        prescriptionData._patientName = patientName || 'غير معروف';

        // 3. أسماء الأدوية (اختياري، لتحسين العرض)
        const drugNamePromises = items.map(async (item) => {
            try {
                if (!item.drug_id) return 'غير معروف';
                const drugSnap = await get(ref(db, `drugs/${item.drug_id}`));
                return drugSnap.exists() ? drugSnap.val().name : item.drug_id;
            } catch (e) {
                return item.drug_id;
            }
        });
        prescriptionData._items = items;
        prescriptionData._drugNames = await Promise.all(drugNamePromises);
        prescriptionData._itemCount = items.length;

        renderPrescription();
    }

    function renderPrescription() {
        const p = prescriptionData;
        const items = p._items || [];
        const drugNames = p._drugNames || [];
        const statusText = p.status === 'تم الصرف' ? 'تم الصرف' : 'لم تصرف بعد';
        const statusClass = p.status === 'تم الصرف' ? 'status-dispensed' : 'status-pending';
        const itemCount = p._itemCount || 0;

        let itemsRows = '';
        if (items.length > 0) {
            items.forEach((item, i) => {
                const drugName = drugNames[i] || item.drug_id || '—';
                itemsRows += `
                <tr>
                    <td>${escapeHtml(drugName)}</td>
                    <td>${escapeHtml(item.form || '—')}</td>
                    <td>${escapeHtml(item.dose)}</td>
                </tr>`;
            });
        }

        const patientFileBtn = (p.patient_id) ? `
            <button id="patientFileBtn" class="btn btn-outline btn-sm"><i class="fas fa-folder-open"></i> ملف المريض</button>
        ` : '';

        let pharmacySectionHtml = '';
        if (p.status === 'تم الصرف') {
            pharmacySectionHtml = `
                <div class="card" style="background: #E8F5E9; border-right: 4px solid var(--success);">
                    <h2><i class="fas fa-check-circle" style="color:var(--success);"></i> تم الصرف</h2>
                    <div class="info-row"><i class="fas fa-user-check"></i> <strong>الصيدلي:</strong> ${escapeHtml(p.pharmacist_name || '')}</div>
                    <div class="info-row"><i class="far fa-clock"></i> <strong>تاريخ الصرف:</strong> ${p.dispensed_at ? new Date(p.dispensed_at).toLocaleString('ar-EG') : ''}</div>
                </div>
            `;
        } else if (pharmacistInfo) {
            pharmacySectionHtml = `
                <div class="card">
                    <h2><i class="fas fa-capsules"></i> إجراء الصرف</h2>
                    <p style="margin-bottom:12px; color:var(--text-sec);">تأكيد صرف جميع الأدوية للمريض.</p>
                    <button id="dispenseBtn" class="btn btn-success"><i class="fas fa-check-circle"></i> تأكيد الصرف والعودة للوحة التحكم</button>
                </div>
            `;
        }

        const html = `
            <div class="card">
                <h2><i class="fas fa-user"></i> معلومات المريض والوصفة</h2>
                <div class="info-row"><i class="fas fa-user"></i> <strong>المريض:</strong> ${escapeHtml(p._patientName)}</div>
                <div class="info-row"><i class="fas fa-user-md"></i> <strong>الطبيب:</strong> د. ${escapeHtml(p._doctorName)} ${p._doctorSpecialty ? '(' + escapeHtml(p._doctorSpecialty) + ')' : ''}</div>
                <div class="info-row"><i class="far fa-calendar-alt"></i> <strong>تاريخ الوصفة:</strong> ${p.created_at ? new Date(p.created_at).toLocaleString('ar-EG') : ''}</div>
                ${p.diagnosis ? `<div class="info-row"><i class="fas fa-notes-medical"></i> <strong>التشخيص:</strong> ${escapeHtml(p.diagnosis)}</div>` : ''}
                <div class="info-row"><i class="fas fa-circle"></i> <strong>الحالة:</strong> <span class="status-badge ${statusClass}">${statusText}</span></div>
                <div class="info-row"><i class="fas fa-cubes"></i> <strong>عدد الأصناف:</strong> ${itemCount}</div>
                <div class="actions-row">
                    ${patientFileBtn}
                    <button id="printBtn" class="btn btn-primary btn-sm"><i class="fas fa-print"></i> طباعة</button>
                </div>
            </div>

            <div class="card">
                <h2><i class="fas fa-pills"></i> الأدوية الموصوفة</h2>
                ${items.length === 0 ? '<p>لا توجد أدوية مسجلة.</p>' : `
                <div style="overflow-x: auto;">
                <table class="drug-table">
                    <thead>
                        <tr>
                            <th>اسم الدواء</th>
                            <th>الشكل</th>
                            <th>الجرعة</th>
                        </tr>
                    </thead>
                    <tbody>${itemsRows}</tbody>
                </table>
                </div>
                `}
            </div>

            ${pharmacySectionHtml}
        `;

        document.getElementById('contentArea').innerHTML = html;

        const patientFileBtnEl = document.getElementById('patientFileBtn');
        if (patientFileBtnEl) {
            patientFileBtnEl.addEventListener('click', () => {
                window.location.href = `detail.html?patientId=${p.patient_id}&patientName=${encodeURIComponent(p._patientName)}`;
            });
        }

        document.getElementById('printBtn')?.addEventListener('click', () => window.print());

        const dispenseBtn = document.getElementById('dispenseBtn');
        if (dispenseBtn) {
            dispenseBtn.addEventListener('click', async () => {
                try {
                    await update(ref(db, `prescriptions/${prescriptionId}`), {
                        status: 'تم الصرف',
                        pharmacist_id: currentUser.uid,
                        pharmacist_name: pharmacistInfo.name || 'صيدلي',
                        dispensed_at: new Date().toISOString()
                    });
                    showToast('✅ تم صرف الروشتة بنجاح، جاري العودة...');
                    setTimeout(() => {
                        window.location.href = 'pharmacy-dashboard.html';
                    }, 800);
                } catch (err) {
                    showToast('فشل الصرف، حاول مرة أخرى', true);
                }
            });
        }
    }

    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = 'index.html';
            return;
        }
        currentUser = user;
        const valid = await loadPharmacistData(user.uid);
        if (!valid) {
            document.getElementById('contentArea').innerHTML = '<div class="card"><p>هذا الحساب ليس صيدليًا.</p></div>';
            return;
        }
        if (prescriptionId) {
            loadPrescription();
        }
    });
</script>
</body>
</html>
