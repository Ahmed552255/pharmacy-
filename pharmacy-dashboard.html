<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#00AEEF">
    <title>شفاء · لوحة الصيدلي</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'">
    
    <style>
        :root {
            --primary: #00AEEF;
            --primary-light: #E0F7FA;
            --primary-dark: #008080;
            --bg: #FAFAFA;
            --white: #FFFFFF;
            --ink: #1A3C4A;
            --text-sec: #5A7D8A;
            --danger: #E57373;
            --success: #26A69A;
            --warning: #FFB74D;
            --border: #E0E0E0;
            --shadow-xs: 0 1px 4px rgba(0,0,0,0.03);
            --shadow-sm: 0 4px 12px rgba(0,0,0,0.05);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.08);
            --radius-xs: 8px;
            --radius-sm: 14px;
            --radius-md: 20px;
            --radius-lg: 28px;
            --radius-xl: 50px;
            --safe-bottom: env(safe-area-inset-bottom, 16px);
            --safe-top: env(safe-area-inset-top, 0px);
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        input, textarea, select { 
            -webkit-user-select: text; 
            user-select: text; 
        }

        html {
            font-size: clamp(13px, 2.8vw, 16px);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            -webkit-text-size-adjust: 100%;
            text-rendering: optimizeLegibility;
        }

        body {
            font-family: 'Cairo', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            min-height: 100dvh;
            padding: clamp(6px, 1.5vw, 12px);
            padding-bottom: calc(clamp(6px, 1.5vw, 12px) + var(--safe-bottom) + 45vh);
            padding-top: calc(clamp(6px, 1.5vw, 12px) + var(--safe-top));
            overflow-x: hidden;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            -webkit-overflow-scrolling: touch;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 15% 25%, rgba(0,174,239,0.04) 0%, transparent 50%),
                        radial-gradient(ellipse at 85% 75%, rgba(0,128,128,0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .container { 
            max-width: min(1400px, 98vw); 
            margin: 0 auto; 
        }

        /* ============ شاشة التحميل ============ */
        #appLoader {
            position: fixed;
            inset: 0;
            background: rgba(250,250,250,0.95);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            flex-direction: column;
            gap: clamp(12px, 2vw, 16px);
        }
        
        .loader-circle {
            width: clamp(36px, 8vw, 44px);
            height: clamp(36px, 8vw, 44px);
            border: 3px solid var(--primary-light);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        
        @keyframes spin { 
            to { transform: rotate(360deg); } 
        }
        
        .loader-text {
            font-size: clamp(0.9rem, 2.5vw, 1rem);
            font-weight: 600;
            color: var(--primary-dark);
        }

        /* ============ الهيدر ============ */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border-radius: var(--radius-lg);
            padding: clamp(8px, 2vw, 10px) clamp(12px, 3vw, 18px);
            margin-bottom: clamp(8px, 2vw, 14px);
            border: 1px solid rgba(255,255,255,0.9);
            box-shadow: var(--shadow-sm);
            flex-wrap: wrap;
            gap: clamp(6px, 1.5vw, 10px);
            position: sticky;
            top: clamp(4px, 1vw, 6px);
            z-index: 100;
        }

        .logo { 
            display: flex; 
            align-items: center; 
            gap: clamp(4px, 1vw, 6px); 
            flex-shrink: 0; 
        }
        
        .logo h2 {
            font-size: clamp(1.1rem, 3.5vw, 1.4rem);
            font-weight: 900;
            background: linear-gradient(135deg, #008080, #00AEEF);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            white-space: nowrap;
        }
        
        .logo i { 
            color: var(--primary); 
            font-size: clamp(0.9rem, 2.5vw, 1.1rem); 
        }

        .header-actions {
            display: flex;
            gap: clamp(4px, 1vw, 8px);
            align-items: center;
            flex-wrap: wrap;
        }

        .tenant-badge {
            background: var(--primary-light);
            padding: clamp(3px, 0.8vw, 4px) clamp(8px, 2vw, 10px);
            border-radius: var(--radius-xl);
            font-size: clamp(0.68rem, 1.8vw, 0.75rem);
            font-weight: 600;
            color: var(--primary-dark);
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
        }

        #welcomeMsg {
            font-weight: 600;
            font-size: clamp(0.78rem, 2vw, 0.88rem);
            color: var(--text-sec);
            white-space: nowrap;
            max-width: clamp(80px, 20vw, 150px);
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn {
            padding: clamp(7px, 1.5vw, 9px) clamp(12px, 2.5vw, 16px);
            border-radius: var(--radius-xl);
            border: none;
            font-weight: 700;
            font-family: 'Cairo', system-ui, sans-serif;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: clamp(4px, 1vw, 6px);
            font-size: clamp(0.75rem, 2vw, 0.85rem);
            white-space: nowrap;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
            transition: all 0.15s ease;
            min-height: clamp(32px, 8vw, 40px);
        }
        
        .btn:active { 
            transform: scale(0.96); 
            opacity: 0.85; 
        }
        
        .btn-primary { 
            background: linear-gradient(135deg, var(--primary), var(--primary-dark)); 
            color: white; 
            box-shadow: 0 4px 12px rgba(0,174,239,0.25); 
        }
        
        .btn-outline { 
            background: rgba(255,255,255,0.9); 
            color: var(--ink); 
            border: 1.5px solid var(--border); 
        }
        
        .btn-sm { 
            padding: clamp(5px, 1vw, 6px) clamp(8px, 2vw, 12px); 
            font-size: clamp(0.7rem, 1.8vw, 0.8rem); 
            min-height: clamp(28px, 7vw, 34px);
            border-radius: var(--radius-sm); 
        }
        
        .btn-icon { 
            width: clamp(34px, 8vw, 42px); 
            height: clamp(34px, 8vw, 42px); 
            padding: 0; 
            justify-content: center; 
            flex-shrink: 0;
            aspect-ratio: 1;
        }

        .sync-dot {
            display: inline-block;
            width: clamp(6px, 1.5vw, 8px);
            height: clamp(6px, 1.5vw, 8px);
            border-radius: 50%;
            margin-left: 4px;
            vertical-align: middle;
        }
        .sync-dot.on { background: var(--success); }
        .sync-dot.off { background: #FFB74D; animation: pulse 1.5s infinite; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ============ شريط الأطباء ============ */
        .doctors-strip {
            background: var(--white);
            border-radius: var(--radius-xl);
            padding: clamp(4px, 1vw, 6px);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            margin-bottom: clamp(8px, 2vw, 14px);
            overflow: hidden;
        }
        
        .doctors-strip .strip-scroll {
            display: flex;
            gap: clamp(4px, 1vw, 6px);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
            scroll-snap-type: x proximity;
            padding: clamp(3px, 0.8vw, 4px);
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        
        .doctors-strip .strip-scroll::-webkit-scrollbar { 
            display: none; 
        }

        .doctor-pill {
            display: flex;
            align-items: center;
            gap: clamp(6px, 1.5vw, 8px);
            padding: clamp(8px, 2vw, 10px) clamp(12px, 2.5vw, 16px);
            background: var(--white);
            border-radius: var(--radius-xl);
            border: 1.5px solid var(--border);
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
            scroll-snap-align: start;
            transition: all 0.2s ease;
            font-weight: 600;
            font-size: clamp(0.78rem, 2vw, 0.88rem);
            touch-action: manipulation;
            min-height: clamp(36px, 9vw, 44px);
        }
        
        .doctor-pill:active { 
            transform: scale(0.95); 
        }
        
        .doctor-pill.active {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border-color: var(--primary);
            box-shadow: 0 4px 14px rgba(0,174,239,0.3);
            font-weight: 700;
        }
        
        .doctor-pill .pill-avatar {
            width: clamp(26px, 6vw, 30px);
            height: clamp(26px, 6vw, 30px);
            min-width: clamp(26px, 6vw, 30px);
            background: var(--primary-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(0.7rem, 1.8vw, 0.8rem);
            color: var(--primary-dark);
            font-weight: 700;
        }
        
        .doctor-pill.active .pill-avatar {
            background: rgba(255,255,255,0.3);
            color: white;
        }
        
        .doctor-pill .pill-badge {
            background: var(--danger);
            color: white;
            border-radius: 20px;
            padding: 2px 8px;
            font-size: clamp(0.65rem, 1.6vw, 0.72rem);
            font-weight: 700;
            animation: badgePop 0.3s ease;
        }
        
        .doctor-pill.active .pill-badge {
            background: rgba(255,255,255,0.35);
        }
        
        @keyframes badgePop {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* ============ تبويبات الحالة ============ */
        .status-tabs {
            display: flex;
            gap: clamp(3px, 0.8vw, 6px);
            margin-bottom: clamp(8px, 2vw, 14px);
            flex-wrap: wrap;
            background: var(--white);
            border-radius: var(--radius-xl);
            padding: clamp(3px, 0.8vw, 5px);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }
        
        .status-tab {
            background: transparent;
            border: none;
            padding: clamp(7px, 1.5vw, 9px) clamp(10px, 2.5vw, 16px);
            border-radius: var(--radius-xl);
            font-weight: 600;
            font-family: 'Cairo', system-ui, sans-serif;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: clamp(4px, 1vw, 6px);
            font-size: clamp(0.75rem, 2vw, 0.85rem);
            color: var(--text-sec);
            flex: 1;
            justify-content: center;
            min-width: clamp(60px, 15vw, 80px);
            touch-action: manipulation;
            transition: all 0.2s ease;
        }
        
        .status-tab .badge {
            background: rgba(0,0,0,0.05);
            border-radius: 30px;
            padding: 2px 9px;
            font-size: clamp(0.7rem, 1.6vw, 0.75rem);
            font-weight: 700;
            transition: all 0.2s ease;
        }
        
        .status-tab.active {
            background: white;
            color: var(--primary);
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .status-tab.active .badge {
            background: var(--primary-light);
            color: var(--primary);
        }
        
        .status-tab:active:not(.active) {
            background: rgba(255,255,255,0.6);
        }

        /* ============ جدول الوصفات ============ */
        .table-container {
            background: var(--white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            overflow: hidden;
        }
        
        .table-scroll {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
            min-width: clamp(300px, 80vw, 500px);
            font-size: clamp(0.78rem, 2vw, 0.88rem);
        }
        
        th, td { 
            padding: clamp(8px, 2vw, 12px) clamp(6px, 1.5vw, 10px); 
        }
        
        thead th {
            background: #F5FAFC;
            font-weight: 700;
            color: var(--ink);
            font-size: clamp(0.72rem, 1.8vw, 0.8rem);
            white-space: nowrap;
            position: sticky;
            top: 0;
            z-index: 1;
            border-bottom: 2px solid var(--primary-light);
        }
        
        tbody tr { 
            border-bottom: 1px solid var(--border); 
            cursor: pointer; 
            transition: background 0.15s ease; 
            min-height: clamp(44px, 10vw, 52px);
        }
        
        tbody tr:last-child { 
            border-bottom: none; 
        }
        
        tbody tr:active { 
            background: var(--primary-light); 
        }
        
        tbody tr:hover { 
            background: #F8FDFE; 
        }

        .status-badge {
            padding: clamp(3px, 0.8vw, 4px) clamp(8px, 2vw, 12px);
            border-radius: 30px;
            font-size: clamp(0.68rem, 1.6vw, 0.75rem);
            font-weight: 700;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        
        .s-pending { 
            background: #FFF3E0; 
            color: #E65100; 
        }
        
        .s-dispensed { 
            background: #E8F5E9; 
            color: #2E7D32; 
        }
        
        .s-partial { 
            background: #E3F2FD; 
            color: #1565C0; 
        }

        .empty-row td {
            text-align: center;
            padding: clamp(25px, 6vw, 40px) clamp(10px, 2vw, 16px);
            color: var(--text-sec);
            font-size: clamp(0.8rem, 2vw, 0.9rem);
        }
        
        .empty-row i {
            display: block;
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            margin-bottom: 8px;
            opacity: 0.3;
        }

        .action-btn {
            background: var(--primary-light);
            border: none;
            border-radius: var(--radius-sm);
            padding: clamp(5px, 1vw, 6px) clamp(10px, 2vw, 14px);
            cursor: pointer;
            color: var(--primary-dark);
            font-family: 'Cairo', system-ui, sans-serif;
            font-weight: 700;
            font-size: clamp(0.7rem, 1.6vw, 0.78rem);
            touch-action: manipulation;
            transition: all 0.15s ease;
            white-space: nowrap;
        }
        
        .action-btn:active { 
            background: var(--primary); 
            color: white; 
        }

        /* ============ المودال ============ */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(26,60,74,0.15);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: clamp(8px, 2vw, 16px);
            animation: fadeIn 0.2s ease;
        }
        
        @keyframes fadeIn { 
            from { opacity: 0; } 
            to { opacity: 1; } 
        }
        
        .modal-card {
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: min(550px, 95vw);
            max-height: 85vh;
            max-height: 85dvh;
            overflow-y: auto;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,255,0.9);
            animation: slideUp 0.25s ease;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
        }
        
        @keyframes slideUp { 
            from { transform: translateY(30px); opacity: 0; } 
            to { transform: translateY(0); opacity: 1; } 
        }
        
        .modal-header {
            padding: clamp(12px, 2.5vw, 16px) clamp(16px, 3vw, 20px);
            background: #F5FAFC;
            border-bottom: 1px solid var(--border);
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        
        .modal-header h3 { 
            font-size: clamp(0.95rem, 2.5vw, 1.1rem); 
            font-weight: 800; 
        }
        
        .close-btn {
            background: rgba(0,0,0,0.04);
            border: none;
            width: clamp(30px, 7vw, 36px);
            height: clamp(30px, 7vw, 36px);
            border-radius: 50%;
            font-size: clamp(18px, 4vw, 22px);
            color: var(--text-sec);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
            touch-action: manipulation;
            aspect-ratio: 1;
        }
        
        .close-btn:active { 
            background: rgba(0,0,0,0.08); 
        }
        
        .modal-body { 
            padding: clamp(14px, 3vw, 20px);
            padding-bottom: clamp(40vh, 50vh, 55vh);
        }

        .form-group { 
            margin-bottom: clamp(10px, 2.5vw, 14px); 
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 700;
            font-size: clamp(0.8rem, 2vw, 0.88rem);
            color: var(--ink);
        }
        
        .form-control {
            width: 100%;
            padding: clamp(8px, 2vw, 10px) clamp(12px, 2.5vw, 14px);
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--border);
            background: #F5FAFC;
            font-family: 'Cairo', system-ui, sans-serif;
            font-size: clamp(0.8rem, 2vw, 0.88rem);
            color: var(--ink);
            -webkit-appearance: none;
            appearance: none;
            transition: all 0.15s ease;
        }
        
        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(0,174,239,0.1);
        }
        
        textarea.form-control {
            resize: vertical;
            min-height: clamp(60px, 15vw, 80px);
        }

        .rx-detail-item {
            display: flex;
            align-items: center;
            gap: clamp(6px, 1.5vw, 10px);
            padding: clamp(8px, 2vw, 10px) clamp(10px, 2.5vw, 14px);
            background: #F5FAFC;
            border-radius: var(--radius-sm);
            margin-bottom: 6px;
            border: 1px solid var(--border);
            transition: all 0.15s ease;
        }
        
        .rx-detail-item .drug-icon {
            width: clamp(28px, 7vw, 36px);
            height: clamp(28px, 7vw, 36px);
            border-radius: 50%;
            background: var(--primary-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(0.8rem, 2vw, 1rem);
            flex-shrink: 0;
            aspect-ratio: 1;
        }

        /* ============ البحث عن مريض ============ */
        .search-box { 
            position: relative; 
        }
        
        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            margin-top: 4px;
            max-height: clamp(150px, 40vh, 200px);
            overflow-y: auto;
            display: none;
            z-index: 20;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            -webkit-overflow-scrolling: touch;
        }
        
        .search-item {
            padding: clamp(8px, 2vw, 10px) clamp(10px, 2.5vw, 14px);
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            font-size: clamp(0.78rem, 2vw, 0.85rem);
            transition: background 0.15s ease;
            min-height: clamp(36px, 8vw, 44px);
            display: flex;
            align-items: center;
        }
        
        .search-item:active { 
            background: var(--primary-light); 
        }
        
        .search-item:last-child { 
            border-bottom: none; 
        }

        /* ============ التوست ============ */
        .toast-container {
            position: fixed;
            bottom: max(16px, 3vw);
            left: 50%;
            transform: translateX(-50%);
            z-index: 4000;
            display: flex;
            flex-direction: column;
            gap: clamp(4px, 1vw, 6px);
            pointer-events: none;
            padding-bottom: var(--safe-bottom);
            max-width: 90vw;
        }
        
        .toast {
            background: #1A3C4A;
            color: white;
            padding: clamp(8px, 2vw, 12px) clamp(14px, 3vw, 22px);
            border-radius: var(--radius-xl);
            font-weight: 700;
            font-size: clamp(0.78rem, 2vw, 0.85rem);
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            animation: toastIn 0.3s ease, toastOut 0.3s ease 2.2s forwards;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: clamp(6px, 1.5vw, 8px);
        }
        
        .toast.err { 
            background: #C62828; 
        }
        
        .toast.removing { 
            opacity: 0; 
            transform: translateY(-10px); 
            transition: all 0.3s ease; 
        }
        
        @keyframes toastIn { 
            from { transform: translateY(16px); opacity: 0; } 
            to { transform: translateY(0); opacity: 1; } 
        }
        
        @keyframes toastOut { 
            from { transform: translateY(0); opacity: 1; } 
            to { transform: translateY(-16px); opacity: 0; } 
        }

        .keyboard-scroll-spacer {
            height: 1px;
            width: 100%;
            pointer-events: none;
            opacity: 0;
        }

        /* ============ ميديا كويريز ============ */
        
        /* تابلت - شاشات متوسطة */
        @media (min-width: 769px) and (max-width: 1024px) {
            html { font-size: clamp(13px, 1.8vw, 15px); }
            .app-header { padding: 8px 14px; }
            table { min-width: 400px; }
        }

        /* موبايل - شاشات صغيرة */
        @media (max-width: 768px) {
            html { font-size: clamp(13px, 3.5vw, 14px); }
            
            body { 
                padding: 4px; 
                padding-bottom: calc(4px + var(--safe-bottom) + 55vh); 
            }
            
            .app-header { 
                padding: 6px 10px; 
                top: 3px; 
                border-radius: var(--radius-md); 
                gap: 6px;
            }
            
            .logo h2 { font-size: clamp(1rem, 4vw, 1.2rem); }
            
            .header-actions { gap: 4px; }
            
            .btn { 
                padding: 5px 8px; 
                font-size: 0.72rem; 
                gap: 3px; 
                min-height: clamp(28px, 7vw, 32px); 
            }
            
            .btn-sm { 
                padding: 4px 7px; 
                font-size: 0.68rem; 
            }
            
            .doctor-pill { 
                padding: 6px 10px; 
                font-size: 0.75rem; 
                min-height: clamp(32px, 8vw, 38px); 
            }
            
            .status-tab { 
                padding: 6px 8px; 
                font-size: 0.72rem; 
                min-width: 50px;
            }
            
            .status-tab .badge { 
                font-size: 0.65rem; 
                padding: 1px 6px; 
            }
            
            table { 
                min-width: 280px; 
                font-size: 0.75rem; 
            }
            
            th, td { 
                padding: 6px 4px; 
            }
            
            thead th { 
                font-size: 0.68rem; 
            }
            
            .status-badge { 
                padding: 2px 6px; 
                font-size: 0.65rem; 
            }
            
            .action-btn { 
                padding: 4px 8px; 
                font-size: 0.68rem; 
            }
            
            .modal-card { 
                max-width: 100%; 
                border-radius: var(--radius-md); 
                max-height: 90vh;
                max-height: 90dvh;
            }
            
            .modal-body { 
                padding: 12px; 
                padding-bottom: 55vh; 
            }
            
            .hide-mobile { display: none; }
            
            #welcomeMsg { max-width: 80px; }
        }

        /* موبايل صغير جداً */
        @media (max-width: 400px) {
            html { font-size: clamp(12px, 4vw, 13px); }
            
            body { 
                padding: 2px; 
                padding-bottom: calc(2px + var(--safe-bottom) + 65vh); 
            }
            
            .status-tabs { 
                flex-direction: column; 
                gap: 2px; 
            }
            
            .status-tab { 
                justify-content: space-between; 
                text-align: right;
            }
            
            .modal-body { 
                padding-bottom: 65vh; 
            }
        }

        /* شاشات كبيرة */
        @media (min-width: 1400px) {
            html { font-size: clamp(15px, 1.2vw, 17px); }
            .container { max-width: 1300px; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.001ms !important;
                transition-duration: 0.001ms !important;
            }
        }
    </style>
</head>
<body>

    <div class="toast-container" id="toastContainer"></div>

    <div class="container" id="mainContainer">
        <header class="app-header">
            <div class="logo">
                <h2><i class="fas fa-heartbeat"></i> شفاء · الصيدلي <span class="sync-dot on" id="syncDot" title="حالة المزامنة"></span></h2>
            </div>
            <div class="header-actions">
                <span class="tenant-badge" id="tenantBadge">
                    <i class="fas fa-hospital"></i> <span id="tenantName">المجمع الطبي</span>
                </span>
                <span id="welcomeMsg">مرحباً</span>
                <button class="btn btn-outline btn-sm" id="searchPatientBtn">
                    <i class="fas fa-search"></i> <span class="hide-mobile">بحث</span>
                </button>
                <button class="btn btn-outline btn-sm" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i> <span class="hide-mobile">خروج</span>
                </button>
            </div>
        </header>

        <div class="doctors-strip" id="doctorsStrip">
            <div class="strip-scroll" id="doctorStripContainer">
                <div style="padding:10px;color:var(--text-sec);text-align:center;width:100%;">
                    <i class="fas fa-spinner fa-spin"></i> جاري تحميل الأطباء...
                </div>
            </div>
        </div>

        <div class="status-tabs">
            <button class="status-tab active" data-tab="لم تصرف بعد">
                <i class="fas fa-clock"></i> جديدة
                <span class="badge" id="countPending">0</span>
            </button>
            <button class="status-tab" data-tab="تم الصرف">
                <i class="fas fa-check-circle"></i> مصروفة
                <span class="badge" id="countDispensed">0</span>
            </button>
        </div>

        <div class="table-container">
            <div class="table-scroll">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>المريض</th>
                            <th>الطبيب</th>
                            <th>الأصناف</th>
                            <th>الحالة</th>
                            <th>تفاصيل</th>
                        </tr>
                    </thead>
                    <tbody id="prescriptionsBody">
                        <tr class="empty-row">
                            <td colspan="6">
                                <i class="fas fa-hand-point-up"></i> 
                                اختر طبيباً من القائمة أعلاه
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="keyboard-scroll-spacer"></div>
    </div>

    <!-- مودال تفاصيل الوصفة والصرف -->
    <div id="dispenseModal" class="modal">
        <div class="modal-card">
            <div class="modal-header">
                <h3><i class="fas fa-prescription"></i> صرف الوصفة</h3>
                <button class="close-btn" id="closeDispenseBtn">&times;</button>
            </div>
            <div class="modal-body">
                <div id="dispensePatientInfo" style="margin-bottom:12px;"></div>
                <div id="dispenseItemsList" style="margin-bottom:14px;"></div>
                <div class="form-group">
                    <label>حالة الصرف</label>
                    <select id="dispenseStatus" class="form-control">
                        <option value="تم الصرف">✅ تم الصرف كاملاً</option>
                        <option value="صرفت جزئياً">📦 صرفت جزئياً</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>ملاحظات الصيدلي</label>
                    <textarea id="dispenseNotes" class="form-control" rows="2" placeholder="ملاحظات إضافية..."></textarea>
                </div>
                <button class="btn btn-primary" id="confirmDispenseBtn" style="width:100%;">
                    <i class="fas fa-check"></i> تأكيد الصرف
                </button>
            </div>
        </div>
    </div>

    <!-- مودال البحث عن مريض -->
    <div id="searchModal" class="modal">
        <div class="modal-card">
            <div class="modal-header">
                <h3><i class="fas fa-search"></i> بحث عن مريض</h3>
                <button class="close-btn" id="closeSearchBtn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="search-box">
                    <input type="text" id="patientSearchInput" class="form-control" placeholder="اسم المريض أو رقم الهاتف..." autocomplete="off">
                    <div id="searchResults" class="search-results"></div>
                </div>
                <div id="patientHistoryContainer" style="margin-top:14px;"></div>
                <div class="keyboard-scroll-spacer"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { firebaseConfig } from './firebase-config.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, onValue, get, update, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // ============ تهيئة Firebase ============
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // ============ ثوابت التخزين المحلي ============
        const STORAGE_PREFIX = 'shifa_tenant_';
        
        const LOGIN_STORAGE_KEYS = [
            'shifa_session',
            'shifa_remember',
            'shifa_last_login',
            'shifa_secure_session'
        ];
        
        let currentTenantId = null;
        
        const getTenantStorageKey = (baseKey) => {
            return currentTenantId ? `${STORAGE_PREFIX}${currentTenantId}_${baseKey}` : baseKey;
        };

        // ============ حالة التطبيق ============
        const state = {
            currentUser: null,
            pharmacistData: null,
            doctorsList: [],
            selectedDoctorId: null,
            allPrescriptions: [],
            currentTab: 'لم تصرف بعد',
            patientsMap: {},
            unsubscribePrescriptions: null,
        };

        // ============ دوال مساعدة ============
        const $ = (sel) => document.querySelector(sel);
        const $$ = (sel) => document.querySelectorAll(sel);

        const getToday = () => {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        };

        const escapeHtml = (str) => {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        };

        const showToast = (msg, isError = false) => {
            const container = $('#toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${isError ? 'err' : ''}`;
            toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i> ${msg}`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('removing');
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        };

        const setSyncStatus = (online) => {
            const dot = $('#syncDot');
            if (dot) {
                dot.className = `sync-dot ${online ? 'on' : 'off'}`;
                dot.title = online ? 'متصل بالسحابة' : 'غير متصل - استخدام البيانات المحلية';
            }
        };

        // ============ مسح بيانات الجلسة فقط ============
        const clearLoginSessionOnly = () => {
            try {
                LOGIN_STORAGE_KEYS.forEach(key => {
                    localStorage.removeItem(key);
                });
                
                const sessionKeysToRemove = [];
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (key && (key.startsWith('shifa_session') || key.startsWith('shifa_secure'))) {
                        sessionKeysToRemove.push(key);
                    }
                }
                sessionKeysToRemove.forEach(key => localStorage.removeItem(key));
                
                sessionStorage.clear();
            } catch (e) {
                console.warn('تعذر مسح بيانات الجلسة:', e.message);
            }
        };

        // ============ تحميل بيانات الصيدلي من مسار المجمعات ============
        const loadPharmacistData = async (uid) => {
            try {
                const tenantsSnap = await get(ref(db, 'tenants'));
                
                if (tenantsSnap.exists()) {
                    const tenants = tenantsSnap.val();
                    
                    for (const tenantId of Object.keys(tenants)) {
                        const userSnap = await get(ref(db, `tenants/${tenantId}/users/${uid}`));
                        
                        if (userSnap.exists()) {
                            const userData = userSnap.val();
                            
                            if (userData.role === 'pharmacist') {
                                currentTenantId = tenantId;
                                state.pharmacistData = { id: uid, ...userData };
                                
                                const tenantName = tenants[tenantId]?.name || tenants[tenantId]?.tenantName || 'المجمع الطبي';
                                state.pharmacistData.tenantName = tenantName;
                                
                                $('#welcomeMsg').textContent = `أهلاً، ${state.pharmacistData.name || 'صيدلي'}`;
                                $('#tenantName').textContent = tenantName;
                                
                                return true;
                            }
                        }
                    }
                }
                
                // المسار القديم للتوافق
                const oldSnap = await get(ref(db, `users/${uid}`));
                if (oldSnap.exists() && oldSnap.val().role === 'pharmacist') {
                    currentTenantId = uid;
                    state.pharmacistData = { id: uid, ...oldSnap.val() };
                    $('#welcomeMsg').textContent = `أهلاً، ${state.pharmacistData.name || 'صيدلي'}`;
                    return true;
                }
                
                showToast('هذا الحساب ليس حساب صيدلي', true);
                return false;
                
            } catch (err) {
                console.error('خطأ في تحميل بيانات الصيدلي:', err);
                showToast('خطأ في تحميل البيانات', true);
                return false;
            }
        };

        // ============ تحميل الأطباء من مسار المجمع ============
        const loadDoctors = () => {
            if (!currentTenantId) return;
            
            const usersRef = ref(db, `tenants/${currentTenantId}/users`);
            
            onValue(usersRef, (snap) => {
                const doctors = [];
                snap.forEach(child => {
                    const user = child.val();
                    if (user.role === 'doctor') {
                        doctors.push({ id: child.key, ...user });
                    }
                });
                state.doctorsList = doctors;
                
                if (state.selectedDoctorId && !doctors.find(d => d.id === state.selectedDoctorId)) {
                    state.selectedDoctorId = null;
                    localStorage.removeItem(getTenantStorageKey('selected_doctor'));
                }
                
                renderDoctorsStrip();
                updateCounts();
                renderTable();
            }, (error) => {
                console.warn('خطأ في تحميل الأطباء:', error.message);
                setSyncStatus(false);
            });
        };

        // ============ تحميل الوصفات من مسار المجمع ============
        const loadPrescriptions = () => {
            if (!currentTenantId) return;
            
            if (state.unsubscribePrescriptions) {
                state.unsubscribePrescriptions();
            }
            
            const presRef = ref(db, `tenants/${currentTenantId}/prescriptions`);
            
            state.unsubscribePrescriptions = onValue(presRef, (snap) => {
                const prescriptions = [];
                snap.forEach(child => {
                    prescriptions.push({ id: child.key, ...child.val() });
                });
                
                state.allPrescriptions = prescriptions;
                
                setSyncStatus(true);
                updateCounts();
                renderTable();
                renderDoctorsStrip();
            }, (error) => {
                console.warn('خطأ في تحميل الوصفات:', error.message);
                setSyncStatus(false);
            });
        };

        // ============ عرض شريط الأطباء ============
        const renderDoctorsStrip = () => {
            const container = $('#doctorStripContainer');
            
            if (state.doctorsList.length === 0) {
                container.innerHTML = '<div style="padding:10px;color:var(--text-sec);text-align:center;width:100%;">لا يوجد أطباء مسجلين</div>';
                return;
            }
            
            container.innerHTML = state.doctorsList.map(doc => {
                const pendingCount = state.allPrescriptions.filter(
                    p => p.doctor_id === doc.id && p.status === 'لم تصرف بعد'
                ).length;
                
                return `
                    <div class="doctor-pill ${state.selectedDoctorId === doc.id ? 'active' : ''}" data-id="${doc.id}">
                        <div class="pill-avatar"><i class="fas fa-user-md"></i></div>
                        <span>د. ${escapeHtml(doc.name || '---')}</span>
                        ${pendingCount > 0 ? `<span class="pill-badge">${pendingCount}</span>` : ''}
                    </div>
                `;
            }).join('');
            
            container.querySelectorAll('.doctor-pill').forEach(pill => {
                pill.addEventListener('click', () => {
                    state.selectedDoctorId = pill.dataset.id;
                    localStorage.setItem(getTenantStorageKey('selected_doctor'), state.selectedDoctorId);
                    renderDoctorsStrip();
                    updateCounts();
                    renderTable();
                    
                    pill.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                });
            });
        };

        // ============ تحديث العدادات ============
        const updateCounts = () => {
            let pendingCount = 0;
            let dispensedCount = 0;
            
            const filtered = state.selectedDoctorId 
                ? state.allPrescriptions.filter(p => p.doctor_id === state.selectedDoctorId)
                : state.allPrescriptions;
            
            filtered.forEach(p => {
                if (p.status === 'لم تصرف بعد') pendingCount++;
                else if (p.status === 'تم الصرف' || p.status === 'صرفت جزئياً') {
                    if (p.dispensed_at && p.dispensed_at.startsWith(getToday())) {
                        dispensedCount++;
                    }
                }
            });
            
            $('#countPending').textContent = pendingCount;
            $('#countDispensed').textContent = dispensedCount;
        };

        // ============ ✅ عرض الجدول (بدون أعمدة الأدوية والتشخيص والتاريخ) ============
        const renderTable = () => {
            const tbody = $('#prescriptionsBody');
            
            if (!state.selectedDoctorId) {
                tbody.innerHTML = `
                    <tr class="empty-row">
                        <td colspan="6">
                            <i class="fas fa-hand-point-up"></i> 
                            اختر طبيباً من القائمة أعلاه
                        </td>
                    </tr>`;
                return;
            }
            
            let filtered = state.allPrescriptions.filter(
                p => p.doctor_id === state.selectedDoctorId
            );
            
            if (state.currentTab === 'لم تصرف بعد') {
                filtered = filtered.filter(p => p.status === 'لم تصرف بعد');
            } else {
                filtered = filtered.filter(
                    p => (p.status === 'تم الصرف' || p.status === 'صرفت جزئياً') &&
                    p.dispensed_at && p.dispensed_at.startsWith(getToday())
                );
            }
            
            filtered.sort((a, b) => (b.created_at || '').localeCompare(a.created_at || ''));
            
            if (filtered.length === 0) {
                const msg = state.currentTab === 'لم تصرف بعد' ? 'لا توجد وصفات جديدة' : 'لا توجد وصفات مصروفة اليوم';
                tbody.innerHTML = `
                    <tr class="empty-row">
                        <td colspan="6">
                            <i class="fas fa-prescription"></i> ${msg}
                        </td>
                    </tr>`;
                return;
            }
            
            tbody.innerHTML = filtered.map((p, i) => {
                const doctor = state.doctorsList.find(d => d.id === p.doctor_id);
                const doctorName = doctor ? doctor.name : 'طبيب';
                const patientName = p.patient_name || 'مريض';
                const itemCount = p.item_count || 0;
                
                const statusClass = p.status === 'تم الصرف' ? 's-dispensed' : 
                                   p.status === 'صرفت جزئياً' ? 's-partial' : 's-pending';
                const statusText = p.status === 'تم الصرف' ? '✅ تم الصرف' :
                                  p.status === 'صرفت جزئياً' ? '📦 جزئي' : '⏳ جديد';
                
                return `
                    <tr data-id="${p.id}" style="cursor:pointer;">
                        <td>${i + 1}</td>
                        <td><b>${escapeHtml(patientName)}</b></td>
                        <td>د. ${escapeHtml(doctorName)}</td>
                        <td>${itemCount} أصناف</td>
                        <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                        <td>
                            <button class="action-btn" data-action="details" data-id="${p.id}">
                                <i class="fas fa-external-link-alt"></i> تفاصيل
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        };

        // ============ فتح صفحة التفاصيل ============
        const openPrescriptionDetails = (prescriptionId) => {
            if (!prescriptionId) return;
            const url = `prescription-details.html?id=${prescriptionId}&tenant=${currentTenantId || ''}`;
            window.location.href = url;
        };

        // ============ فتح مودال الصرف (للوصفات الجديدة) ============
        const openDispenseModal = async (prescriptionId) => {
            const prescription = state.allPrescriptions.find(p => p.id === prescriptionId);
            if (!prescription) return;
            
            // لو الوصفة متصرفة، روح لصفحة التفاصيل
            if (prescription.status !== 'لم تصرف بعد') {
                openPrescriptionDetails(prescriptionId);
                return;
            }
            
            let items = [];
            try {
                const itemsSnap = await get(ref(db, `tenants/${currentTenantId}/prescription_items/${prescriptionId}`));
                if (itemsSnap.exists()) {
                    items = Object.values(itemsSnap.val());
                }
            } catch (e) {
                console.warn('تعذر تحميل عناصر الوصفة:', e.message);
            }
            
            const doctor = state.doctorsList.find(d => d.id === prescription.doctor_id);
            const doctorName = doctor ? doctor.name : 'طبيب';
            
            $('#dispensePatientInfo').innerHTML = `
                <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
                    <div style="width:44px;height:44px;background:var(--primary-light);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;color:var(--primary-dark);">
                        <i class="fas fa-user"></i>
                    </div>
                    <div>
                        <b>${escapeHtml(prescription.patient_name || 'مريض')}</b>
                        <div style="font-size:0.78rem;color:var(--text-sec);">د. ${escapeHtml(doctorName)}</div>
                    </div>
                </div>
            `;
            
            if (items.length === 0) {
                $('#dispenseItemsList').innerHTML = '<div style="color:var(--text-sec);">لا توجد عناصر في الوصفة</div>';
            } else {
                const formLabels = { 'tablet': '💊 أقراص', 'syrup': '🥄 شراب', 'injection': '💉 حقن', 'suppository': '🧴 لبوس', 'drops': '💧 نقط' };
                $('#dispenseItemsList').innerHTML = items.map((item, i) => `
                    <div class="rx-detail-item">
                        <div class="drug-icon">${formLabels[item.form]?.split(' ')[0] || '💊'}</div>
                        <div style="flex:1;">
                            <b>${escapeHtml(item.drug_name || item.drug_id || 'دواء')}</b>
                            <div style="font-size:0.75rem;color:var(--text-sec);">${escapeHtml(item.dose || '')}</div>
                        </div>
                    </div>
                `).join('');
            }
            
            $('#dispenseModal').dataset.prescriptionId = prescriptionId;
            $('#dispenseStatus').value = 'تم الصرف';
            $('#dispenseNotes').value = '';
            
            $('#dispenseModal').style.display = 'flex';
        };

        // ============ تأكيد الصرف ============
        const confirmDispense = async () => {
            const prescriptionId = $('#dispenseModal').dataset.prescriptionId;
            if (!prescriptionId) return;
            
            const status = $('#dispenseStatus').value;
            const notes = $('#dispenseNotes').value.trim();
            const now = new Date().toISOString();
            
            try {
                const updates = {};
                updates[`tenants/${currentTenantId}/prescriptions/${prescriptionId}/status`] = status;
                updates[`tenants/${currentTenantId}/prescriptions/${prescriptionId}/dispensed_at`] = now;
                updates[`tenants/${currentTenantId}/prescriptions/${prescriptionId}/pharmacist_id`] = state.currentUser.uid;
                updates[`tenants/${currentTenantId}/prescriptions/${prescriptionId}/pharmacist_name`] = state.pharmacistData.name || 'صيدلي';
                if (notes) {
                    updates[`tenants/${currentTenantId}/prescriptions/${prescriptionId}/pharmacist_notes`] = notes;
                }
                
                await update(ref(db), updates);
                
                $('#dispenseModal').style.display = 'none';
                showToast('✅ تم صرف الوصفة بنجاح');
            } catch (err) {
                console.error('خطأ في صرف الوصفة:', err);
                showToast('❌ خطأ في صرف الوصفة', true);
            }
        };

        // ============ البحث عن مريض ============
        let searchTimer;
        const searchPatients = async (term) => {
            if (!term || term.length < 2) {
                $('#searchResults').style.display = 'none';
                return;
            }
            
            const termLower = term.toLowerCase();
            let results = [];
            
            try {
                const prescriptionsSnap = await get(ref(db, `tenants/${currentTenantId}/prescriptions`));
                const seen = new Set();
                
                if (prescriptionsSnap.exists()) {
                    prescriptionsSnap.forEach(child => {
                        const p = child.val();
                        const patientId = p.patient_id;
                        const patientName = (p.patient_name || '').toLowerCase();
                        
                        if (!seen.has(patientId) && 
                            (patientName.includes(termLower) || 
                             (p.phone && p.phone.includes(term)))) {
                            seen.add(patientId);
                            results.push({
                                id: patientId,
                                name: p.patient_name || 'مريض',
                                phone: p.phone || '',
                            });
                        }
                    });
                }
            } catch (e) {
                console.warn('خطأ في البحث:', e.message);
            }
            
            const container = $('#searchResults');
            
            if (results.length === 0) {
                container.innerHTML = '<div class="search-item" style="color:var(--text-sec);">لا توجد نتائج</div>';
            } else {
                container.innerHTML = results.slice(0, 10).map(p => `
                    <div class="search-item" data-id="${p.id}">
                        <b>${escapeHtml(p.name)}</b>
                        <small style="color:var(--text-sec);margin-right:auto;">${escapeHtml(p.phone)}</small>
                    </div>
                `).join('');
            }
            
            container.style.display = 'block';
        };

        // ============ تسجيل الخروج ============
        const logout = async () => {
            try {
                showToast('👋 جاري تسجيل الخروج...');
                
                if (state.unsubscribePrescriptions) {
                    state.unsubscribePrescriptions();
                    state.unsubscribePrescriptions = null;
                }
                
                clearLoginSessionOnly();
                
                state.currentUser = null;
                state.pharmacistData = null;
                state.doctorsList = [];
                state.allPrescriptions = [];
                
                await signOut(auth);
                
                window.location.href = 'index.html';
                
            } catch (error) {
                console.error('خطأ أثناء تسجيل الخروج:', error);
                clearLoginSessionOnly();
                window.location.href = 'index.html';
            }
        };

        // ============ ربط الأحداث ============
        const initEvents = () => {
            // تبويبات الحالة
            $$('.status-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    $$('.status-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    state.currentTab = tab.dataset.tab;
                    updateCounts();
                    renderTable();
                });
            });
            
            // أحداث الجدول - الضغط على الصف يفتح التفاصيل
            $('#prescriptionsBody').addEventListener('click', (e) => {
                const row = e.target.closest('tr[data-id]');
                if (!row) return;
                
                const id = row.dataset.id;
                const prescription = state.allPrescriptions.find(p => p.id === id);
                
                // لو الوصفة جديدة، افتح مودال الصرف
                if (prescription && prescription.status === 'لم تصرف بعد') {
                    openDispenseModal(id);
                } else {
                    // لو متصرفة، روح لصفحة التفاصيل
                    openPrescriptionDetails(id);
                }
            });
            
            // مودال الصرف
            $('#confirmDispenseBtn').addEventListener('click', confirmDispense);
            $('#closeDispenseBtn').addEventListener('click', () => $('#dispenseModal').style.display = 'none');
            
            // مودال البحث
            $('#searchPatientBtn').addEventListener('click', () => {
                $('#searchModal').style.display = 'flex';
                $('#patientSearchInput').value = '';
                $('#searchResults').style.display = 'none';
            });
            
            $('#closeSearchBtn').addEventListener('click', () => $('#searchModal').style.display = 'none');
            
            $('#patientSearchInput').addEventListener('input', () => {
                clearTimeout(searchTimer);
                searchTimer = setTimeout(() => {
                    searchPatients($('#patientSearchInput').value.trim());
                }, 300);
            });
            
            // تسجيل الخروج
            $('#logoutBtn').addEventListener('click', logout);
            
            // إغلاق المودالات
            window.addEventListener('click', (e) => {
                if (e.target === $('#dispenseModal')) $('#dispenseModal').style.display = 'none';
                if (e.target === $('#searchModal')) $('#searchModal').style.display = 'none';
            });
            
            document.addEventListener('click', (e) => {
                if (!$('#patientSearchInput').contains(e.target) && !$('#searchResults').contains(e.target)) {
                    $('#searchResults').style.display = 'none';
                }
            });
            
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    if ($('#dispenseModal').style.display === 'flex') $('#dispenseModal').style.display = 'none';
                    if ($('#searchModal').style.display === 'flex') $('#searchModal').style.display = 'none';
                }
            });
            
            // مستمعي الاتصال
            window.addEventListener('online', () => {
                setSyncStatus(true);
                showToast('📡 تم استعادة الاتصال');
            });
            
            window.addEventListener('offline', () => {
                setSyncStatus(false);
                showToast('⚠️ انقطع الاتصال', true);
            });
            
            window.addEventListener('beforeunload', () => {
                if (state.unsubscribePrescriptions) {
                    state.unsubscribePrescriptions();
                }
            });
        };

        // ============ بدء التشغيل ============
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                clearLoginSessionOnly();
                window.location.href = 'index.html';
                return;
            }
            
            // ✅ 1. نجيب tenantId من الرابط
            const urlParams = new URLSearchParams(window.location.search);
            const tenantFromUrl = urlParams.get('tenant');
            
            if (tenantFromUrl) {
                currentTenantId = tenantFromUrl;
            } else {
                // ✅ 2. من الجلسة المشفرة
                try {
                    const encrypted = localStorage.getItem('shifa_secure_session');
                    if (encrypted) {
                        const decoded = atob(encrypted);
                        const match = decoded.match(/"tenantId":"([^"]+)"/);
                        if (match) {
                            currentTenantId = match[1];
                        }
                    }
                } catch (e) {}
                
                // ✅ 3. من الجلسة القديمة
                if (!currentTenantId) {
                    const oldSession = localStorage.getItem('shifa_session');
                    if (oldSession) {
                        try {
                            const parsed = JSON.parse(oldSession);
                            currentTenantId = parsed.tenantId || user.uid;
                        } catch (e) {
                            currentTenantId = user.uid;
                        }
                    } else {
                        currentTenantId = user.uid;
                    }
                }
            }
            
            sessionStorage.setItem('userUid', user.uid);
            sessionStorage.setItem('userRole', 'pharmacist');
            
            if (!state.currentUser) {
                state.currentUser = { uid: user.uid };
                
                const success = await loadPharmacistData(user.uid);
                if (!success) {
                    showToast('⚠️ تعذر تحميل بيانات الصيدلي', true);
                    return;
                }
                
                const savedDoctor = localStorage.getItem(getTenantStorageKey('selected_doctor'));
                if (savedDoctor) {
                    state.selectedDoctorId = savedDoctor;
                }
                
                initEvents();
                loadDoctors();
                loadPrescriptions();
            }
        });
    </script>
</body>
</html>
