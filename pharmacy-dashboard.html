<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#00AEEF">
    <title>شفاء · لوحة الصيدلي</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'">
    
    <style>
        :root {
            --primary: #00AEEF;
            --primary-light: #E0F7FA;
            --primary-dark: #008080;
            --bg: #FAFAFA;
            --white: #FFFFFF;
            --ink: #1A3C4A;
            --text-sec: #5A7D8A;
            --danger: #E57373;
            --success: #26A69A;
            --warning: #FFB74D;
            --border: #E0E0E0;
            --shadow-xs: 0 1px 4px rgba(0,0,0,0.03);
            --shadow-sm: 0 4px 12px rgba(0,0,0,0.05);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.08);
            --shadow-lg: 0 12px 32px rgba(0,0,0,0.1);
            --radius-xs: 8px;
            --radius-sm: 14px;
            --radius-md: 20px;
            --radius-lg: 28px;
            --radius-xl: 50px;
            --safe-bottom: env(safe-area-inset-bottom, 16px);
            --safe-top: env(safe-area-inset-top, 0px);
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        input, textarea, select { 
            -webkit-user-select: text; 
            user-select: text; 
        }

        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            -webkit-text-size-adjust: 100%;
            text-rendering: optimizeLegibility;
        }

        body {
            font-family: 'Cairo', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            min-height: 100dvh;
            padding: 12px;
            padding-bottom: calc(12px + var(--safe-bottom));
            padding-top: calc(12px + var(--safe-top) + 70px); /* ✅ إضافة مساحة للشريط العلوي */
            overflow-x: hidden;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            -webkit-overflow-scrolling: touch;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 15% 25%, rgba(0,174,239,0.04) 0%, transparent 50%),
                        radial-gradient(ellipse at 85% 75%, rgba(0,128,128,0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .container { 
            max-width: 1400px; 
            margin: 0 auto; 
        }

        /* ============ ✅ شريط التنقل العلوي ============ */
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border-bottom: 1px solid var(--border);
            box-shadow: 0 2px 16px rgba(0,0,0,0.06);
            padding: 6px 12px;
            padding-top: calc(6px + var(--safe-top));
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            flex-wrap: nowrap;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .top-nav::-webkit-scrollbar {
            display: none;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            border: none;
            background: transparent;
            color: var(--text-sec);
            font-family: 'Cairo', system-ui, sans-serif;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
            min-width: 56px;
            min-height: 56px;
            touch-action: manipulation;
            transition: all 0.2s ease;
            text-decoration: none;
            position: relative;
        }

        .nav-item i {
            font-size: 1.25rem;
            transition: transform 0.2s ease;
        }

        .nav-item span {
            line-height: 1.2;
        }

        .nav-item:active {
            transform: scale(0.92);
            background: rgba(0,174,239,0.08);
        }

        .nav-item.active {
            color: var(--primary);
            background: var(--primary-light);
            font-weight: 700;
        }

        .nav-item.active::after {
            content: '';
            position: absolute;
            bottom: 2px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 3px;
            background: var(--primary);
            border-radius: 3px;
        }

        .nav-item.home-nav {
            color: var(--primary-dark);
        }

        .nav-item.home-nav i {
            color: var(--primary);
        }

        .nav-item.ad-nav i {
            color: #FF6F00;
        }

        .nav-item.consult-nav i {
            color: #7B1FA2;
        }

        .nav-item.missing-nav i {
            color: #C62828;
        }

        .nav-item.interaction-nav i {
            color: #00695C;
        }

        /* ============ شاشة التحميل ============ */
        #appLoader {
            position: fixed;
            inset: 0;
            background: rgba(250,250,250,0.95);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            flex-direction: column;
            gap: 16px;
        }
        
        .loader-circle {
            width: 44px;
            height: 44px;
            border: 3px solid var(--primary-light);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        
        @keyframes spin { 
            to { transform: rotate(360deg); } 
        }
        
        .loader-text {
            font-size: 1rem;
            font-weight: 600;
            color: var(--primary-dark);
        }

        /* ============ الهيدر ============ */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border-radius: var(--radius-lg);
            padding: 10px 18px;
            margin-bottom: 14px;
            border: 1px solid rgba(255,255,255,0.9);
            box-shadow: var(--shadow-sm);
            flex-wrap: wrap;
            gap: 10px;
            position: sticky;
            top: 74px; /* ✅ تعديل ليكون أسفل الشريط العلوي */
            z-index: 99;
        }

        .logo { 
            display: flex; 
            align-items: center; 
            gap: 6px; 
            flex-shrink: 0; 
        }
        
        .logo h2 {
            font-size: 1.4rem;
            font-weight: 900;
            background: linear-gradient(135deg, #008080, #00AEEF);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            white-space: nowrap;
        }
        
        .logo i { 
            color: var(--primary); 
            font-size: 1.1rem; 
        }

        .header-actions {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .tenant-badge {
            background: var(--primary-light);
            padding: 4px 10px;
            border-radius: var(--radius-xl);
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--primary-dark);
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
        }

        #welcomeMsg {
            font-weight: 600;
            font-size: 0.88rem;
            color: var(--text-sec);
            white-space: nowrap;
        }

        .btn {
            padding: 10px 18px;
            border-radius: var(--radius-xl);
            border: none;
            font-weight: 700;
            font-family: 'Cairo', system-ui, sans-serif;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 0.85rem;
            white-space: nowrap;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
            transition: all 0.15s ease;
            min-height: 44px;
            min-width: 44px;
            text-decoration: none;
        }
        
        .btn:active { 
            transform: scale(0.96); 
            opacity: 0.85; 
        }
        
        .btn-primary { 
            background: linear-gradient(135deg, var(--primary), var(--primary-dark)); 
            color: white; 
            box-shadow: 0 4px 12px rgba(0,174,239,0.25); 
        }
        
        .btn-outline { 
            background: rgba(255,255,255,0.9); 
            color: var(--ink); 
            border: 2px solid var(--border); 
        }
        
        .btn-sm { 
            padding: 8px 14px; 
            font-size: 0.8rem; 
            min-height: 38px;
            border-radius: var(--radius-sm); 
        }

        /* ✅ زر الطباعة */
        .btn-print {
            background: linear-gradient(135deg, #607D8B, #455A64);
            color: white;
            box-shadow: 0 3px 10px rgba(69,90,100,0.25);
        }
        
        .btn-print:hover {
            background: linear-gradient(135deg, #546E7A, #37474F);
        }
        
        .btn-print:active {
            transform: scale(0.96);
        }

        /* ✅ زر عرض الأدوية */
        .btn-view-meds {
            background: linear-gradient(135deg, #7E57C2, #5E35B1);
            color: white;
            box-shadow: 0 3px 10px rgba(94,53,177,0.25);
        }
        
        .btn-view-meds:hover {
            background: linear-gradient(135deg, #6A4BAA, #4527A0);
        }

        .sync-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-left: 4px;
            vertical-align: middle;
        }
        .sync-dot.on { background: var(--success); }
        .sync-dot.off { background: #FFB74D; animation: pulse 1.5s infinite; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ============ شريط الأطباء ============ */
        .doctors-strip {
            background: var(--white);
            border-radius: var(--radius-xl);
            padding: 6px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            margin-bottom: 14px;
            overflow: hidden;
        }
        
        .doctors-strip .strip-scroll {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
            scroll-snap-type: x proximity;
            padding: 4px;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        
        .doctors-strip .strip-scroll::-webkit-scrollbar { 
            display: none; 
        }

        .doctor-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: var(--white);
            border-radius: var(--radius-xl);
            border: 2px solid var(--border);
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
            scroll-snap-align: start;
            transition: all 0.2s ease;
            font-weight: 600;
            font-size: 0.88rem;
            touch-action: manipulation;
            min-height: 44px;
        }
        
        .doctor-pill:active { 
            transform: scale(0.95); 
        }
        
        .doctor-pill.active {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border-color: var(--primary);
            box-shadow: 0 4px 14px rgba(0,174,239,0.3);
            font-weight: 700;
        }
        
        .doctor-pill .pill-avatar {
            width: 30px;
            height: 30px;
            min-width: 30px;
            background: var(--primary-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            color: var(--primary-dark);
            font-weight: 700;
        }
        
        .doctor-pill.active .pill-avatar {
            background: rgba(255,255,255,0.3);
            color: white;
        }
        
        .doctor-pill .pill-badge {
            background: var(--danger);
            color: white;
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 0.72rem;
            font-weight: 700;
        }
        
        .doctor-pill.active .pill-badge {
            background: rgba(255,255,255,0.35);
        }

        /* ============ تبويبات الحالة ============ */
        .status-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 14px;
            flex-wrap: wrap;
            background: var(--white);
            border-radius: var(--radius-xl);
            padding: 5px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }
        
        .status-tab {
            background: transparent;
            border: none;
            padding: 10px 18px;
            border-radius: var(--radius-xl);
            font-weight: 600;
            font-family: 'Cairo', system-ui, sans-serif;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: var(--text-sec);
            flex: 1;
            justify-content: center;
            min-width: 80px;
            touch-action: manipulation;
            transition: all 0.2s ease;
            min-height: 44px;
        }
        
        .status-tab .badge {
            background: rgba(0,0,0,0.05);
            border-radius: 30px;
            padding: 2px 9px;
            font-size: 0.75rem;
            font-weight: 700;
            transition: all 0.2s ease;
        }
        
        .status-tab.active {
            background: white;
            color: var(--primary);
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .status-tab.active .badge {
            background: var(--primary-light);
            color: var(--primary);
        }
        
        .status-tab:active:not(.active) {
            background: rgba(255,255,255,0.6);
            transform: scale(0.96);
        }

        /* ============ شبكة البطاقات ============ */
        .rx-cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 16px;
        }

        .rx-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            transition: all 0.25s ease;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            animation: cardIn 0.3s ease forwards;
            opacity: 0;
        }
        
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .rx-card:nth-child(1) { animation-delay: 0.05s; }
        .rx-card:nth-child(2) { animation-delay: 0.1s; }
        .rx-card:nth-child(3) { animation-delay: 0.15s; }
        .rx-card:nth-child(4) { animation-delay: 0.2s; }
        .rx-card:nth-child(5) { animation-delay: 0.25s; }
        .rx-card:nth-child(6) { animation-delay: 0.3s; }
        
        .rx-card:hover {
            box-shadow: var(--shadow-md);
            border-color: var(--primary-light);
            transform: translateY(-2px);
        }
        
        .rx-card:active {
            transform: scale(0.98);
        }
        
        .rx-card.pending-card {
            border-right: 4px solid var(--warning);
        }
        
        .rx-card.dispensed-card {
            border-right: 4px solid var(--success);
        }
        
        .rx-card.partial-card {
            border-right: 4px solid var(--primary);
        }

        /* رأس البطاقة */
        .rx-card-header {
            padding: 16px 18px;
            display: flex;
            align-items: center;
            gap: 14px;
            border-bottom: 1px solid var(--border);
            background: #FAFDFE;
        }
        
        .rx-card-avatar {
            width: 52px;
            height: 52px;
            min-width: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            font-weight: 800;
            color: white;
            flex-shrink: 0;
            aspect-ratio: 1;
        }
        
        .avatar-pending {
            background: linear-gradient(135deg, #FFB74D, #F57C00);
        }
        
        .avatar-dispensed {
            background: linear-gradient(135deg, #66BB6A, #2E7D32);
        }
        
        .avatar-partial {
            background: linear-gradient(135deg, #42A5F5, #1565C0);
        }
        
        .rx-card-patient-info {
            flex: 1;
            min-width: 0;
        }
        
        .rx-card-patient-name {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--ink);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .rx-card-doctor-name {
            font-size: 0.8rem;
            color: var(--primary);
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .rx-card-status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
            border: 2px solid white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }
        
        .dot-pending { background: var(--warning); }
        .dot-dispensed { background: var(--success); }
        .dot-partial { background: var(--primary); }

        /* جسم البطاقة */
        .rx-card-body {
            padding: 14px 18px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .rx-card-info-row {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            color: var(--ink);
        }
        
        .rx-card-info-row i {
            color: var(--primary);
            width: 22px;
            text-align: center;
            flex-shrink: 0;
            font-size: 0.9rem;
        }
        
        .rx-card-info-row span {
            font-weight: 500;
        }
        
        .rx-card-info-row strong {
            font-weight: 700;
            color: var(--ink);
            margin-left: 4px;
        }
        
        .rx-card-diagnosis {
            background: #F5FAFC;
            border-radius: var(--radius-sm);
            padding: 10px 12px;
            font-size: 0.82rem;
            color: var(--text-sec);
            border-right: 3px solid var(--primary-light);
            line-height: 1.5;
            max-height: 60px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        
        .rx-card-diagnosis i {
            color: var(--primary);
            margin-left: 4px;
        }

        /* تذييل البطاقة */
        .rx-card-footer {
            padding: 12px 18px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
            background: #FAFDFE;
        }
        
        .rx-card-date {
            font-size: 0.75rem;
            color: var(--text-sec);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .rx-card-items-count {
            background: var(--primary-light);
            padding: 4px 10px;
            border-radius: var(--radius-xl);
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--primary-dark);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .rx-card-action-btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius-xl);
            padding: 8px 16px;
            font-family: 'Cairo', system-ui, sans-serif;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: all 0.15s ease;
            touch-action: manipulation;
            white-space: nowrap;
            min-height: 40px;
        }
        
        .rx-card-action-btn:active {
            background: var(--primary-dark);
            transform: scale(0.95);
        }
        
        .rx-card-action-btn.dispensed-btn {
            background: var(--success);
        }
        
        .rx-card-action-btn.view-meds-btn {
            background: #7E57C2;
        }
        
        .rx-card-action-btn.details-btn {
            background: #5C6BC0;
        }

        /* ✅ مجموعة أزرار البطاقة */
        .rx-card-buttons-group {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        /* حالة فارغة */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--text-sec);
        }
        
        .empty-state i {
            font-size: 3.5rem;
            opacity: 0.2;
            margin-bottom: 14px;
            display: block;
        }
        
        .empty-state h3 {
            font-size: 1.15rem;
            margin-bottom: 6px;
            color: var(--ink);
        }
        
        .empty-state p {
            font-size: 0.88rem;
        }

        /* ============ المودال ============ */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(26,60,74,0.25);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 16px;
            animation: fadeIn 0.2s ease;
        }
        
        @keyframes fadeIn { 
            from { opacity: 0; } 
            to { opacity: 1; } 
        }
        
        .modal-card {
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 550px;
            max-height: 85vh;
            max-height: 85dvh;
            overflow-y: auto;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,255,0.9);
            animation: slideUp 0.25s ease;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
        }
        
        @keyframes slideUp { 
            from { transform: translateY(30px); opacity: 0; } 
            to { transform: translateY(0); opacity: 1; } 
        }
        
        .modal-header {
            padding: 16px 20px;
            background: #F5FAFC;
            border-bottom: 1px solid var(--border);
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        
        .modal-header h3 { 
            font-size: 1.1rem; 
            font-weight: 800; 
        }
        
        .close-btn {
            background: rgba(0,0,0,0.04);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 22px;
            color: var(--text-sec);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
            touch-action: manipulation;
            aspect-ratio: 1;
        }
        
        .close-btn:active { 
            background: rgba(0,0,0,0.08); 
        }
        
        .modal-body { 
            padding: 20px;
            padding-bottom: 40px;
        }

        .form-group { 
            margin-bottom: 16px; 
        }
        
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--ink);
        }
        
        .form-control {
            width: 100%;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            border: 2px solid var(--border);
            background: #F5FAFC;
            font-family: 'Cairo', system-ui, sans-serif;
            font-size: 0.88rem;
            color: var(--ink);
            -webkit-appearance: none;
            appearance: none;
            transition: all 0.15s ease;
            min-height: 48px;
        }
        
        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(0,174,239,0.1);
        }
        
        textarea.form-control {
            resize: vertical;
            min-height: 80px;
        }

        .rx-detail-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 14px;
            background: #F5FAFC;
            border-radius: var(--radius-sm);
            margin-bottom: 8px;
            border: 1px solid var(--border);
            transition: all 0.15s ease;
            min-height: 52px;
        }
        
        .rx-detail-item .drug-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
            aspect-ratio: 1;
        }

        /* ============ ✅ البحث عن مريض ============ */
        .search-box { 
            position: relative; 
        }
        
        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            margin-top: 4px;
            max-height: 200px;
            overflow-y: auto;
            display: none;
            z-index: 20;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            -webkit-overflow-scrolling: touch;
        }
        
        .search-item {
            padding: 12px 14px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
            transition: background 0.15s ease;
            min-height: 48px;
            display: flex;
            align-items: center;
        }
        
        .search-item:active { 
            background: var(--primary-light); 
        }
        
        .search-item:last-child { 
            border-bottom: none; 
        }

        /* ============ أزرار تبديل وضع الهوية ============ */
        .toggle-id-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 6px;
            gap: 10px;
        }

        .btn-toggle-id {
            background: linear-gradient(135deg, #8D6E63, #A1887F);
            color: white;
            border: none;
            border-radius: var(--radius-xl);
            padding: 8px 16px;
            font-family: 'Cairo', sans-serif;
            font-size: 0.78rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            touch-action: manipulation;
            min-height: 40px;
        }

        .btn-toggle-id:hover {
            background: linear-gradient(135deg, #6D4C41, #8D6E63);
            box-shadow: 0 3px 8px rgba(109, 76, 65, 0.3);
        }

        .btn-toggle-id:active {
            transform: scale(0.96);
        }

        /* ============ ✅ مودال عرض الأدوية ============ */
        .meds-view-modal .modal-card {
            max-width: 650px;
        }

        .meds-view-header-info {
            background: #F5FAFC;
            border-radius: var(--radius-sm);
            padding: 14px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
        }

        .meds-view-header-info .info-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 0.85rem;
        }

        .meds-view-header-info .info-label {
            color: var(--text-sec);
            font-weight: 600;
        }

        .meds-view-header-info .info-value {
            font-weight: 700;
            color: var(--ink);
        }

        .meds-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: white;
            border-radius: var(--radius-sm);
            margin-bottom: 8px;
            border: 1px solid var(--border);
        }

        .meds-item .med-number {
            width: 32px;
            height: 32px;
            background: var(--primary-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 0.85rem;
            color: var(--primary-dark);
            flex-shrink: 0;
        }

        .meds-item .med-info {
            flex: 1;
        }

        .meds-item .med-name {
            font-weight: 700;
            font-size: 0.9rem;
        }

        .meds-item .med-details {
            font-size: 0.78rem;
            color: var(--text-sec);
            margin-top: 2px;
        }

        .meds-item .med-usage {
            font-size: 0.78rem;
            color: var(--primary-dark);
            margin-top: 2px;
            font-weight: 600;
        }

        /* ============ طباعة الروشتة ============ */
        @media print {
            body * {
                visibility: hidden;
            }
            #printArea, #printArea * {
                visibility: visible;
            }
            #printArea {
                position: fixed;
                left: 0;
                top: 0;
                width: 100%;
                padding: 20px;
                background: white;
                z-index: 99999;
            }
            
            .no-print {
                display: none !important;
            }
            
            .print-header {
                text-align: center;
                border-bottom: 2px solid #00AEEF;
                padding-bottom: 12px;
                margin-bottom: 16px;
            }
            
            .print-header h2 {
                color: #008080;
                font-size: 1.3rem;
                margin-bottom: 4px;
            }
            
            .print-header .clinic-name {
                color: #00AEEF;
                font-size: 1rem;
                font-weight: 600;
            }
            
            .print-patient-info {
                margin-bottom: 14px;
                padding: 10px;
                background: #f9f9f9;
                border-radius: 8px;
            }
            
            .print-patient-info .info-line {
                display: flex;
                justify-content: space-between;
                padding: 3px 0;
                font-size: 0.9rem;
                border-bottom: 1px dotted #ddd;
            }
            
            .print-meds-table {
                width: 100%;
                border-collapse: collapse;
                margin: 14px 0;
            }
            
            .print-meds-table th {
                background: #00AEEF;
                color: white;
                padding: 8px;
                text-align: right;
                font-size: 0.85rem;
            }
            
            .print-meds-table td {
                padding: 8px;
                border-bottom: 1px solid #ddd;
                font-size: 0.82rem;
            }
            
            .print-footer {
                margin-top: 20px;
                text-align: center;
                font-size: 0.78rem;
                color: #777;
                border-top: 1px solid #eee;
                padding-top: 10px;
            }
        }

        /* ============ التوست ============ */
        .toast-container {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 4000;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
            padding-bottom: var(--safe-bottom);
            max-width: 90vw;
        }
        
        .toast {
            background: #1A3C4A;
            color: white;
            padding: 14px 24px;
            border-radius: var(--radius-xl);
            font-weight: 700;
            font-size: 0.88rem;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            animation: toastIn 0.3s ease, toastOut 0.3s ease 2.2s forwards;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .toast.err { 
            background: #C62828; 
        }
        
        @keyframes toastIn { 
            from { transform: translateY(16px); opacity: 0; } 
            to { transform: translateY(0); opacity: 1; } 
        }
        
        @keyframes toastOut { 
            from { transform: translateY(0); opacity: 1; } 
            to { transform: translateY(-16px); opacity: 0; } 
        }

        .keyboard-scroll-spacer {
            height: 1px;
            width: 100%;
            pointer-events: none;
            opacity: 0;
        }

        /* ============ RESPONSIVE ============ */
        @media (max-width: 1024px) {
            .rx-cards-grid { 
                grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
                gap: 12px;
            }
            
            .app-header {
                padding: 8px 14px;
            }
            
            .btn {
                padding: 8px 14px;
                font-size: 0.82rem;
                min-height: 42px;
            }
        }

        @media (max-width: 768px) {
            html { font-size: 15px; }
            body { 
                padding: 8px;

            }
            
            .top-nav {
                padding: 4px 8px;
                padding-top: calc(4px + var(--safe-top));
                gap: 2px;
            }
            
            .nav-item {
                padding: 6px 8px;
                font-size: 0.62rem;
                min-width: 44px;
                min-height: 48px;
            }
            
            .nav-item i {
                font-size: 1.1rem;
            }
            
            .app-header { 
                padding: 10px 14px 14px;

                border-radius: var(--radius-md); 
                gap: 10px;
                flex-direction: column;
                align-items: stretch;
            }
            
            .logo {
                display: flex;
                justify-content: space-between;
                align-items: center;

            }
            
            .logo h2 { font-size: 1.2rem; }

            }
            
            .tenant-badge {

                padding: 5px 12px;
            }
            
            #welcomeMsg {
                grid-column: 1 / -1;
                text-align: center;
                font-size: 0.82rem;
            }
            
            .btn { padding: 10px 12px; font-size: 0.8rem; min-height: 46px; border-radius: 24px; }
            .btn-sm { padding: 8px 12px; font-size: 0.78rem; }
            
            .doctor-pill { padding: 8px 14px; font-size: 0.82rem; min-height: 42px; border-radius: 24px; }
            .doctor-pill .pill-avatar { width: 28px; height: 28px; min-width: 28px; font-size: 0.75rem; }
            
            .status-tab { padding: 10px 12px; font-size: 0.8rem; min-width: 60px; min-height: 44px; }
            .status-tab .badge { font-size: 0.72rem; padding: 2px 8px; }
            
            .rx-cards-grid { grid-template-columns: 1fr; gap: 12px; }
            .rx-card-header { padding: 14px; gap: 12px; }
            .rx-card-body { padding: 12px 14px; gap: 8px; }
            .rx-card-footer { padding: 10px 14px; }
            .rx-card-avatar { width: 44px; height: 44px; min-width: 44px; font-size: 1.1rem; }
            .rx-card-patient-name { font-size: 1rem; }
            .rx-card-doctor-name { font-size: 0.78rem; }
            
            .modal { padding: 0; align-items: flex-end; }
            .modal-card { max-width: 100%; border-radius: 24px 24px 0 0; max-height: 90vh; max-height: 90dvh; }
            .modal-header { border-radius: 24px 24px 0 0; }
            .modal-body { padding: 16px; padding-bottom: 40px; }
            
            .form-control { padding: 12px 14px; font-size: 0.85rem; min-height: 48px; border-radius: 12px; }
            .search-item { padding: 12px 14px; min-height: 48px; font-size: 0.85rem; }
            .rx-detail-item { padding: 10px 12px; min-height: 48px; }
            .rx-detail-item .drug-icon { width: 36px; height: 36px; font-size: 0.9rem; }
            
            .rx-card-action-btn { padding: 8px 14px; font-size: 0.78rem; min-height: 40px; border-radius: 22px; }
            .rx-card-buttons-group { gap: 4px; }
            
            .hide-mobile { display: none; }

            .btn-toggle-id { padding: 6px 12px; font-size: 0.72rem; min-height: 36px; }
        }

        @media (max-width: 400px) {
            html { font-size: 14px; }
            body { 
                padding: 6px; 
                padding-bottom: calc(6px + var(--safe-bottom)); 
                padding-top: calc(6px + var(--safe-top) + 60px);
            }
            
            .top-nav {
                padding: 2px 4px;

            }

            .rx-card-header { padding: 12px; gap: 10px; }
            .rx-card-body { padding: 10px 12px; }

            .rx-card-buttons-group { flex-direction: column; width: 100%; }

<body>

    <!-- ✅ شريط التنقل العلوي -->
    <nav class="top-nav">
        <button class="nav-item home-nav active" title="المنزل" onclick="navigateTo('home')">

            <span>المنزل</span>
        </button>
        <button class="nav-item ad-nav" title="الإعلان" onclick="navigateTo('ad')">
            <i class="fas fa-bullhorn"></i>
            <span>الإعلان</span>
        </button>
        <button class="nav-item consult-nav" title="استشارة سريعة" onclick="navigateTo('consult')">
            <i class="fas fa-comment-medical"></i>
            <span>استشارة</span>
        </button>
        <button class="nav-item missing-nav" title="الدواء الناقص" onclick="navigateTo('missing')">

        </button>

    <div class="toast-container" id="toastContainer"></div>

    <div id="appLoader">

        <span class="loader-text">جارٍ تحميل لوحة الصيدلي...</span>
    </div>

    <div class="container" id="mainContainer" style="display:none;">
        <header class="app-header">
            <div class="logo">
                <h2><i class="fas fa-heartbeat"></i> شفاء · الصيدلي <span class="sync-dot on" id="syncDot" title="حالة المزامنة"></span></h2>
            </div>
            <div class="header-actions">
                <span class="tenant-badge" id="tenantBadge">
                    <i class="fas fa-hospital"></i> <span id="tenantName">المجمع الطبي</span>
                </span>
                <span id="welcomeMsg">مرحباً</span>
                <button class="btn btn-outline btn-sm" id="searchPatientBtn">
                    <i class="fas fa-search"></i> <span class="hide-mobile">بحث عن مريض</span>
                </button>
                <button class="btn btn-outline btn-sm" id="logoutBtn">

                </button>

        </header>

        </div>

        <div class="keyboard-scroll-spacer"></div>
    </div>

    <!-- مودال الصرف -->

                <button class="close-btn" id="closeDispenseBtn">&times;</button>
            </div>
            <div class="modal-body">

                        <i class="fas fa-print"></i> طباعة الروشتة
                    </button>
                    <button class="btn btn-outline" id="gotoDetailsFromMedsBtn" style="flex:1;min-width:140px;">
                        <i class="fas fa-external-link-alt"></i> فتح التفاصيل
                    </button>
                </div>

        </div>
