<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>سُكُون · لوحة الصيدلي</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #F8C471;
            --primary-light: #FDEBD0;
            --primary-dark: #E59866;
            --accent: #E67E22;
            --accent-soft: #FAD7A1;
            --bg: #FFF8F0;
            --white: #FFFFFF;
            --ink: #4A3B2C;
            --text-sec: #8B7A66;
            --danger: #E57373;
            --success: #5FA88D;
            --warning: #F4B886;
            --border-light: #F0E0D0;
            --shadow-sm: 0 6px 12px -4px rgba(230, 126, 34, 0.08);
            --shadow-md: 0 12px 28px -6px rgba(230, 126, 34, 0.12);
            --radius-card: 24px;
            --radius-sm: 16px;
            --radius-xs: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            padding: 16px;
            position: relative;
            -webkit-tap-highlight-color: transparent;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 0% 0%, rgba(248, 196, 113, 0.08), transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(230, 126, 34, 0.06), transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .app-container {
            display: flex;
            gap: 20px;
            max-width: 1600px;
            margin: 0 auto;
            height: calc(100vh - 32px);
        }

        /* الشريط الجانبي للأطباء */
        .doctors-sidebar {
            width: 280px;
            min-width: 260px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            border-radius: var(--radius-card);
            padding: 20px 12px;
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: var(--shadow-md);
            display: none;
            flex-direction: column;
            overflow-y: auto;
            transition: all 0.3s ease;
            flex-shrink: 0;
            max-height: 100%;
        }
        .doctors-sidebar.show {
            display: flex;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 8px 16px;
            border-bottom: 1px solid var(--border-light);
            flex-shrink: 0;
        }
        .sidebar-header h3 {
            font-size: 1.2rem;
            font-weight: 700;
            white-space: nowrap;
        }

        .doctor-list {
            flex: 1;
            margin-top: 12px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            min-height: 0;
        }
        .doctor-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            margin-bottom: 6px;
            background: white;
            border-radius: 60px;
            cursor: pointer;
            border: 1px solid var(--border-light);
            transition: all 0.2s;
            gap: 8px;
        }
        .doctor-item:hover {
            background: var(--primary-light);
            border-color: var(--primary);
        }
        .doctor-item.active {
            background: var(--primary);
            color: #4A3B2C;
            border-color: var(--primary);
            font-weight: 700;
        }
        .doctor-info {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
            flex: 1;
        }
        .doctor-avatar {
            width: 40px;
            height: 40px;
            min-width: 40px;
            background: var(--accent-soft);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--ink);
            font-size: 1rem;
        }
        .doctor-name {
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .new-badge {
            background: var(--danger);
            color: white;
            border-radius: 30px;
            padding: 2px 10px;
            font-size: 0.75rem;
            font-weight: 700;
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* المحتوى الرئيسي */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow: hidden;
            min-width: 0;
        }

        /* الشريط العلوي */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 10px 20px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: var(--shadow-sm);
            gap: 12px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }
        .logo h2 {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--accent);
            white-space: nowrap;
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 18px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            transition: all 0.2s;
            background: white;
            color: var(--ink);
            border: 1px solid var(--border-light);
            white-space: nowrap;
            user-select: none;
        }
        .btn:hover {
            background: var(--primary-light);
        }
        .btn-primary {
            background: var(--primary);
            color: #4A3B2C;
            border: none;
            box-shadow: 0 6px 14px rgba(230, 126, 34, 0.2);
        }
        .btn-primary:hover {
            background: var(--primary-dark);
            color: white;
        }
        .btn-icon {
            width: 44px;
            height: 44px;
            padding: 0;
            justify-content: center;
            flex-shrink: 0;
        }
        .btn-sm {
            padding: 6px 12px;
            font-size: 0.8rem;
            border-radius: 30px;
        }

        /* لوحة الروشتات */
        .prescriptions-panel {
            flex: 1;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(8px);
            border-radius: var(--radius-card);
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: var(--shadow-md);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
        }
        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
            flex-shrink: 0;
        }
        .panel-header h3 {
            font-size: 1.1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .tabs {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }
        .tab-btn {
            background: transparent;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-sec);
            font-family: 'Cairo', sans-serif;
            font-size: 0.9rem;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .tab-btn.active {
            background: white;
            color: var(--accent);
            box-shadow: var(--shadow-sm);
        }
        .tab-btn:hover {
            color: var(--accent);
        }

        .rx-list {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            min-height: 0;
        }
        .rx-item-card {
            background: white;
            border-radius: var(--radius-sm);
            padding: 16px 18px;
            margin-bottom: 10px;
            border: 1px solid var(--border-light);
            cursor: pointer;
            transition: all 0.15s;
            position: relative;
        }
        .rx-item-card:hover {
            background: var(--primary-light);
            border-color: var(--primary);
        }
        .rx-item-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            flex-wrap: wrap;
            gap: 6px;
        }
        .rx-patient {
            font-weight: 700;
            font-size: 1.05rem;
        }
        .rx-date {
            color: var(--text-sec);
            font-size: 0.8rem;
            white-space: nowrap;
        }
        .rx-doctor {
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 4px;
            font-size: 0.9rem;
        }
        .rx-items-preview {
            color: var(--text-sec);
            font-size: 0.9rem;
        }
        .open-details-btn {
            position: absolute;
            top: 16px;
            left: 16px;
            background: var(--primary-light);
            border: none;
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 0.8rem;
            cursor: pointer;
            color: var(--ink);
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
            transition: 0.2s;
        }
        .open-details-btn:hover {
            background: var(--primary);
        }

        /* المودال */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(60, 40, 20, 0.25);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 16px;
        }
        .modal.show {
            display: flex;
        }
        .modal-card {
            background: white;
            border-radius: 32px;
            width: 100%;
            max-width: 580px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 30px 50px rgba(160, 100, 40, 0.2);
        }
        .modal-header {
            padding: 20px 24px;
            background: #FEF5EC;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1;
            border-radius: 32px 32px 0 0;
        }
        .modal-header h3 {
            font-size: 1.1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .close-btn {
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            color: var(--text-sec);
            line-height: 1;
            padding: 4px 8px;
            border-radius: 50%;
            transition: 0.2s;
            font-family: 'Cairo', sans-serif;
        }
        .close-btn:hover {
            background: rgba(0, 0, 0, 0.05);
            color: var(--ink);
        }
        .modal-body {
            padding: 20px 24px;
        }
        .search-input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .search-input-group input {
            flex: 1;
            min-width: 0;
            padding: 12px 16px;
            border-radius: 20px;
            border: 1.5px solid var(--border-light);
            font-family: 'Cairo', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-input-group input:focus {
            border-color: var(--primary);
        }
        .search-result-item {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-light);
            cursor: pointer;
            border-radius: var(--radius-xs);
            transition: background 0.15s;
        }
        .search-result-item:hover {
            background: var(--primary-light);
        }
        .search-result-item:last-child {
            border-bottom: none;
        }
        .search-result-item strong {
            display: block;
            font-size: 1rem;
        }

        /* التوست */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #4A3B2C;
            color: white;
            padding: 14px 24px;
            border-radius: 60px;
            text-align: center;
            z-index: 3000;
            max-width: 500px;
            margin: 0 auto;
            font-size: 0.9rem;
            animation: slideUp 0.3s ease;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-sec);
            font-size: 0.95rem;
        }
        .empty-state i {
            display: block;
            font-size: 2.5rem;
            margin-bottom: 12px;
            opacity: 0.5;
        }
        .badge-pulse {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
            }
        }

        .text-success {
            color: var(--success);
            font-weight: 600;
        }
        .text-muted {
            color: var(--text-sec);
            font-size: 0.8rem;
        }
        .mt-2 {
            margin-top: 6px;
        }
        .mt-3 {
            margin-top: 10px;
        }
        .mb-2 {
            margin-bottom: 6px;
        }
        .mb-3 {
            margin-bottom: 10px;
        }
        .gap-2 {
            gap: 8px;
        }
        .d-flex {
            display: flex;
            align-items: center;
        }

        /* ========== التجاوب مع الأجهزة ========== */

        /* شاشات كبيرة جداً */
        @media (min-width: 1400px) {
            .doctors-sidebar {
                width: 320px;
            }
            .rx-item-card {
                padding: 20px 24px;
            }
            .logo h2 {
                font-size: 1.7rem;
            }
        }

        /* الأجهزة اللوحية */
        @media (max-width: 1024px) {
            .doctors-sidebar {
                width: 250px;
                min-width: 230px;
                border-radius: 20px;
                padding: 16px 10px;
            }
            .top-bar {
                padding: 8px 16px;
                gap: 8px;
            }
            .logo h2 {
                font-size: 1.3rem;
            }
            .btn {
                font-size: 0.85rem;
                padding: 8px 14px;
            }
            .btn-icon {
                width: 38px;
                height: 38px;
            }
            .tab-btn {
                padding: 6px 14px;
                font-size: 0.85rem;
            }
            .panel-header h3 {
                font-size: 1rem;
            }
            .rx-item-card {
                padding: 14px 16px;
            }
            .rx-patient {
                font-size: 1rem;
            }
            .open-details-btn {
                position: static;
                margin-top: 8px;
                width: 100%;
                text-align: center;
                border-radius: 16px;
            }
            .prescriptions-panel {
                padding: 16px;
                border-radius: 20px;
            }
        }

        /* الأجهزة الصغيرة - الهواتف */
        @media (max-width: 800px) {
            body {
                padding: 8px;
            }
            .app-container {
                flex-direction: column;
                height: auto;
                min-height: calc(100vh - 16px);
                gap: 12px;
            }
            .doctors-sidebar {
                width: 100%;
                min-width: unset;
                max-height: 320px;
                border-radius: 20px;
                padding: 14px 10px;
            }
            .doctors-sidebar.show {
                display: flex;
            }
            .doctor-item {
                padding: 12px 14px;
                border-radius: 50px;
            }
            .doctor-avatar {
                width: 34px;
                height: 34px;
                min-width: 34px;
                font-size: 0.85rem;
            }
            .doctor-name {
                font-size: 0.9rem;
            }
            .top-bar {
                flex-direction: row;
                flex-wrap: wrap;
                padding: 10px 14px;
                border-radius: 40px;
                gap: 6px;
            }
            .logo h2 {
                font-size: 1.1rem;
            }
            .header-actions {
                gap: 4px;
            }
            .btn {
                font-size: 0.8rem;
                padding: 7px 12px;
                border-radius: 30px;
                gap: 4px;
            }
            .btn-icon {
                width: 34px;
                height: 34px;
            }
            #welcomeMessage {
                font-size: 0.85rem;
                max-width: 120px;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
                display: inline-block;
            }
            .prescriptions-panel {
                padding: 14px;
                border-radius: 20px;
            }
            .panel-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            .panel-header h3 {
                font-size: 0.95rem;
            }
            .tabs {
                width: 100%;
            }
            .tab-btn {
                flex: 1;
                text-align: center;
                padding: 8px 10px;
                font-size: 0.85rem;
            }
            .rx-item-card {
                padding: 14px 14px;
                border-radius: 16px;
            }
            .rx-patient {
                font-size: 0.95rem;
            }
            .rx-doctor {
                font-size: 0.85rem;
            }
            .rx-items-preview {
                font-size: 0.8rem;
            }
            .rx-date {
                font-size: 0.75rem;
            }
            .open-details-btn {
                position: static;
                margin-top: 8px;
                width: 100%;
                text-align: center;
                border-radius: 14px;
                font-size: 0.8rem;
            }
            .modal-card {
                border-radius: 24px;
                max-height: 85vh;
            }
            .modal-header {
                padding: 16px 18px;
                border-radius: 24px 24px 0 0;
            }
            .modal-body {
                padding: 16px 18px;
            }
            .search-input-group {
                flex-direction: column;
                gap: 8px;
            }
            .search-input-group input {
                width: 100%;
            }
            .search-input-group .btn {
                width: 100%;
                justify-content: center;
            }
        }

        /* هواتف صغيرة جداً */
        @media (max-width: 400px) {
            body {
                padding: 4px;
            }
            .app-container {
                gap: 8px;
            }
            .top-bar {
                padding: 8px 10px;
                border-radius: 30px;
                gap: 4px;
            }
            .logo h2 {
                font-size: 1rem;
            }
            .btn {
                font-size: 0.75rem;
                padding: 6px 10px;
                border-radius: 24px;
            }
            .btn-icon {
                width: 30px;
                height: 30px;
                font-size: 0.75rem;
            }
            .doctors-sidebar {
                max-height: 250px;
                border-radius: 16px;
                padding: 10px 8px;
            }
            .doctor-item {
                padding: 10px 12px;
                border-radius: 40px;
            }
            .doctor-avatar {
                width: 28px;
                height: 28px;
                min-width: 28px;
                font-size: 0.7rem;
            }
            .doctor-name {
                font-size: 0.8rem;
            }
            .new-badge {
                font-size: 0.7rem;
                padding: 2px 8px;
            }
            .prescriptions-panel {
                padding: 10px;
                border-radius: 16px;
            }
            .rx-item-card {
                padding: 12px;
                border-radius: 14px;
            }
            .rx-patient {
                font-size: 0.9rem;
            }
            .panel-header h3 {
                font-size: 0.85rem;
            }
            .tab-btn {
                font-size: 0.8rem;
                padding: 6px 8px;
            }
        }

        /* دعم شاشات اللمس */
        @media (hover: none) and (pointer: coarse) {
            .doctor-item,
            .rx-item-card,
            .btn,
            .tab-btn,
            .search-result-item {
                cursor: default;
            }
            .doctor-item:active,
            .rx-item-card:active {
                background: var(--primary-light);
            }
            .btn:active {
                transform: scale(0.96);
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- الشريط الجانبي للأطباء -->
        <div class="doctors-sidebar" id="doctorsSidebar">
            <div class="sidebar-header">
                <h3><i class="fas fa-user-md"></i> الأطباء</h3>
                <button class="btn btn-icon btn-sm" id="refreshDoctorsBtn" title="تحديث"><i class="fas fa-sync-alt"></i></button>
            </div>
            <div class="doctor-list" id="doctorListContainer">
                <div class="empty-state"><i class="fas fa-spinner fa-pulse"></i> جاري التحميل...</div>
            </div>
        </div>

        <!-- المحتوى الرئيسي -->
        <div class="main-content">
            <!-- الشريط العلوي -->
            <div class="top-bar">
                <div class="logo">
                    <h2><i class="fas fa-pills" style="color:var(--primary);"></i> سُكُون · الصيدلي</h2>
                </div>
                <div class="header-actions">
                    <span id="welcomeMessage" style="font-weight:600;"></span>
                    <button class="btn btn-sm" id="searchPatientBtn"><i class="fas fa-search"></i> <span class="hide-mobile">بحث عن مريض</span></button>
                    <button class="btn btn-icon btn-sm" id="toggleSidebarBtn" title="إظهار/إخفاء الأطباء"><i class="fas fa-user-md"></i></button>
                    <button class="btn btn-icon btn-sm" id="logoutBtn" title="خروج"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>

            <!-- لوحة الروشتات -->
            <div class="prescriptions-panel">
                <div class="panel-header">
                    <h3 id="selectedDoctorTitle">اختر طبيباً من القائمة</h3>
                    <div class="tabs">
                        <button class="tab-btn active" data-doctor-tab="لم تصرف بعد">جديدة</button>
                        <button class="tab-btn" data-doctor-tab="تم الصرف">مصروفة</button>
                    </div>
                </div>
                <div class="rx-list" id="prescriptionsListContainer">
                    <div class="empty-state"><i class="fas fa-user-md"></i>اختر طبيباً من القائمة لعرض الروشتات</div>
                </div>
            </div>
        </div>
    </div>
