<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#00AEEF">
    <title>شفاء · لوحة الصيدلي</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'">
    
    <style>
        :root {
            --primary: #00AEEF;
            --primary-light: #E0F7FA;
            --primary-dark: #008080;
            --bg: #FAFAFA;
            --white: #FFFFFF;
            --ink: #1A3C4A;
            --text-sec: #5A7D8A;
            --danger: #E57373;
            --success: #26A69A;
            --warning: #FFB74D;
            --border: #E0E0E0;
            --shadow-sm: 0 4px 12px rgba(0,0,0,0.05);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.08);
            --radius-sm: 14px;
            --radius-md: 20px;
            --radius-lg: 28px;
            --radius-xl: 50px;
            --safe-bottom: env(safe-area-inset-bottom, 16px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        input, textarea { -webkit-user-select: text; user-select: text; }

        html {
            font-size: 15px;
            -webkit-font-smoothing: antialiased;
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            min-height: 100dvh;
            padding: 12px;
            padding-bottom: calc(12px + var(--safe-bottom) + 45vh);
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        .container { max-width: 1300px; margin: 0 auto; }

        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 10px 18px;
            margin-bottom: 14px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            flex-wrap: wrap;
            gap: 10px;
            position: sticky;
            top: 6px;
            z-index: 100;
        }

        .logo h2 {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--primary-dark);
            white-space: nowrap;
        }
        .logo i { color: var(--primary); }

        .header-actions {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .tenant-badge {
            background: var(--primary-light);
            padding: 4px 10px;
            border-radius: var(--radius-xl);
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--primary-dark);
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
        }

        #welcomeMsg {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-sec);
        }

        .btn {
            padding: 9px 16px;
            border-radius: var(--radius-xl);
            border: none;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.83rem;
            white-space: nowrap;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
            transition: opacity 0.15s;
        }
        .btn:active { opacity: 0.8; }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 3px 10px rgba(0,174,239,0.2); }
        .btn-outline { background: var(--white); color: var(--ink); border: 1.5px solid var(--border); }
        .btn-sm { padding: 6px 12px; font-size: 0.78rem; border-radius: var(--radius-sm); }

        .sync-dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            margin-left: 5px;
            vertical-align: middle;
        }
        .sync-dot.on { background: var(--success); }
        .sync-dot.off { background: #FFB74D; }

        .doctors-strip {
            background: var(--white);
            border-radius: var(--radius-xl);
            padding: 6px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            margin-bottom: 14px;
            overflow: hidden;
        }
        .doctors-strip .strip-scroll {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
            padding: 4px;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .doctors-strip .strip-scroll::-webkit-scrollbar { display: none; }

        .doctor-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: var(--white);
            border-radius: var(--radius-xl);
            border: 1.5px solid var(--border);
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
            transition: all 0.2s;
            font-weight: 600;
            font-size: 0.85rem;
            touch-action: manipulation;
        }
        .doctor-pill:active { transform: scale(0.96); }
        .doctor-pill.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(0,174,239,0.25);
        }
        .doctor-pill .pill-avatar {
            width: 30px;
            height: 30px;
            min-width: 30px;
            background: var(--primary-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            color: var(--primary-dark);
        }
        .doctor-pill.active .pill-avatar {
            background: rgba(255,255,255,0.3);
            color: white;
        }
        .doctor-pill .pill-badge {
            background: var(--danger);
            color: white;
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 0.7rem;
            font-weight: 700;
        }
        .doctor-pill.active .pill-badge {
            background: rgba(255,255,255,0.4);
        }

        .status-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 14px;
            flex-wrap: wrap;
            background: var(--white);
            border-radius: var(--radius-xl);
            padding: 5px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }
        .status-tab {
            background: transparent;
            border: none;
            padding: 9px 16px;
            border-radius: var(--radius-xl);
            font-weight: 600;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.82rem;
            color: var(--text-sec);
            flex: 1;
            justify-content: center;
            min-width: 80px;
            touch-action: manipulation;
        }
        .status-tab .badge {
            background: rgba(0,0,0,0.04);
            border-radius: 30px;
            padding: 2px 9px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        .status-tab.active {
            background: white;
            color: var(--primary);
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
        }
        .status-tab.active .badge {
            background: var(--primary-light);
            color: var(--primary);
        }

        .table-container {
            background: var(--white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            overflow: hidden;
        }
        .table-scroll {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
            min-width: 700px;
            font-size: 0.85rem;
        }
        th, td { padding: 12px 8px; }
        thead th {
            background: #F5FAFC;
            font-weight: 700;
            color: var(--ink);
            font-size: 0.78rem;
            white-space: nowrap;
            position: sticky;
            top: 0;
            z-index: 1;
        }
        tbody tr { border-bottom: 1px solid var(--border); }
        tbody tr:last-child { border-bottom: none; }
        tbody tr { cursor: pointer; transition: background 0.15s; }
        tbody tr:active { background: var(--primary-light); }

        .status-badge {
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.72rem;
            font-weight: 700;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 3px;
        }
        .s-pending { background: #FFF3E0; color: #E65100; }
        .s-dispensed { background: #E8F5E9; color: #2E7D32; }
        .s-partial { background: #E3F2FD; color: #1565C0; }

        .empty-row td {
            text-align: center;
            padding: 35px;
            color: var(--text-sec);
        }

        .action-btn {
            background: var(--primary-light);
            border: none;
            border-radius: var(--radius-sm);
            padding: 5px 10px;
            cursor: pointer;
            color: var(--primary-dark);
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
            font-size: 0.75rem;
            touch-action: manipulation;
        }
        .action-btn:active { background: var(--primary); color: white; }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.25);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 16px;
        }
        .modal-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 500px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 15px 40px rgba(0,0,0,0.12);
            border: 1px solid var(--border);
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
        }
        .modal-header {
            padding: 14px 18px;
            background: #F5FAFC;
            border-bottom: 1px solid var(--border);
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .modal-header h3 { font-size: 1.05rem; font-weight: 700; }
        .close-btn {
            background: none;
            border: none;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            font-size: 22px;
            color: var(--text-sec);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .close-btn:active { background: rgba(0,0,0,0.05); }
        .modal-body {
            padding: 18px;
            padding-bottom: 45vh;
        }

        .form-group { margin-bottom: 14px; }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 0.83rem;
            color: var(--ink);
        }
        .form-control {
            width: 100%;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--border);
            background: #F5FAFC;
            font-family: 'Cairo', sans-serif;
            font-size: 0.85rem;
            color: var(--ink);
            -webkit-appearance: none;
            appearance: none;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
        }

        .rx-detail-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: #F5FAFC;
            border-radius: var(--radius-sm);
            margin-bottom: 6px;
            border: 1px solid var(--border);
        }
        .rx-detail-item .drug-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--primary-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .search-box { position: relative; }
        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            margin-top: 3px;
            max-height: 160px;
            overflow-y: auto;
            display: none;
            z-index: 20;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            -webkit-overflow-scrolling: touch;
        }
        .search-item {
            padding: 9px 12px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            font-size: 0.83rem;
        }
        .search-item:active { background: var(--primary-light); }

        .toast-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3000;
            display: flex;
            flex-direction: column;
            gap: 6px;
            pointer-events: none;
        }
        .toast {
            background: #1A3C4A;
            color: white;
            padding: 11px 20px;
            border-radius: var(--radius-xl);
            font-weight: 600;
            font-size: 0.82rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.18);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .toast.err { background: #C62828; }
        .toast.removing { opacity: 0; transform: translateY(-10px); transition: all 0.3s ease; }

        .keyboard-scroll-spacer {
            height: 1px;
            width: 100%;
            pointer-events: none;
            opacity: 0;
        }

        @media (max-width: 768px) {
            body {
                padding: 8px;
                padding-bottom: calc(8px + var(--safe-bottom) + 55vh);
            }
            .app-header { padding: 8px 12px; top: 4px; border-radius: var(--radius-md); }
            .logo h2 { font-size: 1.15rem; }
            .btn { padding: 7px 12px; font-size: 0.78rem; }
            .doctor-pill { padding: 8px 12px; font-size: 0.8rem; }
            .status-tab { padding: 7px 10px; font-size: 0.76rem; }
            table { min-width: 550px; font-size: 0.78rem; }
            th, td { padding: 8px 5px; }
            .modal-card { max-width: 100%; border-radius: var(--radius-md); }
            .modal-body { padding-bottom: 55vh; }
            .hide-mobile { display: none; }
        }

        @media (max-width: 400px) {
            .status-tabs { flex-direction: column; gap: 3px; }
            .status-tab { justify-content: space-between; }
            body { padding-bottom: calc(8px + var(--safe-bottom) + 65vh); }
            .modal-body { padding-bottom: 65vh; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.001ms !important;
                transition-duration: 0.001ms !important;
            }
        }
    </style>
</head>
<body>

    <div class="toast-container" id="toastContainer"></div>

    <div class="container" id="mainContainer">
        <header class="app-header">
            <div class="logo">
                <h2><i class="fas fa-heartbeat"></i> شفاء · الصيدلي <span class="sync-dot on" id="syncDot" title="حالة المزامنة"></span></h2>
            </div>
            <div class="header-actions">
                <span class="tenant-badge" id="tenantBadge">
                    <i class="fas fa-hospital"></i> <span id="tenantName">المجمع الطبي</span>
                </span>
                <span id="welcomeMsg">مرحباً</span>
                <button class="btn btn-outline btn-sm" id="searchPatientBtn">
                    <i class="fas fa-search"></i> <span class="hide-mobile">بحث عن مريض</span>
                </button>
                <button class="btn btn-outline btn-sm" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i> خروج
                </button>
            </div>
        </header>

        <div class="doctors-strip" id="doctorsStrip">
            <div class="strip-scroll" id="doctorStripContainer">
                <div style="padding:10px;color:var(--text-sec);">جاري تحميل الأطباء...</div>
            </div>
        </div>

        <div class="status-tabs">
            <button class="status-tab active" data-tab="لم تصرف بعد">
                <i class="fas fa-clock"></i> جديدة
                <span class="badge" id="countPending">0</span>
            </button>
            <button class="status-tab" data-tab="تم الصرف">
                <i class="fas fa-check-circle"></i> مصروفة
                <span class="badge" id="countDispensed">0</span>
            </button>
        </div>

        <div class="table-container">
            <div class="table-scroll">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>المريض</th>
                            <th>الطبيب</th>
                            <th>التاريخ</th>
                            <th>الأدوية</th>
                            <th>التشخيص</th>
                            <th>الحالة</th>
                            <th>إجراء</th>
                        </tr>
                    </thead>
                    <tbody id="prescriptionsBody">
                        <tr class="empty-row"><td colspan="8">اختر طبيباً من القائمة أعلاه</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="keyboard-scroll-spacer"></div>
    </div>

    <!-- مودال تفاصيل الوصفة والصرف -->
    <div id="dispenseModal" class="modal">
        <div class="modal-card">
            <div class="modal-header">
                <h3><i class="fas fa-prescription"></i> صرف الوصفة</h3>
                <button class="close-btn" id="closeDispenseBtn">&times;</button>
            </div>
            <div class="modal-body">
                <div id="dispensePatientInfo" style="margin-bottom:12px;"></div>
                <div id="dispenseItemsList" style="margin-bottom:14px;"></div>
                <div class="form-group">
                    <label>حالة الصرف</label>
                    <select id="dispenseStatus" class="form-control">
                        <option value="تم الصرف">✅ تم الصرف كاملاً</option>
                        <option value="صرفت جزئياً">📦 صرفت جزئياً</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>ملاحظات الصيدلي</label>
                    <textarea id="dispenseNotes" class="form-control" rows="2" placeholder="ملاحظات إضافية..."></textarea>
                </div>
                <button class="btn btn-primary" id="confirmDispenseBtn" style="width:100%;">
                    <i class="fas fa-check"></i> تأكيد الصرف
                </button>
            </div>
        </div>
    </div>

    <!-- مودال البحث عن مريض -->
    <div id="searchModal" class="modal">
        <div class="modal-card">
            <div class="modal-header">
                <h3><i class="fas fa-search"></i> بحث عن مريض</h3>
                <button class="close-btn" id="closeSearchBtn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="search-box">
                    <input type="text" id="patientSearchInput" class="form-control" placeholder="اسم المريض أو رقم الهاتف..." autocomplete="off">
                    <div id="searchResults" class="search-results"></div>
                </div>
                <div id="patientHistoryContainer" style="margin-top:14px;"></div>
                <div class="keyboard-scroll-spacer"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { firebaseConfig } from './firebase-config.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, onValue, get, update, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // ============ تهيئة Firebase ============
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // ============ ثوابت التخزين المحلي ============
        const STORAGE_PREFIX = 'shifa_tenant_';
        
        const LOGIN_STORAGE_KEYS = [
            'shifa_session',
            'shifa_remember',
            'shifa_last_login',
            'shifa_secure_session'
        ];
        
        let currentTenantId = null;
        
        const getTenantStorageKey = (baseKey) => {
            return currentTenantId ? `${STORAGE_PREFIX}${currentTenantId}_${baseKey}` : baseKey;
        };

        // ============ حالة التطبيق ============
        const state = {
            currentUser: null,
            pharmacistData: null,
            doctorsList: [],
            selectedDoctorId: null,
            allPrescriptions: [],
            currentTab: 'لم تصرف بعد',
            patientsMap: {},
            unsubscribePrescriptions: null,
        };

        // ============ دوال مساعدة ============
        const $ = (sel) => document.querySelector(sel);
        const $$ = (sel) => document.querySelectorAll(sel);

        const getToday = () => {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        };

        const escapeHtml = (str) => {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        };

        const showToast = (msg, isError = false) => {
            const container = $('#toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${isError ? 'err' : ''}`;
            toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i> ${msg}`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('removing');
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        };

        const setSyncStatus = (online) => {
            const dot = $('#syncDot');
            if (dot) {
                dot.className = `sync-dot ${online ? 'on' : 'off'}`;
                dot.title = online ? 'متصل بالسحابة' : 'غير متصل - استخدام البيانات المحلية';
            }
        };

        // ============ مسح بيانات الجلسة فقط ============
        const clearLoginSessionOnly = () => {
            try {
                LOGIN_STORAGE_KEYS.forEach(key => {
                    localStorage.removeItem(key);
                });
                
                const sessionKeysToRemove = [];
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (key && (key.startsWith('shifa_session') || key.startsWith('shifa_secure'))) {
                        sessionKeysToRemove.push(key);
                    }
                }
                sessionKeysToRemove.forEach(key => localStorage.removeItem(key));
                
                sessionStorage.clear();
                
                console.log(`✅ تم مسح ${LOGIN_STORAGE_KEYS.length + sessionKeysToRemove.length} مفتاح جلسة`);
                console.log('💾 تم الإبقاء على بيانات المجمع المحلية');
            } catch (e) {
                console.warn('تعذر مسح بيانات الجلسة:', e.message);
            }
        };

        // ============ تحميل بيانات الصيدلي من مسار المجمعات ============
        const loadPharmacistData = async (uid) => {
            try {
                // 1️⃣ البحث في كل المجمعات
                const tenantsSnap = await get(ref(db, 'tenants'));
                
                if (tenantsSnap.exists()) {
                    const tenants = tenantsSnap.val();
                    
                    for (const tenantId of Object.keys(tenants)) {
                        const userSnap = await get(ref(db, `tenants/${tenantId}/users/${uid}`));
                        
                        if (userSnap.exists()) {
                            const userData = userSnap.val();
                            
                            if (userData.role === 'pharmacist') {
                                currentTenantId = tenantId;
                                state.pharmacistData = { id: uid, ...userData };
                                
                                if (!userData.tenantId) {
                                    userData.tenantId = tenantId;
                                }
                                
                                const tenantName = tenants[tenantId]?.name || tenants[tenantId]?.tenantName || 'المجمع الطبي';
                                state.pharmacistData.tenantName = tenantName;
                                
                                $('#welcomeMsg').textContent = `أهلاً، ${state.pharmacistData.name || 'صيدلي'}`;
                                $('#tenantName').textContent = tenantName;
                                
                                console.log(`✅ تم العثور على الصيدلي في مجمع: ${tenantId}`);
                                return true;
                            }
                        }
                    }
                }
                
                // 2️⃣ المسار القديم للتوافق
                const oldSnap = await get(ref(db, `users/${uid}`));
                if (oldSnap.exists() && oldSnap.val().role === 'pharmacist') {
                    currentTenantId = uid;
                    state.pharmacistData = { id: uid, ...oldSnap.val() };
                    $('#welcomeMsg').textContent = `أهلاً، ${state.pharmacistData.name || 'صيدلي'}`;
                    console.log('⚠️ تم العثور على الصيدلي في المسار القديم');
                    return true;
                }
                
                showToast('هذا الحساب ليس حساب صيدلي', true);
                return false;
                
            } catch (err) {
                console.error('خطأ في تحميل بيانات الصيدلي:', err);
                showToast('خطأ في تحميل البيانات', true);
                return false;
            }
        };

        // ============ تحميل الأطباء من مسار المجمع ============
        const loadDoctors = () => {
            if (!currentTenantId) return;
            
            const usersRef = ref(db, `tenants/${currentTenantId}/users`);
            
            onValue(usersRef, (snap) => {
                const doctors = [];
                snap.forEach(child => {
                    const user = child.val();
                    if (user.role === 'doctor') {
                        doctors.push({ id: child.key, ...user });
                    }
                });
                state.doctorsList = doctors;
                
                // التحقق من صحة الطبيب المحدد
                if (state.selectedDoctorId && !doctors.find(d => d.id === state.selectedDoctorId)) {
                    state.selectedDoctorId = null;
                    localStorage.removeItem(getTenantStorageKey('selected_doctor'));
                }
                
                renderDoctorsStrip();
                updateCounts();
                renderTable();
            }, (error) => {
                console.warn('خطأ في تحميل الأطباء:', error.message);
                setSyncStatus(false);
            });
        };

        // ============ تحميل الوصفات من مسار المجمع ============
        const loadPrescriptions = () => {
            if (!currentTenantId) return;
            
            if (state.unsubscribePrescriptions) {
                state.unsubscribePrescriptions();
            }
            
            const presRef = ref(db, `tenants/${currentTenantId}/prescriptions`);
            
            state.unsubscribePrescriptions = onValue(presRef, (snap) => {
                const prescriptions = [];
                snap.forEach(child => {
                    prescriptions.push({ id: child.key, ...child.val() });
                });
                
                // فلترة وصفات اليوم فقط للتبويب "تم الصرف"
                state.allPrescriptions = prescriptions;
                
                setSyncStatus(true);
                updateCounts();
                renderTable();
                renderDoctorsStrip();
            }, (error) => {
                console.warn('خطأ في تحميل الوصفات:', error.message);
                setSyncStatus(false);
            });
        };

        // ============ عرض شريط الأطباء ============
        const renderDoctorsStrip = () => {
            const container = $('#doctorStripContainer');
            
            if (state.doctorsList.length === 0) {
                container.innerHTML = '<div style="padding:10px;color:var(--text-sec);">لا يوجد أطباء مسجلين</div>';
                return;
            }
            
            container.innerHTML = state.doctorsList.map(doc => {
                const pendingCount = state.allPrescriptions.filter(
                    p => p.doctor_id === doc.id && p.status === 'لم تصرف بعد'
                ).length;
                
                return `
                    <div class="doctor-pill ${state.selectedDoctorId === doc.id ? 'active' : ''}" data-id="${doc.id}">
                        <div class="pill-avatar"><i class="fas fa-user-md"></i></div>
                        <span>د. ${escapeHtml(doc.name || '---')}</span>
                        ${pendingCount > 0 ? `<span class="pill-badge">${pendingCount}</span>` : ''}
                    </div>
                `;
            }).join('');
            
            // ربط الأحداث
            container.querySelectorAll('.doctor-pill').forEach(pill => {
                pill.addEventListener('click', () => {
                    state.selectedDoctorId = pill.dataset.id;
                    localStorage.setItem(getTenantStorageKey('selected_doctor'), state.selectedDoctorId);
                    renderDoctorsStrip();
                    updateCounts();
                    renderTable();
                    
                    // تمرير العنصر النشط
                    pill.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                });
            });
        };

        // ============ تحديث العدادات ============
        const updateCounts = () => {
            let pendingCount = 0;
            let dispensedCount = 0;
            
            const filtered = state.selectedDoctorId 
                ? state.allPrescriptions.filter(p => p.doctor_id === state.selectedDoctorId)
                : state.allPrescriptions;
            
            filtered.forEach(p => {
                if (p.status === 'لم تصرف بعد') pendingCount++;
                else if (p.status === 'تم الصرف' || p.status === 'صرفت جزئياً') {
                    // فلترة المصروفة اليوم فقط
                    if (p.dispensed_at && p.dispensed_at.startsWith(getToday())) {
                        dispensedCount++;
                    }
                }
            });
            
            $('#countPending').textContent = pendingCount;
            $('#countDispensed').textContent = dispensedCount;
        };

        // ============ عرض الجدول ============
        const renderTable = () => {
            const tbody = $('#prescriptionsBody');
            
            if (!state.selectedDoctorId) {
                tbody.innerHTML = '<tr class="empty-row"><td colspan="8"><i class="fas fa-hand-point-up"></i> اختر طبيباً من القائمة أعلاه</td></tr>';
                return;
            }
            
            let filtered = state.allPrescriptions.filter(
                p => p.doctor_id === state.selectedDoctorId
            );
            
            if (state.currentTab === 'لم تصرف بعد') {
                filtered = filtered.filter(p => p.status === 'لم تصرف بعد');
            } else {
                filtered = filtered.filter(
                    p => (p.status === 'تم الصرف' || p.status === 'صرفت جزئياً') &&
                    p.dispensed_at && p.dispensed_at.startsWith(getToday())
                );
            }
            
            filtered.sort((a, b) => (b.created_at || '').localeCompare(a.created_at || ''));
            
            if (filtered.length === 0) {
                const msg = state.currentTab === 'لم تصرف بعد' ? 'لا توجد وصفات جديدة' : 'لا توجد وصفات مصروفة اليوم';
                tbody.innerHTML = `<tr class="empty-row"><td colspan="8"><i class="fas fa-prescription"></i> ${msg}</td></tr>`;
                return;
            }
            
            tbody.innerHTML = filtered.map((p, i) => {
                const doctor = state.doctorsList.find(d => d.id === p.doctor_id);
                const doctorName = doctor ? doctor.name : 'طبيب';
                const patientName = p.patient_name || 'مريض';
                const itemCount = p.item_count || 0;
                const dateStr = p.created_at ? new Date(p.created_at).toLocaleDateString('ar-EG') : '-';
                
                const statusClass = p.status === 'تم الصرف' ? 's-dispensed' : 
                                   p.status === 'صرفت جزئياً' ? 's-partial' : 's-pending';
                const statusText = p.status === 'تم الصرف' ? '✅ تم الصرف' :
                                  p.status === 'صرفت جزئياً' ? '📦 جزئي' : '⏳ جديد';
                
                return `
                    <tr data-id="${p.id}">
                        <td>${i + 1}</td>
                        <td><b>${escapeHtml(patientName)}</b></td>
                        <td>د. ${escapeHtml(doctorName)}</td>
                        <td>${dateStr}</td>
                        <td>${itemCount} أصناف</td>
                        <td>${escapeHtml((p.diagnosis || '').substring(0, 40))}${(p.diagnosis || '').length > 40 ? '...' : ''}</td>
                        <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                        <td>
                            ${p.status === 'لم تصرف بعد' ? 
                                `<button class="action-btn" data-action="dispense" data-id="${p.id}">
                                    <i class="fas fa-check"></i> صرف
                                </button>` : 
                                `<button class="action-btn" data-action="view" data-id="${p.id}">
                                    <i class="fas fa-eye"></i> عرض
                                </button>`
                            }
                        </td>
                    </tr>
                `;
            }).join('');
        };

        // ============ فتح مودال الصرف ============
        const openDispenseModal = async (prescriptionId) => {
            const prescription = state.allPrescriptions.find(p => p.id === prescriptionId);
            if (!prescription) return;
            
            // تحميل عناصر الوصفة
            let items = [];
            try {
                const itemsSnap = await get(ref(db, `tenants/${currentTenantId}/prescription_items/${prescriptionId}`));
                if (itemsSnap.exists()) {
                    items = Object.values(itemsSnap.val());
                }
            } catch (e) {
                console.warn('تعذر تحميل عناصر الوصفة:', e.message);
            }
            
            const doctor = state.doctorsList.find(d => d.id === prescription.doctor_id);
            const doctorName = doctor ? doctor.name : 'طبيب';
            
            // معلومات المريض
            $('#dispensePatientInfo').innerHTML = `
                <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
                    <div style="width:44px;height:44px;background:var(--primary-light);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;color:var(--primary-dark);">
                        <i class="fas fa-user"></i>
                    </div>
                    <div>
                        <b>${escapeHtml(prescription.patient_name || 'مريض')}</b>
                        <div style="font-size:0.78rem;color:var(--text-sec);">د. ${escapeHtml(doctorName)}</div>
                    </div>
                </div>
                ${prescription.diagnosis ? `<div style="font-size:0.82rem;color:var(--text-sec);margin-bottom:8px;">📋 ${escapeHtml(prescription.diagnosis)}</div>` : ''}
            `;
            
            // عناصر الوصفة
            if (items.length === 0) {
                $('#dispenseItemsList').innerHTML = '<div style="color:var(--text-sec);">لا توجد عناصر في الوصفة</div>';
            } else {
                $('#dispenseItemsList').innerHTML = items.map((item, i) => {
                    const formEmoji = item.form === 'tablet' ? '💊' : 
                                     item.form === 'syrup' ? '🥄' : 
                                     item.form === 'injection' ? '💉' : 
                                     item.form === 'suppository' ? '🧴' : '💧';
                    return `
                        <div class="rx-detail-item">
                            <div class="drug-icon">${formEmoji}</div>
                            <div style="flex:1;">
                                <b>${escapeHtml(item.drug_name || item.drug_id || 'دواء')}</b>
                                <div style="font-size:0.75rem;color:var(--text-sec);">${escapeHtml(item.dose || '')}</div>
                            </div>
                        </div>
                    `;
                }).join('');
            }
            
            // حفظ معرف الوصفة الحالية
            $('#dispenseModal').dataset.prescriptionId = prescriptionId;
            $('#dispenseStatus').value = 'تم الصرف';
            $('#dispenseNotes').value = '';
            
            $('#dispenseModal').style.display = 'flex';
        };

        // ============ تأكيد الصرف ============
        const confirmDispense = async () => {
            const prescriptionId = $('#dispenseModal').dataset.prescriptionId;
            if (!prescriptionId) return;
            
            const status = $('#dispenseStatus').value;
            const notes = $('#dispenseNotes').value.trim();
            const now = new Date().toISOString();
            
            try {
                const updates = {};
                updates[`tenants/${currentTenantId}/prescriptions/${prescriptionId}/status`] = status;
                updates[`tenants/${currentTenantId}/prescriptions/${prescriptionId}/dispensed_at`] = now;
                updates[`tenants/${currentTenantId}/prescriptions/${prescriptionId}/pharmacist_id`] = state.currentUser.uid;
                updates[`tenants/${currentTenantId}/prescriptions/${prescriptionId}/pharmacist_name`] = state.pharmacistData.name || 'صيدلي';
                if (notes) {
                    updates[`tenants/${currentTenantId}/prescriptions/${prescriptionId}/pharmacist_notes`] = notes;
                }
                
                await update(ref(db), updates);
                
                $('#dispenseModal').style.display = 'none';
                showToast('✅ تم صرف الوصفة بنجاح');
            } catch (err) {
                console.error('خطأ في صرف الوصفة:', err);
                showToast('❌ خطأ في صرف الوصفة', true);
            }
        };

        // ============ البحث عن مريض ============
        let searchTimer;
        const searchPatients = async (term) => {
            if (!term || term.length < 2) {
                $('#searchResults').style.display = 'none';
                return;
            }
            
            const termLower = term.toLowerCase();
            let results = [];
            
            try {
                // البحث في الوصفات
                const prescriptionsSnap = await get(ref(db, `tenants/${currentTenantId}/prescriptions`));
                const seen = new Set();
                
                if (prescriptionsSnap.exists()) {
                    prescriptionsSnap.forEach(child => {
                        const p = child.val();
                        const patientId = p.patient_id;
                        const patientName = (p.patient_name || '').toLowerCase();
                        
                        if (!seen.has(patientId) && 
                            (patientName.includes(termLower) || 
                             (p.phone && p.phone.includes(term)))) {
                            seen.add(patientId);
                            results.push({
                                id: patientId,
                                name: p.patient_name || 'مريض',
                                phone: p.phone || '',
                                lastVisit: p.created_at
                            });
                        }
                    });
                }
            } catch (e) {
                console.warn('خطأ في البحث:', e.message);
            }
            
            const container = $('#searchResults');
            
            if (results.length === 0) {
                container.innerHTML = '<div class="search-item" style="color:var(--text-sec);">لا توجد نتائج</div>';
            } else {
                results.sort((a, b) => (b.lastVisit || '').localeCompare(a.lastVisit || ''));
                
                container.innerHTML = results.slice(0, 10).map(p => `
                    <div class="search-item" data-id="${p.id}">
                        <b>${escapeHtml(p.name)}</b>
                        <small style="color:var(--text-sec);">${escapeHtml(p.phone)}</small>
                    </div>
                `).join('');
                
                container.querySelectorAll('.search-item').forEach(item => {
                    item.addEventListener('click', () => {
                        showPatientHistory(item.dataset.id);
                        $('#searchResults').style.display = 'none';
                    });
                });
            }
            
            container.style.display = 'block';
        };

        // ============ عرض تاريخ المريض ============
        const showPatientHistory = async (patientId) => {
            const container = $('#patientHistoryContainer');
            container.innerHTML = '<div style="text-align:center;padding:10px;"><i class="fas fa-spinner fa-spin"></i> جاري التحميل...</div>';
            
            try {
                const prescriptionsSnap = await get(ref(db, `tenants/${currentTenantId}/prescriptions`));
                const patientPrescriptions = [];
                
                if (prescriptionsSnap.exists()) {
                    prescriptionsSnap.forEach(child => {
                        const p = child.val();
                        if (String(p.patient_id) === String(patientId)) {
                            patientPrescriptions.push({ id: child.key, ...p });
                        }
                    });
                }
                
                patientPrescriptions.sort((a, b) => (b.created_at || '').localeCompare(a.created_at || ''));
                
                if (patientPrescriptions.length === 0) {
                    container.innerHTML = '<div style="color:var(--text-sec);padding:10px;">لا توجد وصفات سابقة</div>';
                    return;
                }
                
                container.innerHTML = `
                    <h4 style="margin-bottom:10px;">📋 الوصفات السابقة (${patientPrescriptions.length})</h4>
                    ${patientPrescriptions.slice(0, 5).map(p => {
                        const statusClass = p.status === 'تم الصرف' ? 's-dispensed' : 
                                           p.status === 'صرفت جزئياً' ? 's-partial' : 's-pending';
                        const dateStr = p.created_at ? new Date(p.created_at).toLocaleDateString('ar-EG') : '-';
                        
                        return `
                            <div class="rx-detail-item" style="cursor:pointer;" data-id="${p.id}">
                                <div class="drug-icon"><i class="fas fa-prescription"></i></div>
                                <div style="flex:1;">
                                    <b>${dateStr}</b>
                                    <div style="font-size:0.75rem;color:var(--text-sec);">
                                        ${p.item_count || 0} أدوية
                                        <span class="status-badge ${statusClass}" style="margin-right:6px;">${p.status || 'جديد'}</span>
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('')}
                `;
                
                container.querySelectorAll('.rx-detail-item[data-id]').forEach(item => {
                    item.addEventListener('click', () => {
                        const pres = patientPrescriptions.find(p => p.id === item.dataset.id);
                        if (pres && pres.status === 'لم تصرف بعد') {
                            $('#searchModal').style.display = 'none';
                            openDispenseModal(pres.id);
                        } else if (pres) {
                            $('#searchModal').style.display = 'none';
                            openDispenseModal(pres.id);
                        }
                    });
                });
                
            } catch (e) {
                container.innerHTML = '<div style="color:var(--danger);">خطأ في تحميل التاريخ</div>';
            }
        };

        // ============ تسجيل الخروج ============
        const logout = async () => {
            try {
                showToast('👋 جاري تسجيل الخروج...');
                
                if (state.unsubscribePrescriptions) {
                    state.unsubscribePrescriptions();
                    state.unsubscribePrescriptions = null;
                }
                
                clearLoginSessionOnly();
                
                state.currentUser = null;
                state.pharmacistData = null;
                state.doctorsList = [];
                state.allPrescriptions = [];
                
                await signOut(auth);
                
                window.location.href = 'index.html';
                
            } catch (error) {
                console.error('خطأ أثناء تسجيل الخروج:', error);
                clearLoginSessionOnly();
                window.location.href = 'index.html';
            }
        };

        // ============ ربط الأحداث ============
        const initEvents = () => {
            // تبويبات الحالة
            $$('.status-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    $$('.status-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    state.currentTab = tab.dataset.tab;
                    updateCounts();
                    renderTable();
                });
            });
            
            // أحداث الجدول
            $('#prescriptionsBody').addEventListener('click', (e) => {
                const actionBtn = e.target.closest('[data-action]');
                if (!actionBtn) return;
                
                const id = actionBtn.dataset.id;
                const action = actionBtn.dataset.action;
                
                if (action === 'dispense' || action === 'view') {
                    openDispenseModal(id);
                }
            });
            
            // مودال الصرف
            $('#confirmDispenseBtn').addEventListener('click', confirmDispense);
            $('#closeDispenseBtn').addEventListener('click', () => $('#dispenseModal').style.display = 'none');
            
            // مودال البحث
            $('#searchPatientBtn').addEventListener('click', () => {
                $('#searchModal').style.display = 'flex';
                $('#patientSearchInput').value = '';
                $('#searchResults').style.display = 'none';
                $('#patientHistoryContainer').innerHTML = '';
            });
            
            $('#closeSearchBtn').addEventListener('click', () => $('#searchModal').style.display = 'none');
            
            $('#patientSearchInput').addEventListener('input', () => {
                clearTimeout(searchTimer);
                searchTimer = setTimeout(() => {
                    searchPatients($('#patientSearchInput').value.trim());
                }, 300);
            });
            
            // تسجيل الخروج
            $('#logoutBtn').addEventListener('click', logout);
            
            // إغلاق المودالات
            window.addEventListener('click', (e) => {
                if (e.target === $('#dispenseModal')) $('#dispenseModal').style.display = 'none';
                if (e.target === $('#searchModal')) $('#searchModal').style.display = 'none';
            });
            
            document.addEventListener('click', (e) => {
                if (!$('#patientSearchInput').contains(e.target) && !$('#searchResults').contains(e.target)) {
                    $('#searchResults').style.display = 'none';
                }
            });
            
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    if ($('#dispenseModal').style.display === 'flex') $('#dispenseModal').style.display = 'none';
                    if ($('#searchModal').style.display === 'flex') $('#searchModal').style.display = 'none';
                }
            });
            
            // مستمعي الاتصال
            window.addEventListener('online', () => {
                setSyncStatus(true);
                showToast('📡 تم استعادة الاتصال');
            });
            
            window.addEventListener('offline', () => {
                setSyncStatus(false);
                showToast('⚠️ انقطع الاتصال', true);
            });
            
            window.addEventListener('beforeunload', () => {
                if (state.unsubscribePrescriptions) {
                    state.unsubscribePrescriptions();
                }
            });
        };

        // ============ بدء التشغيل ============
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                clearLoginSessionOnly();
                window.location.href = 'index.html';
                return;
            }
            
            // ✅ 1. نجيب tenantId من الرابط
            const urlParams = new URLSearchParams(window.location.search);
            const tenantFromUrl = urlParams.get('tenant');
            
            if (tenantFromUrl) {
                currentTenantId = tenantFromUrl;
                console.log(`✅ تم استلام معرف المجمع من الرابط: ${currentTenantId}`);
            } else {
                // ✅ 2. من الجلسة المشفرة
                try {
                    const encrypted = localStorage.getItem('shifa_secure_session');
                    if (encrypted) {
                        const decoded = atob(encrypted);
                        const match = decoded.match(/"tenantId":"([^"]+)"/);
                        if (match) {
                            currentTenantId = match[1];
                            console.log(`📦 تم استخراج معرف المجمع من الجلسة: ${currentTenantId}`);
                        }
                    }
                } catch (e) {
                    console.warn('تعذر فك تشفير الجلسة:', e.message);
                }
                
                // ✅ 3. من الجلسة القديمة
                if (!currentTenantId) {
                    const oldSession = localStorage.getItem('shifa_session');
                    if (oldSession) {
                        try {
                            const parsed = JSON.parse(oldSession);
                            currentTenantId = parsed.tenantId || user.uid;
                        } catch (e) {
                            currentTenantId = user.uid;
                        }
                    } else {
                        currentTenantId = user.uid;
                    }
                    console.log(`📦 تم تحديد المجمع من الجلسة القديمة: ${currentTenantId}`);
                }
            }
            
            // ✅ تهيئة الجلسة
            sessionStorage.setItem('userUid', user.uid);
            sessionStorage.setItem('userRole', 'pharmacist');
            
            if (!state.currentUser) {
                state.currentUser = { uid: user.uid };
                
                // ✅ تحميل بيانات الصيدلي (يدور في كل المجمعات)
                const success = await loadPharmacistData(user.uid);
                if (!success) {
                    showToast('⚠️ تعذر تحميل بيانات الصيدلي', true);
                    return;
                }
                
                // استعادة الطبيب المحدد
                const savedDoctor = localStorage.getItem(getTenantStorageKey('selected_doctor'));
                if (savedDoctor) {
                    state.selectedDoctorId = savedDoctor;
                }
                
                // بدء تحميل البيانات
                initEvents();
                loadDoctors();
                loadPrescriptions();
                
                console.log('🚀 لوحة الصيدلي - نظام المجمعات الطبية المتعددة');
                console.log('🔒 كل صيدلي يشوف وصفات مجمعه فقط');
                console.log('💾 وضع الحفظ: يمسح جلسة الدخول فقط - يحتفظ ببيانات المجمع');
            }
        });
    </script>
</body>
</html>
