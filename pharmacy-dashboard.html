<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>سُكُون · لوحة الصيدلي</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #F8C471;
            --primary-light: #FDEBD0;
            --primary-dark: #E59866;
            --accent: #E67E22;
            --accent-soft: #FAD7A1;
            --bg: #FFF8F0;
            --white: #FFFFFF;
            --ink: #4A3B2C;
            --text-sec: #8B7A66;
            --danger: #E57373;
            --success: #5FA88D;
            --warning: #F4B886;
            --border-light: #F0E0D0;
            --shadow-sm: 0 6px 12px -4px rgba(230, 126, 34, 0.08);
            --shadow-md: 0 12px 28px -6px rgba(230, 126, 34, 0.12);
            --radius-card: 24px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            padding: 16px;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 0% 0%, rgba(248, 196, 113, 0.08), transparent 50%),
                        radial-gradient(circle at 100% 100%, rgba(230, 126, 34, 0.06), transparent 50%);
            pointer-events: none;
            z-index: -1;
        }
        .app-container { display: flex; gap: 20px; max-width: 1600px; margin: 0 auto; height: calc(100vh - 32px); }
        
        .doctors-sidebar {
            width: 280px;
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(12px);
            border-radius: var(--radius-card);
            padding: 20px 12px;
            border: 1px solid rgba(255,255,255,0.7);
            box-shadow: var(--shadow-md);
            display: none;
            flex-direction: column;
            overflow-y: auto;
            transition: all 0.3s;
        }
        .doctors-sidebar.show { display: flex; }
        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 8px 16px;
            border-bottom: 1px solid var(--border-light);
        }
        .sidebar-header h3 { font-size: 1.2rem; font-weight: 700; }
        .doctor-list { flex: 1; margin-top: 12px; }
        .doctor-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            margin-bottom: 6px;
            background: white;
            border-radius: 60px;
            cursor: pointer;
            border: 1px solid var(--border-light);
            transition: all 0.2s;
        }
        .doctor-item:hover { background: var(--primary-light); border-color: var(--primary); }
        .doctor-item.active { background: var(--primary); color: #4A3B2C; border-color: var(--primary); }
        .doctor-info { display: flex; align-items: center; gap: 12px; }
        .doctor-avatar {
            width: 40px; height: 40px; background: var(--accent-soft);
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; color: var(--ink);
        }
        .doctor-name { font-weight: 600; }
        .new-badge {
            background: var(--danger);
            color: white;
            border-radius: 30px;
            padding: 2px 10px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow: hidden;
        }
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 8px 20px;
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow: var(--shadow-sm);
        }
        .logo h2 { font-size: 1.6rem; font-weight: 800; color: var(--accent); }
        .btn {
            padding: 10px 18px; border-radius: 40px; border: none;
            font-weight: 600; font-family: 'Cairo', sans-serif; cursor: pointer;
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 0.9rem; transition: all 0.2s;
            background: white; color: var(--ink);
            border: 1px solid var(--border-light);
        }
        .btn-primary {
            background: var(--primary); color: #4A3B2C; border: none;
            box-shadow: 0 6px 14px rgba(230, 126, 34, 0.2);
        }
        .btn-icon { width: 44px; height: 44px; padding: 0; justify-content: center; }
        
        .new-prescriptions-strip {
            background: rgba(255,255,255,0.5);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 16px 20px;
            border: 1px solid var(--border-light);
        }
        .strip-title { font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .new-cards-container {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            padding-bottom: 8px;
        }
        .new-card {
            min-width: 220px;
            background: white;
            border-radius: 24px;
            padding: 16px;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .new-card:hover { transform: translateY(-4px); background: var(--primary-light); }
        .new-card .doc-name { font-weight: 700; color: var(--accent); }
        .new-card .patient-name { font-size: 1.1rem; font-weight: 700; margin: 8px 0 4px; }
        .new-card .time { font-size: 0.8rem; color: var(--text-sec); }

        .prescriptions-panel {
            flex: 1;
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(8px);
            border-radius: var(--radius-card);
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.7);
            box-shadow: var(--shadow-md);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .tabs { display: flex; gap: 8px; }
        .tab-btn {
            background: transparent;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-sec);
        }
        .tab-btn.active { background: white; color: var(--accent); box-shadow: var(--shadow-sm); }
        .rx-list { flex: 1; overflow-y: auto; }
        .rx-item-card {
            background: white;
            border-radius: 24px;
            padding: 18px 20px;
            margin-bottom: 12px;
            border: 1px solid var(--border-light);
            cursor: pointer;
            transition: all 0.15s;
            position: relative;
        }
        .rx-item-card:hover { background: var(--primary-light); border-color: var(--primary); }
        .rx-item-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .rx-patient { font-weight: 700; font-size: 1.1rem; }
        .rx-date { color: var(--text-sec); font-size: 0.8rem; }
        .rx-doctor { color: var(--accent); font-weight: 600; margin-bottom: 6px; }
        .rx-items-preview { color: var(--text-sec); font-size: 0.9rem; }
        .open-details-btn {
            position: absolute;
            top: 18px;
            left: 20px;
            background: var(--primary-light);
            border: none;
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 0.8rem;
            cursor: pointer;
            color: var(--ink);
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
            transition: 0.2s;
        }
        .open-details-btn:hover { background: var(--primary); }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(60, 40, 20, 0.25);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 16px;
        }
        .modal-card {
            background: white;
            border-radius: 40px;
            width: 100%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 30px 50px rgba(160, 100, 40, 0.2);
        }
        .modal-header {
            padding: 24px 28px;
            background: #FEF5EC;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-body { padding: 24px 28px; }
        .search-input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .search-input-group input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 20px;
            border: 1.5px solid var(--border-light);
            font-family: 'Cairo', sans-serif;
        }
        .search-result-item {
            padding: 12px;
            border-bottom: 1px solid var(--border-light);
            cursor: pointer;
        }
        .search-result-item:hover { background: var(--primary-light); }
        .toast {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            background: #4A3B2C; color: white; padding: 12px 24px;
            border-radius: 60px; text-align: center; z-index: 3000;
            max-width: 500px; margin: 0 auto;
        }
        .empty-state { text-align: center; padding: 40px; color: var(--text-sec); }
        .badge-pulse {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        @media (max-width: 800px) {
            .app-container { flex-direction: column; height: auto; }
            .doctors-sidebar { width: 100%; max-height: 250px; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="doctors-sidebar" id="doctorsSidebar">
        <div class="sidebar-header">
            <h3><i class="fas fa-user-md"></i> الأطباء</h3>
            <button class="btn btn-outline btn-icon" id="refreshDoctorsBtn"><i class="fas fa-sync-alt"></i></button>
        </div>
        <div class="doctor-list" id="doctorListContainer">
            <div class="empty-state">جاري التحميل...</div>
        </div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <div class="logo"><h2><i class="fas fa-pills" style="color:var(--primary);"></i> سُكُون · الصيدلي</h2></div>
            <div class="header-actions">
                <span id="welcomeMessage" style="font-weight:600;"></span>
                <button class="btn btn-outline" id="searchPatientBtn"><i class="fas fa-search"></i> بحث عن مريض</button>
                <button class="btn btn-outline btn-icon" id="toggleSidebarBtn" title="إظهار/إخفاء الأطباء"><i class="fas fa-user-md"></i></button>
                <button class="btn btn-outline" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> خروج</button>
            </div>
        </div>

        <div class="new-prescriptions-strip" id="newPrescriptionsStrip">
            <div class="strip-title"><i class="fas fa-clock"></i> روشتات جديدة في انتظار الصرف <span id="newTotalCount" class="new-badge" style="margin-right:8px;">0</span></div>
            <div class="new-cards-container" id="newCardsContainer"></div>
        </div>

        <div class="prescriptions-panel">
            <div class="panel-header">
                <h3 id="selectedDoctorTitle">اختر طبيباً من القائمة</h3>
                <div class="tabs">
                    <button class="tab-btn active" data-doctor-tab="لم تصرف بعد">جديدة</button>
                    <button class="tab-btn" data-doctor-tab="تم الصرف">مصروفة</button>
                </div>
            </div>
            <div class="rx-list" id="prescriptionsListContainer">
                <div class="empty-state">اختر طبيباً لعرض الروشتات</div>
            </div>
        </div>
    </div>
</div>

<div id="searchPatientModal" class="modal">
    <div class="modal-card">
        <div class="modal-header">
            <h3><i class="fas fa-search"></i> بحث عن مريض</h3>
            <button class="close-btn" id="closeSearchModalBtn">&times;</button>
        </div>
        <div class="modal-body">
            <div class="search-input-group">
                <input type="text" id="patientSearchInput" placeholder="اسم المريض أو رقم الهاتف">
                <button class="btn btn-primary" id="executeSearchBtn"><i class="fas fa-search"></i> بحث</button>
            </div>
            <div id="searchResultsContainer">
                <div class="empty-state">ابدأ البحث عن مريض</div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { firebaseConfig } from './firebase-config.js';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
    import { getDatabase, ref, onValue, update, get, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // ---------- الحالة ----------
    let currentUser = null;
    let pharmacistInfo = null;
    let doctorsList = [];
    let allPrescriptions = [];
    let patientsMap = {};                     // مفتاح patientId -> { name, phone }
    let itemsCountMap = {};                  // مفتاح prescriptionId -> عدد الأصناف
    let selectedDoctorId = null;
    let currentDoctorTab = 'لم تصرف بعد';
    let unsubscribePrescriptions = null;
    let unsubscribeDoctors = null;
    let unsubscribePatients = null;

    const PHARMACIST_STORAGE_KEY = 'pharmacist_selected_doctor';

    // ---------- عناصر DOM ----------
    const UI = {
        welcomeMessage: document.getElementById('welcomeMessage'),
        doctorsSidebar: document.getElementById('doctorsSidebar'),
        toggleSidebarBtn: document.getElementById('toggleSidebarBtn'),
        doctorListContainer: document.getElementById('doctorListContainer'),
        refreshDoctorsBtn: document.getElementById('refreshDoctorsBtn'),
        newCardsContainer: document.getElementById('newCardsContainer'),
        newTotalCount: document.getElementById('newTotalCount'),
        selectedDoctorTitle: document.getElementById('selectedDoctorTitle'),
        prescriptionsListContainer: document.getElementById('prescriptionsListContainer'),
        logoutBtn: document.getElementById('logoutBtn'),
        tabBtns: document.querySelectorAll('[data-doctor-tab]'),
        searchPatientBtn: document.getElementById('searchPatientBtn'),
        searchPatientModal: document.getElementById('searchPatientModal'),
        closeSearchModalBtn: document.getElementById('closeSearchModalBtn'),
        patientSearchInput: document.getElementById('patientSearchInput'),
        executeSearchBtn: document.getElementById('executeSearchBtn'),
        searchResultsContainer: document.getElementById('searchResultsContainer')
    };

    function showToast(msg, isErr = false) {
        const t = document.createElement('div');
        t.className = 'toast';
        t.style.background = isErr ? '#B23B3B' : '#4A3B2C';
        t.innerHTML = `<i class="fas ${isErr ? 'fa-exclamation-triangle' : 'fa-check'}"></i> ${msg}`;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m] || m);
    }

    function saveSelectedDoctor() {
        if (selectedDoctorId) localStorage.setItem(PHARMACIST_STORAGE_KEY, selectedDoctorId);
    }

    function loadSavedDoctor() {
        return localStorage.getItem(PHARMACIST_STORAGE_KEY);
    }

    async function loadPharmacistData(user) {
        try {
            const snap = await get(ref(db, `users/${user.uid}`));
            if (!snap.exists()) {
                showToast('بيانات الصيدلي غير موجودة.', true);
                return false;
            }
            const data = snap.val();
            if (data.role !== 'pharmacist') {
                showToast('هذا الحساب ليس حساب صيدلي.', true);
                return false;
            }
            pharmacistInfo = data;
            UI.welcomeMessage.textContent = `أهلاً، ${pharmacistInfo.name || 'صيدلي'}`;
            return true;
        } catch (err) {
            showToast('فشل تحميل البيانات', true);
            return false;
        }
    }

    function loadDoctors() {
        const usersRef = ref(db, 'users');
        if (unsubscribeDoctors) unsubscribeDoctors();
        unsubscribeDoctors = onValue(usersRef, (snap) => {
            const docs = [];
            snap.forEach(child => {
                const user = child.val();
                if (user.role === 'doctor') {
                    docs.push({ id: child.key, ...user });
                }
            });
            doctorsList = docs;
            renderDoctorsList();
            renderNewPrescriptionsStrip();
        });
    }

    function renderDoctorsList() {
        if (doctorsList.length === 0) {
            UI.doctorListContainer.innerHTML = '<div class="empty-state">لا يوجد أطباء</div>';
            return;
        }
        let html = '';
        doctorsList.forEach(doc => {
            const pendingCount = allPrescriptions.filter(p => p.doctor_id === doc.id && p.status === 'لم تصرف بعد').length;
            html += `
                <div class="doctor-item ${selectedDoctorId === doc.id ? 'active' : ''}" data-doctor-id="${doc.id}">
                    <div class="doctor-info">
                        <div class="doctor-avatar"><i class="fas fa-user-md"></i></div>
                        <span class="doctor-name">د. ${escapeHtml(doc.name || '---')}</span>
                    </div>
                    ${pendingCount > 0 ? `<span class="new-badge badge-pulse">${pendingCount}</span>` : ''}
                </div>
            `;
        });
        UI.doctorListContainer.innerHTML = html;
        document.querySelectorAll('.doctor-item').forEach(el => {
            el.addEventListener('click', () => {
                const docId = el.dataset.doctorId;
                selectedDoctorId = docId;
                saveSelectedDoctor();
                renderDoctorsList();
                updateSelectedDoctorTitle();
                renderPrescriptionsForDoctor();
            });
        });
    }

    function updateSelectedDoctorTitle() {
        const doc = doctorsList.find(d => d.id === selectedDoctorId);
        if (doc) {
            const pendingCount = allPrescriptions.filter(p => p.doctor_id === doc.id && p.status === 'لم تصرف بعد').length;
            UI.selectedDoctorTitle.innerHTML = `روشتات د. ${escapeHtml(doc.name)} ${pendingCount > 0 ? `<span class="new-badge badge-pulse" style="margin-right:8px;">${pendingCount} جديدة</span>` : ''}`;
        } else {
            UI.selectedDoctorTitle.textContent = 'اختر طبيباً من القائمة';
        }
    }

    async function loadItemsCountForPrescriptions(prescriptionIds) {
        // جلب عدد العناصر لكل وصفة من prescription_items
        const updates = {};
        const promises = prescriptionIds.map(async (pid) => {
            const snap = await get(ref(db, `prescription_items/${pid}`));
            let count = 0;
            if (snap.exists()) {
                count = Object.keys(snap.val()).length;
            }
            updates[pid] = count;
        });
        await Promise.all(promises);
        return updates;
    }

    async function refreshItemsCount() {
        const ids = allPrescriptions.map(p => p.id);
        const newCounts = await loadItemsCountForPrescriptions(ids);
        itemsCountMap = { ...itemsCountMap, ...newCounts };
    }

    function loadAllPrescriptions() {
        const presRef = ref(db, 'prescriptions');
        if (unsubscribePrescriptions) unsubscribePrescriptions();
        unsubscribePrescriptions = onValue(presRef, async (snap) => {
            const prescriptions = [];
            snap.forEach(child => {
                prescriptions.push({ id: child.key, ...child.val() });
            });
            allPrescriptions = prescriptions;
            await refreshItemsCount();           // تحديث عدد الأصناف بعد تحميل الوصفات
            renderNewPrescriptionsStrip();
            renderDoctorsList();
            if (selectedDoctorId) {
                updateSelectedDoctorTitle();
                renderPrescriptionsForDoctor();
            }
        });
    }

    function getPatientName(patientId) {
        return patientsMap[patientId]?.name || '';
    }

    function renderNewPrescriptionsStrip() {
        const newPrescriptions = allPrescriptions.filter(p => p.status === 'لم تصرف بعد');
        UI.newTotalCount.textContent = newPrescriptions.length;
        if (newPrescriptions.length === 0) {
            UI.newCardsContainer.innerHTML = '<div class="empty-state" style="padding:20px;">لا توجد روشتات جديدة</div>';
            return;
        }
        newPrescriptions.sort((a, b) => (b.created_at || '').localeCompare(a.created_at || ''));
        let html = '';
        newPrescriptions.slice(0, 15).forEach(p => {
            const doctor = doctorsList.find(d => d.id === p.doctor_id) || { name: 'غير معروف' };
            const patientName = getPatientName(p.patient_id) || 'مريض غير مسجل';
            html += `
                <div class="new-card" data-prescription-id="${p.id}">
                    <div class="doc-name"><i class="fas fa-user-md"></i> د. ${escapeHtml(doctor.name)}</div>
                    <div class="patient-name">${escapeHtml(patientName)}</div>
                    <div class="time"><i class="far fa-calendar"></i> ${p.created_at ? new Date(p.created_at).toLocaleDateString('ar-EG') : ''}</div>
                </div>
            `;
        });
        UI.newCardsContainer.innerHTML = html;
        document.querySelectorAll('.new-card').forEach(card => {
            card.addEventListener('click', () => {
                openPrescriptionInNewPage(card.dataset.prescriptionId);
            });
        });
    }

    function renderPrescriptionsForDoctor() {
        if (!selectedDoctorId) {
            UI.prescriptionsListContainer.innerHTML = '<div class="empty-state">اختر طبيباً لعرض الروشتات</div>';
            return;
        }
        const tabStatus = currentDoctorTab;
        const filtered = allPrescriptions.filter(p => p.doctor_id === selectedDoctorId && p.status === tabStatus);
        if (filtered.length === 0) {
            UI.prescriptionsListContainer.innerHTML = `<div class="empty-state">لا توجد روشتات ${tabStatus === 'لم تصرف بعد' ? 'جديدة' : 'مصروفة'}</div>`;
            return;
        }
        filtered.sort((a,b) => (b.created_at || '').localeCompare(a.created_at || ''));
        let html = '';
        filtered.forEach(p => {
            const doctor = doctorsList.find(d => d.id === p.doctor_id) || { name: '' };
            const patientName = getPatientName(p.patient_id) || 'مريض';
            const itemCount = itemsCountMap[p.id] || 0;
            html += `
                <div class="rx-item-card" data-prescription-id="${p.id}">
                    <div class="rx-item-header">
                        <span class="rx-patient">${escapeHtml(patientName)}</span>
                        <span class="rx-date">${p.created_at ? new Date(p.created_at).toLocaleDateString('ar-EG') : ''}</span>
                    </div>
                    <div class="rx-doctor">د. ${escapeHtml(doctor.name)}</div>
                    <div class="rx-items-preview">${itemCount} أصناف دوائية</div>
                    ${p.diagnosis ? `<div style="font-size:0.85rem; color: var(--text-sec); margin-top:4px;"><i class="fas fa-notes-medical"></i> ${escapeHtml(p.diagnosis.substring(0, 60))}${p.diagnosis.length > 60 ? '...' : ''}</div>` : ''}
                    ${p.status === 'تم الصرف' ? `<div style="color: var(--success); font-weight:600; margin-top:6px;"><i class="fas fa-check-circle"></i> تم الصرف بواسطة: ${escapeHtml(p.pharmacist_name || '')} - ${p.dispensed_at ? new Date(p.dispensed_at).toLocaleString('ar-EG') : ''}</div>` : ''}
                    <button class="open-details-btn" data-prescription-id="${p.id}"><i class="fas fa-external-link-alt"></i> عرض التفاصيل</button>
                </div>
            `;
        });
        UI.prescriptionsListContainer.innerHTML = html;
        document.querySelectorAll('.rx-item-card').forEach(card => {
            card.addEventListener('click', (e) => {
                if (e.target.closest('.open-details-btn')) return;
                openPrescriptionInNewPage(card.dataset.prescriptionId);
            });
        });
        document.querySelectorAll('.open-details-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                openPrescriptionInNewPage(btn.dataset.prescriptionId);
            });
        });
    }

    function openPrescriptionInNewPage(prescriptionId) {
        if (!prescriptionId) return;
        window.open(`prescription-details.html?id=${prescriptionId}`, '_blank');
    }

    // ---------- تحميل بيانات المرضى ----------
    function loadPatients() {
        const patientsRef = ref(db, 'patients');
        if (unsubscribePatients) unsubscribePatients();
        unsubscribePatients = onValue(patientsRef, (snap) => {
            const map = {};
            snap.forEach(child => {
                map[child.key] = child.val();
            });
            patientsMap = map;
        });
    }

    // ---------- البحث عن مريض ----------
    function openSearchModal() {
        UI.searchPatientModal.style.display = 'flex';
        UI.patientSearchInput.value = '';
        UI.searchResultsContainer.innerHTML = '<div class="empty-state">ابدأ البحث عن مريض</div>';
        UI.patientSearchInput.focus();
    }

    function closeSearchModal() {
        UI.searchPatientModal.style.display = 'none';
    }

    async function searchPatients() {
        const term = UI.patientSearchInput.value.trim();
        if (!term) {
            showToast('الرجاء إدخال اسم أو رقم هاتف', true);
            return;
        }

        UI.searchResultsContainer.innerHTML = '<div class="empty-state"><i class="fas fa-spinner fa-pulse"></i> جاري البحث...</div>';
        const lowerTerm = term.toLowerCase();

        // 1. البحث في patientsMap المحلي
        let results = [];
        for (const [id, p] of Object.entries(patientsMap)) {
            const nameMatch = p.name && p.name.toLowerCase().includes(lowerTerm);
            const phoneMatch = p.phone && p.phone.includes(term);
            if (nameMatch || phoneMatch) {
                results.push({ id, name: p.name, phone: p.phone || '' });
            }
        }

        // 2. إذا لم توجد نتائج، ابحث في prescriptions
        if (results.length === 0) {
            const seen = new Set();
            for (const p of allPrescriptions) {
                const patientId = p.patient_id;
                if (!patientId || seen.has(patientId)) continue;
                const patientName = getPatientName(patientId) || '';
                const nameMatch = patientName.toLowerCase().includes(lowerTerm);
                if (nameMatch) {
                    seen.add(patientId);
                    results.push({ id: patientId, name: patientName, phone: '' });
                }
            }
        }

        if (results.length === 0) {
            UI.searchResultsContainer.innerHTML = '<div class="empty-state">لا توجد نتائج مطابقة</div>';
            return;
        }

        let html = '';
        results.forEach(patient => {
            html += `
                <div class="search-result-item" data-patient-id="${patient.id}" data-patient-name="${escapeHtml(patient.name || '')}">
                    <strong>${escapeHtml(patient.name || 'بدون اسم')}</strong>
                    ${patient.phone ? ` - ${escapeHtml(patient.phone)}` : ''}
                </div>
            `;
        });
        UI.searchResultsContainer.innerHTML = html;

        document.querySelectorAll('.search-result-item').forEach(item => {
            item.addEventListener('click', () => {
                const pid = item.dataset.patientId;
                const pname = item.dataset.patientName;
                window.location.href = `detail.html?patientId=${pid}&patientName=${encodeURIComponent(pname)}`;
            });
        });
    }

    // ---------- ربط الأحداث ----------
    UI.searchPatientBtn.addEventListener('click', openSearchModal);
    UI.closeSearchModalBtn.addEventListener('click', closeSearchModal);
    UI.searchPatientModal.addEventListener('click', (e) => {
        if (e.target === UI.searchPatientModal) closeSearchModal();
    });
    UI.executeSearchBtn.addEventListener('click', searchPatients);
    UI.patientSearchInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') searchPatients();
    });

    UI.toggleSidebarBtn.addEventListener('click', () => {
        UI.doctorsSidebar.classList.toggle('show');
    });

    UI.refreshDoctorsBtn.addEventListener('click', () => {
        showToast('تم تحديث قائمة الأطباء');
    });

    UI.tabBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            UI.tabBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentDoctorTab = btn.dataset.doctorTab;
            renderPrescriptionsForDoctor();
        });
    });

    UI.logoutBtn.addEventListener('click', async () => {
        if (unsubscribePrescriptions) unsubscribePrescriptions();
        if (unsubscribeDoctors) unsubscribeDoctors();
        if (unsubscribePatients) unsubscribePatients();
        sessionStorage.clear();
        window.location.href = 'index.html';
    });

    // ---------- بدء التشغيل ----------
    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = 'index.html';
            return;
        }
        currentUser = user;
        const valid = await loadPharmacistData(user);
        if (!valid) {
            UI.welcomeMessage.textContent = 'خطأ في تحميل البيانات';
            return;
        }
        const savedDoctorId = loadSavedDoctor();
        if (savedDoctorId) {
            selectedDoctorId = savedDoctorId;
        }
        loadDoctors();
        loadAllPrescriptions();
        loadPatients();                    // تحميل المرضى واستماع دائم
    });
</script>
</body>
</html>
