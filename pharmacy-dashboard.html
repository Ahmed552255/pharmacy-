    <!-- مودال البحث عن مريض -->
    <div id="searchModal" class="modal">
        <div class="modal-card">
            <div class="modal-header">
                <h3><i class="fas fa-search"></i> بحث عن مريض</h3>
                <button class="close-btn" id="closeSearchBtn">&times;</button>
            </div>
            <div class="modal-body">
                <div id="phoneSearchSection">
                    <div class="form-group search-box">
                        <label>البحث عن مريض (برقم الهاتف)</label>
                        <input type="text" id="patientSearchInput" class="form-control" placeholder="أدخل رقم الهاتف للبحث..." autocomplete="off" dir="ltr">
                        <div id="searchResults" class="search-results"></div>
                    </div>
                </div>
                
                <div id="villageSearchSection" style="display:none;">
                    <div class="form-group">
                        <div class="toggle-id-container">
                            <label>بيانات القرية</label>
                            <button type="button" class="btn-toggle-id" id="togglePhoneModeBtn">
                                <i class="fas fa-mobile-alt"></i> استخدام رقم الهاتف
                            </button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>اسم الأب</label>
                        <input type="text" id="villageFatherName" class="form-control" placeholder="اسم الأب">
                    </div>
                    <div class="form-group">
                        <label>اسم العائلة</label>
                        <input type="text" id="villageFamilyName" class="form-control" placeholder="اسم العائلة">
                    </div>
                    <div class="form-group">
                        <label>اسم القرية</label>
                        <input type="text" id="villageNameInput" class="form-control" placeholder="اسم القرية">
                    </div>
                    <div id="villageSearchResults" class="search-results" style="position:relative;margin-top:8px;"></div>
                </div>

                <div class="form-group" style="margin-top:12px;">
                    <button type="button" class="btn-toggle-id" id="toggleToVillageBtn" style="width:100%;">
                        <i class="fas fa-tree"></i> استخدام بيانات القرية للبحث
                    </button>
                </div>

                <div id="patientHistoryContainer" style="margin-top:14px;"></div>
                <div class="keyboard-scroll-spacer"></div>
            </div>
        </div>
    </div>

    <!-- ✅ منطقة الطباعة المخفية -->
    <div id="printArea" style="display:none;"></div>

    <!-- ✅ دالة التنقل لشريط الأيقونات العلوي -->
    <script>
        function navigateTo(page) {
            // تحديث الكلاس النشط
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            
            // يمكنك تخصيص الروابط حسب الحاجة
            const pages = {
                'home': 'pharmacist-dashboard.html',
                'ad': 'advertisements.html',
                'consult': 'quick-consult.html',
                'missing': 'missing-medicine.html',
                'interaction': 'drug-interactions.html'
            };
            
            // إضافة كلاس نشط للزر المناسب
            const activeBtn = document.querySelector(`.nav-item.${page}-nav`) || document.querySelector('.nav-item.home-nav');
            if (activeBtn) activeBtn.classList.add('active');
            
            // التنقل للصفحة المطلوبة
            if (pages[page] && page !== 'home') {
                window.location.href = pages[page];
            }
        }
        
        // تعيين المنزل كنشط افتراضياً
        document.addEventListener('DOMContentLoaded', () => {
            const homeBtn = document.querySelector('.nav-item.home-nav');
            if (homeBtn) homeBtn.classList.add('active');
        });
    </script>

    <script type="module">
        import { firebaseConfig } from './firebase-config.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, onValue, get, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const STORAGE_PREFIX = 'shifa_tenant_';
        
        const LOGIN_STORAGE_KEYS = [
            'shifa_session',
            'shifa_remember',
            'shifa_last_login',
            'shifa_secure_session'
        ];
        
        let currentTenantId = null;
        
        const getTenantStorageKey = (baseKey) => {
            return currentTenantId ? `${STORAGE_PREFIX}${currentTenantId}_${baseKey}` : baseKey;
        };

        const state = {
            currentUser: null,
            pharmacistData: null,
            doctorsList: [],
            selectedDoctorId: null,
            allPrescriptions: [],
            currentTab: 'لم تصرف بعد',
            unsubscribePrescriptions: null,
            searchMode: 'phone',
            currentViewPrescription: null,
            currentViewItems: [],
        };

        const $ = (sel) => document.querySelector(sel);
        const $$ = (sel) => document.querySelectorAll(sel);

        const getToday = () => {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        };

        const escapeHtml = (str) => {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        };

        const showToast = (msg, isError = false) => {
            const container = $('#toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${isError ? 'err' : ''}`;
            toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i> ${msg}`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('removing');
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        };

        const setSyncStatus = (online) => {
            const dot = $('#syncDot');
            if (dot) {
                dot.className = `sync-dot ${online ? 'on' : 'off'}`;
                dot.title = online ? 'متصل بالسحابة' : 'غير متصل';
            }
        };

        const clearLoginSessionOnly = () => {
            try {
                LOGIN_STORAGE_KEYS.forEach(key => localStorage.removeItem(key));
                const sessionKeysToRemove = [];
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (key && (key.startsWith('shifa_session') || key.startsWith('shifa_secure'))) {
                        sessionKeysToRemove.push(key);
                    }
                }
                sessionKeysToRemove.forEach(key => localStorage.removeItem(key));
                sessionStorage.clear();
            } catch (e) {}
        };

        // ============ التخزين المحلي للمرضى ============
        const getLocalPatientsKey = () => getTenantStorageKey('pharmacist_patients');
        
        const savePatientToLocal = (patientId, patientData) => {
            if (!currentTenantId) return;
            try {
                const key = getLocalPatientsKey();
                const cached = JSON.parse(localStorage.getItem(key) || '{}');
                if (!cached.patients) cached.patients = {};
                cached.patients[patientId] = { ...patientData, _cachedAt: Date.now() };
                localStorage.setItem(key, JSON.stringify(cached));
            } catch (e) {}
        };

        const searchPatientsLocal = (phone) => {
            if (!currentTenantId) return [];
            try {
                const key = getLocalPatientsKey();
                const cached = localStorage.getItem(key);
                if (!cached) return [];
                const data = JSON.parse(cached);
                if (!data.patients) return [];
                const now = Date.now();
                const expiryMs = 50 * 24 * 60 * 60 * 1000;
                const t = phone.trim();
                return Object.entries(data.patients)
                    .filter(([id, p]) => (now - p._cachedAt) < expiryMs && p.phone && p.phone.includes(t))
                    .map(([id, p]) => ({ id, ...p }));
            } catch (e) { return []; }
        };

        const searchPatientsLocalByVillage = (fatherName, familyName, villageName) => {
            if (!currentTenantId) return [];
            try {
                const key = getLocalPatientsKey();
                const cached = localStorage.getItem(key);
                if (!cached) return [];
                const data = JSON.parse(cached);
                if (!data.patients) return [];
                const now = Date.now();
                const expiryMs = 50 * 24 * 60 * 60 * 1000;
                return Object.entries(data.patients)
                    .filter(([id, p]) => {
                        const isFresh = (now - p._cachedAt) < expiryMs;
                        const matchFather = !fatherName || (p.father_name && p.father_name.includes(fatherName));
                        const matchFamily = !familyName || (p.family_name && p.family_name.includes(familyName));
                        const matchVillage = !villageName || (p.village_name && p.village_name.includes(villageName));
                        return isFresh && matchFather && matchFamily && matchVillage;
                    })
                    .map(([id, p]) => ({ id, ...p }));
            } catch (e) { return []; }
        };

        // ============ تحميل بيانات الصيدلي ============
        const loadPharmacistData = async (uid) => {
            try {
                const tenantsSnap = await get(ref(db, 'tenants'));
                if (tenantsSnap.exists()) {
                    const tenants = tenantsSnap.val();
                    for (const tenantId of Object.keys(tenants)) {
                        const userSnap = await get(ref(db, `tenants/${tenantId}/users/${uid}`));
                        if (userSnap.exists()) {
                            const userData = userSnap.val();
                            if (userData.role === 'pharmacist') {
                                currentTenantId = tenantId;
                                state.pharmacistData = { id: uid, ...userData };
                                const tenantName = tenants[tenantId]?.name || tenants[tenantId]?.tenantName || 'المجمع الطبي';
                                state.pharmacistData.tenantName = tenantName;
                                $('#welcomeMsg').textContent = `أهلاً، ${state.pharmacistData.name || 'صيدلي'}`;
                                $('#tenantName').textContent = tenantName;
                                return true;
                            }
                        }
                    }
                }
                const oldSnap = await get(ref(db, `users/${uid}`));
                if (oldSnap.exists() && oldSnap.val().role === 'pharmacist') {
                    currentTenantId = uid;
                    state.pharmacistData = { id: uid, ...oldSnap.val() };
                    $('#welcomeMsg').textContent = `أهلاً، ${state.pharmacistData.name || 'صيدلي'}`;
                    return true;
                }
                showToast('هذا الحساب ليس حساب صيدلي', true);
                return false;
            } catch (err) {
                showToast('خطأ في تحميل البيانات', true);
                return false;
            }
        };

        const loadDoctors = () => {
            if (!currentTenantId) return;
            const usersRef = ref(db, `tenants/${currentTenantId}/users`);
            onValue(usersRef, (snap) => {
                const doctors = [];
                snap.forEach(child => {
                    const user = child.val();
                    if (user.role === 'doctor') doctors.push({ id: child.key, ...user });
                });
                state.doctorsList = doctors;
                if (state.selectedDoctorId && !doctors.find(d => d.id === state.selectedDoctorId)) {
                    state.selectedDoctorId = null;
                    localStorage.removeItem(getTenantStorageKey('selected_doctor'));
                }
                renderDoctorsStrip();
                updateCounts();
                renderCards();
            }, (error) => { setSyncStatus(false); });
        };

        const loadPrescriptions = () => {
            if (!currentTenantId) return;
            if (state.unsubscribePrescriptions) state.unsubscribePrescriptions();
            const presRef = ref(db, `tenants/${currentTenantId}/prescriptions`);
            state.unsubscribePrescriptions = onValue(presRef, (snap) => {
                const prescriptions = [];
                snap.forEach(child => {
                    prescriptions.push({ id: child.key, ...child.val() });
                });
                state.allPrescriptions = prescriptions;
                setSyncStatus(true);
                updateCounts();
                renderCards();
                renderDoctorsStrip();
            }, (error) => { setSyncStatus(false); });
        };

        const renderDoctorsStrip = () => {
            const container = $('#doctorStripContainer');
            if (state.doctorsList.length === 0) {
                container.innerHTML = '<div style="padding:10px;color:var(--text-sec);text-align:center;width:100%;">لا يوجد أطباء مسجلين</div>';
                return;
            }
            container.innerHTML = state.doctorsList.map(doc => {
                const pendingCount = state.allPrescriptions.filter(p => p.doctor_id === doc.id && p.status === 'لم تصرف بعد').length;
                return `
                    <div class="doctor-pill ${state.selectedDoctorId === doc.id ? 'active' : ''}" data-id="${doc.id}">
                        <div class="pill-avatar"><i class="fas fa-user-md"></i></div>
                        <span>د. ${escapeHtml(doc.name || '---')}</span>
                        ${pendingCount > 0 ? `<span class="pill-badge">${pendingCount}</span>` : ''}
                    </div>`;
            }).join('');
            container.querySelectorAll('.doctor-pill').forEach(pill => {
                pill.addEventListener('click', () => {
                    state.selectedDoctorId = pill.dataset.id;
                    localStorage.setItem(getTenantStorageKey('selected_doctor'), state.selectedDoctorId);
                    renderDoctorsStrip();
                    updateCounts();
                    renderCards();
                    pill.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                });
            });
        };

        const updateCounts = () => {
            let pendingCount = 0, dispensedCount = 0;
            const filtered = state.selectedDoctorId 
                ? state.allPrescriptions.filter(p => p.doctor_id === state.selectedDoctorId)
                : state.allPrescriptions;
            filtered.forEach(p => {
                if (p.status === 'لم تصرف بعد') pendingCount++;
                else if ((p.status === 'تم الصرف' || p.status === 'صرفت جزئياً') && p.dispensed_at && p.dispensed_at.startsWith(getToday())) {
                    dispensedCount++;
                }
            });
            $('#countPending').textContent = pendingCount;
            $('#countDispensed').textContent = dispensedCount;
        };

        const openPrescriptionDetails = (prescription) => {
            if (!prescription) return;
            const doctor = state.doctorsList.find(d => d.id === prescription.doctor_id);
            const doctorName = doctor ? doctor.name : '';
            const params = new URLSearchParams();
            params.set('id', prescription.id);
            params.set('tenant', currentTenantId || '');
            if (prescription.patient_id) params.set('patientId', prescription.patient_id);
            if (prescription.patient_name) params.set('patientName', prescription.patient_name);
            if (prescription.doctor_id) params.set('doctorId', prescription.doctor_id);
            if (doctorName) params.set('doctorName', doctorName);
            window.location.href = `prescription-details.html?${params.toString()}`;
        };

        // ============ ✅ دالة طباعة الروشتة ============
        const printPrescription = async (prescription, items) => {
            const doctor = state.doctorsList.find(d => d.id === prescription.doctor_id);
            const doctorName = doctor ? doctor.name : 'طبيب';
            const patientName = prescription.patient_name || 'مريض';
            const patientAge = prescription.age || '';
            const tenantName = state.pharmacistData?.tenantName || 'المجمع الطبي';
            const diagnosis = prescription.diagnosis || '';
            
            const formLabels = { 'tablet': 'أقراص', 'syrup': 'شراب', 'injection': 'حقن', 'suppository': 'لبوس', 'drops': 'نقط' };
            
            const printArea = $('#printArea');
            printArea.innerHTML = `
                <div style="font-family:'Cairo',sans-serif;direction:rtl;max-width:800px;margin:0 auto;">
                    <div class="print-header">
                        <h2>🩺 روشتة طبية</h2>
                        <div class="clinic-name">${escapeHtml(tenantName)}</div>
                    </div>
                    
                    <div class="print-patient-info">
                        <div class="info-line">
                            <span class="info-label">👤 اسم المريض:</span>
                            <span class="info-value">${escapeHtml(patientName)}</span>
                        </div>
                        ${patientAge ? `
                        <div class="info-line">
                            <span class="info-label">🎂 العمر:</span>
                            <span class="info-value">${escapeHtml(patientAge)} سنة</span>
                        </div>` : ''}
                        <div class="info-line">
                            <span class="info-label">👨‍⚕️ الطبيب:</span>
                            <span class="info-value">د. ${escapeHtml(doctorName)}</span>
                        </div>
                        ${diagnosis ? `
                        <div class="info-line">
                            <span class="info-label">📋 التشخيص:</span>
                            <span class="info-value">${escapeHtml(diagnosis)}</span>
                        </div>` : ''}
                        <div class="info-line">
                            <span class="info-label">📅 التاريخ:</span>
                            <span class="info-value">${new Date().toLocaleDateString('ar-EG', { year: 'numeric', month: 'long', day: 'numeric' })}</span>
                        </div>
                    </div>
                    
                    ${items.length > 0 ? `
                    <table class="print-meds-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>الدواء</th>
                                <th>الشكل</th>
                                <th>الجرعة</th>
                                <th>الاستخدام</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${items.map((item, i) => `
                            <tr>
                                <td>${i + 1}</td>
                                <td><b>${escapeHtml(item.drug_name || '---')}</b></td>
                                <td>${formLabels[item.form] || item.form || '---'}</td>
                                <td>${escapeHtml(item.dose || '---')}</td>
                                <td>${escapeHtml(item.usage || item.directions || 'حسب الإرشادات')}</td>
                            </tr>`).join('')}
                        </tbody>
                    </table>` : '<p style="text-align:center;color:#999;">لا توجد أدوية مسجلة</p>'}
                    
                    <div class="print-footer">
                        <p>تم الصرف بواسطة: ${escapeHtml(state.pharmacistData?.name || 'صيدلي')}</p>
                        <p>${escapeHtml(tenantName)} © ${new Date().getFullYear()}</p>
                    </div>
                </div>
            `;
            
            setTimeout(() => {
                window.print();
                printArea.innerHTML = '';
            }, 300);
        };

        // ============ ✅ فتح مودال عرض الأدوية ============
        const openViewMedsModal = async (prescription) => {
            state.currentViewPrescription = prescription;
            
            let items = [];
            try {
                const itemsSnap = await get(ref(db, `tenants/${currentTenantId}/prescription_items/${prescription.id}`));
                if (itemsSnap.exists()) items = Object.values(itemsSnap.val());
            } catch (e) {}
            
            state.currentViewItems = items;
            
            const doctor = state.doctorsList.find(d => d.id === prescription.doctor_id);
            const doctorName = doctor ? doctor.name : 'طبيب';
            const patientName = prescription.patient_name || 'مريض';
            const patientAge = prescription.age || '';
            const tenantName = state.pharmacistData?.tenantName || 'المجمع الطبي';
            const diagnosis = prescription.diagnosis || '';
            
            $('#viewMedsHeaderInfo').innerHTML = `
                <div class="info-row">
                    <span class="info-label">👤 المريض:</span>
                    <span class="info-value">${escapeHtml(patientName)}</span>
                </div>
                ${patientAge ? `
                <div class="info-row">
                    <span class="info-label">🎂 العمر:</span>
                    <span class="info-value">${escapeHtml(patientAge)} سنة</span>
                </div>` : ''}
                <div class="info-row">
                    <span class="info-label">👨‍⚕️ الطبيب:</span>
                    <span class="info-value">د. ${escapeHtml(doctorName)}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">🏥 المجمع:</span>
                    <span class="info-value">${escapeHtml(tenantName)}</span>
                </div>
                ${diagnosis ? `
                <div class="info-row">
                    <span class="info-label">📋 التشخيص:</span>
                    <span class="info-value">${escapeHtml(diagnosis)}</span>
                </div>` : ''}
            `;
            
            const formLabels = { 'tablet': '💊 أقراص', 'syrup': '🥄 شراب', 'injection': '💉 حقن', 'suppository': '🧴 لبوس', 'drops': '💧 نقط' };
            
            $('#viewMedsItemsList').innerHTML = items.length === 0 
                ? '<div style="color:var(--text-sec);text-align:center;padding:20px;">لا توجد أدوية مسجلة في هذه الوصفة</div>'
                : items.map((item, i) => `
                    <div class="meds-item">
                        <div class="med-number">${i + 1}</div>
                        <div class="med-info">
                            <div class="med-name">${escapeHtml(item.drug_name || 'دواء')}</div>
                            <div class="med-details">${formLabels[item.form] || item.form || ''} - ${escapeHtml(item.dose || '')}</div>
                            ${item.usage || item.directions ? `<div class="med-usage">📝 ${escapeHtml(item.usage || item.directions)}</div>` : ''}
                        </div>
                    </div>
                `).join('');
            
            $('#viewMedsModal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        };

        const closeViewMedsModal = () => {
            $('#viewMedsModal').style.display = 'none';
            document.body.style.overflow = '';
        };

        // ============ عرض البطاقات ============
        const renderCards = () => {
            const grid = $('#prescriptionsGrid');
            
            if (!state.selectedDoctorId) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-hand-point-up"></i>
                        <h3>اختر طبيباً من القائمة أعلاه</h3>
                        <p>ستظهر الوصفات الطبية هنا</p>
                    </div>`;
                return;
            }
            
            let filtered = state.allPrescriptions.filter(p => p.doctor_id === state.selectedDoctorId);
            
            if (state.currentTab === 'لم تصرف بعد') {
                filtered = filtered.filter(p => p.status === 'لم تصرف بعد');
            } else {
                filtered = filtered.filter(
                    p => (p.status === 'تم الصرف' || p.status === 'صرفت جزئياً') &&
                    p.dispensed_at && p.dispensed_at.startsWith(getToday())
                );
            }
            
            filtered.sort((a, b) => (b.created_at || '').localeCompare(a.created_at || ''));
            
            if (filtered.length === 0) {
                const msg = state.currentTab === 'لم تصرف بعد' ? 'لا توجد وصفات جديدة' : 'لا توجد وصفات مصروفة اليوم';
                const icon = state.currentTab === 'لم تصرف بعد' ? 'fa-clock' : 'fa-check-circle';
                grid.innerHTML = `
                    <div class="empty-state">
                        <i class="fas ${icon}"></i>
                        <h3>${msg}</h3>
                        <p>${state.currentTab === 'لم تصرف بعد' ? 'كل الوصفات تم صرفها ✓' : 'لم يتم صرف أي وصفة اليوم'}</p>
                    </div>`;
                return;
            }
            
            grid.innerHTML = filtered.map(p => {
                const doctor = state.doctorsList.find(d => d.id === p.doctor_id);
                const doctorName = doctor ? doctor.name : 'طبيب';
                const patientName = p.patient_name || 'مريض';
                const itemCount = p.item_count || 0;
                const diagnosis = p.diagnosis || '';
                const patientPhone = p.phone || '';
                const patientAge = p.age || '';
                const dateStr = p.created_at ? new Date(p.created_at).toLocaleDateString('ar-EG', { year: 'numeric', month: 'long', day: 'numeric' }) : '';
                const timeStr = p.created_at ? new Date(p.created_at).toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' }) : '';
                
                const isPending = p.status === 'لم تصرف بعد';
                const isDispensed = p.status === 'تم الصرف';
                const isPartial = p.status === 'صرفت جزئياً';
                
                const cardClass = isPending ? 'pending-card' : isDispensed ? 'dispensed-card' : 'partial-card';
                const avatarClass = isPending ? 'avatar-pending' : isDispensed ? 'avatar-dispensed' : 'avatar-partial';
                const dotClass = isPending ? 'dot-pending' : isDispensed ? 'dot-dispensed' : 'dot-partial';
                
                const statusText = isPending ? '⏳ جديد' : isDispensed ? '✅ تم الصرف' : '📦 جزئي';
                const statusBg = isPending ? '#FFF3E0' : isDispensed ? '#E8F5E9' : '#E3F2FD';
                const statusColor = isPending ? '#E65100' : isDispensed ? '#2E7D32' : '#1565C0';
                
                let extraInfo = '';
                if (!isPending) {
                    const pharmacistName = p.pharmacist_name || '';
                    const dispensedDate = p.dispensed_at ? new Date(p.dispensed_at).toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' }) : '';
                    extraInfo = `
                        <div class="rx-card-info-row">
                            <i class="fas fa-user-check"></i>
                            <span>صرف: <strong>${escapeHtml(pharmacistName)}</strong> - ${dispensedDate}</span>
                        </div>`;
                }
                
                let cardButtons = '';
                if (isPending) {
                    cardButtons = `
                        <button class="rx-card-action-btn" data-action="dispense" data-id="${p.id}">
                            <i class="fas fa-check"></i> صرف
                        </button>`;
                } else {
                    cardButtons = `
                        <div class="rx-card-buttons-group">
                            <button class="rx-card-action-btn view-meds-btn" data-action="view-meds" data-id="${p.id}">
                                <i class="fas fa-pills"></i> عرض الأدوية
                            </button>
                            <button class="rx-card-action-btn details-btn" data-action="details" data-id="${p.id}">
                                <i class="fas fa-external-link-alt"></i> تفاصيل
                            </button>
                        </div>`;
                }
                
                return `
                <div class="rx-card ${cardClass}" data-id="${p.id}">
                    <div class="rx-card-header">
                        <div class="rx-card-avatar ${avatarClass}">
                            ${escapeHtml(patientName.charAt(0))}
                        </div>
                        <div class="rx-card-patient-info">
                            <div class="rx-card-patient-name">${escapeHtml(patientName)}</div>
                            <div class="rx-card-doctor-name">
                                <i class="fas fa-user-md"></i> د. ${escapeHtml(doctorName)}
                            </div>
                        </div>
                        <div class="rx-card-status-dot ${dotClass}" title="${statusText}"></div>
                    </div>
                    
                    <div class="rx-card-body">
                        ${patientAge ? `
                        <div class="rx-card-info-row">
                            <i class="fas fa-calendar-alt"></i>
                            <span>العمر: <strong>${escapeHtml(patientAge)} سنة</strong></span>
                        </div>` : ''}
                        
                        ${patientPhone ? `
                        <div class="rx-card-info-row">
                            <i class="fas fa-phone"></i>
                            <span>${escapeHtml(patientPhone)}</span>
                        </div>` : ''}
                        
                        ${extraInfo}
                        
                        ${diagnosis ? `
                        <div class="rx-card-diagnosis">
                            <i class="fas fa-notes-medical"></i> ${escapeHtml(diagnosis)}
                        </div>` : ''}
                    </div>
                    
                    <div class="rx-card-footer">
                        <div class="rx-card-date">
                            <i class="far fa-clock"></i> ${dateStr} · ${timeStr}
                        </div>
                        
                        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
                            <span style="background:${statusBg};color:${statusColor};padding:3px 10px;border-radius:20px;font-size:0.72rem;font-weight:700;">
                                ${statusText}
                            </span>
                            
                            <span class="rx-card-items-count">
                                <i class="fas fa-pills"></i> ${itemCount} أصناف
                            </span>
                            
                            ${cardButtons}
                        </div>
                    </div>
                </div>`;
            }).join('');
        };

        // ============ فتح مودال الصرف ============
        const openDispenseModal = async (prescription) => {
            if (!prescription || prescription.status !== 'لم تصرف بعد') return;
            
            state.currentViewPrescription = prescription;
            
            let items = [];
            try {
                const itemsSnap = await get(ref(db, `tenants/${currentTenantId}/prescription_items/${prescription.id}`));
                if (itemsSnap.exists()) items = Object.values(itemsSnap.val());
            } catch (e) {}
            
            state.currentViewItems = items;
            
            const doctor = state.doctorsList.find(d => d.id === prescription.doctor_id);
            const doctorName = doctor ? doctor.name : 'طبيب';
            
            $('#dispensePatientInfo').innerHTML = `
                <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
                    <div style="width:44px;height:44px;background:var(--primary-light);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;color:var(--primary-dark);">
                        <i class="fas fa-user"></i>
                    </div>
                    <div>
                        <b>${escapeHtml(prescription.patient_name || 'مريض')}</b>
                        <div style="font-size:0.78rem;color:var(--text-sec);">د. ${escapeHtml(doctorName)}</div>
                    </div>
                </div>`;
            
            const formLabels = { 'tablet': '💊 أقراص', 'syrup': '🥄 شراب', 'injection': '💉 حقن', 'suppository': '🧴 لبوس', 'drops': '💧 نقط' };
            $('#dispenseItemsList').innerHTML = items.length === 0 
                ? '<div style="color:var(--text-sec);">لا توجد عناصر في الوصفة</div>'
                : items.map(item => `
                    <div class="rx-detail-item">
                        <div class="drug-icon">${formLabels[item.form]?.split(' ')[0] || '💊'}</div>
                        <div style="flex:1;">
                            <b>${escapeHtml(item.drug_name || 'دواء')}</b>
                            <div style="font-size:0.75rem;color:var(--text-sec);">${escapeHtml(item.dose || '')}</div>
                        </div>
                    </div>`).join('');
            
            $('#dispenseModal').dataset.prescriptionId = prescription.id;
            $('#dispenseStatus').value = 'تم الصرف';
            $('#dispenseNotes').value = '';
            $('#dispenseModal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        };

        const confirmDispense = async () => {
            const prescriptionId = $('#dispenseModal').dataset.prescriptionId;
            if (!prescriptionId) return;
            
            const status = $('#dispenseStatus').value;
            const notes = $('#dispenseNotes').value.trim();
            const now = new Date().toISOString();
            
            try {
                const updates = {};
                updates[`tenants/${currentTenantId}/prescriptions/${prescriptionId}/status`] = status;
                updates[`tenants/${currentTenantId}/prescriptions/${prescriptionId}/dispensed_at`] = now;
                updates[`tenants/${currentTenantId}/prescriptions/${prescriptionId}/pharmacist_id`] = state.currentUser.uid;
                updates[`tenants/${currentTenantId}/prescriptions/${prescriptionId}/pharmacist_name`] = state.pharmacistData.name || 'صيدلي';
                if (notes) updates[`tenants/${currentTenantId}/prescriptions/${prescriptionId}/pharmacist_notes`] = notes;
                
                await update(ref(db), updates);
                $('#dispenseModal').style.display = 'none';
                document.body.style.overflow = '';
                showToast('✅ تم صرف الوصفة بنجاح');
            } catch (err) {
                showToast('❌ خطأ في صرف الوصفة', true);
            }
        };

        // ============ ✅ وظيفة البحث عن مريض ============
        let searchTimer;
        let villageSearchTimer;
        
        const searchPatientsByPhone = async (phone) => {
            if (!phone || phone.length < 1) {
                $('#searchResults').style.display = 'none';
                return;
            }
            
            clearTimeout(searchTimer);
            searchTimer = setTimeout(async () => {
                let results = [];
                
                const localResults = searchPatientsLocal(phone);
                if (localResults.length > 0) results = localResults;
                
                try {
                    const snap = await get(ref(db, 'patients'));
                    snap.forEach(child => {
                        const p = child.val();
                        if (p.phone && p.phone.includes(phone)) {
                            if (!results.find(r => r.id === child.key)) {
                                results.push({ id: child.key, ...p });
                            }
                        }
                    });
                } catch (err) {}

                const container = $('#searchResults');
                if (results.length === 0) {
                    container.innerHTML = '<div class="search-item" style="color:var(--text-sec);">لا توجد نتائج</div>';
                } else {
                    container.innerHTML = results.map(p => `
                        <div class="search-item" data-id="${p.id}" style="cursor:pointer;">
                            <b>${escapeHtml(p.name)}</b>
                            <small style="color:var(--text-sec);margin-right:auto;">${escapeHtml(p.phone || '')}</small>
                        </div>
                    `).join('');

                    container.querySelectorAll('.search-item[data-id]').forEach(item => {
                        item.addEventListener('click', () => {
                            const patient = results.find(p => p.id === item.dataset.id);
                            if (patient) {
                                const patientPrescriptions = state.allPrescriptions.filter(p => p.patient_id === patient.id);
                                if (patientPrescriptions.length > 0) {
                                    const latestPrescription = patientPrescriptions.sort((a, b) => 
                                        (b.created_at || '').localeCompare(a.created_at || '')
                                    )[0];
                                    openPrescriptionDetails(latestPrescription);
                                } else {
                                    showToast('لا توجد وصفات سابقة لهذا المريض', true);
                                }
                            }
                        });
                    });
                }
                container.style.display = 'block';
            }, 250);
        };

        const setupVillageSearch = () => {
            const fatherInput = $('#villageFatherName');
            const familyInput = $('#villageFamilyName');
            const villageInput = $('#villageNameInput');
            
            const performVillageSearch = () => {
                const father = fatherInput.value.trim();
                const family = familyInput.value.trim();
                const village = villageInput.value.trim();
                
                if (!father && !family && !village) {
                    $('#villageSearchResults').style.display = 'none';
                    return;
                }
                
                clearTimeout(villageSearchTimer);
                villageSearchTimer = setTimeout(async () => {
                    let results = [];
                    
                    const localResults = searchPatientsLocalByVillage(father, family, village);
                    if (localResults.length > 0) results = localResults;
                    
                    try {
                        const snap = await get(ref(db, 'patients'));
                        snap.forEach(child => {
                            const p = child.val();
                            const matchFather = !father || (p.father_name && p.father_name.includes(father));
                            const matchFamily = !family || (p.family_name && p.family_name.includes(family));
                            const matchVillage = !village || (p.village_name && p.village_name.includes(village));
                            
                            if (matchFather && matchFamily && matchVillage && (father || family || village)) {
                                if (!results.find(r => r.id === child.key)) {
                                    results.push({ id: child.key, ...p });
                                }
                            }
                        });
                    } catch (err) {}

                    const container = $('#villageSearchResults');
                    if (results.length === 0) {
                        container.innerHTML = '<div class="search-item" style="color:var(--text-sec);">لا توجد نتائج</div>';
                    } else {
                        container.innerHTML = results.map(p => `
                            <div class="search-item" data-id="${p.id}" style="cursor:pointer;">
                                <b>${escapeHtml(p.name)}</b>
                                <small style="color:var(--text-sec);">${escapeHtml(p.father_name || '')} - ${escapeHtml(p.family_name || '')} - ${escapeHtml(p.village_name || '')}</small>
                            </div>
                        `).join('');

                        container.querySelectorAll('.search-item[data-id]').forEach(item => {
                            item.addEventListener('click', () => {
                                const patient = results.find(p => p.id === item.dataset.id);
                                if (patient) {
                                    const patientPrescriptions = state.allPrescriptions.filter(p => p.patient_id === patient.id);
                                    if (patientPrescriptions.length > 0) {
                                        const latestPrescription = patientPrescriptions.sort((a, b) => 
                                            (b.created_at || '').localeCompare(a.created_at || '')
                                        )[0];
                                        openPrescriptionDetails(latestPrescription);
                                    } else {
                                        showToast('لا توجد وصفات سابقة لهذا المريض', true);
                                    }
                                }
                            });
                        });
                    }
                    container.style.display = 'block';
                }, 400);
            };
            
            fatherInput.addEventListener('input', performVillageSearch);
            familyInput.addEventListener('input', performVillageSearch);
            villageInput.addEventListener('input', performVillageSearch);
        };

        const toggleSearchMode = (mode) => {
            state.searchMode = mode;
            const phoneSection = $('#phoneSearchSection');
            const villageSection = $('#villageSearchSection');
            const toggleToVillageBtn = $('#toggleToVillageBtn');
            
            if (mode === 'village') {
                phoneSection.style.display = 'none';
                villageSection.style.display = 'block';
                toggleToVillageBtn.style.display = 'none';
                $('#searchResults').style.display = 'none';
                $('#patientSearchInput').value = '';
            } else {
                phoneSection.style.display = 'block';
                villageSection.style.display = 'none';
                toggleToVillageBtn.style.display = 'block';
                $('#villageSearchResults').style.display = 'none';
                $('#villageFatherName').value = '';
                $('#villageFamilyName').value = '';
                $('#villageNameInput').value = '';
            }
        };

        const logout = async () => {
            try {
                showToast('👋 جاري تسجيل الخروج...');
                if (state.unsubscribePrescriptions) { state.unsubscribePrescriptions(); state.unsubscribePrescriptions = null; }
                clearLoginSessionOnly();
                state.currentUser = null;
                state.pharmacistData = null;
                state.doctorsList = [];
                state.allPrescriptions = [];
                await signOut(auth);
                window.location.href = 'index.html';
            } catch (error) {
                clearLoginSessionOnly();
                window.location.href = 'index.html';
            }
        };

        const initEvents = () => {
            $$('.status-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    $$('.status-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    state.currentTab = tab.dataset.tab;
                    updateCounts();
                    renderCards();
                });
            });
            
            $('#prescriptionsGrid').addEventListener('click', (e) => {
                const actionBtn = e.target.closest('[data-action]');
                if (actionBtn) {
                    e.stopPropagation();
                    const id = actionBtn.dataset.id;
                    const prescription = state.allPrescriptions.find(p => p.id === id);
                    
                    if (actionBtn.dataset.action === 'dispense') {
                        openDispenseModal(prescription);
                    } else if (actionBtn.dataset.action === 'view-meds') {
                        openViewMedsModal(prescription);
                    } else if (actionBtn.dataset.action === 'details') {
                        openPrescriptionDetails(prescription);
                    }
                    return;
                }
                
                const card = e.target.closest('.rx-card');
                if (!card) return;
                const id = card.dataset.id;
                const prescription = state.allPrescriptions.find(p => p.id === id);
                
                if (prescription) {
                    if (prescription.status === 'لم تصرف بعد') {
                        openDispenseModal(prescription);
                    } else {
                        openViewMedsModal(prescription);
                    }
                }
            });
            
            $('#confirmDispenseBtn').addEventListener('click', confirmDispense);
            
            $('#printDispenseBtn').addEventListener('click', () => {
                if (state.currentViewPrescription) {
                    printPrescription(state.currentViewPrescription, state.currentViewItems);
                }
            });
            
            $('#closeDispenseBtn').addEventListener('click', () => {
                $('#dispenseModal').style.display = 'none';
                document.body.style.overflow = '';
            });
            
            $('#closeViewMedsBtn').addEventListener('click', closeViewMedsModal);
            
            $('#printViewMedsBtn').addEventListener('click', () => {
                if (state.currentViewPrescription) {
                    printPrescription(state.currentViewPrescription, state.currentViewItems);
                }
            });
            
            $('#gotoDetailsFromMedsBtn').addEventListener('click', () => {
                if (state.currentViewPrescription) {
                    openPrescriptionDetails(state.currentViewPrescription);
                }
            });
            
            $('#searchPatientBtn').addEventListener('click', () => {
                $('#searchModal').style.display = 'flex';
                $('#patientSearchInput').value = '';
                $('#searchResults').style.display = 'none';
                $('#patientHistoryContainer').innerHTML = '';
                toggleSearchMode('phone');
                document.body.style.overflow = 'hidden';
            });
            
            $('#closeSearchBtn').addEventListener('click', () => {
                $('#searchModal').style.display = 'none';
                $('#patientHistoryContainer').innerHTML = '';
                document.body.style.overflow = '';
            });
            
            $('#patientSearchInput').addEventListener('input', () => {
                searchPatientsByPhone($('#patientSearchInput').value.trim());
            });
            
            $('#toggleToVillageBtn').addEventListener('click', () => toggleSearchMode('village'));
            $('#togglePhoneModeBtn').addEventListener('click', () => toggleSearchMode('phone'));
            
            setupVillageSearch();
            
            $('#logoutBtn').addEventListener('click', logout);
            
            window.addEventListener('click', (e) => {
                if (e.target === $('#dispenseModal')) {
                    $('#dispenseModal').style.display = 'none';
                    document.body.style.overflow = '';
                }
                if (e.target === $('#searchModal')) {
                    $('#searchModal').style.display = 'none';
                    $('#patientHistoryContainer').innerHTML = '';
                    document.body.style.overflow = '';
                }
                if (e.target === $('#viewMedsModal')) {
                    closeViewMedsModal();
                }
            });
            
            document.addEventListener('click', (e) => {
                if (!$('#patientSearchInput').contains(e.target) && !$('#searchResults').contains(e.target)) {
                    $('#searchResults').style.display = 'none';
                }
                if (!$('#villageFatherName').contains(e.target) && 
                    !$('#villageFamilyName').contains(e.target) && 
                    !$('#villageNameInput').contains(e.target) && 
                    !$('#villageSearchResults').contains(e.target)) {
                    $('#villageSearchResults').style.display = 'none';
                }
            });
            
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    if ($('#dispenseModal').style.display === 'flex') {
                        $('#dispenseModal').style.display = 'none';
                        document.body.style.overflow = '';
                    }
                    if ($('#searchModal').style.display === 'flex') {
                        $('#searchModal').style.display = 'none';
                        $('#patientHistoryContainer').innerHTML = '';
                        document.body.style.overflow = '';
                    }
                    if ($('#viewMedsModal').style.display === 'flex') {
                        closeViewMedsModal();
                    }
                }
            });
            
            window.addEventListener('online', () => { setSyncStatus(true); showToast('📡 تم استعادة الاتصال'); });
            window.addEventListener('offline', () => { setSyncStatus(false); showToast('⚠️ انقطع الاتصال', true); });
            window.addEventListener('beforeunload', () => { if (state.unsubscribePrescriptions) state.unsubscribePrescriptions(); });
        };

        onAuthStateChanged(auth, async (user) => {
            if (!user) { clearLoginSessionOnly(); window.location.href = 'index.html'; return; }
            
            const urlParams = new URLSearchParams(window.location.search);
            const tenantFromUrl = urlParams.get('tenant');
            
            if (tenantFromUrl) {
                currentTenantId = tenantFromUrl;
            } else {
                try {
                    const encrypted = localStorage.getItem('shifa_secure_session');
                    if (encrypted) {
                        const decoded = atob(encrypted);
                        const match = decoded.match(/"tenantId":"([^"]+)"/);
                        if (match) currentTenantId = match[1];
                    }
                } catch (e) {}
                if (!currentTenantId) {
                    const oldSession = localStorage.getItem('shifa_session');
                    currentTenantId = oldSession ? (JSON.parse(oldSession).tenantId || user.uid) : user.uid;
                }
            }
            
            sessionStorage.setItem('userUid', user.uid);
            sessionStorage.setItem('userRole', 'pharmacist');
            
            if (!state.currentUser) {
                state.currentUser = { uid: user.uid };
                
                $('#appLoader').style.display = 'none';
                $('#mainContainer').style.display = 'block';
                
                const success = await loadPharmacistData(user.uid);
                if (!success) { showToast('⚠️ تعذر تحميل بيانات الصيدلي', true); return; }
                
                const savedDoctor = localStorage.getItem(getTenantStorageKey('selected_doctor'));
                if (savedDoctor) state.selectedDoctorId = savedDoctor;
                
                initEvents();
                loadDoctors();
                loadPrescriptions();
            }
        });

        console.log('🚀 لوحة الصيدلي - مع وظيفة البحث وطباعة الروشتة');
        console.log('🔍 الضغط على اسم المريض في نتائج البحث يفتح صفحة prescription-details.html');
        console.log('🖨️ زر طباعة الروشتة في مودال الصرف ومودال عرض الأدوية');
        console.log('💊 زر عرض الأدوية للوصفات المصروفة');
        console.log('📂 المرضى يضافون في المسار العام patients');
        console.log('📱 شريط تنقل علوي: المنزل | الإعلان | استشارة | ناقص | تبادل');
    </script>
</body>
</html>
