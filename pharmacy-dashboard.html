<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>سُكُون · لوحة الصيدلي</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #F8C471;
            --primary-light: #FDEBD0;
            --primary-dark: #E59866;
            --accent: #E67E22;
            --accent-soft: #FAD7A1;
            --bg: #FFF8F0;
            --white: #FFFFFF;
            --ink: #4A3B2C;
            --text-sec: #8B7A66;
            --danger: #E57373;
            --success: #5FA88D;
            --warning: #F4B886;
            --border-light: #F0E0D0;
            --shadow-sm: 0 6px 12px -4px rgba(230, 126, 34, 0.08);
            --shadow-md: 0 12px 28px -6px rgba(230, 126, 34, 0.12);
            --radius-card: 24px;
            --radius-sm: 16px;
            --radius-xs: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            padding: 16px;
            position: relative;
            -webkit-tap-highlight-color: transparent;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 0% 0%, rgba(248, 196, 113, 0.08), transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(230, 126, 34, 0.06), transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .app-container {
            display: flex;
            gap: 20px;
            max-width: 1600px;
            margin: 0 auto;
            height: calc(100vh - 32px);
        }

        /* الشريط الجانبي للأطباء */
        .doctors-sidebar {
            width: 280px;
            min-width: 260px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            border-radius: var(--radius-card);
            padding: 20px 12px;
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: var(--shadow-md);
            display: none;
            flex-direction: column;
            overflow-y: auto;
            transition: all 0.3s ease;
            flex-shrink: 0;
            max-height: 100%;
        }
        .doctors-sidebar.show {
            display: flex;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 8px 16px;
            border-bottom: 1px solid var(--border-light);
            flex-shrink: 0;
        }
        .sidebar-header h3 {
            font-size: 1.2rem;
            font-weight: 700;
            white-space: nowrap;
        }

        .doctor-list {
            flex: 1;
            margin-top: 12px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            min-height: 0;
        }
        .doctor-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            margin-bottom: 6px;
            background: white;
            border-radius: 60px;
            cursor: pointer;
            border: 1px solid var(--border-light);
            transition: all 0.2s;
            gap: 8px;
        }
        .doctor-item:hover {
            background: var(--primary-light);
            border-color: var(--primary);
        }
        .doctor-item.active {
            background: var(--primary);
            color: #4A3B2C;
            border-color: var(--primary);
            font-weight: 700;
        }
        .doctor-info {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
            flex: 1;
        }
        .doctor-avatar {
            width: 40px;
            height: 40px;
            min-width: 40px;
            background: var(--accent-soft);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--ink);
            font-size: 1rem;
        }
        .doctor-name {
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .new-badge {
            background: var(--danger);
            color: white;
            border-radius: 30px;
            padding: 2px 10px;
            font-size: 0.75rem;
            font-weight: 700;
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* المحتوى الرئيسي */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow: hidden;
            min-width: 0;
        }

        /* الشريط العلوي */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 10px 20px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: var(--shadow-sm);
            gap: 12px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }
        .logo h2 {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--accent);
            white-space: nowrap;
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 18px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            transition: all 0.2s;
            background: white;
            color: var(--ink);
            border: 1px solid var(--border-light);
            white-space: nowrap;
            user-select: none;
        }
        .btn:hover {
            background: var(--primary-light);
        }
        .btn-primary {
            background: var(--primary);
            color: #4A3B2C;
            border: none;
            box-shadow: 0 6px 14px rgba(230, 126, 34, 0.2);
        }
        .btn-primary:hover {
            background: var(--primary-dark);
            color: white;
        }
        .btn-icon {
            width: 44px;
            height: 44px;
            padding: 0;
            justify-content: center;
            flex-shrink: 0;
        }
        .btn-sm {
            padding: 6px 12px;
            font-size: 0.8rem;
            border-radius: 30px;
        }

        /* لوحة الروشتات */
        .prescriptions-panel {
            flex: 1;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(8px);
            border-radius: var(--radius-card);
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: var(--shadow-md);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
        }
        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
            flex-shrink: 0;
        }
        .panel-header h3 {
            font-size: 1.1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .tabs {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }
        .tab-btn {
            background: transparent;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-sec);
            font-family: 'Cairo', sans-serif;
            font-size: 0.9rem;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .tab-btn.active {
            background: white;
            color: var(--accent);
            box-shadow: var(--shadow-sm);
        }
        .tab-btn:hover {
            color: var(--accent);
        }

        .rx-list {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            min-height: 0;
        }
        .rx-item-card {
            background: white;
            border-radius: var(--radius-sm);
            padding: 16px 18px;
            margin-bottom: 10px;
            border: 1px solid var(--border-light);
            cursor: pointer;
            transition: all 0.15s;
            position: relative;
        }
        .rx-item-card:hover {
            background: var(--primary-light);
            border-color: var(--primary);
        }
        .rx-item-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            flex-wrap: wrap;
            gap: 6px;
        }
        .rx-patient {
            font-weight: 700;
            font-size: 1.05rem;
        }
        .rx-date {
            color: var(--text-sec);
            font-size: 0.8rem;
            white-space: nowrap;
        }
        .rx-doctor {
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 4px;
            font-size: 0.9rem;
        }
        .rx-items-preview {
            color: var(--text-sec);
            font-size: 0.9rem;
        }
        .open-details-btn {
            position: absolute;
            top: 16px;
            left: 16px;
            background: var(--primary-light);
            border: none;
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 0.8rem;
            cursor: pointer;
            color: var(--ink);
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
            transition: 0.2s;
        }
        .open-details-btn:hover {
            background: var(--primary);
        }

        /* المودال */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(60, 40, 20, 0.25);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 16px;
        }
        .modal.show {
            display: flex;
        }
        .modal-card {
            background: white;
            border-radius: 32px;
            width: 100%;
            max-width: 580px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 30px 50px rgba(160, 100, 40, 0.2);
        }
        .modal-header {
            padding: 20px 24px;
            background: #FEF5EC;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1;
            border-radius: 32px 32px 0 0;
        }
        .modal-header h3 {
            font-size: 1.1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .close-btn {
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            color: var(--text-sec);
            line-height: 1;
            padding: 4px 8px;
            border-radius: 50%;
            transition: 0.2s;
            font-family: 'Cairo', sans-serif;
        }
        .close-btn:hover {
            background: rgba(0, 0, 0, 0.05);
            color: var(--ink);
        }
        .modal-body {
            padding: 20px 24px;
        }
        .search-input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .search-input-group input {
            flex: 1;
            min-width: 0;
            padding: 12px 16px;
            border-radius: 20px;
            border: 1.5px solid var(--border-light);
            font-family: 'Cairo', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-input-group input:focus {
            border-color: var(--primary);
        }
        .search-result-item {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-light);
            cursor: pointer;
            border-radius: var(--radius-xs);
            transition: background 0.15s;
        }
        .search-result-item:hover {
            background: var(--primary-light);
        }
        .search-result-item:last-child {
            border-bottom: none;
        }
        .search-result-item strong {
            display: block;
            font-size: 1rem;
        }

        /* التوست */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #4A3B2C;
            color: white;
            padding: 14px 24px;
            border-radius: 60px;
            text-align: center;
            z-index: 3000;
            max-width: 500px;
            margin: 0 auto;
            font-size: 0.9rem;
            animation: slideUp 0.3s ease;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-sec);
            font-size: 0.95rem;
        }
        .empty-state i {
            display: block;
            font-size: 2.5rem;
            margin-bottom: 12px;
            opacity: 0.5;
        }
        .badge-pulse {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
            }
        }

        .text-success {
            color: var(--success);
            font-weight: 600;
        }
        .text-muted {
            color: var(--text-sec);
            font-size: 0.8rem;
        }
        .mt-2 {
            margin-top: 6px;
        }
        .mt-3 {
            margin-top: 10px;
        }
        .mb-2 {
            margin-bottom: 6px;
        }
        .mb-3 {
            margin-bottom: 10px;
        }
        .gap-2 {
            gap: 8px;
        }
        .d-flex {
            display: flex;
            align-items: center;
        }

        /* ========== التجاوب مع الأجهزة ========== */

        /* شاشات كبيرة جداً */
        @media (min-width: 1400px) {
            .doctors-sidebar {
                width: 320px;
            }
            .rx-item-card {
                padding: 20px 24px;
            }
            .logo h2 {
                font-size: 1.7rem;
            }
        }

        /* الأجهزة اللوحية */
        @media (max-width: 1024px) {
            .doctors-sidebar {
                width: 250px;
                min-width: 230px;
                border-radius: 20px;
                padding: 16px 10px;
            }
            .top-bar {
                padding: 8px 16px;
                gap: 8px;
            }
            .logo h2 {
                font-size: 1.3rem;
            }
            .btn {
                font-size: 0.85rem;
                padding: 8px 14px;
            }
            .btn-icon {
                width: 38px;
                height: 38px;
            }
            .tab-btn {
                padding: 6px 14px;
                font-size: 0.85rem;
            }
            .panel-header h3 {
                font-size: 1rem;
            }
            .rx-item-card {
                padding: 14px 16px;
            }
            .rx-patient {
                font-size: 1rem;
            }
            .open-details-btn {
                position: static;
                margin-top: 8px;
                width: 100%;
                text-align: center;
                border-radius: 16px;
            }
            .prescriptions-panel {
                padding: 16px;
                border-radius: 20px;
            }
        }

        /* الأجهزة الصغيرة - الهواتف */
        @media (max-width: 800px) {
            body {
                padding: 8px;
            }
            .app-container {
                flex-direction: column;
                height: auto;
                min-height: calc(100vh - 16px);
                gap: 12px;
            }
            .doctors-sidebar {
                width: 100%;
                min-width: unset;
                max-height: 320px;
                border-radius: 20px;
                padding: 14px 10px;
            }
            .doctors-sidebar.show {
                display: flex;
            }
            .doctor-item {
                padding: 12px 14px;
                border-radius: 50px;
            }
            .doctor-avatar {
                width: 34px;
                height: 34px;
                min-width: 34px;
                font-size: 0.85rem;
            }
            .doctor-name {
                font-size: 0.9rem;
            }
            .top-bar {
                flex-direction: row;
                flex-wrap: wrap;
                padding: 10px 14px;
                border-radius: 40px;
                gap: 6px;
            }
            .logo h2 {
                font-size: 1.1rem;
            }
            .header-actions {
                gap: 4px;
            }
            .btn {
                font-size: 0.8rem;
                padding: 7px 12px;
                border-radius: 30px;
                gap: 4px;
            }
            .btn-icon {
                width: 34px;
                height: 34px;
            }
            #welcomeMessage {
                font-size: 0.85rem;
                max-width: 120px;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
                display: inline-block;
            }
            .prescriptions-panel {
                padding: 14px;
                border-radius: 20px;
            }
            .panel-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            .panel-header h3 {
                font-size: 0.95rem;
            }
            .tabs {
                width: 100%;
            }
            .tab-btn {
                flex: 1;
                text-align: center;
                padding: 8px 10px;
                font-size: 0.85rem;
            }
            .rx-item-card {
                padding: 14px 14px;
                border-radius: 16px;
            }
            .rx-patient {
                font-size: 0.95rem;
            }
            .rx-doctor {
                font-size: 0.85rem;
            }
            .rx-items-preview {
                font-size: 0.8rem;
            }
            .rx-date {
                font-size: 0.75rem;
            }
            .open-details-btn {
                position: static;
                margin-top: 8px;
                width: 100%;
                text-align: center;
                border-radius: 14px;
                font-size: 0.8rem;
            }
            .modal-card {
                border-radius: 24px;
                max-height: 85vh;
            }
            .modal-header {
                padding: 16px 18px;
                border-radius: 24px 24px 0 0;
            }
            .modal-body {
                padding: 16px 18px;
            }
            .search-input-group {
                flex-direction: column;
                gap: 8px;
            }
            .search-input-group input {
                width: 100%;
            }
            .search-input-group .btn {
                width: 100%;
                justify-content: center;
            }
        }

        /* هواتف صغيرة جداً */
        @media (max-width: 400px) {
            body {
                padding: 4px;
            }
            .app-container {
                gap: 8px;
            }
            .top-bar {
                padding: 8px 10px;
                border-radius: 30px;
                gap: 4px;
            }
            .logo h2 {
                font-size: 1rem;
            }
            .btn {
                font-size: 0.75rem;
                padding: 6px 10px;
                border-radius: 24px;
            }
            .btn-icon {
                width: 30px;
                height: 30px;
                font-size: 0.75rem;
            }
            .doctors-sidebar {
                max-height: 250px;
                border-radius: 16px;
                padding: 10px 8px;
            }
            .doctor-item {
                padding: 10px 12px;
                border-radius: 40px;
            }
            .doctor-avatar {
                width: 28px;
                height: 28px;
                min-width: 28px;
                font-size: 0.7rem;
            }
            .doctor-name {
                font-size: 0.8rem;
            }
            .new-badge {
                font-size: 0.7rem;
                padding: 2px 8px;
            }
            .prescriptions-panel {
                padding: 10px;
                border-radius: 16px;
            }
            .rx-item-card {
                padding: 12px;
                border-radius: 14px;
            }
            .rx-patient {
                font-size: 0.9rem;
            }
            .panel-header h3 {
                font-size: 0.85rem;
            }
            .tab-btn {
                font-size: 0.8rem;
                padding: 6px 8px;
            }
        }

        /* دعم شاشات اللمس */
        @media (hover: none) and (pointer: coarse) {
            .doctor-item,
            .rx-item-card,
            .btn,
            .tab-btn,
            .search-result-item {
                cursor: default;
            }
            .doctor-item:active,
            .rx-item-card:active {
                background: var(--primary-light);
            }
            .btn:active {
                transform: scale(0.96);
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- الشريط الجانبي للأطباء -->
        <div class="doctors-sidebar" id="doctorsSidebar">
            <div class="sidebar-header">
                <h3><i class="fas fa-user-md"></i> الأطباء</h3>
                <button class="btn btn-icon btn-sm" id="refreshDoctorsBtn" title="تحديث"><i class="fas fa-sync-alt"></i></button>
            </div>
            <div class="doctor-list" id="doctorListContainer">
                <div class="empty-state"><i class="fas fa-spinner fa-pulse"></i> جاري التحميل...</div>
            </div>
        </div>

        <!-- المحتوى الرئيسي -->
        <div class="main-content">
            <!-- الشريط العلوي -->
            <div class="top-bar">
                <div class="logo">
                    <h2><i class="fas fa-pills" style="color:var(--primary);"></i> سُكُون · الصيدلي</h2>
                </div>
                <div class="header-actions">
                    <span id="welcomeMessage" style="font-weight:600;"></span>
                    <button class="btn btn-sm" id="searchPatientBtn"><i class="fas fa-search"></i> <span class="hide-mobile">بحث عن مريض</span></button>
                    <button class="btn btn-icon btn-sm" id="toggleSidebarBtn" title="إظهار/إخفاء الأطباء"><i class="fas fa-user-md"></i></button>
                    <button class="btn btn-icon btn-sm" id="logoutBtn" title="خروج"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>

            <!-- لوحة الروشتات -->
            <div class="prescriptions-panel">
                <div class="panel-header">
                    <h3 id="selectedDoctorTitle">اختر طبيباً من القائمة</h3>
                    <div class="tabs">
                        <button class="tab-btn active" data-doctor-tab="لم تصرف بعد">جديدة</button>
                        <button class="tab-btn" data-doctor-tab="تم الصرف">مصروفة</button>
                    </div>
                </div>
                <div class="rx-list" id="prescriptionsListContainer">
                    <div class="empty-state"><i class="fas fa-user-md"></i>اختر طبيباً من القائمة لعرض الروشتات</div>
                </div>
            </div>
        </div>
    </div>

    <!-- مودال البحث عن مريض -->
    <div id="searchPatientModal" class="modal">
        <div class="modal-card">
            <div class="modal-header">
                <h3><i class="fas fa-search"></i> بحث عن مريض</h3>
                <button class="close-btn" id="closeSearchModalBtn" aria-label="إغلاق">&times;</button>
            </div>
            <div class="modal-body">
                <div class="search-input-group">
                    <input type="text" id="patientSearchInput" placeholder="اسم المريض أو رقم الهاتف" aria-label="بحث">
                    <button class="btn btn-primary" id="executeSearchBtn"><i class="fas fa-search"></i> بحث</button>
                </div>
                <div id="searchResultsContainer">
                    <div class="empty-state"><i class="fas fa-info-circle"></i> ابدأ البحث عن مريض</div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { firebaseConfig } from './firebase-config.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
        import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // ---------- الحالة ----------
        let currentUser = null;
        let pharmacistInfo = null;
        let doctorsList = [];
        let allPrescriptions = [];
        let patientsMap = {};
        let itemsCountMap = {};
        let selectedDoctorId = null;
        let currentDoctorTab = 'لم تصرف بعد';
        let unsubscribePrescriptions = null;
        let unsubscribeDoctors = null;
        let unsubscribePatients = null;

        const PHARMACIST_STORAGE_KEY = 'pharmacist_selected_doctor';

        // ---------- عناصر DOM ----------
        const UI = {
            welcomeMessage: document.getElementById('welcomeMessage'),
            doctorsSidebar: document.getElementById('doctorsSidebar'),
            toggleSidebarBtn: document.getElementById('toggleSidebarBtn'),
            doctorListContainer: document.getElementById('doctorListContainer'),
            refreshDoctorsBtn: document.getElementById('refreshDoctorsBtn'),
            selectedDoctorTitle: document.getElementById('selectedDoctorTitle'),
            prescriptionsListContainer: document.getElementById('prescriptionsListContainer'),
            logoutBtn: document.getElementById('logoutBtn'),
            tabBtns: document.querySelectorAll('[data-doctor-tab]'),
            searchPatientBtn: document.getElementById('searchPatientBtn'),
            searchPatientModal: document.getElementById('searchPatientModal'),
            closeSearchModalBtn: document.getElementById('closeSearchModalBtn'),
            patientSearchInput: document.getElementById('patientSearchInput'),
            executeSearchBtn: document.getElementById('executeSearchBtn'),
            searchResultsContainer: document.getElementById('searchResultsContainer')
        };

        function showToast(msg, isErr = false) {
            const old = document.querySelector('.toast');
            if (old) old.remove();
            const t = document.createElement('div');
            t.className = 'toast';
            t.style.background = isErr ? '#B23B3B' : '#4A3B2C';
            t.innerHTML = `<i class="fas ${isErr ? 'fa-exclamation-triangle' : 'fa-check'}"></i> ${msg}`;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[m] || m);
        }

        function saveSelectedDoctor() {
            if (selectedDoctorId) localStorage.setItem(PHARMACIST_STORAGE_KEY, selectedDoctorId);
        }

        function loadSavedDoctor() {
            return localStorage.getItem(PHARMACIST_STORAGE_KEY);
        }

        async function loadPharmacistData(user) {
            try {
                const snap = await get(ref(db, `users/${user.uid}`));
                if (!snap.exists()) {
                    showToast('بيانات الصيدلي غير موجودة.', true);
                    return false;
                }
                const data = snap.val();
                if (data.role !== 'pharmacist') {
                    showToast('هذا الحساب ليس حساب صيدلي.', true);
                    return false;
                }
                pharmacistInfo = data;
                UI.welcomeMessage.textContent = `أهلاً، ${pharmacistInfo.name || 'صيدلي'}`;
                return true;
            } catch (err) {
                showToast('فشل تحميل البيانات', true);
                return false;
            }
        }

        function loadDoctors() {
            const usersRef = ref(db, 'users');
            if (unsubscribeDoctors) unsubscribeDoctors();
            unsubscribeDoctors = onValue(usersRef, (snap) => {
                const docs = [];
                snap.forEach(child => {
                    const user = child.val();
                    if (user.role === 'doctor') {
                        docs.push({ id: child.key, ...user });
                    }
                });
                doctorsList = docs;
                renderDoctorsList();
            });
        }

        function renderDoctorsList() {
            if (doctorsList.length === 0) {
                UI.doctorListContainer.innerHTML = '<div class="empty-state"><i class="fas fa-user-md"></i> لا يوجد أطباء</div>';
                return;
            }
            let html = '';
            doctorsList.forEach(doc => {
                const pendingCount = allPrescriptions.filter(p => p.doctor_id === doc.id && p.status ===
                    'لم تصرف بعد').length;
                html += `
                    <div class="doctor-item ${selectedDoctorId === doc.id ? 'active' : ''}" data-doctor-id="${doc.id}">
                        <div class="doctor-info">
                            <div class="doctor-avatar"><i class="fas fa-user-md"></i></div>
                            <span class="doctor-name">د. ${escapeHtml(doc.name || '---')}</span>
                        </div>
                        ${pendingCount > 0 ? `<span class="new-badge badge-pulse">${pendingCount}</span>` : ''}
                    </div>
                `;
            });
            UI.doctorListContainer.innerHTML = html;
            document.querySelectorAll('.doctor-item').forEach(el => {
                el.addEventListener('click', () => {
                    const docId = el.dataset.doctorId;
                    selectedDoctorId = docId;
                    saveSelectedDoctor();
                    renderDoctorsList();
                    updateSelectedDoctorTitle();
                    renderPrescriptionsForDoctor();
                    // في الأجهزة الصغيرة، إخفاء الشريط الجانبي بعد الاختيار
                    if (window.innerWidth <= 800) {
                        UI.doctorsSidebar.classList.remove('show');
                    }
                });
            });
        }

        function updateSelectedDoctorTitle() {
            const doc = doctorsList.find(d => d.id === selectedDoctorId);
            if (doc) {
                const pendingCount = allPrescriptions.filter(p => p.doctor_id === doc.id && p.status === 'لم تصرف بعد')
                    .length;
                UI.selectedDoctorTitle.innerHTML =
                    `روشتات د. ${escapeHtml(doc.name)} ${pendingCount > 0 ? `<span class="new-badge badge-pulse" style="margin-right:8px;">${pendingCount} جديدة</span>` : ''}`;
            } else {
                UI.selectedDoctorTitle.textContent = 'اختر طبيباً من القائمة';
            }
        }

        async function loadItemsCountForPrescriptions(prescriptionIds) {
            const updates = {};
            const promises = prescriptionIds.map(async (pid) => {
                const snap = await get(ref(db, `prescription_items/${pid}`));
                let count = 0;
                if (snap.exists()) {
                    count = Object.keys(snap.val()).length;
                }
                updates[pid] = count;
            });
            await Promise.all(promises);
            return updates;
        }

        async function refreshItemsCount() {
            const ids = allPrescriptions.map(p => p.id);
            const newCounts = await loadItemsCountForPrescriptions(ids);
            itemsCountMap = { ...itemsCountMap, ...newCounts };
        }

        function loadAllPrescriptions() {
            const presRef = ref(db, 'prescriptions');
            if (unsubscribePrescriptions) unsubscribePrescriptions();
            unsubscribePrescriptions = onValue(presRef, async (snap) => {
                const prescriptions = [];
                snap.forEach(child => {
                    prescriptions.push({ id: child.key, ...child.val() });
                });
                allPrescriptions = prescriptions;
                await refreshItemsCount();
                renderDoctorsList();
                if (selectedDoctorId) {
                    updateSelectedDoctorTitle();
                    renderPrescriptionsForDoctor();
                }
            });
        }

        function getPatientName(patientId) {
            return patientsMap[patientId]?.name || '';
        }

        function renderPrescriptionsForDoctor() {
            if (!selectedDoctorId) {
                UI.prescriptionsListContainer.innerHTML =
                    '<div class="empty-state"><i class="fas fa-user-md"></i>اختر طبيباً من القائمة لعرض الروشتات</div>';
                return;
            }
            const tabStatus = currentDoctorTab;
            const filtered = allPrescriptions.filter(p => p.doctor_id === selectedDoctorId && p.status === tabStatus);
            if (filtered.length === 0) {
                UI.prescriptionsListContainer.innerHTML =
                    `<div class="empty-state"><i class="fas fa-prescription"></i>لا توجد روشتات ${tabStatus === 'لم تصرف بعد' ? 'جديدة' : 'مصروفة'}</div>`;
                return;
            }
            filtered.sort((a, b) => (b.created_at || '').localeCompare(a.created_at || ''));
            let html = '';
            filtered.forEach(p => {
                const doctor = doctorsList.find(d => d.id === p.doctor_id) || { name: '' };
                const patientName = getPatientName(p.patient_id) || 'مريض';
                const itemCount = itemsCountMap[p.id] || 0;
                html += `
                    <div class="rx-item-card" data-prescription-id="${p.id}">
                        <div class="rx-item-header">
                            <span class="rx-patient">${escapeHtml(patientName)}</span>
                            <span class="rx-date">${p.created_at ? new Date(p.created_at).toLocaleDateString('ar-EG') : ''}</span>
                        </div>
                        <div class="rx-doctor">د. ${escapeHtml(doctor.name)}</div>
                        <div class="rx-items-preview">${itemCount} أصناف دوائية</div>
                        ${p.diagnosis ? `<div style="font-size:0.85rem; color: var(--text-sec); margin-top:4px;"><i class="fas fa-notes-medical"></i> ${escapeHtml(p.diagnosis.substring(0, 60))}${p.diagnosis.length > 60 ? '...' : ''}</div>` : ''}
                        ${p.status === 'تم الصرف' ? `<div class="text-success mt-2"><i class="fas fa-check-circle"></i> تم الصرف بواسطة: ${escapeHtml(p.pharmacist_name || '')} - ${p.dispensed_at ? new Date(p.dispensed_at).toLocaleString('ar-EG') : ''}</div>` : ''}
                        <button class="open-details-btn" data-prescription-id="${p.id}"><i class="fas fa-external-link-alt"></i> عرض التفاصيل</button>
                    </div>
                `;
            });
            UI.prescriptionsListContainer.innerHTML = html;

            // ربط الأحداث
            document.querySelectorAll('.rx-item-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    if (e.target.closest('.open-details-btn')) return;
                    openPrescriptionDetails(card.dataset.prescriptionId);
                });
            });
            document.querySelectorAll('.open-details-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openPrescriptionDetails(btn.dataset.prescriptionId);
                });
            });
        }

        /** فتح تفاصيل الروشتة في نفس النافذة */
        function openPrescriptionDetails(prescriptionId) {
            if (!prescriptionId) return;
            window.location.href = `prescription-details.html?id=${prescriptionId}`;
        }

        // ---------- تحميل بيانات المرضى ----------
        function loadPatients() {
            const patientsRef = ref(db, 'patients');
            if (unsubscribePatients) unsubscribePatients();
            unsubscribePatients = onValue(patientsRef, (snap) => {
                const map = {};
                snap.forEach(child => {
                    map[child.key] = child.val();
                });
                patientsMap = map;
            });
        }

        // ---------- البحث عن مريض ----------
        function openSearchModal() {
            UI.searchPatientModal.style.display = 'flex';
            UI.patientSearchInput.value = '';
            UI.searchResultsContainer.innerHTML =
                '<div class="empty-state"><i class="fas fa-info-circle"></i> ابدأ البحث عن مريض</div>';
            UI.patientSearchInput.focus();
        }

        function closeSearchModal() {
            UI.searchPatientModal.style.display = 'none';
        }

        async function searchPatients() {
            const term = UI.patientSearchInput.value.trim();
            if (!term) {
                showToast('الرجاء إدخال اسم أو رقم هاتف', true);
                return;
            }

            UI.searchResultsContainer.innerHTML =
                '<div class="empty-state"><i class="fas fa-spinner fa-pulse"></i> جاري البحث...</div>';
            const lowerTerm = term.toLowerCase();

            let results = [];
            const seen = new Set();

            // البحث في patientsMap
            for (const [id, p] of Object.entries(patientsMap)) {
                if (seen.has(id)) continue;
                const nameMatch = p.name && p.name.toLowerCase().includes(lowerTerm);
                const phoneMatch = p.phone && p.phone.includes(term);
                if (nameMatch || phoneMatch) {
                    seen.add(id);
                    results.push({ id, name: p.name, phone: p.phone || '' });
                }
            }

            // البحث في prescriptions كخطة احتياطية
            if (results.length === 0) {
                for (const p of allPrescriptions) {
                    const patientId = p.patient_id;
                    if (!patientId || seen.has(patientId)) continue;
                    const patientName = getPatientName(patientId) || '';
                    const nameMatch = patientName.toLowerCase().includes(lowerTerm);
                    if (nameMatch) {
                        seen.add(patientId);
                        results.push({ id: patientId, name: patientName, phone: '' });
                    }
                }
            }

            if (results.length === 0) {
                UI.searchResultsContainer.innerHTML =
                    '<div class="empty-state"><i class="fas fa-search"></i> لا توجد نتائج مطابقة</div>';
                return;
            }

            let html = '';
            results.forEach(patient => {
                html += `
                    <div class="search-result-item" data-patient-id="${patient.id}" data-patient-name="${escapeHtml(patient.name || '')}">
                        <strong>${escapeHtml(patient.name || 'بدون اسم')}</strong>
                        ${patient.phone ? `<span class="text-muted">${escapeHtml(patient.phone)}</span>` : ''}
                    </div>
                `;
            });
            UI.searchResultsContainer.innerHTML = html;

            document.querySelectorAll('.search-result-item').forEach(item => {
                item.addEventListener('click', () => {
                    const pid = item.dataset.patientId;
                    const pname = item.dataset.patientName;
                    window.location.href =
                        `detail.html?patientId=${pid}&patientName=${encodeURIComponent(pname)}`;
                });
            });
        }

        // ---------- ربط الأحداث ----------
        UI.searchPatientBtn.addEventListener('click', openSearchModal);
        UI.closeSearchModalBtn.addEventListener('click', closeSearchModal);
        UI.searchPatientModal.addEventListener('click', (e) => {
            if (e.target === UI.searchPatientModal) closeSearchModal();
        });
        UI.executeSearchBtn.addEventListener('click', searchPatients);
        UI.patientSearchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchPatients();
        });

        UI.toggleSidebarBtn.addEventListener('click', () => {
            UI.doctorsSidebar.classList.toggle('show');
        });

        UI.refreshDoctorsBtn.addEventListener('click', () => {
            showToast('تم تحديث قائمة الأطباء');
        });

        UI.tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                UI.tabBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentDoctorTab = btn.dataset.doctorTab;
                renderPrescriptionsForDoctor();
            });
        });

        UI.logoutBtn.addEventListener('click', async () => {
            if (unsubscribePrescriptions) unsubscribePrescriptions();
            if (unsubscribeDoctors) unsubscribeDoctors();
            if (unsubscribePatients) unsubscribePatients();
            sessionStorage.clear();
            localStorage.removeItem(PHARMACIST_STORAGE_KEY);
            window.location.href = 'index.html';
        });

        // إغلاق المودال بزر ESC
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && UI.searchPatientModal.style.display === 'flex') {
                closeSearchModal();
            }
        });

        // ---------- بدء التشغيل ----------
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            currentUser = user;
            const valid = await loadPharmacistData(user);
            if (!valid) {
                UI.welcomeMessage.textContent = 'خطأ في تحميل البيانات';
                return;
            }
            const savedDoctorId = loadSavedDoctor();
            if (savedDoctorId) {
                selectedDoctorId = savedDoctorId;
            }
            loadDoctors();
            loadAllPrescriptions();
            loadPatients();
        });

        // تحسين: في الأجهزة الصغيرة، افتح الشريط الجانبي تلقائياً إذا لم يتم اختيار طبيب
        if (window.innerWidth <= 800 && !selectedDoctorId) {
            UI.doctorsSidebar.classList.add('show');
        }
    </script>
</body>
</html>
