<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>سُكُون · الملف الطبي للمريض</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #F8C471;
            --primary-light: #FDEBD0;
            --primary-dark: #E59866;
            --accent: #E67E22;
            --accent-soft: #FAD7A1;
            --bg: #FFF8F0;
            --white: #FFFFFF;
            --ink: #4A3B2C;
            --text-sec: #8B7A66;
            --danger: #E57373;
            --success: #5FA88D;
            --warning: #F4B886;
            --border-light: #F0E0D0;
            --shadow-sm: 0 6px 12px -4px rgba(230, 126, 34, 0.08);
            --shadow-md: 0 12px 28px -6px rgba(230, 126, 34, 0.12);
            --radius-card: 24px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            padding: 16px;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 0% 0%, rgba(248, 196, 113, 0.08), transparent 50%),
                        radial-gradient(circle at 100% 100%, rgba(230, 126, 34, 0.06), transparent 50%);
            pointer-events: none;
            z-index: -1;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 12px 24px;
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow: var(--shadow-sm);
        }
        .btn {
            padding: 10px 18px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            transition: all 0.2s;
            background: white;
            color: var(--ink);
            border: 1px solid var(--border-light);
        }
        .btn-primary {
            background: var(--primary);
            color: #4A3B2C;
            border: none;
            box-shadow: 0 6px 14px rgba(230, 126, 34, 0.2);
        }
        .btn-outline { background: transparent; }
        .card {
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(8px);
            border-radius: var(--radius-card);
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.7);
            box-shadow: var(--shadow-sm);
        }
        .card h2 { font-size: 1.4rem; margin-bottom: 16px; color: var(--accent); }
        .info-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            font-size: 1rem;
        }
        .info-row i { width: 24px; color: var(--accent); }
        .record-item {
            background: white;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid var(--border-light);
            cursor: pointer;
            transition: all 0.2s;
        }
        .record-item:hover { background: var(--primary-light); }
        .record-date { font-weight: 700; color: var(--accent); margin-bottom: 8px; }
        .record-diagnosis { margin-bottom: 8px; }
        .drug-list {
            list-style-type: none;
            padding-right: 20px;
            color: var(--text-sec);
        }
        .drug-list li::before {
            content: "💊";
            margin-left: 8px;
        }
        .empty-state { text-align: center; padding: 40px; color: var(--text-sec); }
        .loading { text-align: center; padding: 40px; font-size: 1.2rem; }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #4A3B2C;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            text-align: center;
            z-index: 3000;
            max-width: 500px;
            margin: 0 auto;
        }
        @media print {
            .btn, .top-bar { display: none; }
            body { background: white; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="top-bar">
        <h2><i class="fas fa-folder-open"></i> الملف الطبي</h2>
        <button class="btn btn-outline" onclick="history.back()"><i class="fas fa-arrow-right"></i> عودة</button>
    </div>

    <div id="contentArea">
        <div class="loading"><i class="fas fa-spinner fa-pulse"></i> جاري تحميل الملف...</div>
    </div>
</div>

<script type="module">
    import { firebaseConfig } from './firebase-config.js';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
    import { getDatabase, ref, get, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const urlParams = new URLSearchParams(window.location.search);
    const patientId = urlParams.get('patientId');
    const patientName = urlParams.get('patientName') || 'المريض';

    if (!patientId) {
        document.getElementById('contentArea').innerHTML = '<div class="card"><p>لا يوجد معرف للمريض.</p></div>';
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m] || m);
    }

    function showToast(msg, isErr = false) {
        const t = document.createElement('div');
        t.className = 'toast';
        t.style.background = isErr ? '#B23B3B' : '#4A3B2C';
        t.innerHTML = `<i class="fas ${isErr ? 'fa-exclamation-triangle' : 'fa-check'}"></i> ${msg}`;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    async function loadPatientData() {
        const contentArea = document.getElementById('contentArea');

        try {
            // 1. جلب بيانات المريض الأساسية (إن وجد جدول patients)
            let patientInfo = null;
            const patientSnap = await get(ref(db, `patients/${patientId}`));
            if (patientSnap.exists()) {
                patientInfo = patientSnap.val();
            } else {
                // إذا لم يكن هناك جدول patients، نأخذ الاسم من الرابط ونحاول البحث في السجلات
                patientInfo = { name: patientName };
            }

            // 2. جلب السجلات الطبية (medical_records)
            const recordsQuery = query(ref(db, 'medical_records'), orderByChild('patientId'), equalTo(patientId));
            const recordsSnap = await get(recordsQuery);
            const records = [];
            if (recordsSnap.exists()) {
                recordsSnap.forEach(child => {
                    records.push({ id: child.key, ...child.val() });
                });
            }
            // ترتيب تنازلي حسب التاريخ
            records.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

            // 3. جلب الوصفات الطبية (prescriptions) لمزيد من التفاصيل
            const presQuery = query(ref(db, 'prescriptions'), orderByChild('patientId'), equalTo(patientId));
            const presSnap = await get(presQuery);
            const prescriptions = [];
            if (presSnap.exists()) {
                presSnap.forEach(child => {
                    prescriptions.push({ id: child.key, ...child.val() });
                });
            }

            // 4. جلب المواعيد السابقة (appointments)
            const aptQuery = query(ref(db, 'appointments'), orderByChild('patientId'), equalTo(patientId));
            const aptSnap = await get(aptQuery);
            const appointments = [];
            if (aptSnap.exists()) {
                aptSnap.forEach(child => {
                    appointments.push({ id: child.key, ...child.val() });
                });
            }

            // بناء واجهة المستخدم
            let html = `
                <div class="card">
                    <h2><i class="fas fa-user"></i> معلومات المريض</h2>
                    <div class="info-row"><i class="fas fa-user"></i> <strong>الاسم:</strong> ${escapeHtml(patientInfo.name || patientName)}</div>
                    ${patientInfo.phone ? `<div class="info-row"><i class="fas fa-phone"></i> <strong>الهاتف:</strong> ${escapeHtml(patientInfo.phone)}</div>` : ''}
                    ${patientInfo.age ? `<div class="info-row"><i class="fas fa-calendar"></i> <strong>العمر:</strong> ${patientInfo.age} سنة</div>` : ''}
                    ${patientInfo.gender ? `<div class="info-row"><i class="fas fa-venus-mars"></i> <strong>الجنس:</strong> ${patientInfo.gender === 'male' ? 'ذكر' : 'أنثى'}</div>` : ''}
                    ${patientInfo.address ? `<div class="info-row"><i class="fas fa-map-marker-alt"></i> <strong>العنوان:</strong> ${escapeHtml(patientInfo.address)}</div>` : ''}
                </div>

                <div class="card">
                    <h2><i class="fas fa-history"></i> السجل الطبي (${records.length} كشف)</h2>
                    ${records.length === 0 ? '<div class="empty-state">لا توجد كشوفات سابقة</div>' : ''}
            `;

            records.forEach(rec => {
                const date = rec.createdAt ? new Date(rec.createdAt).toLocaleString('ar-EG') : 'غير معروف';
                const drugs = rec.items || [];
                const drugList = drugs.map(d => `<li>${escapeHtml(d.drug)} - ${escapeHtml(d.dose)}</li>`).join('');

                html += `
                    <div class="record-item">
                        <div class="record-date"><i class="far fa-calendar-alt"></i> ${date}</div>
                        <div class="record-diagnosis"><strong>التشخيص:</strong> ${escapeHtml(rec.diagnosis || 'غير مذكور')}</div>
                        <div><strong>الأدوية:</strong></div>
                        <ul class="drug-list">${drugList || '<li>لا توجد أدوية</li>'}</ul>
                        ${rec.doctorName ? `<div style="margin-top:8px;"><i class="fas fa-user-md"></i> الطبيب: د. ${escapeHtml(rec.doctorName)}</div>` : ''}
                    </div>
                `;
            });

            html += `</div>`;

            // عرض الوصفات إن وجدت
            if (prescriptions.length > 0) {
                html += `<div class="card">
                    <h2><i class="fas fa-prescription"></i> الوصفات الطبية (${prescriptions.length})</h2>`;
                prescriptions.forEach(p => {
                    const date = p.createdAt ? new Date(p.createdAt).toLocaleString('ar-EG') : '';
                    const drugs = p.items || [];
                    const drugList = drugs.map(d => `<li>${escapeHtml(d.drug)} - ${escapeHtml(d.dose)}</li>`).join('');
                    html += `
                        <div class="record-item">
                            <div class="record-date">${date}</div>
                            <div><strong>الطبيب:</strong> د. ${escapeHtml(p.doctorName || '')}</div>
                            <div><strong>الأدوية:</strong></div>
                            <ul class="drug-list">${drugList || '<li>لا توجد أدوية</li>'}</ul>
                            <div><strong>الحالة:</strong> ${p.status === 'تم الصرف' ? '✅ تم الصرف' : '⏳ لم تصرف بعد'}</div>
                        </div>`;
                });
                html += `</div>`;
            }

            contentArea.innerHTML = html;

        } catch (err) {
            console.error('فشل تحميل بيانات المريض:', err);
            contentArea.innerHTML = '<div class="card"><p>حدث خطأ أثناء تحميل الملف.</p></div>';
        }
    }

    // التحقق من الجلسة
    onAuthStateChanged(auth, (user) => {
        if (user && patientId) {
            loadPatientData();
        } else if (!user) {
            window.location.href = 'index.html';
        }
    });
</script>
</body>
</html>
