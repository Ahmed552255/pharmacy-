<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>سُكُون · الملف الطبي للمريض</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #F8C471;
            --primary-light: #FDEBD0;
            --primary-dark: #E59866;
            --accent: #E67E22;
            --accent-soft: #FAD7A1;
            --bg: #FFF8F0;
            --white: #FFFFFF;
            --ink: #4A3B2C;
            --text-sec: #8B7A66;
            --danger: #E57373;
            --success: #5FA88D;
            --warning: #F4B886;
            --border-light: #F0E0D0;
            --shadow-sm: 0 6px 12px -4px rgba(230, 126, 34, 0.08 );
            --shadow-md: 0 12px 28px -6px rgba(230, 126, 34, 0.12);
            --radius-card: 24px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            padding: 16px;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 0% 0%, rgba(248, 196, 113, 0.08), transparent 50%),
                        radial-gradient(circle at 100% 100%, rgba(230, 126, 34, 0.06), transparent 50%);
            pointer-events: none;
            z-index: -1;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 12px 24px;
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow: var(--shadow-sm);
        }
        .btn {
            padding: 10px 18px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            transition: all 0.2s;
            background: white;
            color: var(--ink);
            border: 1px solid var(--border-light);
        }
        .btn-primary {
            background: var(--primary);
            color: #4A3B2C;
            border: none;
            box-shadow: 0 6px 14px rgba(230, 126, 34, 0.2);
        }
        .btn-outline { background: transparent; }
        .card {
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(8px);
            border-radius: var(--radius-card);
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.7);
            box-shadow: var(--shadow-sm);
        }
        .card h2 { font-size: 1.4rem; margin-bottom: 16px; color: var(--accent); }
        .info-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            font-size: 1rem;
        }
        .info-row i { width: 24px; color: var(--accent); }
        .record-item {
            background: white;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid var(--border-light);
            position: relative;
        }
        .record-date { font-weight: 700; color: var(--accent); margin-bottom: 8px; }
        .record-diagnosis { margin-bottom: 8px; }
        .drug-list {
            list-style-type: none;
            padding-right: 20px;
            color: var(--text-sec);
        }
        .drug-list li::before {
            content: "💊";
            margin-left: 8px;
        }
        .empty-state { text-align: center; padding: 40px; color: var(--text-sec); }
        .loading { text-align: center; padding: 40px; font-size: 1.2rem; }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #4A3B2C;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            text-align: center;
            z-index: 3000;
            max-width: 500px;
            margin: 0 auto;
        }
        .print-btn {
            position: absolute;
            top: 16px;
            left: 16px;
            background: var(--primary-light);
            border: none;
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 0.8rem;
            cursor: pointer;
            font-weight: 600;
            font-family: 'Cairo', sans-serif;
            transition: 0.2s;
        }
        .print-btn:hover {
            background: var(--primary);
        }
        @media print {
            .btn, .top-bar, .print-btn { display: none; }
            body { background: white; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="top-bar">
        <h2><i class="fas fa-folder-open"></i> الملف الطبي</h2>
        <button class="btn btn-outline" onclick="history.back()"><i class="fas fa-arrow-right"></i> عودة</button>
    </div>

    <div id="contentArea">
        <div class="loading"><i class="fas fa-spinner fa-pulse"></i> جاري تحميل الملف...</div>
    </div>
</div>

<script type="module">
    import { firebaseConfig } from './firebase-config.js';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

    const app = initializeApp(firebaseConfig );
    const auth = getAuth(app);
    const db = getDatabase(app);

    const urlParams = new URLSearchParams(window.location.search);
    const patientId = urlParams.get('patientId');
    const patientName = urlParams.get('patientName') || 'المريض';

    // خريطة لتخزين بيانات كل وصفة مؤقتاً لاستخدامها في الطباعة
    const prescriptionCache = {};

    if (!patientId) {
        document.getElementById('contentArea').innerHTML = '<div class="card"><p>لا يوجد معرف للمريض.</p></div>';
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m] || m);
    }

    // دالة طباعة وصفة محددة
    function printPrescription(presId) {
        const data = prescriptionCache[presId];
        if (!data) return;

        const { prescription, items, doctorName, drugNames } = data;
        const patientDisplayName = escapeHtml(patientName || prescription.patient_name || 'المريض');
        const date = prescription.created_at ? new Date(prescription.created_at).toLocaleString('ar-EG') : 'غير معروف';

        let itemsHtml = '';
        items.forEach(item => {
            const drugName = drugNames[item.drug_id] || item.drug_id;
            itemsHtml += `<li>${escapeHtml(drugName)} - ${escapeHtml(item.dose)}</li>`;
        });

        const printWindow = window.open('', '_blank', 'width=800,height=600');
        printWindow.document.write(`
            <!DOCTYPE html>
            <html lang="ar" dir="rtl">
            <head>
                <meta charset="UTF-8">
                <title>طباعة الروشتة</title>
                <style>
                    body { font-family: 'Cairo', sans-serif; padding: 30px; color: #333; }
                    .header { text-align: center; margin-bottom: 25px; }
                    .header h1 { color: #E67E22; }
                    .info { margin-bottom: 20px; }
                    .info p { margin: 8px 0; font-size: 1.1rem; }
                    ul { list-style-type: none; padding: 0; }
                    ul li { padding: 8px 0; border-bottom: 1px dashed #ccc; }
                    ul li::before { content: "💊 "; margin-left: 8px; }
                    @media print { body { padding: 10px; } }
                </style>
            </head>
            <body>
                <div class="header">
                    <h1>روشتة طبية</h1>
                    <p style="font-size:1.2rem;">عيادة سُكُون</p>
                </div>
                <div class="info">
                    <p><strong>المريض:</strong> ${patientDisplayName}</p>
                    <p><strong>الطبيب:</strong> د. ${escapeHtml(doctorName)}</p>
                    <p><strong>التاريخ:</strong> ${date}</p>
                    <p><strong>التشخيص:</strong> ${escapeHtml(prescription.diagnosis || 'غير مذكور')}</p>
                </div>
                <h3>الأدوية الموصوفة:</h3>
                <ul>${itemsHtml || '<li>لا توجد أدوية</li>'}</ul>
                <p style="margin-top:20px;"><strong>الحالة:</strong> ${prescription.status === 'تم الصرف' ? 'تم الصرف' : 'لم تصرف بعد'}</p>
                <script>
                    window.onload = function() { window.print(); setTimeout(window.close, 500); };
                <\/script>
            </body>
            </html>
        `);
        printWindow.document.close();
    }

    async function loadPatientData() {
        const contentArea = document.getElementById('contentArea');

        try {
            // 1. جلب بيانات المريض
            let patientInfo = { name: patientName };
            const patientSnap = await get(ref(db, `patients/${patientId}`));
            if (patientSnap.exists()) {
                patientInfo = patientSnap.val();
            }

            // 2. جلب كل الروشتات من السحابة وفلترتها محلياً
            const allPresSnap = await get(ref(db, 'prescriptions'));
            let patientPrescriptions = [];

            if (allPresSnap.exists()) {
                allPresSnap.forEach(child => {
                    const val = child.val();
                    // الفلترة المحلية: تحويل كلا القيمتين لنص لضمان التطابق التام
                    if (String(val.patient_id) === String(patientId)) {
                        patientPrescriptions.push({ id: child.key, ...val });
                    }
                });
            }

            // الترتيب محلياً من الأحدث للأقدم
            patientPrescriptions.sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));

            // 3. جلب بيانات الأطباء المرتبطين بهذه الروشتات فقط
            const doctorIds = [...new Set(patientPrescriptions.map(p => p.doctor_id).filter(Boolean))];
            const doctorsMap = {};
            if (doctorIds.length > 0) {
                const doctorPromises = doctorIds.map(docId => get(ref(db, `users/${docId}`)));
                const doctorSnaps = await Promise.all(doctorPromises);
                doctorSnaps.forEach((snap, idx) => {
                    if (snap.exists()) doctorsMap[doctorIds[idx]] = snap.val();
                });
            }

            // 4. جلب تفاصيل الأدوية (Items) لكل روشتة
            const itemsMap = {};
            if (patientPrescriptions.length > 0) {
                const itemsPromises = patientPrescriptions.map(p => get(ref(db, `prescription_items/${p.id}`)));
                const itemsSnaps = await Promise.all(itemsPromises);
                itemsSnaps.forEach((snap, idx) => {
                    const presId = patientPrescriptions[idx].id;
                    itemsMap[presId] = snap.exists() ? Object.values(snap.val()) : [];
                });
            }

            // 5. جلب أسماء الأدوية من السحابة
            const drugIds = [];
            for (const presId in itemsMap) {
                itemsMap[presId].forEach(item => {
                    if (item.drug_id) drugIds.push(item.drug_id);
                });
            }
            const uniqueDrugIds = [...new Set(drugIds)];
            const drugNames = {};
            if (uniqueDrugIds.length > 0) {
                const drugPromises = uniqueDrugIds.map(did => get(ref(db, `drugs/${did}`)));
                const drugSnaps = await Promise.all(drugPromises);
                drugSnaps.forEach((snap, idx) => {
                    if (snap.exists()) drugNames[uniqueDrugIds[idx]] = snap.val().name;
                });
            }

            // 6. تخزين البيانات في الكاش للطباعة
            patientPrescriptions.forEach(pres => {
                prescriptionCache[pres.id] = {
                    prescription: pres,
                    items: itemsMap[pres.id] || [],
                    doctorName: (doctorsMap[pres.doctor_id] || {}).name || 'غير معروف',
                    drugNames: drugNames
                };
            });

            // 7. بناء واجهة المستخدم
            let html = `
                <div class="card">
                    <h2><i class="fas fa-user"></i> معلومات المريض</h2>
                    <div class="info-row"><i class="fas fa-user"></i> <strong>الاسم:</strong> ${escapeHtml(patientInfo.name || patientName)}</div>
                    ${patientInfo.phone ? `<div class="info-row"><i class="fas fa-phone"></i> <strong>الهاتف:</strong> ${escapeHtml(patientInfo.phone)}</div>` : ''}
                    ${patientInfo.age ? `<div class="info-row"><i class="fas fa-calendar"></i> <strong>العمر:</strong> ${patientInfo.age} سنة</div>` : ''}
                    ${patientInfo.gender ? `<div class="info-row"><i class="fas fa-venus-mars"></i> <strong>الجنس:</strong> ${patientInfo.gender === 'male' ? 'ذكر' : 'أنثى'}</div>` : ''}
                    ${patientInfo.address ? `<div class="info-row"><i class="fas fa-map-marker-alt"></i> <strong>العنوان:</strong> ${escapeHtml(patientInfo.address)}</div>` : ''}
                </div>

                <div class="card">
                    <h2><i class="fas fa-history"></i> السجل الطبي (${patientPrescriptions.length} وصفة)</h2>
                    ${patientPrescriptions.length === 0 ? '<div class="empty-state">لا توجد وصفات سابقة لهذا المريض</div>' : ''}
            `;

            for (const pres of patientPrescriptions) {
                const date = pres.created_at ? new Date(pres.created_at).toLocaleString('ar-EG') : 'غير معروف';
                const docData = doctorsMap[pres.doctor_id] || {};
                const doctorName = docData.name || 'غير معروف';
                const items = itemsMap[pres.id] || [];
                const drugList = items.map(item => {
                    const drugName = drugNames[item.drug_id] || item.drug_id;
                    return `<li>${escapeHtml(drugName)} - ${escapeHtml(item.dose)}</li>`;
                }).join('');

                html += `
                    <div class="record-item">
                        <button class="print-btn" data-print-id="${pres.id}"><i class="fas fa-print"></i> طباعة</button>
                        <div class="record-date"><i class="far fa-calendar-alt"></i> ${date}</div>
                        <div><i class="fas fa-user-md"></i> <strong>الطبيب:</strong> د. ${escapeHtml(doctorName)}</div>
                        <div class="record-diagnosis"><strong>التشخيص:</strong> ${escapeHtml(pres.diagnosis || 'غير مذكور')}</div>
                        <div><strong>الأدوية:</strong></div>
                        <ul class="drug-list">${drugList || '<li>لا توجد أدوية</li>'}</ul>
                        <div style="margin-top: 8px;">
                            <strong>الحالة:</strong> 
                            ${pres.status === 'تم الصرف' ? '✅ تم الصرف' : '⏳ لم تصرف بعد'}
                            ${pres.pharmacist_name ? ` (بواسطة ${escapeHtml(pres.pharmacist_name)})` : ''}
                        </div>
                    </div>
                `;
            }

            html += `</div>`;
            contentArea.innerHTML = html;

            // ربط أزرار الطباعة
            document.querySelectorAll('.print-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const presId = this.getAttribute('data-print-id');
                    printPrescription(presId);
                });
            });

        } catch (err) {
            console.error('فشل تحميل بيانات المريض:', err);
            contentArea.innerHTML = '<div class="card"><p style="color: red;">حدث خطأ أثناء تحميل الملف. يرجى المحاولة مرة أخرى.</p></div>';
        }
    }

    // التحقق من الجلسة
    onAuthStateChanged(auth, (user) => {
        if (user && patientId) {
            loadPatientData();
        } else if (!user) {
            window.location.href = 'index.html';
        }
    });
</script>
</body>
</html>
