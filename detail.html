<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>شفاء · الملف الطبي للمريض</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00AEEF;
            --primary-light: #E0F7FA;
            --primary-dark: #008080;
            --accent: #00AEEF;
            --accent-soft: #B2EBF2;
            --bg: #FAFAFA;
            --white: #FFFFFF;
            --ink: #1A3C4A;
            --text-sec: #5A7D8A;
            --danger: #E57373;
            --success: #26A69A;
            --warning: #FFB74D;
            --border-light: #E0E0E0;
            --shadow-sm: 0 4px 12px rgba(0,174,239,0.06);
            --shadow-md: 0 8px 24px rgba(0,174,239,0.1);
            --radius-card: 24px;
            --radius-xl: 50px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            padding: 14px;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 15% 25%, rgba(0,174,239,0.05) 0%, transparent 50%),
                        radial-gradient(ellipse at 85% 75%, rgba(0,128,128,0.04) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(12px);
            border-radius: var(--radius-xl);
            padding: 10px 20px;
            border: 1px solid rgba(255,255,255,0.8);
            box-shadow: var(--shadow-sm);
            flex-wrap: wrap;
            gap: 8px;
            position: sticky;
            top: 8px;
            z-index: 100;
        }
        .top-bar h2 {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--primary-dark);
            white-space: nowrap;
        }
        .btn {
            padding: 9px 16px;
            border-radius: var(--radius-xl);
            border: none;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.83rem;
            transition: all 0.15s;
            background: white;
            color: var(--ink);
            border: 1.5px solid var(--border-light);
            white-space: nowrap;
            touch-action: manipulation;
            min-height: 36px;
            text-decoration: none;
        }
        .btn:active { opacity: 0.8; transform: scale(0.97); }
        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            box-shadow: 0 4px 12px rgba(0,174,239,0.2);
        }
        .btn-outline { background: rgba(255,255,255,0.9); }
        .btn-sm { padding: 6px 12px; font-size: 0.78rem; border-radius: 30px; min-height: 30px; }

        .tenant-badge {
            background: var(--primary-light);
            padding: 4px 10px;
            border-radius: var(--radius-xl);
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--primary-dark);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .card {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(8px);
            border-radius: var(--radius-card);
            padding: 22px;
            border: 1px solid rgba(255,255,255,0.8);
            box-shadow: var(--shadow-sm);
            transition: 0.2s;
        }
        .card h2 { font-size: 1.3rem; margin-bottom: 14px; color: var(--primary-dark); font-weight: 800; }
        .info-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            font-size: 0.95rem;
        }
        .info-row i { width: 22px; color: var(--primary); flex-shrink: 0; }
        .record-item {
            background: white;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 10px;
            border: 1px solid var(--border-light);
            position: relative;
            transition: 0.2s;
        }
        .record-item:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.05); }
        .record-date { font-weight: 700; color: var(--primary-dark); margin-bottom: 6px; font-size: 0.9rem; }
        .record-diagnosis { margin-bottom: 6px; font-size: 0.9rem; }
        .drug-list {
            list-style-type: none;
            padding-right: 18px;
            color: var(--text-sec);
            font-size: 0.85rem;
        }
        .drug-list li::before { content: "💊"; margin-left: 6px; }
        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-sec); }
        .empty-state i { font-size: 2.5rem; opacity: 0.2; margin-bottom: 10px; display: block; }
        .loading { text-align: center; padding: 40px; font-size: 1.1rem; color: var(--text-sec); }
        
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1A3C4A;
            color: white;
            padding: 10px 20px;
            border-radius: var(--radius-xl);
            text-align: center;
            z-index: 3000;
            font-weight: 600;
            font-size: 0.82rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.18);
            white-space: nowrap;
        }
        .toast.err { background: #C62828; }

        .print-btn {
            position: absolute;
            top: 14px;
            left: 14px;
            background: var(--primary-light);
            border: none;
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 0.75rem;
            cursor: pointer;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            transition: 0.2s;
            color: var(--primary-dark);
            touch-action: manipulation;
        }
        .print-btn:active { background: var(--primary); color: white; }

        .search-section {
            display: flex;
            align-items: center;
            gap: 8px;
            background: white;
            border-radius: var(--radius-xl);
            padding: 6px 14px;
            border: 1.5px solid var(--border-light);
            box-shadow: var(--shadow-sm);
            flex: 1;
            max-width: 380px;
        }
        .search-section i { color: var(--text-sec); font-size: 0.85rem; }
        .search-section input {
            border: none;
            outline: none;
            font-family: 'Cairo', sans-serif;
            font-size: 0.85rem;
            flex: 1;
            min-width: 100px;
            background: transparent;
        }
        .search-section input::placeholder { color: #B0C8D0; }
        .clear-search-btn {
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            font-size: 1rem;
            padding: 4px;
            display: none;
            transition: 0.2s;
            touch-action: manipulation;
        }
        .clear-search-btn:active { transform: scale(1.1); }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        .status-pending { background: #FFF3E0; color: #E65100; }
        .status-dispensed { background: #E8F5E9; color: #00695C; }

        .load-more-container {
            text-align: center;
            padding: 15px;
        }

        @media (max-width: 500px) {
            body { padding: 8px; }
            .container { gap: 12px; }
            .card { padding: 16px; border-radius: 20px; }
            .top-bar { padding: 8px 14px; border-radius: var(--radius-xl); }
            .search-section { max-width: 100%; }
            .record-item { padding: 14px; }
        }
        @media print {
            .btn, .top-bar, .print-btn, .search-section, .toast-container, .tenant-badge, .load-more-container { display: none; }
            body { background: white; padding: 0; }
            .card { box-shadow: none; border: none; padding: 10px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="top-bar">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
            <h2><i class="fas fa-folder-open"></i> الملف الطبي</h2>
            <span class="tenant-badge" id="tenantBadge" style="display:none;">
                <i class="fas fa-hospital"></i> <span id="tenantName">المجمع الطبي</span>
            </span>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <button class="btn btn-outline btn-sm" onclick="history.back()">
                <i class="fas fa-arrow-right"></i> عودة
            </button>
            <button class="btn btn-outline btn-sm" id="logoutBtn" style="display:none;">
                <i class="fas fa-sign-out-alt"></i> خروج
            </button>
        </div>
    </div>

    <div class="card" id="summaryCard" style="display: none;">
        <h2><i class="fas fa-chart-bar"></i> ملخص</h2>
        <div id="summaryContent"></div>
    </div>

    <div id="contentArea">
        <div class="loading"><i class="fas fa-spinner fa-pulse"></i> جاري تحميل الملف...</div>
    </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script type="module">
    import { firebaseConfig } from './firebase-config.js';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getDatabase, ref, get, query, orderByChild, equalTo, limitToFirst } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const STORAGE_PREFIX = 'shifa_tenant_';
    const LOGIN_STORAGE_KEYS = ['shifa_session', 'shifa_remember', 'shifa_last_login', 'shifa_secure_session'];

    const urlParams = new URLSearchParams(window.location.search);
    const patientId = urlParams.get('patientId');
    const patientName = urlParams.get('patientName') || 'المريض';
    const currentTenantId = urlParams.get('tenant');

    // ✅ Pagination Constants
    const RECORDS_PER_PAGE = 10;
    let displayedRecordsCount = 0;

    let currentUser = null;
    let userRole = null;

    const prescriptionCache = {};
    let allPrescriptions = [];

    const $ = (sel) => document.querySelector(sel);

    const clearLoginSessionOnly = () => {
        try {
            LOGIN_STORAGE_KEYS.forEach(key => localStorage.removeItem(key));
            const sessionKeysToRemove = [];
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key && (key.startsWith('shifa_session') || key.startsWith('shifa_secure'))) {
                    sessionKeysToRemove.push(key);
                }
            }
            sessionKeysToRemove.forEach(key => localStorage.removeItem(key));
            sessionStorage.clear();
        } catch (e) { console.warn('تعذر مسح بيانات الجلسة:', e.message); }
    };

    const showToast = (msg, err = false) => {
        const old = document.querySelector('.toast');
        if (old) old.remove();
        const t = document.createElement('div');
        t.className = `toast ${err ? 'err' : ''}`;
        t.innerHTML = `<i class="fas ${err ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i> ${msg}`;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2500);
    };

    const getDataPath = (path) => currentTenantId ? `tenants/${currentTenantId}/${path}` : path;

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[m] || m);
    }

    function printPrescription(presId) {
        const data = prescriptionCache[presId];
        if (!data) return;
        const { prescription, items, doctorName, drugNames } = data;
        const patientDisplayName = escapeHtml(patientName || prescription.patient_name || 'المريض');
        const date = prescription.created_at ? new Date(prescription.created_at).toLocaleString('ar-EG') : 'غير معروف';

        let itemsHtml = '';
        items.forEach(item => {
            const drugName = escapeHtml(item.drug_name || drugNames[item.drug_id] || item.drug_id || '—');
            itemsHtml += `<li>${drugName} - ${escapeHtml(item.dose || '—')}</li>`;
        });

        const printWindow = window.open('', '_blank', 'width=800,height=600');
        printWindow.document.write(`
            <!DOCTYPE html>
            <html lang="ar" dir="rtl">
            <head><meta charset="UTF-8"><title>طباعة الروشتة</title>
            <style>
                body { font-family: 'Cairo', sans-serif; padding: 30px; color: #1A3C4A; }
                .header { text-align: center; margin-bottom: 25px; }
                .header h1 { color: #00AEEF; }
                .info { margin-bottom: 20px; }
                .info p { margin: 8px 0; font-size: 1.1rem; }
                ul { list-style-type: none; padding: 0; }
                ul li { padding: 8px 0; border-bottom: 1px dashed #E0E0E0; }
                ul li::before { content: "💊 "; margin-left: 8px; }
                @media print { body { padding: 10px; } }
            </style></head>
            <body>
                <div class="header"><h1>روشتة طبية</h1><p style="font-size:1.2rem;">شفاء</p></div>
                <div class="info">
                    <p><strong>المريض:</strong> ${patientDisplayName}</p>
                    <p><strong>الطبيب:</strong> د. ${escapeHtml(doctorName)}</p>
                    <p><strong>التاريخ:</strong> ${date}</p>
                    <p><strong>التشخيص:</strong> ${escapeHtml(prescription.diagnosis || 'غير مذكور')}</p>
                </div>
                <h3>الأدوية الموصوفة:</h3>
                <ul>${itemsHtml || '<li>لا توجد أدوية</li>'}</ul>
                <p style="margin-top:20px;"><strong>الحالة:</strong> ${prescription.status === 'تم الصرف' ? 'تم الصرف' : 'لم تصرف بعد'}</p>
                <script>window.onload = function() { window.print(); setTimeout(window.close, 500); };<\/script>
            </body>
            </html>
        `);
        printWindow.document.close();
    }

    async function loadPatientData() {
        const contentArea = document.getElementById('contentArea');
        try {
            let patientInfo = { name: patientName };
            
            if (currentTenantId) {
                const patientSnap = await get(ref(db, getDataPath(`patients/${patientId}`)));
                if (patientSnap.exists()) {
                    patientInfo = { ...patientInfo, ...patientSnap.val() };
                } else {
                    const publicSnap = await get(ref(db, `patients/${patientId}`));
                    if (publicSnap.exists()) {
                        patientInfo = { ...patientInfo, ...publicSnap.val() };
                    }
                }
            } else {
                const patientSnap = await get(ref(db, `patients/${patientId}`));
                if (patientSnap.exists()) {
                    patientInfo = patientSnap.val();
                }
            }

            // ✅ استخدام استعلام محسن مع limitToFirst لتقليل البيانات المحملة
            let allPresSnap = null;
            if (currentTenantId) {
                const presQuery = query(
                    ref(db, getDataPath('prescriptions')),
                    orderByChild('patient_id'),
                    equalTo(patientId),
                    limitToFirst(50) // ✅ حد أقصى 50 وصفة في البداية
                );
                allPresSnap = await get(presQuery);
                if (!allPresSnap.exists()) {
                    allPresSnap = await get(ref(db, 'prescriptions'));
                }
            } else {
                allPresSnap = await get(ref(db, 'prescriptions'));
            }
            
            let patientPrescriptions = [];
            if (allPresSnap.exists()) {
                allPresSnap.forEach(child => {
                    const val = child.val();
                    if (String(val.patient_id) === String(patientId)) {
                        patientPrescriptions.push({ id: child.key, ...val });
                    }
                });
            }
            patientPrescriptions.sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));
            allPrescriptions = patientPrescriptions;
            
            // ✅ إعادة تعيين عداد الـ Pagination
            displayedRecordsCount = RECORDS_PER_PAGE;

            const doctorIds = [...new Set(patientPrescriptions.map(p => p.doctor_id).filter(Boolean))];
            const doctorsMap = {};
            if (doctorIds.length > 0) {
                const doctorPromises = doctorIds.map(async (docId) => {
                    let snap = null;
                    if (currentTenantId) {
                        snap = await get(ref(db, getDataPath(`users/${docId}`)));
                        if (!snap.exists()) snap = await get(ref(db, `users/${docId}`));
                    } else {
                        snap = await get(ref(db, `users/${docId}`));
                    }
                    return { docId, snap };
                });
                const results = await Promise.all(doctorPromises);
                results.forEach(({ docId, snap }) => {
                    if (snap.exists()) doctorsMap[docId] = snap.val();
                });
            }

            // ✅ تحميل عناصر الوصفات - فقط للوصفات المعروضة حالياً
            const itemsMap = {};
            const initialBatch = patientPrescriptions.slice(0, RECORDS_PER_PAGE);
            for (const pres of initialBatch) {
                let itemsSnap = null;
                if (currentTenantId) {
                    itemsSnap = await get(ref(db, getDataPath(`prescription_items/${pres.id}`)));
                    if (!itemsSnap.exists()) itemsSnap = await get(ref(db, `prescription_items/${pres.id}`));
                } else {
                    itemsSnap = await get(ref(db, `prescription_items/${pres.id}`));
                }
                
                let items = [];
                if (itemsSnap.exists()) {
                    items = Object.values(itemsSnap.val());
                }
                itemsMap[pres.id] = items;
            }

            const drugIds = [];
            for (const presId in itemsMap) {
                itemsMap[presId].forEach(item => {
                    if (item.drug_id) drugIds.push(item.drug_id);
                });
            }
            const uniqueDrugIds = [...new Set(drugIds)];
            const drugNames = {};
            if (uniqueDrugIds.length > 0) {
                const drugPromises = uniqueDrugIds.map(async (did) => {
                    let snap = null;
                    if (currentTenantId) {
                        snap = await get(ref(db, getDataPath(`drugs/${did}`)));
                        if (!snap.exists()) snap = await get(ref(db, `drugs/${did}`));
                    } else {
                        snap = await get(ref(db, `drugs/${did}`));
                    }
                    return { did, snap };
                });
                const results = await Promise.all(drugPromises);
                results.forEach(({ did, snap }) => {
                    if (snap.exists()) drugNames[did] = snap.val().name;
                });
            }

            // ✅ تخزين بيانات الوصفات المحملة فقط
            initialBatch.forEach(pres => {
                prescriptionCache[pres.id] = {
                    prescription: pres,
                    items: itemsMap[pres.id] || [],
                    doctorName: (doctorsMap[pres.doctor_id] || {}).name || 'غير معروف',
                    drugNames: drugNames
                };
            });

            renderSummary(patientInfo, patientPrescriptions);
            renderPrescriptionsList(patientPrescriptions, itemsMap, doctorsMap, drugNames);

        } catch (err) {
            console.error('فشل تحميل بيانات المريض:', err);
            contentArea.innerHTML = '<div class="card"><div class="empty-state"><i class="fas fa-exclamation-triangle" style="color:var(--danger);"></i><p>حدث خطأ أثناء تحميل الملف</p></div></div>';
        }
    }

    function renderSummary(patientInfo, prescriptions) {
        const summaryCard = document.getElementById('summaryCard');
        if (!prescriptions.length) {
            summaryCard.style.display = 'none';
            return;
        }
        const lastPres = prescriptions[0];
        const lastDate = lastPres.created_at ? new Date(lastPres.created_at).toLocaleString('ar-EG') : 'غير معروف';
        const lastDiagnosis = lastPres.diagnosis || 'غير مذكور';
        document.getElementById('summaryContent').innerHTML = `
            <div class="info-row"><i class="fas fa-user"></i> <strong>الاسم:</strong> ${escapeHtml(patientInfo.name || patientName)}</div>
            ${patientInfo.phone ? `<div class="info-row"><i class="fas fa-phone"></i> <strong>الهاتف:</strong> ${escapeHtml(patientInfo.phone)}</div>` : ''}
            ${patientInfo.age ? `<div class="info-row"><i class="fas fa-birthday-cake"></i> <strong>العمر:</strong> ${patientInfo.age} سنة</div>` : ''}
            <div class="info-row"><i class="fas fa-calendar-check"></i> <strong>عدد الوصفات:</strong> ${prescriptions.length}</div>
            <div class="info-row"><i class="far fa-clock"></i> <strong>آخر وصفة:</strong> ${lastDate}</div>
            <div class="info-row"><i class="fas fa-notes-medical"></i> <strong>آخر تشخيص:</strong> ${escapeHtml(lastDiagnosis)}</div>
        `;
        summaryCard.style.display = 'block';
    }

    function renderPrescriptionsList(prescriptions, itemsMap, doctorsMap, drugNames) {
        const contentArea = document.getElementById('contentArea');
        
        const html = `
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 18px;">
                    <h2 style="margin-bottom:0;"><i class="fas fa-history"></i> السجل الطبي <span id="totalCount">(${prescriptions.length})</span></h2>
                    <div class="search-section">
                        <i class="fas fa-search"></i>
                        <input type="text" id="diagnosisSearchInput" placeholder="ابحث في التشخيصات..." autocomplete="off">
                        <button class="clear-search-btn" id="clearSearchBtn"><i class="fas fa-times-circle"></i></button>
                    </div>
                </div>
                <div id="prescriptionsListContainer">
                    ${prescriptions.length === 0 ? '<div class="empty-state"><i class="fas fa-prescription"></i><p>لا توجد وصفات سابقة لهذا المريض</p></div>' : ''}
                </div>
                <div id="loadMoreContainer" class="load-more-container"></div>
            </div>
        `;
        contentArea.innerHTML = html;

        // ✅ دالة عرض الوصفات مع Pagination
        async function displayPrescriptions(list, showAll = false) {
            const container = document.getElementById('prescriptionsListContainer');
            if (!list.length) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-search"></i><p>لا توجد نتائج مطابقة</p></div>';
                document.getElementById('loadMoreContainer').innerHTML = '';
                return;
            }
            
            // ✅ عرض عدد محدود فقط - يقلل الحمل على المتصفح
            const toShow = showAll ? list : list.slice(0, displayedRecordsCount);
            
            // ✅ تحميل عناصر الوصفات غير المحملة بعد
            for (const pres of toShow) {
                if (!prescriptionCache[pres.id]) {
                    let itemsSnap = null;
                    if (currentTenantId) {
                        itemsSnap = await get(ref(db, getDataPath(`prescription_items/${pres.id}`)));
                        if (!itemsSnap.exists()) itemsSnap = await get(ref(db, `prescription_items/${pres.id}`));
                    } else {
                        itemsSnap = await get(ref(db, `prescription_items/${pres.id}`));
                    }
                    
                    let items = [];
                    if (itemsSnap.exists()) {
                        items = Object.values(itemsSnap.val());
                    }
                    
                    prescriptionCache[pres.id] = {
                        prescription: pres,
                        items: items,
                        doctorName: (doctorsMap[pres.doctor_id] || {}).name || 'غير معروف',
                        drugNames: drugNames
                    };
                }
            }
            
            let html = '';
            toShow.forEach(pres => {
                const cache = prescriptionCache[pres.id];
                const date = pres.created_at ? new Date(pres.created_at).toLocaleString('ar-EG') : 'غير معروف';
                const doctorName = cache?.doctorName || (doctorsMap[pres.doctor_id] || {}).name || 'غير معروف';
                const items = cache?.items || itemsMap[pres.id] || [];
                const drugList = items.map(item => {
                    const drugName = item.drug_name || drugNames[item.drug_id] || item.drug_id || '—';
                    const dose = item.dose || '—';
                    return `<li>${escapeHtml(drugName)} - ${escapeHtml(dose)}</li>`;
                }).join('');

                const isDispensed = pres.status === 'تم الصرف';
                const statusClass = isDispensed ? 'status-dispensed' : 'status-pending';
                const statusText = isDispensed ? '✅ تم الصرف' : '⏳ لم تصرف بعد';

                html += `
                    <div class="record-item">
                        <button class="print-btn" data-print-id="${pres.id}"><i class="fas fa-print"></i> طباعة</button>
                        <div class="record-date"><i class="far fa-calendar-alt"></i> ${date}</div>
                        <div style="margin-bottom:6px;"><i class="fas fa-user-md"></i> <strong>الطبيب:</strong> د. ${escapeHtml(doctorName)}</div>
                        <div class="record-diagnosis"><strong>التشخيص:</strong> ${escapeHtml(pres.diagnosis || 'غير مذكور')}</div>
                        <div><strong>الأدوية:</strong></div>
                        <ul class="drug-list">${drugList || '<li>لا توجد أدوية</li>'}</ul>
                        <div style="margin-top: 8px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap;">
                            <span class="status-badge ${statusClass}">
                                <i class="fas fa-circle" style="font-size:0.4rem;"></i> ${statusText}
                            </span>
                            ${pres.pharmacist_name ? `<span style="font-size:0.78rem;color:var(--text-sec);">بواسطة ${escapeHtml(pres.pharmacist_name)}</span>` : ''}
                            ${pres.pharmacist_notes ? `<div style="width:100%;margin-top:6px;background:#FFF8E1;padding:8px 12px;border-radius:12px;font-size:0.78rem;color:#5D4037;border-right:3px solid var(--warning);"><i class="fas fa-pen"></i> ${escapeHtml(pres.pharmacist_notes)}</div>` : ''}
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;

            // ✅ زر "تحميل المزيد" - يظهر إذا كان هناك المزيد
            const loadMoreContainer = document.getElementById('loadMoreContainer');
            if (loadMoreContainer && !showAll && list.length > displayedRecordsCount) {
                const remaining = list.length - displayedRecordsCount;
                loadMoreContainer.innerHTML = `
                    <button class="btn btn-outline btn-sm" id="loadMoreBtn">
                        <i class="fas fa-chevron-down"></i> عرض المزيد (${remaining} متبقي)
                    </button>
                `;
                
                document.getElementById('loadMoreBtn')?.addEventListener('click', () => {
                    displayedRecordsCount += RECORDS_PER_PAGE;
                    displayPrescriptions(list, false);
                });
            } else {
                loadMoreContainer.innerHTML = '';
            }

            // ربط أحداث الطباعة
            container.querySelectorAll('.print-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    printPrescription(this.getAttribute('data-print-id'));
                });
            });
        }

        displayPrescriptions(prescriptions);

        const searchInput = document.getElementById('diagnosisSearchInput');
        const clearBtn = document.getElementById('clearSearchBtn');
        const totalSpan = document.getElementById('totalCount');

        function filterPrescriptions(term) {
            if (!term.trim()) {
                clearBtn.style.display = 'none';
                totalSpan.textContent = `(${prescriptions.length})`;
                displayedRecordsCount = RECORDS_PER_PAGE;
                displayPrescriptions(prescriptions);
                return;
            }
            clearBtn.style.display = 'block';
            const lowerTerm = term.toLowerCase().trim();
            const filtered = prescriptions.filter(p => 
                p.diagnosis && p.diagnosis.toLowerCase().includes(lowerTerm)
            );
            totalSpan.textContent = `(${filtered.length} من ${prescriptions.length})`;
            displayedRecordsCount = RECORDS_PER_PAGE;
            displayPrescriptions(filtered);
        }

        searchInput.addEventListener('input', (e) => filterPrescriptions(e.target.value));
        clearBtn.addEventListener('click', () => {
            searchInput.value = '';
            filterPrescriptions('');
            searchInput.focus();
        });
    }

    const setupLogout = () => {
        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
            logoutBtn.style.display = 'inline-flex';
            logoutBtn.addEventListener('click', async () => {
                try {
                    showToast('👋 جاري تسجيل الخروج...');
                    clearLoginSessionOnly();
                    await signOut(auth);
                    window.location.href = 'index.html';
                } catch (error) {
                    clearLoginSessionOnly();
                    window.location.href = 'index.html';
                }
            });
        }
    };

    if (!patientId) {
        document.getElementById('contentArea').innerHTML = 
            '<div class="card"><div class="empty-state"><i class="fas fa-exclamation-triangle" style="color:var(--danger);"></i><p>❌ لا يوجد معرف للمريض</p></div></div>';
    }

    onAuthStateChanged(auth, async (user) => {
        if (!user) { clearLoginSessionOnly(); window.location.href = 'index.html'; return; }
        
        currentUser = user;
        
        try {
            let userSnap = null;
            if (currentTenantId) {
                userSnap = await get(ref(db, `tenants/${currentTenantId}/users/${user.uid}`));
                if (!userSnap.exists()) userSnap = await get(ref(db, `users/${user.uid}`));
            } else {
                userSnap = await get(ref(db, `users/${user.uid}`));
            }
            
            if (userSnap.exists()) {
                const userData = userSnap.val();
                userRole = userData.role;
                
                if (userData.tenantName) {
                    document.getElementById('tenantName').textContent = userData.tenantName;
                    document.getElementById('tenantBadge').style.display = 'flex';
                }
                
                setupLogout();
            }
            
            if (userRole && !['doctor', 'pharmacist', 'nurse'].includes(userRole)) {
                document.getElementById('contentArea').innerHTML = 
                    '<div class="card"><div class="empty-state"><i class="fas fa-lock" style="color:var(--danger);"></i><p>⛔ غير مصرح لك بعرض الملف الطبي</p></div></div>';
                return;
            }
            
            if (patientId) loadPatientData();
        } catch (err) {
            if (patientId) loadPatientData();
        }
    });

    console.log('🚀 صفحة الملف الطبي - نظام المجمعات الطبية المتعددة مع Pagination');
    console.log('🔒 تدعم مسار المجمع والمسار العام للتوافق');
    console.log('📋 ملاحظات الصيدلي تظهر من السحابة تلقائياً');
    console.log('📄 Pagination: ' + RECORDS_PER_PAGE + ' وصفات في الصفحة');
</script>
</body>
</html>
