<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>سُكُون · لوحة الممرض</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ----- ألوان هوية سُكُون (أخضر مائي) مع لمسات عصرية ----- */
        :root {
            --primary: #7AC5C5;
            --primary-dark: #5BA3A3;
            --accent: #5BA3A3;
            --accent-dark: #3F8585;
            --bg: #ECF9F9;
            --white: #FFFFFF;
            --ink: #2C4A4A;
            --text-sec: #6B8E8E;
            --danger: #E57373;
            --success: #5FA88D;
            --warning: #F4B886;
            --border-light: #C5E0E0;
            --shadow-sm: 0 6px 14px rgba(58, 128, 128, 0.08);
            --shadow-md: 0 12px 28px -6px rgba(58, 128, 128, 0.15);
            --radius-card: 28px;
            --radius-element: 16px;
            --transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 0% 0%, rgba(122,197,197,0.1), transparent 50%),
                        radial-gradient(circle at 100% 100%, rgba(91,163,163,0.08), transparent 50%);
            pointer-events: none;
            z-index: -1;
        }
        .container { max-width: 1400px; margin: 0 auto; }

        /* الهيدر */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 12px 24px;
            margin-bottom: 24px;
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow: var(--shadow-md);
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo h2 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(145deg, #3F8585, #7AC5C5);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .header-actions { display: flex; gap: 12px; align-items: center; }
        .btn {
            padding: 10px 22px;
            border-radius: 60px;
            border: none;
            font-weight: 600;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            transition: var(--transition);
            background: white;
            color: var(--ink);
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-sm);
        }
        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            box-shadow: 0 6px 16px rgba(91,163,163,0.25);
        }
        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 24px rgba(91,163,163,0.35);
        }
        .btn-outline:hover {
            background: #f0fafb;
            border-color: var(--primary);
        }

        /* شريط الأطباء */
        .doctors-toolbar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }
        .doctor-tab-btn {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border-light);
            border-radius: 60px;
            padding: 12px 28px;
            font-weight: 700;
            color: var(--ink);
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
        }
        .doctor-tab-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 10px 20px rgba(91,163,163,0.25);
            transform: scale(1.02);
        }
        .doctor-tab-btn i { margin-left: 6px; }

        /* التبويبات */
        .tabs-container {
            background: rgba(255,255,255,0.5);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 6px;
            display: inline-flex;
            margin-bottom: 20px;
            border: 1px solid var(--border-light);
        }
        .tab-btn {
            background: transparent;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 700;
            color: var(--text-sec);
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.95rem;
        }
        .tab-btn.active {
            background: white;
            color: var(--accent-dark);
            box-shadow: var(--shadow-sm);
        }

        /* بطاقات إحصائية */
        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 18px;
            margin-bottom: 28px;
        }
        .stat-card {
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 18px 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            border: 1px solid rgba(255,255,255,0.7);
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
        }
        .stat-card:hover { transform: translateY(-4px); background: rgba(255,255,255,0.8); }
        .stat-icon {
            width: 52px;
            height: 52px;
            background: linear-gradient(145deg, var(--primary), var(--primary-dark));
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.6rem;
        }
        .stat-info h4 { font-size: 1.8rem; font-weight: 800; line-height: 1.2; }
        .stat-info p { color: var(--text-sec); font-size: 0.8rem; font-weight: 500; }

        /* جدول الحجوزات */
        .table-wrapper {
            background: rgba(255,255,255,0.65);
            backdrop-filter: blur(16px);
            border-radius: var(--radius-card);
            padding: 8px;
            box-shadow: var(--shadow-md);
            border: 1px solid rgba(255,255,255,0.7);
            overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; text-align: center; min-width: 1000px; }
        th, td { padding: 16px 12px; }
        thead tr { background: rgba(200,230,230,0.3); border-bottom: 2px solid var(--border-light); }
        th { font-weight: 700; color: var(--accent-dark); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; }
        tbody tr { border-bottom: 1px solid var(--border-light); transition: background 0.15s; }
        tbody tr:hover { background: rgba(122,197,197,0.08); }
        .status-badge {
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 700;
            display: inline-block;
        }
        .status-waiting { background: #FEF9E7; color: #9A6E1A; }
        .status-inprogress { background: #D6F0F0; color: #1A5C5C; }
        .status-done { background: #DCF5E8; color: #1E6F4C; }
        .status-cancelled { background: #FDE2E2; color: #B23B3B; }

        .action-btns { display: flex; gap: 8px; justify-content: center; }
        .icon-btn {
            width: 38px; height: 38px; border-radius: 14px; border: none;
            background: white; color: var(--text-sec); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: var(--transition); border: 1px solid var(--border-light);
            box-shadow: var(--shadow-sm);
        }
        .icon-btn:hover { background: var(--primary); color: white; border-color: var(--primary); transform: scale(1.05); }
        .icon-btn.danger:hover { background: var(--danger); border-color: var(--danger); }
        .icon-btn.success:hover { background: var(--success); border-color: var(--success); }

        /* مودال */
        .modal {
            display: none; position: fixed; inset: 0;
            background: rgba(30,50,50,0.4); backdrop-filter: blur(8px);
            align-items: center; justify-content: center; z-index: 1000; padding: 16px;
        }
        .modal-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(16px);
            border-radius: 36px;
            width: 100%; max-width: 600px; max-height: 85vh;
            overflow-y: auto; box-shadow: 0 30px 60px rgba(0,40,40,0.2);
            border: 1px solid rgba(255,255,255,0.8);
        }
        .modal-header {
            padding: 24px 28px; background: #F0F7F7;
            border-bottom: 1px solid var(--border-light);
            border-radius: 36px 36px 0 0;
            display: flex; justify-content: space-between; align-items: center;
        }
        .modal-body { padding: 24px 28px; }
        .close-btn { background: none; border: none; font-size: 30px; color: var(--text-sec); cursor: pointer; }
        .form-group { margin-bottom: 20px; }
        .form-control {
            width: 100%; padding: 14px 18px; border-radius: 20px;
            border: 1.5px solid var(--border-light); font-family: 'Cairo', sans-serif;
            background: white; transition: var(--transition);
        }
        .form-control:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(122,197,197,0.15); }
        .search-results {
            background: white; border: 1px solid var(--border-light); border-radius: 20px;
            margin-top: 8px; max-height: 240px; overflow-y: auto; display: none;
        }
        .search-item {
            padding: 12px 18px; cursor: pointer; border-bottom: 1px solid var(--border-light);
            transition: var(--transition);
        }
        .search-item:hover { background: #F0F7F7; }
        .patient-history {
            background: #F5FBFB; border-radius: 20px; padding: 16px; margin-top: 16px;
            border: 1px solid var(--border-light);
        }
        .history-item { padding: 8px 0; border-bottom: 1px dashed var(--border-light); font-size: 0.9rem; }

        /* Skeleton */
        .skeleton { background: linear-gradient(90deg, #e0f0f0 25%, #d0e8e8 50%, #e0f0f0 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .toast {
            position: fixed; bottom: 30px; left: 30px; right: 30px;
            background: var(--ink); color: white; padding: 16px 28px;
            border-radius: 60px; text-align: center; z-index: 1300; font-weight: 500;
            max-width: 500px; margin: 0 auto; box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .empty-state { text-align: center; padding: 50px; color: var(--text-sec); }
        .fade-in { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
<div class="container">
    <header class="app-header">
        <div class="logo">
            <h2><i class="fas fa-calendar-check" style="color:var(--primary); margin-left:10px;"></i>سُكُون · الممرض</h2>
        </div>
        <div class="header-actions">
            <span id="welcomeMessage" style="font-weight:600; color:var(--accent-dark);"></span>
            <button class="btn btn-primary" id="openModalBtn"><i class="fas fa-plus-circle"></i> حجز جديد</button>
            <button class="btn btn-outline" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> خروج</button>
        </div>
    </header>

    <!-- شريط الأطباء -->
    <div id="doctorsToolbar" class="doctors-toolbar"></div>

    <!-- تبويبات -->
    <div class="tabs-container">
        <button class="tab-btn active" data-tab="waiting"><i class="fas fa-hourglass-half"></i> قيد الانتظار</button>
        <button class="tab-btn" data-tab="inprogress"><i class="fas fa-stethoscope"></i> قيد الكشف</button>
        <button class="tab-btn" data-tab="done"><i class="fas fa-check-double"></i> منتهي</button>
    </div>

    <!-- إحصائيات -->
    <div class="stats-cards">
        <div class="stat-card"><div class="stat-icon"><i class="fas fa-calendar-check"></i></div><div class="stat-info"><h4 id="totalBookings">0</h4><p>إجمالي الحجوزات</p></div></div>
        <div class="stat-card"><div class="stat-icon"><i class="fas fa-clock"></i></div><div class="stat-info"><h4 id="waitingCount">0</h4><p>في الانتظار</p></div></div>
        <div class="stat-card"><div class="stat-icon"><i class="fas fa-play-circle"></i></div><div class="stat-info"><h4 id="inProgressCount">0</h4><p>قيد الكشف</p></div></div>
        <div class="stat-card"><div class="stat-icon"><i class="fas fa-check-circle"></i></div><div class="stat-info"><h4 id="doneCount">0</h4><p>منتهي</p></div></div>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr><th>#</th><th>المريض</th><th>العمر</th><th>الهاتف</th><th>التاريخ</th><th>الوقت</th><th>الحالة</th><th>إجراءات</th></tr>
            </thead>
            <tbody id="bookingsBody"><tr><td colspan="8" class="empty-state"><i class="fas fa-spinner fa-pulse"></i> جاري التحميل...</td></tr>
        </table>
    </div>
</div>

<!-- مودال حجز جديد -->
<div id="bookingModal" class="modal">
    <div class="modal-card">
        <div class="modal-header">
            <h3><i class="fas fa-calendar-plus" style="color:var(--primary);"></i> حجز موعد جديد</h3>
            <button class="close-btn" id="closeModalBtn">&times;</button>
        </div>
        <div class="modal-body">
            <form id="bookingForm">
                <div class="form-group">
                    <label><i class="fas fa-user-md"></i> الطبيب *</label>
                    <select id="bookingDoctorSelect" class="form-control" required></select>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-search"></i> البحث عن مريض</label>
                    <input type="text" id="patientSearch" class="form-control" placeholder="اسم أو رقم الهاتف..." autocomplete="off">
                    <div id="searchResults" class="search-results"></div>
                </div>
                <div class="form-group">
                    <label>اسم المريض *</label>
                    <input type="text" id="patientName" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>العمر</label>
                    <input type="number" id="patientAge" class="form-control" min="0" max="150">
                </div>
                <div class="form-group">
                    <label>رقم الهاتف</label>
                    <input type="tel" id="patientPhone" class="form-control">
                </div>
                <div class="form-group">
                    <label>تاريخ الموعد *</label>
                    <input type="date" id="appointmentDate" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>الوقت *</label>
                    <input type="time" id="appointmentTime" class="form-control" required>
                </div>
                <div id="patientHistoryBox" class="patient-history" style="display:none;">
                    <strong><i class="fas fa-history"></i> آخر الزيارات</strong>
                    <div id="historyList"></div>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;" id="submitBtn">تأكيد الحجز</button>
                <p id="formAlert" style="color:var(--danger); text-align:center; margin-top:16px;"></p>
            </form>
        </div>
    </div>
</div>

<script type="module">
    import { firebaseConfig } from './firebase-config.js';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
    import { getDatabase, ref, onValue, set, push, update, get, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // --- state ---
    let currentUser = null;
    let nurseInfo = null;
    let assignedDoctorsList = [];
    let currentDoctorId = null;
    let allBookings = [];
    let unsubscribeBookings = null;
    let selectedPatientId = null;
    let currentTab = 'waiting';
    let cachedPatients = new Map(); // تخزين مؤقت للمرضى

    // --- DOM ---
    const ui = {
        welcomeMessage: document.getElementById('welcomeMessage'),
        doctorsToolbar: document.getElementById('doctorsToolbar'),
        bookingsBody: document.getElementById('bookingsBody'),
        totalBookings: document.getElementById('totalBookings'),
        waitingCount: document.getElementById('waitingCount'),
        inProgressCount: document.getElementById('inProgressCount'),
        doneCount: document.getElementById('doneCount'),
        openModalBtn: document.getElementById('openModalBtn'),
        closeModalBtn: document.getElementById('closeModalBtn'),
        modal: document.getElementById('bookingModal'),
        bookingDoctorSelect: document.getElementById('bookingDoctorSelect'),
        patientSearch: document.getElementById('patientSearch'),
        searchResults: document.getElementById('searchResults'),
        patientName: document.getElementById('patientName'),
        patientAge: document.getElementById('patientAge'),
        patientPhone: document.getElementById('patientPhone'),
        appointmentDate: document.getElementById('appointmentDate'),
        appointmentTime: document.getElementById('appointmentTime'),
        patientHistoryBox: document.getElementById('patientHistoryBox'),
        historyList: document.getElementById('historyList'),
        submitBtn: document.getElementById('submitBtn'),
        formAlert: document.getElementById('formAlert'),
        bookingForm: document.getElementById('bookingForm'),
        logoutBtn: document.getElementById('logoutBtn'),
        tabBtns: document.querySelectorAll('.tab-btn')
    };

    const today = new Date().toISOString().split('T')[0];
    ui.appointmentDate.value = today;

    // --- Toast ---
    function showToast(msg, isErr = false) {
        const t = document.createElement('div');
        t.className = 'toast';
        t.style.background = isErr ? '#B23B3B' : '#2C4A4A';
        t.innerHTML = `<i class="fas ${isErr ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i> ${msg}`;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    // --- تحميل بيانات الممرض والأطباء المرتبطين ---
    async function loadNurseData(uid) {
        try {
            const snap = await get(ref(db, `users/${uid}`));
            if (!snap.exists()) throw new Error("بيانات الممرض غير موجودة");
            nurseInfo = snap.val();
            ui.welcomeMessage.textContent = `أهلاً، ${nurseInfo.name || 'ممرض'}`;

            const assignedDoctors = nurseInfo.assignedDoctors || {};
            const doctorIds = Object.keys(assignedDoctors);
            assignedDoctorsList = [];
            
            for (const docId of doctorIds) {
                const docSnap = await get(ref(db, `users/${docId}`));
                if (docSnap.exists()) {
                    assignedDoctorsList.push({ id: docId, name: docSnap.val().name || 'دكتور' });
                }
            }
            
            renderDoctorsToolbar();
            ui.bookingDoctorSelect.innerHTML = assignedDoctorsList.map(d => 
                `<option value="${d.id}">د. ${d.name}</option>`
            ).join('');
            
            if (assignedDoctorsList.length > 0) {
                currentDoctorId = assignedDoctorsList[0].id;
                highlightDoctorButton(currentDoctorId);
                loadBookingsForDoctor(currentDoctorId);
            } else {
                ui.bookingsBody.innerHTML = '<tr><td colspan="8" class="empty-state">لا يوجد أطباء مرتبطين بك</td></tr>';
            }
            return true;
        } catch (err) {
            showToast(err.message, true);
            return false;
        }
    }

    function renderDoctorsToolbar() {
        ui.doctorsToolbar.innerHTML = assignedDoctorsList.map(doc => `
            <button class="doctor-tab-btn" data-doctor-id="${doc.id}">
                <i class="fas fa-user-md"></i> د. ${doc.name}
            </button>
        `).join('');
        
        document.querySelectorAll('.doctor-tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const docId = btn.dataset.doctorId;
                currentDoctorId = docId;
                highlightDoctorButton(docId);
                loadBookingsForDoctor(docId);
            });
        });
    }

    function highlightDoctorButton(docId) {
        document.querySelectorAll('.doctor-tab-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.doctorId === docId);
        });
    }

    function loadBookingsForDoctor(doctorId) {
        if (unsubscribeBookings) unsubscribeBookings();
        if (!doctorId) return;

        const q = query(ref(db, 'appointments'), orderByChild('doctorId'), equalTo(doctorId));
        unsubscribeBookings = onValue(q, (snap) => {
            const bookings = [];
            snap.forEach(child => {
                const apt = child.val();
                if (apt.date === today) {
                    bookings.push({ id: child.key, ...apt });
                }
            });
            bookings.sort((a, b) => (a.time || '').localeCompare(b.time || ''));
            allBookings = bookings;
            filterAndRenderByTab();
            updateStats();
        });
    }

    function filterAndRenderByTab() {
        let filtered = [];
        if (currentTab === 'waiting') filtered = allBookings.filter(b => b.status === 'انتظار');
        else if (currentTab === 'inprogress') filtered = allBookings.filter(b => b.status === 'قيد الكشف');
        else if (currentTab === 'done') filtered = allBookings.filter(b => b.status === 'منتهي');
        renderTable(filtered);
    }

    function renderTable(bookings) {
        if (bookings.length === 0) {
            ui.bookingsBody.innerHTML = `<tr><td colspan="8" class="empty-state fade-in"><i class="far fa-folder-open"></i> لا توجد حجوزات</td></tr>`;
            return;
        }
        let html = '';
        bookings.forEach((b, idx) => {
            const statusClass = {
                'انتظار': 'status-waiting',
                'قيد الكشف': 'status-inprogress',
                'منتهي': 'status-done',
                'ملغي': 'status-cancelled'
            }[b.status] || 'status-waiting';
            html += `<tr class="fade-in">
                <td>${idx + 1}</td>
                <td><b>${b.patientName || '-'}</b></td>
                <td>${b.age || '-'}</td>
                <td>${b.phone || '-'}</td>
                <td>${b.date || '-'}</td>
                <td>${b.time || '-'}</td>
                <td><span class="status-badge ${statusClass}">${b.status || 'انتظار'}</span></td>
                <td>
                    <div class="action-btns">
                        ${b.status === 'انتظار' ? `<button class="icon-btn success" data-id="${b.id}" data-action="start" title="بدء الكشف"><i class="fas fa-play"></i></button>` : ''}
                        ${b.status === 'قيد الكشف' ? `<button class="icon-btn" data-id="${b.id}" data-action="finish" style="background:var(--success); color:white;" title="إنهاء"><i class="fas fa-check"></i></button>` : ''}
                        ${b.status !== 'ملغي' && b.status !== 'منتهي' ? `<button class="icon-btn danger" data-id="${b.id}" data-action="cancel" title="إلغاء"><i class="fas fa-times"></i></button>` : ''}
                        <button class="icon-btn danger" data-id="${b.id}" data-action="delete" title="حذف"><i class="fas fa-trash"></i></button>
                    </div>
                </td>
            </tr>`;
        });
        ui.bookingsBody.innerHTML = html;
    }

    function updateStats() {
        const waiting = allBookings.filter(b => b.status === 'انتظار').length;
        const inProgress = allBookings.filter(b => b.status === 'قيد الكشف').length;
        const done = allBookings.filter(b => b.status === 'منتهي').length;
        ui.totalBookings.textContent = allBookings.length;
        ui.waitingCount.textContent = waiting;
        ui.inProgressCount.textContent = inProgress;
        ui.doneCount.textContent = done;
    }

    // --- إجراءات ---
    ui.bookingsBody.addEventListener('click', (e) => {
        const btn = e.target.closest('[data-action]');
        if (!btn) return;
        const id = btn.dataset.id;
        const action = btn.dataset.action;
        if (action === 'start') updateStatus(id, 'قيد الكشف');
        else if (action === 'finish') updateStatus(id, 'منتهي');
        else if (action === 'cancel') updateStatus(id, 'ملغي');
        else if (action === 'delete') deleteBooking(id);
    });

    async function updateStatus(id, status) {
        try {
            await update(ref(db, `appointments/${id}`), { status });
            showToast(status === 'منتهي' ? '✅ تم إنهاء الكشف' : status === 'قيد الكشف' ? '🩺 بدأ الكشف' : '❌ تم الإلغاء');
        } catch (e) { showToast('فشل التحديث', true); }
    }

    async function deleteBooking(id) {
        if (!confirm('حذف الحجز نهائياً؟')) return;
        try {
            await set(ref(db, `appointments/${id}`), null);
            showToast('تم الحذف');
        } catch (e) { showToast('فشل الحذف', true); }
    }

    // --- تبويبات ---
    ui.tabBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            ui.tabBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentTab = btn.dataset.tab;
            filterAndRenderByTab();
        });
    });

    // --- البحث عن مريض (مع تخزين مؤقت) ---
    let searchTimeout;
    ui.patientSearch.addEventListener('input', (e) => {
        const term = e.target.value.trim();
        if (term.length < 2) { ui.searchResults.style.display = 'none'; return; }
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(async () => {
            const results = [];
            // فحص الذاكرة المؤقتة أولاً
            for (let [id, p] of cachedPatients.entries()) {
                if (p.name?.includes(term) || p.phone?.includes(term)) results.push({ id, ...p });
            }
            if (results.length === 0) {
                const snap = await get(ref(db, 'patients'));
                snap.forEach(child => {
                    const p = child.val();
                    cachedPatients.set(child.key, p);
                    if (p.name?.includes(term) || p.phone?.includes(term)) {
                        results.push({ id: child.key, ...p });
                    }
                });
            }
            ui.searchResults.innerHTML = '';
            if (results.length === 0) {
                ui.searchResults.innerHTML = '<div class="search-item">لا توجد نتائج</div>';
            } else {
                results.forEach(p => {
                    const div = document.createElement('div');
                    div.className = 'search-item';
                    div.innerHTML = `<b>${p.name}</b><br><small>${p.phone || 'بدون رقم'}</small>`;
                    div.onclick = () => selectPatient(p);
                    ui.searchResults.appendChild(div);
                });
            }
            ui.searchResults.style.display = 'block';
        }, 250);
    });

    async function selectPatient(patient) {
        ui.patientName.value = patient.name || '';
        ui.patientAge.value = patient.age || '';
        ui.patientPhone.value = patient.phone || '';
        selectedPatientId = patient.id;
        ui.patientSearch.value = '';
        ui.searchResults.style.display = 'none';
        
        // عرض سجل الزيارات
        const historyQuery = query(ref(db, 'appointments'), orderByChild('patientId'), equalTo(patient.id));
        const snap = await get(historyQuery);
        ui.historyList.innerHTML = '';
        if (snap.exists()) {
            const visits = [];
            snap.forEach(c => visits.push(c.val()));
            visits.sort((a,b) => (b.date+b.time).localeCompare(a.date+a.time));
            visits.slice(0,3).forEach(v => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `<i class="far fa-calendar-alt"></i> ${v.date} ${v.time} - ${v.status || 'انتظار'}`;
                ui.historyList.appendChild(div);
            });
            ui.patientHistoryBox.style.display = 'block';
        } else {
            ui.patientHistoryBox.style.display = 'none';
        }
    }

    // --- حجز جديد ---
    ui.bookingForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const doctorId = ui.bookingDoctorSelect.value;
        const name = ui.patientName.value.trim();
        const date = ui.appointmentDate.value;
        const time = ui.appointmentTime.value;
        if (!doctorId || !name || !date || !time) {
            ui.formAlert.textContent = 'جميع الحقول المطلوبة';
            return;
        }
        ui.submitBtn.disabled = true;
        ui.submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الحفظ...';
        try {
            const phone = ui.patientPhone.value.trim();
            if (phone) {
                await set(ref(db, `patients/${phone}`), {
                    name, age: ui.patientAge.value || null, phone,
                    updatedAt: new Date().toISOString()
                });
                selectedPatientId = phone;
                cachedPatients.set(phone, { name, age: ui.patientAge.value, phone });
            }
            await push(ref(db, 'appointments'), {
                patientName: name,
                patientId: selectedPatientId || null,
                age: ui.patientAge.value || null,
                phone: phone || null,
                doctorId: doctorId,
                date, time,
                status: 'انتظار',
                createdAt: new Date().toISOString()
            });
            showToast('✅ تم حجز الموعد');
            ui.modal.style.display = 'none';
            resetForm();
        } catch (err) {
            ui.formAlert.textContent = 'خطأ: ' + err.message;
        } finally {
            ui.submitBtn.disabled = false;
            ui.submitBtn.innerHTML = 'تأكيد الحجز';
        }
    });

    function resetForm() {
        ui.bookingForm.reset();
        ui.appointmentDate.value = today;
        selectedPatientId = null;
        ui.patientHistoryBox.style.display = 'none';
        ui.formAlert.textContent = '';
    }

    ui.openModalBtn.onclick = () => {
        if (assignedDoctorsList.length === 0) {
            showToast('لا يوجد أطباء مرتبطين', true);
            return;
        }
        resetForm();
        ui.modal.style.display = 'flex';
    };
    ui.closeModalBtn.onclick = () => ui.modal.style.display = 'none';
    window.onclick = (e) => { if (e.target === ui.modal) ui.modal.style.display = 'none'; };
    document.addEventListener('click', (e) => {
        if (!ui.patientSearch.contains(e.target) && !ui.searchResults.contains(e.target)) {
            ui.searchResults.style.display = 'none';
        }
    });

    ui.logoutBtn.onclick = async () => {
        if (unsubscribeBookings) unsubscribeBookings();
        await signOut(auth);
        window.location.href = 'index.html';
    };

    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = 'index.html'; return; }
        currentUser = user;
        await loadNurseData(user.uid);
    });
</script>
</body>
</html>
