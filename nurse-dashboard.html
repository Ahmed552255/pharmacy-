<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>سُكُون · لوحة الممرض</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* نفس متغيرات الألوان الأساسية (أخضر مائي) */
        :root {
            --primary: #7AC5C5;
            --primary-dark: #5BA3A3;
            --accent: #5BA3A3;
            --accent-dark: #3F8585;
            --bg: #ECF9F9;
            --white: #FFFFFF;
            --ink: #2C4A4A;
            --text-sec: #6B8E8E;
            --danger: #E57373;
            --success: #5FA88D;
            --warning: #F4B886;
            --border-light: #C5E0E0;
            --shadow-sm: 0 4px 6px -2px rgba(58, 128, 128, 0.08);
            --shadow-md: 0 10px 25px -5px rgba(58, 128, 128, 0.12);
            --radius-card: 24px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 0% 0%, rgba(122,197,197,0.08), transparent 50%),
                        radial-gradient(circle at 100% 100%, rgba(91,163,163,0.08), transparent 50%);
            pointer-events: none;
            z-index: -1;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(16px);
            border-radius: 60px;
            padding: 12px 24px;
            margin-bottom: 24px;
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: var(--shadow-md);
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo h2 { font-size: 1.8rem; font-weight: 700; color: var(--accent-dark); }
        .header-actions { display: flex; gap: 12px; align-items: center; }
        .btn {
            padding: 10px 22px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            transition: all 0.2s;
            background: white;
            color: var(--ink);
            border: 1px solid var(--border-light);
        }
        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            box-shadow: 0 4px 10px rgba(91,163,163,0.25);
        }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); }
        .btn-outline:hover { background: #f8fafc; }

        .doctors-toolbar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }
        .doctor-tab-btn {
            background: white;
            border: 1px solid var(--border-light);
            border-radius: 60px;
            padding: 10px 24px;
            font-weight: 600;
            color: var(--ink);
            transition: 0.2s;
        }
        .doctor-tab-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: var(--shadow-sm);
        }

        /* التبويبات */
        .tabs-container {
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 6px;
            display: inline-flex;
            margin-bottom: 20px;
            border: 1px solid var(--border-light);
        }
        .tab-btn {
            background: transparent;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            color: var(--text-sec);
            cursor: pointer;
        }
        .tab-btn.active {
            background: white;
            color: var(--accent-dark);
            box-shadow: var(--shadow-sm);
        }

        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid var(--border-light);
        }
        .stat-icon {
            width: 48px;
            height: 48px;
            background: var(--primary);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.4rem;
        }
        .stat-info h4 { font-size: 1.5rem; font-weight: 800; }

        .table-wrapper {
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(8px);
            border-radius: var(--radius-card);
            padding: 4px;
            box-shadow: var(--shadow-md);
            border: 1px solid rgba(255,255,255,0.6);
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
            min-width: 1000px;
        }
        th, td { padding: 16px 12px; }
        thead tr { background: #f0f7f7; border-bottom: 2px solid var(--border-light); }
        th { font-weight: 700; color: var(--text-sec); font-size: 0.85rem; text-transform: uppercase; }
        tbody tr { border-bottom: 1px solid var(--border-light); transition: background 0.15s; }
        tbody tr:hover { background: rgba(122,197,197,0.05); }

        .status-badge {
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        .status-waiting { background: #FEF9E7; color: #9A6E1A; }
        .status-inprogress { background: #D6F0F0; color: #1A5C5C; }
        .status-done { background: #DCF5E8; color: #1E6F4C; }
        .status-cancelled { background: #FDE2E2; color: #B23B3B; }

        .action-btns { display: flex; gap: 8px; justify-content: center; }
        .icon-btn {
            width: 36px; height: 36px; border-radius: 12px; border: none;
            background: white; color: var(--text-sec); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s; border: 1px solid var(--border-light);
        }
        .icon-btn:hover { background: var(--primary); color: white; border-color: var(--primary); }
        .icon-btn.danger:hover { background: var(--danger); border-color: var(--danger); }
        .icon-btn.success:hover { background: var(--success); border-color: var(--success); }

        /* مودال */
        .modal { display: none; position: fixed; inset: 0; background: rgba(30,50,50,0.3); backdrop-filter: blur(6px); align-items: center; justify-content: center; z-index: 1000; padding: 16px; }
        .modal-card { background: white; border-radius: 32px; width: 100%; max-width: 600px; max-height: 85vh; overflow-y: auto; box-shadow: 0 30px 60px rgba(0,40,40,0.15); }
        .modal-header { padding: 22px 28px; background: #F0F7F7; border-bottom: 1px solid var(--border-light); border-radius: 32px 32px 0 0; display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 24px 28px; }
        .close-btn { background: none; border: none; font-size: 28px; color: var(--text-sec); cursor: pointer; }
        .form-group { margin-bottom: 20px; }
        .form-control { width: 100%; padding: 12px 16px; border-radius: 16px; border: 1.5px solid var(--border-light); font-family: 'Cairo', sans-serif; }
        .search-results { background: white; border: 1px solid var(--border-light); border-radius: 16px; margin-top: 8px; max-height: 220px; overflow-y: auto; display: none; }
        .search-item { padding: 12px 16px; cursor: pointer; border-bottom: 1px solid var(--border-light); }
        .search-item:hover { background: #F0F7F7; }
        .toast { position: fixed; bottom: 24px; left: 24px; right: 24px; background: var(--ink); color: white; padding: 14px 24px; border-radius: 60px; text-align: center; z-index: 1300; font-weight: 500; max-width: 500px; margin: 0 auto; }
        .empty-state { text-align: center; padding: 40px; color: var(--text-sec); }
    </style>
</head>
<body>
<div class="container">
    <header class="app-header">
        <div class="logo">
            <h2><i class="fas fa-calendar-check" style="color:var(--primary); margin-left:8px;"></i>سُكُون · الممرض</h2>
        </div>
        <div class="header-actions">
            <span id="welcomeMessage" style="font-weight:600;">جاري التحميل...</span>
            <button class="btn btn-primary" id="openModalBtn"><i class="fas fa-plus"></i> حجز جديد</button>
            <button class="btn btn-outline" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> خروج</button>
        </div>
    </header>

    <!-- شريط الأطباء المرتبطين -->
    <div id="doctorsToolbar" class="doctors-toolbar"></div>

    <!-- تبويبات الحالة -->
    <div class="tabs-container">
        <button class="tab-btn active" data-tab="waiting">🕒 قيد الانتظار</button>
        <button class="tab-btn" data-tab="inprogress">🩺 قيد الكشف</button>
        <button class="tab-btn" data-tab="done">✅ منتهي</button>
    </div>

    <!-- بطاقات إحصائية -->
    <div class="stats-cards">
        <div class="stat-card"><div class="stat-icon"><i class="fas fa-calendar-check"></i></div><div class="stat-info"><h4 id="totalBookings">0</h4><p>إجمالي الحجوزات</p></div></div>
        <div class="stat-card"><div class="stat-icon"><i class="fas fa-clock"></i></div><div class="stat-info"><h4 id="waitingCount">0</h4><p>في الانتظار</p></div></div>
        <div class="stat-card"><div class="stat-icon"><i class="fas fa-play-circle"></i></div><div class="stat-info"><h4 id="inProgressCount">0</h4><p>قيد الكشف</p></div></div>
        <div class="stat-card"><div class="stat-icon"><i class="fas fa-check-circle"></i></div><div class="stat-info"><h4 id="doneCount">0</h4><p>منتهي</p></div></div>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr><th>#</th><th>المريض</th><th>العمر</th><th>الهاتف</th><th>التاريخ</th><th>الوقت</th><th>الحالة</th><th>إجراءات</th></tr>
            </thead>
            <tbody id="bookingsBody"><tr><td colspan="8" class="empty-state"><i class="fas fa-spinner fa-spin"></i> جاري التحميل...</td></tr>
        </table>
    </div>
</div>

<!-- مودال الحجز -->
<div id="bookingModal" class="modal">
    <div class="modal-card">
        <div class="modal-header">
            <h3><i class="fas fa-calendar-plus"></i> حجز موعد جديد</h3>
            <button class="close-btn" id="closeModalBtn">&times;</button>
        </div>
        <div class="modal-body">
            <form id="bookingForm">
                <div class="form-group">
                    <label>الطبيب *</label>
                    <select id="bookingDoctorSelect" class="form-control" required></select>
                </div>
                <div class="form-group">
                    <label>البحث عن مريض</label>
                    <input type="text" id="patientSearch" class="form-control" placeholder="اكتب للبحث..." autocomplete="off">
                    <div id="searchResults" class="search-results"></div>
                </div>
                <div class="form-group">
                    <label>اسم المريض *</label>
                    <input type="text" id="patientName" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>العمر</label>
                    <input type="number" id="patientAge" class="form-control" min="0" max="150">
                </div>
                <div class="form-group">
                    <label>رقم الهاتف</label>
                    <input type="tel" id="patientPhone" class="form-control">
                </div>
                <div class="form-group">
                    <label>تاريخ الموعد *</label>
                    <input type="date" id="appointmentDate" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>الوقت *</label>
                    <input type="time" id="appointmentTime" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;" id="submitBtn">تأكيد الحجز</button>
                <p id="formAlert" style="color:var(--danger); text-align:center; margin-top:12px;"></p>
            </form>
        </div>
    </div>
</div>

<script type="module">
    import { firebaseConfig } from './firebase-config.js';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
    import { getDatabase, ref, onValue, set, push, update, get, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // --- الحالة العامة ---
    let currentUser = null;
    let nurseInfo = null;               // بيانات الممرض من /users/{uid}
    let assignedDoctorsList = [];       // [{ id, name }]
    let currentDoctorId = null;         // الطبيب المحدد حالياً
    let allBookings = [];              // كل حجوزات اليوم لكل الأطباء (أو المصفى)
    let unsubscribeBookings = null;
    let selectedPatientId = null;

    // --- عناصر DOM ---
    const ui = {
        welcomeMessage: document.getElementById('welcomeMessage'),
        doctorsToolbar: document.getElementById('doctorsToolbar'),
        bookingsBody: document.getElementById('bookingsBody'),
        totalBookings: document.getElementById('totalBookings'),
        waitingCount: document.getElementById('waitingCount'),
        inProgressCount: document.getElementById('inProgressCount'),
        doneCount: document.getElementById('doneCount'),
        openModalBtn: document.getElementById('openModalBtn'),
        closeModalBtn: document.getElementById('closeModalBtn'),
        modal: document.getElementById('bookingModal'),
        bookingDoctorSelect: document.getElementById('bookingDoctorSelect'),
        patientSearch: document.getElementById('patientSearch'),
        searchResults: document.getElementById('searchResults'),
        patientName: document.getElementById('patientName'),
        patientAge: document.getElementById('patientAge'),
        patientPhone: document.getElementById('patientPhone'),
        appointmentDate: document.getElementById('appointmentDate'),
        appointmentTime: document.getElementById('appointmentTime'),
        submitBtn: document.getElementById('submitBtn'),
        formAlert: document.getElementById('formAlert'),
        bookingForm: document.getElementById('bookingForm'),
        logoutBtn: document.getElementById('logoutBtn'),
        tabBtns: document.querySelectorAll('.tab-btn')
    };

    const today = new Date().toISOString().split('T')[0];
    ui.appointmentDate.value = today;

    let currentTab = 'waiting'; // waiting, inprogress, done

    // --- دوال مساعدة ---
    function showToast(msg, isErr = false) {
        const t = document.createElement('div');
        t.className = 'toast';
        t.style.background = isErr ? '#B23B3B' : '#2C4A4A';
        t.innerHTML = `<i class="fas ${isErr ? 'fa-exclamation-triangle' : 'fa-check'}"></i> ${msg}`;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    // --- تحميل بيانات الممرض والأطباء المرتبطين ---
    async function loadNurseData(uid) {
        try {
            const snap = await get(ref(db, `users/${uid}`));
            if (!snap.exists()) throw new Error("بيانات الممرض غير موجودة");
            nurseInfo = snap.val();
            ui.welcomeMessage.textContent = `أهلاً، ${nurseInfo.name || 'ممرض'}`;

            // الحصول على قائمة الأطباء
            const assignedDoctors = nurseInfo.assignedDoctors || {};
            const doctorIds = Object.keys(assignedDoctors);
            assignedDoctorsList = [];
            
            for (const docId of doctorIds) {
                const docSnap = await get(ref(db, `users/${docId}`));
                if (docSnap.exists()) {
                    assignedDoctorsList.push({ id: docId, name: docSnap.val().name || 'دكتور' });
                }
            }
            
            renderDoctorsToolbar();
            // ملء قائمة الأطباء في المودال
            ui.bookingDoctorSelect.innerHTML = assignedDoctorsList.map(d => 
                `<option value="${d.id}">د. ${d.name}</option>`
            ).join('');
            
            if (assignedDoctorsList.length > 0) {
                currentDoctorId = assignedDoctorsList[0].id;
                highlightDoctorButton(currentDoctorId);
                loadBookingsForDoctor(currentDoctorId);
            } else {
                ui.bookingsBody.innerHTML = '<tr><td colspan="8" class="empty-state">لا يوجد أطباء مرتبطين بك</td></tr>';
            }
            return true;
        } catch (err) {
            console.error(err);
            showToast(err.message, true);
            return false;
        }
    }

    function renderDoctorsToolbar() {
        ui.doctorsToolbar.innerHTML = assignedDoctorsList.map(doc => `
            <button class="doctor-tab-btn" data-doctor-id="${doc.id}">
                <i class="fas fa-user-md"></i> د. ${doc.name}
            </button>
        `).join('');
        
        document.querySelectorAll('.doctor-tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const docId = btn.dataset.doctorId;
                currentDoctorId = docId;
                highlightDoctorButton(docId);
                loadBookingsForDoctor(docId);
            });
        });
    }

    function highlightDoctorButton(docId) {
        document.querySelectorAll('.doctor-tab-btn').forEach(btn => {
            btn.classList.remove('active');
            if (btn.dataset.doctorId === docId) btn.classList.add('active');
        });
    }

    // --- تحميل الحجوزات لطبيب معين (مع مراعاة التبويب الحالي) ---
    function loadBookingsForDoctor(doctorId) {
        if (unsubscribeBookings) unsubscribeBookings();
        if (!doctorId) return;

        const todayStr = today;
        const bookingsRef = ref(db, 'appointments');
        const q = query(bookingsRef, orderByChild('doctorId'), equalTo(doctorId));
        
        unsubscribeBookings = onValue(q, (snap) => {
            const bookings = [];
            snap.forEach(child => {
                const apt = child.val();
                // نأخذ فقط حجوزات اليوم
                if (apt.date === todayStr) {
                    bookings.push({ id: child.key, ...apt });
                }
            });
            // ترتيب حسب الوقت
            bookings.sort((a, b) => (a.time || '').localeCompare(b.time || ''));
            allBookings = bookings;
            filterAndRenderByTab();
            updateStats();
        });
    }

    function filterAndRenderByTab() {
        let filtered = [];
        if (currentTab === 'waiting') filtered = allBookings.filter(b => b.status === 'انتظار');
        else if (currentTab === 'inprogress') filtered = allBookings.filter(b => b.status === 'قيد الكشف');
        else if (currentTab === 'done') filtered = allBookings.filter(b => b.status === 'منتهي');
        
        renderTable(filtered);
    }

    function renderTable(bookings) {
        if (!ui.bookingsBody) return;
        if (bookings.length === 0) {
            ui.bookingsBody.innerHTML = `<tr><td colspan="8" class="empty-state">لا توجد حجوزات في هذا القسم</td></tr>`;
            return;
        }
        let html = '';
        bookings.forEach((b, idx) => {
            const statusClass = {
                'انتظار': 'status-waiting',
                'قيد الكشف': 'status-inprogress',
                'منتهي': 'status-done',
                'ملغي': 'status-cancelled'
            }[b.status] || 'status-waiting';
            html += `<tr>
                <td>${idx + 1}</td>
                <td><b>${b.patientName || '-'}</b></td>
                <td>${b.age || '-'}</td>
                <td>${b.phone || '-'}</td>
                <td>${b.date || '-'}</td>
                <td>${b.time || '-'}</td>
                <td><span class="status-badge ${statusClass}">${b.status || 'انتظار'}</span></td>
                <td>
                    <div class="action-btns">
                        ${b.status === 'انتظار' ? `<button class="icon-btn success" data-id="${b.id}" data-action="start"><i class="fas fa-play"></i></button>` : ''}
                        ${b.status === 'قيد الكشف' ? `<button class="icon-btn" data-id="${b.id}" data-action="finish" style="background:var(--success); color:white;"><i class="fas fa-check"></i></button>` : ''}
                        ${b.status !== 'ملغي' && b.status !== 'منتهي' ? `<button class="icon-btn danger" data-id="${b.id}" data-action="cancel"><i class="fas fa-times"></i></button>` : ''}
                        <button class="icon-btn danger" data-id="${b.id}" data-action="delete"><i class="fas fa-trash"></i></button>
                    </div>
                </td>
            </tr>`;
        });
        ui.bookingsBody.innerHTML = html;
    }

    function updateStats() {
        const waiting = allBookings.filter(b => b.status === 'انتظار').length;
        const inProgress = allBookings.filter(b => b.status === 'قيد الكشف').length;
        const done = allBookings.filter(b => b.status === 'منتهي').length;
        ui.totalBookings.textContent = allBookings.length;
        ui.waitingCount.textContent = waiting;
        ui.inProgressCount.textContent = inProgress;
        ui.doneCount.textContent = done;
    }

    // --- أحداث الجدول (بدء، إنهاء، إلغاء، حذف) ---
    ui.bookingsBody.addEventListener('click', (e) => {
        const btn = e.target.closest('[data-action]');
        if (!btn) return;
        const id = btn.dataset.id;
        const action = btn.dataset.action;
        if (action === 'start') updateStatus(id, 'قيد الكشف');
        else if (action === 'finish') updateStatus(id, 'منتهي');
        else if (action === 'cancel') updateStatus(id, 'ملغي');
        else if (action === 'delete') deleteBooking(id);
    });

    async function updateStatus(id, status) {
        try {
            await update(ref(db, `appointments/${id}`), { status });
            showToast(status === 'منتهي' ? '✅ تم إنهاء الكشف' : status === 'قيد الكشف' ? '🩺 بدأ الكشف' : '❌ تم الإلغاء');
        } catch (e) {
            showToast('فشل التحديث', true);
        }
    }

    async function deleteBooking(id) {
        if (!confirm('حذف الحجز نهائياً؟')) return;
        try {
            await set(ref(db, `appointments/${id}`), null);
            showToast('تم الحذف');
        } catch (e) {
            showToast('فشل الحذف', true);
        }
    }

    // --- التبويبات ---
    ui.tabBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            ui.tabBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentTab = btn.dataset.tab;
            filterAndRenderByTab();
        });
    });

    // --- البحث عن مريض (من جدول patients) ---
    let searchTimeout;
    ui.patientSearch.addEventListener('input', (e) => {
        const term = e.target.value.trim();
        if (term.length < 2) { ui.searchResults.style.display = 'none'; return; }
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(async () => {
            const patientsRef = ref(db, 'patients');
            const snap = await get(patientsRef);
            const results = [];
            snap.forEach(child => {
                const p = child.val();
                if (p.name?.includes(term) || p.phone?.includes(term)) {
                    results.push({ id: child.key, ...p });
                }
            });
            ui.searchResults.innerHTML = '';
            if (results.length === 0) {
                ui.searchResults.innerHTML = '<div class="search-item">لا توجد نتائج</div>';
            } else {
                results.forEach(p => {
                    const div = document.createElement('div');
                    div.className = 'search-item';
                    div.innerHTML = `<b>${p.name}</b><br><small>${p.phone || 'بدون رقم'}</small>`;
                    div.onclick = () => selectPatient(p);
                    ui.searchResults.appendChild(div);
                });
            }
            ui.searchResults.style.display = 'block';
        }, 300);
    });

    function selectPatient(patient) {
        ui.patientName.value = patient.name || '';
        ui.patientAge.value = patient.age || '';
        ui.patientPhone.value = patient.phone || '';
        selectedPatientId = patient.id;
        ui.patientSearch.value = '';
        ui.searchResults.style.display = 'none';
    }

    // --- إضافة حجز جديد ---
    ui.bookingForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const doctorId = ui.bookingDoctorSelect.value;
        const name = ui.patientName.value.trim();
        const date = ui.appointmentDate.value;
        const time = ui.appointmentTime.value;
        if (!doctorId || !name || !date || !time) {
            ui.formAlert.textContent = 'جميع الحقول المطلوبة';
            return;
        }
        ui.submitBtn.disabled = true;
        ui.submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الحفظ...';
        try {
            const phone = ui.patientPhone.value.trim();
            if (phone) {
                await set(ref(db, `patients/${phone}`), {
                    name, age: ui.patientAge.value || null, phone,
                    updatedAt: new Date().toISOString()
                });
                selectedPatientId = phone;
            }
            await push(ref(db, 'appointments'), {
                patientName: name,
                patientId: selectedPatientId || null,
                age: ui.patientAge.value || null,
                phone: phone || null,
                doctorId: doctorId,
                date, time,
                status: 'انتظار',
                createdAt: new Date().toISOString()
            });
            showToast('✅ تم حجز الموعد');
            ui.modal.style.display = 'none';
            resetForm();
        } catch (err) {
            ui.formAlert.textContent = 'خطأ: ' + err.message;
        } finally {
            ui.submitBtn.disabled = false;
            ui.submitBtn.innerHTML = 'تأكيد الحجز';
        }
    });

    function resetForm() {
        ui.bookingForm.reset();
        ui.appointmentDate.value = today;
        selectedPatientId = null;
        ui.formAlert.textContent = '';
    }

    ui.openModalBtn.onclick = () => {
        if (assignedDoctorsList.length === 0) {
            showToast('لا يوجد أطباء مرتبطين', true);
            return;
        }
        resetForm();
        ui.modal.style.display = 'flex';
    };
    ui.closeModalBtn.onclick = () => ui.modal.style.display = 'none';
    window.onclick = (e) => { if (e.target === ui.modal) ui.modal.style.display = 'none'; };
    document.addEventListener('click', (e) => {
        if (!ui.patientSearch.contains(e.target) && !ui.searchResults.contains(e.target)) {
            ui.searchResults.style.display = 'none';
        }
    });

    // --- خروج ---
    ui.logoutBtn.onclick = async () => {
        if (unsubscribeBookings) unsubscribeBookings();
        await signOut(auth);
        window.location.href = 'index.html';
    };

    // --- بدء التشغيل ---
    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = 'index.html'; return; }
        currentUser = user;
        const ok = await loadNurseData(user.uid);
        if (!ok) return;
    });
</script>
</body>
</html>
