<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>سُكُون · لوحة الممرض</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #F8C471;
            --primary-light: #FDEBD0;
            --primary-dark: #E59866;
            --accent: #E67E22;
            --bg: #FFF8F0;
            --white: #FFFFFF;
            --ink: #4A3B2C;
            --text-sec: #8B7A66;
            --danger: #E57373;
            --success: #5FA88D;
            --border-light: #F0E0D0;
            --shadow-sm: 0 6px 12px -4px rgba(230, 126, 34, 0.08);
            --shadow-md: 0 12px 28px -6px rgba(230, 126, 34, 0.12);
            --radius-card: 28px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            padding: 16px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(16px);
            border-radius: 60px;
            padding: 12px 24px;
            margin-bottom: 24px;
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow: var(--shadow-md);
            flex-wrap: wrap;
            gap: 12px;
        }
        .logo h2 { font-size: 1.8rem; font-weight: 800; color: var(--accent); }
        .header-actions { display: flex; gap: 12px; align-items: center; }
        .btn {
            padding: 10px 22px; border-radius: 40px; border: none; font-weight: 600;
            display: inline-flex; align-items: center; gap: 8px; font-size: 0.9rem;
            transition: 0.2s; background: white; color: var(--ink);
            border: 1px solid var(--border-light); cursor: pointer;
        }
        .btn-primary { background: var(--primary); color: #4A3B2C; border: none; }
        .btn-primary:hover { background: var(--primary-dark); color: white; }
        .doctors-toolbar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; }
        .doctor-tab-btn {
            background: white; border: 1px solid var(--border-light); border-radius: 60px;
            padding: 8px 20px; font-weight: 600; cursor: pointer;
        }
        .doctor-tab-btn.active { background: var(--primary); color: #4A3B2C; }
        .tabs-container {
            background: rgba(255,255,255,0.6); backdrop-filter: blur(8px); border-radius: 60px;
            padding: 6px; display: inline-flex; margin-bottom: 24px;
        }
        .tab-btn {
            background: transparent; border: none; padding: 10px 20px; border-radius: 40px;
            font-weight: 600; color: var(--text-sec); cursor: pointer; display: flex; align-items: center; gap: 8px;
        }
        .tab-btn.active { background: white; color: var(--accent); }
        .tab-btn .count { background: rgba(0,0,0,0.05); padding: 2px 10px; border-radius: 30px; }
        .table-wrapper {
            background: rgba(255,255,255,0.75); backdrop-filter: blur(12px); border-radius: var(--radius-card);
            padding: 6px; box-shadow: var(--shadow-md); overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th, td { padding: 14px 8px; text-align: center; }
        th { background: #FEF5EC; font-weight: 700; }
        .status-badge { padding: 5px 12px; border-radius: 60px; font-size: 0.7rem; font-weight: 700; }
        .status-waiting { background: #FEF9E7; color: #9A6E1A; }
        .status-inprogress { background: #D6F0F0; color: #1A5C5C; }
        .status-done { background: #DCF5E8; color: #1E6F4C; }
        .icon-btn {
            width: 34px; height: 34px; border-radius: 12px; border: 1px solid var(--border-light);
            background: white; color: var(--text-sec); cursor: pointer; display: inline-flex;
            align-items: center; justify-content: center;
        }
        .icon-btn:hover { background: var(--primary); }
        .modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.2); backdrop-filter: blur(6px);
            align-items: center; justify-content: center; z-index: 1000; padding: 16px;
        }
        .modal-card {
            background: white; border-radius: 40px; width: 100%; max-width: 600px;
            max-height: 85vh; overflow-y: auto;
        }
        .modal-header { padding: 20px 24px; background: #FEF5EC; border-radius: 40px 40px 0 0; }
        .modal-body { padding: 20px 24px; }
        .form-group { margin-bottom: 18px; }
        .form-control {
            width: 100%; padding: 12px 16px; border-radius: 18px; border: 1.5px solid var(--border-light);
            font-family: 'Cairo', sans-serif;
        }
        .search-results {
            background: white; border: 1px solid var(--border-light); border-radius: 18px;
            margin-top: 8px; max-height: 200px; overflow-y: auto; display: none;
        }
        .search-item { padding: 10px 16px; cursor: pointer; }
        .search-item:hover { background: #FEF5EC; }
        .toast {
            position: fixed; bottom: 20px; left: 20px; right: 20px; background: #4A3B2C;
            color: white; padding: 12px 24px; border-radius: 60px; text-align: center;
            z-index: 1300; max-width: 500px; margin: 0 auto;
        }
        .empty-state { text-align: center; padding: 40px; color: var(--text-sec); }
        @media (max-width: 640px) {
            body { padding: 10px; }
            .btn { padding: 8px 14px; }
        }
    </style>
</head>
<body>
<div class="container">
    <header class="app-header">
        <div class="logo">
            <h2><i class="fas fa-calendar-check" style="color:var(--primary); margin-left:8px;"></i>سُكُون · الممرض</h2>
        </div>
        <div class="header-actions">
            <span id="welcomeMessage" style="font-weight:600;"></span>
            <button class="btn btn-primary" id="openModalBtn"><i class="fas fa-plus"></i> حجز جديد</button>
            <button class="btn btn-outline" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> خروج</button>
        </div>
    </header>

    <div id="doctorsToolbar" class="doctors-toolbar"></div>

    <div class="tabs-container">
        <button class="tab-btn active" data-tab="waiting"><i class="fas fa-hourglass-half"></i> قيد الانتظار <span id="waitingTabCount" class="count">0</span></button>
        <button class="tab-btn" data-tab="inprogress"><i class="fas fa-stethoscope"></i> قيد الكشف <span id="inProgressTabCount" class="count">0</span></button>
        <button class="tab-btn" data-tab="done"><i class="fas fa-check-circle"></i> منتهي <span id="doneTabCount" class="count">0</span></button>
    </div>

    <div class="table-wrapper">
        <table>
            <thead><tr><th>#</th><th>المريض</th><th>العمر</th><th>الهاتف</th><th>التاريخ</th><th>الوقت</th><th>الحالة</th><th>إجراءات</th></tr></thead>
            <tbody id="bookingsBody"><tr><td colspan="8" class="empty-state">جاري التحميل...</td></tr>
        </table>
    </div>
</div>

<!-- مودال الحجز -->
<div id="bookingModal" class="modal">
    <div class="modal-card">
        <div class="modal-header">
            <h3 id="modalTitle"><i class="fas fa-calendar-plus"></i> حجز موعد جديد</h3>
            <button class="close-btn" id="closeModalBtn">&times;</button>
        </div>
        <div class="modal-body">
            <form id="bookingForm">
                <input type="hidden" id="editBookingId">
                <div class="form-group">
                    <label>الطبيب *</label>
                    <select id="bookingDoctorSelect" class="form-control" required></select>
                </div>
                <div class="form-group">
                    <label>البحث عن مريض</label>
                    <input type="text" id="patientSearch" class="form-control" placeholder="الاسم أو رقم الهاتف..." autocomplete="off">
                    <div id="searchResults" class="search-results"></div>
                </div>
                <div class="form-group">
                    <label>اسم المريض *</label>
                    <input type="text" id="patientName" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>العمر</label>
                    <input type="number" id="patientAge" class="form-control" min="0" max="150">
                </div>
                <div class="form-group">
                    <label>رقم الهاتف</label>
                    <input type="tel" id="patientPhone" class="form-control">
                </div>
                <div class="form-group">
                    <label>تاريخ الموعد *</label>
                    <input type="date" id="appointmentDate" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>الوقت *</label>
                    <input type="time" id="appointmentTime" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;">تأكيد الحجز</button>
                <p id="formAlert" style="color:var(--danger); text-align:center; margin-top:12px;"></p>
            </form>
        </div>
    </div>
</div>

<script type="module">
    import { firebaseConfig } from './firebase-config.js';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
    import { getDatabase, ref, onValue, set, push, update, get, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // دالة التاريخ المحلي الصحيحة
    function getLocalDateString() {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    const today = getLocalDateString();

    let currentUser = null, nurseInfo = null, assignedDoctorsList = [], currentDoctorId = null;
    let allBookings = [], unsubscribeBookings = null, selectedPatientId = null, currentTab = 'waiting';

    const ui = {
        welcomeMessage: document.getElementById('welcomeMessage'),
        doctorsToolbar: document.getElementById('doctorsToolbar'),
        bookingsBody: document.getElementById('bookingsBody'),
        waitingTabCount: document.getElementById('waitingTabCount'),
        inProgressTabCount: document.getElementById('inProgressTabCount'),
        doneTabCount: document.getElementById('doneTabCount'),
        openModalBtn: document.getElementById('openModalBtn'),
        closeModalBtn: document.getElementById('closeModalBtn'),
        modal: document.getElementById('bookingModal'),
        modalTitle: document.getElementById('modalTitle'),
        bookingDoctorSelect: document.getElementById('bookingDoctorSelect'),
        patientSearch: document.getElementById('patientSearch'),
        searchResults: document.getElementById('searchResults'),
        patientName: document.getElementById('patientName'),
        patientAge: document.getElementById('patientAge'),
        patientPhone: document.getElementById('patientPhone'),
        appointmentDate: document.getElementById('appointmentDate'),
        appointmentTime: document.getElementById('appointmentTime'),
        submitBtn: document.querySelector('#bookingForm button[type=submit]'),
        formAlert: document.getElementById('formAlert'),
        bookingForm: document.getElementById('bookingForm'),
        editBookingId: document.getElementById('editBookingId'),
        logoutBtn: document.getElementById('logoutBtn'),
        tabBtns: document.querySelectorAll('.tab-btn')
    };

    ui.appointmentDate.value = today;

    function showToast(msg, isErr = false) {
        const t = document.createElement('div');
        t.className = 'toast';
        t.style.background = isErr ? '#B23B3B' : '#4A3B2C';
        t.innerHTML = `<i class="fas ${isErr ? 'fa-exclamation-triangle' : 'fa-check'}"></i> ${msg}`;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    async function loadNurseData(uid) {
        try {
            const snap = await get(ref(db, `users/${uid}`));
            if (!snap.exists()) {
                showToast('بيانات الممرض غير موجودة', true);
                return false;
            }
            nurseInfo = snap.val();
            ui.welcomeMessage.textContent = `أهلاً، ${nurseInfo.name || 'ممرض'}`;
            
            const assignedDoctors = nurseInfo.assignedDoctors || {};
            const doctorIds = Object.keys(assignedDoctors);
            assignedDoctorsList = [];
            
            for (const docId of doctorIds) {
                const docSnap = await get(ref(db, `users/${docId}`));
                if (docSnap.exists()) {
                    assignedDoctorsList.push({ id: docId, name: docSnap.val().name || 'دكتور' });
                }
            }
            
            if (assignedDoctorsList.length === 0) {
                ui.doctorsToolbar.innerHTML = '<div class="empty-state">لا يوجد أطباء مرتبطين بك. تواصل مع المدير.</div>';
                ui.bookingDoctorSelect.innerHTML = '<option value="">لا يوجد أطباء</option>';
                ui.bookingsBody.innerHTML = '<tr><td colspan="8" class="empty-state">لا يمكن عرض الحجوزات</td></tr>';
                return false;
            }
            
            renderDoctorsToolbar();
            ui.bookingDoctorSelect.innerHTML = assignedDoctorsList.map(d => 
                `<option value="${d.id}">د. ${d.name}</option>`
            ).join('');
            
            currentDoctorId = assignedDoctorsList[0].id;
            highlightDoctorButton(currentDoctorId);
            loadBookingsForDoctor(currentDoctorId);
            return true;
        } catch (err) {
            showToast('فشل تحميل البيانات: ' + err.message, true);
            return false;
        }
    }

    function renderDoctorsToolbar() {
        ui.doctorsToolbar.innerHTML = assignedDoctorsList.map(doc => `
            <button class="doctor-tab-btn" data-doctor-id="${doc.id}"><i class="fas fa-user-md"></i> د. ${doc.name}</button>
        `).join('');
        document.querySelectorAll('.doctor-tab-btn').forEach(btn => btn.addEventListener('click', () => {
            currentDoctorId = btn.dataset.doctorId;
            highlightDoctorButton(currentDoctorId);
            loadBookingsForDoctor(currentDoctorId);
        }));
    }

    function highlightDoctorButton(docId) {
        document.querySelectorAll('.doctor-tab-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.doctorId === docId);
        });
    }

    function loadBookingsForDoctor(doctorId) {
        if (unsubscribeBookings) unsubscribeBookings();
        if (!doctorId) return;
        
        const q = query(ref(db, 'appointments'), orderByChild('doctorId'), equalTo(doctorId));
        unsubscribeBookings = onValue(q, (snap) => {
            const bookings = [];
            snap.forEach(child => {
                const apt = child.val();
                if (apt.date === today) bookings.push({ id: child.key, ...apt });
            });
            bookings.sort((a, b) => (a.time || '').localeCompare(b.time || ''));
            allBookings = bookings;
            updateTabCounts();
            filterAndRenderByTab();
        });
    }

    function updateTabCounts() {
        ui.waitingTabCount.textContent = allBookings.filter(b => b.status === 'انتظار').length;
        ui.inProgressTabCount.textContent = allBookings.filter(b => b.status === 'قيد الكشف').length;
        ui.doneTabCount.textContent = allBookings.filter(b => b.status === 'منتهي').length;
    }

    function filterAndRenderByTab() {
        let filtered = allBookings.filter(b => {
            if (currentTab === 'waiting') return b.status === 'انتظار';
            if (currentTab === 'inprogress') return b.status === 'قيد الكشف';
            return b.status === 'منتهي';
        });
        renderTable(filtered);
    }

    function renderTable(bookings) {
        if (bookings.length === 0) {
            ui.bookingsBody.innerHTML = `<tr><td colspan="8" class="empty-state">لا توجد حجوزات</td></tr>`;
            return;
        }
        let html = '';
        bookings.forEach((b, idx) => {
            const statusClass = {
                'انتظار': 'status-waiting', 'قيد الكشف': 'status-inprogress', 'منتهي': 'status-done', 'ملغي': 'status-cancelled'
            }[b.status] || 'status-waiting';
            
            let actions = currentTab === 'waiting' ? `
                <button class="icon-btn success" data-id="${b.id}" data-action="start"><i class="fas fa-play"></i></button>
                <button class="icon-btn warning" data-id="${b.id}" data-action="edit"><i class="fas fa-edit"></i></button>
                <button class="icon-btn danger" data-id="${b.id}" data-action="cancel"><i class="fas fa-times"></i></button>
            ` : '<span style="opacity:0.5;">—</span>';
            
            html += `<tr>
                <td>${idx+1}</td><td><b>${b.patientName||'-'}</b></td><td>${b.age||'-'}</td><td>${b.phone||'-'}</td>
                <td>${b.date||'-'}</td><td>${b.time||'-'}</td><td><span class="status-badge ${statusClass}">${b.status||'انتظار'}</span></td>
                <td><div class="action-btns" style="display:flex;gap:6px;justify-content:center;">${actions}</div></td>
            </tr>`;
        });
        ui.bookingsBody.innerHTML = html;
    }

    ui.bookingsBody.addEventListener('click', (e) => {
        const btn = e.target.closest('[data-action]');
        if (!btn) return;
        const id = btn.dataset.id;
        const action = btn.dataset.action;
        const booking = allBookings.find(b => b.id === id);
        if (!booking) return;
        if (action === 'start') updateStatus(id, 'قيد الكشف');
        else if (action === 'cancel') updateStatus(id, 'ملغي');
        else if (action === 'edit') openEditModal(booking);
    });

    async function updateStatus(id, status) {
        try {
            await update(ref(db, `appointments/${id}`), { status });
            showToast(status === 'قيد الكشف' ? '🩺 بدأ الكشف' : '❌ تم الإلغاء');
        } catch (e) { showToast('فشل التحديث', true); }
    }

    function openAddModal() {
        ui.modalTitle.innerHTML = '<i class="fas fa-calendar-plus"></i> حجز موعد جديد';
        ui.editBookingId.value = '';
        resetForm();
        ui.modal.style.display = 'flex';
    }

    function openEditModal(booking) {
        ui.modalTitle.innerHTML = '<i class="fas fa-edit"></i> تعديل الحجز';
        ui.editBookingId.value = booking.id;
        ui.bookingDoctorSelect.value = booking.doctorId || currentDoctorId;
        ui.patientName.value = booking.patientName || '';
        ui.patientAge.value = booking.age || '';
        ui.patientPhone.value = booking.phone || '';
        ui.appointmentDate.value = booking.date || today;
        ui.appointmentTime.value = booking.time || '';
        selectedPatientId = booking.patientId || null;
        ui.modal.style.display = 'flex';
    }

    function resetForm() {
        ui.bookingForm.reset();
        ui.appointmentDate.value = today;
        selectedPatientId = null;
        ui.formAlert.textContent = '';
    }

    ui.openModalBtn.onclick = () => {
        if (assignedDoctorsList.length === 0) { showToast('لا يوجد أطباء مرتبطين', true); return; }
        openAddModal();
    };
    ui.closeModalBtn.onclick = () => ui.modal.style.display = 'none';
    window.onclick = (e) => { if (e.target === ui.modal) ui.modal.style.display = 'none'; };

    // البحث عن مريض (بالاسم أو الهاتف) وإنشاء معرف فريد
    let searchTimeout;
    ui.patientSearch.addEventListener('input', (e) => {
        const term = e.target.value.trim();
        if (term.length < 2) { ui.searchResults.style.display = 'none'; return; }
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(async () => {
            const patientsRef = ref(db, 'patients');
            const snap = await get(patientsRef);
            const results = [];
            snap.forEach(child => {
                const p = child.val();
                if (p.name?.includes(term) || p.phone?.includes(term)) {
                    results.push({ id: child.key, ...p });
                }
            });
            ui.searchResults.innerHTML = '';
            if (results.length === 0) {
                ui.searchResults.innerHTML = '<div class="search-item">لا توجد نتائج. اضغط Enter لإنشاء مريض جديد.</div>';
            } else {
                results.forEach(p => {
                    const div = document.createElement('div');
                    div.className = 'search-item';
                    div.innerHTML = `<b>${p.name}</b> - ${p.phone || 'بدون رقم'}`;
                    div.addEventListener('click', () => selectPatient(p));
                    ui.searchResults.appendChild(div);
                });
            }
            ui.searchResults.style.display = 'block';
        }, 300);
    });

    function selectPatient(patient) {
        ui.patientName.value = patient.name || '';
        ui.patientAge.value = patient.age || '';
        ui.patientPhone.value = patient.phone || '';
        selectedPatientId = patient.id;
        ui.patientSearch.value = '';
        ui.searchResults.style.display = 'none';
    }

    document.addEventListener('click', (e) => {
        if (!ui.patientSearch.contains(e.target) && !ui.searchResults.contains(e.target)) {
            ui.searchResults.style.display = 'none';
        }
    });

    // عند تقديم النموذج
    ui.bookingForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const editId = ui.editBookingId.value;
        const doctorId = ui.bookingDoctorSelect.value;
        const name = ui.patientName.value.trim();
        const date = ui.appointmentDate.value;
        const time = ui.appointmentTime.value;
        
        if (!doctorId || !name || !date || !time) {
            ui.formAlert.textContent = 'جميع الحقول المطلوبة';
            return;
        }
        
        ui.submitBtn.disabled = true;
        ui.submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الحفظ...';
        
        try {
            const phone = ui.patientPhone.value.trim();
            let patientId = selectedPatientId;
            
            // إنشاء أو تحديث المريض
            if (!patientId) {
                // إنشاء معرف جديد
                const newPatientRef = push(ref(db, 'patients'));
                patientId = newPatientRef.key;
            }
            
            const patientData = {
                name,
                age: ui.patientAge.value || null,
                phone: phone || null,
                updatedAt: new Date().toISOString()
            };
            
            await set(ref(db, `patients/${patientId}`), patientData);
            
            const bookingData = {
                patientName: name,
                patientId: patientId,
                age: ui.patientAge.value || null,
                phone: phone || null,
                doctorId: doctorId,
                date: date,
                time: time,
                status: 'انتظار',
                createdAt: editId ? (await get(ref(db, `appointments/${editId}`))).val().createdAt : new Date().toISOString()
            };
            
            if (editId) {
                await update(ref(db, `appointments/${editId}`), bookingData);
                showToast('✅ تم تعديل الحجز');
            } else {
                await push(ref(db, 'appointments'), bookingData);
                showToast('✅ تم حجز الموعد');
            }
            
            ui.modal.style.display = 'none';
            resetForm();
        } catch (err) {
            ui.formAlert.textContent = 'خطأ: ' + err.message;
        } finally {
            ui.submitBtn.disabled = false;
            ui.submitBtn.innerHTML = 'تأكيد الحجز';
        }
    });

    ui.tabBtns.forEach(btn => btn.addEventListener('click', () => {
        ui.tabBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentTab = btn.dataset.tab;
        filterAndRenderByTab();
    }));

    ui.logoutBtn.onclick = async () => {
        if (unsubscribeBookings) unsubscribeBookings();
        await signOut(auth);
        window.location.href = 'index.html';
    };

    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = 'index.html'; return; }
        currentUser = user;
        await loadNurseData(user.uid);
    });
</script>
</body>
</html>
