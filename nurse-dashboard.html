<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#00AEEF">
    <title>شفاء · لوحة الممرض</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap&subset=arabic" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'">
    <style>
        :root {
            --primary: #00AEEF;
            --primary-light: #E0F7FA;
            --primary-dark: #008080;
            --bg: #FAFAFA;
            --white: #FFFFFF;
            --ink: #1A3C4A;
            --text-sec: #5A7D8A;
            --danger: #E57373;
            --success: #26A69A;
            --warning: #FFA726;
            --border: #E0E0E0;
            --shadow-xs: 0 2px 6px rgba(0,0,0,0.03);
            --shadow-sm: 0 4px 12px rgba(0,0,0,0.05);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.08);
            --radius-xs: 8px;
            --radius-sm: 14px;
            --radius-md: 20px;
            --radius-lg: 26px;
            --radius-xl: 50px;
            --safe-bottom: env(safe-area-inset-bottom, 16px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html {
            font-size: 16px;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -webkit-text-size-adjust: 100%;
            text-rendering: optimizeSpeed;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            min-height: 100dvh;
            padding: 16px;
            padding-bottom: calc(16px + var(--safe-bottom));
            overflow-x: hidden;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            -webkit-overflow-scrolling: touch;
        }

        .container { max-width: 1100px; margin: 0 auto; }

        #authLoader {
            position: fixed;
            inset: 0;
            background: rgba(250,250,250,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            flex-direction: column;
            gap: 16px;
        }

        .loader-spin {
            width: 40px;
            height: 40px;
            border: 3px solid #E0E0E0;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loader-text {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--primary-dark);
        }

        /* ============ HEADER ============ */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 12px 20px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            flex-wrap: wrap;
            gap: 12px;
            position: sticky;
            top: 8px;
            z-index: 100;
        }

        .logo h2 {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--primary-dark);
            white-space: nowrap;
        }

        .logo i { color: var(--primary); }

        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        #welcomeMsg {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-sec);
            white-space: nowrap;
        }

        .tenant-badge {
            background: var(--primary-light);
            padding: 6px 12px;
            border-radius: var(--radius-xl);
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--primary-dark);
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        /* ============ BUTTONS ============ */
        .btn {
            padding: 12px 20px;
            border-radius: var(--radius-xl);
            border: none;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.88rem;
            white-space: nowrap;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
            transition: all 0.2s ease;
            min-height: 48px;
            min-width: 48px;
        }

        .btn:active { 
            opacity: 0.8; 
            transform: scale(0.96);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 3px 10px rgba(0,174,239,0.2);
        }

        .btn-primary:hover {
            background: #0099D6;
            box-shadow: 0 4px 14px rgba(0,174,239,0.3);
        }

        .btn-outline {
            background: var(--white);
            color: var(--ink);
            border: 2px solid var(--border);
        }

        .btn-outline:hover {
            background: #F5FAFC;
            border-color: var(--primary);
        }

        .btn-settings {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 3px 10px rgba(102, 126, 234, 0.3);
            position: relative;
            overflow: hidden;
        }

        .btn-settings::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .btn-settings:hover::before {
            left: 100%;
        }

        .btn-settings:hover {
            background: linear-gradient(135deg, #5a6fd6 0%, #6a3f8f 100%);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-settings i {
            font-size: 0.9rem;
            animation: gearPulse 2s infinite;
        }

        @keyframes gearPulse {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(15deg); }
            75% { transform: rotate(-15deg); }
        }

        /* ============ CONTROLS ROW ============ */
        .controls-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 16px;
        }

        .doctors-tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            flex: 1;
        }

        .doctor-tab {
            background: var(--white);
            border: 2px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 10px 18px;
            font-weight: 700;
            color: var(--ink);
            cursor: pointer;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            box-shadow: var(--shadow-xs);
            touch-action: manipulation;
            transition: all 0.2s ease;
            min-height: 44px;
        }

        .doctor-tab i { color: var(--primary); }

        .doctor-tab.active {
            background: var(--primary);
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 12px rgba(0,174,239,0.3);
        }
        .doctor-tab.active i { color: white; }

        .doctor-tab:active:not(.active) {
            background: var(--primary-light);
            transform: scale(0.96);
        }

        .doctor-tab:hover:not(.active) {
            border-color: var(--primary);
            transform: translateY(-1px);
        }

        .date-picker {
            display: flex;
            align-items: center;
            background: var(--white);
            border-radius: var(--radius-xl);
            padding: 4px;
            border: 2px solid var(--border);
            box-shadow: var(--shadow-xs);
            gap: 4px;
        }

        .btn-today {
            background: transparent;
            border: none;
            padding: 10px 16px;
            border-radius: var(--radius-xl);
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            color: var(--primary);
            cursor: pointer;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
            touch-action: manipulation;
            transition: background 0.2s;
            min-height: 44px;
        }

        .btn-today:active { background: var(--primary-light); }
        .btn-today:hover { background: #F0F8FF; }

        .date-input {
            border: none;
            padding: 10px 14px;
            font-family: 'Cairo', sans-serif;
            font-size: 0.85rem;
            border-right: 2px solid var(--border);
            background: transparent;
            color: var(--ink);
            outline: none;
            min-height: 44px;
        }

        /* ============ STATUS TABS ============ */
        .status-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            background: var(--white);
            border-radius: var(--radius-xl);
            padding: 6px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }

        .status-tab {
            background: transparent;
            border: none;
            padding: 12px 20px;
            border-radius: var(--radius-xl);
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--text-sec);
            flex: 1;
            justify-content: center;
            min-width: 90px;
            touch-action: manipulation;
            transition: all 0.2s ease;
            min-height: 48px;
        }

        .status-tab .badge {
            background: rgba(0,0,0,0.05);
            border-radius: 30px;
            padding: 3px 12px;
            font-size: 0.78rem;
            font-weight: 800;
        }

        .status-tab.active {
            background: white;
            color: var(--primary);
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .status-tab.active .badge {
            background: var(--primary-light);
            color: var(--primary);
        }

        .status-tab:active:not(.active) {
            background: rgba(255,255,255,0.6);
            transform: scale(0.96);
        }

        .status-tab:hover:not(.active) {
            background: rgba(255,255,255,0.8);
        }

        /* ============ TABLE ============ */
        .table-container {
            background: var(--white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .table-scroll {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-x: contain;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
            min-width: 650px;
            font-size: 0.88rem;
        }

        th, td { padding: 14px 10px; }

        thead th {
            background: #F5FAFC;
            font-weight: 800;
            color: var(--ink);
            font-size: 0.8rem;
            white-space: nowrap;
            position: sticky;
            top: 0;
            z-index: 1;
        }

        tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background 0.2s;
        }

        tbody tr:hover {
            background: #F8FDFF;
        }

        tbody tr:last-child { border-bottom: none; }

        .status-badge {
            padding: 5px 14px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 800;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .s-waiting { background: #FFF8E1; color: #F57F17; }
        .s-inprogress { background: #E0F7FA; color: #006064; }
        .s-done { background: #E8F5E9; color: #1B5E20; }
        .s-cancelled { background: #FFEBEE; color: #B71C1C; }

        .visit-type-badge {
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.72rem;
            font-weight: 700;
        }
        .vt-new { background: #E3F2FD; color: #0D47A1; }
        .vt-follow { background: #F3E5F5; color: #6A1B9A; }

        .action-btns {
            display: flex;
            gap: 6px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-xs);
            border: none;
            background: var(--white);
            color: var(--text-sec);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--border);
            font-size: 0.82rem;
            touch-action: manipulation;
            transition: all 0.2s ease;
        }

        .icon-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            transform: scale(1.1);
        }

        .icon-btn:active { 
            background: var(--primary); 
            color: white; 
            border-color: var(--primary);
            transform: scale(0.95);
        }
        .icon-btn.danger:active { 
            background: var(--danger); 
            color: white; 
            border-color: var(--danger); 
        }
        .icon-btn.danger:hover {
            background: #FF5252;
            color: white;
            border-color: #FF5252;
        }

        .empty-row td {
            text-align: center;
            padding: 40px;
            color: var(--text-sec);
            font-size: 0.9rem;
        }

        .sync-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-left: 6px;
            vertical-align: middle;
        }
        .sync-dot.on { background: var(--success); }
        .sync-dot.off { background: #FFB74D; }

        .keyboard-scroll-spacer {
            height: 1px;
            width: 100%;
            pointer-events: none;
            opacity: 0;
        }

        .booking-count-badge {
            background: var(--primary-light);
            color: var(--primary-dark);
            border-radius: 50px;
            padding: 2px 10px;
            font-size: 0.7rem;
            font-weight: 800;
            margin-right: 6px;
        }

        /* ============ MODAL ============ */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.35);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }

        .modal-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 520px;
            max-height: 85vh;
            max-height: 85dvh;
            overflow-y: auto;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
            border: 1px solid var(--border);
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            padding: 16px 20px;
            background: #F5FAFC;
            border-bottom: 1px solid var(--border);
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .modal-header h3 { font-size: 1.1rem; font-weight: 800; }

        .close-btn {
            background: none;
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            font-size: 24px;
            color: var(--text-sec);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            touch-action: manipulation;
        }

        .close-btn:active { background: rgba(0,0,0,0.08); }
        .close-btn:hover { background: rgba(0,0,0,0.05); }

        .modal-body { 
            padding: 20px;
            padding-bottom: 40px;
        }

        .form-group { margin-bottom: 16px; }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 700;
            font-size: 0.88rem;
            color: var(--ink);
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            border: 2px solid var(--border);
            background: #F5FAFC;
            font-family: 'Cairo', sans-serif;
            font-size: 0.88rem;
            color: var(--ink);
            -webkit-appearance: none;
            appearance: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            min-height: 48px;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(0,174,239,0.12);
        }

        .search-box { position: relative; }

        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            margin-top: 4px;
            max-height: 200px;
            overflow-y: auto;
            display: none;
            z-index: 20;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            -webkit-overflow-scrolling: touch;
        }

        .search-item {
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
            transition: background 0.2s;
            min-height: 48px;
            display: flex;
            align-items: center;
        }

        .search-item:active { background: #E0F7FA; }
        .search-item:hover { background: #F0F8FF; }
        .search-item:last-child { border-bottom: none; }

        .alert-msg {
            color: var(--danger);
            text-align: center;
            margin-top: 12px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .date-booking-info {
            background: #F5FAFC;
            border-radius: 12px;
            padding: 10px 14px;
            margin-top: 8px;
            font-size: 0.82rem;
            color: var(--primary-dark);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid var(--border);
        }

        .date-booking-info.loading {
            opacity: 0.7;
        }

        /* ============ TOAST ============ */
        .toast-container {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3000;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
            max-width: 90vw;
            padding-bottom: var(--safe-bottom);
        }

        .toast {
            background: #1A3C4A;
            color: white;
            padding: 14px 24px;
            border-radius: var(--radius-xl);
            font-weight: 700;
            font-size: 0.88rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: toastIn 0.3s ease;
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .toast.err { background: #C62828; }
        .toast.removing { 
            opacity: 0; 
            transform: translateY(-12px); 
            transition: all 0.3s ease; 
        }

        .btn-toggle-id {
            background: linear-gradient(135deg, #8D6E63, #A1887F);
            color: white;
            border: none;
            border-radius: var(--radius-xl);
            padding: 8px 16px;
            font-family: 'Cairo', sans-serif;
            font-size: 0.78rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            touch-action: manipulation;
            min-height: 40px;
        }

        .btn-toggle-id:hover {
            background: linear-gradient(135deg, #6D4C41, #8D6E63);
            box-shadow: 0 3px 8px rgba(109, 76, 65, 0.3);
        }

        .btn-toggle-id:active {
            transform: scale(0.96);
        }

        .toggle-id-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 6px;
            gap: 10px;
        }

        /* ============ RESPONSIVE ============ */
        @media (max-width: 1024px) {
            .app-header { padding: 10px 16px; gap: 10px; }
            .header-actions { gap: 8px; }
            .btn { padding: 10px 16px; font-size: 0.82rem; min-height: 44px; }
            .status-tab { padding: 10px 16px; font-size: 0.8rem; min-height: 44px; }
            .modal-card { max-width: 90%; }
        }

        @media (max-width: 768px) {
            html { font-size: 15px; }
            body { padding: 8px; padding-bottom: calc(8px + var(--safe-bottom)); }
            .app-header { padding: 10px 14px 14px; top: 4px; border-radius: var(--radius-md); margin-bottom: 12px; flex-direction: column; align-items: stretch; gap: 12px; }
            .logo { display: flex; justify-content: space-between; align-items: center; width: 100%; }
            .logo h2 { font-size: 1.2rem; }
            .tenant-badge { font-size: 0.72rem; padding: 5px 10px; }
            .header-actions { width: 100%; display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
            #welcomeMsg { grid-column: 1 / -1; text-align: center; font-size: 0.82rem; padding: 4px 0; }
            .btn { padding: 12px 10px; font-size: 0.82rem; min-height: 48px; border-radius: 24px; }
            .btn-settings { padding: 12px 10px; }
            .controls-row { flex-direction: column; align-items: stretch; gap: 10px; margin-bottom: 12px; }
            .doctors-tabs { flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; padding: 4px 0; gap: 6px; }
            .doctor-tab { padding: 10px 16px; font-size: 0.8rem; white-space: nowrap; min-height: 44px; flex-shrink: 0; }
            .date-picker { width: 100%; justify-content: space-between; padding: 4px; }
            .btn-today { padding: 10px 14px; font-size: 0.82rem; min-height: 44px; }
            .date-input { padding: 10px 12px; font-size: 0.82rem; min-height: 44px; flex: 1; }
            .status-tabs { margin-bottom: 12px; gap: 6px; padding: 5px; }
            .status-tab { padding: 10px 12px; font-size: 0.78rem; min-height: 44px; gap: 6px; }
            .status-tab .badge { font-size: 0.72rem; padding: 2px 8px; }
            table { min-width: 550px; font-size: 0.82rem; }
            th, td { padding: 12px 8px; }
            thead th { font-size: 0.75rem; }
            .icon-btn { width: 38px; height: 38px; font-size: 0.85rem; border-radius: 10px; }
            .action-btns { gap: 8px; }
            .modal { padding: 0; align-items: flex-end; }
            .modal-card { max-width: 100%; border-radius: 24px 24px 0 0; max-height: 90vh; max-height: 90dvh; margin-top: 10vh; }
            .modal-header { border-radius: 24px 24px 0 0; padding: 14px 18px; }
            .modal-body { padding: 16px; padding-bottom: 40px; }
            .form-control { padding: 12px 14px; font-size: 0.85rem; min-height: 48px; border-radius: 12px; }
            .form-group { margin-bottom: 14px; }
            .form-group label { font-size: 0.85rem; }
            .search-item { padding: 12px 14px; min-height: 48px; font-size: 0.85rem; }
            .btn-toggle-id { padding: 6px 12px; font-size: 0.72rem; min-height: 36px; }
            .toast-container { bottom: 20px; }
            .toast { padding: 12px 20px; font-size: 0.85rem; border-radius: 24px; }
        }

        @media (max-width: 400px) {
            html { font-size: 14px; }
            body { padding: 6px; padding-bottom: calc(6px + var(--safe-bottom)); }
            .app-header { padding: 8px 10px 12px; top: 3px; border-radius: 20px; }
            .logo h2 { font-size: 1.1rem; }
            .tenant-badge { font-size: 0.68rem; padding: 4px 8px; }
            .header-actions { grid-template-columns: repeat(2, 1fr); gap: 6px; }
            .btn { padding: 10px 8px; font-size: 0.78rem; min-height: 44px; border-radius: 22px; }
            .status-tabs { flex-direction: column; gap: 4px; padding: 4px; }
            .status-tab { justify-content: space-between; padding: 10px 14px; font-size: 0.78rem; min-height: 44px; }
            .doctors-tabs { flex-wrap: nowrap; overflow-x: auto; gap: 4px; }
            .doctor-tab { padding: 8px 12px; font-size: 0.75rem; min-height: 40px; flex-shrink: 0; }
            .icon-btn { width: 34px; height: 34px; font-size: 0.8rem; }
            table { min-width: 500px; font-size: 0.78rem; }
            th, td { padding: 10px 6px; }
            .modal-card { border-radius: 20px 20px 0 0; }
            .modal-header { border-radius: 20px 20px 0 0; padding: 12px 14px; }
            .modal-body { padding: 14px; padding-bottom: 35px; }
            .form-control { padding: 10px 12px; font-size: 0.82rem; min-height: 44px; }
            .search-item { padding: 10px 12px; min-height: 44px; font-size: 0.82rem; }
            .btn-toggle-id { padding: 5px 10px; font-size: 0.68rem; min-height: 32px; }
            .toast { padding: 10px 16px; font-size: 0.8rem; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.001ms !important;
                transition-duration: 0.001ms !important;
            }
        }
    </style>
</head>
<body>

    <div id="authLoader">
        <div class="loader-spin"></div>
        <span class="loader-text">جارٍ تحميل البيانات...</span>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <div class="container" id="mainContainer" style="display:none;">
        <header class="app-header">
            <div class="logo">
                <h2><i class="fas fa-heartbeat"></i> شفاء · الممرض <span class="sync-dot on" id="syncDot" title="حالة المزامنة"></span></h2>
            </div>
            <div class="header-actions">
                <span class="tenant-badge" id="tenantBadge">
                    <i class="fas fa-hospital"></i> <span id="tenantName"></span>
                </span>
                <span id="welcomeMsg"></span>
                <button class="btn btn-primary" id="addBookingBtn">
                    <i class="fas fa-plus"></i> كشف جديد
                </button>
                <button class="btn btn-settings" id="settingsBtn" title="الإعدادات">
                    <i class="fas fa-cog"></i> إعدادات
                </button>
                <button class="btn btn-outline" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i> خروج
                </button>
            </div>
        </header>

        <div class="controls-row">
            <div class="doctors-tabs" id="doctorsTabs"></div>
            <div class="date-picker">
                <button class="btn-today" id="todayBtn">
                    <i class="fas fa-calendar-alt"></i> اليوم
                </button>
                <input type="date" id="filterDate" class="date-input">
            </div>
        </div>

        <div class="status-tabs">
            <button class="status-tab active" data-tab="waiting">
                <i class="fas fa-hourglass-half"></i> قيد الانتظار
                <span class="badge" id="countWaiting">0</span>
            </button>
            <button class="status-tab" data-tab="inprogress">
                <i class="fas fa-stethoscope"></i> قيد الكشف
                <span class="badge" id="countInProgress">0</span>
            </button>
            <button class="status-tab" data-tab="done">
                <i class="fas fa-check-circle"></i> منتهي
                <span class="badge" id="countDone">0</span>
            </button>
        </div>

        <div class="table-container">
            <div class="table-scroll">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>المريض</th>
                            <th>الطبيب</th>
                            <th>التاريخ</th>
                            <th>نوع الكشف</th>
                            <th>الحالة</th>
                            <th>إجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="bookingsBody">
                        <tr class="empty-row"><td colspan="7"><i class="fas fa-spinner fa-spin"></i> جاري التحميل...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <div class="keyboard-scroll-spacer"></div>
    </div>

    <!-- مودال الكشف -->
    <div id="bookingModal" class="modal">
        <div class="modal-card">
            <div class="modal-header">
                <h3 id="modalTitle"><i class="fas fa-calendar-plus"></i> كشف جديد</h3>
                <button class="close-btn" id="closeModalBtn">&times;</button>
            </div>
            <div class="modal-body">
                <form id="bookingForm" autocomplete="off">
                    <input type="hidden" id="editId">
                    
                    <div class="form-group">
                        <label>الطبيب *</label>
                        <select id="doctorSelect" class="form-control" required></select>
                    </div>
                    
                    <div id="phoneSearchSection">
                        <div class="form-group search-box">
                            <label>البحث عن مريض (برقم الهاتف)</label>
                            <input type="text" id="patientSearch" class="form-control" placeholder="أدخل رقم الهاتف للبحث..." autocomplete="off" dir="ltr">
                            <div id="searchResults" class="search-results"></div>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>اسم المريض *</label>
                        <input type="text" id="patientName" class="form-control" required>
                    </div>
                    
                    <div class="form-group">
                        <label>العمر</label>
                        <input type="number" id="patientAge" class="form-control" min="0" max="150">
                    </div>
                    
                    <div id="phoneSection">
                        <div class="form-group">
                            <div class="toggle-id-container">
                                <label>رقم الهاتف</label>
                                <button type="button" class="btn-toggle-id" id="toggleIdModeBtn">
                                    <i class="fas fa-tree"></i> استخدام بيانات القرية
                                </button>
                            </div>
                            <input type="tel" id="patientPhone" class="form-control" dir="ltr">
                        </div>
                    </div>

                    <div id="villageSection" style="display:none;">
                        <div class="form-group">
                            <div class="toggle-id-container">
                                <label>بيانات القرية</label>
                                <button type="button" class="btn-toggle-id" id="togglePhoneModeBtn">
                                    <i class="fas fa-mobile-alt"></i> استخدام رقم الهاتف
                                </button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>اسم الأب</label>
                            <input type="text" id="fatherName" class="form-control" placeholder="اسم الأب">
                        </div>
                        <div class="form-group">
                            <label>اسم العائلة</label>
                            <input type="text" id="familyName" class="form-control" placeholder="اسم العائلة">
                        </div>
                        <div class="form-group">
                            <label>اسم القرية</label>
                            <input type="text" id="villageName" class="form-control" placeholder="اسم القرية">
                        </div>
                        <div id="villageSearchResults" class="search-results" style="position:relative;margin-top:8px;"></div>
                    </div>

                    <div class="form-group">
                        <label>نوع الكشف *</label>
                        <select id="visitType" class="form-control" required>
                            <option value="new">🆕 كشف جديد</option>
                            <option value="follow">🔄 إعادة (متابعة)</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>التاريخ *</label>
                        <input type="date" id="apptDate" class="form-control" required>
                        <div id="dateBookingInfo" class="date-booking-info" style="display:none;">
                            <i class="fas fa-info-circle"></i> 
                            <span id="dateBookingCount">عدد الحجوزات في هذا التاريخ: جاري التحميل...</span>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="width:100%;" id="submitBtn">
                        <i class="fas fa-save"></i> تأكيد الكشف
                    </button>
                    
                    <div id="formAlert" class="alert-msg"></div>
                </form>
                
                <div class="keyboard-scroll-spacer"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { firebaseConfig } from './firebase-config.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, onValue, set, push, update, get, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const STORAGE_PREFIX = 'shifa_tenant_';
        
        const LOGIN_STORAGE_KEYS = [
            'shifa_session',
            'shifa_remember',
            'shifa_last_login',
            'shifa_secure_session'
        ];
        
        let currentTenantId = null;
        
        const getTenantStorageKey = (baseKey) => {
            return currentTenantId ? `${STORAGE_PREFIX}${currentTenantId}_${baseKey}` : baseKey;
        };

        // ✅ مفتاح لحفظ آخر تاريخ اختاره الممرض
        const getLastUsedDateKey = () => getTenantStorageKey('nurse_last_used_date');

        const state = {
            currentUser: null,
            nurseData: null,
            assignedDoctors: [],
            selectedDoctorId: null,
            allBookings: [],
            currentTab: 'waiting',
            currentDate: '',
            selectedPatientId: null,
            unsubscribeBookings: null,
            idMode: 'phone',
            allDoctorBookings: [] // ✅ جميع حجوزات الطبيب المختار بدون تصفية بالتاريخ
        };

        const $ = (sel) => document.querySelector(sel);
        const $$ = (sel) => document.querySelectorAll(sel);

        const getToday = () => {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        };

        const escapeHtml = (str) => {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        };

        const showToast = (msg, isError = false) => {
            const container = $('#toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${isError ? 'err' : ''}`;
            toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i> ${msg}`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('removing');
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        };

        const clearLoginSessionOnly = () => {
            try {
                LOGIN_STORAGE_KEYS.forEach(key => {
                    localStorage.removeItem(key);
                });
                const sessionKeysToRemove = [];
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (key && (key.startsWith('shifa_session') || key.startsWith('shifa_secure'))) {
                        sessionKeysToRemove.push(key);
                    }
                }
                sessionKeysToRemove.forEach(key => localStorage.removeItem(key));
                sessionStorage.clear();
            } catch (e) {
                console.warn('تعذر مسح بيانات الجلسة:', e.message);
            }
        };

        // ============ ✅ حفظ / استرجاع آخر تاريخ استخدمه الممرض ============
        const saveLastUsedDate = (date) => {
            if (!currentTenantId) return;
            try {
                localStorage.setItem(getLastUsedDateKey(), date);
            } catch (e) {}
        };

        const getLastUsedDate = () => {
            if (!currentTenantId) return null;
            try {
                return localStorage.getItem(getLastUsedDateKey());
            } catch (e) {
                return null;
            }
        };

        // ============ التخزين المحلي ============
        const getLocalBookingsKey = () => getTenantStorageKey('nurse_bookings');
        const getLocalPatientsKey = () => getTenantStorageKey('nurse_patients');
        const getLocalDoctorsKey = () => getTenantStorageKey('nurse_doctors');
        
        const saveBookingsToLocal = (bookings) => {
            if (!currentTenantId) return;
            try {
                const key = getLocalBookingsKey();
                const data = {
                    bookings: bookings.map(b => ({ ...b, _cachedAt: Date.now() })),
                    lastUpdated: Date.now()
                };
                localStorage.setItem(key, JSON.stringify(data));
            } catch (e) {}
        };

        const savePatientToLocal = (patientId, patientData) => {
            if (!currentTenantId) return;
            try {
                const key = getLocalPatientsKey();
                const cached = JSON.parse(localStorage.getItem(key) || '{}');
                if (!cached.patients) cached.patients = {};
                cached.patients[patientId] = { ...patientData, _cachedAt: Date.now() };
                localStorage.setItem(key, JSON.stringify(cached));
            } catch (e) {}
        };

        const loadBookingsFromLocal = (doctorId, date) => {
            if (!currentTenantId) return null;
            try {
                const key = getLocalBookingsKey();
                const cached = localStorage.getItem(key);
                if (!cached) return null;
                const data = JSON.parse(cached);
                if (!data.bookings) return null;
                const now = Date.now();
                const expiryMs = 50 * 24 * 60 * 60 * 1000;
                const filtered = data.bookings.filter(b => {
                    return b.doctor_id === doctorId && b.date === date && (now - b._cachedAt) < expiryMs;
                });
                return filtered.length > 0 ? filtered : null;
            } catch (e) {
                return null;
            }
        };

        const searchPatientsLocal = (phone) => {
            if (!currentTenantId) return [];
            try {
                const key = getLocalPatientsKey();
                const cached = localStorage.getItem(key);
                if (!cached) return [];
                const data = JSON.parse(cached);
                if (!data.patients) return [];
                const t = phone.trim();
                return Object.entries(data.patients)
                    .filter(([id, p]) => p.phone && p.phone.includes(t))
                    .map(([id, p]) => ({ id, ...p }));
            } catch (e) { return []; }
        };

        const searchPatientsLocalByVillage = (fatherName, familyName, villageName) => {
            if (!currentTenantId) return [];
            try {
                const key = getLocalPatientsKey();
                const cached = localStorage.getItem(key);
                if (!cached) return [];
                const data = JSON.parse(cached);
                if (!data.patients) return [];
                return Object.entries(data.patients)
                    .filter(([id, p]) => {
                        const matchFather = !fatherName || (p.father_name && p.father_name.includes(fatherName));
                        const matchFamily = !familyName || (p.family_name && p.family_name.includes(familyName));
                        const matchVillage = !villageName || (p.village_name && p.village_name.includes(villageName));
                        return matchFather && matchFamily && matchVillage;
                    })
                    .map(([id, p]) => ({ id, ...p }));
            } catch (e) { return []; }
        };

        const saveDoctorsToLocal = (doctors) => {
            if (!currentTenantId) return;
            try {
                localStorage.setItem(getLocalDoctorsKey(), JSON.stringify({ doctors, cachedAt: Date.now() }));
            } catch (e) {}
        };

        const loadDoctorsFromLocal = () => {
            if (!currentTenantId) return null;
            try {
                const data = localStorage.getItem(getLocalDoctorsKey());
                if (!data) return null;
                const parsed = JSON.parse(data);
                return (Date.now() - parsed.cachedAt) < 50*24*60*60*1000 ? parsed.doctors : null;
            } catch (e) { return null; }
        };

        const setSyncStatus = (online) => {
            const dot = $('#syncDot');
            if (dot) {
                dot.className = `sync-dot ${online ? 'on' : 'off'}`;
                dot.title = online ? 'متصل بالسحابة' : 'غير متصل - استخدام البيانات المحلية';
            }
        };

        // ============ ✅ حساب عدد الحجوزات في تاريخ معين (من جميع حجوزات الطبيب) ============
        const getBookingCountForDate = (date) => {
            if (!state.allDoctorBookings || !date) return 0;
            return state.allDoctorBookings.filter(b => b.date === date).length;
        };

        // ============ ✅ تحديث عرض العدد في شريط التاريخ داخل المودال ============
        const updateDateBookingInfo = () => {
            const dateVal = $('#apptDate').value;
            const infoDiv = $('#dateBookingInfo');
            const countSpan = $('#dateBookingCount');
            
            if (dateVal && infoDiv && countSpan) {
                // عرض "جاري التحميل..." مؤقتاً
                countSpan.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> جاري التحميل...';
                infoDiv.style.display = 'flex';
                infoDiv.classList.add('loading');
                
                // حساب العدد من البيانات المتاحة حالياً
                setTimeout(() => {
                    const count = getBookingCountForDate(dateVal);
                    countSpan.textContent = `عدد الحجوزات في هذا التاريخ: ${count}`;
                    infoDiv.classList.remove('loading');
                }, 100);
            } else if (infoDiv) {
                infoDiv.style.display = 'none';
            }
        };

        // ============ ✅ تحديث عرض العدد في تبويبات الأطباء ============
        const updateDoctorTabsCount = () => {
            const tabs = $$('.doctor-tab');
            tabs.forEach(tab => {
                const docId = tab.dataset.id;
                const count = state.allBookings.filter(b => b.doctor_id === docId && b.date === state.currentDate).length;
                let badge = tab.querySelector('.booking-count-badge');
                if (!badge) {
                    badge = document.createElement('span');
                    badge.className = 'booking-count-badge';
                    tab.appendChild(badge);
                }
                badge.textContent = count;
            });
        };

        // ============ وضع الهوية ============
        const toggleIdMode = (mode) => {
            state.idMode = mode;
            const phoneSection = $('#phoneSection');
            const phoneSearchSection = $('#phoneSearchSection');
            const villageSection = $('#villageSection');
            
            if (mode === 'village') {
                if(phoneSection) phoneSection.style.display = 'none';
                if(phoneSearchSection) phoneSearchSection.style.display = 'none';
                if(villageSection) villageSection.style.display = 'block';
                $('#patientPhone').value = '';
                $('#patientSearch').value = '';
                $('#searchResults').style.display = 'none';
            } else {
                if(phoneSection) phoneSection.style.display = 'block';
                if(phoneSearchSection) phoneSearchSection.style.display = 'block';
                if(villageSection) villageSection.style.display = 'none';
                $('#fatherName').value = '';
                $('#familyName').value = '';
                $('#villageName').value = '';
                $('#villageSearchResults').style.display = 'none';
                $('#villageSearchResults').innerHTML = '';
            }
        };

        let villageSearchTimer;
        const setupVillageSearch = () => {
            const fatherInput = $('#fatherName');
            const familyInput = $('#familyName');
            const villageInput = $('#villageName');
            
            const performVillageSearch = () => {
                const father = fatherInput.value.trim();
                const family = familyInput.value.trim();
                const village = villageInput.value.trim();
                if (!father && !family && !village) {
                    $('#villageSearchResults').style.display = 'none';
                    return;
                }
                clearTimeout(villageSearchTimer);
                villageSearchTimer = setTimeout(async () => {
                    let results = searchPatientsLocalByVillage(father, family, village);
                    try {
                        const snap = await get(ref(db, 'patients'));
                        snap.forEach(child => {
                            const p = child.val();
                            const matchFather = !father || (p.father_name && p.father_name.includes(father));
                            const matchFamily = !family || (p.family_name && p.family_name.includes(family));
                            const matchVillage = !village || (p.village_name && p.village_name.includes(village));
                            if (matchFather && matchFamily && matchVillage && (father || family || village)) {
                                if (!results.find(r => r.id === child.key)) results.push({ id: child.key, ...p });
                            }
                        });
                    } catch (err) {}
                    const container = $('#villageSearchResults');
                    if (results.length === 0) {
                        container.innerHTML = '<div class="search-item" style="color:var(--text-sec);">لا توجد نتائج - يمكنك إضافة مريض جديد</div>';
                    } else {
                        container.innerHTML = results.map(p => `
                            <div class="search-item" data-id="${p.id}">
                                <b>${escapeHtml(p.name)}</b>
                                <small style="color:var(--text-sec);">${escapeHtml(p.father_name || '')} - ${escapeHtml(p.family_name || '')} - ${escapeHtml(p.village_name || '')}</small>
                            </div>
                        `).join('');
                        container.querySelectorAll('.search-item[data-id]').forEach(item => {
                            item.addEventListener('click', () => {
                                const patient = results.find(p => p.id === item.dataset.id);
                                if (patient) selectVillagePatient(patient);
                            });
                        });
                    }
                    container.style.display = 'block';
                }, 400);
            };
            
            fatherInput.addEventListener('input', performVillageSearch);
            familyInput.addEventListener('input', performVillageSearch);
            villageInput.addEventListener('input', performVillageSearch);
            
            document.addEventListener('click', (e) => {
                const vs = $('#villageSection');
                const sr = $('#villageSearchResults');
                if (vs && sr && !vs.contains(e.target)) sr.style.display = 'none';
            });
        };

        const selectVillagePatient = (patient) => {
            $('#patientName').value = patient.name || '';
            $('#patientAge').value = patient.age || '';
            $('#patientPhone').value = patient.phone || '';
            $('#fatherName').value = patient.father_name || '';
            $('#familyName').value = patient.family_name || '';
            $('#villageName').value = patient.village_name || '';
            state.selectedPatientId = patient.id;
            $('#villageSearchResults').style.display = 'none';
        };

        // ============ تحميل البيانات ============
        const loadNurseData = async (uid) => {
            try {
                const nurseSnap = await get(ref(db, `tenants/${currentTenantId}/users/${uid}`));
                let nurseData = null;
                if (nurseSnap.exists()) {
                    nurseData = { id: uid, ...nurseSnap.val() };
                } else {
                    const oldSnap = await get(ref(db, `users/${uid}`));
                    if (oldSnap.exists() && oldSnap.val().role === 'nurse') {
                        nurseData = { id: uid, ...oldSnap.val() };
                    }
                }
                if (!nurseData || nurseData.role !== 'nurse') {
                    showToast('هذا الحساب ليس ممرضاً', true);
                    return false;
                }
                state.nurseData = nurseData;
                $('#welcomeMsg').textContent = `أهلاً، ${state.nurseData.name || 'ممرض'}`;
                const tenantName = nurseData.tenantName || 'المجمع الطبي';
                $('#tenantName').textContent = tenantName;
                const linksSnap = await get(ref(db, `tenants/${currentTenantId}/links/${uid}`));
                const doctorIds = linksSnap.exists() ? Object.keys(linksSnap.val()) : [];
                if (doctorIds.length === 0) {
                    const localDoctors = loadDoctorsFromLocal();
                    if (localDoctors && localDoctors.length > 0) {
                        state.assignedDoctors = localDoctors;
                        renderDoctorsTabs();
                        populateDoctorSelect();
                        state.selectedDoctorId = state.assignedDoctors[0].id;
                        highlightDoctorTab(state.selectedDoctorId);
                        const localBookings = loadBookingsFromLocal(state.selectedDoctorId, state.currentDate);
                        if (localBookings) { state.allBookings = localBookings; updateCounts(); renderTable(); }
                        setSyncStatus(false);
                        showToast('⚠️ استخدام البيانات المحلية - لا يوجد اتصال', true);
                        return true;
                    }
                    $('#doctorsTabs').innerHTML = '<div style="padding:10px;color:var(--text-sec);">لا يوجد أطباء مرتبطين بك</div>';
                    return false;
                }
                const doctorPromises = doctorIds.map(async (docId) => {
                    const snap = await get(ref(db, `tenants/${currentTenantId}/users/${docId}`));
                    if (snap.exists()) return { id: docId, name: snap.val().name || 'دكتور' };
                    const oldSnap = await get(ref(db, `users/${docId}`));
                    return { id: docId, name: oldSnap.exists() ? oldSnap.val().name : 'دكتور' };
                });
                state.assignedDoctors = await Promise.all(doctorPromises);
                saveDoctorsToLocal(state.assignedDoctors);
                renderDoctorsTabs();
                populateDoctorSelect();
                state.selectedDoctorId = state.assignedDoctors[0].id;
                highlightDoctorTab(state.selectedDoctorId);
                loadBookings();
                loadAllDoctorBookings(); // ✅ تحميل جميع حجوزات الطبيب
                setSyncStatus(true);
                return true;
            } catch (err) {
                const localDoctors = loadDoctorsFromLocal();
                if (localDoctors && localDoctors.length > 0) {
                    state.assignedDoctors = localDoctors;
                    renderDoctorsTabs();
                    populateDoctorSelect();
                    state.selectedDoctorId = state.assignedDoctors[0].id;
                    highlightDoctorTab(state.selectedDoctorId);
                    const localBookings = loadBookingsFromLocal(state.selectedDoctorId, state.currentDate);
                    if (localBookings) { state.allBookings = localBookings; updateCounts(); renderTable(); }
                    setSyncStatus(false);
                    showToast('⚠️ استخدام البيانات المحلية - لا يوجد اتصال', true);
                    return true;
                }
                showToast('خطأ في تحميل البيانات: ' + err.message, true);
                return false;
            }
        };

        const renderDoctorsTabs = () => {
            $('#doctorsTabs').innerHTML = state.assignedDoctors.map(doc => `
                <button class="doctor-tab" data-id="${doc.id}">
                    <i class="fas fa-user-md"></i> د. ${escapeHtml(doc.name)}
                    <span class="booking-count-badge">0</span>
                </button>
            `).join('');
            $$('.doctor-tab').forEach(btn => {
                btn.addEventListener('click', () => {
                    state.selectedDoctorId = btn.dataset.id;
                    highlightDoctorTab(state.selectedDoctorId);
                    loadBookings();
                    loadAllDoctorBookings(); // ✅ إعادة تحميل جميع حجوزات الطبيب
                });
            });
            updateDoctorTabsCount();
        };

        const highlightDoctorTab = (docId) => {
            $$('.doctor-tab').forEach(btn => btn.classList.toggle('active', btn.dataset.id === docId));
        };

        const populateDoctorSelect = () => {
            $('#doctorSelect').innerHTML = state.assignedDoctors.map(doc =>
                `<option value="${doc.id}">د. ${escapeHtml(doc.name)}</option>`
            ).join('');
        };

        // ============ ✅ تحميل جميع حجوزات الطبيب المختار (بدون تصفية بالتاريخ) ============
        const loadAllDoctorBookings = () => {
            if (!state.selectedDoctorId || !currentTenantId) return;
            
            const bookingsRef = ref(db, `tenants/${currentTenantId}/appointments`);
            
            // استخدام get مرة واحدة لجلب جميع البيانات
            get(bookingsRef).then((snap) => {
                const bookings = [];
                snap.forEach(child => {
                    const apt = child.val();
                    if (apt.doctor_id === state.selectedDoctorId) {
                        bookings.push({ id: child.key, ...apt });
                    }
                });
                state.allDoctorBookings = bookings;
                // تحديث العداد إذا كان المودال مفتوحاً
                updateDateBookingInfo();
            }).catch((error) => {
                console.warn('تعذر تحميل جميع حجوزات الطبيب:', error.message);
                // استخدام البيانات المحلية كبديل
                try {
                    const key = getLocalBookingsKey();
                    const cached = localStorage.getItem(key);
                    if (cached) {
                        const data = JSON.parse(cached);
                        if (data.bookings) {
                            state.allDoctorBookings = data.bookings.filter(b => b.doctor_id === state.selectedDoctorId);
                            updateDateBookingInfo();
                        }
                    }
                } catch (e) {}
            });
        };

        const loadBookings = () => {
            if (state.unsubscribeBookings) state.unsubscribeBookings();
            if (!state.selectedDoctorId || !currentTenantId) return;
            const bookingsRef = ref(db, `tenants/${currentTenantId}/appointments`);
            state.unsubscribeBookings = onValue(bookingsRef, (snap) => {
                const bookings = [];
                const allDoctorBookings = [];
                snap.forEach(child => {
                    const apt = child.val();
                    if (apt.doctor_id === state.selectedDoctorId) {
                        allDoctorBookings.push({ id: child.key, ...apt });
                        if (apt.date === state.currentDate) {
                            bookings.push({ id: child.key, ...apt });
                        }
                    }
                });
                bookings.sort((a, b) => (a.patient_name || '').localeCompare(b.patient_name || ''));
                state.allBookings = bookings;
                state.allDoctorBookings = allDoctorBookings; // ✅ تحديث جميع حجوزات الطبيب
                saveBookingsToLocal(allDoctorBookings); // ✅ حفظ جميع الحجوزات محلياً
                setSyncStatus(true);
                updateCounts();
                renderTable();
                updateDoctorTabsCount();
                updateDateBookingInfo();
            }, (error) => {
                const localBookings = loadBookingsFromLocal(state.selectedDoctorId, state.currentDate);
                if (localBookings) { 
                    state.allBookings = localBookings; 
                    updateCounts(); 
                    renderTable(); 
                    updateDoctorTabsCount(); 
                }
                // تحميل جميع الحجوزات من المحلي
                try {
                    const key = getLocalBookingsKey();
                    const cached = localStorage.getItem(key);
                    if (cached) {
                        const data = JSON.parse(cached);
                        if (data.bookings) {
                            state.allDoctorBookings = data.bookings.filter(b => b.doctor_id === state.selectedDoctorId);
                            updateDateBookingInfo();
                        }
                    }
                } catch (e) {}
                setSyncStatus(false);
            });
        };

        const updateCounts = () => {
            const counts = { waiting: 0, inprogress: 0, done: 0 };
            state.allBookings.forEach(b => {
                if (b.status === 'انتظار') counts.waiting++;
                else if (b.status === 'قيد الكشف') counts.inprogress++;
                else if (b.status === 'منتهي') counts.done++;
            });
            $('#countWaiting').textContent = counts.waiting;
            $('#countInProgress').textContent = counts.inprogress;
            $('#countDone').textContent = counts.done;
        };

        const renderTable = () => {
            let filtered = [];
            if (state.currentTab === 'waiting') filtered = state.allBookings.filter(b => b.status === 'انتظار');
            else if (state.currentTab === 'inprogress') filtered = state.allBookings.filter(b => b.status === 'قيد الكشف');
            else if (state.currentTab === 'done') filtered = state.allBookings.filter(b => b.status === 'منتهي');
            const tbody = $('#bookingsBody');
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr class="empty-row"><td colspan="7">لا توجد كشوفات في هذا القسم</td></tr>';
                return;
            }
            tbody.innerHTML = filtered.map((b, i) => {
                const statusMap = { 'انتظار': 's-waiting', 'قيد الكشف': 's-inprogress', 'منتهي': 's-done', 'ملغي': 's-cancelled' };
                const statusClass = statusMap[b.status] || 's-waiting';
                const visitTypeClass = b.visit_type === 'new' ? 'vt-new' : 'vt-follow';
                const visitTypeText = b.visit_type === 'new' ? 'جديد' : 'إعادة';
                const doctorName = state.assignedDoctors.find(d => d.id === b.doctor_id)?.name || 'دكتور';
                const actions = state.currentTab === 'waiting' ? `
                    <button class="icon-btn" data-action="edit" data-id="${b.id}" title="تعديل"><i class="fas fa-edit"></i></button>
                    <button class="icon-btn danger" data-action="cancel" data-id="${b.id}" title="إلغاء"><i class="fas fa-times"></i></button>
                ` : '<span style="opacity:0.4;">—</span>';
                return `<tr>
                    <td>${i + 1}</td>
                    <td><b>${escapeHtml(b.patient_name || '-')}</b></td>
                    <td>د. ${escapeHtml(doctorName)}</td>
                    <td>${b.date || '-'}</td>
                    <td><span class="visit-type-badge ${visitTypeClass}">${visitTypeText}</span></td>
                    <td><span class="status-badge ${statusClass}">${b.status || 'انتظار'}</span></td>
                    <td><div class="action-btns">${actions}</div></td>
                </tr>`;
            }).join('');
        };

        $('#bookingsBody').addEventListener('click', (e) => {
            const btn = e.target.closest('[data-action]');
            if (!btn) return;
            const id = btn.dataset.id;
            const booking = state.allBookings.find(b => b.id === id);
            if (!booking) return;
            if (btn.dataset.action === 'cancel') cancelBooking(id);
            else if (btn.dataset.action === 'edit') openEditModal(booking);
        });

        const cancelBooking = async (id) => {
            try {
                await update(ref(db, `tenants/${currentTenantId}/appointments/${id}`), { status: 'ملغي' });
                showToast('تم إلغاء الكشف');
            } catch (err) { showToast('خطأ في الإلغاء: ' + err.message, true); }
        };

        // ============ المودال ============
        const openAddModal = () => {
            if (state.assignedDoctors.length === 0) { showToast('لا يوجد أطباء مرتبطين بك', true); return; }
            $('#editId').value = '';
            $('#modalTitle').innerHTML = '<i class="fas fa-calendar-plus"></i> كشف جديد';
            resetForm();
            // ✅ استعادة آخر تاريخ استخدمه الممرض
            const lastDate = getLastUsedDate();
            $('#apptDate').value = lastDate || state.currentDate;
            toggleIdMode('phone');
            
            // ✅ تحميل جميع حجوزات الطبيب للتأكد من وجود بيانات حديثة
            loadAllDoctorBookings();
            
            // تأخير بسيط للتأكد من تحميل البيانات قبل عرض العداد
            setTimeout(() => {
                updateDateBookingInfo();
            }, 300);
            
            $('#bookingModal').style.display = 'flex';
        };

        const openEditModal = (booking) => {
            $('#editId').value = booking.id;
            $('#modalTitle').innerHTML = '<i class="fas fa-edit"></i> تعديل الكشف';
            $('#doctorSelect').value = booking.doctor_id || state.selectedDoctorId;
            $('#patientName').value = booking.patient_name || '';
            $('#patientAge').value = booking.age || '';
            $('#patientPhone').value = booking.phone || '';
            $('#visitType').value = booking.visit_type || 'new';
            $('#apptDate').value = booking.date || state.currentDate;
            state.selectedPatientId = booking.patient_id || null;
            if (booking.father_name || booking.family_name || booking.village_name) {
                toggleIdMode('village');
                $('#fatherName').value = booking.father_name || '';
                $('#familyName').value = booking.family_name || '';
                $('#villageName').value = booking.village_name || '';
            } else {
                toggleIdMode('phone');
            }
            updateDateBookingInfo();
            $('#bookingModal').style.display = 'flex';
        };

        const closeModal = () => {
            $('#bookingModal').style.display = 'none';
            resetForm();
        };

        const resetForm = () => {
            $('#bookingForm').reset();
            $('#apptDate').value = state.currentDate;
            $('#visitType').value = 'new';
            state.selectedPatientId = null;
            $('#formAlert').textContent = '';
            $('#searchResults').style.display = 'none';
            $('#villageSearchResults').style.display = 'none';
            $('#villageSearchResults').innerHTML = '';
            toggleIdMode('phone');
        };

        // ============ البحث عن المرضى ============
        let searchTimer;
        $('#patientSearch').addEventListener('input', (e) => {
            const phone = e.target.value.trim();
            if (phone.length < 1) { $('#searchResults').style.display = 'none'; return; }
            clearTimeout(searchTimer);
            searchTimer = setTimeout(async () => {
                let results = searchPatientsLocal(phone);
                try {
                    const snap = await get(ref(db, 'patients'));
                    snap.forEach(child => {
                        const p = child.val();
                        if (p.phone && p.phone.includes(phone) && !results.find(r => r.id === child.key)) {
                            results.push({ id: child.key, ...p });
                        }
                    });
                } catch (err) {}
                const container = $('#searchResults');
                if (results.length === 0) {
                    container.innerHTML = '<div class="search-item" style="color:var(--text-sec);">لا توجد نتائج - يمكنك إضافة مريض جديد</div>';
                } else {
                    container.innerHTML = results.map(p => `
                        <div class="search-item" data-id="${p.id}">
                            <b>${escapeHtml(p.name)}</b>
                            <small style="color:var(--text-sec);">${escapeHtml(p.phone || '')}</small>
                        </div>
                    `).join('');
                    container.querySelectorAll('.search-item[data-id]').forEach(item => {
                        item.addEventListener('click', () => {
                            const patient = results.find(p => p.id === item.dataset.id);
                            if (patient) selectPatient(patient);
                        });
                    });
                }
                container.style.display = 'block';
            }, 250);
        });

        const selectPatient = (patient) => {
            $('#patientName').value = patient.name || '';
            $('#patientAge').value = patient.age || '';
            $('#patientPhone').value = patient.phone || '';
            state.selectedPatientId = patient.id;
            $('#patientSearch').value = '';
            $('#searchResults').style.display = 'none';
            if (patient.father_name || patient.family_name || patient.village_name) {
                toggleIdMode('village');
                $('#fatherName').value = patient.father_name || '';
                $('#familyName').value = patient.family_name || '';
                $('#villageName').value = patient.village_name || '';
            }
        };

        document.addEventListener('click', (e) => {
            if (!$('#patientSearch').contains(e.target) && !$('#searchResults').contains(e.target)) {
                $('#searchResults').style.display = 'none';
            }
        });

        const checkPhoneUniqueness = async (phone, excludeId = null) => {
            if (!phone || phone.trim() === '') return null;
            const localResults = searchPatientsLocal(phone);
            const localDuplicate = localResults.find(p => p.phone === phone && p.id !== excludeId);
            if (localDuplicate) return localDuplicate;
            try {
                const snap = await get(ref(db, 'patients'));
                let duplicate = null;
                snap.forEach(child => {
                    const p = child.val();
                    if (p.phone === phone && child.key !== excludeId && !duplicate) duplicate = { id: child.key, ...p };
                });
                return duplicate;
            } catch (err) { return null; }
        };

        // ============ حفظ الكشف ============
        $('#bookingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const editId = $('#editId').value;
            const doctorId = $('#doctorSelect').value;
            const name = $('#patientName').value.trim();
            const age = $('#patientAge').value.trim();
            const phone = state.idMode === 'phone' ? $('#patientPhone').value.trim() : '';
            const visitType = $('#visitType').value;
            const date = $('#apptDate').value;
            const fatherName = state.idMode === 'village' ? $('#fatherName').value.trim() : '';
            const familyName = state.idMode === 'village' ? $('#familyName').value.trim() : '';
            const villageName = state.idMode === 'village' ? $('#villageName').value.trim() : '';

            if (!doctorId || !name || !visitType || !date) {
                $('#formAlert').textContent = 'جميع الحقول المطلوبة (*) يجب ملؤها';
                return;
            }

            if (state.idMode === 'phone' && phone) {
                const existingPhone = await checkPhoneUniqueness(phone, state.selectedPatientId);
                if (existingPhone && !state.selectedPatientId) {
                    $('#formAlert').textContent = `⚠️ رقم الهاتف "${phone}" مسجل مسبقاً للمريض "${existingPhone.name}". الرجاء البحث عن المريض أولاً أو استخدام رقم هاتف مختلف.`;
                    return;
                }
            }

            const submitBtn = $('#submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الحفظ...';
            $('#formAlert').textContent = '';

            try {
                let patientId = state.selectedPatientId;
                if (!patientId) {
                    const newRef = push(ref(db, 'patients'));
                    patientId = newRef.key;
                    const patientData = {
                        name, age: age || null, phone: phone || null,
                        father_name: fatherName || null, family_name: familyName || null, village_name: villageName || null,
                        created_at: new Date().toISOString()
                    };
                    await set(newRef, patientData);
                    savePatientToLocal(patientId, patientData);
                } else {
                    try {
                        const updateData = { name, age: age || null, updated_at: new Date().toISOString() };
                        if (state.idMode === 'phone') updateData.phone = phone || null;
                        else {
                            updateData.father_name = fatherName || null;
                            updateData.family_name = familyName || null;
                            updateData.village_name = villageName || null;
                        }
                        await update(ref(db, `patients/${patientId}`), updateData);
                    } catch (updateErr) {}
                }

                const bookingData = {
                    patient_name: name, patient_id: patientId, age: age || null, phone: phone || null,
                    father_name: fatherName || null, family_name: familyName || null, village_name: villageName || null,
                    doctor_id: doctorId, nurse_id: state.currentUser.uid,
                    visit_type: visitType, date, status: 'انتظار', tenantId: currentTenantId
                };

                if (editId) {
                    await update(ref(db, `tenants/${currentTenantId}/appointments/${editId}`), bookingData);
                    showToast('تم تعديل الكشف بنجاح');
                } else {
                    bookingData.created_at = new Date().toISOString();
                    bookingData.created_by = state.currentUser.uid;
                    await set(ref(db, `tenants/${currentTenantId}/appointments/${push(ref(db, `tenants/${currentTenantId}/appointments`)).key}`), bookingData);
                    showToast('تم حجز الكشف بنجاح');
                }

                // ✅ حفظ آخر تاريخ استخدمه الممرض
                saveLastUsedDate(date);

                closeModal();
            } catch (err) {
                $('#formAlert').textContent = 'خطأ: ' + err.message;
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-save"></i> تأكيد الكشف';
            }
        });

        // ============ ✅ مستمع حدث تغيير التاريخ في المودال (يحدث العداد فوراً) ============
        $('#apptDate').addEventListener('change', () => {
            updateDateBookingInfo();
        });

        // ============ تبويبات الحالة ============
        $$('.status-tab').forEach(btn => {
            btn.addEventListener('click', () => {
                $$('.status-tab').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                state.currentTab = btn.dataset.tab;
                renderTable();
            });
        });

        // ============ تغيير التاريخ ============
        $('#filterDate').addEventListener('change', () => {
            state.currentDate = $('#filterDate').value;
            if (state.selectedDoctorId) loadBookings();
        });

        $('#todayBtn').addEventListener('click', () => {
            state.currentDate = getToday();
            $('#filterDate').value = state.currentDate;
            if (state.selectedDoctorId) loadBookings();
        });

        // ============ تسجيل الخروج ============
        $('#logoutBtn').addEventListener('click', async () => {
            try {
                showToast('👋 جاري تسجيل الخروج...');
                if (state.unsubscribeBookings) { state.unsubscribeBookings(); state.unsubscribeBookings = null; }
                clearLoginSessionOnly();
                state.currentUser = null; state.nurseData = null; state.assignedDoctors = []; state.allBookings = [];
                await signOut(auth);
                window.location.href = 'index.html';
            } catch (error) {
                clearLoginSessionOnly();
                window.location.href = 'index.html';
            }
        });

        // ============ أحداث أخرى ============
        $('#addBookingBtn').addEventListener('click', openAddModal);
        $('#closeModalBtn').addEventListener('click', closeModal);
        window.addEventListener('click', (e) => { if (e.target === $('#bookingModal')) closeModal(); });
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && $('#bookingModal').style.display === 'flex') closeModal(); });

        $('#toggleIdModeBtn').addEventListener('click', () => toggleIdMode('village'));
        $('#togglePhoneModeBtn').addEventListener('click', () => toggleIdMode('phone'));

        $('#settingsBtn').addEventListener('click', () => {
            try {
                sessionStorage.setItem('nurse_settings_session', JSON.stringify({
                    uid: state.currentUser?.uid, tenantId: currentTenantId, nurseName: state.nurseData?.name, timestamp: Date.now()
                }));
            } catch (e) {}
            window.location.href = 'nurse-settings.html';
        });

        window.addEventListener('online', () => {
            setSyncStatus(true);
            showToast('📡 تم استعادة الاتصال - جاري المزامنة');
            if (state.selectedDoctorId) {
                loadBookings();
                loadAllDoctorBookings();
            }
        });
        window.addEventListener('offline', () => {
            setSyncStatus(false);
            showToast('⚠️ انقطع الاتصال - استخدام البيانات المحلية', true);
        });

        // ============ بدء التشغيل ============
        onAuthStateChanged(auth, async (user) => {
            if (!user) { clearLoginSessionOnly(); window.location.href = 'index.html'; return; }
            const urlParams = new URLSearchParams(window.location.search);
            const tenantFromUrl = urlParams.get('tenant');
            if (tenantFromUrl) {
                currentTenantId = tenantFromUrl;
            } else {
                try {
                    const encrypted = localStorage.getItem('shifa_secure_session');
                    if (encrypted) { const decoded = atob(encrypted); const match = decoded.match(/"tenantId":"([^"]+)"/); if (match) currentTenantId = match[1]; }
                } catch (e) {}
                if (!currentTenantId) {
                    const oldSession = localStorage.getItem('shifa_session');
                    if (oldSession) { try { currentTenantId = JSON.parse(oldSession).tenantId || user.uid; } catch (e) { currentTenantId = user.uid; } }
                    else currentTenantId = user.uid;
                }
            }
            sessionStorage.setItem('userUid', user.uid);
            sessionStorage.setItem('userRole', 'nurse');
            if (!state.currentUser) {
                state.currentUser = { uid: user.uid };
                state.currentDate = getToday();
                $('#filterDate').value = state.currentDate;
                setupVillageSearch();
                const localBookings = loadBookingsFromLocal(state.selectedDoctorId || '', state.currentDate);
                if (localBookings && localBookings.length > 0) { state.allBookings = localBookings; updateCounts(); renderTable(); }
                $('#authLoader').style.display = 'none';
                $('#mainContainer').style.display = 'block';
                const success = await loadNurseData(user.uid);
                if (!success) showToast('⚠️ تعذر تحميل بعض البيانات', true);
            }
        });
