<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#00AEEF">
    <title>شفاء · لوحة الممرض</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap&subset=arabic" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'">
    <style>
        :root {
            --primary: #00AEEF;
            --primary-light: #E0F7FA;
            --primary-dark: #008080;
            --bg: #FAFAFA;
            --white: #FFFFFF;
            --ink: #1A3C4A;
            --text-sec: #5A7D8A;
            --danger: #E57373;
            --success: #26A69A;
            --warning: #FFA726;
            --border: #E0E0E0;
            --shadow-xs: 0 2px 6px rgba(0,0,0,0.03);
            --shadow-sm: 0 4px 12px rgba(0,0,0,0.05);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.08);
            --radius-xs: 8px;
            --radius-sm: 14px;
            --radius-md: 20px;
            --radius-lg: 26px;
            --radius-xl: 50px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html {
            font-size: 15px;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -webkit-text-size-adjust: 100%;
            text-rendering: optimizeSpeed;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            min-height: 100dvh;
            padding: 12px;
            padding-bottom: 45vh;
            overflow-x: hidden;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            -webkit-overflow-scrolling: touch;
        }

        .container { max-width: 1100px; margin: 0 auto; }

        #authLoader {
            position: fixed;
            inset: 0;
            background: rgba(250,250,250,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            flex-direction: column;
            gap: 16px;
        }

        .loader-spin {
            width: 40px;
            height: 40px;
            border: 3px solid #E0E0E0;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loader-text {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--primary-dark);
        }

        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 10px 18px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            flex-wrap: wrap;
            gap: 10px;
            position: sticky;
            top: 6px;
            z-index: 100;
        }

        .logo h2 {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--primary-dark);
            white-space: nowrap;
        }

        .logo i { color: var(--primary); }

        .header-actions {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        #welcomeMsg {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-sec);
        }

        .tenant-badge {
            background: var(--primary-light);
            padding: 4px 10px;
            border-radius: var(--radius-xl);
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--primary-dark);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn {
            padding: 9px 16px;
            border-radius: var(--radius-xl);
            border: none;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.83rem;
            white-space: nowrap;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
            transition: all 0.2s ease;
        }

        .btn:active { 
            opacity: 0.8; 
            transform: scale(0.97);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 3px 10px rgba(0,174,239,0.2);
        }

        .btn-primary:hover {
            background: #0099D6;
            box-shadow: 0 4px 14px rgba(0,174,239,0.3);
        }

        .btn-outline {
            background: var(--white);
            color: var(--ink);
            border: 1.5px solid var(--border);
        }

        .btn-outline:hover {
            background: #F5FAFC;
            border-color: var(--primary);
        }

        .btn-settings {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 3px 10px rgba(102, 126, 234, 0.3);
            position: relative;
            overflow: hidden;
        }

        .btn-settings::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .btn-settings:hover::before {
            left: 100%;
        }

        .btn-settings:hover {
            background: linear-gradient(135deg, #5a6fd6 0%, #6a3f8f 100%);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-settings i {
            font-size: 0.9rem;
            animation: gearPulse 2s infinite;
        }

        @keyframes gearPulse {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(15deg); }
            75% { transform: rotate(-15deg); }
        }

        .stats-row {
            display: flex;
            gap: 10px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }

        .mini-stat {
            background: var(--white);
            border-radius: var(--radius-md);
            padding: 10px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-xs);
            flex: 1;
            min-width: 110px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .mini-stat:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .mini-stat-icon {
            width: 38px;
            height: 38px;
            border-radius: var(--radius-xs);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        .mini-stat-info h4 {
            font-size: 1.3rem;
            font-weight: 800;
            line-height: 1;
        }

        .mini-stat-info span {
            font-size: 0.7rem;
            color: var(--text-sec);
            font-weight: 500;
        }

        .controls-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 14px;
        }

        .doctors-tabs {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            flex: 1;
        }

        .doctor-tab {
            background: var(--white);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 7px 14px;
            font-weight: 600;
            color: var(--ink);
            cursor: pointer;
            font-size: 0.82rem;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            box-shadow: var(--shadow-xs);
            touch-action: manipulation;
            transition: all 0.2s ease;
        }

        .doctor-tab i { color: var(--primary); }

        .doctor-tab.active {
            background: var(--primary);
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 12px rgba(0,174,239,0.3);
        }
        .doctor-tab.active i { color: white; }

        .doctor-tab:active:not(.active) {
            background: var(--primary-light);
        }

        .doctor-tab:hover:not(.active) {
            border-color: var(--primary);
            transform: translateY(-1px);
        }

        .date-picker {
            display: flex;
            align-items: center;
            background: var(--white);
            border-radius: var(--radius-xl);
            padding: 3px;
            border: 1.5px solid var(--border);
            box-shadow: var(--shadow-xs);
            gap: 3px;
        }

        .btn-today {
            background: transparent;
            border: none;
            padding: 7px 12px;
            border-radius: var(--radius-xl);
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
            color: var(--primary);
            cursor: pointer;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 5px;
            touch-action: manipulation;
            transition: background 0.2s;
        }

        .btn-today:active { background: var(--primary-light); }
        .btn-today:hover { background: #F0F8FF; }

        .date-input {
            border: none;
            padding: 7px 10px;
            font-family: 'Cairo', sans-serif;
            font-size: 0.8rem;
            border-right: 1px solid var(--border);
            background: transparent;
            color: var(--ink);
            outline: none;
        }

        .status-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 14px;
            flex-wrap: wrap;
            background: var(--white);
            border-radius: var(--radius-xl);
            padding: 5px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }

        .status-tab {
            background: transparent;
            border: none;
            padding: 9px 16px;
            border-radius: var(--radius-xl);
            font-weight: 600;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.82rem;
            color: var(--text-sec);
            flex: 1;
            justify-content: center;
            min-width: 80px;
            touch-action: manipulation;
            transition: all 0.2s ease;
        }

        .status-tab .badge {
            background: rgba(0,0,0,0.04);
            border-radius: 30px;
            padding: 2px 9px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .status-tab.active {
            background: white;
            color: var(--primary);
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
        }

        .status-tab.active .badge {
            background: var(--primary-light);
            color: var(--primary);
        }

        .status-tab:active:not(.active) {
            background: rgba(255,255,255,0.6);
        }

        .status-tab:hover:not(.active) {
            background: rgba(255,255,255,0.8);
        }

        .table-container {
            background: var(--white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .table-scroll {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
            min-width: 650px;
            font-size: 0.85rem;
        }

        th, td { padding: 12px 8px; }

        thead th {
            background: #F5FAFC;
            font-weight: 700;
            color: var(--ink);
            font-size: 0.78rem;
            white-space: nowrap;
            position: sticky;
            top: 0;
            z-index: 1;
        }

        tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background 0.2s;
        }

        tbody tr:hover {
            background: #F8FDFF;
        }

        tbody tr:last-child { border-bottom: none; }

        .status-badge {
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.72rem;
            font-weight: 700;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 3px;
        }

        .s-waiting { background: #FFF8E1; color: #F57F17; }
        .s-inprogress { background: #E0F7FA; color: #006064; }
        .s-done { background: #E8F5E9; color: #1B5E20; }
        .s-cancelled { background: #FFEBEE; color: #B71C1C; }

        .visit-type-badge {
            padding: 3px 9px;
            border-radius: 30px;
            font-size: 0.68rem;
            font-weight: 700;
        }
        .vt-new { background: #E3F2FD; color: #0D47A1; }
        .vt-follow { background: #F3E5F5; color: #6A1B9A; }

        .action-btns {
            display: flex;
            gap: 4px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .icon-btn {
            width: 30px;
            height: 30px;
            border-radius: var(--radius-xs);
            border: none;
            background: var(--white);
            color: var(--text-sec);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
            font-size: 0.78rem;
            touch-action: manipulation;
            transition: all 0.2s ease;
        }

        .icon-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            transform: scale(1.1);
        }

        .icon-btn:active { 
            background: var(--primary); 
            color: white; 
            border-color: var(--primary); 
        }
        .icon-btn.danger:active { 
            background: var(--danger); 
            color: white; 
            border-color: var(--danger); 
        }
        .icon-btn.danger:hover {
            background: #FF5252;
            color: white;
            border-color: #FF5252;
        }

        .empty-row td {
            text-align: center;
            padding: 35px;
            color: var(--text-sec);
        }

        .sync-dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            margin-left: 5px;
            vertical-align: middle;
        }
        .sync-dot.on { background: var(--success); }
        .sync-dot.off { background: #FFB74D; }

        .keyboard-scroll-spacer {
            height: 1px;
            width: 100%;
            pointer-events: none;
            opacity: 0;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.25);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 16px;
            backdrop-filter: blur(4px);
        }

        .modal-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 480px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 15px 40px rgba(0,0,0,0.12);
            border: 1px solid var(--border);
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            padding: 14px 18px;
            background: #F5FAFC;
            border-bottom: 1px solid var(--border);
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .modal-header h3 { font-size: 1.05rem; font-weight: 700; }

        .close-btn {
            background: none;
            border: none;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            font-size: 22px;
            color: var(--text-sec);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .close-btn:active { background: rgba(0,0,0,0.05); }
        .close-btn:hover { background: rgba(0,0,0,0.05); }

        .modal-body { 
            padding: 18px;
            padding-bottom: 45vh;
        }

        .form-group { margin-bottom: 14px; }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 0.83rem;
            color: var(--ink);
        }

        .form-control {
            width: 100%;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--border);
            background: #F5FAFC;
            font-family: 'Cairo', sans-serif;
            font-size: 0.85rem;
            color: var(--ink);
            -webkit-appearance: none;
            appearance: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(0,174,239,0.1);
        }

        .search-box { position: relative; }

        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            margin-top: 3px;
            max-height: 160px;
            overflow-y: auto;
            display: none;
            z-index: 20;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            -webkit-overflow-scrolling: touch;
        }

        .search-item {
            padding: 9px 12px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            font-size: 0.83rem;
            transition: background 0.2s;
        }

        .search-item:active { background: #E0F7FA; }
        .search-item:hover { background: #F0F8FF; }
        .search-item:last-child { border-bottom: none; }

        .alert-msg {
            color: var(--danger);
            text-align: center;
            margin-top: 10px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .toast-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3000;
            display: flex;
            flex-direction: column;
            gap: 6px;
            pointer-events: none;
        }

        .toast {
            background: #1A3C4A;
            color: white;
            padding: 11px 20px;
            border-radius: var(--radius-xl);
            font-weight: 600;
            font-size: 0.82rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.18);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: toastIn 0.3s ease;
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .toast.err { background: #C62828; }
        .toast.removing { 
            opacity: 0; 
            transform: translateY(-10px); 
            transition: all 0.3s ease; 
        }

        @media (max-width: 768px) {
            body { 
                padding: 8px;
                padding-bottom: 55vh;
            }

            .app-header {
                padding: 8px 12px;
                top: 4px;
                border-radius: var(--radius-md);
            }

            .logo h2 { font-size: 1.15rem; }

            .btn { padding: 7px 12px; font-size: 0.78rem; }

            .btn-settings { padding: 7px 12px; }

            .doctor-tab { padding: 6px 10px; font-size: 0.76rem; }

            .status-tab { padding: 7px 10px; font-size: 0.76rem; }

            .status-tab .badge { font-size: 0.7rem; }

            table { min-width: 550px; font-size: 0.78rem; }

            th, td { padding: 8px 5px; }

            .icon-btn { width: 28px; height: 28px; font-size: 0.7rem; }

            .controls-row { flex-direction: column; align-items: stretch; }

            .date-picker { width: 100%; justify-content: space-between; }

            .modal-card { max-width: 100%; border-radius: var(--radius-md); }

            .mini-stat { min-width: 70px; padding: 8px 10px; }
            .mini-stat-info h4 { font-size: 1.1rem; }
            
            .modal-body {
                padding-bottom: 55vh;
            }

            .header-actions {
                justify-content: center;
                width: 100%;
            }
        }

        @media (max-width: 400px) {
            .status-tabs { flex-direction: column; gap: 3px; }
            .status-tab { justify-content: space-between; }
            .doctors-tabs { flex-direction: column; }
            
            body {
                padding-bottom: 65vh;
            }
            
            .modal-body {
                padding-bottom: 65vh;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.001ms !important;
                transition-duration: 0.001ms !important;
            }
        }
    </style>
</head>
<body>

    <div id="authLoader">
        <div class="loader-spin"></div>
        <span class="loader-text">جارٍ تحميل البيانات...</span>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <div class="container" id="mainContainer" style="display:none;">
        <header class="app-header">
            <div class="logo">
                <h2><i class="fas fa-heartbeat"></i> شفاء · الممرض <span class="sync-dot on" id="syncDot" title="حالة المزامنة"></span></h2>
            </div>
            <div class="header-actions">
                <span class="tenant-badge" id="tenantBadge">
                    <i class="fas fa-hospital"></i> <span id="tenantName"></span>
                </span>
                <span id="welcomeMsg"></span>
                <button class="btn btn-primary" id="addBookingBtn">
                    <i class="fas fa-plus"></i> كشف جديد
                </button>
                <button class="btn btn-settings" id="settingsBtn" title="الإعدادات">
                    <i class="fas fa-cog"></i> إعدادات
                </button>
                <button class="btn btn-outline" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i> خروج
                </button>
            </div>
        </header>

        <div class="stats-row">
            <div class="mini-stat">
                <div class="mini-stat-icon" style="background:#E3F2FD;">
                    <i class="fas fa-calendar-check" style="color:#1565C0;"></i>
                </div>
                <div class="mini-stat-info">
                    <h4 id="statTotalToday">0</h4>
                    <span>إجمالي كشوفات اليوم</span>
                </div>
            </div>
            <div class="mini-stat">
                <div class="mini-stat-icon" style="background:#E8F5E9;">
                    <i class="fas fa-user-plus" style="color:#2E7D32;"></i>
                </div>
                <div class="mini-stat-info">
                    <h4 id="statNewToday">0</h4>
                    <span>كشوفات جديدة</span>
                </div>
            </div>
            <div class="mini-stat">
                <div class="mini-stat-icon" style="background:#F3E5F5;">
                    <i class="fas fa-redo" style="color:#6A1B9A;"></i>
                </div>
                <div class="mini-stat-info">
                    <h4 id="statFollowToday">0</h4>
                    <span>كشوفات إعادة</span>
                </div>
            </div>
            <div class="mini-stat">
                <div class="mini-stat-icon" style="background:#FFF3E0;">
                    <i class="fas fa-clock" style="color:#E65100;"></i>
                </div>
                <div class="mini-stat-info">
                    <h4 id="statWaiting">0</h4>
                    <span>قيد الانتظار</span>
                </div>
            </div>
        </div>

        <div class="controls-row">
            <div class="doctors-tabs" id="doctorsTabs"></div>
            <div class="date-picker">
                <button class="btn-today" id="todayBtn">
                    <i class="fas fa-calendar-alt"></i> اليوم
                </button>
                <input type="date" id="filterDate" class="date-input">
            </div>
        </div>

        <div class="status-tabs">
            <button class="status-tab active" data-tab="waiting">
                <i class="fas fa-hourglass-half"></i> قيد الانتظار
                <span class="badge" id="countWaiting">0</span>
            </button>
            <button class="status-tab" data-tab="inprogress">
                <i class="fas fa-stethoscope"></i> قيد الكشف
                <span class="badge" id="countInProgress">0</span>
            </button>
            <button class="status-tab" data-tab="done">
                <i class="fas fa-check-circle"></i> منتهي
                <span class="badge" id="countDone">0</span>
            </button>
        </div>

        <div class="table-container">
            <div class="table-scroll">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>المريض</th>
                            <th>الطبيب</th>
                            <th>التاريخ</th>
                            <th>الوقت</th>
                            <th>نوع الكشف</th>
                            <th>الحالة</th>
                            <th>إجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="bookingsBody">
                        <tr class="empty-row"><td colspan="8"><i class="fas fa-spinner fa-spin"></i> جاري التحميل...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <div class="keyboard-scroll-spacer"></div>
    </div>

    <!-- مودال الكشف -->
    <div id="bookingModal" class="modal">
        <div class="modal-card">
            <div class="modal-header">
                <h3 id="modalTitle"><i class="fas fa-calendar-plus"></i> كشف جديد</h3>
                <button class="close-btn" id="closeModalBtn">&times;</button>
            </div>
            <div class="modal-body">
                <form id="bookingForm" autocomplete="off">
                    <input type="hidden" id="editId">
                    
                    <div class="form-group">
                        <label>الطبيب *</label>
                        <select id="doctorSelect" class="form-control" required></select>
                    </div>
                    
                    <div class="form-group search-box">
                        <label>البحث عن مريض</label>
                        <input type="text" id="patientSearch" class="form-control" placeholder="اسم أو رقم الهاتف..." autocomplete="off">
                        <div id="searchResults" class="search-results"></div>
                    </div>
                    
                    <div class="form-group">
                        <label>اسم المريض *</label>
                        <input type="text" id="patientName" class="form-control" required>
                    </div>
                    
                    <div class="form-group">
                        <label>العمر</label>
                        <input type="number" id="patientAge" class="form-control" min="0" max="150">
                    </div>
                    
                    <div class="form-group">
                        <label>رقم الهاتف</label>
                        <input type="tel" id="patientPhone" class="form-control" dir="ltr">
                    </div>

                    <div class="form-group">
                        <label>نوع الكشف *</label>
                        <select id="visitType" class="form-control" required>
                            <option value="new">🆕 كشف جديد</option>
                            <option value="follow">🔄 إعادة (متابعة)</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>التاريخ *</label>
                        <input type="date" id="apptDate" class="form-control" required>
                    </div>
                    
                    <div class="form-group">
                        <label>الوقت *</label>
                        <input type="time" id="apptTime" class="form-control" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="width:100%;" id="submitBtn">
                        <i class="fas fa-save"></i> تأكيد الكشف
                    </button>
                    
                    <div id="formAlert" class="alert-msg"></div>
                </form>
                
                <div class="keyboard-scroll-spacer"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { firebaseConfig } from './firebase-config.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, onValue, set, push, update, get, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // ============ تهيئة Firebase ============
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // ============ ✅ ثوابت التخزين المحلي ============
        const STORAGE_PREFIX = 'shifa_tenant_';
        
        const LOGIN_STORAGE_KEYS = [
            'shifa_session',
            'shifa_remember',
            'shifa_last_login',
            'shifa_secure_session'
        ];
        
        let currentTenantId = null;
        
        const getTenantStorageKey = (baseKey) => {
            return currentTenantId ? `${STORAGE_PREFIX}${currentTenantId}_${baseKey}` : baseKey;
        };

        // ============ حالة التطبيق ============
        const state = {
            currentUser: null,
            nurseData: null,
            assignedDoctors: [],
            selectedDoctorId: null,
            allBookings: [],
            currentTab: 'waiting',
            currentDate: '',
            selectedPatientId: null,
            unsubscribeBookings: null,
        };

        // ============ دوال مساعدة ============
        const $ = (sel) => document.querySelector(sel);
        const $$ = (sel) => document.querySelectorAll(sel);

        const getToday = () => {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        };

        const escapeHtml = (str) => {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        };

        const showToast = (msg, isError = false) => {
            const container = $('#toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${isError ? 'err' : ''}`;
            toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i> ${msg}`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('removing');
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        };

        // ============ ✅ مسح بيانات الجلسة فقط ============
        const clearLoginSessionOnly = () => {
            try {
                LOGIN_STORAGE_KEYS.forEach(key => {
                    localStorage.removeItem(key);
                });
                
                const sessionKeysToRemove = [];
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (key && (key.startsWith('shifa_session') || key.startsWith('shifa_secure'))) {
                        sessionKeysToRemove.push(key);
                    }
                }
                sessionKeysToRemove.forEach(key => localStorage.removeItem(key));
                
                sessionStorage.clear();
                
                console.log(`✅ تم مسح ${LOGIN_STORAGE_KEYS.length + sessionKeysToRemove.length} مفتاح جلسة`);
                console.log('💾 تم الإبقاء على بيانات المجمع المحلية');
            } catch (e) {
                console.warn('تعذر مسح بيانات الجلسة:', e.message);
            }
        };

        // ============ إدارة التخزين المحلي لكل مجمع ============
        
        const getLocalBookingsKey = () => getTenantStorageKey('nurse_bookings');
        const getLocalDoctorsKey = () => getTenantStorageKey('nurse_doctors');
        const getLocalPatientsKey = () => getTenantStorageKey('nurse_patients');
        
        const saveBookingsToLocal = (bookings) => {
            if (!currentTenantId) return;
            try {
                const key = getLocalBookingsKey();
                const data = {
                    bookings: bookings.map(b => ({ ...b, _cachedAt: Date.now() })),
                    lastUpdated: Date.now()
                };
                localStorage.setItem(key, JSON.stringify(data));
            } catch (e) {
                console.warn('تعذر حفظ الكشوفات محلياً:', e.message);
            }
        };

        const savePatientToLocal = (patientId, patientData) => {
            if (!currentTenantId) return;
            try {
                const key = getLocalPatientsKey();
                const cached = JSON.parse(localStorage.getItem(key) || '{}');
                if (!cached.patients) cached.patients = {};
                cached.patients[patientId] = {
                    ...patientData,
                    _cachedAt: Date.now()
                };
                localStorage.setItem(key, JSON.stringify(cached));
            } catch (e) {
                console.warn('تعذر حفظ المريض محلياً:', e.message);
            }
        };

        const loadBookingsFromLocal = (doctorId, date) => {
            if (!currentTenantId) return null;
            try {
                const key = getLocalBookingsKey();
                const cached = localStorage.getItem(key);
                if (!cached) return null;
                
                const data = JSON.parse(cached);
                if (!data.bookings) return null;
                
                const now = Date.now();
                const expiryMs = 50 * 24 * 60 * 60 * 1000;
                
                const filtered = data.bookings.filter(b => {
                    const isFresh = (now - b._cachedAt) < expiryMs;
                    return b.doctor_id === doctorId && b.date === date && isFresh;
                });
                
                return filtered.length > 0 ? filtered : null;
            } catch (e) {
                console.warn('تعذر تحميل الكشوفات المحلية:', e.message);
                return null;
            }
        };

        const searchPatientsLocal = (term) => {
            if (!currentTenantId) return [];
            try {
                const key = getLocalPatientsKey();
                const cached = localStorage.getItem(key);
                if (!cached) return [];
                
                const data = JSON.parse(cached);
                if (!data.patients) return [];
                
                const now = Date.now();
                const expiryMs = 50 * 24 * 60 * 60 * 1000;
                const t = term.toLowerCase();
                
                return Object.entries(data.patients)
                    .filter(([id, p]) => {
                        const isFresh = (now - p._cachedAt) < expiryMs;
                        return isFresh && (
                            (p.name && p.name.toLowerCase().includes(t)) ||
                            (p.phone && p.phone.includes(t))
                        );
                    })
                    .map(([id, p]) => ({ id, ...p }));
            } catch (e) {
                return [];
            }
        };

        const saveDoctorsToLocal = (doctors) => {
            if (!currentTenantId) return;
            try {
                const key = getLocalDoctorsKey();
                const data = {
                    doctors,
                    cachedAt: Date.now()
                };
                localStorage.setItem(key, JSON.stringify(data));
            } catch (e) {
                console.warn('تعذر حفظ الأطباء محلياً:', e.message);
            }
        };

        const loadDoctorsFromLocal = () => {
            if (!currentTenantId) return null;
            try {
                const key = getLocalDoctorsKey();
                const data = localStorage.getItem(key);
                if (!data) return null;
                
                const parsed = JSON.parse(data);
                const now = Date.now();
                const expiryMs = 50 * 24 * 60 * 60 * 1000;
                
                if ((now - parsed.cachedAt) < expiryMs) {
                    return parsed.doctors;
                }
                return null;
            } catch (e) {
                return null;
            }
        };

        // ============ تحديث مؤشر المزامنة ============
        const setSyncStatus = (online) => {
            const dot = $('#syncDot');
            if (dot) {
                dot.className = `sync-dot ${online ? 'on' : 'off'}`;
                dot.title = online ? 'متصل بالسحابة' : 'غير متصل - استخدام البيانات المحلية';
            }
        };

        // ============ ✅ زر الإعدادات ============
        $('#settingsBtn').addEventListener('click', () => {
            // حفظ حالة الجلسة الحالية قبل الانتقال
            try {
                const sessionData = {
                    uid: state.currentUser?.uid,
                    tenantId: currentTenantId,
                    nurseName: state.nurseData?.name,
                    timestamp: Date.now()
                };
                sessionStorage.setItem('nurse_settings_session', JSON.stringify(sessionData));
            } catch (e) {
                console.warn('تعذر حفظ جلسة الإعدادات:', e.message);
            }
            
            // الانتقال إلى صفحة الإعدادات
            window.location.href = 'nurse-settings.html';
        });

        // ============ ✅ تحميل بيانات الممرض من مسار المجمع ============
        const loadNurseData = async (uid) => {
            try {
                const nurseSnap = await get(ref(db, `tenants/${currentTenantId}/users/${uid}`));
                
                let nurseData = null;
                if (nurseSnap.exists()) {
                    nurseData = { id: uid, ...nurseSnap.val() };
                } else {
                    const oldSnap = await get(ref(db, `users/${uid}`));
                    if (oldSnap.exists() && oldSnap.val().role === 'nurse') {
                        nurseData = { id: uid, ...oldSnap.val() };
                    }
                }
                
                if (!nurseData || nurseData.role !== 'nurse') {
                    showToast('هذا الحساب ليس ممرضاً', true);
                    return false;
                }

                state.nurseData = nurseData;
                $('#welcomeMsg').textContent = `أهلاً، ${state.nurseData.name || 'ممرض'}`;
                
                const tenantName = nurseData.tenantName || 'المجمع الطبي';
                $('#tenantName').textContent = tenantName;

                const linksSnap = await get(ref(db, `tenants/${currentTenantId}/links/${uid}`));
                const doctorIds = linksSnap.exists() ? Object.keys(linksSnap.val()) : [];

                if (doctorIds.length === 0) {
                    const localDoctors = loadDoctorsFromLocal();
                    if (localDoctors && localDoctors.length > 0) {
                        state.assignedDoctors = localDoctors;
                        renderDoctorsTabs();
                        populateDoctorSelect();
                        state.selectedDoctorId = state.assignedDoctors[0].id;
                        highlightDoctorTab(state.selectedDoctorId);
                        
                        const localBookings = loadBookingsFromLocal(state.selectedDoctorId, state.currentDate);
                        if (localBookings) {
                            state.allBookings = localBookings;
                            updateCounts();
                            updateStats();
                            renderTable();
                        }
                        
                        setSyncStatus(false);
                        showToast('⚠️ استخدام البيانات المحلية - لا يوجد اتصال', true);
                        return true;
                    }
                    
                    $('#doctorsTabs').innerHTML = '<div style="padding:10px;color:var(--text-sec);">لا يوجد أطباء مرتبطين بك</div>';
                    return false;
                }

                const doctorPromises = doctorIds.map(async (docId) => {
                    const snap = await get(ref(db, `tenants/${currentTenantId}/users/${docId}`));
                    if (snap.exists()) {
                        return { id: docId, name: snap.val().name || 'دكتور' };
                    }
                    const oldSnap = await get(ref(db, `users/${docId}`));
                    return { id: docId, name: oldSnap.exists() ? oldSnap.val().name : 'دكتور' };
                });
                state.assignedDoctors = await Promise.all(doctorPromises);
                
                saveDoctorsToLocal(state.assignedDoctors);

                renderDoctorsTabs();
                populateDoctorSelect();
                state.selectedDoctorId = state.assignedDoctors[0].id;
                highlightDoctorTab(state.selectedDoctorId);
                loadBookings();
                setSyncStatus(true);
                return true;

            } catch (err) {
                const localDoctors = loadDoctorsFromLocal();
                if (localDoctors && localDoctors.length > 0) {
                    state.assignedDoctors = localDoctors;
                    renderDoctorsTabs();
                    populateDoctorSelect();
                    state.selectedDoctorId = state.assignedDoctors[0].id;
                    highlightDoctorTab(state.selectedDoctorId);
                    
                    const localBookings = loadBookingsFromLocal(state.selectedDoctorId, state.currentDate);
                    if (localBookings) {
                        state.allBookings = localBookings;
                        updateCounts();
                        updateStats();
                        renderTable();
                    }
                    
                    setSyncStatus(false);
                    showToast('⚠️ استخدام البيانات المحلية - لا يوجد اتصال', true);
                    return true;
                }
                
                showToast('خطأ في تحميل البيانات: ' + err.message, true);
                return false;
            }
        };

        const renderDoctorsTabs = () => {
            $('#doctorsTabs').innerHTML = state.assignedDoctors.map(doc => `
                <button class="doctor-tab" data-id="${doc.id}">
                    <i class="fas fa-user-md"></i> د. ${escapeHtml(doc.name)}
                </button>
            `).join('');

            $$('.doctor-tab').forEach(btn => {
                btn.addEventListener('click', () => {
                    state.selectedDoctorId = btn.dataset.id;
                    highlightDoctorTab(state.selectedDoctorId);
                    loadBookings();
                });
            });
        };

        const highlightDoctorTab = (docId) => {
            $$('.doctor-tab').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.id === docId);
            });
        };

        const populateDoctorSelect = () => {
            $('#doctorSelect').innerHTML = state.assignedDoctors.map(doc =>
                `<option value="${doc.id}">د. ${escapeHtml(doc.name)}</option>`
            ).join('');
        };

        // ============ ✅ تحميل الكشوفات من مسار المجمع ============
        const loadBookings = () => {
            if (state.unsubscribeBookings) state.unsubscribeBookings();
            if (!state.selectedDoctorId || !currentTenantId) return;

            const bookingsRef = ref(db, `tenants/${currentTenantId}/appointments`);
            
            state.unsubscribeBookings = onValue(bookingsRef, (snap) => {
                const bookings = [];
                snap.forEach(child => {
                    const apt = child.val();
                    if (apt.doctor_id === state.selectedDoctorId && apt.date === state.currentDate) {
                        bookings.push({ id: child.key, ...apt });
                    }
                });
                bookings.sort((a, b) => (a.time || '').localeCompare(b.time || ''));
                state.allBookings = bookings;
                
                saveBookingsToLocal(bookings);
                setSyncStatus(true);
                
                updateCounts();
                updateStats();
                renderTable();
            }, (error) => {
                console.warn('خطأ في تحميل الكشوفات، استخدام المحلي:', error.message);
                const localBookings = loadBookingsFromLocal(state.selectedDoctorId, state.currentDate);
                if (localBookings) {
                    state.allBookings = localBookings;
                    updateCounts();
                    updateStats();
                    renderTable();
                }
                setSyncStatus(false);
            });
        };

        const updateCounts = () => {
            const counts = { waiting: 0, inprogress: 0, done: 0 };
            state.allBookings.forEach(b => {
                if (b.status === 'انتظار') counts.waiting++;
                else if (b.status === 'قيد الكشف') counts.inprogress++;
                else if (b.status === 'منتهي') counts.done++;
            });
            $('#countWaiting').textContent = counts.waiting;
            $('#countInProgress').textContent = counts.inprogress;
            $('#countDone').textContent = counts.done;
        };

        const updateStats = () => {
            const total = state.allBookings.filter(b => b.status !== 'ملغي').length;
            const newVisits = state.allBookings.filter(b => b.visit_type === 'new' && b.status !== 'ملغي').length;
            const followVisits = state.allBookings.filter(b => b.visit_type === 'follow' && b.status !== 'ملغي').length;
            const waiting = state.allBookings.filter(b => b.status === 'انتظار').length;

            $('#statTotalToday').textContent = total;
            $('#statNewToday').textContent = newVisits;
            $('#statFollowToday').textContent = followVisits;
            $('#statWaiting').textContent = waiting;
        };

        const renderTable = () => {
            let filtered = [];
            if (state.currentTab === 'waiting') filtered = state.allBookings.filter(b => b.status === 'انتظار');
            else if (state.currentTab === 'inprogress') filtered = state.allBookings.filter(b => b.status === 'قيد الكشف');
            else if (state.currentTab === 'done') filtered = state.allBookings.filter(b => b.status === 'منتهي');

            const tbody = $('#bookingsBody');

            if (filtered.length === 0) {
                tbody.innerHTML = '<tr class="empty-row"><td colspan="8">لا توجد كشوفات في هذا القسم</td></tr>';
                return;
            }

            tbody.innerHTML = filtered.map((b, i) => {
                const statusMap = {
                    'انتظار': 's-waiting',
                    'قيد الكشف': 's-inprogress',
                    'منتهي': 's-done',
                    'ملغي': 's-cancelled'
                };
                const statusClass = statusMap[b.status] || 's-waiting';
                const visitTypeClass = b.visit_type === 'new' ? 'vt-new' : 'vt-follow';
                const visitTypeText = b.visit_type === 'new' ? 'جديد' : 'إعادة';

                const doctorName = state.assignedDoctors.find(d => d.id === b.doctor_id)?.name || 'دكتور';

                const actions = state.currentTab === 'waiting' ? `
                    <button class="icon-btn" data-action="edit" data-id="${b.id}" title="تعديل">
                        <i class="fas fa-edit"></i>
                    </button>
                    <button class="icon-btn danger" data-action="cancel" data-id="${b.id}" title="إلغاء">
                        <i class="fas fa-times"></i>
                    </button>
                ` : '<span style="opacity:0.4;">—</span>';

                return `
                <tr>
                    <td>${i + 1}</td>
                    <td><b>${escapeHtml(b.patient_name || '-')}</b></td>
                    <td>د. ${escapeHtml(doctorName)}</td>
                    <td>${b.date || '-'}</td>
                    <td>${b.time || '-'}</td>
                    <td><span class="visit-type-badge ${visitTypeClass}">${visitTypeText}</span></td>
                    <td><span class="status-badge ${statusClass}">${b.status || 'انتظار'}</span></td>
                    <td><div class="action-btns">${actions}</div></td>
                </tr>`;
            }).join('');
        };

        // ============ أحداث الجدول ============
        $('#bookingsBody').addEventListener('click', (e) => {
            const btn = e.target.closest('[data-action]');
            if (!btn) return;
            const id = btn.dataset.id;
            const booking = state.allBookings.find(b => b.id === id);
            if (!booking) return;

            if (btn.dataset.action === 'cancel') cancelBooking(id);
            else if (btn.dataset.action === 'edit') openEditModal(booking);
        });

        const cancelBooking = async (id) => {
            try {
                await update(ref(db, `tenants/${currentTenantId}/appointments/${id}`), { status: 'ملغي' });
                showToast('تم إلغاء الكشف');
            } catch (err) {
                showToast('خطأ في الإلغاء: ' + err.message, true);
            }
        };

        // ============ المودال ============
        const openAddModal = () => {
            if (state.assignedDoctors.length === 0) {
                showToast('لا يوجد أطباء مرتبطين بك', true);
                return;
            }
            $('#editId').value = '';
            $('#modalTitle').innerHTML = '<i class="fas fa-calendar-plus"></i> كشف جديد';
            resetForm();
            $('#bookingModal').style.display = 'flex';
        };

        const openEditModal = (booking) => {
            $('#editId').value = booking.id;
            $('#modalTitle').innerHTML = '<i class="fas fa-edit"></i> تعديل الكشف';
            $('#doctorSelect').value = booking.doctor_id || state.selectedDoctorId;
            $('#patientName').value = booking.patient_name || '';
            $('#patientAge').value = booking.age || '';
            $('#patientPhone').value = booking.phone || '';
            $('#visitType').value = booking.visit_type || 'new';
            $('#apptDate').value = booking.date || state.currentDate;
            $('#apptTime').value = booking.time || '';
            state.selectedPatientId = booking.patient_id || null;
            $('#bookingModal').style.display = 'flex';
        };

        const closeModal = () => {
            $('#bookingModal').style.display = 'none';
            resetForm();
        };

        const resetForm = () => {
            $('#bookingForm').reset();
            $('#apptDate').value = state.currentDate;
            $('#visitType').value = 'new';
            state.selectedPatientId = null;
            $('#formAlert').textContent = '';
            $('#searchResults').style.display = 'none';
        };

        // ============ ✅ ذكاء البحث عن المرضى (تحسين جديد) ============
        let searchTimer;
        $('#patientSearch').addEventListener('input', (e) => {
            const term = e.target.value.trim().toLowerCase();
            if (term.length < 1) {
                $('#searchResults').style.display = 'none';
                return;
            }
            clearTimeout(searchTimer);
            searchTimer = setTimeout(async () => {
                let results = [];
                
                // 1. البحث المحلي أولاً
                const localResults = searchPatientsLocal(term);
                if (localResults.length > 0) {
                    results = localResults;
                }
                
                // 2. البحث في السحابة
                try {
                    const snap = await get(ref(db, `tenants/${currentTenantId}/patients`));
                    snap.forEach(child => {
                        const p = child.val();
                        if ((p.name && p.name.toLowerCase().includes(term)) ||
                            (p.phone && p.phone.includes(term))) {
                            // تجنب التكرار
                            if (!results.find(r => r.id === child.key)) {
                                results.push({ id: child.key, ...p });
                            }
                        }
                    });
                } catch (err) {
                    console.warn('تعذر البحث في السحابة:', err.message);
                }

                const container = $('#searchResults');
                if (results.length === 0) {
                    container.innerHTML = '<div class="search-item" style="color:var(--text-sec);">لا توجد نتائج - يمكنك إضافة مريض جديد</div>';
                } else {
                    container.innerHTML = results.map(p => `
                        <div class="search-item" data-id="${p.id}">
                            <b>${escapeHtml(p.name)}</b>
                            <small style="color:var(--text-sec);">${escapeHtml(p.phone || '')}</small>
                        </div>
                    `).join('');

                    container.querySelectorAll('.search-item[data-id]').forEach(item => {
                        item.addEventListener('click', () => {
                            const patient = results.find(p => p.id === item.dataset.id);
                            if (patient) selectPatient(patient);
                        });
                    });
                }
                container.style.display = 'block';
            }, 250);
        });

        const selectPatient = (patient) => {
            $('#patientName').value = patient.name || '';
            $('#patientAge').value = patient.age || '';
            $('#patientPhone').value = patient.phone || '';
            state.selectedPatientId = patient.id;
            $('#patientSearch').value = '';
            $('#searchResults').style.display = 'none';
        };

        document.addEventListener('click', (e) => {
            if (!$('#patientSearch').contains(e.target) && !$('#searchResults').contains(e.target)) {
                $('#searchResults').style.display = 'none';
            }
        });

        // ============ ✅ التحقق من الاسم قبل الحفظ (آلية منع التكرار) ============
        const checkPatientNameUniqueness = async (name, excludeId = null) => {
            // البحث المحلي
            const localResults = searchPatientsLocal(name);
            const localDuplicate = localResults.find(p => p.name === name && p.id !== excludeId);
            if (localDuplicate) return localDuplicate;

            // البحث السحابي
            try {
                const snap = await get(ref(db, `tenants/${currentTenantId}/patients`));
                let duplicate = null;
                snap.forEach(child => {
                    const p = child.val();
                    if (p.name === name && child.key !== excludeId && !duplicate) {
                        duplicate = { id: child.key, ...p };
                    }
                });
                return duplicate;
            } catch (err) {
                console.warn('تعذر التحقق من uniqueness الاسم:', err.message);
                return null;
            }
        };

        // ============ ✅ حفظ الكشف في مسار المجمع مع منع التكرار ============
        $('#bookingForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const editId = $('#editId').value;
            const doctorId = $('#doctorSelect').value;
            const name = $('#patientName').value.trim();
            const age = $('#patientAge').value.trim();
            const phone = $('#patientPhone').value.trim();
            const visitType = $('#visitType').value;
            const date = $('#apptDate').value;
            const time = $('#apptTime').value;

            if (!doctorId || !name || !visitType || !date || !time) {
                $('#formAlert').textContent = 'جميع الحقول المطلوبة (*) يجب ملؤها';
                return;
            }

            // ✅ التحقق من uniqueness الاسم
            const existingPatient = await checkPatientNameUniqueness(name, state.selectedPatientId);
            if (existingPatient && !state.selectedPatientId) {
                $('#formAlert').textContent = `⚠️ يوجد مريض بنفس الاسم "${name}". الرجاء إضافة اسم الأب أو تفاصيل مميزة (مثال: "${name} بن محمد").`;
                return;
            }

            const submitBtn = $('#submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الحفظ...';
            $('#formAlert').textContent = '';

            try {
                let patientId = state.selectedPatientId;

                if (!patientId) {
                    const newRef = push(ref(db, `tenants/${currentTenantId}/patients`));
                    patientId = newRef.key;
                    const patientData = {
                        name,
                        age: age || null,
                        phone: phone || null,
                        tenantId: currentTenantId,
                        createdBy: state.currentUser.uid,
                        created_at: new Date().toISOString()
                    };
                    await set(newRef, patientData);
                    savePatientToLocal(patientId, patientData);
                }

                const bookingData = {
                    patient_name: name,
                    patient_id: patientId,
                    age: age || null,
                    phone: phone || null,
                    doctor_id: doctorId,
                    nurse_id: state.currentUser.uid,
                    visit_type: visitType,
                    date,
                    time,
                    status: 'انتظار',
                    tenantId: currentTenantId
                };

                if (editId) {
                    await update(ref(db, `tenants/${currentTenantId}/appointments/${editId}`), bookingData);
                    showToast('تم تعديل الكشف بنجاح');
                } else {
                    bookingData.created_at = new Date().toISOString();
                    bookingData.created_by = state.currentUser.uid;
                    await set(ref(db, `tenants/${currentTenantId}/appointments/${push(ref(db, `tenants/${currentTenantId}/appointments`)).key}`), bookingData);
                    showToast('تم حجز الكشف بنجاح');
                }

                closeModal();
            } catch (err) {
                $('#formAlert').textContent = 'خطأ: ' + err.message;
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-save"></i> تأكيد الكشف';
            }
        });

        // ============ تبويبات الحالة ============
        $$('.status-tab').forEach(btn => {
            btn.addEventListener('click', () => {
                $$('.status-tab').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                state.currentTab = btn.dataset.tab;
                renderTable();
            });
        });

        // ============ تغيير التاريخ ============
        $('#filterDate').addEventListener('change', () => {
            state.currentDate = $('#filterDate').value;
            if (state.selectedDoctorId) loadBookings();
        });

        $('#todayBtn').addEventListener('click', () => {
            state.currentDate = getToday();
            $('#filterDate').value = state.currentDate;
            if (state.selectedDoctorId) loadBookings();
        });

        // ============ ✅ تسجيل الخروج ============
        $('#logoutBtn').addEventListener('click', async () => {
            try {
                showToast('👋 جاري تسجيل الخروج...');
                
                if (state.unsubscribeBookings) {
                    state.unsubscribeBookings();
                    state.unsubscribeBookings = null;
                }
                
                clearLoginSessionOnly();
                
                state.currentUser = null;
                state.nurseData = null;
                state.assignedDoctors = [];
                state.allBookings = [];
                
                await signOut(auth);
                
                window.location.href = 'index.html';
                
            } catch (error) {
                console.error('خطأ أثناء تسجيل الخروج:', error);
                clearLoginSessionOnly();
                window.location.href = 'index.html';
            }
        });

        // ============ أحداث أخرى ============
        $('#addBookingBtn').addEventListener('click', openAddModal);
        $('#closeModalBtn').addEventListener('click', closeModal);
        window.addEventListener('click', (e) => {
            if (e.target === $('#bookingModal')) closeModal();
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && $('#bookingModal').style.display === 'flex') closeModal();
        });

        // ============ مستمعي الاتصال بالإنترنت ============
        window.addEventListener('online', () => {
            setSyncStatus(true);
            showToast('📡 تم استعادة الاتصال - جاري المزامنة');
            if (state.selectedDoctorId) loadBookings();
        });
        
        window.addEventListener('offline', () => {
            setSyncStatus(false);
            showToast('⚠️ انقطع الاتصال - استخدام البيانات المحلية', true);
        });

        // ============ ✅ بدء التشغيل المبسط - بدون طرد للمستخدم ============
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                clearLoginSessionOnly();
                window.location.href = 'index.html';
                return;
            }

            const urlParams = new URLSearchParams(window.location.search);
            const tenantFromUrl = urlParams.get('tenant');
            
            if (tenantFromUrl) {
                currentTenantId = tenantFromUrl;
                console.log(`✅ تم استلام معرف المجمع من الرابط: ${currentTenantId}`);
            } else {
                try {
                    const encrypted = localStorage.getItem('shifa_secure_session');
                    if (encrypted) {
                        const decoded = atob(encrypted);
                        const match = decoded.match(/"tenantId":"([^"]+)"/);
                        if (match) {
                            currentTenantId = match[1];
                            console.log(`📦 تم استخراج معرف المجمع من الجلسة: ${currentTenantId}`);
                        }
                    }
                } catch (e) {
                    console.warn('تعذر فك تشفير الجلسة:', e.message);
                }
                
                if (!currentTenantId) {
                    const oldSession = localStorage.getItem('shifa_session');
                    if (oldSession) {
                        try {
                            const parsed = JSON.parse(oldSession);
                            currentTenantId = parsed.tenantId || user.uid;
                        } catch (e) {
                            currentTenantId = user.uid;
                        }
                    } else {
                        currentTenantId = user.uid;
                    }
                    console.log(`📦 تم تحديد المجمع من الجلسة القديمة: ${currentTenantId}`);
                }
            }

            sessionStorage.setItem('userUid', user.uid);
            sessionStorage.setItem('userRole', 'nurse');

            if (!state.currentUser) {
                state.currentUser = { uid: user.uid };
                state.currentDate = getToday();
                $('#filterDate').value = state.currentDate;

                const localBookings = loadBookingsFromLocal(state.selectedDoctorId || '', state.currentDate);
                if (localBookings && localBookings.length > 0) {
                    state.allBookings = localBookings;
                    updateCounts();
                    updateStats();
                    renderTable();
                }

                $('#authLoader').style.display = 'none';
                $('#mainContainer').style.display = 'block';

                const success = await loadNurseData(user.uid);
                if (!success) {
                    showToast('⚠️ تعذر تحميل بعض البيانات', true);
                }
            }
        });

        console.log('🚀 لوحة الممرض - نظام المجمعات الطبية المتعددة');
        console.log('🔒 كل ممرض يشوف فقط كشوفات الدكتور المرتبط بيه في مجمعه');
        console.log('💾 وضع الحفظ: يمسح جلسة الدخول فقط - يحتفظ ببيانات المجمع');
        console.log('⚙️ زر الإعدادات: ينقل إلى صفحة nurse-settings.html');
    </script>
</body>
</html>
