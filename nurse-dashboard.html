<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#00AEEF">
    <title>شفاء · لوحة الممرض</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap&subset=arabic" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'">
    
    <style>
        :root {
            --primary: #00AEEF;
            --primary-dark: #008080;
            --primary-light: #E0F7FA;
            --bg: #F5F7FA;
            --white: #FFFFFF;
            --ink: #1A3C4A;
            --text-sec: #5A7D8A;
            --danger: #E57373;
            --success: #26A69A;
            --warning: #FFA726;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --border: #E0E8ED;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            padding: 0;
            direction: rtl;
        }

        /* شاشة التحميل */
        #authLoader {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .loader-spin {
            width: 48px;
            height: 48px;
            border: 4px solid var(--primary-light);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loader-text {
            margin-top: 16px;
            color: var(--text-sec);
            font-weight: 600;
        }

        /* الحاوية الرئيسية */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 16px;
        }

        /* الهيدر */
        .app-header {
            background: var(--white);
            border-radius: 16px;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            box-shadow: var(--shadow);
            margin-bottom: 16px;
        }

        .logo h2 {
            font-size: 1.4rem;
            color: var(--primary-dark);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sync-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }

        .sync-dot.on {
            background: var(--success);
            box-shadow: 0 0 6px var(--success);
        }

        .sync-dot.off {
            background: var(--danger);
            box-shadow: 0 0 6px var(--danger);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tenant-badge {
            background: var(--primary-light);
            color: var(--primary-dark);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        #welcomeMsg {
            font-weight: 600;
            color: var(--ink);
            font-size: 0.9rem;
        }

        /* الأزرار */
        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 12px;
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(0,174,239,0.3);
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-outline {
            background: transparent;
            color: var(--danger);
            border: 2px solid var(--danger);
        }

        .btn-outline:hover {
            background: rgba(229,115,115,0.1);
        }

        .btn-settings {
            background: var(--bg);
            color: var(--ink);
            border: 1px solid var(--border);
        }

        .btn-notifications {
            background: var(--white);
            color: var(--warning);
            border: 2px solid var(--warning);
            position: relative;
        }

        .notification-badge {
            position: absolute;
            top: -6px;
            left: -6px;
            background: var(--danger);
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        /* صف التحكم */
        .controls-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .doctors-tabs {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            flex: 1;
        }

        .doctor-tab {
            padding: 8px 16px;
            background: var(--white);
            border: 2px solid var(--border);
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .doctor-tab.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .doctor-tab:hover {
            border-color: var(--primary);
        }

        .date-picker {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-today {
            padding: 8px 16px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .date-input {
            padding: 8px 12px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-family: 'Cairo', sans-serif;
            font-size: 0.85rem;
            color: var(--ink);
            background: var(--white);
        }

        /* تبويبات الحالة */
        .status-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .status-tab {
            padding: 10px 20px;
            background: var(--white);
            border: 2px solid var(--border);
            border-radius: 16px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .status-tab.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .status-tab:hover:not(.active) {
            border-color: var(--primary);
        }

        .badge {
            background: rgba(0,0,0,0.1);
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .status-tab.active .badge {
            background: rgba(255,255,255,0.3);
        }

        /* الجدول */
        .table-container {
            background: var(--white);
            border-radius: 16px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .table-scroll {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }

        thead {
            background: var(--primary-light);
        }

        th {
            padding: 14px 16px;
            text-align: right;
            font-weight: 700;
            color: var(--primary-dark);
            font-size: 0.9rem;
            white-space: nowrap;
        }

        td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }

        tbody tr:hover {
            background: rgba(0,174,239,0.03);
        }

        .empty-row td {
            text-align: center;
            padding: 40px;
            color: var(--text-sec);
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
            display: inline-block;
        }

        .status-waiting {
            background: #FFF3E0;
            color: #E65100;
        }

        .status-inprogress {
            background: #E3F2FD;
            color: #1565C0;
        }

        .status-done {
            background: #E8F5E9;
            color: #2E7D32;
        }

        .action-btns {
            display: flex;
            gap: 6px;
        }

        .btn-sm {
            padding: 6px 12px;
            border: none;
            border-radius: 8px;
            font-family: 'Cairo', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: all 0.2s;
        }

        .btn-edit {
            background: #FFF3E0;
            color: #E65100;
        }

        .btn-status {
            background: #E3F2FD;
            color: #1565C0;
        }

        .btn-delete {
            background: #FFEBEE;
            color: #C62828;
        }

        /* المودال */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.show {
            display: flex;
        }

        .modal-card {
            background: var(--white);
            border-radius: 20px;
            width: 100%;
            max-width: 560px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
        }

        .modal-header h3 {
            font-size: 1.2rem;
            color: var(--primary-dark);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.8rem;
            color: var(--text-sec);
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
            line-height: 1;
        }

        .close-btn:hover {
            background: rgba(0,0,0,0.05);
            color: var(--danger);
        }

        .modal-body {
            padding: 24px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--ink);
            font-size: 0.9rem;
        }

        .form-control {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-family: 'Cairo', sans-serif;
            font-size: 0.9rem;
            color: var(--ink);
            background: var(--white);
            transition: border-color 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0,174,239,0.1);
        }

        select.form-control {
            cursor: pointer;
        }

        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 12px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 10;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            display: none;
        }

        .search-results.show {
            display: block;
        }

        .search-item {
            padding: 10px 14px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            transition: background 0.2s;
        }

        .search-item:hover {
            background: var(--primary-light);
        }

        .search-item:last-child {
            border-bottom: none;
        }

        .alert-msg {
            margin-top: 12px;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            display: none;
        }

        .alert-msg.error {
            display: block;
            background: #FFEBEE;
            color: #C62828;
            border: 1px solid #FFCDD2;
        }

        .alert-msg.success {
            display: block;
            background: #E8F5E9;
            color: #2E7D32;
            border: 1px solid #C8E6C9;
        }

        .toggle-id-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .btn-toggle-id {
            background: var(--primary-light);
            color: var(--primary-dark);
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            font-family: 'Cairo', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* توست */
        .toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }

        .toast {
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.9rem;
            color: white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            animation: toastIn 0.3s ease-out;
            pointer-events: auto;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toast.success {
            background: var(--success);
        }

        .toast.error {
            background: var(--danger);
        }

        .toast.info {
            background: var(--primary);
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* مساحة للوحة المفاتيح في الموبايل */
        .keyboard-scroll-spacer {
            height: 200px;
            display: none;
        }

        @media (max-width: 768px) {
            .keyboard-scroll-spacer {
                display: block;
            }
            
            .app-header {
                flex-direction: column;
                text-align: center;
            }
            
            .header-actions {
                justify-content: center;
            }
            
            .modal-card {
                max-width: 100%;
                border-radius: 16px;
            }
            
            .btn {
                padding: 8px 14px;
                font-size: 0.8rem;
            }
        }

        @media (max-width: 480px) {
            .controls-row {
                flex-direction: column;
            }
            
            .doctors-tabs {
                justify-content: center;
            }
            
            .status-tab {
                padding: 8px 14px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>

    <div id="authLoader">
        <div class="loader-spin"></div>
        <span class="loader-text">جارٍ تحميل البيانات...</span>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <div class="container" id="mainContainer" style="display:none;">
        <header class="app-header">
            <div class="logo">
                <h2><i class="fas fa-heartbeat"></i> شفاء · الممرض <span class="sync-dot on" id="syncDot" title="حالة المزامنة"></span></h2>
            </div>
            <div class="header-actions">
                <span class="tenant-badge" id="tenantBadge">
                    <i class="fas fa-hospital"></i> <span id="tenantName"></span>
                </span>
                <span id="welcomeMsg"></span>
                <!-- ✅ زر الإشعارات -->
                <button class="btn btn-notifications" id="notificationsBtn" title="الإشعارات">
                    <i class="fas fa-bell"></i>
                    <span class="notification-badge" id="notificationBadge" style="display:none;">0</span>
                </button>
                <button class="btn btn-primary" id="addBookingBtn">
                    <i class="fas fa-plus"></i> كشف جديد
                </button>
                <button class="btn btn-settings" id="settingsBtn" title="الإعدادات">
                    <i class="fas fa-cog"></i> إعدادات
                </button>
                <button class="btn btn-outline" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i> خروج
                </button>
            </div>
        </header>

        <div class="controls-row">
            <div class="doctors-tabs" id="doctorsTabs"></div>
            <div class="date-picker">
                <button class="btn-today" id="todayBtn">
                    <i class="fas fa-calendar-alt"></i> اليوم
                </button>
                <input type="date" id="filterDate" class="date-input">
            </div>
        </div>

        <div class="status-tabs">
            <button class="status-tab active" data-tab="waiting">
                <i class="fas fa-hourglass-half"></i> قيد الانتظار
                <span class="badge" id="countWaiting">0</span>
            </button>
            <button class="status-tab" data-tab="inprogress">
                <i class="fas fa-stethoscope"></i> قيد الكشف
                <span class="badge" id="countInProgress">0</span>
            </button>
            <button class="status-tab" data-tab="done">
                <i class="fas fa-check-circle"></i> منتهي
                <span class="badge" id="countDone">0</span>
            </button>
        </div>

        <div class="table-container">
            <div class="table-scroll">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>المريض</th>
                            <th>الطبيب</th>
                            <th>التاريخ</th>
                            <th>نوع الكشف</th>
                            <th>الحالة</th>
                            <th>إجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="bookingsBody">
                        <tr class="empty-row"><td colspan="7"><i class="fas fa-spinner fa-spin"></i> جاري التحميل...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <div class="keyboard-scroll-spacer"></div>
    </div>

    <!-- مودال الكشف -->
    <div id="bookingModal" class="modal">
        <div class="modal-card">
            <div class="modal-header">
                <h3 id="modalTitle"><i class="fas fa-calendar-plus"></i> كشف جديد</h3>
                <button class="close-btn" id="closeModalBtn">&times;</button>
            </div>
            <div class="modal-body">
                <form id="bookingForm" autocomplete="off">
                    <input type="hidden" id="editId">
                    
                    <div class="form-group">
                        <label>الطبيب *</label>
                        <select id="doctorSelect" class="form-control" required></select>
                    </div>
                    
                    <!-- ✅ قسم البحث برقم الهاتف (يُخفى عند استخدام وضع القرية) -->
                    <div id="phoneSearchSection">
                        <div class="form-group search-box" style="position:relative;">
                            <label>البحث عن مريض (برقم الهاتف)</label>
                            <input type="text" id="patientSearch" class="form-control" placeholder="أدخل رقم الهاتف للبحث..." autocomplete="off" dir="ltr">
                            <div id="searchResults" class="search-results"></div>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>اسم المريض *</label>
                        <input type="text" id="patientName" class="form-control" required>
                    </div>
                    
                    <div class="form-group">
                        <label>العمر</label>
                        <input type="number" id="patientAge" class="form-control" min="0" max="150">
                    </div>
                    
                    <!-- ✅ قسم الهاتف (يُخفى عند استخدام وضع القرية) -->
                    <div id="phoneSection">
                        <div class="form-group">
                            <div class="toggle-id-container">
                                <label>رقم الهاتف</label>
                                <button type="button" class="btn-toggle-id" id="toggleIdModeBtn">
                                    <i class="fas fa-tree"></i> استخدام بيانات القرية
                                </button>
                            </div>
                            <input type="tel" id="patientPhone" class="form-control" dir="ltr">
                        </div>
                    </div>

                    <!-- ✅ قسم بيانات القرية (يظهر بدل الهاتف عند التبديل) -->
                    <div id="villageSection" style="display:none;">
                        <div class="form-group">
                            <div class="toggle-id-container">
                                <label>بيانات القرية</label>
                                <button type="button" class="btn-toggle-id" id="togglePhoneModeBtn">
                                    <i class="fas fa-mobile-alt"></i> استخدام رقم الهاتف
                                </button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>اسم الأب</label>
                            <input type="text" id="fatherName" class="form-control" placeholder="اسم الأب">
                        </div>
                        <div class="form-group">
                            <label>اسم العائلة</label>
                            <input type="text" id="familyName" class="form-control" placeholder="اسم العائلة">
                        </div>
                        <div class="form-group">
                            <label>اسم القرية</label>
                            <input type="text" id="villageName" class="form-control" placeholder="اسم القرية">
                        </div>
                        <div id="villageSearchResults" class="search-results" style="position:relative;margin-top:8px;"></div>
                    </div>

                    <div class="form-group">
                        <label>نوع الكشف *</label>
                        <select id="visitType" class="form-control" required>
                            <option value="new">🆕 كشف جديد</option>
                            <option value="follow">🔄 إعادة (متابعة)</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>التاريخ *</label>
                        <input type="date" id="apptDate" class="form-control" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="width:100%;" id="submitBtn">
                        <i class="fas fa-save"></i> تأكيد الكشف
                    </button>
                    
                    <div id="formAlert" class="alert-msg"></div>
                </form>
                
                <div class="keyboard-scroll-spacer"></div>
            </div>
        </div>
    </div>

    <!-- ✅ مودال الإشعارات -->
    <div id="notificationsModal" class="modal">
        <div class="modal-card">
            <div class="modal-header">
