<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>سُكُون · لوحة الممرض</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ----- ألوان برتقالية دافئة (مشمش / كراميل) ----- */
        :root {
            --primary: #F8C471;
            --primary-light: #FDEBD0;
            --primary-dark: #E59866;
            --accent: #E67E22;
            --accent-soft: #FAD7A1;
            --bg: #FFF8F0;
            --white: #FFFFFF;
            --ink: #4A3B2C;
            --text-sec: #8B7A66;
            --danger: #E57373;
            --success: #5FA88D;
            --warning: #F4B886;
            --border-light: #F0E0D0;
            --shadow-sm: 0 6px 12px -4px rgba(230, 126, 34, 0.08);
            --shadow-md: 0 12px 28px -6px rgba(230, 126, 34, 0.12);
            --radius-card: 28px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            padding: 24px;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 0% 0%, rgba(248, 196, 113, 0.08), transparent 50%),
                        radial-gradient(circle at 100% 100%, rgba(230, 126, 34, 0.06), transparent 50%);
            pointer-events: none;
            z-index: -1;
        }
        .container { max-width: 1400px; margin: 0 auto; }

        /* الهيدر */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(18px);
            border-radius: 60px;
            padding: 12px 24px;
            margin-bottom: 28px;
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow: var(--shadow-md);
            flex-wrap: wrap;
            gap: 16px;
        }
        .logo h2 {
            font-size: 1.9rem;
            font-weight: 800;
            background: linear-gradient(145deg, #D35400, #E67E22);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .header-actions { display: flex; gap: 12px; align-items: center; }
        .btn {
            padding: 10px 22px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            transition: all 0.2s;
            background: white;
            color: var(--ink);
            border: 1px solid var(--border-light);
        }
        .btn-primary {
            background: var(--primary);
            color: #4A3B2C;
            border: none;
            box-shadow: 0 6px 14px rgba(230, 126, 34, 0.2);
            font-weight: 700;
        }
        .btn-primary:hover {
            background: var(--primary-dark);
            color: white;
            transform: translateY(-2px);
        }
        .btn-outline:hover { background: var(--primary-light); border-color: var(--primary); }

        /* شريط الأطباء */
        .doctors-toolbar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }
        .doctor-tab-btn {
            background: white;
            border: 1px solid var(--border-light);
            border-radius: 60px;
            padding: 10px 24px;
            font-weight: 600;
            color: var(--ink);
            transition: 0.2s;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
        }
        .doctor-tab-btn i { color: var(--accent); margin-left: 6px; }
        .doctor-tab-btn.active {
            background: var(--primary);
            color: #4A3B2C;
            border-color: var(--primary);
            box-shadow: 0 8px 16px rgba(230, 126, 34, 0.15);
        }

        /* تبويبات الحالة */
        .tabs-container {
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 6px;
            display: inline-flex;
            margin-bottom: 24px;
            border: 1px solid var(--border-light);
        }
        .tab-btn {
            background: transparent;
            border: none;
            padding: 10px 28px;
            border-radius: 40px;
            font-weight: 600;
            color: var(--text-sec);
            cursor: pointer;
            transition: 0.2s;
        }
        .tab-btn i { margin-left: 6px; }
        .tab-btn.active {
            background: white;
            color: var(--accent);
            box-shadow: var(--shadow-sm);
        }

        /* بطاقات الإحصائيات */
        .stats-cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 18px 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-sm);
        }
        .stat-icon {
            width: 52px;
            height: 52px;
            background: var(--primary);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4A3B2C;
            font-size: 1.6rem;
        }
        .stat-info h4 { font-size: 1.8rem; font-weight: 800; color: var(--ink); }
        .stat-info p { color: var(--text-sec); font-size: 0.85rem; }

        /* جدول الحجوزات */
        .table-wrapper {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            border-radius: var(--radius-card);
            padding: 6px;
            box-shadow: var(--shadow-md);
            border: 1px solid rgba(255,255,255,0.6);
            overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; text-align: center; min-width: 1100px; }
        th, td { padding: 18px 12px; }
        thead tr { background: #FEF5EC; border-bottom: 2px solid var(--border-light); }
        th {
            font-weight: 700;
            color: var(--ink);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        tbody tr { border-bottom: 1px solid var(--border-light); transition: background 0.15s; }
        tbody tr:hover { background: rgba(248, 196, 113, 0.08); }

        .status-badge {
            padding: 6px 16px;
            border-radius: 60px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        .status-waiting { background: #FEF9E7; color: #9A6E1A; }
        .status-inprogress { background: #D6F0F0; color: #1A5C5C; }
        .status-done { background: #DCF5E8; color: #1E6F4C; }
        .status-cancelled { background: #FDE2E2; color: #B23B3B; }

        .action-btns { display: flex; gap: 8px; justify-content: center; }
        .icon-btn {
            width: 38px; height: 38px; border-radius: 14px; border: none;
            background: white; color: var(--text-sec); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s; border: 1px solid var(--border-light);
            font-size: 1rem;
        }
        .icon-btn:hover { background: var(--primary); color: #4A3B2C; border-color: var(--primary); }
        .icon-btn.danger:hover { background: var(--danger); color: white; border-color: var(--danger); }
        .icon-btn.success:hover { background: var(--success); color: white; border-color: var(--success); }
        .icon-btn.warning:hover { background: var(--warning); color: white; border-color: var(--warning); }

        /* مودال */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(60, 40, 20, 0.25);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 16px;
        }
        .modal-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(16px);
            border-radius: 40px;
            width: 90%;
            max-width: 650px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 30px 50px rgba(160, 100, 40, 0.2);
            border: 1px solid rgba(255,255,255,0.6);
        }
        .modal-header {
            padding: 24px 28px;
            background: #FEF5EC;
            border-bottom: 1px solid var(--border-light);
            border-radius: 40px 40px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-body { padding: 24px 28px; }
        .close-btn { background: none; border: none; font-size: 30px; color: var(--text-sec); cursor: pointer; }
        .form-group { margin-bottom: 22px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; }
        .form-control {
            width: 100%;
            padding: 14px 18px;
            border-radius: 20px;
            border: 1.5px solid var(--border-light);
            background: white;
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
        }
        .form-control:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(248, 196, 113, 0.2); }
        .search-results {
            background: white;
            border: 1px solid var(--border-light);
            border-radius: 20px;
            margin-top: 8px;
            max-height: 220px;
            overflow-y: auto;
            display: none;
        }
        .search-item { padding: 12px 18px; cursor: pointer; border-bottom: 1px solid var(--border-light); }
        .search-item:hover { background: #FEF5EC; }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 30px;
            right: 30px;
            background: #4A3B2C;
            color: white;
            padding: 14px 28px;
            border-radius: 60px;
            text-align: center;
            z-index: 1300;
            font-weight: 500;
            max-width: 500px;
            margin: 0 auto;
            box-shadow: 0 12px 28px rgba(0,0,0,0.2);
        }
        .empty-state { text-align: center; padding: 50px; color: var(--text-sec); }
        .highlight { color: var(--accent); }
    </style>
</head>
<body>
<div class="container">
    <header class="app-header">
        <div class="logo">
            <h2><i class="fas fa-calendar-check" style="color:var(--primary); margin-left:10px;"></i>سُكُون · الممرض</h2>
        </div>
        <div class="header-actions">
            <span id="welcomeMessage" style="font-weight:600;"></span>
            <button class="btn btn-primary" id="openModalBtn"><i class="fas fa-plus"></i> حجز جديد</button>
            <button class="btn btn-outline" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> خروج</button>
        </div>
    </header>

    <!-- أزرار الأطباء -->
    <div id="doctorsToolbar" class="doctors-toolbar"></div>

    <!-- تبويبات -->
    <div class="tabs-container">
        <button class="tab-btn active" data-tab="waiting"><i class="fas fa-hourglass-half"></i> قيد الانتظار</button>
        <button class="tab-btn" data-tab="inprogress"><i class="fas fa-stethoscope"></i> قيد الكشف</button>
        <button class="tab-btn" data-tab="done"><i class="fas fa-check-circle"></i> منتهي</button>
    </div>

    <!-- إحصائيات -->
    <div class="stats-cards">
        <div class="stat-card"><div class="stat-icon"><i class="fas fa-calendar-check"></i></div><div class="stat-info"><h4 id="totalBookings">0</h4><p>إجمالي الحجوزات</p></div></div>
        <div class="stat-card"><div class="stat-icon"><i class="fas fa-clock"></i></div><div class="stat-info"><h4 id="waitingCount">0</h4><p>في الانتظار</p></div></div>
        <div class="stat-card"><div class="stat-icon"><i class="fas fa-play-circle"></i></div><div class="stat-info"><h4 id="inProgressCount">0</h4><p>قيد الكشف</p></div></div>
        <div class="stat-card"><div class="stat-icon"><i class="fas fa-check-circle"></i></div><div class="stat-info"><h4 id="doneCount">0</h4><p>منتهي</p></div></div>
    </div>

    <!-- جدول الحجوزات -->
    <div class="table-wrapper">
        <table>
            <thead>
                <tr><th>#</th><th>المريض</th><th>العمر</th><th>الهاتف</th><th>التاريخ</th><th>الوقت</th><th>الحالة</th><th>إجراءات</th></tr>
            </thead>
            <tbody id="bookingsBody"><tr><td colspan="8" class="empty-state"><i class="fas fa-spinner fa-spin"></i> جاري التحميل...</td></tr>
        </table>
    </div>
</div>

<!-- مودال حجز / تعديل -->
<div id="bookingModal" class="modal">
    <div class="modal-card">
        <div class="modal-header">
            <h3 id="modalTitle"><i class="fas fa-calendar-plus"></i> حجز موعد جديد</h3>
            <button class="close-btn" id="closeModalBtn">&times;</button>
        </div>
        <div class="modal-body">
            <form id="bookingForm">
                <input type="hidden" id="editBookingId">
                <div class="form-group">
                    <label>الطبيب *</label>
                    <select id="bookingDoctorSelect" class="form-control" required></select>
                </div>
                <div class="form-group">
                    <label>البحث عن مريض</label>
                    <input type="text" id="patientSearch" class="form-control" placeholder="اكتب اسم أو رقم الهاتف..." autocomplete="off">
                    <div id="searchResults" class="search-results"></div>
                </div>
                <div class="form-group">
                    <label>اسم المريض *</label>
                    <input type="text" id="patientName" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>العمر</label>
                    <input type="number" id="patientAge" class="form-control" min="0" max="150">
                </div>
                <div class="form-group">
                    <label>رقم الهاتف</label>
                    <input type="tel" id="patientPhone" class="form-control">
                </div>
                <div class="form-group">
                    <label>تاريخ الموعد *</label>
                    <input type="date" id="appointmentDate" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>الوقت *</label>
                    <input type="time" id="appointmentTime" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;" id="submitBtn">تأكيد الحجز</button>
                <p id="formAlert" style="color:var(--danger); text-align:center; margin-top:12px;"></p>
            </form>
        </div>
    </div>
</div>

<script type="module">
    import { firebaseConfig } from './firebase-config.js';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
    import { getDatabase, ref, onValue, set, push, update, get, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // --- State ---
    let currentUser = null;
    let nurseInfo = null;
    let assignedDoctorsList = [];
    let currentDoctorId = null;
    let allBookings = [];
    let unsubscribeBookings = null;
    let selectedPatientId = null;
    let currentTab = 'waiting';
    const today = new Date().toISOString().split('T')[0];

    // --- DOM Elements ---
    const ui = {
        welcomeMessage: document.getElementById('welcomeMessage'),
        doctorsToolbar: document.getElementById('doctorsToolbar'),
        bookingsBody: document.getElementById('bookingsBody'),
        totalBookings: document.getElementById('totalBookings'),
        waitingCount: document.getElementById('waitingCount'),
        inProgressCount: document.getElementById('inProgressCount'),
        doneCount: document.getElementById('doneCount'),
        openModalBtn: document.getElementById('openModalBtn'),
        closeModalBtn: document.getElementById('closeModalBtn'),
        modal: document.getElementById('bookingModal'),
        modalTitle: document.getElementById('modalTitle'),
        bookingDoctorSelect: document.getElementById('bookingDoctorSelect'),
        patientSearch: document.getElementById('patientSearch'),
        searchResults: document.getElementById('searchResults'),
        patientName: document.getElementById('patientName'),
        patientAge: document.getElementById('patientAge'),
        patientPhone: document.getElementById('patientPhone'),
        appointmentDate: document.getElementById('appointmentDate'),
        appointmentTime: document.getElementById('appointmentTime'),
        submitBtn: document.getElementById('submitBtn'),
        formAlert: document.getElementById('formAlert'),
        bookingForm: document.getElementById('bookingForm'),
        editBookingId: document.getElementById('editBookingId'),
        logoutBtn: document.getElementById('logoutBtn'),
        tabBtns: document.querySelectorAll('.tab-btn')
    };

    // --- Helper Functions ---
    function showToast(msg, isErr = false) {
        const t = document.createElement('div');
        t.className = 'toast';
        t.style.background = isErr ? '#B23B3B' : '#4A3B2C';
        t.innerHTML = `<i class="fas ${isErr ? 'fa-exclamation-triangle' : 'fa-check'}"></i> ${msg}`;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    // --- Load Nurse Data & Assigned Doctors ---
    async function loadNurseData(uid) {
        try {
            const snap = await get(ref(db, `users/${uid}`));
            if (!snap.exists()) throw new Error("بيانات الممرض غير موجودة");
            nurseInfo = snap.val();
            ui.welcomeMessage.textContent = `أهلاً، ${nurseInfo.name || 'ممرض'}`;

            const assignedDoctors = nurseInfo.assignedDoctors || {};
            const doctorIds = Object.keys(assignedDoctors);
            assignedDoctorsList = [];
            
            for (const docId of doctorIds) {
                const docSnap = await get(ref(db, `users/${docId}`));
                if (docSnap.exists()) {
                    assignedDoctorsList.push({ id: docId, name: docSnap.val().name || 'دكتور' });
                }
            }
            
            renderDoctorsToolbar();
            ui.bookingDoctorSelect.innerHTML = assignedDoctorsList.map(d => 
                `<option value="${d.id}">د. ${d.name}</option>`
            ).join('');
            
            if (assignedDoctorsList.length > 0) {
                currentDoctorId = assignedDoctorsList[0].id;
                highlightDoctorButton(currentDoctorId);
                loadBookingsForDoctor(currentDoctorId);
            } else {
                ui.bookingsBody.innerHTML = '<tr><td colspan="8" class="empty-state">لا يوجد أطباء مرتبطين بك</td></tr>';
            }
            return true;
        } catch (err) {
            showToast(err.message, true);
            return false;
        }
    }

    function renderDoctorsToolbar() {
        ui.doctorsToolbar.innerHTML = assignedDoctorsList.map(doc => `
            <button class="doctor-tab-btn" data-doctor-id="${doc.id}">
                <i class="fas fa-user-md"></i> د. ${doc.name}
            </button>
        `).join('');
        
        document.querySelectorAll('.doctor-tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const docId = btn.dataset.doctorId;
                currentDoctorId = docId;
                highlightDoctorButton(docId);
                loadBookingsForDoctor(docId);
            });
        });
    }

    function highlightDoctorButton(docId) {
        document.querySelectorAll('.doctor-tab-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.doctorId === docId);
        });
    }

    function loadBookingsForDoctor(doctorId) {
        if (unsubscribeBookings) unsubscribeBookings();
        if (!doctorId) return;

        const q = query(ref(db, 'appointments'), orderByChild('doctorId'), equalTo(doctorId));
        unsubscribeBookings = onValue(q, (snap) => {
            const bookings = [];
            snap.forEach(child => {
                const apt = child.val();
                if (apt.date === today) {
                    bookings.push({ id: child.key, ...apt });
                }
            });
            bookings.sort((a, b) => (a.time || '').localeCompare(b.time || ''));
            allBookings = bookings;
            filterAndRenderByTab();
            updateStats();
        });
    }

    function filterAndRenderByTab() {
        let filtered = [];
        if (currentTab === 'waiting') filtered = allBookings.filter(b => b.status === 'انتظار');
        else if (currentTab === 'inprogress') filtered = allBookings.filter(b => b.status === 'قيد الكشف');
        else if (currentTab === 'done') filtered = allBookings.filter(b => b.status === 'منتهي');
        renderTable(filtered);
    }

    function renderTable(bookings) {
        if (bookings.length === 0) {
            ui.bookingsBody.innerHTML = `<tr><td colspan="8" class="empty-state">لا توجد حجوزات في هذا القسم</td></tr>`;
            return;
        }
        let html = '';
        bookings.forEach((b, idx) => {
            const statusClass = {
                'انتظار': 'status-waiting',
                'قيد الكشف': 'status-inprogress',
                'منتهي': 'status-done',
                'ملغي': 'status-cancelled'
            }[b.status] || 'status-waiting';
            
            // إجراءات مختلفة حسب التبويب
            let actions = '';
            if (currentTab === 'waiting') {
                actions = `
                    <button class="icon-btn success" data-id="${b.id}" data-action="start"><i class="fas fa-play"></i></button>
                    <button class="icon-btn warning" data-id="${b.id}" data-action="edit"><i class="fas fa-edit"></i></button>
                    <button class="icon-btn danger" data-id="${b.id}" data-action="cancel"><i class="fas fa-times"></i></button>
                `;
            } else if (currentTab === 'inprogress') {
                actions = `
                    <button class="icon-btn" data-id="${b.id}" data-action="finish" style="background:var(--success); color:white;"><i class="fas fa-check"></i></button>
                    <button class="icon-btn danger" data-id="${b.id}" data-action="cancel"><i class="fas fa-times"></i></button>
                `;
            } else if (currentTab === 'done') {
                actions = `<button class="icon-btn danger" data-id="${b.id}" data-action="delete"><i class="fas fa-trash"></i></button>`;
            }
            
            html += `<tr>
                <td>${idx + 1}</td>
                <td><b>${b.patientName || '-'}</b></td>
                <td>${b.age || '-'}</td>
                <td>${b.phone || '-'}</td>
                <td>${b.date || '-'}</td>
                <td>${b.time || '-'}</td>
                <td><span class="status-badge ${statusClass}">${b.status || 'انتظار'}</span></td>
                <td><div class="action-btns">${actions}</div></td>
            </tr>`;
        });
        ui.bookingsBody.innerHTML = html;
    }

    function updateStats() {
        const waiting = allBookings.filter(b => b.status === 'انتظار').length;
        const inProgress = allBookings.filter(b => b.status === 'قيد الكشف').length;
        const done = allBookings.filter(b => b.status === 'منتهي').length;
        ui.totalBookings.textContent = allBookings.length;
        ui.waitingCount.textContent = waiting;
        ui.inProgressCount.textContent = inProgress;
        ui.doneCount.textContent = done;
    }

    // --- Actions ---
    ui.bookingsBody.addEventListener('click', (e) => {
        const btn = e.target.closest('[data-action]');
        if (!btn) return;
        const id = btn.dataset.id;
        const action = btn.dataset.action;
        const booking = allBookings.find(b => b.id === id);
        if (!booking) return;

        if (action === 'start') updateStatus(id, 'قيد الكشف');
        else if (action === 'finish') updateStatus(id, 'منتهي');
        else if (action === 'cancel') updateStatus(id, 'ملغي');
        else if (action === 'delete') deleteBooking(id);
        else if (action === 'edit') openEditModal(booking);
    });

    async function updateStatus(id, status) {
        try {
            await update(ref(db, `appointments/${id}`), { status });
            showToast(status === 'منتهي' ? '✅ تم إنهاء الكشف' : status === 'قيد الكشف' ? '🩺 بدأ الكشف' : '❌ تم الإلغاء');
        } catch (e) { showToast('فشل التحديث', true); }
    }

    async function deleteBooking(id) {
        if (!confirm('حذف الحجز نهائياً؟')) return;
        try {
            await set(ref(db, `appointments/${id}`), null);
            showToast('تم الحذف');
        } catch (e) { showToast('فشل الحذف', true); }
    }

    // --- Modal Handling (Add/Edit) ---
    function openAddModal() {
        ui.modalTitle.innerHTML = '<i class="fas fa-calendar-plus"></i> حجز موعد جديد';
        ui.editBookingId.value = '';
        resetForm();
        ui.modal.style.display = 'flex';
    }

    function openEditModal(booking) {
        ui.modalTitle.innerHTML = '<i class="fas fa-edit"></i> تعديل الحجز';
        ui.editBookingId.value = booking.id;
        ui.bookingDoctorSelect.value = booking.doctorId || currentDoctorId;
        ui.patientName.value = booking.patientName || '';
        ui.patientAge.value = booking.age || '';
        ui.patientPhone.value = booking.phone || '';
        ui.appointmentDate.value = booking.date || today;
        ui.appointmentTime.value = booking.time || '';
        selectedPatientId = booking.patientId || null;
        ui.modal.style.display = 'flex';
    }

    function resetForm() {
        ui.bookingForm.reset();
        ui.appointmentDate.value = today;
        selectedPatientId = null;
        ui.formAlert.textContent = '';
    }

    ui.openModalBtn.onclick = () => {
        if (assignedDoctorsList.length === 0) {
            showToast('لا يوجد أطباء مرتبطين', true);
            return;
        }
        openAddModal();
    };
    ui.closeModalBtn.onclick = () => ui.modal.style.display = 'none';
    window.onclick = (e) => { if (e.target === ui.modal) ui.modal.style.display = 'none'; };

    // --- Patient Search ---
    let searchTimeout;
    ui.patientSearch.addEventListener('input', (e) => {
        const term = e.target.value.trim();
        if (term.length < 2) { ui.searchResults.style.display = 'none'; return; }
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(async () => {
            const snap = await get(ref(db, 'patients'));
            const results = [];
            snap.forEach(child => {
                const p = child.val();
                if (p.name?.includes(term) || p.phone?.includes(term)) {
                    results.push({ id: child.key, ...p });
                }
            });
            ui.searchResults.innerHTML = '';
            if (results.length === 0) {
                ui.searchResults.innerHTML = '<div class="search-item">لا توجد نتائج</div>';
            } else {
                results.forEach(p => {
                    const div = document.createElement('div');
                    div.className = 'search-item';
                    div.innerHTML = `<b>${p.name}</b><br><small>${p.phone || 'بدون رقم'}</small>`;
                    div.onclick = () => selectPatient(p);
                    ui.searchResults.appendChild(div);
                });
            }
            ui.searchResults.style.display = 'block';
        }, 300);
    });

    function selectPatient(patient) {
        ui.patientName.value = patient.name || '';
        ui.patientAge.value = patient.age || '';
        ui.patientPhone.value = patient.phone || '';
        selectedPatientId = patient.id;
        ui.patientSearch.value = '';
        ui.searchResults.style.display = 'none';
    }

    document.addEventListener('click', (e) => {
        if (!ui.patientSearch.contains(e.target) && !ui.searchResults.contains(e.target)) {
            ui.searchResults.style.display = 'none';
        }
    });

    // --- Submit Form (Add/Edit) ---
    ui.bookingForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const editId = ui.editBookingId.value;
        const doctorId = ui.bookingDoctorSelect.value;
        const name = ui.patientName.value.trim();
        const date = ui.appointmentDate.value;
        const time = ui.appointmentTime.value;
        if (!doctorId || !name || !date || !time) {
            ui.formAlert.textContent = 'جميع الحقول المطلوبة';
            return;
        }
        ui.submitBtn.disabled = true;
        ui.submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الحفظ...';
        try {
            const phone = ui.patientPhone.value.trim();
            if (phone) {
                await set(ref(db, `patients/${phone}`), {
                    name, age: ui.patientAge.value || null, phone,
                    updatedAt: new Date().toISOString()
                });
                selectedPatientId = phone;
            }
            const bookingData = {
                patientName: name,
                patientId: selectedPatientId || null,
                age: ui.patientAge.value || null,
                phone: phone || null,
                doctorId: doctorId,
                date, time,
                status: 'انتظار',
                createdAt: editId ? (await get(ref(db, `appointments/${editId}`))).val().createdAt : new Date().toISOString()
            };
            if (editId) {
                await update(ref(db, `appointments/${editId}`), bookingData);
                showToast('✅ تم تعديل الحجز');
            } else {
                await push(ref(db, 'appointments'), bookingData);
                showToast('✅ تم حجز الموعد');
            }
            ui.modal.style.display = 'none';
            resetForm();
        } catch (err) {
            ui.formAlert.textContent = 'خطأ: ' + err.message;
        } finally {
            ui.submitBtn.disabled = false;
            ui.submitBtn.innerHTML = 'تأكيد الحجز';
        }
    });

    // --- Tabs ---
    ui.tabBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            ui.tabBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentTab = btn.dataset.tab;
            filterAndRenderByTab();
        });
    });

    // --- Logout ---
    ui.logoutBtn.onclick = async () => {
        if (unsubscribeBookings) unsubscribeBookings();
        await signOut(auth);
        window.location.href = 'index.html';
    };

    // --- Auth ---
    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = 'index.html'; return; }
        currentUser = user;
        await loadNurseData(user.uid);
    });
</script>
</body>
</html>
