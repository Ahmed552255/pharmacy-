<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#00AEEF">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>شفاء — بوابة الدخول</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap&subset=arabic" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00AEEF;
            --primary-dark: #008080;
            --primary-light: #E0F7FA;
            --bg: #FAFAFA;
            --white: #FFFFFF;
            --ink: #1A3C4A;
            --text-sec: #5A7D8A;
            --danger: #E57373;
            --success: #26A69A;
            --shadow: 0 10px 30px rgba(0, 174, 239, 0.08);
            --border-light: rgba(0, 174, 239, 0.2);
            --transition-speed: 0.15s;
        }
        
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        html { 
            font-size: 16px; 
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -webkit-text-size-adjust: 100%;
            text-rendering: optimizeSpeed;
        }
        
        body {
            font-family: 'Cairo', sans-serif;
            color: var(--ink);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.25rem;
            background: var(--bg);
            position: relative;
            overflow-x: hidden;
            contain: layout style paint;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
        }
        
        .bg-pattern {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            contain: strict;
        }
        
        .bg-pattern::before {
            content: '';
            position: absolute;
            top: -30%;
            right: -20%;
            width: 60vw;
            height: 60vw;
            max-width: 500px;
            max-height: 500px;
            background: radial-gradient(circle, rgba(0, 174, 239, 0.06) 0%, transparent 70%);
            border-radius: 50%;
            animation: simpleFloat 30s infinite alternate ease-in-out;
        }
        
        .bg-pattern::after {
            content: '';
            position: absolute;
            bottom: -25%;
            left: -15%;
            width: 50vw;
            height: 50vw;
            max-width: 400px;
            max-height: 400px;
            background: radial-gradient(circle, rgba(0, 128, 128, 0.04) 0%, transparent 70%);
            border-radius: 50%;
            animation: simpleFloat 35s infinite alternate-reverse ease-in-out;
        }
        
        @keyframes simpleFloat {
            0% { transform: translate(0, 0); }
            100% { transform: translate(15px, 15px); }
        }
        
        .glass-card {
            background: var(--white);
            border: 1px solid var(--border-light);
            border-radius: 28px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 420px;
            padding: 2.2rem 1.8rem;
            text-align: center;
            z-index: 1;
            animation: cardIn 0.4s ease-out forwards;
            opacity: 0;
            contain: layout style;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
        }
        
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .logo-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 18px;
            margin: 0 auto 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(0, 174, 239, 0.2);
            position: relative;
            contain: strict;
        }
        
        .logo-icon svg {
            width: 32px;
            height: 32px;
            color: white;
        }
        
        .card-header h1 {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary-dark);
            letter-spacing: -0.3px;
            margin-bottom: 0.3rem;
        }
        
        .card-header p {
            font-size: 0.95rem;
            color: var(--text-sec);
            font-weight: 500;
            margin-bottom: 0.5rem;
        }
        
        .secure-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(38, 166, 154, 0.08);
            color: var(--success);
            font-size: 0.78rem;
            padding: 5px 14px;
            border-radius: 30px;
            font-weight: 600;
            margin-bottom: 1.6rem;
            border: 1px solid rgba(38, 166, 154, 0.15);
        }
        
        .secure-badge svg {
            width: 14px;
            height: 14px;
        }
        
        .input-wrapper {
            margin-bottom: 1.2rem;
            text-align: right;
        }
        
        .input-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--ink);
            margin-bottom: 0.4rem;
            padding-right: 0.3rem;
        }
        
        .input-group {
            position: relative;
        }
        
        .input-group .input-icon {
            position: absolute;
            top: 50%;
            right: 1rem;
            transform: translateY(-50%);
            color: var(--primary);
            width: 20px;
            height: 20px;
            pointer-events: none;
            transition: color var(--transition-speed);
        }
        
        .input-group input {
            width: 100%;
            padding: 0.85rem 2.8rem 0.85rem 2.8rem;
            background: #F5FAFC;
            border: 1.5px solid rgba(0, 174, 239, 0.15);
            border-radius: 16px;
            outline: none;
            font-size: 0.95rem;
            font-family: 'Cairo', sans-serif;
            color: var(--ink);
            transition: border-color var(--transition-speed), box-shadow var(--transition-speed);
            -webkit-appearance: none;
            appearance: none;
            touch-action: manipulation;
        }
        
        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 174, 239, 0.1);
            background: #ffffff;
        }
        
        .input-group input:focus ~ .input-icon {
            color: var(--primary-dark);
        }
        
        .input-group input::placeholder {
            color: #B0C8D0;
            font-weight: 400;
        }
        
        .password-toggle {
            position: absolute;
            top: 50%;
            left: 0.8rem;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--primary);
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            transition: background var(--transition-speed);
            min-width: 44px;
            min-height: 44px;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        
        .password-toggle:active {
            background: rgba(0, 174, 239, 0.15);
        }
        
        .error-message {
            color: var(--danger);
            font-weight: 600;
            font-size: 0.85rem;
            padding: 0.6rem 1rem;
            background: rgba(229, 115, 115, 0.05);
            border-radius: 14px;
            opacity: 0;
            transition: opacity var(--transition-speed);
            border: 1px solid rgba(229, 115, 115, 0.1);
            margin-bottom: 0.8rem;
            max-height: 0;
            overflow: hidden;
            padding-top: 0;
            padding-bottom: 0;
            border-width: 0;
        }
        
        .error-message.show {
            opacity: 1;
            max-height: 100px;
            padding: 0.6rem 1rem;
            border-width: 1px;
        }
        
        .btn-login {
            width: 100%;
            padding: 0.95rem;
            border: none;
            border-radius: 18px;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.15s;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            box-shadow: 0 6px 18px rgba(0, 174, 239, 0.2);
            position: relative;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
            contain: layout style;
        }
        
        .btn-login:active:not(:disabled) {
            transform: scale(0.98);
            box-shadow: 0 4px 12px rgba(0, 174, 239, 0.15);
            transition: transform 0.05s, box-shadow 0.05s;
        }
        
        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .btn-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            pointer-events: none;
        }
        
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.5s linear infinite;
            contain: strict;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 700;
            z-index: 9999;
            font-family: 'Cairo', sans-serif;
            font-size: 0.9rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            transition: transform 0.25s ease-out;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 8px;
            contain: layout style;
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        
        .toast.success {
            background: var(--success);
        }
        
        .toast.error {
            background: var(--danger);
        }
        
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.35);
            transform: scale(0);
            animation: rippleEffect 0.5s ease-out;
            pointer-events: none;
        }
        
        @keyframes rippleEffect {
            to {
                transform: scale(3.5);
                opacity: 0;
            }
        }
        
        .loading-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--primary-dark));
            width: 0%;
            z-index: 10000;
            transition: width 1.2s ease-out;
            transform: translateZ(0);
        }
        
        .loading-bar.active {
            width: 85%;
        }
        
        .loading-bar.done {
            width: 100%;
            transition: width 0.25s ease;
            opacity: 0;
        }
        
        @media (max-width: 480px) {
            .glass-card {
                padding: 1.8rem 1.3rem;
                border-radius: 24px;
            }
            
            .card-header h1 {
                font-size: 1.7rem;
            }
            
            .input-group input {
                padding: 0.75rem 2.5rem;
                font-size: 0.9rem;
            }
            
            .bg-pattern::before,
            .bg-pattern::after {
                animation-duration: 45s;
            }
        }
        
        @media (max-width: 360px) {
            .glass-card {
                padding: 1.5rem 1rem;
                border-radius: 20px;
            }
            
            .card-header h1 {
                font-size: 1.5rem;
            }
            
            .btn-login {
                padding: 0.85rem;
                font-size: 1rem;
            }
        }
        
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.001ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.001ms !important;
            }
        }
        
        @media (prefers-reduced-data: reduce) {
            .bg-pattern {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="bg-pattern" aria-hidden="true"></div>
    <div class="loading-bar" id="loadingBar" aria-hidden="true"></div>
    <div class="toast" id="toast" aria-live="polite"></div>
    
    <main class="glass-card" id="mainCard">
        <div class="logo-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/>
                <path d="M12 8v4l3 3"/>
            </svg>
        </div>
        
        <header class="card-header">
            <h1>شفاء</h1>
            <p>منصة إدارة العيادات والصيدليات</p>
        </header>
        
        <div class="secure-badge" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            اتصال آمن ومشفر
        </div>
        
        <form id="loginForm" novalidate autocomplete="on">
            <div class="input-wrapper">
                <label class="input-label" for="emailInput">البريد الإلكتروني</label>
                <div class="input-group">
                    <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <rect x="2" y="4" width="20" height="16" rx="2"/>
                        <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
                    </svg>
                    <input 
                        type="email" 
                        id="emailInput" 
                        placeholder="example@domain.com" 
                        required 
                        autocomplete="email"
                        inputmode="email"
                        dir="ltr"
                    >
                </div>
            </div>
            
            <div class="input-wrapper">
                <label class="input-label" for="passwordInput">كلمة المرور</label>
                <div class="input-group">
                    <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    <input 
                        type="password" 
                        id="passwordInput" 
                        placeholder="••••••••" 
                        required 
                        autocomplete="current-password"
                    >
                    <button type="button" class="password-toggle" id="togglePasswordBtn" aria-label="إظهار/إخفاء كلمة المرور" tabindex="-1">
                        <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
            </div>
            
            <div class="error-message" id="errorMessage" role="alert" aria-live="assertive"></div>
            
            <button type="submit" class="btn-login" id="loginButton">
                <span class="btn-content" id="btnContent">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                        <polyline points="10 17 15 12 10 7"/>
                        <line x1="15" y1="12" x2="3" y2="12"/>
                    </svg>
                    تسجيل الدخول
                </span>
            </button>
        </form>
    </main>

    <script type="module">
        // ============ استيراد Firebase ============
        import { firebaseConfig } from './firebase-config.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // ============ ثوابت التخزين المحلي ============
        const STORAGE_KEYS = {
            SESSION: 'shifa_session',
            REMEMBER_ME: 'shifa_remember',
            LAST_LOGIN: 'shifa_last_login'
        };

        // ============ تهيئة Firebase ============
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // ============ عناصر DOM ============
        const dom = {
            emailInput: document.getElementById('emailInput'),
            passwordInput: document.getElementById('passwordInput'),
            loginButton: document.getElementById('loginButton'),
            btnContent: document.getElementById('btnContent'),
            loginForm: document.getElementById('loginForm'),
            togglePasswordBtn: document.getElementById('togglePasswordBtn'),
            eyeIcon: document.getElementById('eyeIcon'),
            errorMessage: document.getElementById('errorMessage'),
            toast: document.getElementById('toast'),
            loadingBar: document.getElementById('loadingBar'),
        };

        // ============ أيقونات العين SVG ============
        const ICONS = {
            eyeOpen: `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`,
            eyeOff: `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`,
        };

        // ============ محتوى الزر الافتراضي ============
        const defaultBtnContent = dom.btnContent.innerHTML;

        // ============ إدارة التخزين المحلي - جلسة دائمة ============
        
        /**
         * حفظ بيانات الجلسة في localStorage (دائمة - لا تنتهي صلاحيتها أبداً)
         */
        const saveSessionToLocal = (uid, role, name, email = '') => {
            try {
                const sessionData = {
                    uid,
                    role,
                    name,
                    email: email || dom.emailInput.value.trim().toLowerCase(),
                    timestamp: Date.now()
                    // ✅ لا يوجد expiresAt - الجلسة دائمة للأبد
                };
                localStorage.setItem(STORAGE_KEYS.SESSION, JSON.stringify(sessionData));
            } catch (e) {
                console.warn('تعذر حفظ الجلسة محلياً:', e.message);
            }
        };

        /**
         * استرجاع بيانات الجلسة من localStorage (صالحة للأبد)
         */
        const getLocalSession = () => {
            try {
                const data = localStorage.getItem(STORAGE_KEYS.SESSION);
                if (!data) return null;
                
                const session = JSON.parse(data);
                
                // ✅ التحقق من وجود البيانات الأساسية فقط (بدون تاريخ صلاحية)
                if (!session.uid || !session.role) {
                    clearLocalSession();
                    return null;
                }
                
                return session;
            } catch (e) {
                console.warn('تعذر استرجاع الجلسة المحلية:', e.message);
                clearLocalSession();
                return null;
            }
        };

        /**
         * مسح بيانات الجلسة المحلية
         */
        const clearLocalSession = () => {
            try {
                localStorage.removeItem(STORAGE_KEYS.SESSION);
            } catch (e) {
                console.warn('تعذر مسح الجلسة المحلية:', e.message);
            }
        };

        /**
         * حفظ بيانات الجلسة في كلا المخزنين (sessionStorage + localStorage)
         */
        const saveSession = (uid, role, name, email = '') => {
            // جلسة سريعة (تنتهي عند إغلاق المتصفح)
            sessionStorage.setItem('userUid', uid);
            sessionStorage.setItem('userRole', role);
            sessionStorage.setItem('userName', name);
            
            // ✅ جلسة دائمة في localStorage للتوجيه التلقائي (لا تنتهي أبداً)
            saveSessionToLocal(uid, role, name, email);
        };

        // ============ دوال مساعدة ============
        
        const showError = (msg) => {
            if (!msg) {
                dom.errorMessage.classList.remove('show');
                dom.errorMessage.textContent = '';
                return;
            }
            dom.errorMessage.textContent = msg;
            dom.errorMessage.classList.add('show');
            clearTimeout(dom._errorTimeout);
            dom._errorTimeout = setTimeout(() => {
                dom.errorMessage.classList.remove('show');
            }, 5000);
        };

        const hideError = () => {
            dom.errorMessage.classList.remove('show');
            dom.errorMessage.textContent = '';
        };

        const showToast = (msg, type = 'success') => {
            dom.toast.textContent = msg;
            dom.toast.className = `toast ${type} show`;
            clearTimeout(dom._toastTimeout);
            dom._toastTimeout = setTimeout(() => {
                dom.toast.classList.remove('show');
            }, 2500);
        };

        const showLoadingBar = () => {
            dom.loadingBar.classList.add('active');
        };

        const hideLoadingBar = () => {
            dom.loadingBar.classList.add('done');
            setTimeout(() => {
                dom.loadingBar.classList.remove('active', 'done');
                dom.loadingBar.style.width = '0%';
            }, 300);
        };

        const setLoading = (loading) => {
            dom.loginButton.disabled = loading;
            if (loading) {
                dom.btnContent.innerHTML = '<span class="spinner"></span> جاري التحقق...';
                showLoadingBar();
            } else {
                dom.btnContent.innerHTML = defaultBtnContent;
                hideLoadingBar();
            }
        };

        const addRippleEffect = (e) => {
            const button = e.currentTarget;
            const ripple = document.createElement('span');
            ripple.className = 'ripple';
            const rect = button.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            ripple.style.width = ripple.style.height = `${size}px`;
            ripple.style.left = `${e.clientX - rect.left - size / 2}px`;
            ripple.style.top = `${e.clientY - rect.top - size / 2}px`;
            button.appendChild(ripple);
            ripple.addEventListener('animationend', () => {
                if (ripple.parentNode) ripple.remove();
            });
        };

        dom.loginButton.addEventListener('click', addRippleEffect);

        // تبديل إظهار/إخفاء كلمة المرور
        dom.togglePasswordBtn.addEventListener('click', (e) => {
            e.preventDefault();
            const isPassword = dom.passwordInput.type === 'password';
            dom.passwordInput.type = isPassword ? 'text' : 'password';
            dom.eyeIcon.innerHTML = isPassword ? ICONS.eyeOff : ICONS.eyeOpen;
            dom.passwordInput.focus();
        });

        // جلب بيانات المستخدم من قاعدة البيانات
        const fetchUserData = async (uid) => {
            try {
                const snapshot = await get(ref(db, `users/${uid}`));
                return snapshot.exists() ? snapshot.val() : null;
            } catch (error) {
                console.error("خطأ في جلب بيانات المستخدم:", error);
                return null;
            }
        };

        // ============ توجيه المستخدم حسب الصلاحية ============
        const redirectUser = (role, name) => {
            const pages = {
                admin: 'admin-panel.html',
                doctor: 'doctor-dashboard.html',
                nurse: 'nurse-dashboard.html',
                pharmacist: 'pharmacy-dashboard.html',
            };
            
            const redirectUrl = pages[role] || 'dashboard.html';
            
            showToast(`👋 مرحباً ${name}!`, 'success');
            
            setTimeout(() => {
                window.location.href = redirectUrl;
            }, 800);
        };

        /**
         * ============ التحقق من الجلسة المحفوظة وإعادة التوجيه التلقائي ============
         * الجلسة دائمة - المستخدم هيتوجه تلقائي كل مرة
         */
        const checkStoredSession = async () => {
            const localSession = getLocalSession();
            
            if (!localSession || !localSession.uid || !localSession.role) {
                return false;
            }
            
            showToast('🔄 جاري استعادة الجلسة...', 'success');
            setLoading(true);
            
            try {
                // التحقق من حالة المستخدم في قاعدة البيانات
                const userData = await fetchUserData(localSession.uid);
                
                if (!userData || !userData.role) {
                    // المستخدم مش موجود في قاعدة البيانات - خلاص امسح الجلسة
                    clearLocalSession();
                    setLoading(false);
                    return false;
                }
                
                // التحقق من الحالة (محظور)
                if (userData.status === 'blocked') {
                    clearLocalSession();
                    setLoading(false);
                    showError('🚫 هذا الحساب محظور. تواصل مع المسؤول.');
                    return false;
                }
                
                // تحديث بيانات الجلسة لو الدور اتغير
                if (userData.role !== localSession.role) {
                    saveSessionToLocal(localSession.uid, userData.role, userData.name || localSession.name, localSession.email);
                }
                
                const displayName = userData.name || localSession.name || 'مستخدم';
                
                // تحديث sessionStorage
                sessionStorage.setItem('userUid', localSession.uid);
                sessionStorage.setItem('userRole', userData.role);
                sessionStorage.setItem('userName', displayName);
                
                // توجيه المستخدم مباشرة
                redirectUser(userData.role, displayName);
                return true;
                
            } catch (error) {
                console.warn('تعذر التحقق من الجلسة المحفوظة:', error.message);
                
                // في حالة خطأ الشبكة - استخدم البيانات المحلية مباشرة
                if (error.message.includes('network') || error.message.includes('fetch') || error.code === 'auth/network-request-failed') {
                    const displayName = localSession.name || 'مستخدم';
                    sessionStorage.setItem('userUid', localSession.uid);
                    sessionStorage.setItem('userRole', localSession.role);
                    sessionStorage.setItem('userName', displayName);
                    redirectUser(localSession.role, displayName);
                    return true;
                }
                
                setLoading(false);
                return false;
            }
        };

        // ============ معالجة تسجيل الدخول ============
        const handleLogin = async (e) => {
            e.preventDefault();
            
            const email = dom.emailInput.value.trim().toLowerCase();
            const password = dom.passwordInput.value;

            if (!email) {
                showError('⚠️ الرجاء إدخال البريد الإلكتروني');
                dom.emailInput.focus();
                return;
            }
            
            if (!password) {
                showError('⚠️ الرجاء إدخال كلمة المرور');
                dom.passwordInput.focus();
                return;
            }
            
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showError('⚠️ صيغة البريد الإلكتروني غير صحيحة');
                dom.emailInput.focus();
                return;
            }

            if (password.length < 6) {
                showError('⚠️ كلمة المرور يجب أن تكون 6 أحرف على الأقل');
                dom.passwordInput.focus();
                return;
            }

            hideError();
            setLoading(true);

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                const userData = await fetchUserData(user.uid);

                if (!userData || !userData.role) {
                    showError('❌ هذا الحساب غير مفعل أو لا يملك صلاحيات. تواصل مع المسؤول.');
                    setLoading(false);
                    return;
                }

                if (userData.status === 'blocked') {
                    showError('🚫 هذا الحساب محظور. تواصل مع المسؤول.');
                    setLoading(false);
                    return;
                }

                const displayName = userData.name || email.split('@')[0];

                // ✅ حفظ الجلسة بشكل دائم
                saveSession(user.uid, userData.role, displayName, email);

                redirectUser(userData.role, displayName);

            } catch (error) {
                console.error("خطأ تسجيل الدخول:", error);
                
                const errorMessages = {
                    'auth/invalid-credential': '❌ البريد الإلكتروني أو كلمة المرور غير صحيحة',
                    'auth/user-not-found': '❌ لا يوجد حساب بهذا البريد الإلكتروني',
                    'auth/wrong-password': '❌ كلمة المرور غير صحيحة',
                    'auth/invalid-email': '❌ صيغة البريد الإلكتروني غير صحيحة',
                    'auth/user-disabled': '🚫 هذا الحساب معطل. تواصل مع المسؤول.',
                    'auth/too-many-requests': '⏳ تم تعطيل الحساب مؤقتاً بسبب محاولات كثيرة. حاول لاحقاً.',
                    'auth/network-request-failed': '📡 خطأ في الاتصال بالإنترنت. تحقق من اتصالك.',
                    'auth/operation-not-allowed': '⚠️ تسجيل الدخول غير مفعل حالياً.',
                };
                
                const message = errorMessages[error.code] || '⚠️ حدث خطأ غير متوقع. حاول مرة أخرى.';
                showError(message);
                setLoading(false);
                
                if (error.code === 'auth/network-request-failed') {
                    showToast('📡 لا يوجد اتصال بالإنترنت', 'error');
                }
            }
        };

        // ============ مستمعي الأحداث ============
        
        dom.loginForm.addEventListener('submit', handleLogin);

        dom.emailInput.addEventListener('input', hideError);
        dom.passwordInput.addEventListener('input', hideError);

        // إظهار كلمة المرور مؤقتاً بالضغط المطول
        let longPressTimer;
        
        const startLongPress = () => {
            longPressTimer = setTimeout(() => {
                dom.passwordInput.type = 'text';
                dom.eyeIcon.innerHTML = ICONS.eyeOff;
            }, 400);
        };
        
        const endLongPress = () => {
            clearTimeout(longPressTimer);
            dom.passwordInput.type = 'password';
            dom.eyeIcon.innerHTML = ICONS.eyeOpen;
        };
        
        dom.togglePasswordBtn.addEventListener('mousedown', startLongPress);
        dom.togglePasswordBtn.addEventListener('mouseup', endLongPress);
        dom.togglePasswordBtn.addEventListener('mouseleave', endLongPress);
        dom.togglePasswordBtn.addEventListener('touchstart', startLongPress, { passive: true });
        dom.togglePasswordBtn.addEventListener('touchend', endLongPress);
        dom.togglePasswordBtn.addEventListener('touchcancel', endLongPress);

        // اختصار Ctrl+Enter لتسجيل الدخول
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                dom.loginForm.dispatchEvent(new Event('submit'));
            }
        });

        // ============ تحسينات إضافية ============
        
        document.addEventListener('gesturestart', (e) => {
            if (document.activeElement.tagName === 'INPUT') {
                e.preventDefault();
            }
        }, { passive: false });

        // ============ بدء التشغيل: التحقق من الجلسة الدائمة ============
        const initApp = async () => {
            // ✅ التحقق من وجود جلسة دائمة في localStorage
            const hasSession = await checkStoredSession();
            
            if (!hasSession) {
                console.log('👤 لا توجد جلسة سابقة - انتظار تسجيل الدخول');
                
                // محاولة ملء البريد الإلكتروني من الجلسة القديمة لو موجود
                try {
                    const oldData = localStorage.getItem(STORAGE_KEYS.SESSION);
                    if (oldData) {
                        const parsed = JSON.parse(oldData);
                        if (parsed.email) {
                            dom.emailInput.value = parsed.email;
                        }
                    }
                } catch (e) {
                    // تجاهل
                }
            }
            
            // مستمع لحالة المصادقة
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    const localSession = getLocalSession();
                    if (!localSession || localSession.uid !== user.uid) {
                        try {
                            const userData = await fetchUserData(user.uid);
                            if (userData && userData.role) {
                                const displayName = userData.name || user.email.split('@')[0];
                                saveSession(user.uid, userData.role, displayName, user.email);
                            }
                        } catch (e) {
                            console.warn('تعذر تحديث الجلسة:', e.message);
                        }
                    }
                }
            });
        };

        // ============ تنظيف التايمرات عند مغادرة الصفحة ============
        window.addEventListener('beforeunload', () => {
            clearTimeout(dom._errorTimeout);
            clearTimeout(dom._toastTimeout);
            clearTimeout(longPressTimer);
        });

        // ============ تحسين أداء الصفحة ============
        if (typeof requestIdleCallback !== 'undefined') {
            requestIdleCallback(() => {
                console.log('🚀 نظام شفاء — بوابة الدخول جاهزة (جلسة دائمة)');
            });
        } else {
            setTimeout(() => {
                console.log('🚀 نظام شفاء — بوابة الدخول جاهزة (جلسة دائمة)');
            }, 200);
        }

        // تشغيل التطبيق
        initApp();
    </script>
</body>
</html>
